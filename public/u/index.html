<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Profile · Lucky Please</title>
    <meta name="description" content="Lucky Please member profile.">
    <!-- OG/Twitter tags are populated by JS once the profile loads so
         shared links get the member's avatar + name in previews. -->
    <meta property="og:type" content="profile">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0A0A1A">
    <link rel="apple-touch-icon" href="/assets/icon-192.png?v=1776639849">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --primary:#FF6B35;--secondary:#00D9FF;--accent:#FFE66D;
    --danger:#FF3366;--success:#00D98A;--dark:#0A0A1A;
    --muted:rgba(255,255,255,.55);--muted-2:rgba(255,255,255,.35)
}
html,body{height:100%}
body{
    font-family:'Noto Sans KR',sans-serif;background:var(--dark);color:#fff;
    min-height:100dvh;display:flex;flex-direction:column;align-items:center;
    padding:24px 16px;gap:20px;letter-spacing:.01em;
    background-image:radial-gradient(ellipse at 50% 20%,rgba(255,230,109,.05) 0%,transparent 55%),linear-gradient(180deg,#0A0A1A 0%,#10101F 50%,#0A0A1A 100%)
}
.top-bar{width:100%;max-width:640px;display:flex;align-items:center;gap:8px}
.top-bar .home{padding:8px 14px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.75);text-decoration:none;font-size:.82em;font-weight:700;transition:all .2s}
.top-bar .home:hover{background:rgba(255,230,109,.08);border-color:rgba(255,230,109,.35);color:#FFE66D}

.profile-card{
    background:linear-gradient(165deg,rgba(22,22,42,.72),rgba(12,12,28,.88));
    backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border-radius:22px;padding:36px 32px 28px;
    border:1px solid rgba(255,255,255,.07);
    box-shadow:0 24px 60px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.04);
    width:100%;max-width:640px;position:relative;overflow:hidden
}
.profile-card::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,230,109,.4),transparent)}

.hero{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.big-avatar{
    width:96px;height:96px;border-radius:50%;flex-shrink:0;
    background:linear-gradient(135deg,#FF6B35,#FF6B8B);
    display:flex;align-items:center;justify-content:center;
    font-family:'Orbitron',sans-serif;font-weight:900;font-size:2.2em;color:#fff;
    overflow:hidden;box-shadow:0 12px 32px rgba(255,107,53,.25);
    position:relative
}
.big-avatar img{width:100%;height:100%;object-fit:cover}
.big-avatar .verify-dot{
    position:absolute;bottom:2px;right:2px;width:24px;height:24px;border-radius:50%;
    background:#00D9FF;border:3px solid #0A0A1A;
    display:flex;align-items:center;justify-content:center;font-size:.72em;font-weight:900;color:#001220
}
.hero-info{flex:1;min-width:0}
.nickname{font-family:'Orbitron','Noto Sans KR',sans-serif;font-weight:900;font-size:1.5em;letter-spacing:-.01em;color:#fff;word-break:break-word}
.verified-label{font-size:.72em;color:#00D9FF;letter-spacing:.1em;text-transform:uppercase;font-weight:700;margin-top:3px;display:inline-flex;align-items:center;gap:5px}
.guest-label{font-size:.72em;color:var(--muted-2);letter-spacing:.08em;font-style:italic;margin-top:3px}
.joined{font-size:.78em;color:var(--muted);margin-top:6px}

.bio{
    margin-top:22px;padding:14px 16px;border-radius:12px;
    background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);
    font-size:.92em;line-height:1.55;color:rgba(255,255,255,.88);
    white-space:pre-wrap;word-break:break-word
}
.bio.empty{color:var(--muted-2);font-style:italic}

.actions{
    display:flex;gap:10px;margin-top:22px;flex-wrap:wrap
}
.action-btn{
    flex:1;min-width:130px;padding:12px;border:0;border-radius:12px;
    font-family:'Orbitron','Noto Sans KR',sans-serif;font-weight:800;
    font-size:.86em;letter-spacing:.1em;cursor:pointer;
    transition:transform .15s,filter .2s,box-shadow .2s
}
.action-btn:hover:not(:disabled){transform:translateY(-1px);filter:brightness(1.08)}
.action-btn:disabled{opacity:.45;cursor:not-allowed;transform:none;filter:grayscale(.3)}
.action-btn.primary{background:linear-gradient(135deg,#FF9A3C,#FF6B35);color:#fff;box-shadow:0 6px 18px -6px rgba(255,107,53,.55)}
.action-btn.cyan  {background:linear-gradient(135deg,#00D9FF,#0099CC);color:#001220;box-shadow:0 6px 18px -6px rgba(0,217,255,.55)}
.action-btn.ghost {background:rgba(255,255,255,.05);color:#fff;border:1px solid rgba(255,255,255,.1)}
.action-btn.ghost:hover{background:rgba(255,255,255,.1)}
.action-btn.danger{background:rgba(255,51,102,.1);color:#FF6B8B;border:1px solid rgba(255,51,102,.4)}
.action-btn.danger:hover{background:rgba(255,51,102,.2)}
.action-btn.accepted{background:rgba(0,217,138,.1);color:#00D98A;border:1px solid rgba(0,217,138,.4);cursor:default}

.status-msg{margin-top:12px;font-size:.82em;text-align:center;min-height:1.2em;color:var(--muted)}
.status-msg.ok{color:#00D98A}
.status-msg.err{color:#FF6B8B}

/* Not-found / loading / signed-out states */
.state-card{
    background:linear-gradient(165deg,rgba(22,22,42,.72),rgba(12,12,28,.88));
    backdrop-filter:blur(24px);border-radius:20px;padding:40px 30px;
    border:1px solid rgba(255,255,255,.07);width:100%;max-width:440px;text-align:center
}
.state-card h2{font-family:'Orbitron','Noto Sans KR',sans-serif;font-size:1.35em;margin-bottom:10px;background:linear-gradient(135deg,#FFE66D,#FF9A3C,#FF6B8B);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.state-card p{color:var(--muted);font-size:.92em;line-height:1.6;margin-bottom:22px}
.state-card .primary{display:inline-block;padding:11px 24px;border-radius:10px;background:linear-gradient(135deg,#FF9A3C,#FF6B35);color:#fff;font-weight:800;text-decoration:none;letter-spacing:.08em;font-size:.85em;transition:transform .2s,filter .2s}
.state-card .primary:hover{transform:translateY(-1px);filter:brightness(1.08)}

.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.12);border-top-color:#FFE66D;border-radius:50%;margin:16px auto;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:500px){
    .profile-card{padding:28px 22px}
    .big-avatar{width:80px;height:80px;font-size:1.8em}
    .nickname{font-size:1.3em}
}
    </style>

</head>
<body>

<div class="top-bar">
    <a href="/" class="home">← Home</a>
</div>

<div id="loadingRoot" class="state-card" style="display:block">

</div>

<div id="profileRoot" class="profile-card" style="display:none">

        <div class="big-avatar" id="bigAvatar">?</div>
        <div class="hero-info">
            <div class="nickname" id="profileNickname">—</div>
            <div id="verifiedLabel" class="verified-label" style="display:none">✓ <span id="verifiedText">Verified member</span></div>
            <div id="guestLabel" class="guest-label" style="display:none"></div>
            <div class="joined" id="joinedLine">—</div>
        </div>
    </div>
    <div class="bio" id="profileBio"></div>
    <div class="actions" id="actionsRow"></div>
    <div class="status-msg" id="statusMsg"></div>
</div>

<script src="/js/supabase-config.js?v=1777980128"></script>
<script src="/js/lpSocial.js?v=1777980128"></script>
<script>
/* ================================================================
   /u/<nickname> — public profile viewer.
   Parse nickname from pathname, fetch profile by lower(nickname)
   case-insensitively, fetch friendship status (if viewer is signed
   in), render action buttons based on the (viewer, owner)
   relationship.
   ================================================================ */

const T = {
    en: {loading:'Loading profile…', nfTitle:'Profile not found', nfBody:'No member with that nickname. They may have deleted their account.',
        nfHome:'← Back to home', verified:'Verified member', guest:'Lucky Please member',
        joinedFmt:'Joined {d}', bioEmpty:'Hasn\'t written a bio yet.',
        actEdit:'EDIT PROFILE', actAddFriend:'＋ ADD FRIEND', actSendMsg:'💬 MESSAGE', actAccept:'✓ ACCEPT',
        actReject:'REJECT', actPending:'REQUEST SENT', actAccepted:'✓ FRIENDS', actUnfriend:'UNFRIEND',
        actBlock:'🚫 BLOCK', actUnblock:'UNBLOCK', actSignIn:'SIGN IN TO CONNECT',
        ok_sent:'✓ Friend request sent!', ok_auto:'✓ You\'re now friends!',
        ok_accepted:'✓ Now friends!', ok_removed:'Friend removed.', ok_blocked:'User blocked.',
        err_not_found:'Profile not found.', err_already_friends:'Already friends.',
        err_already_requested:'Request already sent.', err_blocked:'Cannot send — blocked.',
        err_generic:'Something went wrong.', confirmUnfriend:'Remove this friend?',
        confirmBlock:'Block this user? They won\'t be able to message you.'},
    ko: {loading:'프로필 불러오는 중…', nfTitle:'프로필을 찾을 수 없어요', nfBody:'해당 닉네임의 회원이 없어요. 계정이 삭제되었을 수 있어요.',
        nfHome:'← 홈으로', verified:'인증 회원', guest:'Lucky Please 회원',
        joinedFmt:'{d} 가입', bioEmpty:'아직 소개글이 없어요.',
        actEdit:'프로필 수정', actAddFriend:'＋ 친구 추가', actSendMsg:'💬 메시지', actAccept:'✓ 수락',
        actReject:'거절', actPending:'요청 전송됨', actAccepted:'✓ 친구', actUnfriend:'친구 삭제',
        actBlock:'🚫 차단', actUnblock:'차단 해제', actSignIn:'로그인하여 연결',
        ok_sent:'✓ 친구 요청을 보냈어요!', ok_auto:'✓ 친구가 되었어요!',
        ok_accepted:'✓ 이제 친구예요!', ok_removed:'친구에서 삭제됐어요.', ok_blocked:'차단했어요.',
        err_not_found:'프로필을 찾을 수 없어요.', err_already_friends:'이미 친구예요.',
        err_already_requested:'이미 요청을 보냈어요.', err_blocked:'차단되어 요청할 수 없어요.',
        err_generic:'오류가 발생했어요.', confirmUnfriend:'이 친구를 삭제할까요?',
        confirmBlock:'이 유저를 차단할까요? 더 이상 메시지를 보내지 못해요.'},
    ja: {loading:'プロフィール読み込み中…', nfTitle:'プロフィールが見つかりません', nfBody:'該当ニックネームのメンバーはいません。',
        nfHome:'← ホーム', verified:'認証会員', guest:'Lucky Please 会員',
        joinedFmt:'{d} 参加', bioEmpty:'自己紹介はまだありません。',
        actEdit:'プロフィール編集', actAddFriend:'＋ フレンド追加', actSendMsg:'💬 メッセージ', actAccept:'✓ 承認',
        actReject:'拒否', actPending:'リクエスト送信済', actAccepted:'✓ フレンド', actUnfriend:'削除',
        actBlock:'🚫 ブロック', actUnblock:'ブロック解除', actSignIn:'ログインして接続',
        ok_sent:'✓ リクエスト送信！', ok_auto:'✓ フレンドになりました！',
        ok_accepted:'✓ フレンド成立！', ok_removed:'削除しました。', ok_blocked:'ブロックしました。',
        err_not_found:'プロフィールが見つかりません。', err_already_friends:'既にフレンドです。',
        err_already_requested:'既に送信済み。', err_blocked:'ブロック中です。',
        err_generic:'エラーが発生しました。', confirmUnfriend:'このフレンドを削除しますか？',
        confirmBlock:'このユーザーをブロック？'},
    zh: {loading:'加载个人资料…', nfTitle:'未找到个人资料', nfBody:'找不到该昵称的成员。',
        nfHome:'← 返回首页', verified:'认证会员', guest:'Lucky Please 会员',
        joinedFmt:'加入于 {d}', bioEmpty:'尚未填写简介。',
        actEdit:'编辑资料', actAddFriend:'＋ 添加好友', actSendMsg:'💬 消息', actAccept:'✓ 接受',
        actReject:'拒绝', actPending:'请求已发送', actAccepted:'✓ 好友', actUnfriend:'删除好友',
        actBlock:'🚫 屏蔽', actUnblock:'取消屏蔽', actSignIn:'登录以连接',
        ok_sent:'✓ 好友请求已发送！', ok_auto:'✓ 已成为好友！',
        ok_accepted:'✓ 已成为好友！', ok_removed:'已删除好友。', ok_blocked:'已屏蔽。',
        err_not_found:'未找到资料。', err_already_friends:'已经是好友。',
        err_already_requested:'请求已发送。', err_blocked:'已屏蔽。',
        err_generic:'发生错误。', confirmUnfriend:'删除此好友？',
        confirmBlock:'屏蔽此用户？'}
};
function detectLang(){
    const s=(localStorage.getItem('luckyplz_lang')||'').toLowerCase().split('-')[0];
    if(T[s])return s;
    const n=(navigator.language||'en').toLowerCase().split('-')[0];
    return T[n]?n:'en';
}
const lang=detectLang();
const t=T[lang]||T.en;
document.getElementById('loadingMsg').textContent=t.loading;

function $(id){return document.getElementById(id)}
function escape(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function initials(s){return (s||'?').trim()[0]?.toUpperCase()||'?'}

/* Parse nickname from /u/<nickname> pathname. Supports a trailing
   slash and URL-encoded characters (한글 nicknames). */
function getPathNickname(){
    const m=location.pathname.match(/^\/u\/([^\/?#]+)\/?$/);
    if(!m)return null;
    try { return decodeURIComponent(m[1]); } catch(_) { return m[1]; }
}

function dateStr(iso){
    if(!iso)return '';
    try {
        return new Date(iso).toLocaleDateString(lang,{year:'numeric',month:'short'});
    } catch(_) { return iso.slice(0,10); }
}

/* Relation states:
     'self'              — viewing own profile
     'signed_out'        — no session
     'accepted'          — friends
     'incoming-pending'  — they requested me
     'outgoing-pending'  — I requested them
     'blocked-by-me'     — I blocked them
     'blocked-by-them'   — they blocked me
     'none'              — no relationship
*/
async function computeRelation(ownerId){
    const user=await getUser();
    if(!user)return {relation:'signed_out'};
    if(user.id===ownerId)return {relation:'self', viewer:user};
    const a=user.id<ownerId?user.id:ownerId;
    const b=user.id<ownerId?ownerId:user.id;
    try {
        const { data, error } = await getSupabase()
            .from('friendships')
            .select('status, requester_id, blocked_by')
            .eq('user_a',a).eq('user_b',b).maybeSingle();
        if(error)return {relation:'none', viewer:user};
        if(!data)return {relation:'none', viewer:user};
        if(data.status==='accepted') return {relation:'accepted', viewer:user};
        if(data.status==='blocked') {
            return {relation: data.blocked_by===user.id ? 'blocked-by-me' : 'blocked-by-them', viewer:user};
        }
        if(data.status==='pending'){
            return {relation: data.requester_id===user.id ? 'outgoing-pending' : 'incoming-pending', viewer:user};
        }
        return {relation:'none', viewer:user};
    } catch(_) { return {relation:'none', viewer:user}; }
}

let currentOwner=null; /* profile row */
let currentRelation='signed_out';

async function boot(){
    const nick=getPathNickname();
    if(!nick){showNotFound();return}
    /* Case-insensitive lookup via lower(nickname) — matches the
       UNIQUE index on profiles. RLS is SELECT-public so anonymous
       viewers can read public profile fields too. */
    try {
        const { data, error } = await getSupabase()
            .from('profiles')
            .select('id, nickname, avatar_url, bio, profile_complete, created_at')
            .ilike('nickname', nick)
            .maybeSingle();
        if(error||!data){showNotFound();return}
        currentOwner=data;
        const rel=await computeRelation(data.id);
        currentRelation=rel.relation;
        render(data, rel.relation);
    } catch(_) { showNotFound(); }
}

function showNotFound(){
    $('loadingRoot').style.display='none';
    $('profileRoot').style.display='none';
    $('notFoundRoot').style.display='block';
    $('nfH2').textContent=t.nfTitle;
    $('nfBody').textContent=t.nfBody;
    $('nfHome').textContent=t.nfHome;
    document.title=t.nfTitle+' · Lucky Please';
}

function render(owner, relation){
    $('loadingRoot').style.display='none';
    $('profileRoot').style.display='block';
    /* Avatar */
    const av=$('bigAvatar');
    if(owner.avatar_url){
        av.innerHTML='<img src="'+escape(owner.avatar_url)+'" referrerpolicy="no-referrer" alt="">';
    } else {
        av.textContent=initials(owner.nickname);
    }
    if(owner.profile_complete){
        av.innerHTML+='<span class="verify-dot" title="'+escape(t.verified)+'">✓</span>';
    }
    /* Header text */
    $('profileNickname').textContent=owner.nickname;
    document.title=owner.nickname+' · Lucky Please';
    /* Dynamic OG tags for link previews — only the canonical ones
       the platforms actually read on re-crawl. */
    const metaOgTitle=document.querySelector('meta[property="og:title"]');
    if(metaOgTitle)metaOgTitle.setAttribute('content', owner.nickname+' · Lucky Please');
    if(owner.avatar_url){
        const metaOgImg=document.createElement('meta');
        metaOgImg.setAttribute('property','og:image');
        metaOgImg.setAttribute('content',owner.avatar_url);
        document.head.appendChild(metaOgImg);
    }
    /* Verified vs nickname-only label */
    if(owner.profile_complete){
        $('verifiedLabel').style.display='inline-flex';
        $('verifiedText').textContent=t.verified;
    } else {
        $('guestLabel').style.display='block';
        $('guestLabel').textContent=t.guest;
    }
    $('joinedLine').textContent=t.joinedFmt.replace('{d}', dateStr(owner.created_at));
    /* Bio — null/empty rendered as italic placeholder */
    const bio=$('profileBio');
    if(owner.bio&&owner.bio.trim()){
        bio.textContent=owner.bio.trim();
        bio.classList.remove('empty');
    } else {
        bio.textContent=t.bioEmpty;
        bio.classList.add('empty');
    }
    renderActions(relation);
}

function renderActions(relation){
    const row=$('actionsRow');
    row.innerHTML='';
    if(relation==='self'){
        row.appendChild(makeBtn(t.actEdit,'primary',()=>{location.href='/me/'}));
        return;
    }
    if(relation==='signed_out'){
        row.appendChild(makeBtn(t.actSignIn,'primary',()=>{location.href='/auth/?next='+encodeURIComponent(location.pathname)}));
        return;
    }
    if(relation==='accepted'){
        row.appendChild(makeBtn(t.actSendMsg,'cyan',()=>{location.href='/messages/?friend='+encodeURIComponent(currentOwner.id)}));
        row.appendChild(makeBtn(t.actAccepted,'accepted',null, {disabled:true}));
        row.appendChild(makeBtn(t.actUnfriend,'ghost',async()=>{
            if(!confirm(t.confirmUnfriend))return;
            const r=await LpSocial.removeFriend(currentOwner.id);
            showStatus(r.ok?t.ok_removed:(t.err_generic+': '+r.error), r.ok);
            if(r.ok){currentRelation='none';renderActions('none')}
        }));
        return;
    }
    if(relation==='outgoing-pending'){
        row.appendChild(makeBtn(t.actPending,'accepted',null,{disabled:true}));
        row.appendChild(makeBtn(t.actReject,'ghost',async()=>{
            const r=await LpSocial.removeFriend(currentOwner.id);
            if(r.ok){currentRelation='none';renderActions('none');showStatus(t.ok_removed, true)}
        }));
        return;
    }
    if(relation==='incoming-pending'){
        row.appendChild(makeBtn(t.actAccept,'primary',async()=>{
            const r=await LpSocial.acceptFriendRequest(currentOwner.id);
            if(r.ok){currentRelation='accepted';renderActions('accepted');showStatus(t.ok_accepted,true)}
            else showStatus(t.err_generic+': '+r.error, false);
        }));
        row.appendChild(makeBtn(t.actReject,'ghost',async()=>{
            const r=await LpSocial.removeFriend(currentOwner.id);
            if(r.ok){currentRelation='none';renderActions('none');showStatus(t.ok_removed,true)}
        }));
        return;
    }
    if(relation==='blocked-by-me'){
        row.appendChild(makeBtn(t.actUnblock,'ghost',async()=>{
            const r=await LpSocial.removeFriend(currentOwner.id);
            if(r.ok){currentRelation='none';renderActions('none')}
        }));
        return;
    }
    if(relation==='blocked-by-them'){
        /* Other-side block: no reveal — just show the nickname with no
           action affordance. Don't confirm the block's existence
           because that's information the blocker shouldn't be forced
           to disclose. Just show no actions. */
        return;
    }
    /* 'none' */
    row.appendChild(makeBtn(t.actAddFriend,'primary',async()=>{
        const r=await LpSocial.sendFriendRequest(currentOwner.nickname);
        if(r.ok){
            currentRelation=r.auto_accepted?'accepted':'outgoing-pending';
            renderActions(currentRelation);
            showStatus(r.auto_accepted?t.ok_auto:t.ok_sent, true);
        } else {
            const key='err_'+(r.error||'generic');
            showStatus(t[key]||t.err_generic, false);
        }
    }));
    row.appendChild(makeBtn(t.actBlock,'danger',async()=>{
        if(!confirm(t.confirmBlock))return;
        const r=await LpSocial.blockFriend(currentOwner.id);
        if(r.ok){currentRelation='blocked-by-me';renderActions('blocked-by-me');showStatus(t.ok_blocked,true)}
    }));
}

function makeBtn(text,variant,onClick,opts){
    const b=document.createElement('button');
    b.className='action-btn '+(variant||'ghost');
    b.textContent=text;
    if(opts&&opts.disabled)b.disabled=true;
    if(onClick)b.addEventListener('click',onClick);
    return b;
}

function showStatus(msg,ok){
    const el=$('statusMsg');
    el.textContent=msg||'';
    el.className='status-msg '+(ok===true?'ok':(ok===false?'err':''));
    /* Auto-clear after 4 s. */
    setTimeout(()=>{if(el.textContent===msg)el.textContent=''},4000);
}

boot();
</script>
</body>
</html>
