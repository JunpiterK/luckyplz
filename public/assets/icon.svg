<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#FFB03A"/>
            <stop offset="0.5" stop-color="#FF6B35"/>
            <stop offset="1" stop-color="#FF3366"/>
        </linearGradient>
        <radialGradient id="innerGlow" cx="30%" cy="25%" r="70%">
            <stop offset="0" stop-color="#FFE66D" stop-opacity="0.45"/>
            <stop offset="1" stop-color="#FFE66D" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="petal" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#ffffff"/>
            <stop offset="1" stop-color="#FFE6BF"/>
        </linearGradient>
    </defs>

    <!-- Rounded-square background: iOS/Android typically re-masks to
         their own shape, so keeping radius moderate (rx=112 = ~22%)
         survives both round and squircle masks cleanly. -->
    <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
    <rect width="512" height="512" rx="112" ry="112" fill="url(#innerGlow)"/>

    <!-- Four-leaf clover centered on the safe area. Stem offset a touch
         right-and-down to give the glyph some natural imbalance so it
         reads as a living leaf rather than a flat medallion. -->
    <g transform="translate(256, 232)">
        <!-- Drop shadow under petals -->
        <g transform="translate(3, 6)" opacity="0.25">
            <ellipse cx="0" cy="-72" rx="60" ry="82" fill="#000"/>
            <ellipse cx="72" cy="0" rx="82" ry="60" fill="#000"/>
            <ellipse cx="0" cy="72" rx="60" ry="82" fill="#000"/>
            <ellipse cx="-72" cy="0" rx="82" ry="60" fill="#000"/>
        </g>
        <!-- Four petals -->
        <ellipse cx="0" cy="-72" rx="60" ry="82" fill="url(#petal)" stroke="#C84420" stroke-width="3"/>
        <ellipse cx="72" cy="0" rx="82" ry="60" fill="url(#petal)" stroke="#C84420" stroke-width="3"/>
        <ellipse cx="0" cy="72" rx="60" ry="82" fill="url(#petal)" stroke="#C84420" stroke-width="3"/>
        <ellipse cx="-72" cy="0" rx="82" ry="60" fill="url(#petal)" stroke="#C84420" stroke-width="3"/>
        <!-- Center node -->
        <circle cx="0" cy="0" r="22" fill="#C84420"/>
        <circle cx="-7" cy="-7" r="9" fill="#FFB874" opacity="0.85"/>
        <!-- Stem, curving down-right -->
        <path d="M 8,92 Q 28,148 56,190"
              fill="none" stroke="#FFFAE8" stroke-width="16" stroke-linecap="round"/>
        <path d="M 8,92 Q 28,148 56,190"
              fill="none" stroke="#C84420" stroke-width="8" stroke-linecap="round"/>
    </g>
</svg>
