<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <defs>
        <!-- Background: deep forest gradient that makes the clover pop.
             Slightly warmer at top, cooler at bottom so the icon feels
             dimensional rather than flat. -->
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#0D2618"/>
            <stop offset="0.55" stop-color="#0A1E13"/>
            <stop offset="1" stop-color="#06150D"/>
        </linearGradient>
        <radialGradient id="innerGlow" cx="30%" cy="25%" r="70%">
            <stop offset="0" stop-color="#7FFF9E" stop-opacity="0.18"/>
            <stop offset="1" stop-color="#7FFF9E" stop-opacity="0"/>
        </radialGradient>
        <!-- Two slightly different greens for adjacent petals so the
             clover reads as a 3D, hand-grown leaf rather than a flat logo. -->
        <radialGradient id="leafA" cx="35%" cy="30%" r="80%">
            <stop offset="0" stop-color="#B2F267"/>
            <stop offset="0.55" stop-color="#4FC96A"/>
            <stop offset="1" stop-color="#1A7A3E"/>
        </radialGradient>
        <radialGradient id="leafB" cx="35%" cy="30%" r="80%">
            <stop offset="0" stop-color="#9FE85B"/>
            <stop offset="0.55" stop-color="#3FB65E"/>
            <stop offset="1" stop-color="#155F32"/>
        </radialGradient>
        <radialGradient id="centerDot" cx="30%" cy="30%" r="70%">
            <stop offset="0" stop-color="#FFF8C7"/>
            <stop offset="1" stop-color="#F4D85A"/>
        </radialGradient>
        <!-- Heart-shaped leaf path: each petal is a soft heart with a
             small notch at the top, tapering toward the center. Sized so
             four of them fit the safe area without crowding. -->
        <path id="heartLeaf" d="M 0 0
            C -10 -40, -78 -40, -88 -95
            C -96 -150, -40 -178, 0 -140
            C 40 -178, 96 -150, 88 -95
            C 78 -40, 10 -40, 0 0 Z"/>
    </defs>

    <!-- Rounded-square background: iOS/Android may re-mask to their own
         shape, so radius 112 (~22%) survives round + squircle masks. -->
    <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
    <rect width="512" height="512" rx="112" ry="112" fill="url(#innerGlow)"/>

    <!-- Four-leaf clover, centered but pulled up a touch so the stem
         can breathe on the bottom. Leaves use alternating gradients so
         neighbors aren't identical. -->
    <g transform="translate(256 248)">
        <!-- Soft drop shadow under petals -->
        <g transform="translate(4 8)" opacity="0.35">
            <use href="#heartLeaf" fill="#000"/>
            <use href="#heartLeaf" fill="#000" transform="rotate(90)"/>
            <use href="#heartLeaf" fill="#000" transform="rotate(180)"/>
            <use href="#heartLeaf" fill="#000" transform="rotate(270)"/>
        </g>
        <!-- Four heart-shaped petals -->
        <use href="#heartLeaf" fill="url(#leafA)"/>
        <use href="#heartLeaf" fill="url(#leafB)" transform="rotate(90)"/>
        <use href="#heartLeaf" fill="url(#leafA)" transform="rotate(180)"/>
        <use href="#heartLeaf" fill="url(#leafB)" transform="rotate(270)"/>
        <!-- Warm golden center node — small lucky-charm accent -->
        <circle cx="0" cy="0" r="14" fill="url(#centerDot)"/>
    </g>

    <!-- Stem: curves down-right like a real picked clover, thicker dark-
         green base with a lighter highlight line to feel sculpted. -->
    <g>
        <path d="M 262 398 Q 268 438 296 482"
              fill="none" stroke="#0D3A1C" stroke-width="20" stroke-linecap="round"/>
        <path d="M 262 398 Q 268 438 296 482"
              fill="none" stroke="#2F7A40" stroke-width="10" stroke-linecap="round"/>
        <!-- Highlight wisp along the stem -->
        <path d="M 261 404 Q 270 438 288 478"
              fill="none" stroke="#8FD9A0" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    </g>
</svg>
