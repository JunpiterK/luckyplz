<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <!-- Line-art four-leaf clover on a dark rounded square.
         Matches the generated PNG artwork used as the primary app icon
         so the browser favicon (SVG) and the installed app icon
         (PNG from public/assets/icon-192.png + icon-512.png) share the
         same silhouette. -->
    <defs>
        <style>
            .leaf{fill:none;stroke:#A8D4A9;stroke-width:10;stroke-linejoin:round;stroke-linecap:round}
            .stem{fill:none;stroke:#A8D4A9;stroke-width:8;stroke-linecap:round}
        </style>
        <!-- Single heart-leaf path, reused and rotated for the 4 petals. -->
        <path id="heart"
              d="M 0 0
                 C -12 -30, -78 -42, -88 -100
                 C -96 -155, -36 -178, 0 -140
                 C 36 -178, 96 -155, 88 -100
                 C 78 -42, 12 -30, 0 0 Z"/>
    </defs>

    <!-- Background: near-black rounded square. rx 108 (~21%) survives
         Android/iOS masking without clipping the clover. -->
    <rect width="512" height="512" rx="108" ry="108" fill="#0E0F12"/>

    <!-- Clover centered slightly above the middle so the stem has room. -->
    <g transform="translate(256 230)">
        <use href="#heart" class="leaf"/>
        <use href="#heart" class="leaf" transform="rotate(90)"/>
        <use href="#heart" class="leaf" transform="rotate(180)"/>
        <use href="#heart" class="leaf" transform="rotate(270)"/>
        <!-- Warm golden centre dot. -->
        <circle cx="0" cy="0" r="10" fill="#D4A853"/>
    </g>

    <!-- Thin stem dropping from just under the clover to the lower edge
         of the safe area. -->
    <path class="stem" d="M 256 324 L 256 430"/>
</svg>
