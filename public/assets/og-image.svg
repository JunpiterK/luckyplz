<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#0A0A1A"/>
            <stop offset="0.5" stop-color="#141434"/>
            <stop offset="1" stop-color="#0A0A1A"/>
        </linearGradient>
        <radialGradient id="glowTL" cx="18%" cy="22%" r="55%">
            <stop offset="0" stop-color="#00D9FF" stop-opacity="0.22"/>
            <stop offset="1" stop-color="#00D9FF" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="glowBR" cx="82%" cy="78%" r="60%">
            <stop offset="0" stop-color="#FF6B35" stop-opacity="0.28"/>
            <stop offset="1" stop-color="#FF6B35" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#FFE66D"/>
            <stop offset="0.5" stop-color="#FF9A3C"/>
            <stop offset="1" stop-color="#FF6B8B"/>
        </linearGradient>
        <linearGradient id="cloverLite" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#6EE895"/>
            <stop offset="1" stop-color="#1F7C44"/>
        </linearGradient>
        <linearGradient id="cloverDark" x1="0" y1="1" x2="1" y2="0">
            <stop offset="0" stop-color="#3DCB6F"/>
            <stop offset="1" stop-color="#0F6B37"/>
        </linearGradient>
        <linearGradient id="accentTop" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#FF6B35"/>
            <stop offset="0.5" stop-color="#FFE66D"/>
            <stop offset="1" stop-color="#FF6B35"/>
        </linearGradient>
        <linearGradient id="accentBot" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#00D9FF"/>
            <stop offset="0.5" stop-color="#6EE895"/>
            <stop offset="1" stop-color="#00D9FF"/>
        </linearGradient>
    </defs>

    <!-- Background stack -->
    <rect width="1200" height="630" fill="url(#bg)"/>
    <rect width="1200" height="630" fill="url(#glowTL)"/>
    <rect width="1200" height="630" fill="url(#glowBR)"/>

    <!-- Subtle diagonal motion lines -->
    <g stroke="rgba(255,255,255,0.045)" stroke-width="1">
        <line x1="-120" y1="100" x2="820" y2="760"/>
        <line x1="80" y1="80" x2="1020" y2="740"/>
        <line x1="280" y1="60" x2="1220" y2="720"/>
        <line x1="480" y1="-40" x2="1420" y2="620"/>
        <line x1="680" y1="-60" x2="1620" y2="600"/>
    </g>

    <!-- Top / bottom accent ribbons -->
    <rect y="0" width="1200" height="7" fill="url(#accentTop)"/>
    <rect y="623" width="1200" height="7" fill="url(#accentBot)"/>

    <!-- Shamrock / four-leaf clover, hero element -->
    <g transform="translate(600, 175)">
        <!-- Drop shadow -->
        <g transform="translate(4, 5)" opacity="0.35">
            <ellipse cx="0" cy="-42" rx="36" ry="48" fill="#000"/>
            <ellipse cx="42" cy="0" rx="48" ry="36" fill="#000"/>
            <ellipse cx="0" cy="42" rx="36" ry="48" fill="#000"/>
            <ellipse cx="-42" cy="0" rx="48" ry="36" fill="#000"/>
        </g>
        <!-- Petals -->
        <ellipse cx="0" cy="-42" rx="36" ry="48" fill="url(#cloverLite)" stroke="#0F5930" stroke-width="2.5"/>
        <ellipse cx="42" cy="0" rx="48" ry="36" fill="url(#cloverDark)" stroke="#0F5930" stroke-width="2.5"/>
        <ellipse cx="0" cy="42" rx="36" ry="48" fill="url(#cloverLite)" stroke="#0F5930" stroke-width="2.5"/>
        <ellipse cx="-42" cy="0" rx="48" ry="36" fill="url(#cloverDark)" stroke="#0F5930" stroke-width="2.5"/>
        <!-- Center highlight -->
        <circle cx="0" cy="0" r="14" fill="#0C5A2F"/>
        <circle cx="-4" cy="-4" r="5" fill="#6EE895" opacity="0.6"/>
        <!-- Stem -->
        <path d="M 3,52 Q 14,92 26,120" fill="none" stroke="#1A8847" stroke-width="9" stroke-linecap="round"/>
        <!-- Petal highlights -->
        <ellipse cx="-6" cy="-55" rx="8" ry="14" fill="#fff" opacity="0.25"/>
        <ellipse cx="55" cy="-6" rx="14" ry="8" fill="#fff" opacity="0.25"/>
    </g>

    <!-- Wordmark -->
    <text x="600" y="358" text-anchor="middle"
          font-family="Orbitron, 'Noto Sans KR', Arial, sans-serif"
          font-weight="900" font-size="104" fill="url(#titleGrad)"
          letter-spacing="7">LUCKY PLEASE</text>

    <!-- Korean tagline -->
    <text x="600" y="418" text-anchor="middle"
          font-family="'Noto Sans KR', Arial, sans-serif"
          font-weight="700" font-size="38" fill="#FFE66D">커피·밥·벌칙, 누가 걸릴까?</text>

    <!-- English subline -->
    <text x="600" y="462" text-anchor="middle"
          font-family="'Noto Sans KR', Arial, sans-serif"
          font-weight="500" font-size="26" fill="rgba(255,255,255,0.78)">Who pays? Who drinks? Who&apos;s it? — Let fate decide.</text>

    <!-- Feature badges -->
    <g transform="translate(600, 530)">
        <text text-anchor="middle"
              font-family="Orbitron, 'Noto Sans KR', Arial, sans-serif"
              font-weight="700" font-size="22" fill="rgba(255,230,109,0.88)"
              letter-spacing="5">5 GAMES   ·   16 LANGUAGES   ·   FREE   ·   NO SIGN-UP</text>
    </g>

    <!-- Domain chip -->
    <text x="600" y="590" text-anchor="middle"
          font-family="Orbitron, Arial, sans-serif"
          font-weight="700" font-size="30" fill="#00D9FF"
          letter-spacing="5">luckyplz.com</text>
</svg>
