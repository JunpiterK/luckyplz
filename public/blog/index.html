*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#FF6B35;--secondary:#00D9FF;--accent:#FFE66D;--danger:#FF3366;--success:#00FF88;--dark:#0A0A1A}
body{font-family:'Noto Sans KR',sans-serif;background:var(--dark);min-height:100vh;color:#fff;overflow-x:hidden;letter-spacing:.01em}

#dynamicBg{position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse at 50% 20%,rgba(255,230,109,.06) 0%,transparent 55%),radial-gradient(ellipse at 20% 85%,rgba(255,107,53,.04) 0%,transparent 55%),linear-gradient(180deg,#0A0A1A 0%,#10101F 50%,#0A0A1A 100%)}
.stars{position:fixed;inset:0;pointer-events:none;z-index:-1}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.15;transform:scale(.8)}50%{opacity:.7;transform:scale(1.1)}}

.wrap{max-width:780px;margin:0 auto;padding:36px 20px 60px;position:relative;z-index:1}

.top-nav a{color:rgba(255,255,255,.5);text-decoration:none;transition:color .2s;letter-spacing:.02em}
.top-nav a:hover{color:var(--accent)}
.top-nav .brand{font-family:'Orbitron','Noto Sans KR',sans-serif;font-weight:900;font-size:1.2em;background:linear-gradient(135deg,#FFE66D,#FF9A3C,#FF6B8B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.header{text-align:center;margin-bottom:24px}
.header h1{font-family:'Orbitron','Noto Sans KR',sans-serif;font-size:2.2em;font-weight:900;background:linear-gradient(135deg,#FFE66D,#FF9A3C,#FF6B8B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px;letter-spacing:.02em}
.header p{font-size:.95em;color:rgba(255,255,255,.5);line-height:1.6}

/* Category grid — mobile-first, premium edition.
   Pixel-locked sizing (fixed `height`, absolute-px inner elements) so
   every cell is identical regardless of label length. Glass-morphism
   gradients + inset highlight + soft outer shadow give the iOS-18 /
   Material-You polish without going overboard. Spring-curve easing
   (cubic-bezier .4 0 .2 1) on every transition for that "alive" feel
   premium product apps share. */
.cat-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:0 0 28px;padding:0;font-family:'Noto Sans KR',sans-serif}
.cat-tab{box-sizing:border-box;width:100%;height:88px;margin:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:0;border-radius:16px;background:linear-gradient(165deg,rgba(255,255,255,.045) 0%,rgba(255,255,255,.012) 100%);border:1px solid rgba(255,255,255,.08);box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 1px 3px rgba(0,0,0,.18);color:rgba(255,255,255,.72);cursor:pointer;text-align:center;user-select:none;-webkit-tap-highlight-color:transparent;transition:transform .2s cubic-bezier(.4,0,.2,1),background .25s cubic-bezier(.4,0,.2,1),border-color .25s cubic-bezier(.4,0,.2,1),color .25s cubic-bezier(.4,0,.2,1),box-shadow .3s cubic-bezier(.4,0,.2,1)}
.cat-tab:hover{background:linear-gradient(165deg,rgba(255,230,109,.07) 0%,rgba(255,255,255,.02) 100%);border-color:rgba(255,230,109,.28);color:rgba(255,255,255,.95);transform:translateY(-1px);box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 4px 14px rgba(0,0,0,.28)}
.cat-tab:active{transform:scale(.97);transition-duration:.1s}
.cat-tab.active{background:linear-gradient(165deg,rgba(255,230,109,.24) 0%,rgba(255,107,53,.1) 100%);border-color:rgba(255,230,109,.55);color:#FFE66D;font-weight:700;box-shadow:inset 0 1px 0 rgba(255,230,109,.22),inset 0 0 0 1px rgba(255,230,109,.12),0 8px 22px rgba(255,154,60,.22),0 2px 4px rgba(255,154,60,.12)}
.cat-tab.empty{opacity:.42}
.cat-tab.empty:hover{opacity:.7;transform:none}
.cat-tab .cat-emoji{font-size:22px;line-height:1;height:24px;display:flex;align-items:center;justify-content:center;filter:saturate(1.1)}
.cat-tab .cat-label{font-size:12px;line-height:1.15;font-weight:600;letter-spacing:.005em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:96%;display:block}
.cat-tab .cat-count{font-family:'JetBrains Mono','Orbitron',monospace;font-size:10px;font-weight:700;opacity:.5;letter-spacing:.06em;line-height:1;height:11px;display:flex;align-items:center}
.cat-tab.active .cat-count{opacity:1}
.cat-tab.active .cat-emoji{filter:saturate(1.25) drop-shadow(0 0 6px rgba(255,230,109,.3))}
@media(min-width:600px){.cat-tabs{grid-template-columns:repeat(7,1fr);gap:10px;margin-bottom:34px}.cat-tab{height:96px}.cat-tab .cat-emoji{font-size:24px;height:26px}.cat-tab .cat-label{font-size:12.5px}.cat-tab .cat-count{font-size:11px;height:12px}}
@media(min-width:1024px){.cat-tabs{gap:12px}.cat-tab .cat-emoji{font-size:26px;height:28px}.cat-tab .cat-label{font-size:13px}}

.posts{display:flex;flex-direction:column;gap:18px}
.post-card-cat{display:inline-block;font-size:.7em;padding:2px 9px;border-radius:999px;background:rgba(0,217,255,.1);color:rgba(0,217,255,.85);border:1px solid rgba(0,217,255,.25);letter-spacing:.02em;margin-left:8px;font-weight:700}
.post-card{display:block;background:linear-gradient(145deg,rgba(22,22,42,.65),rgba(14,14,28,.85));border:1px solid rgba(255,255,255,.06);border-radius:18px;padding:24px 26px;text-decoration:none;color:#fff;transition:transform .2s,border-color .25s,background .25s;position:relative}
.post-card:hover{transform:translateY(-2px);border-color:rgba(255,230,109,.3);background:linear-gradient(145deg,rgba(28,28,48,.75),rgba(18,18,34,.9))}
.post-head{display:flex;align-items:center;gap:14px;margin-bottom:10px;flex-wrap:wrap}
.post-emoji{font-size:2em;line-height:1;flex-shrink:0}
.post-meta{display:flex;gap:10px;font-size:.72em;color:rgba(255,255,255,.4);letter-spacing:.05em;flex-wrap:wrap}
.post-meta span{white-space:nowrap}
.post-title{font-family:'Orbitron','Noto Sans KR',sans-serif;font-size:1.2em;font-weight:800;color:#fff;margin-bottom:8px;letter-spacing:.01em;line-height:1.35}
.post-excerpt{font-size:.88em;color:rgba(255,255,255,.6);line-height:1.65}
.post-tags{margin-top:12px;display:flex;gap:6px;flex-wrap:wrap}
.post-tag{font-size:.7em;padding:3px 10px;border-radius:999px;background:rgba(255,230,109,.08);color:rgba(255,230,109,.75);border:1px solid rgba(255,230,109,.18);letter-spacing:.02em}

.empty{text-align:center;padding:60px 20px;color:rgba(255,255,255,.35);font-size:.9em;line-height:1.8}
.empty-cta{display:inline-block;margin-top:10px;padding:8px 16px;border-radius:999px;background:rgba(255,230,109,.1);border:1px solid rgba(255,230,109,.3);color:#FFE66D;text-decoration:none;font-size:.9em;transition:background .2s,border-color .2s}
.empty-cta:hover{background:rgba(255,230,109,.2);border-color:rgba(255,230,109,.5)}

.footer-nav{margin-top:50px;text-align:center;padding-top:24px;border-top:1px solid rgba(255,255,255,.06)}
.footer-nav a{color:rgba(255,255,255,.4);text-decoration:none;font-size:.8em;transition:color .2s;margin:0 10px}
.footer-nav a:hover{color:var(--accent)}

@media(max-width:500px){
    .wrap{padding:20px 14px 40px}
    .header h1{font-size:1.5em}
    .header p{font-size:.82em}
    .post-card{padding:18px 20px}
    .post-title{font-size:1.05em}
    .post-excerpt{font-size:.82em}
}

<body>

    <script>
function createStars(){const c=document.getElementById('starsContainer');for(let i=0;i<50;i++){const s=document.createElement('div');s.className='star';const z=Math.random()*2+.5;s.style.cssText=`width:${z}px;height:${z}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${Math.random()*3+2}s;animation-delay:${Math.random()*3}s`;c.appendChild(s)}}

function pick(obj, lang){
    if (obj == null) return '';
    if (typeof obj === 'string') return obj;
    return obj[lang] || obj.en || obj.ko || Object.values(obj)[0] || '';
}

function escapeHtml(s){return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function formatDate(dateStr, lang){
    try{
        const d = new Date(dateStr);
        const localeMap={en:'en-US',gb:'en-GB',ko:'ko-KR',ja:'ja-JP',zh:'zh-CN',es:'es-ES',de:'de-DE',fr:'fr-FR',pt:'pt-BR',ru:'ru-RU',ar:'ar-SA',hi:'hi-IN',th:'th-TH',id:'id-ID',vi:'vi-VN',tr:'tr-TR'};
        return d.toLocaleDateString(localeMap[lang]||'en-US',{year:'numeric',month:'short',day:'numeric'});
    }catch(e){return dateStr}
}

/* Read ?cat= query param, default to 'all'. Validates against BLOG_CATEGORIES
   so a stale or hand-typed slug falls back to 'all' instead of showing zero
   posts with no obvious recovery path. */
function getCurrentCat(){
    const url = new URL(location.href);
    const cat = (url.searchParams.get('cat') || 'all').toLowerCase();
    const valid = (window.BLOG_CATEGORIES || []).map(c => c.slug);
    return valid.includes(cat) ? cat : 'all';
}

function setCurrentCat(cat){
    const url = new URL(location.href);
    if (cat === 'all') url.searchParams.delete('cat');
    else url.searchParams.set('cat', cat);
    /* pushState so back button cycles through categories naturally. */
    history.pushState({cat}, '', url.toString());
    renderAll();
}

/* Look up category metadata for a post-card chip (small label visible
   only on the "All" tab — when the user has already filtered to a single
   category, the chip would be redundant clutter). */
function catMetaFor(slug){
    return (window.BLOG_CATEGORIES || []).find(c => c.slug === slug);
}

function renderTabs(bucket, posts){
    const cats = window.BLOG_CATEGORIES || [];
    const cur = getCurrentCat();
    const nav = document.getElementById('catTabs');
    if (!nav) return;
    /* Per-category counts are computed against the language-filtered pool —
       a Korean visitor seeing "Lifestyle (5)" should see five Korean posts
       in that tab, not five total across all languages. */
    const labelKey = bucket === 'ko' ? 'label_ko' : 'label_en';
    nav.innerHTML = cats.map(c => {
        const count = c.slug === 'all'
            ? posts.length
            : posts.filter(p => (p.category||'lifestyle') === c.slug).length;
        /* `empty` class dims placeholder categories (count=0) so the user
           sees they exist for future content but understands they're not
           clickable-yet without disabling them outright. The "All" tab is
           never marked empty even on a brand-new blog with zero posts. */
        const isEmpty = count === 0 && c.slug !== 'all';
        const cls = ['cat-tab'];
        if (c.slug === cur) cls.push('active');
        if (isEmpty) cls.push('empty');
        return `<button type="button" class="${cls.join(' ')}" data-cat="${c.slug}" aria-label="${escapeHtml(c[labelKey] || c.label_en)} (${count})">
            <span class="cat-emoji" aria-hidden="true">${c.emoji}</span>
            <span class="cat-label">${escapeHtml(c[labelKey] || c.label_en)}</span>
            <span class="cat-count">${count}</span>
        </button>`;
    }).join('');
    nav.querySelectorAll('.cat-tab').forEach(btn => {
        btn.addEventListener('click', () => setCurrentCat(btn.dataset.cat));
    });
}

function renderPosts(bucket, langPosts){
    const list = document.getElementById('postsList');
    const cur = getCurrentCat();
    /* Language filter happens upstream (langPosts). Here we only further
       filter by category if the user picked a non-"all" tab. */
    const filtered = cur === 'all'
        ? langPosts
        : langPosts.filter(p => (p.category||'lifestyle') === cur);

    if (!filtered.length){
        if (cur !== 'all'){
            /* Empty category: don't push the user to switch languages —
               just nudge them back to "All" where every post lives. */
            const msg = bucket === 'ko' ? '이 카테고리는 곧 채워집니다 ✨' : 'Posts coming soon ✨';
            const cta = bucket === 'ko' ? '전체 글 보기 →' : 'Browse all →';
            list.innerHTML = `<div class="empty">${msg}<br><a class="empty-cta" href="#" data-reset-cat>${cta}</a></div>`;
            const resetLink = list.querySelector('[data-reset-cat]');
            if (resetLink) resetLink.addEventListener('click', e => { e.preventDefault(); setCurrentCat('all'); });
            return;
        }
        const otherBucket = bucket === 'ko' ? 'en' : 'ko';
        const otherCount = (window.BLOG_POSTS||[]).filter(p => (p.lang||'ko') === otherBucket).length;
        const msgs = bucket === 'ko'
            ? {none:'한국어 글을 준비 중입니다 ✨', cta:`영어 글 ${otherCount}편 보기 →`}
            : {none:'English posts coming soon ✨', cta:`Read ${otherCount} Korean posts →`};
        list.innerHTML = `<div class="empty">${msgs.none}${otherCount ? `<br><a class="empty-cta" href="#" data-switch-lang="${otherBucket}">${msgs.cta}</a>` : ''}</div>`;
        const switchLink = list.querySelector('[data-switch-lang]');
        if (switchLink) switchLink.addEventListener('click', e => {
            e.preventDefault();
            localStorage.setItem('luckyplz_lang', otherBucket);
            renderAll();
        });
        return;
    }

    /* Category chip (small subtitle) is shown only on the "All" tab —
       removes redundancy when user is already inside a category view. */
    const showCatChip = cur === 'all';
    list.innerHTML = filtered.map(p => {
        const title = pick(p.title, bucket);
        const excerpt = pick(p.excerpt, bucket);
        const tags = pick(p.tags, bucket) || [];
        const dateText = p.date ? formatDate(p.date, bucket) : '';
        const readText = p.readMinutes ? `· ${p.readMinutes} min` : '';
        const catSlug = p.category || 'lifestyle';
        const catMeta = catMetaFor(catSlug);
        const labelKey = bucket === 'ko' ? 'label_ko' : 'label_en';
        const catChipHtml = (showCatChip && catMeta)
            ? `<span class="post-card-cat">${catMeta.emoji} ${escapeHtml(catMeta[labelKey] || catMeta.label_en)}</span>`
            : '';
        return `
          <a class="post-card" href="/blog/${p.slug}/">
            <div class="post-head">
              ${p.coverEmoji ? `<div class="post-emoji">${p.coverEmoji}</div>` : ''}
              <div style="flex:1;min-width:0">
                <div class="post-title">${escapeHtml(title)}${catChipHtml}</div>
                <div class="post-meta">
                  <span>${dateText}</span>
                  <span>${readText}</span>
                </div>
              </div>
            </div>
            <div class="post-excerpt">${escapeHtml(excerpt)}</div>
            ${Array.isArray(tags) && tags.length ? `<div class="post-tags">${tags.map(t => `<span class="post-tag">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
          </a>
        `;
    }).join('');
}

function renderAll(){
    const rawLang = (localStorage.getItem('luckyplz_lang') || 'ko').toLowerCase();
    /* Posts are authored natively per-language. ko users see ko posts;
       everyone else sees en posts. Primary locales only — other langs
       fall through to en so visitors always see *some* content rather
       than a blank page. */
    const bucket = rawLang === 'ko' ? 'ko' : 'en';

    if (!window.BLOG_POSTS || !BLOG_POSTS.length){
        document.getElementById('postsList').innerHTML = `<div class="empty">첫 글을 준비 중입니다 ✨</div>`;
        return;
    }
    const allPosts = [...BLOG_POSTS].sort((a,b) => (b.date||'').localeCompare(a.date||''));
    const langPosts = allPosts.filter(p => (p.lang||'ko') === bucket);

    renderTabs(bucket, langPosts);
    renderPosts(bucket, langPosts);
}

/* Browser back/forward should cycle through category tabs without a
   full reload — popstate fires when the user navigates the URL stack. */
window.addEventListener('popstate', renderAll);

createStars();
renderAll();
    </script>

if('caches' in window){caches.keys().then(k=>k.forEach(n=>caches.delete(n))).catch(()=>{})}</script>
