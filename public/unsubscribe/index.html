<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>(function(){var B="1778157859";try{fetch("/build.json?_="+Date.now(),{cache:"no-store"}).then(function(r){return r.ok?r.json():null}).then(function(d){if(!d||!d.v||d.v===B)return;var k="lp_build_"+B;try{if(sessionStorage.getItem(k))return;sessionStorage.setItem(k,"1");}catch(e){}var u=new URL(location.href);u.searchParams.set("_b",d.v);location.replace(u.toString());}).catch(function(){});}catch(e){}})();</script>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>구독 해지 | Lucky Blog</title>
<meta name="description" content="Lucky Blog 새 글 알림 이메일 구독 해지 페이지.">
<meta name="robots" content="noindex">
<link rel="canonical" href="https://luckyplz.com/unsubscribe/">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0A0A1A">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A0A1A;--bg2:#10101F;--txt:#e2e8f0;--mute:rgba(180,200,230,.62)}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard Variable','Pretendard','Inter',sans-serif;-webkit-font-smoothing:antialiased}
body{display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(180deg,#0A0A1A 0%,#10101F 100%)}
.card{max-width:480px;width:100%;padding:32px 28px;background:linear-gradient(135deg,rgba(20,28,46,.78),rgba(15,21,37,.94));border:1px solid rgba(140,162,196,.22);border-radius:16px;text-align:center}
h1{font-family:'Pretendard Variable','Pretendard','Inter',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:12px;color:#fff}
p{font-size:14px;line-height:1.6;color:var(--mute);margin-bottom:20px}
p strong{color:#fff;font-weight:600}
.brand{display:block;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:9.5px;font-weight:700;letter-spacing:.22em;color:rgba(140,162,196,.55);text-transform:uppercase;margin-bottom:8px}
.btn{display:inline-block;padding:11px 24px;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;background:linear-gradient(135deg,rgba(140,162,196,.18),rgba(140,162,196,.08));border:1px solid rgba(140,162,196,.4);border-radius:9px;color:rgba(220,232,248,.96);cursor:pointer;text-decoration:none;transition:background .2s,border-color .2s,color .2s,transform .15s}
.btn:hover{background:linear-gradient(135deg,rgba(140,162,196,.28),rgba(140,162,196,.14));border-color:rgba(180,200,230,.55);color:#fff;transform:translateY(-1px)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.status{margin-top:16px;font-size:13px;line-height:1.5;color:var(--mute)}
.status.ok{color:#86efac}
.status.err{color:#ff9aa8}
.muted-link{color:rgba(140,162,196,.55);font-size:11.5px;text-decoration:none;letter-spacing:.01em;transition:color .2s;margin-top:18px;display:inline-block}
.muted-link:hover{color:#5dc1ff}
</style>
</head>
<body>

<div class="card">
  <span class="brand">LUCKY BLOG</span>
  <h1 id="title">구독 해지</h1>
  <p id="desc">새 글 알림 이메일 구독을 해지하시겠어요?</p>
  <button type="button" class="btn" id="confirmBtn">해지 확인</button>
  <p class="status" id="status" hidden></p>
  <a href="/blog/" class="muted-link" id="backLink">← Lucky Blog 로 돌아가기</a>
</div>

<script src="/vendor/supabase.min.js"></script>
<script src="/js/supabase-config.js?v=1778157859"></script>
<script>
(function(){
  /* Lang detect — same chain as blog index. */
  var lang = (function(){
    try {
      var url = new URLSearchParams(location.search).get('lang');
      if (url && url.toLowerCase().indexOf('en') === 0) return 'en';
      if (url && url.toLowerCase().indexOf('ko') === 0) return 'ko';
      var stored = (localStorage.getItem('luckyplz_lang') || '').toLowerCase();
      if (stored.indexOf('ko') === 0) return 'ko';
      if (stored.indexOf('en') === 0) return 'en';
    } catch(_) {}
    return 'ko';
  })();

  var COPY = lang === 'en' ? {
    title: 'Unsubscribe',
    desc: 'Stop receiving Lucky Blog new-post emails?',
    btn: 'Confirm unsubscribe',
    loading: 'Working…',
    ok: 'Unsubscribed. You won\'t hear from us again unless you re-subscribe.',
    err_token: 'This link is invalid or expired. If you still want to unsubscribe, reply to any Lucky Blog email with the word "unsubscribe".',
    err_network: 'Something went wrong. Please try again in a moment.',
    back: '← Back to Lucky Blog',
  } : {
    title: '구독 해지',
    desc: '새 글 알림 이메일 구독을 해지하시겠어요?',
    btn: '해지 확인',
    loading: '처리 중…',
    ok: '구독이 해지되었습니다. 다시 구독하시기 전까지는 메일이 가지 않아요.',
    err_token: '링크가 유효하지 않거나 만료되었어요. 그래도 해지를 원하시면 받으신 이메일에 \"구독 해지\"라고 회신해 주세요.',
    err_network: '잠시 후 다시 시도해 주세요.',
    back: '← Lucky Blog 로 돌아가기',
  };

  document.title = COPY.title + ' | Lucky Blog';
  document.documentElement.lang = lang === 'en' ? 'en' : 'ko';
  document.getElementById('title').textContent = COPY.title;
  document.getElementById('desc').textContent = COPY.desc;
  var btn = document.getElementById('confirmBtn');
  btn.textContent = COPY.btn;
  document.getElementById('backLink').textContent = COPY.back;

  var token = new URLSearchParams(location.search).get('token');
  var status = document.getElementById('status');
  function show(msg, kind){ status.textContent = msg; status.className = 'status ' + (kind || ''); status.hidden = false; }

  if (!token || !/^[0-9a-f-]{32,40}$/i.test(token)) {
    btn.disabled = true;
    show(COPY.err_token, 'err');
  }

  btn.addEventListener('click', function(){
    if (!token) return;
    btn.disabled = true;
    btn.textContent = COPY.loading;
    var sb;
    try { sb = window.getSupabase && window.getSupabase(); } catch(_) {}
    if (!sb) { show(COPY.err_network, 'err'); btn.disabled = false; btn.textContent = COPY.btn; return; }
    sb.rpc('unsubscribe_email', { p_token: token })
      .then(function(res){
        if (res.error) {
          show(COPY.err_network, 'err');
          btn.disabled = false;
          btn.textContent = COPY.btn;
          return;
        }
        if (res.data === true) {
          show(COPY.ok, 'ok');
          btn.style.display = 'none';
        } else {
          show(COPY.err_token, 'err');
          btn.disabled = false;
          btn.textContent = COPY.btn;
        }
      })
      .catch(function(){
        show(COPY.err_network, 'err');
        btn.disabled = false;
        btn.textContent = COPY.btn;
      });
  });
})();
</script>
</body>
</html>
