<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- no-cache: force fresh on every visit -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Lucky Please - Login / Sign Up</title>
    <meta name="description" content="Sign in or create your Lucky Please account to access multiplayer games, chat with friends, and join the community!">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#FF6B35">
    <link rel="apple-touch-icon" href="/assets/icon-192.png?v=1776639849">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5370817769801923" crossorigin="anonymous"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NZDPE3H3DQ"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-NZDPE3H3DQ');</script>
    <style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#FF6B35;--secondary:#00D9FF;--accent:#FFE66D;--accent-warm:#FF9A3C;--danger:#FF3366;--success:#00FF88;--dark:#0A0A1A;--muted:rgba(255,255,255,.55);--muted-2:rgba(255,255,255,.35);--muted-3:rgba(255,255,255,.18)}
/* flex-direction:column because siteFooter.js injects a .lp-site-footer
   element at the end of <body>; with the default flex-direction:row that
   footer becomes a flex SIBLING of .auth-card and crushes the card's
   width to ~46px on mobile ("card is thin and long" bug). Stacking
   vertically keeps the card centered and lets the footer land below it.
   The ad <ins>, dynamic BG, and starfield are position:fixed/absolute so
   they don't participate in flex layout. */
body{font-family:'Noto Sans KR',sans-serif;background:var(--dark);min-height:100vh;color:#fff;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;letter-spacing:.01em;gap:24px}

#dynamicBg{position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse at 50% 20%,rgba(255,230,109,.06) 0%,transparent 55%),radial-gradient(ellipse at 20% 85%,rgba(255,107,53,.04) 0%,transparent 55%),linear-gradient(180deg,#0A0A1A 0%,#10101F 50%,#0A0A1A 100%)}
.stars{position:fixed;inset:0;pointer-events:none;z-index:-1}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.12;transform:scale(.8)}50%{opacity:.65;transform:scale(1.1)}}

.auth-card{
    background:linear-gradient(165deg,rgba(22,22,42,.72),rgba(12,12,28,.88));
    backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border-radius:20px;padding:38px 32px 30px;
    border:1px solid rgba(255,255,255,.06);
    box-shadow:0 20px 60px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.04);
    width:420px;max-width:94vw;text-align:center;position:relative;overflow:hidden
}
.auth-card::before{content:'';position:absolute;top:0;left:22%;right:22%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,230,109,.45),transparent)}

.auth-card .logo{font-family:'Orbitron','Noto Sans KR',sans-serif;font-size:1.5em;font-weight:900;letter-spacing:.03em;background:linear-gradient(135deg,#FFE66D 0%,#FF9A3C 50%,#FF6B8B 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;cursor:pointer;display:inline-block;transition:filter .2s}
.auth-card .logo:hover{filter:brightness(1.15)}
.auth-card .subtitle{font-size:.82em;color:var(--muted-2);margin-bottom:26px;letter-spacing:.02em;line-height:1.5}

/* Social OAuth */
.oauth-row{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.oauth-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:#fff;font-size:.9em;font-weight:600;cursor:pointer;transition:border-color .2s,background .2s,transform .15s;font-family:'Noto Sans KR',sans-serif;letter-spacing:.01em}
.oauth-btn:hover{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.07);transform:translateY(-1px)}
.oauth-btn:active{transform:translateY(0)}
.oauth-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.oauth-btn .oauth-ico{width:18px;height:18px;flex-shrink:0}
/* Kakao brand button — #FEE500 fill, black text, no border.
   Follows Kakao's official button design guide so the KR market
   immediately recognises it as the official social login path. */
.oauth-btn-kakao{background:#FEE500;color:#181600;border-color:#FEE500;font-weight:700}
.oauth-btn-kakao:hover{background:#F5D900;border-color:#F5D900;color:#000}
.oauth-btn-kakao:disabled{background:#FEE500;color:#181600;opacity:.5}
.oauth-divider{display:flex;align-items:center;gap:12px;margin:4px 0 18px;color:var(--muted-2);font-size:.7em;letter-spacing:.1em;text-transform:uppercase}
.oauth-divider::before,.oauth-divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}

/* Tabs - underline style */
.tab-bar{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:22px;position:relative}
.tab-btn{flex:1;padding:12px 0;background:none;color:var(--muted-2);border:none;font-size:.85em;font-weight:700;cursor:pointer;transition:color .25s;font-family:'Noto Sans KR',sans-serif;letter-spacing:.04em;position:relative}
.tab-btn::after{content:'';position:absolute;left:22%;right:22%;bottom:-1px;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent-warm));border-radius:1px;transform:scaleX(0);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.tab-btn.active{color:#fff}
.tab-btn.active::after{transform:scaleX(1)}
.tab-btn:hover:not(.active){color:rgba(255,255,255,.7)}

/* Forms */
.form-group{margin:14px 0;text-align:left}
.form-group label{display:block;font-size:.68em;color:var(--muted-2);margin-bottom:6px;padding-left:2px;letter-spacing:.08em;text-transform:uppercase;font-weight:700}
.form-group input{width:100%;padding:13px 16px;border:1px solid rgba(255,255,255,.07);border-radius:12px;background:rgba(255,255,255,.025);color:#fff;font-size:.95em;outline:none;transition:border-color .25s,background .25s;font-family:'Noto Sans KR',sans-serif}
.form-group input:focus{border-color:rgba(255,230,109,.55);background:rgba(255,255,255,.045)}
.form-group input::placeholder{color:rgba(255,255,255,.15)}

.submit-btn{width:100%;padding:14px;margin-top:20px;border:none;border-radius:12px;background:linear-gradient(135deg,#FF9A3C 0%,#FF6B35 100%);color:#fff;font-size:.9em;font-weight:800;font-family:'Orbitron','Noto Sans KR',sans-serif;letter-spacing:.12em;cursor:pointer;transition:transform .18s,box-shadow .2s,filter .2s;box-shadow:0 6px 20px rgba(255,107,53,.18)}
.submit-btn:hover{transform:translateY(-1px);filter:brightness(1.06);box-shadow:0 10px 26px rgba(255,107,53,.28)}
.submit-btn:active{transform:translateY(0)}
.submit-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;filter:none;box-shadow:none}

.forgot-link{display:inline-block;margin-top:14px;font-size:.76em;color:var(--muted);cursor:pointer;border:none;background:none;text-decoration:none;letter-spacing:.02em;transition:color .2s}
.forgot-link:hover{color:var(--accent)}

/* Messages */
.msg{padding:10px 14px;border-radius:10px;font-size:.82em;margin:14px 0;display:none;text-align:center;border:1px solid transparent;letter-spacing:.01em}
.msg.error{display:block;background:rgba(255,51,102,.08);border-color:rgba(255,51,102,.25);color:#FF6B8B}
.msg.success{display:block;background:rgba(0,255,136,.06);border-color:rgba(0,255,136,.2);color:var(--success)}
.msg.info{display:block;background:rgba(0,217,255,.06);border-color:rgba(0,217,255,.2);color:var(--secondary)}

/* Profile view */
.profile-section{text-align:center}
.profile-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#FFE66D 0%,#FF9A3C 60%,#FF6B8B 100%);display:flex;align-items:center;justify-content:center;font-size:1.85em;font-weight:900;margin:0 auto 14px;color:#0A0A1A;font-family:'Orbitron',sans-serif;box-shadow:0 8px 24px rgba(255,154,60,.2)}
.profile-name{font-family:'Orbitron','Noto Sans KR',sans-serif;font-size:1.2em;font-weight:800;color:#fff;margin-bottom:4px;letter-spacing:.03em}
.profile-email{font-size:.82em;color:var(--muted-2);margin-bottom:14px}
.profile-badge{display:inline-block;padding:5px 12px;border-radius:999px;font-size:.7em;font-weight:700;margin-bottom:20px;letter-spacing:.05em}
.profile-badge.verified{background:rgba(0,255,136,.08);color:var(--success);border:1px solid rgba(0,255,136,.25)}
.profile-badge.unverified{background:rgba(255,230,109,.08);color:var(--accent);border:1px solid rgba(255,230,109,.25)}

.profile-actions{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.profile-btn{padding:12px;border:1px solid transparent;border-radius:12px;font-size:.85em;font-weight:700;cursor:pointer;transition:transform .18s,background .2s,color .2s,border-color .2s;font-family:'Noto Sans KR',sans-serif;letter-spacing:.02em}
.profile-btn:hover{transform:translateY(-1px)}
.profile-btn.home{background:linear-gradient(135deg,#FFE66D,#FF9A3C);color:#0A0A1A;box-shadow:0 4px 16px rgba(255,230,109,.15)}
.profile-btn.home.return{background:linear-gradient(135deg,#00FF88,#00CC6E);color:#0A0A1A;box-shadow:0 4px 16px rgba(0,255,136,.2)}
.profile-btn.logout{background:transparent;color:var(--muted);border-color:rgba(255,255,255,.08)}
.profile-btn.logout:hover{color:var(--danger);border-color:rgba(255,51,102,.3);background:rgba(255,51,102,.04)}
.profile-btn.resend{background:rgba(255,230,109,.06);color:var(--accent);border-color:rgba(255,230,109,.2)}

/* Password reset form */
.reset-section{display:none}
.back-link{font-size:.76em;color:var(--muted);cursor:pointer;border:none;background:none;margin-bottom:14px;display:inline-block;letter-spacing:.02em;transition:color .2s}
.back-link:hover{color:var(--accent)}

/* Home link */
.home-link{display:inline-block;margin-top:22px;font-size:.74em;color:var(--muted-2);text-decoration:none;transition:color .2s;letter-spacing:.02em}
.home-link:hover{color:var(--accent)}

@media(max-width:500px){
    .auth-card{padding:30px 22px 24px}
    .auth-card .logo{font-size:1.3em}
    .form-group input{padding:11px 14px;font-size:.9em}
    .submit-btn{padding:13px;font-size:.85em}
}
    </style>
</head>
<body>
    <div id="dynamicBg"></div>
    <div class="stars" id="starsContainer"></div>

    <div class="auth-card">
        <div class="logo" onclick="location.href='/'">Lucky Please!</div>
        <div class="subtitle" id="subtitle">Join the fun! Sign in to play with friends.</div>

        <!-- LOGIN / SIGNUP TABS -->
        <div id="authSection">
            <!-- Social OAuth -->
            <div class="oauth-row">
                <button type="button" class="oauth-btn" id="googleBtn" onclick="handleGoogleLogin()">
                    <svg class="oauth-ico" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.792 2.237-2.231 4.166-4.087 5.571.001-.001.002-.001.003-.002l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
                    <span id="googleBtnText">Continue with Google</span>
                </button>
                <!-- Kakao — bypasses Supabase's built-in OAuth flow
                     (which hardcodes account_email scope → breaks on
                     non-biz-verified Kakao apps, GitHub #36878). We
                     instead do a direct Kakao OIDC authorize redirect,
                     exchange the code → id_token via our own Edge
                     Function, then call supabase.auth.signInWithIdToken
                     to create the Supabase session. Zero dependency on
                     Kakao biz-app verification. -->
                <button type="button" class="oauth-btn oauth-btn-kakao" id="kakaoBtn" onclick="handleKakaoLogin()">
                    <svg class="oauth-ico" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path fill="#000" d="M12 3C6.477 3 2 6.463 2 10.732c0 2.78 1.883 5.215 4.717 6.584-.173.637-1.094 4.028-1.125 4.272 0 0-.023.19.105.262.129.072.28.016.28.016.336-.046 3.895-2.537 4.51-2.967.46.063.933.103 1.413.103 5.523 0 10-3.463 10-7.732C22 6.463 17.523 3 12 3z"/></svg>
                    <span id="kakaoBtnText">카카오로 시작</span>
                </button>
            </div>
            <div class="oauth-divider" id="oauthDivider">OR</div>

            <div class="tab-bar">
                <button class="tab-btn active" id="tabLogin" onclick="showTab('login')">Login</button>
                <button class="tab-btn" id="tabSignup" onclick="showTab('signup')">Sign Up</button>
            </div>

            <div id="msgBox" class="msg"></div>

            <!-- LOGIN FORM -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label id="lEmail">Email</label>
                    <input type="email" id="loginEmail" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label id="lPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required minlength="6" autocomplete="current-password">
                </div>
                <!-- Cloudflare Turnstile bot-challenge mount. Empty
                     until onTurnstileLoad() renders the widget; if the
                     site key is not configured (TURNSTILE_SITE_KEY=''),
                     stays empty and the form submits without a token. -->
                <div id="turnstileLogin" class="turnstile-mount" style="margin:10px 0;display:flex;justify-content:center"></div>
                <button type="submit" class="submit-btn" id="loginBtn">Login</button>
                <button type="button" class="forgot-link" onclick="showReset()" id="forgotText">Forgot password?</button>
            </form>

            <!-- SIGNUP FORM -->
            <form id="signupForm" style="display:none" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label id="sNickname">Nickname</label>
                    <input type="text" id="signupNickname" placeholder="YourNickname" required minlength="2" maxlength="20" autocomplete="username">
                </div>
                <div class="form-group">
                    <label id="sEmail">Email</label>
                    <input type="email" id="signupEmail" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label id="sPassword">Password (6+ characters)</label>
                    <input type="password" id="signupPassword" placeholder="••••••••" required minlength="6" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label id="sConfirm">Confirm Password</label>
                    <input type="password" id="signupConfirm" placeholder="••••••••" required minlength="6" autocomplete="new-password">
                </div>
                <!-- 동의 체크박스 — KISA 정통망법 50조 준수.
                     UX 최적화: "전체 동의" master 체크박스를 위에 두어
                     1클릭으로 모든 동의가 끝나도록 함 (네이버/카카오/토스
                     공통 패턴). 신경쓰는 사용자는 아래 개별 체크박스로
                     fine control 가능. master ↔ children은 양방향 sync
                     (master 클릭 → 셋 다 체크, 개별 변경 → master 자동
                     반영). 마케팅이 (선택) 항목인데 "전체 동의"에
                     포함된다는 점은 부제로 명시 (KISA: 명확성 의무). -->
                <!-- 동의 블록 — 텍스트는 applyLanguage()가 채워넣음
                     (16개 언어 i18n). 라벨 안의 spans에 ID를 둬서
                     번역 시 innerHTML로 한 번에 갱신 가능. -->
                <div class="consent-block" style="margin:14px 0 6px;padding:10px 14px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);border-radius:10px;text-align:left">
                    <label style="display:flex;align-items:center;gap:10px;font-size:.86em;color:#fff;font-weight:700;cursor:pointer;padding:6px 0">
                        <input type="checkbox" id="signupAgreeAll" style="cursor:pointer;accent-color:#FF9A3C;width:18px;height:18px">
                        <span id="caAgreeAllText"></span>
                    </label>
                    <div style="height:1px;background:rgba(255,255,255,.08);margin:6px -4px"></div>
                    <label style="display:flex;align-items:center;gap:10px;font-size:.76em;color:rgba(255,255,255,.7);cursor:pointer;padding:4px 0">
                        <input type="checkbox" id="signupTerms" required style="cursor:pointer;accent-color:#FF9A3C;width:16px;height:16px">
                        <span id="caTermsText"></span>
                    </label>
                    <label style="display:flex;align-items:center;gap:10px;font-size:.76em;color:rgba(255,255,255,.7);cursor:pointer;padding:4px 0">
                        <input type="checkbox" id="signupPrivacy" required style="cursor:pointer;accent-color:#FF9A3C;width:16px;height:16px">
                        <span id="caPrivacyText"></span>
                    </label>
                    <label style="display:flex;align-items:center;gap:10px;font-size:.76em;color:rgba(255,255,255,.55);cursor:pointer;padding:4px 0">
                        <input type="checkbox" id="signupMarketing" style="cursor:pointer;accent-color:#FF9A3C;width:16px;height:16px">
                        <span id="caMarketingText"></span>
                    </label>
                </div>
                <div id="turnstileSignup" class="turnstile-mount" style="margin:10px 0;display:flex;justify-content:center"></div>
                <button type="submit" class="submit-btn" id="signupBtn">Sign Up</button>
            </form>
        </div>

        <!-- PASSWORD RESET -->
        <div id="resetSection" class="reset-section">
            <button class="back-link" onclick="hideReset()">← Back to login</button>
            <div id="resetMsg" class="msg"></div>
            <form onsubmit="handleReset(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="resetEmail" placeholder="you@example.com" required>
                </div>
                <div id="turnstileReset" class="turnstile-mount" style="margin:10px 0;display:flex;justify-content:center"></div>
                <button type="submit" class="submit-btn" id="resetBtn">Send Reset Link</button>
            </form>
        </div>

        <!-- PROFILE (logged in) -->
        <div id="profileSection" style="display:none">
            <div class="profile-section">
                <div class="profile-avatar" id="profileAvatar">?</div>
                <div class="profile-name" id="profileName"></div>
                <div class="profile-email" id="profileEmail"></div>
                <div class="profile-badge" id="profileBadge"></div>
                <div id="profileMsg" class="msg"></div>
                <div class="profile-actions">
                    <button class="profile-btn home return" id="returnBtn" style="display:none" onclick="goReturn()">↩ Continue</button>
                    <button class="profile-btn home" onclick="location.href='/'">🎮 Play Games</button>
                    <button class="profile-btn resend" id="resendBtn" style="display:none" onclick="resendVerification()">📧 Resend Verification Email</button>
                    <button class="profile-btn logout" onclick="handleLogout()">Logout</button>
                </div>
            </div>
        </div>

        <a href="/" class="home-link" id="homeLink">🏠 ← Back to games</a>
    </div>

    <script src="/vendor/supabase.min.js"></script>
    <script src="/js/supabase-config.js?v=1777498258"></script>
    <script>
/* ===== I18N (16 languages) ===== */

let lang='en';
/* T() — looks up key in I18N first (existing 16-lang dict), then I18N_X
   (new consent/error dict). Both fall back to English. Missing keys
   return the literal key as a last resort so something visible shows. */
function T(k){
    if (I18N[lang] && I18N[lang][k] != null) return I18N[lang][k];
    if (I18N_X[lang] && I18N_X[lang][k] != null) return I18N_X[lang][k];
    if (I18N.en[k] != null) return I18N.en[k];
    if (I18N_X.en[k] != null) return I18N_X.en[k];
    return k;
}
/* Escape user-controlled text for safe innerHTML usage. The consent
   strings are dictionary literals (not user input) so XSS isn't a
   real risk here, but we still treat them defensively in case future
   keys ever surface user data. */
function _escHtml(s){
    return String(s||'').replace(/[&<>"']/g, ch => (
        {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]
    ));
}

function showTab(tab){
    document.getElementById('tabLogin').classList.toggle('active',tab==='login');
    document.getElementById('tabSignup').classList.toggle('active',tab==='signup');
    document.getElementById('loginForm').style.display=tab==='login'?'block':'none';
    document.getElementById('signupForm').style.display=tab==='signup'?'block':'none';
    clearMsg();
}

function showReset(){
    document.getElementById('authSection').style.display='none';
    document.getElementById('resetSection').style.display='block';
}
function hideReset(){
    document.getElementById('resetSection').style.display='none';
    document.getElementById('authSection').style.display='block';
}

function showMsg(text,type='error'){
    const el=document.getElementById('msgBox');
    el.textContent=text;el.className='msg '+type;
}
function clearMsg(){
    const el=document.getElementById('msgBox');
    el.textContent='';el.className='msg';
}

function getReturnUrl(){
    const p=new URLSearchParams(location.search);
    const r=p.get('return');
    if(!r)return null;
    // Only allow relative paths — reject absolute URLs to avoid open redirect
    if(r.startsWith('/')&&!r.startsWith('//'))return r;
    return null;
}

function goReturn(){
    const r=getReturnUrl();
    if(r)location.href=r;
    else location.href='/';
}

function showProfile(user){
    document.getElementById('authSection').style.display='none';
    document.getElementById('resetSection').style.display='none';
    document.getElementById('profileSection').style.display='block';

    const name=getDisplayName(user);
    document.getElementById('profileAvatar').textContent=name.charAt(0).toUpperCase();
    document.getElementById('profileName').textContent=name;
    document.getElementById('profileEmail').textContent=user.email;

    const verified=user.email_confirmed_at!=null;
    const badge=document.getElementById('profileBadge');
    badge.textContent=verified?'✅ '+T('verified'):'⚠️ '+T('unverified');
    badge.className='profile-badge '+(verified?'verified':'unverified');

    document.getElementById('resendBtn').style.display=verified?'none':'block';

    const retBtn=document.getElementById('returnBtn');
    if(getReturnUrl()){
        retBtn.style.display='block';
        retBtn.textContent=T('continueBack');
    } else {
        retBtn.style.display='none';
    }
}

function showAuth(){
    document.getElementById('authSection').style.display='block';
    document.getElementById('resetSection').style.display='none';
    document.getElementById('profileSection').style.display='none';
}

/* ===== Cloudflare Turnstile bot-protection =====
   Loads the widget script and renders 3 invisible/managed widgets
   (login/signup/reset) ONLY when supabase-config.js exposes a
   non-empty TURNSTILE_SITE_KEY. With the default empty key, the
   loader skips entirely and the auth flow runs unchanged.

   On submit, each handler grabs the widget's response token via
   turnstile.getResponse(widgetId). If captcha is enabled but the
   token is missing / expired, the handler shows "보안 확인을
   완료해주세요" and resets the widget so the user can retry. */
let _twLoginId = null, _twSignupId = null, _twResetId = null;
function _captchaActive(){
    return typeof isCaptchaEnabled === 'function' && isCaptchaEnabled();
}
function _twTokenFor(widgetId){
    if (!widgetId || typeof turnstile === 'undefined') return null;
    try { const t = turnstile.getResponse(widgetId); return t || null; } catch(_) { return null; }
}
function _twResetWidget(widgetId){
    if (!widgetId || typeof turnstile === 'undefined') return;
    try { turnstile.reset(widgetId); } catch(_){}
}
window.onTurnstileLoad = function(){
    if (!_captchaActive()) return;
    if (typeof turnstile === 'undefined') return;
    const sk = getTurnstileSiteKey();
    try {
        _twLoginId  = turnstile.render('#turnstileLogin',  { sitekey: sk, theme: 'dark' });
        _twSignupId = turnstile.render('#turnstileSignup', { sitekey: sk, theme: 'dark' });
        _twResetId  = turnstile.render('#turnstileReset',  { sitekey: sk, theme: 'dark' });
    } catch(e) {
        console.warn('[turnstile] render error', e);
    }
};
(function _maybeLoadTurnstile(){
    if (!_captchaActive()) return;   /* feature flag off — skip script load */
    if (document.getElementById('cf-turnstile-script')) return;
    const s = document.createElement('script');
    s.id = 'cf-turnstile-script';
    s.src = 'https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onTurnstileLoad';
    s.async = true; s.defer = true;
    document.head.appendChild(s);
})();

/* ===== Consent checkboxes — master ↔ children sync =====
   "전체 동의" toggle propagates to all 3 children; any individual
   change recomputes master. Korean signup-form standard (네이버/
   카카오/토스 모두 같은 패턴). Single click on master = all done. */
(function _wireConsentMaster(){
    const master = document.getElementById('signupAgreeAll');
    const t = document.getElementById('signupTerms');
    const p = document.getElementById('signupPrivacy');
    const m = document.getElementById('signupMarketing');
    if (!master || !t || !p || !m) return;
    master.addEventListener('change', () => {
        t.checked = master.checked;
        p.checked = master.checked;
        m.checked = master.checked;
    });
    [t, p, m].forEach(cb => {
        cb.addEventListener('change', () => {
            master.checked = t.checked && p.checked && m.checked;
        });
    });
})();

/* ===== Auth Handlers ===== */
async function handleLogin(e){
    e.preventDefault();clearMsg();
    const email=document.getElementById('loginEmail').value.trim();
    const pw=document.getElementById('loginPassword').value;
    /* Captcha gate — only enforced when the admin has configured
       Turnstile. With no site key, captchaToken is null and Supabase
       ignores it (the dashboard's captcha protection is also off in
       that case, so there's nothing to verify against). */
    let captchaToken = null;
    if (_captchaActive()) {
        captchaToken = _twTokenFor(_twLoginId);
        if (!captchaToken){ showMsg(T('captchaIncomplete'),'error'); return; }
    }
    document.getElementById('loginBtn').disabled=true;

    const{data,error}=await signIn(email,pw,captchaToken);
    document.getElementById('loginBtn').disabled=false;

    if(error){
        showMsg(error.message,'error');
        _twResetWidget(_twLoginId);   /* let the user retry with a fresh challenge */
        return;
    }
    showMsg(T('loginSuccess'),'success');
    const ret=getReturnUrl();
    if(ret){setTimeout(()=>{location.href=ret},700);return}
    setTimeout(()=>showProfile(data.user),500);
}

async function handleSignup(e){
    e.preventDefault();clearMsg();
    const nick=document.getElementById('signupNickname').value.trim();
    const email=document.getElementById('signupEmail').value.trim();
    const pw=document.getElementById('signupPassword').value;
    const confirm=document.getElementById('signupConfirm').value;
    /* KISA consent gating — terms + privacy are mandatory, marketing
       is optional. The required attribute on the checkboxes also
       blocks form submission natively, but we double-check here so a
       JS-disabled bypass still surfaces the error. */
    const termsAgreed     = document.getElementById('signupTerms').checked;
    const privacyAgreed   = document.getElementById('signupPrivacy').checked;
    const marketingAgreed = document.getElementById('signupMarketing').checked;
    if (!termsAgreed || !privacyAgreed){
        showMsg(T('mustAgreeRequired'),'error');
        return;
    }

    if(pw!==confirm){showMsg(T('passwordMismatch'),'error');return}

    /* Disposable-email gate — calls is_email_domain_allowed RPC which
       checks the email's domain against the blocklist. The same check
       runs server-side via the profiles trigger as a backup, but doing
       it here gives the user immediate feedback instead of an opaque
       server error after password validation. RPC missing (migration
       not deployed) → silent fall-through; signup proceeds. */
    try {
        const { data: allowed, error: chkErr } = await getSupabase()
            .rpc('is_email_domain_allowed', { p_email: email });
        if (chkErr) {
            console.warn('[auth.signup] is_email_domain_allowed RPC failed:', chkErr.message);
        } else if (allowed === false) {
            showMsg(T('disposableEmail'),'error');
            return;
        }
    } catch(e) {
        console.warn('[auth.signup] domain check threw:', e);
    }

    let captchaToken = null;
    if (_captchaActive()) {
        captchaToken = _twTokenFor(_twSignupId);
        if (!captchaToken){ showMsg(T('captchaIncomplete'),'error'); return; }
    }
    document.getElementById('signupBtn').disabled=true;
    const{data,error}=await signUp(email,pw,nick,captchaToken);
    document.getElementById('signupBtn').disabled=false;

    if(error){
        /* Friendly remap for the server-side trigger error. The trigger
           raises 'email_domain_blocked: <domain>'; show the same Korean
           copy as the client-side check for consistency. */
        let msg = error.message;
        if (typeof msg === 'string' && msg.toLowerCase().includes('email_domain_blocked')) {
            msg = T('disposableEmail');
        }
        showMsg(msg,'error');
        _twResetWidget(_twSignupId);
        return;
    }
    /* Persist consent timestamps. Marketing flag carries through to
       profiles.marketing_agreed_at = now() if checked, NULL otherwise.
       Fire-and-forget — if the RPC isn't deployed yet, the signup
       still succeeds (the user just won't have consent timestamps
       on their profile until the migration lands). */
    try {
        const { error: consentErr } = await getSupabase().rpc('set_consent', {
            p_terms: termsAgreed, p_privacy: privacyAgreed, p_marketing: marketingAgreed
        });
        if (consentErr) console.warn('[auth.signup] set_consent failed:', consentErr.message);
    } catch(e) { console.warn('[auth.signup] set_consent threw:', e); }
    showMsg(T('signupSuccess'),'success');
}

async function handleReset(e){
    e.preventDefault();
    const email=document.getElementById('resetEmail').value.trim();
    let captchaToken = null;
    if (_captchaActive()) {
        captchaToken = _twTokenFor(_twResetId);
        if (!captchaToken){
            const el=document.getElementById('resetMsg');
            el.textContent=T('captchaIncomplete'); el.className='msg error';
            return;
        }
    }
    document.getElementById('resetBtn').disabled=true;
    const{data,error}=await resetPassword(email,captchaToken);
    document.getElementById('resetBtn').disabled=false;

    const el=document.getElementById('resetMsg');
    if(error){
        el.textContent=error.message;el.className='msg error';
        _twResetWidget(_twResetId);
    } else {
        el.textContent=T('resetSuccess');el.className='msg success';
    }
}

async function handleLogout(){
    await signOut();
    showAuth();
    showMsg(T('logoutSuccess'),'info');
}

async function handleGoogleLogin(){
    clearMsg();
    const btn=document.getElementById('googleBtn');
    btn.disabled=true;
    const ret=getReturnUrl();
    const redirectTo=window.location.origin+'/auth/'+(ret?('?return='+encodeURIComponent(ret)):'');
    const{error}=await getSupabase().auth.signInWithOAuth({
        provider:'google',
        options:{redirectTo}
    });
    if(error){btn.disabled=false;showMsg(error.message,'error')}
    // On success, browser redirects to Google — no further action here
}

/* Kakao login — direct OIDC flow that bypasses Supabase's OAuth
   handler. Reason: Supabase GoTrue hardcodes `account_email` in the
   Kakao scope list (https://github.com/supabase/supabase/issues/36878),
   which breaks every non-biz-verified Kakao app with KOE205. We
   instead:
     1. Redirect the user straight to kauth.kakao.com/oauth/authorize
        with ONLY the scopes a personal-dev app can grant
        (openid + profile_nickname + profile_image).
     2. Kakao bounces back to /auth/?code=... with an authorization
        code after consent.
     3. Our Edge Function (supabase/functions/kakao-token) exchanges
        the code for an id_token using the client_secret — kept
        server-side so it never reaches the browser.
     4. Client calls supabase.auth.signInWithIdToken with that
        id_token, and Supabase verifies + creates a session exactly
        as it would for any other OIDC provider. No biz-app needed. */
const KAKAO_CLIENT_ID='847abad1c7bd5a9242197654386bdc0d';   /* REST API key — public */
const KAKAO_REDIRECT_URI=window.location.origin+'/auth/';
const KAKAO_TOKEN_ENDPOINT='https://owvaarmnlednfkgmgerf.supabase.co/functions/v1/kakao-token';

async function handleKakaoLogin(){
    clearMsg();
    const btn=document.getElementById('kakaoBtn');
    btn.disabled=true;
    /* CSRF protection via state (echoed back by Kakao, verified on
       return). We intentionally do NOT send a nonce — Kakao's id_token
       nonce-claim format doesn't match Supabase's raw-nonce
       verification path and causes "Nonces mismatch" failures.
       Replay protection is still covered by the authorization code
       being single-use server-side. */
    const state=(crypto.randomUUID&&crypto.randomUUID())||(Date.now().toString(36)+Math.random().toString(36).slice(2,12));
    try{
        sessionStorage.setItem('kakao_oauth_state',state);
        const ret=getReturnUrl();
        if(ret)sessionStorage.setItem('kakao_oauth_return',ret);
    }catch(_){}
    const params=new URLSearchParams({
        client_id:KAKAO_CLIENT_ID,
        redirect_uri:KAKAO_REDIRECT_URI,
        response_type:'code',
        scope:'openid profile_nickname profile_image',
        state:state
    });
    window.location.href='https://kauth.kakao.com/oauth/authorize?'+params.toString();
}

/* Handle return from Kakao authorize. Runs once on every /auth/
   page load and early-returns unless ?code= is present. */
(async function handleKakaoReturn(){
    const p=new URLSearchParams(location.search);
    const code=p.get('code');
    if(!code)return;
    const state=p.get('state');
    let savedState=null,returnUrl=null;
    try{
        savedState=sessionStorage.getItem('kakao_oauth_state');
        returnUrl=sessionStorage.getItem('kakao_oauth_return');
        sessionStorage.removeItem('kakao_oauth_state');
        sessionStorage.removeItem('kakao_oauth_return');
        /* legacy nonce key cleanup (from previous deploys) */
        sessionStorage.removeItem('kakao_oauth_nonce');
    }catch(_){}
    /* state mismatch = someone forged the callback; refuse. */
    if(!savedState||savedState!==state){
        showMsg('Kakao login: invalid state','error');
        history.replaceState({},'','/auth/');
        return;
    }
    /* Clean query string right away so a refresh doesn't retry the
       same (already-spent) code. */
    history.replaceState({},'','/auth/');
    try{
        const r=await fetch(KAKAO_TOKEN_ENDPOINT,{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({code:code,redirect_uri:KAKAO_REDIRECT_URI})
        });
        const data=await r.json();
        if(!r.ok||!data.id_token){
            showMsg('Kakao token exchange failed: '+(data.error||r.status),'error');
            return;
        }
        const{error}=await getSupabase().auth.signInWithIdToken({
            provider:'kakao',
            token:data.id_token
        });
        if(error){
            showMsg('Kakao session failed: '+error.message,'error');
            return;
        }
        /* Success — route to setup if profile incomplete, otherwise
           the ?return= the user came from (or home). Mirrors the
           Google flow. */
        const next=returnUrl||'/';
        location.replace(/^\/[^\/]/.test(next)?next:'/');
    }catch(e){
        showMsg('Kakao login failed: '+String(e),'error');
    }
})();

async function resendVerification(){
    const user=await getUser();
    if(!user)return;
    const{error}=await getSupabase().auth.resend({type:'signup',email:user.email});
    const el=document.getElementById('profileMsg');
    if(error){el.textContent=error.message;el.className='msg error'}
    else{el.textContent=T('resendSuccess');el.className='msg success'}
}

/* ===== Init ===== */
async function init(){
    // Language - sync with main page selection
    const saved=localStorage.getItem('luckyplz_lang');
    if(saved&&I18N[saved])lang=saved;
    else{const m={'ko':'ko','en':'en','es':'es','de':'de','fr':'fr','ja':'ja','zh':'zh','pt':'pt','ru':'ru','ar':'ar','hi':'hi','th':'th','id':'id','vi':'vi','tr':'tr'};
    const langs=navigator.languages||[navigator.language||'en'];
    for(const l of langs){if(l.toLowerCase()==='en-gb'){lang='gb';break}const p=l.split('-')[0].toLowerCase();if(m[p]){lang=m[p];break}}}

    createStars();
    applyLanguage();

    // Check URL params
    const params=new URLSearchParams(location.search);
    if(params.get('verified')==='1'){
        showMsg(T('emailVerifiedBanner'),'success');
    }

    // Check existing session
    const user=await getUser();
    if(user){
        // If arrived via OAuth redirect with a return URL, auto-continue to origin
        const ret=getReturnUrl();
        if(ret){setTimeout(()=>{location.href=ret},400);return}
        showProfile(user);
    }

    // Listen for auth changes
    onAuthChange((event,session)=>{
        if(event==='SIGNED_IN'&&session?.user){
            showProfile(session.user);
        }else if(event==='SIGNED_OUT'){
            showAuth();
        }
    });
}

init();
    </script>
