    <style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --primary:#FF6B35;--secondary:#00D9FF;--accent:#FFE66D;--accent-warm:#FF9A3C;
    --danger:#FF3366;--success:#00D98A;--dark:#0A0A1A;
    --muted:rgba(255,255,255,.55);--muted-2:rgba(255,255,255,.35);--muted-3:rgba(255,255,255,.18);
    --field-bg:rgba(255,255,255,.03);--field-br:rgba(255,255,255,.08);
    --field-bg-focus:rgba(255,255,255,.05);--field-br-focus:rgba(255,230,109,.5);
}
html,body{height:100%}
body{
    font-family:'Noto Sans KR',sans-serif;background:var(--dark);color:#fff;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100dvh;padding:24px 16px;letter-spacing:.01em;gap:20px
}

/* Ambient bg + stars — same as the auth page for visual continuity. */
#dynamicBg{position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse at 50% 20%,rgba(255,230,109,.06) 0%,transparent 55%),radial-gradient(ellipse at 20% 85%,rgba(255,107,53,.04) 0%,transparent 55%),linear-gradient(180deg,#0A0A1A 0%,#10101F 50%,#0A0A1A 100%)}
.stars{position:fixed;inset:0;pointer-events:none;z-index:-1}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.12;transform:scale(.8)}50%{opacity:.65;transform:scale(1.1)}}

.setup-card{
    background:linear-gradient(165deg,rgba(22,22,42,.72),rgba(12,12,28,.88));
    backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border-radius:22px;padding:40px 36px 30px;
    border:1px solid rgba(255,255,255,.07);
    box-shadow:0 24px 60px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.04);
    width:480px;max-width:100%;position:relative;overflow:hidden
}
.setup-card::before{content:'';position:absolute;top:0;left:22%;right:22%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,230,109,.45),transparent)}

/* Progress hint above the headline — signals to the user where they
   are in the onboarding flow. Single step right now; doubles as a
   mount point if we add more steps (email verify etc) later. */
.progress-pill{
    display:inline-flex;align-items:center;gap:8px;padding:5px 12px;
    border-radius:999px;background:rgba(0,217,255,.1);border:1px solid rgba(0,217,255,.25);
    color:#00D9FF;font-size:.68em;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    margin-bottom:14px
}
.progress-pill .dot{width:6px;height:6px;border-radius:50%;background:#00D9FF;animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

h1.headline{
    font-family:'Orbitron','Noto Sans KR',sans-serif;font-weight:900;font-size:1.75em;
    line-height:1.2;letter-spacing:-.01em;margin-bottom:10px;
    background:linear-gradient(135deg,#FFE66D 0%,#FF9A3C 50%,#FF6B8B 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
.sub-headline{color:var(--muted);font-size:.92em;line-height:1.55;margin-bottom:26px}

/* Avatar block — pulled from OAuth provider by default. Shows initials
   fallback when no provider image is available. Users can click to
   switch between provider image and initials for now; upload ships
   in a follow-up with storage policies. */
.avatar-row{display:flex;align-items:center;gap:16px;margin-bottom:24px;padding:14px;border-radius:14px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05)}
.avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#FF6B35,#FF6B8B);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.5em;color:#fff;overflow:hidden;flex-shrink:0;box-shadow:0 6px 18px rgba(255,107,53,.25)}
.avatar img{width:100%;height:100%;object-fit:cover;display:block}
.avatar-meta{flex:1;min-width:0}
.avatar-meta .label{font-size:.66em;color:var(--muted-2);letter-spacing:.1em;text-transform:uppercase;font-weight:700;margin-bottom:2px}
.avatar-meta .provider{font-size:.92em;color:#fff;font-weight:600}
.avatar-meta .email{font-size:.78em;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Form fields — floating-label-less for faster scanning. Label above,
   field below, help/error text below the field in its own slot so
   the layout doesn't jitter when a message appears. */
.form-group{margin-bottom:18px;text-align:left}
.form-group .label-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;padding:0 2px}
.form-group label{font-size:.7em;color:var(--muted-2);letter-spacing:.1em;text-transform:uppercase;font-weight:700}
.form-group .hint{font-size:.7em;color:var(--muted-2);font-weight:500;letter-spacing:.02em;text-transform:none}
.field{position:relative}
.field input{
    width:100%;padding:14px 48px 14px 16px;
    border:1px solid var(--field-br);border-radius:12px;
    background:var(--field-bg);color:#fff;font-size:.98em;outline:none;
    font-family:'Noto Sans KR',sans-serif;letter-spacing:.01em;
    transition:border-color .2s,background .2s
}
.field input:focus{border-color:var(--field-br-focus);background:var(--field-bg-focus)}
.field input::placeholder{color:rgba(255,255,255,.2)}
.field input[readonly]{color:var(--muted);cursor:default}
.field-status{
    position:absolute;top:50%;right:14px;transform:translateY(-50%);
    width:22px;height:22px;display:flex;align-items:center;justify-content:center;
    pointer-events:none
}
.field-status.ok{color:var(--success)}
.field-status.err{color:var(--danger)}
.field-status .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.15);border-top-color:#FFE66D;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.field-msg{min-height:18px;font-size:.74em;margin-top:6px;padding:0 2px;line-height:1.4;color:var(--muted-2)}
.field-msg.ok{color:var(--success)}
.field-msg.err{color:var(--danger)}

/* Primary CTA — one per screen. Disabled until valid + available. */
.submit-btn{
    width:100%;padding:14px;margin-top:6px;
    border:none;border-radius:12px;
    background:linear-gradient(135deg,#FF9A3C 0%,#FF6B35 100%);
    color:#fff;font-family:'Orbitron','Noto Sans KR',sans-serif;
    font-size:.92em;font-weight:800;letter-spacing:.12em;cursor:pointer;
    transition:transform .18s,box-shadow .2s,filter .2s;
    box-shadow:0 6px 20px rgba(255,107,53,.22)
}
.submit-btn:hover:not(:disabled){transform:translateY(-1px);filter:brightness(1.06);box-shadow:0 10px 26px rgba(255,107,53,.32)}
.submit-btn:active:not(:disabled){transform:translateY(0)}
.submit-btn:disabled{opacity:.35;cursor:not-allowed;filter:grayscale(.4);box-shadow:none}

.legal{margin-top:16px;font-size:.7em;color:var(--muted-2);text-align:center;letter-spacing:.02em;line-height:1.5}
.legal a{color:var(--muted);text-decoration:underline;text-underline-offset:2px}
.legal a:hover{color:#fff}

.footer-row{display:flex;align-items:center;justify-content:space-between;margin-top:18px;padding-top:16px;border-top:1px solid rgba(255,255,255,.05)}
.footer-row .signout{background:none;border:0;color:var(--muted-2);font-size:.78em;cursor:pointer;padding:6px 10px;border-radius:8px;transition:color .2s,background .2s;font-family:inherit}
.footer-row .signout:hover{color:var(--danger);background:rgba(255,51,102,.06)}
.footer-row .help{font-size:.75em;color:var(--muted-2);text-decoration:none;transition:color .2s}
.footer-row .help:hover{color:#FFE66D}

/* Loading / success overlays */
.overlay{position:fixed;inset:0;background:rgba(10,10,26,.78);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:100;animation:fadeIn .25s ease}
.overlay.on{display:flex}
.overlay .big-spinner{width:42px;height:42px;border:3px solid rgba(255,255,255,.15);border-top-color:#FFE66D;border-radius:50%;animation:spin 1s linear infinite}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

@media (max-width:500px){
    .setup-card{padding:30px 22px 22px;border-radius:18px}
    h1.headline{font-size:1.45em}
    .sub-headline{font-size:.88em;margin-bottom:20px}
    .avatar{width:56px;height:56px;font-size:1.3em}
}

<body>
    <div id="dynamicBg"></div>

    <div class="setup-card" role="main">

    <div class="overlay" id="loadingOverlay"><div class="big-spinner"></div></div>

    <script src="/js/supabase-config.js"></script>
    <script>
/* ================================================================
   Setup page controller
   • Guards: must be signed in. If not, punt to /auth/.
   • Pre-fills nickname + avatar + email from the OAuth user metadata
     when present (Google returns full_name + picture + email).
   • Live availability check: debounced 300ms after keystroke. Kills
     in-flight RPCs on new input so the user never sees a stale
     "taken" flash after typing more.
   • Submit: requires valid + available nickname. Shows a loading
     overlay during save so double-clicks can't double-submit.
   ================================================================ */

/* --- i18n (16 langs — mirrors the rest of the site) ------------- */
const T = {
    en: {
        progress:'PROFILE · STEP 1 OF 1', headline:'Pick a nickname',
        sub:'Your friends will see this in rooms and chats. You can change it later from your profile.',
        signedInWith:'Signed in with', nicknameLabel:'Nickname',
        nicknameHint:'2–20 chars · letters · digits · 한글 · _ -',
        emailLabel:'Email', emailHint:'Optional · for important updates only',
        submit:'GET STARTED', submitSaving:'SAVING…',
        legal:'By continuing you agree to our <a href="/privacy/" target="_blank" rel="noopener">Privacy Policy</a>.',
        signOut:'Sign out', home:'← Back to home',
        ph:'e.g. luckyminsu',
        msg_checking:'Checking availability…', msg_available:'✓ Available',
        msg_invalid:'Invalid — use 2–20 letters, digits, 한글, underscore or hyphen.',
        msg_taken:'Already taken — try another.',
        msg_reserved:'This name is reserved.',
        msg_empty:'Enter a nickname to continue.',
        msg_error:'Connection error. Retrying…'
    },
    ko: {
        progress:'프로필 · 1 / 1 단계', headline:'닉네임을 정해주세요',
        sub:'방과 채팅에서 친구들이 보게 될 이름이에요. 언제든 프로필에서 바꿀 수 있어요.',
        signedInWith:'로그인 계정', nicknameLabel:'닉네임',
        nicknameHint:'2–20자 · 영문 · 숫자 · 한글 · _ -',
        emailLabel:'이메일', emailHint:'선택 · 중요한 알림에만 사용해요',
        submit:'시작하기', submitSaving:'저장 중…',
        legal:'계속하면 <a href="/privacy/" target="_blank" rel="noopener">개인정보 처리방침</a>에 동의하는 것으로 간주돼요.',
        signOut:'로그아웃', home:'← 홈으로',
        ph:'예: 럭키민수',
        msg_checking:'중복 확인 중…', msg_available:'✓ 사용 가능해요',
        msg_invalid:'영문·숫자·한글·_·- 만 가능해요 (2–20자)',
        msg_taken:'이미 사용 중인 이름이에요.',
        msg_reserved:'사용할 수 없는 이름이에요.',
        msg_empty:'닉네임을 입력해주세요.',
        msg_error:'연결 오류. 다시 시도 중…'
    },
    ja: {
        progress:'プロフィール · 1 / 1', headline:'ニックネームを決めよう',
        sub:'ルームやチャットで友達に表示される名前です。後でプロフィールから変更できます。',
        signedInWith:'ログイン', nicknameLabel:'ニックネーム',
        nicknameHint:'2〜20文字 · 英数字 · 한글 · _ -',
        emailLabel:'メール', emailHint:'任意 · 重要な通知のみ',
        submit:'はじめる', submitSaving:'保存中…',
        legal:'続行すると <a href="/privacy/" target="_blank" rel="noopener">プライバシーポリシー</a> に同意したことになります。',
        signOut:'ログアウト', home:'← ホームへ',
        ph:'例: luckyminsu',
        msg_checking:'確認中…', msg_available:'✓ 利用可能',
        msg_invalid:'使用できる文字は 2〜20 文字 (英数字・한글・_ -)',
        msg_taken:'既に使われています。',
        msg_reserved:'使用できない名前です。',
        msg_empty:'ニックネームを入力してください。',
        msg_error:'通信エラー。再試行中…'
    },
    zh: {
        progress:'档案 · 1 / 1', headline:'设置你的昵称',
        sub:'你的朋友将在房间和聊天中看到这个昵称。之后可以在个人资料中修改。',
        signedInWith:'登录方式', nicknameLabel:'昵称',
        nicknameHint:'2–20 字符 · 字母 · 数字 · 한글 · _ -',
        emailLabel:'邮箱', emailHint:'可选 · 仅用于重要通知',
        submit:'开始使用', submitSaving:'保存中…',
        legal:'继续即表示同意 <a href="/privacy/" target="_blank" rel="noopener">隐私政策</a>。',
        signOut:'退出登录', home:'← 返回首页',
        ph:'例: luckyminsu',
        msg_checking:'检查中…', msg_available:'✓ 可用',
        msg_invalid:'只能使用 2–20 字符 (字母·数字·한글·_ -)',
        msg_taken:'此昵称已被使用。',
        msg_reserved:'该名称不可使用。',
        msg_empty:'请输入昵称。',
        msg_error:'连接错误。重试中…'
    }
};
function detectLang(){
    const saved=(localStorage.getItem('luckyplz_lang')||'').toLowerCase().split('-')[0];
    if(T[saved])return saved;
    const nav=(navigator.language||'en').toLowerCase().split('-')[0];
    return T[nav]?nav:'en';
}
const lang=detectLang();
const t=T[lang]||T.en;

/* Apply static strings */
document.getElementById('progressLabel').textContent=t.progress;
document.getElementById('headline').textContent=t.headline;
document.getElementById('subHeadline').textContent=t.sub;
document.getElementById('providerLabel').textContent=t.signedInWith;
document.getElementById('nicknameLabel').textContent=t.nicknameLabel;
document.getElementById('nicknameHint').textContent=t.nicknameHint;
document.getElementById('emailLabel').textContent=t.emailLabel;
document.getElementById('emailHint').textContent=t.emailHint;
document.getElementById('submitLabel').textContent=t.submit;
document.getElementById('legalText').innerHTML=t.legal;
document.getElementById('signOutBtn').textContent=t.signOut;
document.getElementById('homeLink').textContent=t.home;
document.getElementById('nicknameInput').placeholder=t.ph;
document.title=t.headline+' · Lucky Please';

/* --- Stars --- */
(function makeStars(){
    const c=document.getElementById('stars');const frag=document.createDocumentFragment();
    for(let i=0;i<60;i++){
        const s=document.createElement('div');s.className='star';
        s.style.left=(Math.random()*100)+'%';s.style.top=(Math.random()*100)+'%';
        const sz=Math.random()*2+1;s.style.width=sz+'px';s.style.height=sz+'px';
        s.style.setProperty('--dur',(Math.random()*2+2)+'s');
        frag.appendChild(s);
    }
    c.appendChild(frag);
})();

/* --- Elements --- */
const nick=document.getElementById('nicknameInput');
const nickStatus=document.getElementById('nicknameStatus');
const nickMsg=document.getElementById('nicknameMsg');
const emailI=document.getElementById('emailInput');
const submitBtn=document.getElementById('submitBtn');
const submitLabel=document.getElementById('submitLabel');
const overlay=document.getElementById('loadingOverlay');
const avatarEl=document.getElementById('avatarEl');
const providerName=document.getElementById('providerName');
const providerEmail=document.getElementById('providerEmail');

function setOverlay(on){overlay.classList.toggle('on',!!on)}
function setStatus(state){
    nickStatus.className='field-status'+(state?' '+state:'');
    if(state==='loading')nickStatus.innerHTML='<span class="spinner"></span>';
    else if(state==='ok')nickStatus.innerHTML='✓';
    else if(state==='err')nickStatus.innerHTML='✕';
    else nickStatus.innerHTML='';
}
function setMsg(text,cls){
    nickMsg.className='field-msg'+(cls?' '+cls:'');
    nickMsg.textContent=text||'';
}

/* --- Initial state: resolve auth + prefill --- */
setOverlay(true);
let currentUser=null;
let currentProfile=null;
(async function init(){
    try {
        const state=await ensureProfile({force:true});
        if(!state.signedIn){
            /* Not logged in → bounce back to auth. */
            location.replace('/auth/?next='+encodeURIComponent('/auth/setup/'));
            return;
        }
        currentUser=state.authUser;
        currentProfile=state.profile;
        /* OAuth metadata: Google returns full_name, picture, email.
           Kakao returns nickname, profile_image. Prefer explicit
           provider fields then generic metadata. */
        const meta=currentUser.user_metadata||{};
        const provider=currentUser.app_metadata?.provider||'google';
        const providerLabelMap={google:'Google',kakao:'KakaoTalk',facebook:'Facebook',discord:'Discord',apple:'Apple'};
        providerName.textContent=providerLabelMap[provider]||provider;
        providerEmail.textContent=currentUser.email||'';
        /* Avatar: OAuth picture if present, otherwise initials. */
        const picture=meta.picture||meta.avatar_url||meta.profile_image||null;
        if(picture){
            avatarEl.innerHTML='<img alt="" referrerpolicy="no-referrer" src="'+picture.replace(/"/g,'&quot;')+'">';
        }else{
            const seed=(meta.full_name||meta.name||meta.nickname||currentUser.email||'?').trim();
            avatarEl.textContent=(seed[0]||'?').toUpperCase();
        }
        /* Prefill nickname: existing profile → email prefix → OAuth name */
        const suggestedNick=(currentProfile&&currentProfile.nickname)
            ||(meta.nickname||'').trim()
            ||(meta.full_name||meta.name||'').trim().split(/\s+/)[0]
            ||(currentUser.email||'').split('@')[0]
            ||'';
        if(suggestedNick){
            /* Strip to allowed charset so the checker doesn't immediately
               complain about a prefilled name with e.g. spaces. */
            const cleaned=suggestedNick.replace(/[^A-Za-z0-9_\-가-힣]/g,'').slice(0,20);
            if(cleaned.length>=2){nick.value=cleaned;scheduleCheck()}
        }
        /* Prefill email. */
        emailI.value=(currentProfile&&currentProfile.email)||currentUser.email||'';
        nick.focus();
    } catch (e) {
        console.error('[setup init]',e);
        setMsg(t.msg_error,'err');
    } finally {
        setOverlay(false);
    }
})();

/* --- Live availability check ---
   Two guards to keep the submit button from spuriously disabling:
     (a) If the value hasn't changed since the last successful check,
         return early — the button should stay enabled.
     (b) Only listen to `input` events. A `blur` listener was the old
         source of the "두 번 클릭해야 submit" bug: clicking the submit
         button fires blur on the nickname input first, which re-ran
         the availability check and disabled the button during the
         300 ms debounce — so the click landed on a disabled button
         and did nothing. */
let checkTimer=null;
let checkSeq=0;
let lastValidatedValue=null;
function scheduleCheck(){
    clearTimeout(checkTimer);
    const val=nick.value.trim();
    if(val===lastValidatedValue && !submitBtn.disabled) return;  /* already green, no flicker */
    submitBtn.disabled=true;
    if(!val){setStatus(null);setMsg('',null);return}
    setStatus('loading');setMsg(t.msg_checking,null);
    const mySeq=++checkSeq;
    checkTimer=setTimeout(async function(){
        const res=await checkNicknameAvailable(val);
        if(mySeq!==checkSeq)return;
        if(res.available){
            setStatus('ok');setMsg(t.msg_available,'ok');
            submitBtn.disabled=false;
            lastValidatedValue=val;
        }else{
            setStatus('err');
            const key='msg_'+(res.reason||'invalid');
            setMsg(t[key]||t.msg_invalid,'err');
            submitBtn.disabled=true;
            lastValidatedValue=null;
        }
    },300);
}
nick.addEventListener('input',scheduleCheck);

/* --- Submit --- */
document.getElementById('setupForm').addEventListener('submit',async function(e){
    e.preventDefault();
    if(submitBtn.disabled)return;
    submitBtn.disabled=true;
    submitLabel.textContent=t.submitSaving;
    setOverlay(true);
    try {
        const res=await saveProfile({
            nickname:nick.value.trim(),
            email:emailI.value.trim(),
            avatar_url:(currentUser.user_metadata||{}).picture||null
        });
        if(!res.ok){
            setOverlay(false);submitBtn.disabled=false;submitLabel.textContent=t.submit;
            const key='msg_'+(res.error||'invalid');
            setMsg(t[key]||t.msg_error,'err');setStatus('err');
            return;
        }
        /* Success: redirect to the ?next= page (set by earlier guard)
           or the home page by default. */
        const params=new URLSearchParams(location.search);
        const next=params.get('next')||'/';
        /* Validate next is same-origin to avoid open-redirect. */
        const safeNext=/^\/[^\/]/.test(next)?next:'/';
        location.replace(safeNext);
    } catch (e) {
        console.error('[setup submit]',e);
        setOverlay(false);submitBtn.disabled=false;submitLabel.textContent=t.submit;
        setMsg(t.msg_error,'err');
    }
});

/* --- Sign out --- */
document.getElementById('signOutBtn').addEventListener('click',async function(){
    setOverlay(true);
    try { await signOut(); } catch(_){}
    try { clearProfileCache(); } catch(_){}
    location.replace('/auth/');
});
    </script>
</body>
