    <title>Admin · Lucky Please</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
:root{--dark:#0A0A1A;--panel-br:rgba(255,255,255,.07);--muted:rgba(255,255,255,.55);--muted-2:rgba(255,255,255,.3)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--dark);color:#fff;min-height:100dvh;letter-spacing:.01em}
.wrap{max-width:1200px;margin:0 auto;padding:24px 20px 80px}
header.topbar{display:flex;align-items:center;gap:12px;padding:12px 0 22px;border-bottom:1px solid var(--panel-br);margin-bottom:20px}
header.topbar .brand{font-family:'Orbitron','Noto Sans KR',sans-serif;font-size:1.2em;font-weight:900;letter-spacing:.04em;background:linear-gradient(135deg,#FFE66D 0%,#FF9A3C 50%,#FF6B8B 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header.topbar .label{font-family:'Orbitron',sans-serif;letter-spacing:.14em;text-transform:uppercase;font-size:.72em;color:#FF6B8B;padding:4px 10px;border:1px solid rgba(255,107,139,.35);border-radius:999px;background:rgba(255,107,139,.08)}
header.topbar nav{margin-left:auto;display:flex;gap:4px}
header.topbar nav button{padding:8px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:rgba(255,255,255,.7);cursor:pointer;font-family:inherit;font-size:.82em;font-weight:700;letter-spacing:.02em;transition:all .18s}
header.topbar nav button.active{background:rgba(255,230,109,.1);border-color:rgba(255,230,109,.35);color:#FFE66D}
header.topbar nav button:hover:not(.active){background:rgba(255,255,255,.06)}
header.topbar .home-link{color:rgba(255,255,255,.5);text-decoration:none;font-size:.82em;padding:8px 12px;border-radius:10px;transition:all .18s}
header.topbar .home-link:hover{background:rgba(255,255,255,.06);color:#fff}

.tools{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.tools input{flex:1;min-width:200px;padding:11px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:#fff;font-family:inherit;font-size:.9em;outline:none}
.tools input:focus{border-color:rgba(255,230,109,.45);background:rgba(255,255,255,.05)}
.tools .count{font-size:.78em;color:var(--muted-2);font-variant-numeric:tabular-nums}

.user-table{background:rgba(14,14,28,.5);border:1px solid var(--panel-br);border-radius:14px;overflow:hidden}
.user-row{display:grid;grid-template-columns:52px 1.3fr 1.4fr 90px 140px auto;gap:14px;align-items:center;padding:12px 18px;border-bottom:1px solid var(--panel-br);transition:background .15s}
.user-row:last-child{border-bottom:0}
.user-row:hover{background:rgba(255,255,255,.02)}
.user-row.banned{background:rgba(255,51,102,.06)}
.user-row.banned:hover{background:rgba(255,51,102,.1)}
.user-row.self{border-left:3px solid #FFE66D;padding-left:15px}
.u-av{width:44px;height:44px;border-radius:50%;overflow:hidden;background:linear-gradient(135deg,#FF6B35,#FF6B8B);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-weight:900;color:#fff;font-size:.9em;flex-shrink:0;position:relative}
.u-av img{width:100%;height:100%;object-fit:cover}
.u-ident .nick{font-weight:700;font-size:.96em}
.u-ident .sub{font-size:.72em;color:var(--muted-2);margin-top:2px;font-variant-numeric:tabular-nums}
.u-email{font-size:.82em;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.u-role{font-size:.72em;letter-spacing:.1em;text-transform:uppercase;font-weight:800;padding:3px 10px;border-radius:999px;text-align:center}
.u-role.user{background:rgba(255,255,255,.04);color:rgba(255,255,255,.55)}
.u-role.admin{background:rgba(0,217,255,.14);color:#00D9FF}
.u-role.super_admin{background:rgba(255,230,109,.16);color:#FFE66D}
.u-status{font-size:.74em;display:flex;align-items:center;gap:6px}
.u-status .dot{width:8px;height:8px;border-radius:50%;background:#00E676}
.u-status.banned .dot{background:#FF3366}
.u-status.banned{color:#FF6B8B;font-weight:700}
.u-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.u-actions button{padding:6px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#fff;cursor:pointer;font-family:inherit;font-size:.76em;font-weight:700;letter-spacing:.02em;transition:all .15s}
.u-actions button:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2)}
.u-actions button.warn{background:rgba(255,154,60,.1);border-color:rgba(255,154,60,.3);color:#FFB87A}
.u-actions button.warn:hover{background:rgba(255,154,60,.2)}
.u-actions button.danger{background:rgba(255,51,102,.1);border-color:rgba(255,51,102,.35);color:#FF6B8B}
.u-actions button.danger:hover{background:rgba(255,51,102,.2)}
.u-actions button.role-btn{background:rgba(255,230,109,.08);border-color:rgba(255,230,109,.28);color:#FFE66D}
.u-actions button.role-btn:hover{background:rgba(255,230,109,.16)}

.empty{padding:44px 20px;text-align:center;color:var(--muted-2);font-size:.9em}

/* Audit log */
.audit-list{background:rgba(14,14,28,.5);border:1px solid var(--panel-br);border-radius:14px;overflow:hidden}
.audit-row{display:grid;grid-template-columns:130px 120px 1fr 180px;gap:14px;align-items:center;padding:12px 18px;border-bottom:1px solid var(--panel-br);font-size:.86em}
.audit-row:last-child{border-bottom:0}
.audit-ts{font-size:.78em;color:var(--muted-2);font-variant-numeric:tabular-nums}
.audit-action{font-size:.72em;letter-spacing:.1em;text-transform:uppercase;font-weight:800;padding:3px 10px;border-radius:999px;background:rgba(255,230,109,.08);color:#FFE66D;text-align:center;width:fit-content}
.audit-action.delete_user{background:rgba(255,51,102,.12);color:#FF6B8B}
.audit-action.ban_user{background:rgba(255,154,60,.12);color:#FFB87A}
.audit-action.unban_user{background:rgba(0,230,118,.12);color:#00E676}
.audit-action.set_role{background:rgba(0,217,255,.14);color:#00D9FF}
.audit-meta{font-size:.8em;color:rgba(255,255,255,.7);word-break:break-word}
.audit-meta .k{color:var(--muted-2);margin-right:4px}
.audit-actors{font-size:.8em;color:rgba(255,255,255,.65);line-height:1.45}
.audit-actors .by{color:var(--muted-2);font-size:.92em}

/* Modals */
.modal{position:fixed;inset:0;background:rgba(5,5,15,.7);backdrop-filter:blur(5px);display:none;align-items:center;justify-content:center;padding:16px;z-index:1000}
.modal.on{display:flex}
.modal-card{background:linear-gradient(160deg,rgba(22,22,42,.98),rgba(12,12,28,1));border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:22px 24px;max-width:440px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.6)}
.modal-card h3{font-size:1.04em;margin-bottom:8px;font-weight:800}
.modal-card p{font-size:.9em;color:var(--muted);line-height:1.55;margin-bottom:14px}
.modal-card textarea{width:100%;min-height:72px;padding:11px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:#fff;font-family:inherit;font-size:.88em;resize:vertical;margin-bottom:14px;outline:none}
.modal-card textarea:focus{border-color:rgba(255,230,109,.45)}
.modal-card .row{display:flex;gap:10px;justify-content:flex-end}
.modal-card button{padding:9px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#fff;cursor:pointer;font-family:inherit;font-size:.86em;font-weight:700;transition:all .15s}
.modal-card button:hover{background:rgba(255,255,255,.1)}
.modal-card button.primary{background:#FFE66D;border-color:#FFE66D;color:#0A0A1A}
.modal-card button.primary:hover{filter:brightness(1.08)}
.modal-card button.danger{background:linear-gradient(135deg,#FF3366,#FF6B8B);border-color:transparent;color:#fff}
.modal-card button.danger:hover{filter:brightness(1.08)}

.denied{max-width:440px;margin:80px auto;padding:40px 28px;text-align:center;background:linear-gradient(165deg,rgba(22,22,42,.72),rgba(12,12,28,.88));border:1px solid rgba(255,255,255,.06);border-radius:18px}
.denied h1{font-family:'Orbitron',sans-serif;font-size:1.4em;margin-bottom:10px;background:linear-gradient(135deg,#FFE66D,#FF6B8B);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.denied p{color:var(--muted);margin-bottom:16px}
.denied a{display:inline-block;padding:10px 22px;background:rgba(255,255,255,.06);border-radius:10px;color:#fff;text-decoration:none;font-weight:700;font-size:.88em}

@media(max-width:760px){
    .user-row{grid-template-columns:44px 1fr auto;gap:10px;padding:10px 14px}
    .user-row .u-email,.user-row .u-role,.user-row .u-status{display:none}
    .audit-row{grid-template-columns:1fr;gap:6px}
    header.topbar{flex-wrap:wrap}
    header.topbar nav{order:3;width:100%;margin-left:0}
}
    </style>
    <script src="/vendor/supabase.min.js"></script>
</head>
<body>

<div id="deniedRoot" class="denied" style="display:none">
    <h1>관리자 전용</h1>
    <p id="deniedMsg">이 페이지는 관리자 권한이 있는 계정만 접근할 수 있어요.</p>
    <a href="/">홈으로</a>
</div>

<div class="wrap" id="appWrap" style="display:none">
    <header class="topbar">
        <a href="/" class="brand">Lucky Please</a>
        <span class="label">ADMIN</span>
        <nav>
            <button data-pane="users" class="active">👥 사용자</button>
            <button data-pane="audit">📜 감사 로그</button>
        </nav>
        <a href="/" class="home-link">← 홈</a>
    </header>

    <section id="paneUsers">
        <div class="tools">
            <input id="userSearch" type="search" placeholder="닉네임 · 이메일로 검색 (접두사 매치)" autocomplete="off">
            <span class="count" id="userCount"></span>
        </div>
        <div class="user-table" id="userTable"><div class="empty">불러오는 중…</div></div>
    </section>

    <section id="paneAudit" style="display:none">
        <div class="tools">
            <span class="count" id="auditCount"></span>
        </div>
        <div class="audit-list" id="auditList"><div class="empty">불러오는 중…</div></div>
    </section>
</div>

<!-- Ban modal -->
<div class="modal" id="banModal">
    <div class="modal-card">
        <h3>계정 밴</h3>
        <p id="banWho">사용자 밴</p>
        <textarea id="banReason" placeholder="밴 사유 (선택, 500자 이내)"></textarea>
        <div class="row">
            <button id="banCancel">취소</button>
            <button id="banConfirm" class="danger">밴 적용</button>
        </div>
    </div>
</div>

<!-- Delete modal -->
<div class="modal" id="delModal">
    <div class="modal-card">
        <h3 style="color:#FF6B8B">계정 영구 삭제</h3>
        <p id="delWho"></p>
        <p style="color:#FFB87A">이 작업은 <b>되돌릴 수 없어요</b>. 메시지·친구·그룹방 전부 삭제돼요. 확실하면 계속 진행.</p>
        <div class="row">
            <button id="delCancel">취소</button>
            <button id="delConfirm" class="danger">영구 삭제</button>
        </div>
    </div>
</div>

<!-- Role modal -->
<div class="modal" id="roleModal">
    <div class="modal-card">
        <h3>역할 변경</h3>
        <p id="roleWho"></p>
        <div class="row" style="gap:8px;flex-direction:column">
            <button data-new-role="user" style="justify-content:flex-start;text-align:left;padding:10px 14px">일반 유저 (user)</button>
            <button data-new-role="admin" style="justify-content:flex-start;text-align:left;padding:10px 14px">관리자 (admin)</button>
            <button data-new-role="super_admin" style="justify-content:flex-start;text-align:left;padding:10px 14px">최고 관리자 (super_admin)</button>
        </div>
        <div class="row" style="margin-top:14px">
            <button id="roleCancel">취소</button>
        </div>
    </div>
</div>

<script src="/js/supabase-config.js?v=1778069601"></script>
<script>
const $=(id)=>document.getElementById(id);
let me=null, users=[], audit=[], currentTab='users';
let banTarget=null, delTarget=null, roleTarget=null;

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function initials(n){return (n||'?').trim()[0]?.toUpperCase()||'?'}
function fmtTs(ts){if(!ts)return '';const d=new Date(ts);return d.toLocaleString('ko-KR',{year:'2-digit',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}

async function init(){
    const user=await getUser();
    if(!user){location.replace('/auth/?next='+encodeURIComponent('/admin/'));return}
    const { data: prof, error } = await getSupabase().from('profiles').select('id, nickname, role').eq('id',user.id).maybeSingle();
    if(error || !prof || !['admin','super_admin'].includes(prof.role)){
        $('deniedRoot').style.display='block';
        if(prof && prof.nickname){
            $('deniedMsg').textContent = prof.nickname+'님, 이 페이지는 관리자 권한이 있는 계정만 접근할 수 있어요.';
        }
        return;
    }
    me=prof;
    $('appWrap').style.display='block';
    wireEvents();
    await loadUsers();
}

function wireEvents(){
    document.querySelectorAll('header.topbar nav button').forEach(b=>{
        b.addEventListener('click',()=>{
            document.querySelectorAll('header.topbar nav button').forEach(x=>x.classList.remove('active'));
            b.classList.add('active');
            currentTab=b.dataset.pane;
            $('paneUsers').style.display=currentTab==='users'?'block':'none';
            $('paneAudit').style.display=currentTab==='audit'?'block':'none';
            if(currentTab==='audit'&&!audit.length)loadAudit();
        });
    });
    let searchTimer=null;
    $('userSearch').addEventListener('input',()=>{
        clearTimeout(searchTimer);
        searchTimer=setTimeout(loadUsers,220);
    });
    $('banCancel').addEventListener('click',()=>$('banModal').classList.remove('on'));
    $('banConfirm').addEventListener('click',confirmBan);
    $('delCancel').addEventListener('click',()=>$('delModal').classList.remove('on'));
    $('delConfirm').addEventListener('click',confirmDelete);
    $('roleCancel').addEventListener('click',()=>$('roleModal').classList.remove('on'));
    document.querySelectorAll('#roleModal button[data-new-role]').forEach(b=>{
        b.addEventListener('click',()=>confirmRole(b.dataset.newRole));
    });
    [$('banModal'),$('delModal'),$('roleModal')].forEach(m=>{
        m.addEventListener('click',(e)=>{if(e.target===m)m.classList.remove('on')});
    });
}

async function loadUsers(){
    const q=$('userSearch').value.trim();
    $('userTable').innerHTML='<div class="empty">불러오는 중…</div>';
    const { data, error } = await getSupabase().rpc('admin_list_users',{p_query:q,p_limit:100,p_offset:0});
    if(error){
        $('userTable').innerHTML='<div class="empty">불러오기 실패: '+esc(error.message)+'</div>';
        return;
    }
    users=data||[];
    $('userCount').textContent=users.length+' 명';
    if(!users.length){$('userTable').innerHTML='<div class="empty">결과 없음</div>';return}
    $('userTable').innerHTML=users.map(userRow).join('');
    $('userTable').querySelectorAll('[data-act]').forEach(b=>{
        b.addEventListener('click',()=>{
            const uid=b.dataset.uid, act=b.dataset.act;
            const u=users.find(x=>x.id===uid);
            if(!u)return;
            if(act==='ban')    openBan(u);
            else if(act==='unban') doUnban(u);
            else if(act==='delete')openDelete(u);
            else if(act==='role')  openRole(u);
        });
    });
}

function userRow(u){
    const isMe=u.id===me.id;
    const banned=!!u.banned_at;
    const av=u.avatar_url
        ? '<div class="u-av"><img src="'+esc(u.avatar_url)+'" referrerpolicy="no-referrer" alt=""></div>'
        : '<div class="u-av">'+esc(initials(u.nickname))+'</div>';
    const created=u.created_at?fmtTs(u.created_at):'';
    const last=u.last_seen_at?'최근 '+fmtTs(u.last_seen_at):'';
    const roleLabel={user:'USER',admin:'ADMIN',super_admin:'SUPER'}[u.role]||'USER';
    const statusHtml = banned
        ? '<div class="u-status banned"><span class="dot"></span>밴됨</div>'
        : '<div class="u-status"><span class="dot"></span>정상</div>';
    /* Action buttons: ban/unban + delete for everyone except self;
       role-change only for super_admin; target=admin protection handled
       server-side so the button is fine to render either way. */
    let actions='';
    if(!isMe){
        if(banned) actions+='<button data-act="unban" data-uid="'+esc(u.id)+'">언밴</button>';
        else       actions+='<button class="warn" data-act="ban" data-uid="'+esc(u.id)+'">밴</button>';
        actions+='<button class="danger" data-act="delete" data-uid="'+esc(u.id)+'">삭제</button>';
        if(me.role==='super_admin')actions+='<button class="role-btn" data-act="role" data-uid="'+esc(u.id)+'">역할</button>';
    } else {
        actions='<span style="font-size:.72em;color:rgba(255,255,255,.3);font-style:italic">본인</span>';
    }
    const subParts=[];
    if(created)subParts.push('가입 '+created);
    if(last)subParts.push(last);
    return '<div class="user-row'+(banned?' banned':'')+(isMe?' self':'')+'">'
        +av
        +'<div class="u-ident"><div class="nick">'+esc(u.nickname||'(?)')+'</div>'
            +'<div class="sub">'+esc(subParts.join(' · '))+'</div></div>'
        +'<div class="u-email">'+esc(u.email||'')+'</div>'
        +'<div class="u-role '+esc(u.role||'user')+'">'+esc(roleLabel)+'</div>'
        +statusHtml
        +'<div class="u-actions">'+actions+'</div>'
        +'</div>';
}

function openBan(u){
    banTarget=u;
    $('banWho').textContent=u.nickname+' 를 밴할게요. 메시지·초대 등 모든 쓰기 권한이 차단돼요.';
    $('banReason').value=u.ban_reason||'';
    $('banModal').classList.add('on');
}
async function confirmBan(){
    if(!banTarget)return;
    $('banConfirm').disabled=true;
    const reason=$('banReason').value.trim();
    const { data, error } = await getSupabase().rpc('admin_ban_user',{p_target:banTarget.id,p_reason:reason||null});
    $('banConfirm').disabled=false;
    if(error){alert('실패: '+error.message);return}
    $('banModal').classList.remove('on');
    banTarget=null;
    await loadUsers();
}
async function doUnban(u){
    if(!confirm(u.nickname+' 밴 해제할까요?'))return;
    const { error } = await getSupabase().rpc('admin_unban_user',{p_target:u.id});
    if(error){alert('실패: '+error.message);return}
    await loadUsers();
}
function openDelete(u){
    delTarget=u;
    $('delWho').innerHTML='<b>'+esc(u.nickname)+'</b> · '+esc(u.email||'');
    $('delModal').classList.add('on');
}
async function confirmDelete(){
    if(!delTarget)return;
    $('delConfirm').disabled=true;
    const { error } = await getSupabase().rpc('admin_delete_user',{p_target:delTarget.id});
    $('delConfirm').disabled=false;
    if(error){alert('실패: '+error.message);return}
    $('delModal').classList.remove('on');
    delTarget=null;
    await loadUsers();
}
function openRole(u){
    roleTarget=u;
    $('roleWho').innerHTML='<b>'+esc(u.nickname)+'</b> 의 역할 바꾸기 (현재: <b>'+esc(u.role)+'</b>)';
    $('roleModal').classList.add('on');
}
async function confirmRole(newRole){
    if(!roleTarget)return;
    if(roleTarget.role===newRole){$('roleModal').classList.remove('on');return}
    const { error } = await getSupabase().rpc('admin_set_role',{p_target:roleTarget.id,p_new_role:newRole});
    if(error){alert('실패: '+error.message);return}
    $('roleModal').classList.remove('on');
    roleTarget=null;
    await loadUsers();
}

async function loadAudit(){
    $('auditList').innerHTML='<div class="empty">불러오는 중…</div>';
    const { data, error } = await getSupabase().rpc('admin_get_audit_log',{p_limit:200,p_offset:0});
    if(error){$('auditList').innerHTML='<div class="empty">실패: '+esc(error.message)+'</div>';return}
    audit=data||[];
    $('auditCount').textContent=audit.length+' 건';
    if(!audit.length){$('auditList').innerHTML='<div class="empty">감사 로그가 비어있어요</div>';return}
    $('auditList').innerHTML=audit.map(auditRow).join('');
}
function auditRow(a){
    const m=a.metadata||{};
    let meta='';
    if(a.action==='ban_user'&&m.reason)meta='<span class="k">사유:</span>'+esc(m.reason);
    else if(a.action==='set_role')meta='<span class="k">'+esc(m.from||'?')+'</span> → <b>'+esc(m.to||'?')+'</b>';
    else if(a.action==='delete_user'&&m.nickname)meta='<span class="k">삭제됨:</span>'+esc(m.nickname)+(m.email?' ('+esc(m.email)+')':'');
    else meta=Object.entries(m).map(([k,v])=>'<span class="k">'+esc(k)+':</span>'+esc(typeof v==='object'?JSON.stringify(v):v)).join(' · ');
    return '<div class="audit-row">'
        +'<div class="audit-ts">'+esc(fmtTs(a.created_at))+'</div>'
        +'<div class="audit-action '+esc(a.action)+'">'+esc(a.action)+'</div>'
        +'<div class="audit-meta">'+(meta||'<span style="color:var(--muted-2)">—</span>')+'</div>'
        +'<div class="audit-actors">'
            +(a.admin_nickname?'<span class="by">by</span> '+esc(a.admin_nickname):'')
            +(a.target_nickname?'<br><span class="by">→</span> '+esc(a.target_nickname):'')
        +'</div>'
        +'</div>';
}

init();
</script>

<script>
if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(r=>r.forEach(s=>s.unregister())).catch(()=>{})}
if('caches' in window){caches.keys().then(k=>k.forEach(n=>caches.delete(n))).catch(()=>{})}
</script>
