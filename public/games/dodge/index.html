    <style>
/* ================================================================
   Mobile portrait — PRIMARY design target.
   Tablet landscape + desktop are progressive enhancements via
   min-width media queries at the bottom.
   ================================================================ */
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --dark:#050518;--cyan:#00D9FF;--danger:#FF3366;
    --success:#00E676;--accent:#9C6FFF;
    --muted:rgba(255,255,255,.55);--muted-2:rgba(255,255,255,.35);
    --panel-br:rgba(255,255,255,.07);
    --sb-bottom: env(safe-area-inset-bottom, 0px);
}
html,body{height:100%;overscroll-behavior:none}
body{
    font-family:'Noto Sans KR',sans-serif;background:var(--dark);color:#fff;
    min-height:100dvh;overflow-x:hidden;letter-spacing:.01em;
    background-image:radial-gradient(ellipse at 50% 20%,rgba(0,217,255,.04) 0%,transparent 55%),linear-gradient(180deg,#050518 0%,#0a0a22 50%,#050518 100%);
    -webkit-tap-highlight-color:transparent;
    user-select:none;-webkit-user-select:none
}

/* ---- Topbar ---- */
.topbar{
    display:flex;align-items:center;gap:10px;
    padding:10px 14px;
    position:sticky;top:0;z-index:10;
    background:rgba(5,5,24,.88);backdrop-filter:blur(14px);
    border-bottom:1px solid var(--panel-br)
}
.topbar .home{text-decoration:none;color:rgba(255,255,255,.8);padding:7px 11px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);font-size:.78em;font-weight:700}
.topbar h1{font-family:'Orbitron','Noto Sans KR',sans-serif;font-size:1em;font-weight:900;margin:0;flex:1;text-align:center;background:linear-gradient(135deg,#00D9FF,#9C6FFF,#FF3366);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar .slot{min-width:64px;text-align:right}
.topbar .auth-chip{padding:5px 10px;border-radius:999px;background:rgba(0,217,255,.1);border:1px solid rgba(0,217,255,.25);color:#00D9FF;font-size:.72em;font-weight:700;text-decoration:none;white-space:nowrap}
.topbar .lb-btn{padding:6px 10px;border-radius:10px;background:rgba(0,217,255,.08);border:1px solid rgba(0,217,255,.3);color:#00D9FF;font-size:.78em;font-weight:800;cursor:pointer;font-family:inherit}
.topbar .lb-btn:active{background:rgba(0,217,255,.16)}

/* ---- Main column (phone) ---- */
.wrap{
    display:flex;flex-direction:column;align-items:center;gap:10px;
    padding:10px 12px calc(var(--sb-bottom) + 14px);
    max-width:460px;margin:0 auto
}
.left-col{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%}

/* ---- Time strip ---- */
.score-strip{
    display:grid;grid-template-columns:repeat(2,1fr);gap:8px;width:100%
}
/* 라벨과 숫자가 같은 줄에 — flex-row + baseline 정렬. 좁은 폰에서도
   "TIME 0:42:33" 한 줄로 안 잘리게 폰트 살짝 축소 (1.55em → 1.32em)
   + 패딩도 컴팩트화. score-strip 자체 높이 ~14px 줄어 control-row 가
   하단에 잘리는 것도 같이 완화된다. */
.ss{
    background:linear-gradient(165deg,rgba(22,22,42,.55),rgba(12,12,28,.8));
    border:1px solid var(--panel-br);border-radius:14px;
    padding:8px 8px;min-height:44px;
    display:flex;flex-direction:row;align-items:baseline;justify-content:center;
    gap:7px;white-space:nowrap;overflow:hidden;
}
/* HUD 숫자 — JetBrains Mono (진짜 monospace). Orbitron 은 tabular-nums
   설정해도 글리프 폭이 미세하게 달라 시간 카운트 시 좌우로 진동 발생.
   Tetris HUD 와 동일한 안정화 로직 — 자릿수 변해도 폭 일정. */
.ss .v{
    font-family:'JetBrains Mono','Roboto Mono','Consolas','Courier New',monospace;
    font-size:1.32em;font-weight:800;line-height:1;color:#fff;
    font-variant-numeric:tabular-nums;
    font-feature-settings:'tnum' 1, 'lnum' 1;
    white-space:nowrap;
}
.ss .v.best{color:#00D9FF}
.ss .l{font-size:.62em;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);font-weight:800;line-height:1;flex-shrink:0}

/* ---- Game control bar (visible during play across all viewports) ----
   Desktop already has Space/keyboard pause; phones + tablets did not
   expose any pause UI, so the kbd-only hint felt unfair to mobile. The
   bar mounts between score-strip and canvas, hidden until startGame()
   activates it and hidden again on game over. */
.game-ctrl{display:none;align-items:center;justify-content:center;width:100%;max-width:360px;gap:10px;margin:-2px 0 0}
.game-ctrl.on{display:flex}
.ctrl-btn{padding:8px 20px;border-radius:999px;background:rgba(0,217,255,.1);border:1px solid rgba(0,217,255,.42);color:#00D9FF;font-size:.85em;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:.04em;display:inline-flex;align-items:center;gap:6px;line-height:1}
.ctrl-btn:active{background:rgba(0,217,255,.22);transform:translateY(1px)}

/* ---- Control row — 우주선 콕핏 패널보드 ----
   기본 배치: [트랙패드 LEFT] [버튼 stack RIGHT].
   .control-row.steer-right 클래스로 좌우 반전 (조향 우측 모드).
   너비는 canvas (max-width 360) 와 동일하게 매칭 — 일체감.
   배경: 어두운 메탈 그라디언트 + 옅은 cyan 그리드 라인 (콕핏 HUD 느낌). */
.control-row{
    display:none;align-items:center;justify-content:space-between;
    width:100%;max-width:360px;flex-shrink:0;
    padding:14px 16px;border-radius:16px;
    background:
        linear-gradient(165deg,rgba(15,18,28,.96) 0%,rgba(8,10,16,.99) 100%);
    border:2px solid rgba(0,217,255,.18);
    box-shadow:
        0 8px 24px -10px rgba(0,217,255,.18),
        inset 0 1px 0 rgba(255,255,255,.06),
        inset 0 -1px 0 rgba(0,0,0,.45);
    position:relative;overflow:hidden;
    -webkit-user-select:none;user-select:none;
}
.control-row.on{display:flex}
/* 좌우 반전 (조향 우측 모드) — flex 방향만 뒤집어서 트랙패드/버튼이 정확히
   거울 대칭. inner 정렬 안 변하니 트랙패드 원형/버튼 stack 의 시각이 그대로 유지. */
.control-row.steer-right{flex-direction:row-reverse}
/* 패널 그리드 라인 — pseudo overlay. 24px 격자, 옅은 cyan, 안쪽으로만. */
.control-row::before{
    content:'';position:absolute;inset:0;border-radius:14px;pointer-events:none;
    background-image:
        linear-gradient(to right, rgba(0,217,255,.06) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0,217,255,.06) 1px, transparent 1px);
    background-size:24px 24px;background-position:0 0;
    opacity:.85;
    /* 패널 가장자리는 그리드 fade — 가운데가 가장 진하게 */
    mask-image:radial-gradient(ellipse at 50% 50%, #000 0%, #000 60%, transparent 100%);
    -webkit-mask-image:radial-gradient(ellipse at 50% 50%, #000 0%, #000 60%, transparent 100%);
}
/* 패널 좌우 corner rivet 4 개 — 콕핏 디테일 */
.control-row::after{
    content:'';position:absolute;inset:0;border-radius:14px;pointer-events:none;
    background-image:
        radial-gradient(circle at 8px 8px, rgba(0,217,255,.3) 0 1.5px, transparent 2px),
        radial-gradient(circle at calc(100% - 8px) 8px, rgba(0,217,255,.3) 0 1.5px, transparent 2px),
        radial-gradient(circle at 8px calc(100% - 8px), rgba(0,217,255,.3) 0 1.5px, transparent 2px),
        radial-gradient(circle at calc(100% - 8px) calc(100% - 8px), rgba(0,217,255,.3) 0 1.5px, transparent 2px);
}
/* 버튼 영역 — 위 row 슬롯 3 개, 아래 GRAV 1 개. 가운데 정렬. */
.left-controls{
    display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0;
    position:relative;z-index:1;
    -webkit-tap-highlight-color:transparent;
}
.slot-row{
    display:flex;flex-direction:row;gap:6px;
}
/* 공통 버튼 base — 정사각형 + 라운드 모서리 + 입체 (눌림 피드백 강함) */
.left-controls .item-slot,
.left-controls .grav-btn{
    width:48px;height:48px;
    border-radius:11px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;font-family:inherit;
    flex-shrink:0;padding:0;min-height:0;
    border:none;
    position:relative;
    transition:transform .08s ease-out, box-shadow .12s ease-out, background .12s;
    -webkit-tap-highlight-color:transparent;
    touch-action:manipulation;
}
/* GRAV 버튼만 가로로 좀 더 넓게 — 슬롯 3 개 × 48 + gap 6×2 = 156 만큼.
   가독성/탭하기 쉬움. 텍스트 라벨 가로 확장으로 옆에 'HOLD' 스타일 표시. */
.left-controls .grav-btn{
    width:auto;min-width:120px;padding:0 16px;
}
/* 인벤토리 슬롯 — 어두운 메탈 + 외부 그림자 (떠있는 느낌) */
.left-controls .item-slot{
    background:linear-gradient(165deg,#3a4150 0%,#1c2030 50%,#0f1320 100%);
    color:#fff;font-size:1.5em;font-weight:900;line-height:1;
    text-shadow:0 0 8px currentColor;
    box-shadow:
        /* 위쪽 highlight (떠있는 광택) */
        inset 0 1px 0 rgba(255,255,255,.22),
        /* 아래쪽 inner shadow (입체감) */
        inset 0 -2px 4px rgba(0,0,0,.55),
        /* 외부 — 패널 위에 떠있는 듯한 drop shadow */
        0 3px 5px rgba(0,0,0,.55),
        0 1px 0 rgba(255,255,255,.04);
}
.left-controls .item-slot.empty{
    background:linear-gradient(165deg,#1a1d28 0%,#0e1018 50%,#080a12 100%);
    color:rgba(255,255,255,.16);
    cursor:default;
    /* 빈 슬롯은 살짝 inset (눌린 듯) */
    box-shadow:
        inset 0 2px 3px rgba(0,0,0,.6),
        inset 0 -1px 0 rgba(255,255,255,.03),
        0 1px 0 rgba(255,255,255,.03);
    text-shadow:none;
}
/* 인벤토리 슬롯 안의 SVG (현재는 mini 아이템 = F-117) — 슬롯 크기에 맞게 비례.
   filter: drop-shadow 로 emoji 의 text-shadow 와 동등한 글로우 효과. */
.left-controls .item-slot svg{
    width:74%;height:74%;display:block;
    filter:drop-shadow(0 0 4px rgba(0,217,255,0.55));
}
.left-controls .item-slot:not(.empty):hover{
    transform:translateY(-1px);
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.28),
        inset 0 -2px 4px rgba(0,0,0,.55),
        0 5px 10px -2px rgba(0,0,0,.6),
        0 0 14px -3px currentColor;
}
.left-controls .item-slot:not(.empty):active{
    transform:translateY(2px);
    box-shadow:
        inset 0 2px 4px rgba(0,0,0,.7),
        inset 0 -1px 0 rgba(255,255,255,.06),
        0 1px 1px rgba(0,0,0,.4),
        0 0 8px -2px currentColor;
}
/* GRAV 버튼 — 노란 톤, icon + label 가로 정렬 (넓어진 폭에 맞춰), 입체 강화 */
.left-controls .grav-btn{
    background:linear-gradient(165deg,#5e4a14 0%,#3a2a08 50%,#241804 100%);
    color:#FFE66D;
    flex-direction:row;gap:8px;
    text-shadow:0 0 6px rgba(255,230,109,.5);
    box-shadow:
        inset 0 1px 0 rgba(255,230,109,.35),
        inset 0 -2px 4px rgba(0,0,0,.6),
        0 3px 5px rgba(0,0,0,.55),
        0 1px 0 rgba(255,230,109,.06);
}
.left-controls .grav-btn:active,
.left-controls .grav-btn.active{
    background:linear-gradient(165deg,#FFE66D 0%,#E0A030 50%,#A06010 100%);
    color:#1a0f00;text-shadow:none;
    transform:translateY(2px);
    box-shadow:
        inset 0 2px 5px rgba(0,0,0,.55),
        inset 0 -1px 0 rgba(255,255,255,.18),
        0 1px 2px rgba(0,0,0,.4),
        0 0 18px -2px rgba(255,230,109,.85),
        0 0 32px -8px rgba(255,154,60,.7);
}
.left-controls .grav-btn .grav-icon{font-size:1.45em;line-height:1;font-weight:900}
.left-controls .grav-btn .grav-label{font-size:.85em;font-weight:900;letter-spacing:.08em}
/* GRAV cooldown — 사용한 시간만큼 재사용 잠김. 회색조 + 진행률 표시
   (CSS conic-gradient 또는 단순 dim). 단순화: dim 처리. */
.left-controls .grav-btn.cooldown{
    opacity:.45;
    filter:grayscale(.6);
    cursor:not-allowed;
    pointer-events:none;
}
/* 쉴드 활성 중 — GRAV 잠금 (쉴드/GRAV 동시 사용 금지). 시각적으로 dim
   처리 + 회색조 + pointer-events:none 으로 클릭 자체 막음. */
.left-controls .grav-btn.disabled{
    opacity:.32;
    filter:grayscale(.8);
    cursor:not-allowed;
    pointer-events:none;
    background:linear-gradient(165deg,#2a2d35 0%,#1a1c22 50%,#0e0f14 100%);
    color:rgba(255,230,109,.45);
    text-shadow:none;
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        inset 0 -2px 4px rgba(0,0,0,.5),
        0 1px 2px rgba(0,0,0,.4);
}
.left-controls .grav-btn.disabled:active,
.left-controls .grav-btn.disabled.active{
    transform:none;
    background:linear-gradient(165deg,#2a2d35 0%,#1a1c22 50%,#0e0f14 100%);
    color:rgba(255,230,109,.45);
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        inset 0 -2px 4px rgba(0,0,0,.5),
        0 1px 2px rgba(0,0,0,.4);
}

/* ---- Canvas ---- */
/* max-height calc 의 deduction 값은:
   topbar 56 + score-strip 44(인라인) + 콕핏 panel 180(트랙패드 148 +
   padding 14*2 + border 4) + gaps 30 + hint ~30 +
   safe-area-inset-bottom 34(iPhone notch) + padding 14
   ≈ 388. 여유 22 두고 410 으로 설정 (3-슬롯 가로 + GRAV 1 줄 구조라
   panel 이 트랙패드 높이 = 148 에 맞춰짐). */
.canvas-wrap{
    position:relative;
    background:#050518;border:2px solid rgba(0,217,255,.22);border-radius:16px;
    box-shadow:0 14px 34px -10px rgba(0,217,255,.18),inset 0 0 40px rgba(0,217,255,.04);
    overflow:hidden;
    aspect-ratio:3/5;
    width:100%;max-width:360px;
    max-height:calc(100dvh - 410px);
    touch-action:none
}
#dodge-canvas{display:block;width:100%;height:100%}

.overlay{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(5,5,24,.82);backdrop-filter:blur(6px);
    padding:18px;text-align:center;transition:opacity .18s;z-index:2
}
.overlay.hidden{opacity:0;pointer-events:none}
/* Intro countdown overlay — 게임 시작 시 3·2·1·GO 카운트다운 + 스토리.
   매 시작마다 6개 후보 중 랜덤 1개. 16개 언어 자동 적용. */
.intro-overlay{
    position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(2,4,16,.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    z-index:3;text-align:center;padding:18px;
    font-family:'Noto Sans KR',sans-serif;
    background-image:radial-gradient(ellipse at 50% 30%,rgba(0,217,255,.08) 0%,transparent 60%);
}
.intro-overlay.on{display:flex}
.intro-count{
    font-family:'Orbitron','Noto Sans KR',sans-serif;
    font-size:5.2em;font-weight:900;line-height:1;color:#00D9FF;
    text-shadow:0 0 20px rgba(0,217,255,.6),0 0 40px rgba(0,217,255,.3),0 0 70px rgba(0,217,255,.15);
    letter-spacing:.04em;
    animation:introPulse .9s cubic-bezier(.2,.7,.3,1) forwards
}
.intro-count.go{color:#FFE66D;font-size:4.5em;text-shadow:0 0 24px rgba(255,230,109,.7),0 0 56px rgba(255,154,60,.45)}
@keyframes introPulse{0%{transform:scale(.4);opacity:0}38%{transform:scale(1.18);opacity:1}100%{transform:scale(1);opacity:.92}}
.intro-story{
    margin-top:28px;color:rgba(255,255,255,.82);
    font-size:.92em;line-height:1.7;letter-spacing:.01em;
    max-width:340px;font-weight:500;
    animation:introFade .8s ease-out;
    /* 텍스트가 너무 글로우 효과를 받지 않게 살짝만 발광 */
    text-shadow:0 0 12px rgba(0,217,255,.18)
}
.intro-story em{font-style:normal;color:#FFE66D;font-weight:700}
@keyframes introFade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:500px){
    .intro-count{font-size:4.2em}
    .intro-count.go{font-size:3.6em}
    .intro-story{font-size:.84em;max-width:300px;margin-top:22px}
}
.overlay h2{font-family:'Orbitron',sans-serif;font-size:1.7em;font-weight:900;margin-bottom:4px}
.overlay h2.go{color:#FF3366}
.overlay h2.play{background:linear-gradient(135deg,#00D9FF,#9C6FFF,#FF3366);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.overlay p{color:rgba(255,255,255,.72);font-size:.86em;margin-bottom:12px;line-height:1.5;max-width:280px}
.overlay .score-big{font-family:'Orbitron',sans-serif;font-size:2.8em;font-weight:900;color:#00D9FF;margin:6px 0;line-height:1}
.overlay .pb{font-size:.84em;color:#00D9FF;margin-bottom:12px;font-weight:700;min-height:1.1em}
.overlay .rank-card{width:100%;max-width:320px;background:linear-gradient(165deg,rgba(0,217,255,.12),rgba(0,217,255,.03));border:1px solid rgba(0,217,255,.42);border-radius:16px;padding:18px 20px;margin:8px 0 16px;display:flex;flex-direction:column;align-items:center;gap:8px;box-shadow:0 8px 24px -8px rgba(0,217,255,.4)}
.overlay .rank-card-rank{font-family:'Orbitron',sans-serif;font-size:1.5em;font-weight:900;color:#00D9FF;line-height:1.1;letter-spacing:.02em;text-align:center}
.overlay .rank-card-pct{font-size:1em;font-weight:700;color:rgba(255,255,255,.95);letter-spacing:.02em;text-align:center;min-height:1em}
.overlay .rank-card-pb{font-size:.88em;font-weight:700;color:#FFE66D;min-height:1em;margin:0;text-align:center}
.overlay .rank-card-link{margin-top:4px;padding:8px 18px;font-size:.85em;font-weight:800;color:#00D9FF;background:transparent;border:1px solid rgba(0,217,255,.5);border-radius:999px;cursor:pointer;font-family:inherit;letter-spacing:.04em}
.overlay .rank-card-link:active{transform:translateY(1px);background:rgba(0,217,255,.12)}
.overlay .rank-card-debug{font-size:.68em;color:rgba(255,107,107,.92);font-family:'Courier New',monospace;letter-spacing:0;margin-top:0;min-height:0;text-align:center;word-break:break-word;max-width:100%;line-height:1.3}
.overlay .btn{padding:12px 28px;border-radius:14px;border:0;background:linear-gradient(135deg,#00D9FF,#0099CC);color:#001828;font-family:'Orbitron',sans-serif;font-weight:900;letter-spacing:.08em;font-size:1em;cursor:pointer;box-shadow:0 10px 26px -6px rgba(0,217,255,.5)}
.overlay .btn:active{transform:translateY(1px)}
/* PvP 버튼 — Create / Join. 청홍 그라디언트로 출발하기 (단일플레이) 와 시각 구분. */
.overlay .ov-btn-row{display:flex;flex-direction:column;gap:8px;align-items:stretch;width:100%;max-width:280px;margin:0 auto}
.overlay .btn-vs{
    background:linear-gradient(135deg,#1E90FF,#7B5BFF);
    color:#fff;
    box-shadow:0 8px 22px -6px rgba(30,144,255,.55);
    font-size:.92em;padding:10px 22px;
}
.overlay .btn-vs:active{transform:translateY(1px)}

/* ==== PvP overlay (Create/Join modal + Lobby room) ==== */
.pvp-overlay{
    position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(2,4,16,.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    z-index:4;text-align:center;padding:18px;overflow-y:auto;
}
.pvp-overlay.on{display:flex}
.pvp-overlay h3{font-family:'Orbitron','Noto Sans KR',sans-serif;font-size:1.3em;font-weight:900;margin-bottom:14px;background:linear-gradient(135deg,#1E90FF,#00D9FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pvp-overlay .pvp-row{display:flex;flex-direction:column;gap:14px;width:100%;max-width:300px;align-items:stretch}
.pvp-overlay label{font-size:.85em;color:rgba(255,255,255,.78);text-align:left;font-weight:700}
.pvp-overlay input[type="text"], .pvp-overlay select{
    padding:10px 14px;border-radius:10px;border:1px solid rgba(0,217,255,.35);
    background:rgba(0,217,255,.06);color:#fff;font-family:inherit;font-size:1em;
    letter-spacing:.06em;text-align:center;text-transform:uppercase;
    -webkit-appearance:none;appearance:none;
}
.pvp-overlay input[type="text"]:focus, .pvp-overlay select:focus{outline:0;border-color:#00D9FF}
.pvp-overlay .item-count-row{display:flex;gap:6px;justify-content:center;margin-top:4px}
.pvp-overlay .item-count-row button{
    flex:1;padding:10px 0;border:1px solid rgba(0,217,255,.3);background:rgba(0,217,255,.05);
    color:#fff;border-radius:10px;font-family:'Orbitron',sans-serif;font-weight:800;font-size:.95em;
    cursor:pointer;transition:all .15s;
}
.pvp-overlay .item-count-row button.active{background:linear-gradient(135deg,#00D9FF,#0099CC);color:#001828;border-color:#00D9FF;box-shadow:0 0 14px -2px rgba(0,217,255,.55)}
.pvp-overlay .pvp-actions{display:flex;gap:10px;margin-top:14px;width:100%;max-width:300px}
.pvp-overlay .pvp-actions button{flex:1;padding:12px 0;border-radius:12px;border:0;font-family:'Orbitron',sans-serif;font-weight:900;letter-spacing:.06em;cursor:pointer;font-size:.92em}
.pvp-overlay .pvp-actions .pvp-cancel{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.12)}
.pvp-overlay .pvp-actions .pvp-confirm{background:linear-gradient(135deg,#1E90FF,#7B5BFF);color:#fff;box-shadow:0 8px 22px -6px rgba(30,144,255,.55)}
.pvp-overlay .pvp-actions button:active{transform:translateY(1px)}
.pvp-overlay .pvp-err{color:#FF8888;font-size:.78em;margin-top:8px;min-height:1em;white-space:pre-line;text-align:left;max-width:300px;font-family:monospace;line-height:1.45}
.pvp-overlay .pvp-rooms{
    width:100%;max-width:300px;max-height:180px;overflow-y:auto;
    border:1px solid rgba(0,217,255,.18);border-radius:10px;padding:6px;
    background:rgba(0,0,0,.35);margin-top:8px;
}
.pvp-overlay .pvp-room{
    display:flex;align-items:center;justify-content:space-between;
    padding:8px 10px;border-radius:8px;cursor:pointer;
    background:rgba(0,217,255,.04);margin-bottom:4px;
    border:1px solid transparent;transition:all .12s;
}
.pvp-overlay .pvp-room:hover{background:rgba(0,217,255,.12);border-color:rgba(0,217,255,.3)}
.pvp-overlay .pvp-room .pvp-rh{font-size:.86em;font-weight:700;color:#fff;text-align:left;flex:1}
.pvp-overlay .pvp-room .pvp-rh small{display:block;font-size:.78em;color:rgba(255,255,255,.5);font-weight:400;margin-top:2px}
.pvp-overlay .pvp-room .pvp-rcode{font-family:'JetBrains Mono',monospace;font-size:.78em;color:#00D9FF;background:rgba(0,217,255,.08);padding:3px 8px;border-radius:6px;letter-spacing:.08em}
/* 카드 자체는 hover 효과만 (clickable 아님). 실제 click 은 .pvp-rjoin-btn 만. */
.pvp-overlay .pvp-room{cursor:default}
.pvp-overlay .pvp-room:hover{background:rgba(0,217,255,.10);border-color:rgba(0,217,255,.35)}
/* 명시적 button — 모바일 100% click 보장. */
.pvp-overlay .pvp-room .pvp-rjoin-btn{
    font-size:.82em;font-weight:800;color:#001828;
    background:linear-gradient(135deg,#00D9FF,#0099CC);
    padding:8px 16px;border-radius:8px;letter-spacing:.04em;
    border:0;cursor:pointer;font-family:inherit;
    transition:all .12s;
    -webkit-tap-highlight-color:rgba(0,217,255,.4);
    touch-action:manipulation;
    box-shadow:0 2px 8px -2px rgba(0,217,255,.45);
}
.pvp-overlay .pvp-room .pvp-rjoin-btn:active{transform:translateY(1px);box-shadow:0 1px 3px -1px rgba(0,217,255,.35)}
.pvp-overlay .pvp-room .pvp-rjoin-btn:disabled{
    background:rgba(255,255,255,.05);color:rgba(255,255,255,.4);
    cursor:not-allowed;box-shadow:none;
}
.pvp-overlay .pvp-room.full{opacity:.55}
.pvp-overlay .pvp-empty{color:rgba(255,255,255,.4);font-size:.85em;padding:20px;text-align:center}

/* ==== PvP Lobby room view ==== */
.pvp-room-view .pvp-code-box{
    background:linear-gradient(135deg,rgba(30,144,255,.18),rgba(123,91,255,.12));
    border:2px solid rgba(0,217,255,.35);border-radius:14px;padding:14px 18px;margin-bottom:14px;
    text-align:center;
}
.pvp-room-view .pvp-code-label{font-size:.7em;color:rgba(255,255,255,.55);letter-spacing:.12em;font-weight:800;text-transform:uppercase;margin-bottom:4px}
.pvp-room-view .pvp-code-val{font-family:'JetBrains Mono','Roboto Mono',monospace;font-size:1.8em;font-weight:900;color:#00D9FF;letter-spacing:.18em;text-shadow:0 0 18px rgba(0,217,255,.5)}
/* Ping 5칸 막대 — RTT 색상 매핑 (Battle.net 스타일).
   < 60ms = 5칸 녹 / 60-110 = 4칸 녹 / 110-180 = 3칸 노랑 / 180-280 = 2칸 빨강 / > 280 = 1칸 빨강 */
.pvp-room-view .pvp-ping-row{display:flex;align-items:center;gap:6px;margin-bottom:10px;font-size:.78em;color:rgba(255,255,255,.55);letter-spacing:.05em}
.pvp-room-view .pvp-ping-label{font-weight:800;font-size:.85em}
.pvp-room-view .pvp-ping{display:inline-flex;gap:2px;align-items:flex-end;height:14px}
.pvp-room-view .pvp-ping .bar{width:4px;background:rgba(255,255,255,.18);border-radius:1px;transition:background .2s}
.pvp-room-view .pvp-ping .bar.b1{height:4px}
.pvp-room-view .pvp-ping .bar.b2{height:6px}
.pvp-room-view .pvp-ping .bar.b3{height:8px}
.pvp-room-view .pvp-ping .bar.b4{height:11px}
.pvp-room-view .pvp-ping .bar.b5{height:14px}
.pvp-room-view .pvp-ping .bar.on.good{background:#00E676}
.pvp-room-view .pvp-ping .bar.on.warn{background:#FFE66D}
.pvp-room-view .pvp-ping .bar.on.bad{background:#FF3366}
.pvp-room-view .pvp-ping-ms{margin-left:auto;font-family:'JetBrains Mono',monospace;color:rgba(255,255,255,.7)}
.pvp-room-view .pvp-players{display:flex;flex-direction:column;gap:8px;width:100%;max-width:300px;margin-bottom:14px}
.pvp-room-view .pvp-player{
    display:flex;align-items:center;gap:10px;
    padding:10px 12px;border-radius:10px;
    background:rgba(0,217,255,.06);border:1px solid rgba(0,217,255,.18);
}
.pvp-room-view .pvp-player.host{background:linear-gradient(135deg,rgba(255,200,80,.10),rgba(0,217,255,.08));border-color:rgba(255,200,80,.35)}
.pvp-room-view .pvp-player.empty-slot{opacity:.45;justify-content:center;font-style:italic;color:rgba(255,255,255,.45);font-size:.86em}
.pvp-room-view .pvp-player.ready{border-color:#00E676;box-shadow:inset 0 0 14px -2px rgba(0,230,118,.3)}
.pvp-room-view .pvp-player .pvp-pname{flex:1;text-align:left;font-weight:700;color:#fff;font-size:.92em}
.pvp-room-view .pvp-player .pvp-prole{font-size:.68em;color:#FFE66D;font-family:'Orbitron',sans-serif;letter-spacing:.08em;font-weight:800}
.pvp-room-view .pvp-player .pvp-pready{font-size:.74em;font-weight:800;letter-spacing:.06em}
.pvp-room-view .pvp-player.ready .pvp-pready{color:#00E676}
.pvp-room-view .pvp-player:not(.ready):not(.empty-slot) .pvp-pready{color:rgba(255,255,255,.4)}

.pvp-room-view .pvp-chat{
    width:100%;max-width:300px;height:130px;overflow-y:auto;
    background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.08);border-radius:10px;
    padding:8px;margin-bottom:8px;text-align:left;font-size:.82em;line-height:1.45;
}
.pvp-room-view .pvp-chat .pvp-msg{margin-bottom:3px;color:rgba(255,255,255,.85)}
.pvp-room-view .pvp-chat .pvp-msg .pvp-mn{color:#00D9FF;font-weight:700}
.pvp-room-view .pvp-chat .pvp-sys{color:rgba(255,200,80,.75);font-style:italic;font-size:.85em}
.pvp-room-view .pvp-chat-row{display:flex;gap:6px;width:100%;max-width:300px;margin-bottom:14px}
.pvp-room-view .pvp-chat-row input{flex:1;padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:#fff;font-family:inherit;font-size:.86em;text-align:left;text-transform:none}
.pvp-room-view .pvp-chat-row button{padding:8px 14px;border-radius:8px;border:0;background:rgba(0,217,255,.18);color:#00D9FF;font-weight:800;cursor:pointer}
.overlay .kbd-hint{margin-top:12px;font-size:.72em;color:rgba(255,255,255,.35);letter-spacing:.03em}
.overlay .kbd-hint kbd{padding:2px 6px;border-radius:5px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);font-family:inherit;color:#fff}
/* 손잡이 토글 — 시작 화면에서 트랙패드/버튼 좌우 배치 선택.
   2 segment pill. localStorage 'dodge_hand' 에 영구 저장. */
.hand-toggle{
    margin:14px 0 4px;display:inline-flex;gap:0;
    background:rgba(0,217,255,.05);border:1px solid rgba(0,217,255,.22);
    border-radius:999px;padding:3px;
    box-shadow:inset 0 1px 2px rgba(0,0,0,.4);
}
.hand-toggle .hand-btn{
    padding:7px 14px;border-radius:999px;border:0;
    background:transparent;color:rgba(255,255,255,.55);
    font-size:.78em;font-weight:700;letter-spacing:.02em;
    font-family:inherit;cursor:pointer;
    transition:all .18s;
    display:inline-flex;align-items:center;gap:5px;line-height:1;
    -webkit-tap-highlight-color:transparent;
}
.hand-toggle .hand-btn:active{transform:scale(.97)}
.hand-toggle .hand-btn.active{
    background:linear-gradient(135deg,#00D9FF,#0099CC);
    color:#001828;
    box-shadow:0 2px 8px -2px rgba(0,217,255,.5),
        inset 0 1px 0 rgba(255,255,255,.25);
}
.hand-toggle .hand-label{font-size:.62em;color:var(--muted-2);letter-spacing:.08em;text-transform:uppercase;font-weight:800;margin-bottom:3px;display:block}

.hint{
    font-size:.78em;color:var(--muted);line-height:1.5;
    padding:8px 12px;background:rgba(255,255,255,.02);border-radius:10px;
    border:1px solid rgba(255,255,255,.04);text-align:center;width:100%;max-width:440px
}

/* ---- Bottom sheet (leaderboard) ---- */
.sheet-backdrop{
    position:fixed;inset:0;z-index:50;background:rgba(5,5,24,.6);backdrop-filter:blur(4px);
    opacity:0;pointer-events:none;transition:opacity .22s
}
.sheet-backdrop.on{opacity:1;pointer-events:auto}
.sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:51;
    max-height:78vh;overflow:hidden;
    background:linear-gradient(180deg,rgba(22,22,42,.98),rgba(12,12,28,1));
    border-top-left-radius:22px;border-top-right-radius:22px;
    border-top:1px solid rgba(255,255,255,.08);
    transform:translateY(100%);transition:transform .26s cubic-bezier(.2,.8,.4,1);
    padding-bottom:calc(var(--sb-bottom) + 14px);
    display:flex;flex-direction:column
}
.sheet.on{transform:translateY(0)}
.sheet .handle{width:42px;height:4px;border-radius:2px;background:rgba(255,255,255,.25);margin:10px auto}
.sheet h3{font-family:'Orbitron',sans-serif;font-size:.92em;font-weight:900;text-align:center;letter-spacing:.06em;color:#00D9FF;padding:2px 0 10px}
.sheet-body{overflow-y:auto;padding:0 14px;flex:1;min-height:0}
.sheet-body::-webkit-scrollbar{width:4px}
.sheet-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

.lb-tabs{
    display:flex;gap:6px;background:rgba(10,10,26,.55);padding:4px;
    border-radius:12px;border:1px solid var(--panel-br);
    margin:0 14px 12px
}
.lb-tab{flex:1;padding:10px 8px;border:0;background:transparent;color:rgba(255,255,255,.55);cursor:pointer;font-family:inherit;font-size:.82em;font-weight:700;letter-spacing:.04em;border-radius:8px}
.lb-tab.active{background:rgba(0,217,255,.14);color:#00D9FF}
.lb-list{background:rgba(255,255,255,.02);border:1px solid var(--panel-br);border-radius:14px;overflow:hidden;margin-bottom:10px}
/* lb-score column widened from 88px → 104px to fit the new mm:ss:cs
   format (7–8 chars in Orbitron) without truncation. Old format was a
   raw 4-digit score number that comfortably fit 88 px. */
.lb-row{display:grid;grid-template-columns:38px 1fr 104px;gap:10px;align-items:center;padding:10px 12px;border-bottom:1px solid var(--panel-br)}
.lb-row:last-child{border-bottom:0}
.lb-row.self{background:rgba(0,217,255,.06);border-left:3px solid #00D9FF;padding-left:9px}
.lb-rnk{font-family:'Orbitron',sans-serif;font-weight:900;font-size:.92em;color:var(--muted-2);text-align:center}
.lb-who{display:flex;align-items:center;gap:8px;min-width:0}
.lb-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#00D9FF,#9C6FFF);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-weight:900;font-size:.74em;color:#fff;flex-shrink:0;overflow:hidden}
.lb-av img{width:100%;height:100%;object-fit:cover}
.lb-nick{font-weight:600;font-size:.9em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-score{font-family:'Orbitron',sans-serif;font-weight:800;font-size:.92em;color:#00D9FF;text-align:right;font-variant-numeric:tabular-nums}
.lb-empty{padding:28px 14px;text-align:center;color:var(--muted-2);font-size:.86em}

/* ---- Shake on death ---- */
@keyframes shake{
    0%,100%{transform:translate(0,0)}
    20%{transform:translate(-3px,2px)}
    40%{transform:translate(3px,-2px)}
    60%{transform:translate(-2px,-2px)}
    80%{transform:translate(2px,3px)}
}
.canvas-wrap.shake{animation:shake .4s ease}

/* Ad slot */
#adSlot.ad-col{width:100%;max-width:440px;min-height:80px;display:none;margin-top:2px;align-self:center;order:99}

/* ---- 조종판 (모바일 전용 원형 트랙패드) ----
   콕핏 panel 안에 들어갔으니 z-index:1 로 grid 오버레이 위로 올림. */
.tp-wrap{
    display:flex;flex-direction:column;align-items:center;gap:9px;flex-shrink:0;
    position:relative;z-index:1;
}
.tp-zone{
    width:148px;height:148px;border-radius:50%;
    background:radial-gradient(circle at 50% 50%,rgba(0,217,255,.07) 0%,rgba(6,6,20,.84) 68%);
    border:2px solid rgba(0,217,255,.3);
    position:relative;overflow:hidden;touch-action:none;
    transition:box-shadow .07s ease
}
.tp-icon{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-52%);
    font-size:2.2em;opacity:.17;pointer-events:none;line-height:1;
    transition:opacity .15s
}
.tp-label{
    font-size:.6em;letter-spacing:.1em;text-transform:uppercase;
    color:rgba(255,255,255,.2);pointer-events:none;text-align:center
}
.tp-ring{
    position:absolute;width:54px;height:54px;border-radius:50%;
    border:2.5px solid rgba(0,217,255,.92);
    background:rgba(0,217,255,.13);
    box-shadow:0 0 16px rgba(0,217,255,.6);
    transform:translate(-50%,-50%);
    pointer-events:none;display:none
}
.tp-zone.on .tp-ring{display:block}
.tp-zone.on .tp-icon{opacity:0}

/* ================================================================
   Tablet portrait / large phone landscape (768–1023px):
   Keep mobile flex-column, just lift the canvas cap. dodge is 3:5
   portrait so we cap by max-height as well — a wide-but-short
   landscape iPad shouldn't push the trackpad off-screen.
   ================================================================ */
@media(min-width:768px) and (max-width:1023px){
    .canvas-wrap{max-width:440px;max-height:calc(100dvh - 360px)}
    .score-strip{max-width:440px}
    .game-ctrl{max-width:440px}
    .hint{max-width:440px}
    /* 태블릿 — 콕핏 panel 도 canvas 와 같은 440 으로 확대 */
    .control-row{max-width:440px;padding:16px 20px}
    /* 4 버튼 비례 확대 */
    .left-controls .item-slot,
    .left-controls .grav-btn{width:56px;height:56px}
    .left-controls{gap:5px}
}
/* ================================================================
   Tablet landscape / desktop (>= 1024px)
   ================================================================ */
@media(min-width:1024px){
    /* PC: viewport split into exact thirds. dodge 3:5 portrait — cap
       mid-col 420 so the canvas doesn't sprawl. */
    .wrap{max-width:none;margin:0;display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;align-items:start;padding:22px 24px;min-height:calc(100dvh - 60px)}
    .left-col{grid-column:2;display:flex;flex-direction:column;gap:12px;align-items:center;width:100%;max-width:420px;justify-self:center}
    .canvas-wrap{width:100%;max-width:none;max-height:80vh}
    .score-strip{width:100%}
    .game-ctrl{width:100%}
    .hint{width:100%}
    #adSlot.ad-col{grid-column:1;display:block;width:100%;max-width:380px;justify-self:center;min-height:600px;margin:0;align-self:start;background:rgba(255,255,255,.02);border:1px dashed rgba(255,255,255,.06);border-radius:14px}
    .right-col{grid-column:3;width:100%;max-width:400px;justify-self:center}
    .right-col .sheet{position:static;transform:none;max-height:none;border-radius:18px;border:1px solid var(--panel-br);background:rgba(14,14,28,.55);padding-bottom:14px;width:100%}
    .right-col .sheet .handle{display:none}
    .right-col .sheet-backdrop, .topbar .lb-btn{display:none}
    .tp-wrap{display:none}

function applyLanguage(){

/* ---- Time-format helpers ----
   Space-Z is a survival game. The DB column is `score` for legacy schema
   reasons, but it stores `floor(duration_ms / 100)` — i.e. a centisecond
   counter. Wherever we'd display a "score" in the UI, we render mm:ss:cs
   instead. Two helpers because we sometimes have raw ms (current run),
   sometimes the score-as-cs (server records).

   formatDuration(ms)  → mm:ss:cs from elapsed milliseconds
   formatTime(score)   → mm:ss:cs from server score (= cs)
*/
function formatDuration(ms){
    if (ms == null || isNaN(ms)) return '—';
    const totalCs = Math.floor(ms / 10);
    const cs = totalCs % 100;
    const totalSec = Math.floor(totalCs / 100);
    const ss = totalSec % 60;
    const mm = Math.floor(totalSec / 60);
    return String(mm).padStart(1, '0') + ':' +
           String(ss).padStart(2, '0') + ':' +
           String(cs).padStart(2, '0');
}

        scoreField:        'best_score',
        myStatsRankField:  'world_rank',
        myStatsScoreField: 'best_score',
        formatScore:       formatTime
    });
}

function pickIntroStory(){
    const lang = (window.LpI18n && typeof window.LpI18n.getLang === 'function')
        ? window.LpI18n.getLang() : 'en';
    const stories = INTRO_STORIES[lang] || INTRO_STORIES.en;
    return stories[Math.floor(Math.random() * stories.length)];
}
/* runIntroCountdown — 3·2·1·GO 카운트다운 + 랜덤 스토리. Promise resolve
   시 카운트다운 끝 → caller 가 실제 게임플레이 시작.
   각 숫자 0.9초, GO 0.6초 = 총 ~3.3초. */
let _introRunning = false;
function runIntroCountdown(){
    if(_introRunning) return Promise.resolve();
    _introRunning = true;
    const overlay = $('introOverlay');
    const countEl = $('introCount');
    const storyEl = $('introStory');
    const story = pickIntroStory();
    storyEl.innerHTML = story.join('<br>');
    countEl.textContent = '3';
    countEl.classList.remove('go');
    overlay.classList.add('on');
    overlay.setAttribute('aria-hidden', 'false');
    return new Promise(resolve => {
        let n = 3;
        const tick = () => {
            countEl.classList.remove('go');
            countEl.textContent = String(n);
            /* 애니메이션 재트리거 — 클래스 제거→재추가 + reflow */
            countEl.style.animation = 'none';
            void countEl.offsetWidth;
            countEl.style.animation = '';
            n--;
            if(n < 0){
                /* GO! 페이즈 — 0.6초 후 닫힘 */
                countEl.textContent = 'GO!';
                countEl.classList.add('go');
                countEl.style.animation = 'none';
                void countEl.offsetWidth;
                countEl.style.animation = '';
                setTimeout(() => {
                    overlay.classList.remove('on');
                    overlay.setAttribute('aria-hidden', 'true');
                    _introRunning = false;
                    resolve();
                }, 600);
            } else {
                setTimeout(tick, 900);
            }
        };
        tick();
    });
}

function formatTime(score){
    if (score == null || isNaN(score)) return '—';
    /* score = floor(duration_ms / 100) → score is already in cs */
    const cs = score % 100;
    const totalSec = Math.floor(score / 100);
    const ss = totalSec % 60;
    const mm = Math.floor(totalSec / 60);
    return String(mm).padStart(1, '0') + ':' +
           String(ss).padStart(2, '0') + ':' +
           String(cs).padStart(2, '0');
}

let me=null;
/* ID + nickname captured at initAuth so we can detect mid-game session
   changes (e.g. another tab signed in/out, token rotated, account
   switched). The score is server-attributed via auth.uid() at the
   moment record_dodge_attempt runs — NOT against `me.id` cached
   client-side. So if `me.id` and the live session diverge, the score
   silently lands on the WRONG account. We surface this loudly. */
let meIdAtBoot=null;
let meNickAtBoot='';

/* ---- Auth init (anon-friendly) ----
   Anon users CAN play and view leaderboards but cannot save records.
   When not logged in we show a login chip instead of a profile chip,
   skip the profile/stats fetch, and let the game-over flow surface a
   "🔒 로그인하면 기록 저장!" hint while still loading world rankings. */
async function initAuth(){
    try{
        const u=await getUser();
        if(!u){
            me=null;
            meIdAtBoot=null;
            meNickAtBoot='';
            $('authSlot').innerHTML='<a class="auth-chip" href="/auth/?next='+encodeURIComponent(location.pathname)+'">로그인</a>';
            return;
        }
        me=u;
        meIdAtBoot=u.id;
        try{
            console.log('[dodge.auth] signed in as id=' + u.id +
                        ' email=' + (u.email||'(none)'));
        }catch(_){}
        const prof=await getSupabase().from('profiles').select('nickname,avatar_url').eq('id',u.id).maybeSingle();
        const nick=prof.data?.nickname||'나';
        meNickAtBoot=nick;
        $('authSlot').innerHTML='<a class="auth-chip" href="/me/">'+esc(nick)+'</a>';
        try {
            window._lpMe = u;
            window._lpMyNickname = nick;
            window._lpMyAvatar = prof.data?.avatar_url || null;
        } catch(_){}
        loadMyStats();
    }catch(e){console.warn('auth init',e)}
}

/* Subscribe to auth state changes — picks up sign-out / account-switch
   in other tabs OR token expiry. If the active session changes from
   what we booted with, log it loud and (when the game isn't actively
   running) reload so the new identity drives all subsequent state. */
if(typeof onAuthChange==='function'){
    onAuthChange((event, session) => {
        const newId = session && session.user ? session.user.id : null;
        try{ console.log('[dodge.auth] state change: event=' + event + ' newId=' + (newId||'(null)')); }catch(_){}
        if(event==='SIGNED_OUT'){
            /* User signed out somewhere else. We can't safely keep playing
               for a logged-in session — record_dodge_attempt would now
               fail with not_authenticated. Reload to refresh state.
               Anon-at-boot users (meIdAtBoot=null) never had a session
               to lose, so we leave them alone. */
            if(meIdAtBoot && (typeof running==='undefined' || !running)){
                location.reload();
            }
            return;
        }
        if(meIdAtBoot && newId && newId !== meIdAtBoot){
            console.warn('[dodge.auth] account switched mid-session from '
                + meIdAtBoot + ' to ' + newId + ' — reloading to refresh state');
            if(typeof running==='undefined' || !running){
                location.reload();
            }
        }
    });
}
async function loadMyStats(){
    if(!me)return;
    try{
        const {data,error}=await getSupabase().rpc('dodge_my_stats');
        if(error||!data||!data.has_record)return;
        /* best_score is the centisecond count of the player's longest
           survival run — render as mm:ss:cs so the BEST tile reads
           consistently with the live TIME tile next to it. */
        $('bestScore').textContent=formatTime(data.best_score);
    }catch(_){}
}

/* ======================================================
   GAME ENGINE
   Canvas logical size: 360 × 600 (3:5 ratio)
   ====================================================== */
const CW=360, CH=600;
const canvas=$('dodge-canvas');
const ctx=canvas.getContext('2d');

let dpr=1;
function fitCanvas(){
    dpr=Math.min(window.devicePixelRatio||1, 3);
    const rect=canvas.getBoundingClientRect();
    canvas.width=Math.round(rect.width*dpr);
    canvas.height=Math.round(rect.height*dpr);
    ctx.setTransform(dpr*rect.width/CW, 0, 0, dpr*rect.height/CH, 0, 0);
}
window.addEventListener('resize', fitCanvas);

/* ---- Rounded rect helper ---- */
function drawRR(x,y,w,h,r){
    r=Math.min(r,w/2,h/2);
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
}

function hexToRgb(h){
    const r=parseInt(h.slice(1,3),16);
    const g=parseInt(h.slice(3,5),16);
    const b=parseInt(h.slice(5,7),16);
    return [r,g,b];
}
function lerpRgb(a,b,t){
    return [
        Math.round(a[0]+(b[0]-a[0])*t),
        Math.round(a[1]+(b[1]-a[1])*t),
        Math.round(a[2]+(b[2]-a[2])*t),
    ];
}
function rgbStr(rgb){ return 'rgb('+rgb[0]+','+rgb[1]+','+rgb[2]+')'; }

let currentZoneIdx=0;
let prevZoneIdx=0;
let zoneTransitionT=1; // 0→1 over 1.5s after zone change

let zoneLabel={ nameEn:'', nameKo:'', timer:0 };

/* ---- Stars ---- */
const STAR_COUNT=70;
const stars=[];
function initStars(){
    stars.length=0;
    for(let i=0;i<STAR_COUNT;i++){
        stars.push({
            x:Math.random()*CW,
            y:Math.random()*CH,
            r:Math.random()*1.4+0.3,
            speed:Math.random()*55+18,
            alpha:Math.random()*0.55+0.15,
            hue:0 // 0=white; updated per zone
        });
    }
}
function updateStars(dt){
    for(const s of stars){
        s.y+=s.speed*dt;
        if(s.y>CH) s.y=-2;
    }
}
function getStarColor(zIdx, alpha){
    if(zIdx<=2)  return 'rgba(255,255,255,'+alpha+')';
    if(zIdx<=4)  return 'rgba(255,250,220,'+alpha+')'; // warm
    if(zIdx<=6)  return 'rgba(200,220,255,'+alpha+')'; // cool blue
    if(zIdx<=8)  return 'rgba(180,185,200,'+alpha+')'; // dim
    if(zIdx===9){
        // varied: use star index cycle through warm/cool
        return null; // handled per-star below
    }
    // zone 10 nebula — pinkish
    return 'rgba(255,210,220,'+alpha+')';
}
function drawStars(){
    const zIdx=currentZoneIdx;
    for(let i=0;i<stars.length;i++){
        const s=stars[i];
        let col;
        if(zIdx===9){
            const cycle=i%3;
            if(cycle===0) col='rgba(255,160,120,'+s.alpha+')';
            else if(cycle===1) col='rgba(180,200,255,'+s.alpha+')';
            else col='rgba(255,255,255,'+s.alpha+')';
        } else {
            col=getStarColor(zIdx, s.alpha)||'rgba(255,255,255,'+s.alpha+')';
        }
        ctx.globalAlpha=1;
        ctx.fillStyle=col;
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fill();
    }
    ctx.globalAlpha=1;
}

/* ---- Ambient particles per zone ---- */
let particles=[];

function resetParticles(zIdx){
    particles=[];
    if(zIdx===2){ // Mars dust
        for(let i=0;i<15;i++) particles.push({
            x:Math.random()*CW, y:Math.random()*CH,
            vx:(Math.random()-.5)*18, vy:(Math.random()-.5)*10,
            r:Math.random()*2+1,
            col:'rgba(255,140,60,0.55)', type:'dust'
        });
    } else if(zIdx===4){ // Saturn ring particles
        for(let i=0;i<18;i++) particles.push({
            x:Math.random()*CW, y:Math.random()*CH*0.3+CH*0.1,
            vx:(Math.random()>.5?1:-1)*(Math.random()*20+10), vy:0,
            r:Math.random()*1.5+0.5,
            col:'rgba(220,190,120,0.45)', type:'ring'
        });
    } else if(zIdx===10){ // Horsehead nebula dust
        for(let i=0;i<30;i++) particles.push({
            x:Math.random()*CW, y:Math.random()*CH,
            vx:(Math.random()-.5)*6, vy:-(Math.random()*12+3),
            r:Math.random()*2+1,
            col:'rgba(255,120,150,0.5)', type:'nebula'
        });
    }
}

function updateParticles(dt){
    for(const p of particles){
        p.x+=p.vx*dt;
        p.y+=p.vy*dt;
        if(p.x<0)p.x=CW;
        if(p.x>CW)p.x=0;
        if(p.y<0)p.y=CH;
        if(p.y>CH)p.y=0;
    }
}

function drawParticles(){
    for(const p of particles){
        ctx.globalAlpha=0.7;
        ctx.fillStyle=p.col;
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();
    }
    ctx.globalAlpha=1;
}

/* ---- lerp helper ---- */
function lerp(a,b,t){ return a+(b-a)*t; }

/* ---- drawBackground: zone gradient + blend ---- */
function drawBackground(){
    const zi=currentZoneIdx;
    const pi=prevZoneIdx;
    const t=Math.min(zoneTransitionT,1);

    // 위쪽(로켓 전방)이 먼저 새 존 색으로 바뀌고 아래로 내려오도록 staggered lerp
    // 화성 분위기가 아래서 올라오는 이상한 느낌 제거
    const tTop = Math.min(t / 0.50, 1.0);          // 위: 전체 전환시간의 50%에 완료
    const tMid = Math.min(t / 0.80, 1.0);          // 중간: 80%에 완료
    const tBot = Math.max((t - 0.35) / 0.65, 0.0); // 아래: 35% 이후 시작

    const topC=rgbStr(lerpRgb(hexToRgb(ZONE_BG[pi][0]),hexToRgb(ZONE_BG[zi][0]),tTop));
    const midC=rgbStr(lerpRgb(hexToRgb(ZONE_BG[pi][1]),hexToRgb(ZONE_BG[zi][1]),tMid));
    const botC=rgbStr(lerpRgb(hexToRgb(ZONE_BG[pi][2]),hexToRgb(ZONE_BG[zi][2]),tBot));

    const grad=ctx.createLinearGradient(0,0,0,CH);
    grad.addColorStop(0,   topC);
    grad.addColorStop(0.5, midC);
    grad.addColorStop(1,   botC);
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,CW,CH);
}

/* ---- Zone planet/object drawing ---- */
function getZoneT(zIdx){
    const z=ZONES[zIdx];
    const s=elapsedMs/1000;
    const elapsed=s-z.s;
    const dur=z.dur===9999?30:z.dur;
    return Math.max(0,Math.min(1,elapsed/dur));
}

function drawEarth(zoneT){
    // Giant arc at bottom — Earth's curvature
    const arcR=lerp(1800,400,zoneT);
    const arcCenterY=CH+arcR*0.82;
    const arcAngle=Math.asin((CW*0.7)/arcR)||0.4;

    ctx.save();
    // Atmosphere glow
    const atmGrad=ctx.createRadialGradient(CW/2,arcCenterY,arcR-6,CW/2,arcCenterY,arcR+14);
    atmGrad.addColorStop(0,'rgba(100,200,255,0)');
    atmGrad.addColorStop(0.5,'rgba(80,180,255,0.25)');
    atmGrad.addColorStop(1,'rgba(0,120,255,0)');
    ctx.fillStyle=atmGrad;
    ctx.beginPath();
    ctx.arc(CW/2,arcCenterY,arcR+14,-Math.PI-arcAngle-0.05,-arcAngle+0.05);
    ctx.arc(CW/2,arcCenterY,arcR-6,-arcAngle+0.05,-Math.PI-arcAngle-0.05,true);
    ctx.fill();

    // Ocean
    ctx.beginPath();
    ctx.arc(CW/2,arcCenterY,arcR,-Math.PI-arcAngle,-arcAngle);
    ctx.lineTo(CW,CH+20);
    ctx.lineTo(0,CH+20);
    ctx.closePath();
    ctx.fillStyle='#0a2850';
    ctx.fill();

    // Landmasses (seeded blobs)
    ctx.save();
    ctx.beginPath();
    ctx.arc(CW/2,arcCenterY,arcR,-Math.PI-arcAngle,-arcAngle);
    ctx.lineTo(CW,CH+20); ctx.lineTo(0,CH+20); ctx.closePath();
    ctx.clip();
    ctx.fillStyle='#1a5c28';
    // blob 1
    ctx.beginPath(); ctx.ellipse(CW*0.3,arcCenterY-arcR*0.05,arcR*0.18,arcR*0.12,0.3,0,Math.PI*2); ctx.fill();
    // blob 2
    ctx.beginPath(); ctx.ellipse(CW*0.7,arcCenterY-arcR*0.08,arcR*0.14,arcR*0.09,-0.4,0,Math.PI*2); ctx.fill();
    // blob 3
    ctx.beginPath(); ctx.ellipse(CW*0.55,arcCenterY-arcR*0.02,arcR*0.1,arcR*0.07,0.8,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // Clouds
    ctx.save();
    ctx.beginPath();
    ctx.arc(CW/2,arcCenterY,arcR,-Math.PI-arcAngle,-arcAngle);
    ctx.lineTo(CW,CH+20); ctx.lineTo(0,CH+20); ctx.closePath();
    ctx.clip();
    ctx.strokeStyle='rgba(255,255,255,0.45)';
    ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(CW*0.4,arcCenterY-arcR*0.12,arcR*0.09,0.2,1.0); ctx.stroke();
    ctx.beginPath(); ctx.arc(CW*0.65,arcCenterY-arcR*0.06,arcR*0.07,-0.3,0.8); ctx.stroke();
    ctx.restore();

    ctx.restore();
}

function drawMoon(zoneT){
    const py=CH*(zoneT*2.0-0.4);
    const cx=CW*0.38, r=88;
    ctx.save();

    // 달 전체 글로우
    ctx.shadowColor='rgba(210,205,195,0.28)';
    ctx.shadowBlur=22;

    // 기본 회색 표면: 하이랜드 밝고 림은 어두운 라디알 그라디언트
    const base=ctx.createRadialGradient(cx-r*0.22,py-r*0.22,r*0.05,cx,py,r);
    base.addColorStop(0,'#dedad4');
    base.addColorStop(0.4,'#bab6b0');
    base.addColorStop(0.78,'#8c8880');
    base.addColorStop(1,'#4a4845');
    ctx.fillStyle=base;
    ctx.beginPath(); ctx.arc(cx,py,r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;

    ctx.save();
    ctx.beginPath(); ctx.arc(cx,py,r,0,Math.PI*2); ctx.clip();

    // ---- MARIA (어두운 현무암 평원) ----
    // Mare Imbrium: 좌상단 크고 둥근 바다
    ctx.fillStyle='rgba(18,17,15,0.62)';
    ctx.beginPath(); ctx.ellipse(cx-r*0.26,py-r*0.30,r*0.36,r*0.30,-0.25,0,Math.PI*2); ctx.fill();

    // Mare Serenitatis: 상단 우측
    ctx.fillStyle='rgba(20,19,17,0.55)';
    ctx.beginPath(); ctx.ellipse(cx+r*0.18,py-r*0.20,r*0.26,r*0.22,0.18,0,Math.PI*2); ctx.fill();

    // Mare Tranquillitatis + Fecunditatis: 중앙 우측 큰 덩어리
    ctx.fillStyle='rgba(16,15,13,0.58)';
    ctx.beginPath(); ctx.ellipse(cx+r*0.24,py+r*0.10,r*0.30,r*0.36,0.12,0,Math.PI*2); ctx.fill();

    // Oceanus Procellarum: 좌측 넓고 불규칙한 거대 바다
    ctx.fillStyle='rgba(22,21,19,0.44)';
    ctx.beginPath(); ctx.ellipse(cx-r*0.44,py+r*0.08,r*0.20,r*0.42,0.08,0,Math.PI*2); ctx.fill();

    // Mare Crisium: 우측 테두리쪽 작은 타원 (특징적)
    ctx.fillStyle='rgba(18,17,15,0.68)';
    ctx.beginPath(); ctx.ellipse(cx+r*0.62,py-r*0.26,r*0.13,r*0.10,0.0,0,Math.PI*2); ctx.fill();

    // Mare Nubium: 하단 좌측 작은 바다
    ctx.fillStyle='rgba(20,19,17,0.46)';
    ctx.beginPath(); ctx.ellipse(cx-r*0.14,py+r*0.50,r*0.18,r*0.14,-0.28,0,Math.PI*2); ctx.fill();

    // ---- 크레이터 ----
    const craters=[
        // 대형
        [r*0.08,  r*0.62, 15, 0.88], // Tycho (광조의 주인공, 하단)
        [-r*0.20, r*0.04, 12, 0.78], // Copernicus
        [r*0.50,  r*0.30, 9,  0.72], // Kepler
        [-r*0.56,-r*0.54, 8,  0.68], // Highland crater
        [r*0.30, -r*0.58, 8,  0.72], // 상단
        // 중형
        [-r*0.72, r*0.22, 7,  0.62],
        [r*0.62,  r*0.08, 6,  0.62],
        [-r*0.08,-r*0.72, 6,  0.58],
        [r*0.40,  r*0.58, 5,  0.62],
        [-r*0.40, r*0.54, 5,  0.58],
        // 소형 산재
        [r*0.72, -r*0.45, 4, 0.52],
        [-r*0.30,-r*0.46, 4, 0.52],
        [r*0.18,  r*0.30, 3, 0.48],
        [-r*0.62, r*0.50, 3, 0.48],
        [r*0.55, -r*0.60, 3, 0.50],
    ];

    for(const [ox,oy,cr,br] of craters){
        const crx=cx+ox, cry=py+oy;
        // 어두운 크레이터 바닥
        ctx.fillStyle=`rgba(8,8,7,${br*0.55})`;
        ctx.beginPath(); ctx.arc(crx,cry,cr,0,Math.PI*2); ctx.fill();
        // 밝은 림 하이라이트 (좌상단쪽 빛)
        ctx.strokeStyle=`rgba(232,228,222,${br*0.52})`;
        ctx.lineWidth=Math.max(cr*0.30,1);
        ctx.beginPath(); ctx.arc(crx-cr*0.15,cry-cr*0.15,cr*0.75,Math.PI*0.75,Math.PI*1.9); ctx.stroke();
        // 외부 밝은 에젝타 링
        ctx.strokeStyle=`rgba(195,190,183,${br*0.22})`;
        ctx.lineWidth=cr*0.18;
        ctx.beginPath(); ctx.arc(crx,cry,cr*1.18,0,Math.PI*2); ctx.stroke();
    }

    // ---- Tycho 광조 (ray system) ----
    ctx.globalAlpha=0.075;
    ctx.strokeStyle='#ece8e2';
    for(let i=0;i<10;i++){
        const ang=(i/10)*Math.PI*2+0.18;
        const len=r*0.88;
        ctx.lineWidth=1.4+(i%3)*0.4;
        ctx.beginPath();
        ctx.moveTo(cx+r*0.08+Math.cos(ang)*16, py+r*0.62+Math.sin(ang)*16);
        ctx.lineTo(cx+r*0.08+Math.cos(ang)*len, py+r*0.62+Math.sin(ang)*len);
        ctx.stroke();
    }
    ctx.globalAlpha=1;

    // ---- Terminator (우측에서 어두워짐) ----
    const termGrad=ctx.createRadialGradient(cx+r*0.50,py,r*0.20,cx+r*0.50,py,r*1.05);
    termGrad.addColorStop(0,'rgba(0,3,12,0)');
    termGrad.addColorStop(0.45,'rgba(0,3,12,0.12)');
    termGrad.addColorStop(1,'rgba(0,3,12,0.80)');
    ctx.fillStyle=termGrad;
    ctx.fillRect(cx-r,py-r,r*2,r*2);

    ctx.restore(); // clip 해제
    ctx.restore();
}

function drawMars(zoneT){
    const py=CH*(zoneT*2.0-0.4);
    const cx=CW*0.65, r=72;
    ctx.save();

    // 오렌지 글로우 (화성 대기)
    ctx.shadowColor='rgba(255,90,20,0.50)';
    ctx.shadowBlur=30;
    const base=ctx.createRadialGradient(cx-r*0.28,py-r*0.28,r*0.08,cx,py,r);
    base.addColorStop(0,'#e8622e');
    base.addColorStop(0.55,'#c04418');
    base.addColorStop(0.88,'#8a2e0a');
    base.addColorStop(1,'#601800');
    ctx.fillStyle=base;
    ctx.beginPath(); ctx.arc(cx,py,r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;

    ctx.save();
    ctx.beginPath(); ctx.arc(cx,py,r,0,Math.PI*2); ctx.clip();

    // Hellas Planitia: 남반구 큰 충돌 분지 (약간 밝은 베이지)
    ctx.fillStyle='rgba(220,160,100,0.30)';
    ctx.beginPath(); ctx.ellipse(cx+r*0.28,py+r*0.45,r*0.32,r*0.22,0.4,0,Math.PI*2); ctx.fill();

    // Syrtis Major: 어두운 현무암 삼각형 영역
    ctx.fillStyle='rgba(30,18,10,0.38)';
    ctx.beginPath(); ctx.moveTo(cx+r*0.05,py-r*0.08); ctx.lineTo(cx+r*0.20,py+r*0.30); ctx.lineTo(cx-r*0.12,py+r*0.30); ctx.closePath(); ctx.fill();

    // Tharsis 고원: 좌상단 약간 더 붉은 돌출부
    ctx.fillStyle='rgba(100,20,5,0.22)';
    ctx.beginPath(); ctx.ellipse(cx-r*0.38,py-r*0.12,r*0.30,r*0.28,0.2,0,Math.PI*2); ctx.fill();

    // Olympus Mons (가장 큰 화산): Tharsis 위 원형 어두운 원
    ctx.fillStyle='rgba(80,14,4,0.30)';
    ctx.beginPath(); ctx.arc(cx-r*0.45,py-r*0.20,r*0.14,0,Math.PI*2); ctx.fill();
    // 칼데라 (정상 분화구 힌트)
    ctx.fillStyle='rgba(40,8,2,0.45)';
    ctx.beginPath(); ctx.arc(cx-r*0.45,py-r*0.20,r*0.045,0,Math.PI*2); ctx.fill();

    // Valles Marineris 협곡 (가장 특징적인 표면 지형)
    ctx.strokeStyle='rgba(50,14,6,0.72)';
    ctx.lineWidth=4.5;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(cx-r*0.18,py+r*0.04);
    ctx.bezierCurveTo(cx+r*0.05,py+r*0.03,cx+r*0.35,py+r*0.14,cx+r*0.58,py+r*0.10);
    ctx.stroke();
    // 협곡 보조선
    ctx.strokeStyle='rgba(40,10,4,0.40)';
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(cx-r*0.24,py+r*0.10);
    ctx.bezierCurveTo(cx+r*0.04,py+r*0.09,cx+r*0.34,py+r*0.18,cx+r*0.56,py+r*0.15);
    ctx.stroke();

    // 북극 얼음 캡 (크고 밝고 불규칙)
    ctx.fillStyle='rgba(255,255,252,0.82)';
    ctx.beginPath();
    ctx.ellipse(cx,py-r*0.72,r*0.38,r*0.20,0.1,0,Math.PI*2); ctx.fill();
    // 극 캡 안쪽 더 밝은 중심
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.beginPath(); ctx.ellipse(cx+r*0.04,py-r*0.76,r*0.22,r*0.10,0.15,0,Math.PI*2); ctx.fill();

    // 남극 얼음 캡 (더 작음)
    ctx.fillStyle='rgba(248,248,245,0.70)';
    ctx.beginPath(); ctx.ellipse(cx-r*0.05,py+r*0.76,r*0.22,r*0.10,-0.1,0,Math.PI*2); ctx.fill();

    // 대기 헤이즈 (림 주변 주황빛 glow)
    const haze=ctx.createRadialGradient(cx,py,r*0.80,cx,py,r*1.0);
    haze.addColorStop(0,'rgba(255,130,50,0)');
    haze.addColorStop(1,'rgba(255,130,50,0.30)');
    ctx.fillStyle=haze;
    ctx.fillRect(cx-r,py-r,r*2,r*2);

    ctx.restore();
    ctx.restore();
}

function drawJupiter(zoneT){
    const py=CH*(zoneT*2.0-0.4);
    const cx=CW*0.5, r=130;
    ctx.save();
    // 1. Base planet body WITH outer glow (before clip so shadow renders outside)
    ctx.shadowColor='rgba(200,140,40,0.65)';
    ctx.shadowBlur=42;
    ctx.fillStyle='#c07828';
    ctx.beginPath(); ctx.arc(cx,py,r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    // 2. Clip + draw bands on top
    ctx.save();
    ctx.beginPath(); ctx.arc(cx,py,r,0,Math.PI*2); ctx.clip();
    const bands=[
        {y:py-r,      h:r*0.12, c:'#f0e0a0'}, // 북극대
        {y:py-r*0.88, h:r*0.14, c:'#a86828'}, // NNB
        {y:py-r*0.74, h:r*0.16, c:'#ead890'}, // NTZ
        {y:py-r*0.58, h:r*0.18, c:'#b87830'}, // NEB (북적도대 — 가장 어두운 편)
        {y:py-r*0.40, h:r*0.20, c:'#ead080'}, // EZ (적도대 — 가장 밝음)
        {y:py-r*0.20, h:r*0.20, c:'#b47228'}, // SEB (남적도대 — GRS 위치)
        {y:py+r*0.00, h:r*0.16, c:'#e8d488'}, // STZ
        {y:py+r*0.16, h:r*0.14, c:'#9a6020'}, // STB
        {y:py+r*0.30, h:r*0.16, c:'#e0c870'}, // SSTB
        {y:py+r*0.46, h:r*0.14, c:'#b06a22'}, // 남극대
        {y:py+r*0.60, h:r*0.40, c:'#c07828'}, // 남극 덮개
    ];
    for(const b of bands){
        ctx.fillStyle=b.c;
        ctx.fillRect(cx-r,b.y,r*2,b.h);
    }
    // Great Red Spot — 남적도대(SEB) 안에, 내부에 소용돌이 동심원
    const gx=cx-r*0.18, gy=py+r*0.10;
    ctx.fillStyle='#b03818'; // 외부 붉은
    ctx.beginPath(); ctx.ellipse(gx,gy,30,18,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#c84828'; // 내부 약간 밝음
    ctx.beginPath(); ctx.ellipse(gx,gy,22,13,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(220,100,60,0.55)'; // 중심 밝은 부분
    ctx.beginPath(); ctx.ellipse(gx,gy,12,7,0,0,Math.PI*2); ctx.fill();
    // GRS 테두리 (밝은 테두리)
    ctx.strokeStyle='rgba(240,180,100,0.35)';
    ctx.lineWidth=2;
    ctx.beginPath(); ctx.ellipse(gx,gy,31,19,0,0,Math.PI*2); ctx.stroke();

    // Oval BA (GRS 아래 흰색 타원 폭풍)
    ctx.fillStyle='rgba(248,240,200,0.70)';
    ctx.beginPath(); ctx.ellipse(gx+r*0.35,gy+r*0.20,14,9,0,0,Math.PI*2); ctx.fill();

    ctx.restore(); // ends clip
    // Moons (outside clip)
    ctx.fillStyle='rgba(240,200,55,0.95)'; // Io (sulfur-yellow)
    ctx.beginPath(); ctx.arc(cx+r+26,py+28,7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(215,215,235,0.95)'; // Europa (icy white)
    ctx.beginPath(); ctx.arc(cx-r-18,py-16,5,0,Math.PI*2); ctx.fill();
    ctx.restore();
}

function drawSaturn(zoneT){
    const py=CH*(zoneT*2.0-0.4);
    const cx=CW*0.5, r=65;
    ctx.save();

    // ring 그리기: 3개 링 + Cassini Division 묘사
    function drawRingSet(front){
        const startA = front ? Math.PI : 0;
        const endA   = front ? Math.PI*2 : Math.PI;

        // C링 (Crepe ring) — 매우 반투명, 안쪽
        ctx.save(); ctx.globalAlpha=0.28;
        ctx.strokeStyle='rgba(160,130,70,1)'; ctx.lineWidth=9;
        ctx.beginPath(); ctx.ellipse(cx,py,98,13,0,startA,endA); ctx.stroke();
        ctx.restore();

        // B링 — 가장 밝고 두꺼운 링
        ctx.save(); ctx.globalAlpha=0.72;
        ctx.strokeStyle='rgba(230,200,130,1)'; ctx.lineWidth=14;
        ctx.beginPath(); ctx.ellipse(cx,py,120,16,0,startA,endA); ctx.stroke();
        ctx.restore();

        // Cassini Division (B링과 A링 사이 어두운 간격)
        ctx.save(); ctx.globalAlpha=0.82;
        ctx.strokeStyle='rgba(20,16,10,1)'; ctx.lineWidth=5;
        ctx.beginPath(); ctx.ellipse(cx,py,135,18,0,startA,endA); ctx.stroke();
        ctx.restore();

        // A링 — 중간 밝기
        ctx.save(); ctx.globalAlpha=0.62;
        ctx.strokeStyle='rgba(210,180,110,1)'; ctx.lineWidth=11;
        ctx.beginPath(); ctx.ellipse(cx,py,150,20,0,startA,endA); ctx.stroke();
        ctx.restore();
    }

    // Draw back rings (뒤쪽 반원)
    drawRingSet(false);

    // Planet
    const g=ctx.createRadialGradient(cx-r*0.3,py-r*0.3,r*0.1,cx,py,r);
    g.addColorStop(0,'#f0d890');
    g.addColorStop(1,'#b89840');
    ctx.fillStyle=g;
    ctx.shadowColor='rgba(220,180,80,0.3)';
    ctx.shadowBlur=12;
    ctx.beginPath(); ctx.arc(cx,py,r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;

    // 행성 본체 묽은 줄무늬
    ctx.save();
    ctx.beginPath(); ctx.arc(cx,py,r,0,Math.PI*2); ctx.clip();
    const sbands=[
        {y:py-r,h:r*0.3,c:'rgba(240,220,140,0.20)'},
        {y:py-r*0.7,h:r*0.25,c:'rgba(180,140,60,0.18)'},
        {y:py-r*0.45,h:r*0.20,c:'rgba(250,230,160,0.15)'},
        {y:py-r*0.25,h:r*0.50,c:'rgba(200,165,80,0.12)'},
    ];
    for(const b of sbands){ ctx.fillStyle=b.c; ctx.fillRect(cx-r,b.y,r*2,b.h); }
    ctx.restore();

    // Draw front rings (앞쪽 반원)
    drawRingSet(true);

    // Titan (주황빛, 오른쪽에 가시범위 내 배치)
    ctx.fillStyle='rgba(230,160,80,0.95)';
    ctx.shadowColor='rgba(220,140,50,0.5)';
    ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(cx+r+28,py-8,6,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.restore();
}

function drawUranus(zoneT){
    const py=CH*(zoneT*2.0-0.4);
    const cx=CW*0.4, r=55;
    ctx.save();
    const g=ctx.createRadialGradient(cx-r*0.3,py-r*0.3,r*0.1,cx,py,r);
    g.addColorStop(0,'#aaeeff');
    g.addColorStop(1,'#2a9999');
    ctx.fillStyle=g;
    ctx.shadowColor='rgba(80,220,220,0.35)';
    ctx.shadowBlur=16;
    ctx.beginPath(); ctx.arc(cx,py,r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    // Faint band
    ctx.save();
    ctx.beginPath(); ctx.arc(cx,py,r,0,Math.PI*2); ctx.clip();
    ctx.strokeStyle='rgba(150,230,230,0.2)';
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(cx-r,py); ctx.lineTo(cx+r,py); ctx.stroke();
    ctx.restore();
    // Rings (nearly horizontal, slightly tilted)
    ctx.save();
    ctx.translate(cx,py);
    ctx.rotate(0.26);
    for(let ri=0;ri<2;ri++){
        const rx=90+ri*14, ry=8+ri*2;
        ctx.strokeStyle='rgba(100,200,200,0.30)';
        ctx.lineWidth=ry*0.7;
        ctx.beginPath(); ctx.ellipse(0,0,rx,ry,0,0,Math.PI*2); ctx.stroke();
    }
    ctx.restore();
    // Polar aurora
    ctx.save();
    ctx.beginPath(); ctx.arc(cx,py,r,0,Math.PI*2); ctx.clip();
    const aPol=ctx.createRadialGradient(cx,py-r*0.7,2,cx,py-r*0.7,r*0.35);
    aPol.addColorStop(0,'rgba(100,255,240,0.45)');
    aPol.addColorStop(1,'rgba(100,255,240,0)');
    ctx.fillStyle=aPol;
    ctx.fillRect(cx-r,py-r,r*2,r);
    ctx.restore();
    ctx.restore();
}

function drawNeptune(zoneT){
    const py=CH*(zoneT*2.0-0.4);
    const cx=CW*0.6, r=55;
    ctx.save();
    const g=ctx.createRadialGradient(cx-r*0.3,py-r*0.3,r*0.1,cx,py,r);
    g.addColorStop(0,'#2255ee');
    g.addColorStop(1,'#060e66');
    ctx.fillStyle=g;
    ctx.shadowColor='rgba(40,80,255,0.55)';
    ctx.shadowBlur=22;
    ctx.beginPath(); ctx.arc(cx,py,r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    // Great Dark Spot
    ctx.save();
    ctx.beginPath(); ctx.arc(cx,py,r,0,Math.PI*2); ctx.clip();
    ctx.fillStyle='rgba(5,10,60,0.65)';
    ctx.beginPath(); ctx.ellipse(cx+r*0.2,py-r*0.15,18,11,0.2,0,Math.PI*2); ctx.fill();
    // Methane clouds
    ctx.strokeStyle='rgba(200,220,255,0.55)';
    ctx.lineWidth=2;
    for(const [ox,oy] of [[-20,-30],[15,-10],[-5,25],[25,18]]){
        ctx.beginPath(); ctx.arc(cx+ox,py+oy,10+Math.abs(ox)*0.3,0.1,1.0); ctx.stroke();
    }
    // Wind streaks
    ctx.strokeStyle='rgba(140,180,255,0.18)';
    ctx.lineWidth=1;
    for(let wi=0;wi<4;wi++){
        const wy=py-r+wi*(r*0.5);
        ctx.beginPath(); ctx.moveTo(cx-r+5,wy); ctx.lineTo(cx+r-5,wy); ctx.stroke();
    }
    ctx.restore();
    ctx.restore();
}

function drawPluto(zoneT){
    const py=CH*(zoneT*2.0-0.4);
    const cx=CW*0.5, r=28;
    ctx.save();
    const g=ctx.createRadialGradient(cx-r*0.3,py-r*0.3,r*0.1,cx,py,r);
    g.addColorStop(0,'#b08878');
    g.addColorStop(1,'#6a4a40');
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(cx,py,r,0,Math.PI*2); ctx.fill();
    // Tombaugh Regio (heart-ish blob)
    ctx.save();
    ctx.beginPath(); ctx.arc(cx,py,r,0,Math.PI*2); ctx.clip();
    ctx.fillStyle='rgba(240,210,180,0.55)';
    ctx.beginPath(); ctx.ellipse(cx+4,py+3,r*0.48,r*0.35,-0.2,0,Math.PI*2); ctx.fill();
    ctx.restore();
    // Charon
    ctx.fillStyle='#888890';
    ctx.beginPath(); ctx.arc(cx+65,py-15,14,0,Math.PI*2); ctx.fill();
    // Haze arc
    ctx.strokeStyle='rgba(140,180,220,0.18)';
    ctx.lineWidth=4;
    ctx.beginPath(); ctx.arc(cx,py,r+5,0,Math.PI*2); ctx.stroke();
    // Kuiper belt dots
    for(let i=0;i<8;i++){
        const ang=(i/8)*Math.PI*2+0.4;
        const dist=r*2+i*14;
        ctx.fillStyle='rgba(180,180,200,0.4)';
        ctx.beginPath(); ctx.arc(cx+Math.cos(ang)*dist,py+Math.sin(ang)*dist*0.5,1.5,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
}

function drawHelioEdge(zoneT){
    // Heliosphere boundary — no planet, instead a glowing band + Voyager
    ctx.save();
    // Termination shock band
    const bandY=CH*0.28;
    const bandG=ctx.createLinearGradient(0,bandY-18,0,bandY+22);
    bandG.addColorStop(0,'rgba(0,0,0,0)');
    bandG.addColorStop(0.4,'rgba(255,200,80,0.12)');
    bandG.addColorStop(0.6,'rgba(255,200,80,0.08)');
    bandG.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=bandG;
    ctx.fillRect(0,bandY-18,CW,40);
    // Faint label
    ctx.font='9px Orbitron,sans-serif';
    ctx.fillStyle='rgba(255,200,80,0.22)';
    ctx.textAlign='center';
    ctx.fillText('TERMINATION SHOCK',CW/2,bandY+4);
    // Voyager probe
    const vx=CW*0.7, vy=CH*0.32;
    ctx.save();
    ctx.translate(vx,vy);
    ctx.rotate(-0.5);
    // Body (golden disk)
    ctx.fillStyle='rgba(220,180,60,0.85)';
    ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(200,160,40,0.6)';
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2); ctx.stroke();
    // Dish arm
    ctx.strokeStyle='rgba(200,200,200,0.6)';
    ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(8,0); ctx.lineTo(20,0); ctx.stroke();
    // Dish
    ctx.strokeStyle='rgba(200,200,200,0.55)';
    ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(20,0,5,-0.8,0.8); ctx.stroke();
    // Instruments
    ctx.strokeStyle='rgba(180,180,180,0.4)';
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(-4,8); ctx.lineTo(-8,18); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(4,8); ctx.lineTo(10,18); ctx.stroke();
    ctx.restore();
    // Undulating current sheet
    ctx.strokeStyle='rgba(100,140,200,0.15)';
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(0, CH*0.5);
    for(let xw=0;xw<=CW;xw+=10){
        ctx.lineTo(xw, CH*0.5+Math.sin(xw*0.04)*18);
    }
    ctx.stroke();
    ctx.textAlign='left';
    ctx.restore();
}

/* drawInterstellar (이전 zoneIdx 9) 는 신 zone 시퀀스로 대체됨 (Oort/Proxima 등).
   함수 자체 제거 — 호출처 없음. */

function drawHorseheadNebula(){
    // Rich crimson nebula overlay
    ctx.save();
    ctx.fillStyle='rgba(80,5,25,0.6)';
    ctx.fillRect(0,0,CW,CH);
    // Nebula pillar streaks
    ctx.strokeStyle='rgba(180,40,80,0.12)';
    ctx.lineWidth=18;
    for(let i=0;i<4;i++){
        ctx.beginPath();
        ctx.moveTo(CW*0.3+i*25, 0);
        ctx.lineTo(CW*0.28+i*22, CH);
        ctx.stroke();
    }
    // Alnitak star (brilliant blue-white)
    ctx.shadowColor='rgba(150,180,255,0.9)';
    ctx.shadowBlur=32;
    ctx.fillStyle='#d0e0ff';
    ctx.beginPath(); ctx.arc(CW*0.75,CH*0.15,8,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    // Horsehead silhouette
    const hx=CW*0.5, hy=CH*0.4;
    ctx.fillStyle='rgba(12,2,8,0.88)';
    ctx.beginPath();
    // rough horsehead shape
    ctx.moveTo(hx-18,hy+40);
    ctx.lineTo(hx-22,hy-10);
    ctx.quadraticCurveTo(hx-30,hy-35,hx-15,hy-55);
    ctx.quadraticCurveTo(hx+5,hy-70,hx+20,hy-50);
    ctx.quadraticCurveTo(hx+32,hy-30,hx+25,hy-5);
    ctx.quadraticCurveTo(hx+30,hy+10,hx+18,hy+20);
    ctx.quadraticCurveTo(hx+10,hy+25,hx+12,hy+40);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
}

/* ---- Oort Cloud — 어두운 cometary nuclei + 점점이 흩어진 얼음 입자 ---- */
function drawOortCloud(){
    ctx.save();
    /* 옅은 spherical shell 표현: 화면 가장자리에 옅은 dust band */
    const cx = CW/2, cy = CH*0.35;
    const ringG = ctx.createRadialGradient(cx, cy, 80, cx, cy, 260);
    ringG.addColorStop(0, 'rgba(0,0,0,0)');
    ringG.addColorStop(0.6, 'rgba(180,200,230,0.04)');
    ringG.addColorStop(0.8, 'rgba(180,200,230,0.08)');
    ringG.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = ringG;
    ctx.fillRect(0, 0, CW, CH);
    /* Cometary nuclei — 작은 흰 점 + 살짝 꼬리 */
    const nuclei = [
        [CW*0.18, CH*0.22, 1.6, 0.6],
        [CW*0.78, CH*0.12, 1.2, 0.4],
        [CW*0.42, CH*0.08, 1.8, 0.7],
        [CW*0.62, CH*0.32, 1.4, 0.5],
        [CW*0.30, CH*0.45, 1.0, 0.5],
        [CW*0.85, CH*0.40, 1.3, 0.5],
    ];
    for(const n of nuclei){
        ctx.fillStyle = 'rgba(220,235,255,'+n[3]+')';
        ctx.beginPath(); ctx.arc(n[0], n[1], n[2], 0, Math.PI*2); ctx.fill();
        /* 짧은 꼬리 */
        ctx.strokeStyle = 'rgba(220,235,255,'+(n[3]*0.25)+')';
        ctx.lineWidth = 0.7;
        ctx.beginPath();
        ctx.moveTo(n[0], n[1]);
        ctx.lineTo(n[0]+8, n[1]-6);
        ctx.stroke();
    }
    /* "100,000 AU" 라벨 (옅게) */
    ctx.font = '9px Orbitron,sans-serif';
    ctx.fillStyle = 'rgba(180,200,230,0.22)';
    ctx.textAlign = 'center';
    ctx.fillText('100,000 AU', CW/2, CH*0.18);
    ctx.textAlign = 'left';
    ctx.restore();
}

/* ---- Proxima Centauri — 적색 왜성 + 행성 Proxima b ---- */
function drawProximaCentauri(){
    ctx.save();
    const sx = CW*0.30, sy = CH*0.22;
    /* 적색왜성 본체 — 작고 따뜻한 빛 */
    ctx.shadowColor = 'rgba(255,80,40,0.85)';
    ctx.shadowBlur = 24;
    const sG = ctx.createRadialGradient(sx-1.5, sy-2, 1, sx, sy, 14);
    sG.addColorStop(0, '#ffeebb');
    sG.addColorStop(0.4, '#ffaa55');
    sG.addColorStop(0.8, '#cc4422');
    sG.addColorStop(1, '#5c1810');
    ctx.fillStyle = sG;
    ctx.beginPath(); ctx.arc(sx, sy, 13, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    /* 외곽 아우라 */
    const aG = ctx.createRadialGradient(sx, sy, 12, sx, sy, 50);
    aG.addColorStop(0, 'rgba(255,140,80,0.18)');
    aG.addColorStop(1, 'rgba(255,140,80,0)');
    ctx.fillStyle = aG;
    ctx.fillRect(sx-50, sy-50, 100, 100);
    /* Proxima b — 작은 행성 (orbit hint) */
    const px = sx + 38, py = sy + 18;
    ctx.fillStyle = '#7c5444';
    ctx.beginPath(); ctx.arc(px, py, 3, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,140,80,0.18)';
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    ctx.ellipse(sx, sy, 42, 22, 0.35, 0, Math.PI*2);
    ctx.stroke();
    /* 라벨 */
    ctx.font = '9px Orbitron,sans-serif';
    ctx.fillStyle = 'rgba(255,160,100,0.45)';
    ctx.textAlign = 'left';
    ctx.fillText('PROXIMA b', px+6, py+3);
    ctx.restore();
}

/* ---- Sirius — 청백 쌍성 (시리우스 A 큰 + 시리우스 B 백색왜성 작은) ---- */
function drawSirius(){
    ctx.save();
    const ax = CW*0.32, ay = CH*0.20;
    /* Sirius A — 크고 강렬한 청백 */
    ctx.shadowColor = 'rgba(140,180,255,0.95)';
    ctx.shadowBlur = 28;
    const aG = ctx.createRadialGradient(ax-2, ay-2, 1, ax, ay, 12);
    aG.addColorStop(0, '#ffffff');
    aG.addColorStop(0.5, '#cce0ff');
    aG.addColorStop(1, '#5080cc');
    ctx.fillStyle = aG;
    ctx.beginPath(); ctx.arc(ax, ay, 11, 0, Math.PI*2); ctx.fill();
    /* Diffraction spike */
    ctx.strokeStyle = 'rgba(200,220,255,0.55)';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(ax-26, ay); ctx.lineTo(ax+26, ay);
    ctx.moveTo(ax, ay-26); ctx.lineTo(ax, ay+26);
    ctx.stroke();
    ctx.shadowBlur = 0;
    /* Sirius B — 작은 백색왜성 */
    const bx = ax + 38, by = ay + 10;
    ctx.shadowColor = 'rgba(220,230,255,0.7)';
    ctx.shadowBlur = 10;
    ctx.fillStyle = '#eef0ff';
    ctx.beginPath(); ctx.arc(bx, by, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    /* 두 별 사이 dust thread */
    ctx.strokeStyle = 'rgba(140,180,255,0.10)';
    ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(ax+10, ay+2); ctx.lineTo(bx-2, by); ctx.stroke();
    ctx.font = '8px Orbitron,sans-serif';
    ctx.fillStyle = 'rgba(180,210,255,0.32)';
    ctx.fillText('A', ax+13, ay-12);
    ctx.fillText('B', bx+5, by-4);
    ctx.restore();
}

/* ---- Betelgeuse — 적색 초거성, 거대 + 비대칭 + 충격파 ---- */
function drawBetelgeuse(){
    ctx.save();
    const sx = CW*0.50, sy = CH*0.25;
    /* Halo (외곽 dust) */
    const hG = ctx.createRadialGradient(sx, sy, 30, sx, sy, 90);
    hG.addColorStop(0, 'rgba(255,80,40,0.18)');
    hG.addColorStop(0.5, 'rgba(220,60,30,0.08)');
    hG.addColorStop(1, 'rgba(220,60,30,0)');
    ctx.fillStyle = hG;
    ctx.fillRect(sx-90, sy-90, 180, 180);
    /* 본체 — 거대 적색거성, 표면 turbulence */
    ctx.shadowColor = 'rgba(255,100,50,0.95)';
    ctx.shadowBlur = 32;
    const bG = ctx.createRadialGradient(sx-6, sy-6, 4, sx, sy, 30);
    bG.addColorStop(0, '#ffd0a0');
    bG.addColorStop(0.35, '#ff7c30');
    bG.addColorStop(0.7, '#cc4020');
    bG.addColorStop(1, '#5c1810');
    ctx.fillStyle = bG;
    ctx.beginPath(); ctx.arc(sx, sy, 28, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    /* 표면 dark blotches (적색거성 convection cells) */
    ctx.fillStyle = 'rgba(80,20,10,0.42)';
    ctx.beginPath(); ctx.arc(sx-8, sy-4, 6, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx+10, sy+6, 4.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx+2, sy+12, 3.5, 0, Math.PI*2); ctx.fill();

    ctx.lineWidth = 1.5;
    ctx.beginPath();

/* ---- Pillars of Creation — 3 개 dark gas pillar + 별빛 ---- */
function drawPillarsOfCreation(){
    ctx.save();
    /* 옅은 gas overlay */
    ctx.fillStyle = 'rgba(60,80,110,0.35)';
    ctx.fillRect(0, 0, CW, CH);
    /* 별빛 (먼 cluster) */
    ctx.shadowColor = 'rgba(255,240,200,0.7)';
    ctx.shadowBlur = 12;
    const stars = [[CW*0.20, CH*0.10], [CW*0.85, CH*0.08], [CW*0.70, CH*0.30]];
    for(const s of stars){
        ctx.fillStyle = 'rgba(255,250,220,0.85)';
        ctx.beginPath(); ctx.arc(s[0], s[1], 2.5, 0, Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur = 0;
    /* 3 개 dark pillars — 위에서 아래로 자라는 gas 기둥 */
    const pillars = [
        { x: CW*0.22, w: 38, top: 0,    bot: CH*0.55, lean: -4 },
        { x: CW*0.50, w: 46, top: CH*0.05, bot: CH*0.50, lean: 0 },
        { x: CW*0.78, w: 30, top: CH*0.10, bot: CH*0.45, lean: 6 },
    ];
    for(const p of pillars){
        const grad = ctx.createLinearGradient(p.x, p.top, p.x, p.bot);
        grad.addColorStop(0,    'rgba(40,60,80,0.25)');
        grad.addColorStop(0.4,  'rgba(30,50,70,0.65)');
        grad.addColorStop(0.85, 'rgba(20,30,42,0.85)');
        grad.addColorStop(1,    'rgba(20,30,42,0.45)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(p.x - p.w/2, p.top);
        ctx.bezierCurveTo(p.x - p.w/2 + p.lean*0.3, (p.top+p.bot)/2,
                          p.x - p.w/3 + p.lean*0.6, p.bot - 8,
                          p.x - p.w/4 + p.lean, p.bot);
        ctx.lineTo(p.x + p.w/4 + p.lean, p.bot);
        ctx.bezierCurveTo(p.x + p.w/3 + p.lean*0.6, p.bot - 8,
                          p.x + p.w/2 + p.lean*0.3, (p.top+p.bot)/2,
                          p.x + p.w/2, p.top);
        ctx.closePath();
        ctx.fill();
        /* edge lighting (top) */
        ctx.strokeStyle = 'rgba(160,180,210,0.18)';
        ctx.lineWidth = 1;
        ctx.stroke();
    }
    ctx.restore();
}

/* ---- Sagittarius A* — 은하 중심 초거대 블랙홀.
   accretion disk (회전하는 뜨거운 ring) + 중앙 event horizon (검정 sphere) +
   photon ring (Einstein ring 단순화). 끄는 효과는 update_blackhole() 에서 처리. */
function drawSagittariusA(){
    const now = performance.now();
    const cx = CW * 0.5;
    const cy = CH * 0.30;
    blackHole.cx = cx;          /* update 단계에서 끜당김 위치 참조 */
    blackHole.cy = cy;
    blackHole.r = 22;            /* event horizon 반경 */
    ctx.save();
    /* 1. 외곽 spacetime 휘어짐 — radial dim gradient (별이 휘어 보이는 듯한 톤) */
    const distortG = ctx.createRadialGradient(cx, cy, 26, cx, cy, 160);
    distortG.addColorStop(0,   'rgba(0,0,0,0.0)');
    distortG.addColorStop(0.3, 'rgba(0,0,0,0.55)');
    distortG.addColorStop(0.7, 'rgba(0,0,0,0.20)');
    distortG.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = distortG;
    ctx.fillRect(cx - 160, cy - 160, 320, 320);

    /* 2. accretion disk — 회전하는 뜨거운 디스크 (orange/yellow, 타원 perspective) */
    const rot = now * 0.0006;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(rot);
    /* 외곽 disk */
    const diskG = ctx.createRadialGradient(0, 0, 24, 0, 0, 78);
    diskG.addColorStop(0,    'rgba(255,255,200,0.0)');
    diskG.addColorStop(0.25, 'rgba(255,200,80,0.85)');
    diskG.addColorStop(0.55, 'rgba(255,140,40,0.55)');
    diskG.addColorStop(0.85, 'rgba(180,60,30,0.25)');
    diskG.addColorStop(1,    'rgba(80,20,10,0)');
    ctx.fillStyle = diskG;
    ctx.beginPath();
    ctx.ellipse(0, 0, 78, 16, 0, 0, Math.PI*2);
    ctx.fill();
    /* 내부 hot spot — 도플러 brightening (한쪽이 더 밝게, 회전 방향 표시) */
    ctx.fillStyle = 'rgba(255,255,220,0.6)';
    ctx.beginPath();
    ctx.ellipse(50, 0, 28, 8, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    /* 3. photon ring — disk 가장자리 따라 도는 빛의 링 (Einstein ring 시각). */
    ctx.strokeStyle = 'rgba(255,200,80,0.55)';
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.arc(cx, cy, 30, 0, Math.PI*2);
    ctx.stroke();

    /* 4. event horizon — 완전 검은 sphere */
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(cx, cy, 22, 0, Math.PI*2);
    ctx.fill();

    /* 5. 가장자리 미세 cyan halo — 정보 손실 한계의 미세한 발광 */
    ctx.strokeStyle = 'rgba(120,180,255,0.18)';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.arc(cx, cy, 23, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
}

/* ---- Intergalactic Void — 거의 비어있고, 멀리 보이는 안드로메다 은하 ---- */
function drawIntergalacticVoid(){
    ctx.save();
    /* 멀리 보이는 안드로메다 — 옅은 spiral disk */
    const ax = CW*0.30, ay = CH*0.22;

    const hG = ctx.createRadialGradient(ax, ay, 0, ax, ay, 30);

    ctx.fillRect(ax-30, ay-30, 60, 60);

    ctx.translate(ax, ay);

    ctx.fillText('M31 · ANDROMEDA', ax, ay+22);

    /* 작은 점들 — 다른 멀리 있는 은하들 */

        [CW*0.70, CH*0.12, 1.5],

        [CW*0.55, CH*0.48, 0.8],

    for(const g of distantGalaxies){

}
