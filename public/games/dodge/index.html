/* ---- Zone label ---- */
function drawZoneLabel(dt){
    if(!zoneLabel.nameEn) return;
    zoneLabel.timer+=dt;
    const FADE=0.6, HOLD=2.3;
    const t=zoneLabel.timer;
    let a;
    if(t<FADE)            a=t/FADE;
    else if(t<FADE+HOLD)  a=1;
    else if(t<FADE+HOLD+FADE) a=1-(t-FADE-HOLD)/FADE;
    else { zoneLabel.nameEn=''; return; }

    const y=CH*0.80;
    ctx.save();
    ctx.globalAlpha=a;
    ctx.fillStyle='rgba(0,0,0,0.55)';
    drawRR(CW/2-110,y-24,220,44,10);
    ctx.fill();
    ctx.fillStyle='#fff';
    ctx.font='bold 15px Orbitron,sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(zoneLabel.nameEn, CW/2, y-8);
    ctx.fillStyle='#00D9FF';
    ctx.font='11px Noto Sans KR,sans-serif';
    ctx.fillText(zoneLabel.nameKo, CW/2, y+10);
    ctx.restore();
}

/* ---- Player ---- */
const PLAYER_SPEED=320;
const FOLLOW_SPEED=900;
const HIT_RADIUS=5;
const INVINCIBLE_MS=2000;
const FLASH_INTERVAL=120;

let player={x:CW/2, y:CH*0.65};
const STARTING_LIVES = 3;
const MAX_LIVES = 5;
let lives = STARTING_LIVES;
let invincibleUntil=0;
let flashVisible=true;
let lastFlashToggle=0;

/* ---- Pointer tracking ---- */
let pointer={x:player.x, y:player.y, active:false};

const canvasWrap=$('canvasWrap');
canvasWrap.addEventListener('mousemove',(e)=>{
    if(!running||paused)return;
    const r=canvas.getBoundingClientRect();
    pointer.x=(e.clientX-r.left)/r.width*CW;
    pointer.y=(e.clientY-r.top)/r.height*CH;
    pointer.active=true;
});
/* canvas-wrap 안에 .overlay (start) / .intro-overlay / .pvp-overlay 등
   여러 overlay 가 들어감. touchstart preventDefault 가 그 안의 button
   click 까지 막아 모바일에서 click 이 fire 안 되는 문제. 모든 overlay
   계열을 closest 검사에 포함해서 그 안 click 은 살림. */
canvasWrap.addEventListener('touchmove',(e)=>{
    if(e.target.closest('.overlay, .intro-overlay, .pvp-overlay')) return;
    e.preventDefault();
},{passive:false});
canvasWrap.addEventListener('touchstart',(e)=>{
    if(e.target.closest('.overlay, .intro-overlay, .pvp-overlay')) return;
    e.preventDefault();
},{passive:false});
canvasWrap.addEventListener('mouseleave',()=>{ pointer.active=false; });
canvasWrap.addEventListener('touchend',()=>{ pointer.active=false; });

/* ---- 원형 트랙패드 ----
   PERF: 이전엔 매 touchmove 마다 player + DOM box-shadow 즉시 갱신 → iOS Safari
   에서 큰 blur/spread 의 layer composite 가 multi-finger 시 main-thread jank 유발.
   해결: pendingTp 버퍼에 누적 → gameLoop frame 마다 1 회만 적용 (DOM 업데이트
   throttle to frame rate). 입력 latency 는 max 1 frame (~16ms) — 무시 가능. */
const TPSENS=2.4;
let tpLastX=0, tpLastY=0, tpCx=0, tpCy=0, tpR=0;
const tpZone=$('tpZone'), tpRing=$('tpRing');
const pendingTp = {
    dx: 0, dy: 0,            /* 누적 player delta (TPSENS 곱한 값) */
    ringX: 0, ringY: 0,      /* 마지막 touch 좌표 — ring 위치용 */
    rawDx: 0, rawDy: 0,      /* 마지막 frame 의 raw delta — glow 방향/크기용 */
    hasMove: false,
    active: false
};

function tpSetRing(cx, cy){
    const dx=cx-tpCx, dy=cy-tpCy;
    const d=Math.sqrt(dx*dx+dy*dy)||0.01;
    const maxR=tpR-27;
    const f=d>maxR?(maxR/d):1;
    tpRing.style.left=(tpR+dx*f)+'px';
    tpRing.style.top =(tpR+dy*f)+'px';
}

function tpSetGlow(dx, dy){
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<0.8){ tpZone.style.boxShadow='none'; return; }
    const nx=dx/d, ny=dy/d;
    const s=Math.min(d/7, 1);
    const ox=nx*24, oy=ny*24;
    const blur=16+s*16, spread=3+s*7;
    const aInner=0.12+s*0.22, aOuter=0.42+s*0.48;
    tpZone.style.boxShadow=
        `0 0 0 2px rgba(0,217,255,${aInner}),`+
        `${ox}px ${oy}px ${blur}px ${spread}px rgba(0,217,255,${aOuter})`;
}

function tpApplyDelta(cx, cy){
    /* 즉시 적용 X — pendingTp 에만 누적. flushTpInput() 이 frame 마다 한 번 적용. */
    const rdx = cx - tpLastX;
    const rdy = cy - tpLastY;
    pendingTp.dx += rdx * TPSENS;
    pendingTp.dy += rdy * TPSENS;
    pendingTp.ringX = cx;
    pendingTp.ringY = cy;
    pendingTp.rawDx = rdx;
    pendingTp.rawDy = rdy;
    pendingTp.hasMove = true;
    tpLastX = cx;
    tpLastY = cy;
}

/* gameLoop 에서 매 frame 호출 — 누적된 pendingTp 한 번에 player + DOM 적용. */
function flushTpInput(){
    if(!pendingTp.hasMove) return;
    player.x = Math.max(16, Math.min(CW-16, player.x + pendingTp.dx));
    player.y = Math.max(18, Math.min(CH-18, player.y + pendingTp.dy));
    tpSetRing(pendingTp.ringX, pendingTp.ringY);
    tpSetGlow(pendingTp.rawDx, pendingTp.rawDy);
    pendingTp.dx = 0;
    pendingTp.dy = 0;
    pendingTp.rawDx = 0;
    pendingTp.rawDy = 0;
    pendingTp.hasMove = false;
}

function tpEnd(){
    tpZone.classList.remove('on');
    tpZone.style.boxShadow='none';
    pendingTp.active = false;
    pendingTp.hasMove = false;
    pendingTp.dx = 0;
    pendingTp.dy = 0;
    pendingTp.rawDx = 0;
    pendingTp.rawDy = 0;
}

tpZone.addEventListener('touchstart',(e)=>{
    e.preventDefault();
    if(!running||paused) return;
    const r=tpZone.getBoundingClientRect();
    tpCx=r.left+r.width/2; tpCy=r.top+r.height/2; tpR=r.width/2;
    tpLastX=e.touches[0].clientX; tpLastY=e.touches[0].clientY;
    tpSetRing(tpLastX, tpLastY);
    tpZone.classList.add('on');
    pendingTp.active = true;
},{passive:false});
tpZone.addEventListener('touchmove',(e)=>{
    e.preventDefault();
    if(!running||paused) return;
    tpApplyDelta(e.touches[0].clientX, e.touches[0].clientY);
},{passive:false});
tpZone.addEventListener('touchend',   tpEnd);
tpZone.addEventListener('touchcancel',tpEnd);

/* ---- Keyboard state ---- */
const keys={};
document.addEventListener('keydown',(e)=>{
    keys[e.key]=true;
    if(e.key===' '){ e.preventDefault(); if(running){ paused=!paused; if(paused) BGM.pause(); else BGM.resume(); syncPauseUI(); } }
    if(e.key==='Enter'){ if(!running) startGame(); }
    /* 1·2·3 키 → 인벤토리 슬롯 사용 */
    if(running && !paused){
        if(e.key==='1'){ inventoryUseSlot(0); e.preventDefault(); }
        else if(e.key==='2'){ inventoryUseSlot(1); e.preventDefault(); }
        else if(e.key==='3'){ inventoryUseSlot(2); e.preventDefault(); }
        /* F 또는 Shift 키 → 중력장 (누르고 있는 동안 활성).
           쉴드 활성 중 또는 cooldown 중이면 잠금. */
        else if(e.key==='f' || e.key==='F' || e.key==='Shift'){
            if(shieldBubbleActive(performance.now())){ e.preventDefault(); return; }
            if(_gravTryActivate()){
                const gb = $('gravBtn'); if(gb) gb.classList.add('active');
            }
            e.preventDefault();
        }
    }
});
document.addEventListener('keyup',(e)=>{
    keys[e.key]=false;
    if(e.key==='f' || e.key==='F' || e.key==='Shift'){
        _gravRelease();
        const gb = $('gravBtn'); if(gb) gb.classList.remove('active');
    }
});

/* ---- Item bar interactions (slot click + gravity hold) ---- */
function _wireItemBar(){
    /* Slot buttons — 클릭 시 사용 */
    for(let i=0; i<3; i++){
        const el = document.getElementById('itemSlot' + i);
        if(!el) continue;
        const handler = (e) => {
            e.preventDefault(); e.stopPropagation();
            if(!running || paused) return;
            inventoryUseSlot(i);
        };
        el.addEventListener('click', handler);
        el.addEventListener('touchstart', handler, {passive:false});
    }
    /* Gravity button — touch/mouse hold 시 활성, release 시 비활성 */
    const gb = document.getElementById('gravBtn');
    if(!gb) return;
    const press = (e) => {
        e.preventDefault(); e.stopPropagation();
        if(!running || paused) return;
        /* 쉴드 활성 중에는 GRAV 잠금. cooldown 중이면 _gravTryActivate 가 false. */
        if(shieldBubbleActive(performance.now())) return;
        if(_gravTryActivate()){
            gb.classList.add('active');
        }
    };
    const release = (e) => {
        _gravRelease();
        gb.classList.remove('active');
    };
    gb.addEventListener('mousedown', press);
    gb.addEventListener('touchstart', press, {passive:false});
    gb.addEventListener('mouseup', release);
    gb.addEventListener('mouseleave', release);
    gb.addEventListener('touchend', release);
    gb.addEventListener('touchcancel', release);
    /* contextmenu 방지 (모바일 long-press 시 메뉴 뜨면 hold 끊김) */
    gb.addEventListener('contextmenu', (e) => e.preventDefault());
}

/* =====================================================================
   조향 버튼 (트랙패드) 위치 — left (기본) | right.
   left = 트랙패드 LEFT, 버튼 stack RIGHT.
   right = 트랙패드 RIGHT, 버튼 stack LEFT (좌우 반전).
   localStorage 'dodge_steer' 에 영구 저장. game 시작 시 control-row 에
   .steer-right 클래스 토글로 적용. 기존 'dodge_hand' 키도 migration —
   'right' (오른손잡이=트랙패드 LEFT) → 'left'; 'left' → 'right'.
   ===================================================================== */
let userSteer = 'left';
try {
    const stored = localStorage.getItem('dodge_steer');
    if(stored === 'left' || stored === 'right'){
        userSteer = stored;
    } else {
        /* legacy migration — 이전 'dodge_hand' 사용자에게 의미 보존 */
        const legacy = localStorage.getItem('dodge_hand');
        if(legacy === 'right'){
            userSteer = 'left';
            try { localStorage.setItem('dodge_steer', 'left'); } catch(_){}
        } else if(legacy === 'left'){
            userSteer = 'right';
            try { localStorage.setItem('dodge_steer', 'right'); } catch(_){}
        }
    }
} catch(_){ /* private mode 등 */ }
function applySteerToControlRow(){
    const cr = document.querySelector('.control-row');
    if(!cr) return;
    cr.classList.toggle('steer-right', userSteer === 'right');
}
function setSteer(s){
    if(s !== 'left' && s !== 'right') return;
    userSteer = s;
    try { localStorage.setItem('dodge_steer', s); } catch(_){}
    applySteerToControlRow();
    /* 토글 UI 도 sync — 선택된 버튼에 .active */
    const ht = document.getElementById('handToggle');
    if(ht){
        ht.querySelectorAll('.hand-btn').forEach(b => {
            const on = b.dataset.steer === s;
            b.classList.toggle('active', on);
            b.setAttribute('aria-pressed', String(on));
        });
    }
}
function _wireHandToggle(){
    const ht = document.getElementById('handToggle');
    if(!ht) return;
    /* 초기 상태 적용 — 저장된 값 기준 active 클래스 sync. */
    setSteer(userSteer);
    ht.addEventListener('click', (e) => {
        const btn = e.target.closest('.hand-btn');
        if(!btn) return;
        e.preventDefault(); e.stopPropagation();
        setSteer(btn.dataset.steer);
    });
}
if(document.readyState !== 'loading') _wireHandToggle();
else document.addEventListener('DOMContentLoaded', _wireHandToggle);

/* ---- Bullets ---- */
let bullets=[];
let lastSpawn=0;
let elapsedMs=0;

/* =====================================================================
   ITEMS / RESUPPLY DEPOTS — narrative-fit pickup system
   각 zone (행성/천체) 마다 보급 거점 1개 — 자동 보급선이 미리 발사돼서
   놓아둔 캐시. 메테오와 시각적 구분 (네온 LED + 안테나 + 아이템 아이콘).
   중력장 cone 안에서 3초 dwell 시 픽업.
   ===================================================================== */

const ITEM = {
    SHIELD: 'shield',  // instant: 5s invincibility
    HEART:  'heart',   // instant: lives++ (max 5)
    WIPE:   'wipe',    // held: clear all bullets + flash
    MINI:   'mini'     // held: 30s companion ship, 3 lasers/sec
};
/* MINI 아이콘 — 실제 drawF117(canvas) 의 path/색을 그대로 inline SVG 로 재현.
   inventory slot 에 띄울 때 emoji 대신 이 SVG 를 innerHTML 로 삽입.
   viewBox -10 -9 to 10 9 (대충 18×18) — drawF117 의 좌표계와 일치. */
const F117_SVG = '<svg viewBox="-10 -9 20 18" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">'
    + '<polygon points="0,-8 -2,-4 -9,6 -4,7 0,5" fill="#5e6c7a"/>'
    + '<polygon points="0,-8 2,-4 9,6 4,7 0,5" fill="#7c8c9a"/>'
    + '<polygon points="0,-8 -2.2,-2 -1.6,5 1.6,5 2.2,-2" fill="#3a4654"/>'
    + '<polygon points="-1.5,3 -3.2,7 -0.4,6" fill="#2c3642"/>'
    + '<polygon points="1.5,3 3.2,7 0.4,6" fill="#2c3642"/>'
    + '<polygon points="0,-5 -1.2,-1.5 1.2,-1.5" fill="#00D9FF" opacity="0.85"/>'
    + '<polyline points="-9,6 0,-8 9,6" fill="none" stroke="#00D9FF" stroke-opacity="0.45" stroke-width="0.6"/>'
    + '</svg>';

const ITEM_VISUAL = {
    shield: {emoji:'🛡', color:'#00D9FF', borderColor:'#7CE7FF'},
    heart:  {emoji:'♥',  color:'#FF3366', borderColor:'#FF8FA0'},
    wipe:   {emoji:'✦',  color:'#FFE66D', borderColor:'#FFF6B8'},
    /* mini: emoji 자리에 F-117 SVG. 색은 인벤 슬롯의 border/glow 톤
       (실제 보조우주선 cyan canopy 와 통일). */
    mini:   {emoji: F117_SVG, color:'#7c8c9a', borderColor:'#7CE7FF', isSvg:true}
};
/* Zone → 거점 아이템 매핑 (스토리 의미 고려해 배치)
   각 zone 마다 3 개의 보급선이 분산되어 떠밀려 옴. */
/* zone 당 2 개 depot — 사용자 피드백: 3 개 너무 많음.
   각 zone 의미에 맞게 가장 어울리는 2 개로 큐레이션. */
const ZONE_DEPOT_MAP = [
    {zoneIdx:0,  items:[ITEM.SHIELD, ITEM.MINI ]},   // 🌍 Earth — 튜토리얼 (보호 + 보조)
    {zoneIdx:1,  items:[ITEM.SHIELD, ITEM.WIPE ]},   // 🌙 Moon
    {zoneIdx:2,  items:[ITEM.MINI,   ITEM.SHIELD]},  // 🔴 Mars
    {zoneIdx:3,  items:[ITEM.WIPE,   ITEM.HEART]},   // 🟠 Jupiter (방사선 wipe)
    {zoneIdx:4,  items:[ITEM.MINI,   ITEM.SHIELD]},  // 🪐 Saturn
    {zoneIdx:5,  items:[ITEM.HEART,  ITEM.WIPE ]},   // 🔵 Uranus
    {zoneIdx:6,  items:[ITEM.HEART,  ITEM.MINI ]},   // 💙 Neptune
    {zoneIdx:7,  items:[ITEM.SHIELD, ITEM.HEART]},   // ⚪ Pluto
    {zoneIdx:8,  items:[ITEM.SHIELD, ITEM.WIPE ]},   // 🌌 Heliosphere
    {zoneIdx:9,  items:[ITEM.SHIELD, ITEM.MINI ]},   // ❄ Oort Cloud
    {zoneIdx:10, items:[ITEM.SHIELD, ITEM.HEART]},   // ⭐ Proxima Centauri
    {zoneIdx:11, items:[ITEM.MINI,   ITEM.HEART]},   // ✨ Sirius
    {zoneIdx:12, items:[ITEM.MINI,   ITEM.SHIELD]},  // 🟥 Betelgeuse (충격파 — 보조 + 보호)
    {zoneIdx:13, items:[ITEM.HEART,  ITEM.WIPE ]},   // 🌠 Horsehead
    {zoneIdx:14, items:[ITEM.SHIELD, ITEM.HEART]},   // 🌫 Pillars of Creation
    {zoneIdx:15, items:[ITEM.SHIELD, ITEM.WIPE ]},   // ⚫ Sgr A* 블랙홀 — 위급 보호 + 폭격
    {zoneIdx:16, items:[ITEM.MINI,   ITEM.SHIELD]},  // 🌌 Galactic Rim
    {zoneIdx:17, items:[ITEM.HEART,  ITEM.SHIELD]}   // ∞ Intergalactic Void
];

/* depot pickup hold 시간 (초). 3 초는 길어서 2 초로 완화. */
const GRAV_PICKUP_TIME = 2.0;

let depots = [];                /* active depots (floating downward) */
let depotsSpawnedZones = new Set();  /* "zoneIdx-slotIdx" 들 중 이미 spawn 한 것 */
let zoneEnteredAt = 0;         /* ms 현재 zone 진입 시각 */

function maybeSpawnDepot(zoneIdx, now){
    const def = ZONE_DEPOT_MAP.find(d => d.zoneIdx === zoneIdx);
    if(!def) return;
    /* zone duration 가져오기 — ZONES[zoneIdx].dur (sec).
       마지막 zone 은 9999 로 설정돼 있어 max 25 sec 으로 cap.
       사용자 피드백: depot 3 개 → 2 개. ratios 도 더 spread 한 분포로.
       2 개 spawn: ~25%, ~65% 시점. */
    const rawDur = (typeof ZONES !== 'undefined' && ZONES[zoneIdx] && ZONES[zoneIdx].dur > 0)
        ? ZONES[zoneIdx].dur : 25;
    const zd = Math.min(25, rawDur);
    const ratios = [0.25, 0.65];
    const sinceZone = (now - zoneEnteredAt) / 1000;
    /* zone 라벨 페이드인 시간 보장 — 첫 spawn 은 최소 2.5 초 후. */
    const minFirst = 2.5;
    const itemCount = Math.min(def.items.length, ratios.length);
    for(let slot = 0; slot < itemCount; slot++){
        const key = zoneIdx + '-' + slot;
        if(depotsSpawnedZones.has(key)) continue;
        const targetSec = Math.max(slot === 0 ? minFirst : minFirst + slot * 2.5, ratios[slot] * zd);
        if(sinceZone < targetSec) continue;
        depotsSpawnedZones.add(key);
        depots.push({
            x: 60 + rand() * (CW - 120),
            y: -50,
            speed: 24,                     /* 메테오보다 느림 = 충분히 공략 시간 */
            item: def.items[slot],
            zoneIdx, slot,
            chargeTime: 0,                 /* 0~GRAV_PICKUP_TIME sec */
            collected: false,
            spawnedAt: now,
            radius: 19
        });
    }
}

function updateDepots(dt, now){
    /* PERF: in-place compaction (depots 배열 새로 할당 대신 write index w 만 진전). */
    let w = 0;
    const len = depots.length;
    for(let i = 0; i < len; i++){
        const d = depots[i];
        d.y += d.speed * dt;
        if(d.collected){
            if(!d.collectedAt) d.collectedAt = now;
            if(now - d.collectedAt > 800) continue;
        }
        if(d.y > CH + 60) continue;
        if(w !== i) depots[w] = d;
        w++;
    }
    if(w < len) depots.length = w;
}

function drawDepot(d, now){
    const v = ITEM_VISUAL[d.item];
    const cx = d.x, cy = d.y;
    const t = (now - d.spawnedAt) / 1000;

    ctx.save();

    /* Collected fade */
    if(d.collected){
        const fade = 1 - (now - (d.collectedAt||now)) / 800;
        ctx.globalAlpha = Math.max(0, fade);
    }

    /* 인벤토리 가득 차서 못 줍는 held 아이템이면 dim
       (SHIELD 도 보유형으로 바뀌어 인벤 슬롯 차지) */
    const isHeld = (d.item === ITEM.WIPE || d.item === ITEM.MINI || d.item === ITEM.SHIELD);
    const blocked = isHeld && !inventoryHasSpace();
    if(blocked) ctx.globalAlpha *= 0.45;

    /* 외곽 펄스 ring — 픽업 가능 표시 */
    const pulseAlpha = blocked ? 0.18 : (0.45 + Math.sin(t * 4) * 0.25);
    ctx.strokeStyle = `rgba(124, 231, 255, ${pulseAlpha})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(cx, cy, d.radius + 6, 0, Math.PI * 2);
    ctx.stroke();

    /* 본체 (원통형 보급 컨테이너) */
    ctx.fillStyle = '#2a2e3a';
    ctx.fillRect(cx - 14, cy - 10, 28, 20);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(cx - 14, cy - 10, 28, 4);
    ctx.strokeStyle = v.borderColor;
    ctx.lineWidth = 1.2;
    ctx.strokeRect(cx - 14, cy - 10, 28, 20);

    /* 안테나 + LED 점멸 */
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx, cy - 10);
    ctx.lineTo(cx, cy - 18);
    ctx.stroke();
    const blinkOn = Math.floor(t * 3) % 2 === 0;
    if(blinkOn && !blocked){
        ctx.fillStyle = '#FF3366';
        ctx.beginPath();
        ctx.arc(cx, cy - 18, 1.8, 0, Math.PI * 2);
        ctx.fill();
    }

    /* 아이템 아이콘 (글자 / 기호).
       mini 는 ITEM_VISUAL.emoji 가 SVG 문자열이라 canvas fillText 로 못 그림.
       대신 F-117 의 미니어처 silhouette 을 직접 path 로 그림 (drawF117 의
       1/3 크기 정도). */
    if(d.item === ITEM.MINI){
        ctx.save();
        ctx.translate(cx, cy + 1);
        ctx.scale(0.55, 0.55);   /* depot 안에 들어갈 크기로 축소 */
        /* 좌측 윙 */
        ctx.fillStyle = '#7c8c9a';
        ctx.beginPath();
        ctx.moveTo(0,    -8);
        ctx.lineTo(-2,   -4);
        ctx.lineTo(-9,    6);
        ctx.lineTo(-4,    7);
        ctx.lineTo(0,     5);
        ctx.closePath();
        ctx.fill();
        /* 우측 윙 (한 단계 밝게) */
        ctx.fillStyle = '#9eb0c0';
        ctx.beginPath();
        ctx.moveTo(0,    -8);
        ctx.lineTo(2,    -4);
        ctx.lineTo(9,     6);
        ctx.lineTo(4,     7);
        ctx.lineTo(0,     5);
        ctx.closePath();
        ctx.fill();
        /* 동체 */
        ctx.fillStyle = '#3a4654';
        ctx.beginPath();
        ctx.moveTo(0,    -8);
        ctx.lineTo(-2.2, -2);
        ctx.lineTo(-1.6,  5);
        ctx.lineTo(1.6,   5);
        ctx.lineTo(2.2,  -2);
        ctx.closePath();
        ctx.fill();
        /* 캐노피 cyan */
        ctx.fillStyle = 'rgba(0,217,255,0.85)';
        ctx.beginPath();
        ctx.moveTo(0,    -5);
        ctx.lineTo(-1.2, -1.5);
        ctx.lineTo(1.2,  -1.5);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    } else {
        ctx.fillStyle = v.color;
        ctx.font = 'bold 13px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(v.emoji, cx, cy + 1);
    }

    /* 충전 progress ring */
    if(d.chargeTime > 0 && !d.collected){
        const pct = Math.min(1, d.chargeTime / GRAV_PICKUP_TIME);
        ctx.strokeStyle = '#FFE66D';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(cx, cy, d.radius + 11, -Math.PI/2, -Math.PI/2 + Math.PI * 2 * pct);
        ctx.stroke();
    }

    ctx.restore();
}

/* =====================================================================
   GRAVITY FIELD — hold button to project yellow cone from ship front.
   범위 180px (이전 60 의 3배 — 사용자 피드백: 60 너무 짧아 픽업 어려움).
   90° cone (±45°). player.y 가 보통 CH*0.65=390 근처이므로, cone 끝은
   y=210 (화면 중앙 위쪽까지) 까지 닿음 — depots 가 화면에 들어오면
   바로 잡힐 수 있게.
   ===================================================================== */
let gravityFieldActive = false;
/* GRAV 쿨타임 — 사용 시간 = cooldown 시간. 1 초 사용하면 1 초 동안 재사용 X.
   누른 시점 (gravPressedAt) 기록 → 떼는 시점에 사용 시간 계산 → cooldown 적용.
   single + multi 동일. */
let gravPressedAt = 0;
let gravCooldownUntil = 0;
function _gravOnCooldown(now){ return now < gravCooldownUntil; }
function _gravTryActivate(){
    const now = performance.now();
    if(_gravOnCooldown(now)) return false;     /* 쿨타임 중 — 재활성 거부 */
    gravityFieldActive = true;
    gravPressedAt = now;
    return true;
}
function _gravRelease(){
    if(gravityFieldActive){
        const now = performance.now();
        const usedMs = now - gravPressedAt;
        gravCooldownUntil = now + usedMs;     /* 사용한 만큼 cooldown */
    }
    gravityFieldActive = false;
}
const GRAV_FIELD_LEN = 180;

/* =====================================================================
   BLACK HOLE (Sgr A*) — zone idx 15 일 때만 활성. drawSagittariusA() 가
   매 frame cx/cy/r 갱신. update_blackhole_pull() 가 player + bullets 에
   inverse-square 끌어당김 적용.
   ===================================================================== */
const BLACK_HOLE_ZONE_IDX = 15;
const blackHole = { cx: 0, cy: 0, r: 22 };
/* 끜당김 강도 — bullets 가 strong, player 는 mild (게임 진행 가능). */
const BH_PULL_STRENGTH_BULLET = 7000;   /* 메테오: 시각적으로 잘 보일 만큼 강하게 */
const BH_PULL_STRENGTH_PLAYER = 1400;   /* 플레이어: 트랙패드 조작으로 충분히 회피 가능 */
const BH_PULL_RADIUS = 200;             /* 끜당김 영향 반경 — 그 밖에선 효과 0 */
const BH_EVENT_HORIZON_BUFFER = 4;      /* event horizon (r=22) + 버퍼 — 안에 들어오면 즉사 */

function isBlackHoleZone(){
    return currentZoneIdx === BLACK_HOLE_ZONE_IDX;
}

/* 매 frame 호출 — bullets/player 에 끌어당김 가속도 적용. */
function updateBlackHolePull(dt){
    if(!isBlackHoleZone()) return;
    const cx = blackHole.cx, cy = blackHole.cy;
    /* event horizon — player 가 들어오면 즉사 (lives=0 트리거). */
    const phx = player.x - cx, phy = player.y - cy;
    const phd = Math.sqrt(phx*phx + phy*phy);
    if(phd < blackHole.r + BH_EVENT_HORIZON_BUFFER){
        /* spaghettification — 즉사. lives=0 으로 game over. */
        lives = 0;
        triggerGameOver();
        return;
    }
    /* player pull (mild) — 거리 inverse-square + 안전한 deadzone. */
    if(phd < BH_PULL_RADIUS && phd > blackHole.r){
        const ax = -phx / phd;
        const ay = -phy / phd;
        const f = BH_PULL_STRENGTH_PLAYER / (phd * phd);
        player.x += ax * f * dt;
        player.y += ay * f * dt;
    }
    /* bullets pull (strong) — 메테오가 휘어 들어가는 시각. event horizon 닿으면 제거. */
    let w = 0;
    const len = bullets.length;
    for(let i = 0; i < len; i++){
        const b = bullets[i];
        const bdx = b.x - cx, bdy = b.y - cy;
        const bd2 = bdx*bdx + bdy*bdy;
        const bd = Math.sqrt(bd2);
        if(bd < blackHole.r + 2){ continue; }   /* 빨려들어감 — 제거 */
        if(bd < BH_PULL_RADIUS){
            const ax = -bdx / bd;
            const ay = -bdy / bd;
            const f = BH_PULL_STRENGTH_BULLET / Math.max(bd2, 100);  /* 너무 가까우면 무한대 막기 */
            b.vx += ax * f * dt;
            b.vy += ay * f * dt;
        }
        if(w !== i) bullets[w] = b;
        w++;
    }
    if(w < len) bullets.length = w;
}
const GRAV_FIELD_HALF = Math.PI / 4;

function isInGravField(px, py){
    if(!gravityFieldActive) return false;
    const dx = px - player.x;
    const dy = py - player.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if(dist > GRAV_FIELD_LEN || dist < 6) return false;
    /* 각도 — 우주선 정면 (Y- 방향) 기준 */
    const ang = Math.atan2(dx, -dy);
    return Math.abs(ang) < GRAV_FIELD_HALF;
}

function updateGravFieldCharge(dt){
    if(!gravityFieldActive){
        /* 비활성 시 모든 depot 의 chargeTime 빠르게 감소 */
        for(const d of depots){
            if(!d.collected && d.chargeTime > 0){
                d.chargeTime = Math.max(0, d.chargeTime - dt * 1.5);
            }
        }
        return;
    }
    for(const d of depots){
        if(d.collected) continue;
        /* held item — 인벤토리 슬롯 차지하는 종류 (WIPE, MINI, SHIELD).
           HEART 만 즉시 회복으로 슬롯 안 차지. 슬롯 꽉 차면 픽업 못 함. */
        const isHeld = (d.item === ITEM.WIPE || d.item === ITEM.MINI || d.item === ITEM.SHIELD);
        if(isHeld && !inventoryHasSpace()) continue;  /* 슬롯 가득 → 못 챙김 */
        if(isInGravField(d.x, d.y)){
            d.chargeTime += dt;
            if(d.chargeTime >= GRAV_PICKUP_TIME){
                onDepotCollected(d);
            }
        } else {
            d.chargeTime = Math.max(0, d.chargeTime - dt * 0.8);
        }
    }
}

function drawGravField(){
    /* 본인 GRAV cone — 노랑 톤. */
    if(gravityFieldActive){
        _drawGravCone(player.x, player.y - 4, 'rgba(255,230,109,', 'rgba(255,200,60,', 'rgba(255,154,60,');
    }
    /* PvP 상대 GRAV cone — 위협을 인지할 수 있게 빨강 톤 + 강한 펄스. */
    if(pvpState && pvpState.gameMode === 'pvp' && pvpState.opponent && pvpState.opponent.gravActive
       && pvpState.opponent.x !== undefined){
        _drawGravCone(pvpState.opponent.x, pvpState.opponent.y - 4,
            'rgba(255,80,80,', 'rgba(255,40,40,', 'rgba(180,20,20,');
    }
}
function _drawGravCone(ox, oy, c0, c1, c2){
    ctx.save();
    const t = performance.now() / 200;
    const grad = ctx.createRadialGradient(ox, oy, 4, ox, oy, GRAV_FIELD_LEN);
    grad.addColorStop(0, c0 + '0.6)');
    grad.addColorStop(0.5, c1 + '0.3)');
    grad.addColorStop(1, c2 + '0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(ox, oy);
    const a1 = -Math.PI/2 - GRAV_FIELD_HALF;
    const a2 = -Math.PI/2 + GRAV_FIELD_HALF;
    ctx.arc(ox, oy, GRAV_FIELD_LEN, a1, a2);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = c0 + (0.5 + Math.sin(t)*0.3) + ')';
    ctx.lineWidth = 1.2;
    for(let i = 1; i <= 3; i++){
        const r = ((GRAV_FIELD_LEN / 3) * i + (t * 8) % (GRAV_FIELD_LEN / 3));
        if(r > GRAV_FIELD_LEN) continue;
        ctx.beginPath();
        ctx.arc(ox, oy, r, a1, a2);
        ctx.stroke();
    }
    ctx.restore();
}

/* =====================================================================
   INVENTORY — 3 slots for held items (wipe, mini-ship)
   instant items (shield, heart) 는 즉시 사용 — 슬롯 안 차지.
   ===================================================================== */
const INVENTORY_SLOTS = 3;
let inventory = [null, null, null];

function inventoryHasSpace(){
    return inventory.some(s => s === null);
}
function inventoryAdd(itemType){
    for(let i=0; i<INVENTORY_SLOTS; i++){
        if(inventory[i] === null){
            inventory[i] = itemType;
            syncInventoryUI();
            return true;
        }
    }
    return false;
}
function inventoryUseSlot(idx){
    if(idx < 0 || idx >= INVENTORY_SLOTS) return;
    const item = inventory[idx];
    if(!item) return;
    /* MINI 는 동시 2 기까지 — 이미 2 기 활성이면 사용 거부 (슬롯 그대로). */
    if(item === ITEM.MINI && miniShips.length >= 2) return;
    if(item === ITEM.WIPE) triggerWipe();
    else if(item === ITEM.MINI) triggerMiniShip();
    else if(item === ITEM.SHIELD) triggerShieldBubble();
    inventory[idx] = null;
    syncInventoryUI();
}
function syncInventoryUI(){
    for(let i=0; i<INVENTORY_SLOTS; i++){
        const el = document.getElementById('itemSlot' + i);
        if(!el) continue;
        const item = inventory[i];
        if(item){
            const v = ITEM_VISUAL[item];
            el.innerHTML = v.emoji;
            el.classList.remove('empty');
            el.style.color = v.color;
            el.style.borderColor = v.borderColor;
        } else {
            el.innerHTML = '';
            el.classList.add('empty');
            el.style.color = '';
            el.style.borderColor = '';
        }
    }
}

/* =====================================================================
   ITEM EFFECTS
   ===================================================================== */
function onDepotCollected(d){
    d.collected = true;
    d.collectedAt = performance.now();
    if(d.item === ITEM.HEART){
        /* HEART 만 즉시 회복 — 슬롯 차지하지 않음 */
        lives = Math.min(MAX_LIVES, lives + 1);
    } else {
        /* SHIELD, WIPE, MINI 모두 보유형 — 슬롯에 적재. */
        inventoryAdd(d.item);
    }
    sfxStart();
    if(navigator.vibrate) try{navigator.vibrate(30)}catch(_){}
}

/* =====================================================================
   SHIELD BUBBLE — 보유형. 사용 시 우주선을 둘러싼 강한 청록 방어막을
   20 초간 펼침. 막에 닿은 메테오는 즉시 파괴 (fragment 폭발). 보유 중에는
   사용 거부 — 인벤토리 슬롯에서 클릭해야 발동. invincibleUntil 의 짧은
   2 초 깜빡임 무적과는 완전 별도 시스템.
   ===================================================================== */
const SHIELD_BUBBLE_MS = 20000;
const SHIELD_BUBBLE_R  = 30;        /* px — 우주선 hit radius (5) 의 6 배 */
const SHIELD_HIT_DRAIN_MS = 2000;   /* 메테오 1 발 막을 때마다 차감되는 시간 */
let shieldBubbleUntil = 0;
let shieldHitFlashUntil = 0;        /* 막은 직후 ring 빨강 깜빡 — 시각 피드백 */
function triggerShieldBubble(){
    /* 사용 시점부터 20 초 — 이미 활성 중이면 연장 (중첩 적재 사용 시) */
    const now = performance.now();
    const base = Math.max(now, shieldBubbleUntil);
    shieldBubbleUntil = base + SHIELD_BUBBLE_MS;
    /* 쉴드 발동 시 GRAV 강제 해제 — 두 시스템 동시 활성 금지 (사용자 정책). */
    gravityFieldActive = false;
    const gb = $('gravBtn'); if(gb) gb.classList.remove('active');
    sfxStart();
    if(navigator.vibrate) try{navigator.vibrate(40)}catch(_){}
}
function shieldBubbleActive(now){ return now < shieldBubbleUntil; }
function updateShieldBubble(now){
    /* bubble 활성 중이면 bubble 반경 안에 들어온 메테오 즉시 파괴 + 작은
       fragment 폭발 — wipeFragments 재사용 (시각효과 동일 톤).
       단, 막을 때마다 쉴드 시간 -2 초 차감 — 안 맞는 게 더 좋게. */
    if(!shieldBubbleActive(now)) return;
    const r2 = (SHIELD_BUBBLE_R + 4) * (SHIELD_BUBBLE_R + 4);
    /* PERF: bullets in-place compaction (이전엔 매 frame 새 array). */
    let w = 0;
    const len = bullets.length;
    let hitsThisFrame = 0;
    for(let i = 0; i < len; i++){
        const b = bullets[i];
        const dx = b.x - player.x, dy = b.y - player.y;
        if(dx*dx + dy*dy <= r2){
            hitsThisFrame++;
            for(let k = 0; k < 3; k++){
                wipeFragments.push({
                    x: b.x, y: b.y,
                    vx: (Math.random()-0.5) * 220,
                    vy: (Math.random()-0.5) * 220,
                    life: 0.35, maxLife: 0.35
                });
            }
            continue;
        }
        if(w !== i) bullets[w] = b;
        w++;
    }
    if(w < len) bullets.length = w;
    if(hitsThisFrame > 0){
        /* 한 발 막을 때마다 2 초 차감. 한 프레임에 N 개 막으면 N*2 초 차감. */
        shieldBubbleUntil -= hitsThisFrame * SHIELD_HIT_DRAIN_MS;
        shieldHitFlashUntil = now + 220;
        if(navigator.vibrate) try{navigator.vibrate(15)}catch(_){}
        /* 시간 다 빠지면 즉시 종료 (음수면 0 으로) */
        if(shieldBubbleUntil <= now){
            shieldBubbleUntil = 0;
            /* 쉴드 종료 알림용 짧은 효과음 */
            sfxOver();
        }
    }
}
function drawShieldBubble(now){
    if(!shieldBubbleActive(now)) return;
    const remain = (shieldBubbleUntil - now) / SHIELD_BUBBLE_MS;
    const t = now / 200;
    const px = player.x, py = player.y;
    ctx.save();
    /* 외곽 코어 — 청록 radial gradient */
    const grad = ctx.createRadialGradient(px, py, SHIELD_BUBBLE_R * 0.4, px, py, SHIELD_BUBBLE_R + 4);
    grad.addColorStop(0,    'rgba(0, 217, 255, 0)');
    grad.addColorStop(0.65, 'rgba(0, 217, 255, 0.10)');
    grad.addColorStop(0.92, 'rgba(124, 231, 255, 0.55)');
    grad.addColorStop(1,    'rgba(255, 255, 255, 0.95)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(px, py, SHIELD_BUBBLE_R + 4, 0, Math.PI*2);
    ctx.fill();
    /* 마지막 3 초 가까이면 빨강으로 깜빡 — 위험 신호.
       또한 메테오 막은 직후 (shieldHitFlashUntil 이내) 도 빨강 — 시간 까였다는 피드백. */
    const danger = remain < 0.15 || now < shieldHitFlashUntil;
    const ringColor = danger
        ? 'rgba(255, 80, 120, ' + (0.55 + Math.sin(t*4)*0.35) + ')'
        : 'rgba(0, 217, 255, ' + (0.65 + Math.sin(t*2)*0.2) + ')';
    /* 외곽 hex pattern — 6 각형 회전 */
    ctx.strokeStyle = ringColor;
    ctx.lineWidth = 1.6;
    const rot = (now / 1800) % (Math.PI * 2);
    ctx.beginPath();
    for(let i = 0; i < 6; i++){
        const a = rot + i * Math.PI / 3;
        const rx = px + Math.cos(a) * SHIELD_BUBBLE_R;
        const ry = py + Math.sin(a) * SHIELD_BUBBLE_R;
        if(i === 0) ctx.moveTo(rx, ry); else ctx.lineTo(rx, ry);
    }
    ctx.closePath();
    ctx.stroke();
    /* 내부 hex pattern — 반대 방향 */
    ctx.strokeStyle = 'rgba(124, 231, 255, ' + (0.3 + Math.sin(t*3)*0.15) + ')';
    ctx.lineWidth = 1.0;
    const rot2 = -(now / 1400) % (Math.PI * 2) + Math.PI/6;
    ctx.beginPath();
    for(let i = 0; i < 6; i++){
        const a = rot2 + i * Math.PI / 3;
        const rx = px + Math.cos(a) * (SHIELD_BUBBLE_R - 7);
        const ry = py + Math.sin(a) * (SHIELD_BUBBLE_R - 7);
        if(i === 0) ctx.moveTo(rx, ry); else ctx.lineTo(rx, ry);
    }
    ctx.closePath();
    ctx.stroke();
    /* 잔여 시간 ring (외곽) */
    ctx.strokeStyle = danger ? 'rgba(255,80,120,0.85)' : 'rgba(0,217,255,0.85)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(px, py, SHIELD_BUBBLE_R + 8, -Math.PI/2, -Math.PI/2 + Math.PI*2 * remain);
    ctx.stroke();
    ctx.restore();
}

let wipeFlashUntil = 0;
let wipeFragments = [];
/* WIPE 사용 후 spawn 도 막을 시간. 화면 밖에서 들어오던 메테오까지
   제거된 듯한 효과 — 5 초간 spawn loop 가 lastSpawn 만 진전시키고
   spawnBullet 호출 안 함. 끝난 후 정상 cadence 로 복귀 (catch-up 방지). */
const WIPE_SPAWN_BLOCK_MS = 5000;
let wipeSpawnBlockUntil = 0;
function triggerWipe(){
    const now = performance.now();
    wipeFlashUntil = now + 500;
    wipeSpawnBlockUntil = now + WIPE_SPAWN_BLOCK_MS;
    /* 모든 메테오 → 짧은 fragment 폭발로 disintegrate */
    for(const b of bullets){
        for(let i = 0; i < 4; i++){
            wipeFragments.push({
                x: b.x, y: b.y,
                vx: (Math.random()-0.5) * 280,
                vy: (Math.random()-0.5) * 280,
                life: 0.5, maxLife: 0.5
            });
        }
    }
    bullets = [];
    sfxOver();  /* 짧고 강한 효과음 (실제 sfx 가 hit 톤이라 wipe 와 어울림) */
    if(navigator.vibrate) try{navigator.vibrate([20,30,20])}catch(_){}
}
function updateWipeFragments(dt){
    /* PERF: in-place compaction. */
    let w = 0;
    const len = wipeFragments.length;
    for(let i = 0; i < len; i++){
        const f = wipeFragments[i];
        f.life -= dt;
        if(f.life <= 0) continue;
        f.x += f.vx * dt;
        f.y += f.vy * dt;
        f.vx *= 0.96; f.vy *= 0.96;
        if(w !== i) wipeFragments[w] = f;
        w++;
    }
    if(w < len) wipeFragments.length = w;
}
function drawWipeFragments(){
    for(const f of wipeFragments){
        const a = f.life / f.maxLife;
        ctx.fillStyle = `rgba(255,230,109,${a * 0.85})`;
        const sz = 2 + a * 1.5;
        ctx.fillRect(f.x - sz/2, f.y - sz/2, sz, sz);
    }
}
function drawWipeFlash(){
    const now = performance.now();
    if(now > wipeFlashUntil) return;
    const remain = (wipeFlashUntil - now) / 500;
    ctx.save();
    ctx.fillStyle = `rgba(255,255,255,${remain * 0.7})`;
    ctx.fillRect(0, 0, CW, CH);
    ctx.restore();
}

/* =====================================================================
   MINI-SHIP — F-117 Nighthawk 스텔스기 형태의 동행기. 30 초 지속, 3 lasers/sec,
   가장 가까운 위쪽 메테오 자동 추적. 동시에 최대 2 기 운용 가능 —
   1 기일 때는 본함 뒤에서 따라오고, 2 기일 때는 좌·우로 호위 비행.
   ===================================================================== */
let miniShips = [];
let miniLasers = [];
const MINI_DUR = 30000;
const MINI_SHOT_INTERVAL = 333;  /* ms — 3 shots/sec */
const MINI_MAX = 2;

function triggerMiniShip(){
    if(miniShips.length >= MINI_MAX) return;
    const now = performance.now();
    /* 발사 시차 (수학):
       1 기 — lastShot=0 으로 초기화 → spawn 직후 즉시 첫 발사.
       2 기 — 첫 미니쉽 (m0) 의 발사 사이클 한가운데에 끼워넣음:
              m0.lastShot+I 시점이 m0 다음 발사 → 그 후 I/2 시점에 m1 첫 발사.
              조건: m1.lastShot+I = m0.lastShot+I+I/2 → m1.lastShot = m0.lastShot+I/2.
       이러면 두 미니쉽이 정확히 I/2 = 167ms 시차로 alternating, 합 6 shots/sec.
       slot 은 들어오는 순서대로 0, 1. update 에서 활성 수 따라 위치 재계산. */
    let lastShot = 0;
    if(miniShips.length === 1){
        lastShot = miniShips[0].lastShot + MINI_SHOT_INTERVAL / 2;
    }
    miniShips.push({
        x: player.x, y: player.y + 28,
        spawnedAt: now,
        lastShot: lastShot,
        slot: miniShips.length
    });
    sfxStart();
}
function updateMiniShip(dt, now){
    if(miniShips.length === 0) return;
    /* 만료된 것 제거 — in-place. 보통 max 2 개라 비용 미미하지만 일관성 위해. */
    {
        let w = 0;
        const len = miniShips.length;
        for(let i = 0; i < len; i++){
            const m = miniShips[i];
            if(now - m.spawnedAt > MINI_DUR) continue;
            if(w !== i) miniShips[w] = m;
            w++;
        }
        if(w < len) miniShips.length = w;
    }
    /* 활성 수에 맞춰 slot 재할당 */
    miniShips.forEach(function(m, i){ m.slot = i; });

    const count = miniShips.length;
    /* 같은 frame 안에서 다른 미니쉽이 이미 잡으려는 메테오는 제외 — 시차가
       I/2=167ms 라 같은 frame 에 둘 다 발사하는 일은 매우 드물지만, 안전장치.
       또한 이미 미니쉽 레이저가 잡으려고 발사된 메테오 (miniLasers 에 target
       으로 들어있는 것) 도 같은 이유로 제외 — 한 frame 의 race condition. */
    const claimedThisFrame = new Set();
    for(const l of miniLasers) claimedThisFrame.add(l.target);
    for(const m of miniShips){
        let tx, ty;
        if(count === 1){
            /* trail 모드 — 본함 뒤(아래)에서 따라옴 */
            tx = player.x + Math.cos(now/600) * 4;
            ty = player.y + 30 + Math.sin(now/500) * 3;
        } else {
            /* 호위 모드 — 슬롯 0 = 좌현, 슬롯 1 = 우현 */
            const side = (m.slot === 0) ? -1 : 1;
            tx = player.x + side * 26 + Math.cos(now/450 + m.slot) * 3;
            ty = player.y + 6 + Math.sin(now/400 + m.slot) * 4;
        }
        m.x += (tx - m.x) * Math.min(1, dt * 6);
        m.y += (ty - m.y) * Math.min(1, dt * 6);
        /* 발사 — 가장 가까운 위쪽 메테오 (다른 미니쉽이 안 잡으려는 것). */
        if(now - m.lastShot >= MINI_SHOT_INTERVAL && bullets.length > 0){
            let target = null, best = Infinity;
            for(const b of bullets){
                if(b.y > m.y) continue;
                if(claimedThisFrame.has(b)) continue;
                const dx = b.x - m.x, dy = b.y - m.y;
                const d = dx*dx + dy*dy;
                if(d < best){ best = d; target = b; }
            }
            if(target){
                claimedThisFrame.add(target);
                miniLasers.push({
                    fromX: m.x, fromY: m.y,
                    target: target,
                    life: 0.18, maxLife: 0.18
                });
                m.lastShot = now;
            }
        }
    }
    /* 레이저 — 즉시 hit, 시각만 short trail. PERF: in-place compaction. */
    {
        let w = 0;
        const len = miniLasers.length;
        for(let i = 0; i < len; i++){
            const l = miniLasers[i];
            l.life -= dt;
            const idx = bullets.indexOf(l.target);
            if(idx >= 0) bullets.splice(idx, 1);
            if(l.life <= 0) continue;
            if(w !== i) miniLasers[w] = l;
            w++;
        }
        if(w < len) miniLasers.length = w;
    }
}
/* F-117 Nighthawk — 면 분할 스텔스기. 위쪽이 정면. 크기 ≈ 18×16 px.
   메인 우주선의 stainless steel 톤과 매칭 (#7c8c9a, #94a2ae 계열) +
   cyan accent. 이전 검정 톤은 어두운 배경에 묻혀 안 보였음. */
function drawF117(cx, cy){
    ctx.save();
    /* 그림자 */
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.beginPath();
    ctx.ellipse(cx, cy + 6, 8, 2.5, 0, 0, Math.PI*2);
    ctx.fill();

    /* 좌측 윙 패널 — 메인 우주선의 darker steel. */
    ctx.fillStyle = '#5e6c7a';
    ctx.beginPath();
    ctx.moveTo(cx,        cy - 8);
    ctx.lineTo(cx - 2,    cy - 4);
    ctx.lineTo(cx - 9,    cy + 6);
    ctx.lineTo(cx - 4,    cy + 7);
    ctx.lineTo(cx,        cy + 5);
    ctx.closePath();
    ctx.fill();
    /* 우측 윙 패널 — 한 단계 더 밝게 (light direction) */
    ctx.fillStyle = '#7c8c9a';
    ctx.beginPath();
    ctx.moveTo(cx,        cy - 8);
    ctx.lineTo(cx + 2,    cy - 4);
    ctx.lineTo(cx + 9,    cy + 6);
    ctx.lineTo(cx + 4,    cy + 7);
    ctx.lineTo(cx,        cy + 5);
    ctx.closePath();
    ctx.fill();
    /* 동체 facet — 중앙 능선. 메인 노즈 색과 비슷한 짙은 강철. */
    ctx.fillStyle = '#3a4654';
    ctx.beginPath();
    ctx.moveTo(cx,        cy - 8);
    ctx.lineTo(cx - 2.2,  cy - 2);
    ctx.lineTo(cx - 1.6,  cy + 5);
    ctx.lineTo(cx + 1.6,  cy + 5);
    ctx.lineTo(cx + 2.2,  cy - 2);
    ctx.closePath();
    ctx.fill();
    /* V-tail — 짙은 강철 */
    ctx.fillStyle = '#2c3642';
    ctx.beginPath();
    ctx.moveTo(cx - 1.5,  cy + 3);
    ctx.lineTo(cx - 3.2,  cy + 7);
    ctx.lineTo(cx - 0.4,  cy + 6);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(cx + 1.5,  cy + 3);
    ctx.lineTo(cx + 3.2,  cy + 7);
    ctx.lineTo(cx + 0.4,  cy + 6);
    ctx.closePath();
    ctx.fill();
    /* 동체 specular highlight — 좌측 vertical strip (메인의 SUS sheen 미러) */
    ctx.fillStyle = 'rgba(255,255,255,0.16)';
    ctx.beginPath();
    ctx.ellipse(cx - 0.8, cy - 1, 0.7, 4, 0, 0, Math.PI*2);
    ctx.fill();
    /* 캐노피 — cyan glow (메인 우주선 cyan accent 와 통일) */
    ctx.fillStyle = 'rgba(0, 217, 255, 0.7)';
    ctx.beginPath();
    ctx.moveTo(cx,        cy - 5);
    ctx.lineTo(cx - 1.2,  cy - 1.5);
    ctx.lineTo(cx + 1.2,  cy - 1.5);
    ctx.closePath();
    ctx.fill();
    /* 가장자리 cyan accent line — 윤곽 강조 */
    ctx.strokeStyle = 'rgba(0, 217, 255, 0.32)';
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.moveTo(cx - 9,    cy + 6);
    ctx.lineTo(cx,        cy - 8);
    ctx.lineTo(cx + 9,    cy + 6);
    ctx.stroke();
    ctx.restore();
}
function drawMiniShip(){
    if(miniShips.length === 0) return;
    const now = performance.now();
    for(const m of miniShips){
        const age = now - m.spawnedAt;
        drawF117(m.x, m.y);
        /* 잔여 시간 ring (붉은 톤 — 레이저 컬러와 통일) */
        const pct = (MINI_DUR - age) / MINI_DUR;
        ctx.save();
        ctx.strokeStyle = 'rgba(255, 80, 80, 0.55)';
        ctx.lineWidth = 1.4;
        ctx.beginPath();
        ctx.arc(m.x, m.y, 11, -Math.PI/2, -Math.PI/2 + Math.PI*2*pct);
        ctx.stroke();
        ctx.restore();
    }
    /* 레이저 — 빨강 */
    ctx.save();
    ctx.shadowColor = 'rgba(255, 60, 60, 0.85)';
    ctx.shadowBlur = 6;
    for(const l of miniLasers){
        const a = l.life / l.maxLife;
        ctx.strokeStyle = 'rgba(255, 60, 60, ' + a + ')';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(l.fromX, l.fromY);
        ctx.lineTo(l.target.x, l.target.y);
        ctx.stroke();
    }
    ctx.restore();
}

function spawnBullet(now, speed, aimedRatio, multi){
    /* PvP 모드 시 rand() = seeded RNG → 양쪽 client 동일 메테오 패턴.
       단, aimed bullet 은 player.x/y 기준이라 본인 위치에 따라 결과 다름.
       PvP 의 경우 player 위치는 양쪽 다 다르므로 aimed 메테오는 약간 차이.
       해결: PvP 일 때 aimed 의 target 을 화면 중앙 등 fixed 점으로 변경.
       Stage 1: 단순화 — aimedRatio*1.0 그대로 두되 player 위치 차이는
       무시 (메테오 spawn 위치/속도는 같음, target 만 살짝 다름). */
    for(let m=0;m<multi;m++){
        const edge=Math.floor(rand()*4);
        let bx,by,vx,vy;
        let aimed=rand()<aimedRatio;
        let spread=(m-Math.floor(multi/2))*14;

        /* PvP 시 aimed target 을 player 가 아닌 화면 중앙 + jitter 로 — 양쪽 sync. */
        const isPvp = (typeof pvpState !== 'undefined' && pvpState.gameMode === 'pvp');
        const aimX = isPvp ? CW/2 : player.x;
        const aimY = isPvp ? CH*0.65 : player.y;

        if(edge===0){
            bx=rand()*CW; by=-8;
            if(aimed){
                const dx=aimX-bx, dy=aimY-by;
                const d=Math.sqrt(dx*dx+dy*dy)||1;
                vx=dx/d*speed; vy=dy/d*speed;
            } else {
                const tx=CW*0.2+rand()*CW*0.6+spread;
                const ty=CH*0.3+rand()*CH*0.4;
                const dx=tx-bx, dy=ty-by;
                const d=Math.sqrt(dx*dx+dy*dy)||1;
                vx=dx/d*speed; vy=dy/d*speed;
            }
        } else if(edge===1){
            bx=CW+8; by=rand()*CH;
            if(aimed){
                const dx=aimX-bx, dy=aimY-by;
                const d=Math.sqrt(dx*dx+dy*dy)||1;
                vx=dx/d*speed; vy=dy/d*speed;
            } else {
                const tx=CW*0.2+rand()*CW*0.4;
                const ty=CH*0.2+rand()*CH*0.6+spread;
                const dx=tx-bx, dy=ty-by;
                const d=Math.sqrt(dx*dx+dy*dy)||1;
                vx=dx/d*speed; vy=dy/d*speed;
            }
        } else if(edge===2){
            bx=rand()*CW; by=CH+8;
            if(aimed){
                const dx=aimX-bx, dy=aimY-by;
                const d=Math.sqrt(dx*dx+dy*dy)||1;
                vx=dx/d*speed; vy=dy/d*speed;
            } else {
                const tx=CW*0.2+rand()*CW*0.6+spread;
                const ty=CH*0.3+rand()*CH*0.4;
                const dx=tx-bx, dy=ty-by;
                const d=Math.sqrt(dx*dx+dy*dy)||1;
                vx=dx/d*speed; vy=dy/d*speed;
            }
        } else {
            bx=-8; by=rand()*CH;
            if(aimed){
                const dx=aimX-bx, dy=aimY-by;
                const d=Math.sqrt(dx*dx+dy*dy)||1;
                vx=dx/d*speed; vy=dy/d*speed;
            } else {
                const tx=CW*0.6+rand()*CW*0.4;
                const ty=CH*0.2+rand()*CH*0.6+spread;
                const dx=tx-bx, dy=ty-by;
                const d=Math.sqrt(dx*dx+dy*dy)||1;
                vx=dx/d*speed; vy=dy/d*speed;
            }
        }
        bullets.push({x:bx, y:by, vx, vy, aimed, trail:[]});
    }
}

function updateDifficulty(){
    const s=elapsedMs/1000;

    /* Difficulty curve (v4): 5 분 도달 후 유지 — v3 의 10분은 너무 길어 지루.
       5분이 max 도달 sweet spot.
         · sEff 시작 = 60 (워밍업 skip)
         · sEff 종착 = 170 (legacy max difficulty)
         · 도달 시점 = t=300s (5분)  ← v3: 600s (10분, 너무 길었음)
         · 기울기 = (170-60)/300 = 11/30 ≈ 0.367
       경유 timing 검증:
         · t=1:00 → sEff=82  (워밍업)
         · t=2:00 → sEff=104
         · t=3:00 → sEff=126 (이전 v2 의 max 도달 시점이었음)
         · t=4:00 → sEff=148
         · t=5:00 → sEff=170 (max, cap)
       모든 metric (spawnInterval, bulletSpeed, aimedRatio, multiShot)
       이 sEff=170 에서 max 도달하도록 통일. cap 후엔 stable. */
    const sEff = Math.min(170, 60 + s * (11/30));

    // smoothstep: 0→1 부드러운 S커브 (양쪽 끝이 완만, 중간이 가파름)
    const ss=(t)=>{ const c=Math.min(Math.max(t,0),1); return c*c*(3-2*c); };

    // ── 스폰 간격 (ms): 1600 → 250 (sEff=170 에서 max) ────────────
    const spawnInterval = Math.round(1600 - ss(sEff/170) * 1350);

    // ── 총알 속도 (px/s): 95 → 370 (sEff=170 에서 max) ────────────
    const bulletSpeed = Math.round(95 + ss(sEff/170) * 275);

    // ── 조준 비율: 0 → 0.65 (sEff=170 에서 max) ───────────────────
    const arT = Math.max(0, Math.min((sEff-20)/150, 1));
    const aimedRatio = Math.min(0.65, arT*arT*0.70);

    // ── 멀티샷: 1 → 3 (sEff=170 에서 max) ─────────────────────────
    const msRaw   = 1 + Math.min(2, Math.max(0, (sEff-50)/120)*2);
    const msFloor = Math.floor(msRaw);
    const multiShot = Math.min(3, msFloor + (rand()<(msRaw-msFloor)?1:0));

    return { spawnInterval, bulletSpeed, aimedRatio, multiShot };
}

/* ========== BGM ==========
   Plays track1.mp3 → track2.mp3 → 1 → 2 … in an infinite queue from
   game start to game over. Each track has loop=false; the `ended`
   event advances to the next index (wrapping). Max volume 0.35
   keeps music under sfx so impacts still cut through.

   File path follows the shared convention
       public/assets/bgm/<gameId>/track1.mp3 ... track4.mp3
   used by every other game (lpBgm.js auto-shuffle module). dodge
   doesn't USE lpBgm.js (we do our own playlist with fade-in coupled
   to game start, etc — see SKIP_GAMES in lpBgm.js), but we share
   the same file location so the directory tree stays symmetric and
   Cloudflare's /assets/* cache rule applies uniformly.
   Files missing → audio.error fires silently and the game still runs. */
const BGM = (function(){
    const TRACKS = ['/assets/bgm/dodge/track1.mp3', '/assets/bgm/dodge/track2.mp3'];
    const MAX_VOL = 0.35;
    const FADE_IN_MS = 1400;
    const FADE_OUT_MS = 600;

    const audios = TRACKS.map(function(src){
        const a = new Audio(src);
        a.loop = false;       /* queue handles the loop, not the element */
        a.volume = 0;
        a.preload = 'auto';
        a.addEventListener('error', function(){ /* silent — file may not exist yet */ });
        return a;
    });

    let cur = 0;
    let enabled = true;
    let fadeTimer = null;

    /* When a track ends, advance to the next (wrapping) and play it
       immediately at full volume. Hard cut works fine for game BGM
       loops; switch to crossfade later if it ever feels jarring. */
    audios.forEach(function(a, idx){
        a.addEventListener('ended', function(){
            if(!enabled) return;
            cur = (idx + 1) % audios.length;
            const nx = audios[cur];
            try { nx.currentTime = 0; } catch(_){}
            nx.volume = MAX_VOL;
            safePlay(nx);
        });
    });

    function fadeTo(audio, target, durMs, onDone){
        if(fadeTimer){ clearInterval(fadeTimer); fadeTimer = null; }
        const from = audio.volume;
        const diff = target - from;
        if(Math.abs(diff) < 0.005){ audio.volume = target; if(onDone) onDone(); return; }
        const steps = Math.max(1, Math.round(durMs/16));
        let i = 0;
        fadeTimer = setInterval(function(){
            i++;
            audio.volume = Math.max(0, Math.min(1, from + diff * (i/steps)));
            if(i >= steps){ clearInterval(fadeTimer); fadeTimer = null; if(onDone) onDone(); }
        }, 16);
    }

    function safePlay(audio){
        try {
            const p = audio.play();
            if(p && p.catch) p.catch(function(){ /* autoplay blocked — next user gesture frees it */ });
        } catch(_){}
    }

    function start(){
        if(!enabled) return;
        /* Always restart from track 1 each time the game starts so the
           player gets a consistent intro. Stop any other track first. */
        audios.forEach(function(a){ try { a.pause(); a.currentTime = 0; } catch(_){} });
        cur = 0;
        const a = audios[cur];
        a.volume = 0;
        safePlay(a);
        fadeTo(a, MAX_VOL, FADE_IN_MS);
    }
    function stop(){
        const a = audios[cur];
        fadeTo(a, 0, FADE_OUT_MS, function(){
            audios.forEach(function(x){ try { x.pause(); x.currentTime = 0; } catch(_){} });
        });
    }
    function pause(){
        const a = audios[cur];
        fadeTo(a, 0, 350, function(){ try { a.pause(); } catch(_){} });
    }
    function resume(){
        if(!enabled) return;
        const a = audios[cur];
        safePlay(a);
        fadeTo(a, MAX_VOL, 600);
    }
    function toggle(){ enabled = !enabled; if(!enabled) stop(); return enabled; }
    function isOn(){ return enabled; }
    return { start: start, stop: stop, pause: pause, resume: resume, toggle: toggle, isOn: isOn };
})();

    resetGame();

    await runIntroCountdown();

    zoneLabel={nameEn:ZONES[0].nameEn, nameKo:ZONES[0].nameKo, timer:0};

    (async()=>{
        /* Categorize Supabase errors into user-friendly buckets so the
           overlay never surfaces raw PostgREST internals to end users.
           - 'missing_migration': function/table not found in schema cache.
             Means the admin hasn't deployed the latest SQL. Console gets
             a deployment hint pointing at the right migration file.
           - 'rate_limit': server enforced 30 attempts / 1h.
           - 'no_auth': RPC saw auth.uid()=null. Anon users now skip the
             record RPC entirely (see 'no_login' below) so this branch is
             only reachable if a logged-in session lapsed mid-game.
           - 'invalid': server-side validation tripped (bad_pace etc).
           - 'unknown': anything else. */
        /* 'no_login' bucket: synthetic — set directly when we skip the
           record RPC because the user is anonymous. Never returned by
           _classifyErr (anon path doesn't even hit the RPC); listed here
           for completeness. */
        function _classifyErr(err){
            const m=(err&&(err.message||err.error_description)||String(err||'')).toLowerCase();
            if(/(could not find|schema cache|does not exist)/.test(m)
               &&/(function|relation|table)/.test(m)){
                return 'missing_migration';
            }
            if(m.includes('rate_limited'))return 'rate_limit';
            if(m.includes('not_authenticated'))return 'no_auth';
            if(m.includes('impossible_pace')||/^bad_/.test(m)
               ||m.includes('bad_duration')){
                return 'invalid';
            }
            return 'unknown';
        }
        function _logDeployHint(){
            try{console.warn(
              '[dodge] Supabase migration not deployed. Apply in SQL Editor:\n'+
              '  supabase/migrations/2026-04-25-dodge-game.sql\n'+
              '  supabase/migrations/2026-04-26-game-rank-info.sql\n'+
              'Or run supabase/redeploy-action-games.sql (one-shot).');
            }catch(_){}
        }

        /* Session verification — fetch the LIVE auth user right before
           recording so we know exactly which account the score will land
           on. The server-side record_dodge_attempt uses auth.uid() at
           call time, NOT our cached `me.id`, so a mid-game session
           change (account-switch in another tab, token expiry, browser-
           sync from another device) silently sends the score to a
           different account. We log this divergence loudly to the
           console + flag the on-screen "기록 등록 계정" to whatever the
           server actually saw.
           Anon path (me=null): skip this block entirely — there's no
           session to verify and no record RPC will be called. */
        let liveUser = null;
        let liveNick = '';
        let pbMsg='', recordOk=false, recordErrKind=null;
        if(!me){
            /* Anon player: skip the record RPC entirely (it would just
               return not_authenticated). Mark a synthetic 'no_login'
               bucket so the dispatch below shows a friendly upsell
               instead of a generic failure. Leaderboard still loads. */
            recordErrKind='no_login';
        }else{
            try {
                liveUser = await getUser();
                try{
                    console.log('[dodge.record] live user.id =', liveUser ? liveUser.id : '(null)',
                                '· me.id at boot =', meIdAtBoot);
                }catch(_){}
                if (!liveUser) {
                    console.warn('[dodge.record] no live session — aborting record');
                } else if (meIdAtBoot && liveUser.id !== meIdAtBoot) {
                    console.warn('[dodge.record] session changed since boot. boot=' + meIdAtBoot +
                                 ' live=' + liveUser.id + ' — score will go to LIVE user');
                }
                /* Fetch the live nickname so the on-screen "기록 등록 계정"
                   reflects who is ACTUALLY signed in, not the cached chip
                   that was set at boot. */
                if (liveUser) {
                    try {
                        const lp = await getSupabase().from('profiles')
                            .select('nickname').eq('id', liveUser.id).maybeSingle();
                        liveNick = (lp.data && lp.data.nickname) || liveUser.email || '';
                    } catch(_) { liveNick = liveUser.email || ''; }
                }
            } catch(e) {
                console.warn('[dodge.record] getUser threw:', e);
            }

            try{
                const {data,error}=await getSupabase().rpc('record_dodge_attempt',{p_duration_ms:duration});
                if(!error){
                    recordOk=true;
                    if(data?.is_personal_best) pbMsg='🏆 개인 신기록!';
                    try{
                        console.log('[dodge.record] OK score=' + (data&&data.score) +
                                    ' is_pb=' + (data&&data.is_personal_best) +
                                    ' attributed to live user.id=' + (liveUser&&liveUser.id));
                    }catch(_){}
                }else{
                    recordErrKind=_classifyErr(error);
                    console.warn('[dodge.record_dodge_attempt]', error);
                    if(recordErrKind==='missing_migration')_logDeployHint();
                    if(recordErrKind==='rate_limit') pbMsg='⏸ 1시간 내 30회 한도 초과';
                }
            }catch(e){
                recordErrKind=_classifyErr(e);
                console.warn('[dodge.record_dodge_attempt]', e);
                if(recordErrKind==='missing_migration')_logDeployHint();
            }
        }

        let rankInfo=null, rankErrKind=null;
        if(me){
            try{
                const r=await getSupabase().rpc('dodge_rank_info');
                if(r.error){
                    rankErrKind=_classifyErr(r.error);
                    console.warn('[dodge.dodge_rank_info]', r.error);
                    if(rankErrKind==='missing_migration')_logDeployHint();
                }else if(r.data?.has_record){
                    rankInfo=r.data;
                }
            }catch(e){
                rankErrKind=_classifyErr(e);
                console.warn('[dodge.dodge_rank_info]', e);
                if(rankErrKind==='missing_migration')_logDeployHint();
            }
        }
        /* Anon: skip personal rank_info (no auth.uid()). World leaderboard
           still loaded below via loadLeaderboard(currentScope). */

        /* Fallback: dodge_my_stats already exposes world_rank since the
           original game migration. If dodge_rank_info isn't deployed
           (e.g. user hasn't run the latest SQL yet), we still surface
           a real rank from the legacy RPC. total_world_players + percentile
           remain unknown without rank_info — those slots stay empty. */
        if(me && !rankInfo && rankErrKind){
            try{
                const m=await getSupabase().rpc('dodge_my_stats');
                if(!m.error){
                    if(m.data?.has_record && m.data.world_rank!=null){
                        rankInfo={
                            has_record:true,
                            world_rank:m.data.world_rank,
                            total_world_players:null,
                            percentile:null,
                            best_score:m.data.best_score,
                            _fallback:true
                        };
                    }
                    /* my_stats RPC succeeded → dismiss the rank_info error
                       even when has_record is false. UI then falls into the
                       recordOk-driven branch below ("🎉 첫 기록" or the
                       record-failure branch) instead of an alarming
                       "랭킹 조회 실패". */
                    rankErrKind=null;
                }
            }catch(_){ }
        }

        if(rankInfo){
            const d=rankInfo;
            const rank=(d.world_rank||0).toLocaleString();
            /* Short headline + long subline so a narrow card never
               clips on the right edge. Subline parts are individually
               omitted when null so the my_stats fallback (no
               percentile/total) still renders cleanly. */
            $('ovRankNum').textContent='🌍 #'+rank;
            const parts=[];
            if(d.percentile!=null) parts.push('상위 '+d.percentile+'%');
            if(d.total_world_players!=null) parts.push(d.total_world_players.toLocaleString()+'명 중');
            $('ovRankPct').textContent=parts.join(' · ');
        }else if(rankErrKind==='missing_migration'||recordErrKind==='missing_migration'){
            /* Admin needs to deploy the migrations. Calmer language for
               end users (most won't be the admin); detail in console. */
            $('ovRankNum').textContent='🛠 랭킹 시스템 점검 중';
            $('ovRankPct').textContent='잠시 후 다시 시도해주세요';
        }else if(rankErrKind||recordErrKind==='unknown'){
            $('ovRankNum').textContent='⚠️ 랭킹 등록 실패';
            $('ovRankPct').textContent='네트워크를 확인하고 다시 시도해주세요';
        }else if(!recordOk && recordErrKind==='invalid'){
            $('ovRankNum').textContent='⚠️ 점수 검증 실패';
            $('ovRankPct').textContent='비정상적으로 빠른 진행 감지';
        }else if(!recordOk && recordErrKind==='no_auth'){
            $('ovRankNum').textContent='🔐 로그인이 필요해요';
            $('ovRankPct').textContent='로그인 후 다시 시도';
        }else if(!recordOk && recordErrKind==='no_login'){
            /* Anon-friendly upsell: not an error — they intentionally
               played without logging in. Encourage signup, but the world
               leaderboard still loads (loadLeaderboard call below). */
            $('ovRankNum').textContent='🔒 로그인하면 기록 저장!';
            $('ovRankPct').textContent='랭킹 등록은 로그인 사용자만 가능';
        }else if(!recordOk){
            $('ovRankNum').textContent='⚠️ 기록 저장 실패';
            $('ovRankPct').textContent='잠시 후 다시 시도해주세요';
        }else{
            $('ovRankNum').textContent='🎉 첫 기록 등록!';
            $('ovRankPct').textContent='월드 랭킹 진입 완료';
        }
        $('ovRankPb').textContent=pbMsg;
        /* Debug slot kept in DOM for inspection but blank for end users.
           Raw error text used to surface here (alarming + non-actionable).
           Devs can read details in console (we console.warn every error
           with a [game.rpc_name] prefix). */
        $('ovRankDebug').textContent='';

        /* "기록 등록 계정" line — visible reminder of which account just
           received this score. Reads the LIVE session (resolved above as
           liveUser/liveNick) so a session mismatch ("아 와이프 계정이었네")
           is obvious before the user closes the overlay. Also flags an
           explicit warning if the live session differs from the booted
           session — this is the case the user reported (someone playing,
           score landing on a different person's account). */
        const acctEl = $('ovRankAcct');
        if (acctEl) {
            if (!me) {
                /* Anon player — friendly upsell, NOT an error. Cyan tone
                   matches the rest of the anon hint above. */
                acctEl.textContent = '🌐 비회원 (게스트 플레이) — 로그인하면 기록 저장';
                acctEl.style.color = 'rgba(0,217,255,.85)';
            } else if (!liveUser) {
                acctEl.textContent = '⚠ 로그인 세션이 끊김 — 점수 미등록';
                acctEl.style.color = 'rgba(255,180,80,.85)';
            } else if (meIdAtBoot && liveUser.id !== meIdAtBoot) {
                /* Different account than the one we started with. Score
                   has actually been recorded under liveUser, not the
                   nickname shown in the topbar. Spell that out. */
                acctEl.innerHTML = '⚠ 게임 도중 계정 전환 — 기록 등록 계정: <strong>'
                    + esc(liveNick || '(' + liveUser.id.slice(0,8) + ')') + '</strong>';
                acctEl.style.color = 'rgba(255,180,80,.95)';
            } else if (recordOk) {
                acctEl.innerHTML = '기록 등록 계정: <strong>'
                    + esc(liveNick || meNickAtBoot || '(나)') + '</strong>';
                acctEl.style.color = 'rgba(255,255,255,.55)';
            } else {
                /* Recording failed — still show the intended account so
                   the user knows whose record WOULD have been updated. */
                acctEl.innerHTML = '대상 계정: <strong>'
                    + esc(liveNick || meNickAtBoot || '(나)') + '</strong>';
                acctEl.style.color = 'rgba(255,255,255,.45)';
            }
        }

        loadMyStats();
        loadLeaderboard(currentScope);
    })();

    try{
        const ad=$('adSlot');
        if(ad.style.display==='none'||!ad.style.display){ad.style.display='block';(adsbygoogle=window.adsbygoogle||[]).push({});}
    }catch(_){}
}

/* ---- Main loop ---- */
let lastFrame=0;
function gameLoop(now){
    if(!running)return;
    const rawDt=Math.min((now-lastFrame)/1000, 0.05);
    lastFrame=now;

    if(paused){
        drawFrame(now, 0);
        requestAnimationFrame(gameLoop);
        return;
    }

    const dt=rawDt;
    elapsedMs=now - startedAt - totalPausedMs;

    /* ---- Zone detection ---- */
    let newIdx=0;
    const secs=elapsedMs/1000;
    for(let i=ZONES.length-1;i>=0;i--){
        if(secs>=ZONES[i].s){ newIdx=i; break; }
    }
    if(newIdx!==currentZoneIdx){
        prevZoneIdx=currentZoneIdx;
        currentZoneIdx=newIdx;
        zoneTransitionT=0;
        zoneLabel={nameEn:ZONES[newIdx].nameEn, nameKo:ZONES[newIdx].nameKo, timer:0};
        resetParticles(newIdx);
        sfxZone();
        zoneEnteredAt = performance.now();   /* depot spawn 타이밍 기준 */
    }
    zoneTransitionT=Math.min(1, zoneTransitionT+dt/1.5);

    /* ---- Move player ----
       모바일 트랙패드 입력 (pendingTp) 은 frame 마다 1회만 적용 — 직접
       touchmove 에서 player 를 갱신하지 않음 (DOM/main-thread 부담 분산).
       desktop pointer 와 키보드는 기존 즉시 follow 유지. */
    flushTpInput();
    if(pointer.active){
        const dx=pointer.x-player.x, dy=pointer.y-player.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist>2){
            const step=Math.min(FOLLOW_SPEED*dt, dist);
            player.x+=dx/dist*step;
            player.y+=dy/dist*step;
        }
    } else if(!pendingTp.active){
        /* 트랙패드 사용 중이면 키보드 입력은 무시 (의도치 않은 동시 입력 방지). */
        let mx=0,my=0;
        if(keys['ArrowLeft']||keys['a']||keys['A']) mx-=1;
        if(keys['ArrowRight']||keys['d']||keys['D']) mx+=1;
        if(keys['ArrowUp']||keys['w']||keys['W']) my-=1;
        if(keys['ArrowDown']||keys['s']||keys['S']) my+=1;
        if(mx||my){
            const mag=Math.sqrt(mx*mx+my*my);
            player.x+=mx/mag*PLAYER_SPEED*dt;
            player.y+=my/mag*PLAYER_SPEED*dt;
        }
    }
    /* ---- PvP GRAV pull — 상대 우주선의 cone (forward -Y, ±45°, 180px) 안에
       본인이 있으면 상대 쪽으로 끌림. force 는 visible 강도 + 거리에 따라 강해짐.
       cone 검사 안 통하면 끌림 X (= 단순 거리만으론 효과 없음). */
    if(pvpState && pvpState.gameMode === 'pvp' && pvpState.opponent && pvpState.opponent.gravActive
       && pvpState.opponent.x !== undefined){
        const opx = pvpState.opponent.x, opy = pvpState.opponent.y;
        const dx = player.x - opx;          /* 상대 → 본인 vector (cone source 기준) */
        const dy = player.y - opy;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if(dist > 8 && dist < 180){
            /* cone forward = -Y (위). 본인 위치의 angle from forward = atan2(dx, -dy).
               본인이 상대 위쪽 (dy<0) + ±45° 안이면 cone 안. */
            const ang = Math.atan2(dx, -dy);
            if(Math.abs(ang) < Math.PI / 4){
                /* 끌림 direction = 상대 쪽 (-dx, -dy normalized). 거리 가까울수록 더 세게. */
                const PULL_BASE = 130;                  /* px/sec — visible 강도 */
                const f = PULL_BASE * (1 - dist / 180);
                player.x -= (dx / dist) * f * dt;
                player.y -= (dy / dist) * f * dt;
            }
        }
    }

    player.x=Math.max(16, Math.min(CW-16, player.x));
    player.y=Math.max(18, Math.min(CH-18, player.y));

    /* ---- Spawn bullets ----
       WIPE 직후 5 초간 spawn 차단 — lastSpawn 을 now 로 계속 끌어올려서
       block 끝난 직후 catch-up 한 번에 5~8 발 폭격 안 일어나게 함. */
    const diff=updateDifficulty();
    if(lastSpawn===0) lastSpawn=now;
    if(now < wipeSpawnBlockUntil){
        lastSpawn = now;
    } else {
        while(now-lastSpawn>=diff.spawnInterval){
            lastSpawn+=diff.spawnInterval;
            spawnBullet(now, diff.bulletSpeed, diff.aimedRatio, diff.multiShot);
        }
    }

    /* ---- Update bullets + trails ----
       PERF v3: trail 길이 16 → 8 (rendering cost 절반) + array 새로 할당
       하지 않고 in-place compaction (write index 'w' 만 진전, 매 frame
       array allocation + GC 부담 제거). trail 도 shift() 대신 ring buffer
       index 사용해 O(1) — 이전 shift 는 16 element 순회 비용. */
    {
        let w = 0;
        const len = bullets.length;
        for(let i = 0; i < len; i++){
            const b = bullets[i];
            /* trail ring buffer (head index) — capacity 8. b.trailHead 는
               다음 write index, b.trailLen 은 현재 채워진 개수. */
            if(!b.trail) b.trail = [];
            if(!b._trailInit){
                b._trailInit = true;
                b.trailHead = 0;
                b.trailLen = 0;
            }
            const TRAIL_CAP = 8;
            if(b.trail[b.trailHead]){
                b.trail[b.trailHead].x = b.x;
                b.trail[b.trailHead].y = b.y;
            } else {
                b.trail[b.trailHead] = { x: b.x, y: b.y };
            }
            b.trailHead = (b.trailHead + 1) % TRAIL_CAP;
            if(b.trailLen < TRAIL_CAP) b.trailLen++;
            b.x += b.vx * dt;
            b.y += b.vy * dt;
            if(b.x < -40 || b.x > CW + 40 || b.y < -40 || b.y > CH + 40) continue;
            if(w !== i) bullets[w] = b;
            w++;
        }
        if(w < len) bullets.length = w;  /* in-place truncate, no new array */
    }

    /* ---- Black hole gravitational pull ----
       Sgr A* zone 진입 시 player + bullets 모두 중심으로 끌어당김.
       collision/shield 검사 *전* 에 호출 — 끜당김으로 메테오 위치 바뀐 뒤
       그 위치 기준으로 충돌 검사. event horizon 닿은 메테오는 제거,
       player 가 닿으면 즉사 (triggerGameOver). */
    updateBlackHolePull(dt);
    if(!running) return;   /* black hole 즉사로 종료된 경우 더 진행 X */

    /* ---- Shield bubble destroy (collision 전) ----
       버블 활성 중이면 bubble 반경 안의 메테오 즉시 파괴 → 본 우주선
       충돌 체크 들어가기 전에 처리해야 무적 효과가 즉시 확인됨. */
    updateShieldBubble(now);

    /* ---- Collision ----
       PERF: 충돌 시 bullets.filter 로 새 array 생성 대신 splice 한 번 — 어차피
       break 하니 한 번만 발생, 새 array 할당 없음. */
    if(now>invincibleUntil){
        const HR2 = (HIT_RADIUS+6) * (HIT_RADIUS+6);
        for(let i = 0; i < bullets.length; i++){
            const b = bullets[i];
            const dx = b.x - player.x, dy = b.y - player.y;
            if(dx*dx + dy*dy < HR2){
                lives--;
                invincibleUntil = now + INVINCIBLE_MS;
                flashVisible = true;
                lastFlashToggle = now;
                if(navigator.vibrate) try{navigator.vibrate(40)}catch(_){}
                bullets.splice(i, 1);
                if(lives <= 0){ triggerGameOver(); return; }
                sfxHit();
                break;
            }
        }
    }

    /* ---- Flash during invincibility ---- */
    if(now<invincibleUntil){
        if(now-lastFlashToggle>=FLASH_INTERVAL){
            flashVisible=!flashVisible;
            lastFlashToggle=now;
        }
    } else {
        flashVisible=true;
    }

    /* ---- Stars ---- */
    updateStars(dt);

    /* ---- Particles ---- */
    updateParticles(dt);

    /* ---- Flame pulse ---- */
    flamePulse=(flamePulse+dt*12)%(Math.PI*2);

    /* ---- Items / Depots / Gravity field / Mini-ship / Wipe ---- */
    maybeSpawnDepot(currentZoneIdx, now);
    updateDepots(dt, now);
    updateGravFieldCharge(dt);
    updateMiniShip(dt, now);
    updateWipeFragments(dt);

    /* ---- GRAV 버튼 disabled / cooldown 동기화 ----
       쉴드 활성 중에는 GRAV 잠금. cooldown 중에도 잠금 (시각 분리). */
    {
        const gb = $('gravBtn');
        if(gb){
            const blocked = shieldBubbleActive(now);
            const wasBlocked = gb.classList.contains('disabled');
            if(blocked !== wasBlocked) gb.classList.toggle('disabled', blocked);
            const cooling = _gravOnCooldown(now);
            const wasCooling = gb.classList.contains('cooldown');
            if(cooling !== wasCooling) gb.classList.toggle('cooldown', cooling);
            /* GRAV 누른 상태에서 cooldown 으로 진입 (사용 시간 다 됨) — release 자동 처리.
               단, 사용자는 keyup 으로 release 하지만 cooldown 도달 시 강제 해제 없음.
               대신 활성 중에는 release 시점에 cooldown 시작. */
            if(blocked && (gravityFieldActive || gb.classList.contains('active'))){
                _gravRelease();
                gb.classList.remove('active');
            }
        }
    }

    /* ---- Update HUD ----
       Score column is gone; only the TIME column shows mm:ss:cs at full
       100 fps precision so the player can see their personal-best chase
       in real time. */
    $('timeNow').textContent=formatDuration(elapsedMs);

    drawFrame(now, dt);
    requestAnimationFrame(gameLoop);
}

function drawFrame(now, dt){
    /* ---- Background ---- */
    drawBackground();

    /* ---- Zone planet/object ---- */
    drawZonePlanet(currentZoneIdx, dt);

    /* ---- Stars (on top of planet, under everything else) ---- */
    drawStars();

    /* ---- Ambient particles ---- */
    drawParticles();

    /* ---- Bullets — comet-style trail ----
       PERF v3: trail 8-sample ring buffer + 단일 패스로 통합 (이전 2-layer
       halo+core 는 30 bullets × 16 trail × 2 = 960 arc → 30 × 8 × 1 = 240).
       halo 효과는 head 의 shadowBlur 로 대체 — 글로우 시각 유지. */
    const TRAIL_CAP = 8;
    for(const b of bullets){
        const headColor = b.aimed ? '#FF8844' : '#ffffff';
        const haloColor = b.aimed ? '#FF5500' : '#aaaaff';
        const N = b.trailLen || 0;
        if(N > 0){
            /* ring buffer: 가장 오래된 = (head - N + CAP) % CAP, 가장 새 = (head - 1 + CAP) % CAP */
            const start = (b.trailHead - N + TRAIL_CAP) % TRAIL_CAP;
            ctx.fillStyle = headColor;
            for(let i = 0; i < N; i++){
                const idx = (start + i) % TRAIL_CAP;
                const t = b.trail[idx];
                const k = (i + 1) / N;       /* 0 = 꼬리 끝, 1 = head */
                ctx.globalAlpha = k * k * 0.78;
                ctx.beginPath();
                ctx.arc(t.x, t.y, 0.6 + 3.5 * k, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        ctx.globalAlpha = 1;

        /* HEAD — unchanged from previous design */
        ctx.shadowColor = haloColor;
        ctx.shadowBlur = 10;
        ctx.fillStyle = headColor;
        ctx.beginPath();
        ctx.arc(b.x, b.y, 6, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
    ctx.globalAlpha = 1;

    /* ---- Depots (보급 거점) — bullets 위, player 아래 ---- */
    for(const d of depots) drawDepot(d, now);

    /* ---- Wipe fragments (사용 후 잔재) ---- */
    drawWipeFragments();

    /* ---- Mini-ship (있을 때) ---- */
    drawMiniShip();

    /* ---- Player: SpaceX Starship (ogive nose, SUS metallic) ---- */
    if(flashVisible){
        const px=player.x, py=player.y;
        ctx.save();
        ctx.translate(px, py);
        /* PvP guest 면 ship 색을 gold 톤으로. ctx.filter 로 sepia+hue-rotate
           조합. 모바일 Safari 13+/Chrome Android 50+ 지원 (대부분 OK). */
        const _pvpGuestTint = (typeof pvpState !== 'undefined' && pvpState.gameMode === 'pvp' && pvpState.role === 'guest');
        if(_pvpGuestTint){
            try { ctx.filter = 'sepia(0.6) hue-rotate(-25deg) saturate(1.4) brightness(1.05)'; } catch(_){}
        }

        /* Raptor exhaust — blue-white core → orange → fade */
        const fl=9+Math.sin(flamePulse)*5;
        const flG=ctx.createLinearGradient(0,8,0,8+fl+9);
        flG.addColorStop(0,   'rgba(215,228,255,1)');
        flG.addColorStop(0.10,'rgba(100,160,255,.95)');
        flG.addColorStop(0.42,'rgba(255,172,28,.85)');
        flG.addColorStop(1,   'rgba(255,48,0,0)');
        ctx.fillStyle=flG;
        ctx.beginPath();
        ctx.moveTo(-5,8); ctx.lineTo(0,8+fl+9); ctx.lineTo(5,8);
        ctx.closePath(); ctx.fill();

        /* Aft delta fins — large swept triangles behind body */
        const finG=ctx.createLinearGradient(-16,5,16,5);
        finG.addColorStop(0,'#1a2028'); finG.addColorStop(0.30,'#50606c');
        finG.addColorStop(0.70,'#44545e'); finG.addColorStop(1,'#181e26');
        ctx.fillStyle=finG;
        /* right fin: swept leading edge, wide at base */
        ctx.beginPath();
        ctx.moveTo(5,2); ctx.lineTo(15,15); ctx.lineTo(6,9); ctx.lineTo(5,8);
        ctx.closePath(); ctx.fill();
        /* left fin (mirror) */
        ctx.beginPath();
        ctx.moveTo(-5,2); ctx.lineTo(-15,15); ctx.lineTo(-6,9); ctx.lineTo(-5,8);
        ctx.closePath(); ctx.fill();

        /* Body — ogive conical nose + cylinder, stainless steel gradient */
        const bG=ctx.createLinearGradient(-5,0,5,0);
        bG.addColorStop(0,'#32404c'); bG.addColorStop(0.18,'#7c8c9a');
        bG.addColorStop(0.44,'#c2ced8'); bG.addColorStop(0.64,'#cad4de');
        bG.addColorStop(0.82,'#94a2ae'); bG.addColorStop(1,'#42505c');
        ctx.shadowColor='rgba(170,188,210,0.50)'; ctx.shadowBlur=8;
        ctx.fillStyle=bG;
        ctx.beginPath();
        ctx.moveTo(0,-19);                          /* nose tip */
        ctx.quadraticCurveTo(4,-13,5,-9);           /* right ogive curve */
        ctx.lineTo(5,8);                            /* right body */
        ctx.lineTo(-5,8);                           /* base */
        ctx.lineTo(-5,-9);                          /* left body */
        ctx.quadraticCurveTo(-4,-13,0,-19);         /* left ogive curve */
        ctx.closePath(); ctx.fill();
        ctx.shadowBlur=0;

        /* Heat shield tiles — right-lower body */
        ctx.save();
        ctx.beginPath(); ctx.rect(0,-1,5,9); ctx.clip();
        ctx.fillStyle='rgba(12,14,20,0.72)'; ctx.fillRect(0,-1,6,11);
        ctx.strokeStyle='rgba(40,48,58,0.85)'; ctx.lineWidth=0.5;
        for(let ty=-1;ty<=8;ty+=2.5){ctx.beginPath();ctx.moveTo(0,ty);ctx.lineTo(5,ty);ctx.stroke();}
        for(let tx=0;tx<=5;tx+=2.5){ctx.beginPath();ctx.moveTo(tx,-1);ctx.lineTo(tx,8);ctx.stroke();}
        ctx.restore();

        /* SUS specular sheen — left-center vertical highlight */
        const spG=ctx.createLinearGradient(-2,-18,-2,8);
        spG.addColorStop(0,'rgba(255,255,255,0.32)');
        spG.addColorStop(0.45,'rgba(255,255,255,0.12)');
        spG.addColorStop(1,'rgba(255,255,255,0)');
        ctx.fillStyle=spG;
        ctx.beginPath(); ctx.ellipse(-1.5,-5,1.5,11,0,0,Math.PI*2); ctx.fill();

        ctx.restore();
        /* PvP 모드 시 본인 닉네임 — 우주선 아래, 반투명. */
        if(typeof pvpState !== 'undefined' && pvpState.gameMode === 'pvp' && pvpState.me){
            ctx.save();
            ctx.fillStyle = 'rgba(255,255,255,0.42)';
            ctx.font = 'bold 8px Orbitron, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText((pvpState.me.nickname || '').substring(0, 10), px, py + 22);
            ctx.restore();
        }
    }

    /* ---- PvP 상대 우주선 ---- */
    _drawOpponentShip();

    /* ---- Shield bubble (player 둘러싸는 청록 방어막) ----
       player 본체 위에 그려져야 우주선이 막 안에 든 듯이 보임. */
    drawShieldBubble(now);

    /* ---- Gravity field cone (player 위) ---- */
    drawGravField();

    /* ---- Wipe flash (모든 게 위 그림 위에 — 가장 위) ---- */
    drawWipeFlash();

    /* ---- Zone label (above player, below HUD) ---- */
    drawZoneLabel(dt);

    /* ---- HUD: lives (max MAX_LIVES, 현재 lives 만큼 채움) ---- */
    const heartSize=16;
    const heartPad=3;
    for(let i=0;i<MAX_LIVES;i++){
        ctx.globalAlpha=i<lives?1:0.16;
        ctx.fillStyle='#FF3366';
        ctx.font='bold '+heartSize+'px sans-serif';
        ctx.textBaseline='top';
        ctx.fillText('♥', 12+i*(heartSize+heartPad), 10);
    }
    ctx.globalAlpha=1;

    /* ---- HUD: level badge ---- */
    const s=running?elapsedMs/1000:0;
    const lv=Math.floor(s/30)+1;
    if(lv>1){
        ctx.font='bold 13px Orbitron,sans-serif';
        ctx.fillStyle='rgba(0,217,255,.85)';
        ctx.textAlign='right';
        ctx.textBaseline='top';
        ctx.fillText('LV '+lv, CW-10, 10);
        ctx.textAlign='left';
    }

    /* ---- Pause indicator ---- */
    if(paused){
        ctx.fillStyle='rgba(5,5,24,.72)';
        ctx.fillRect(0,0,CW,CH);
        ctx.font='bold 28px Orbitron,sans-serif';
        ctx.fillStyle='#00D9FF';
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        ctx.fillText('PAUSED',CW/2,CH/2);
        ctx.font='13px Noto Sans KR,sans-serif';
        ctx.fillStyle='rgba(255,255,255,.55)';
        ctx.fillText('▶ 재개 버튼 / Space / 화면 탭',CW/2,CH/2+36);
        ctx.textAlign='left';
    }
}

/* ---- RAF kick-off for idle star animation ---- */
function idleLoop(now){
    if(running)return;
    lastFrame=now;
    updateStars((now-(idleLoop._last||now))/1000);
    idleLoop._last=now;
    drawBackground();
    drawStars();
    requestAnimationFrame(idleLoop);
}
