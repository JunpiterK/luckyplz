/* =====================================================================
   PvP Lobby — Create/Join modal + Lobby room.
   인프라:
     · spacez_create_room / spacez_join_room / spacez_get_room / spacez_list_rooms
       / spacez_set_ready / spacez_leave_room / spacez_send_message / spacez_get_messages
       / spacez_start_game / spacez_finish_game RPC (SECURITY DEFINER)
     · Realtime broadcast 채널 'spacez:room:<id>' — member 입퇴장 + 채팅 + 추후 ping/state
   상태:
     · pvpState.roomId, .seed, .itemCount, .role, .members[], .isReady, .channel
   ===================================================================== */
const pvpState = {
    roomId: null,
    code: '',
    seed: 0,
    itemCount: 2,
    role: '',           // 'host' | 'guest'
    members: [],        // [{user_id, nickname, role, is_ready, joined_at}]
    isReady: false,
    channel: null,      // Supabase Realtime channel
    me: null,           // {id, nickname}
    listRefreshTimer: null,
    gameMode: 'idle',   // 'idle' | 'pvp' (PvP 게임 진행 중이면 game-over 흐름 분기)
    myFinished: false,
    myFinalScore: null,
    myFinalTime: null,
    password: null,     // host 가 만들 때 메모리에 보관 (lobby room 에 표시)
    pendingJoinRoomId: null,
};
function _showPvpOverlay(id){
    /* 다른 PvP overlay 다 닫고 지정한 거 열기. start overlay 도 동시에 hide. */
    document.querySelectorAll('.pvp-overlay').forEach(el => el.classList.remove('on'));
    if(id){
        const el = $(id);
        if(el) el.classList.add('on');
        $('overlay').classList.add('hidden');   /* 시작 overlay 가리기 */
    } else {
        /* 시작 overlay 복구 (게임 안 시작 상태일 때만) */
        if(!running) $('overlay').classList.remove('hidden');
    }
}
function _setPvpErr(id, msg){
    const el = $(id);
    if(el) el.textContent = msg || '';
}
async function _ensureMe(){
    if(pvpState.me) return pvpState.me;
    const sb = getSupabase();
    if(!sb) return null;
    const { data: { user } } = await sb.auth.getUser();
    if(!user) return null;
    const prof = await sb.from('profiles').select('nickname').eq('id', user.id).maybeSingle();
    pvpState.me = {
        id: user.id,
        nickname: (prof.data && prof.data.nickname) || user.email?.split('@')[0] || 'Player'
    };
    return pvpState.me;
}

function escapeHtml(s){
    return String(s||'').replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---- 디버그: PvP 진단용 시각 fb. inline script 어디선가 runtime throw 시
   PvP 핸들러 attach 안 되어 클릭 무반응 → 사용자 진단 어려움.
   global error listener 로 throw 잡아서 시작 화면 위에 빨간 메시지 표시. */
window.addEventListener('error', (ev) => {
    try {
        const ovEl = document.getElementById('overlay');
        if(!ovEl) return;
        let dbg = document.getElementById('pvpDebugLine');
        if(!dbg){
            dbg = document.createElement('div');
            dbg.id = 'pvpDebugLine';
            dbg.style.cssText = 'position:absolute;top:4px;left:4px;right:4px;background:rgba(255,40,40,.92);color:#fff;font-size:.7em;padding:6px 8px;border-radius:6px;z-index:99;text-align:left;line-height:1.3;word-break:break-word;font-family:monospace';
            ovEl.appendChild(dbg);
        }
        dbg.textContent = '⚠ JS 에러: ' + (ev.message || ev.error?.message || 'unknown') +
                           ' @' + (ev.filename || '').split('/').pop() + ':' + (ev.lineno || '?');
    } catch(_){}
});

/* ---- Create modal ----
   inline onclick 의 fallback function 으로도 호출 가능하게 window.openPvpCreate 노출.
   addEventListener 가 어떤 이유로 attach 안 되어도 inline onclick 이 작동. */
let pvpVisibility = 'public';
window.openPvpCreate = function(){
    try {
        _setPvpErr('pvpCreateErr', '');
        pvpState.itemCount = 2;
        pvpVisibility = 'public';
        document.querySelectorAll('#pvpItemCount button').forEach(b => {
            b.classList.toggle('active', parseInt(b.dataset.cnt,10) === 2);
        });
        document.querySelectorAll('#pvpVisibility button').forEach(b => {
            b.classList.toggle('active', b.dataset.vis === 'public');
        });
        const pwField = document.getElementById('pvpPwField');
        const pwInput = document.getElementById('pvpPwInput');
        if(pwField) pwField.style.display = 'none';
        if(pwInput) pwInput.value = '';
        _showPvpOverlay('pvpCreate');
        _ensureMe().catch(()=>{});
    } catch(err){
        alert('[PvP Create 에러] ' + (err && err.message || String(err)));
    }
};
document.querySelectorAll('#pvpItemCount button').forEach(b => {
    b.addEventListener('click', () => {
        document.querySelectorAll('#pvpItemCount button').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        pvpState.itemCount = parseInt(b.dataset.cnt, 10);
    });
});
document.querySelectorAll('#pvpVisibility button').forEach(b => {
    b.addEventListener('click', () => {
        document.querySelectorAll('#pvpVisibility button').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        pvpVisibility = b.dataset.vis;
        $('pvpPwField').style.display = pvpVisibility === 'private' ? 'block' : 'none';
    });
});
$('pvpCreateCancel').addEventListener('click', () => _showPvpOverlay(null));
$('pvpCreateConfirm').addEventListener('click', async () => {
    const isPrivate = pvpVisibility === 'private';
    let pw = null;
    if(isPrivate){
        pw = ($('pvpPwInput').value || '').trim();
        if(pw.length < 4 || pw.length > 30){
            _setPvpErr('pvpCreateErr', '비밀번호는 4-30자');
            return;
        }
    }
    _setPvpErr('pvpCreateErr', '...');
    try {
        const sb = getSupabase();
        const { data, error } = await sb.rpc('spacez_create_room', {
            p_item_count: pvpState.itemCount,
            p_is_private: isPrivate,
            p_password: pw
        });
        if(error) throw error;
        const row = Array.isArray(data) ? data[0] : data;
        if(!row || !row.room_id) throw new Error('no_room_id_returned');
        pvpState.roomId = row.room_id;
        pvpState.code = row.code;
        pvpState.seed = Number(row.seed);
        pvpState.role = 'host';
        pvpState.isReady = false;
        pvpState.password = pw;  /* 호스트에게 비번 다시 보여주기 위해 메모리에만 */
        await _enterPvpRoom();
        _setPvpErr('pvpCreateErr', '');
    } catch(e){
        const msg = e?.message || String(e);
        if(msg.includes('auth_required') || msg.includes('JWT')){
            _setPvpErr('pvpCreateErr', '🔐 대결 모드는 로그인이 필요해요 (우상단 로그인)');
        } else if(msg.includes('invalid_password')){
            _setPvpErr('pvpCreateErr', '비밀번호는 4-30자');
        } else if(msg.includes('does not exist') || msg.includes('PGRST') || msg.includes('function')){
            _setPvpErr('pvpCreateErr', '⚠ 인프라 미적용 — Supabase 에서 spacez_pvp SQL 실행 필요');
        } else {
            _setPvpErr('pvpCreateErr', '오류: ' + msg);
        }
    }
});

window.openPvpJoin = function(){

$('pvpJoinCancel').addEventListener('click', () => {
    if(pvpState.listRefreshTimer){ clearInterval(pvpState.listRefreshTimer); pvpState.listRefreshTimer = null; }
    _showPvpOverlay(null);
});
$('pvpJoinRefresh').addEventListener('click', () => _refreshPvpRooms());

async function _refreshPvpRooms(){
    const list = $('pvpRooms');
    try {
        const sb = getSupabase();
        const { data, error } = await sb.rpc('spacez_list_rooms');
        if(error) throw error;
        if(!data || data.length === 0){
            list.innerHTML = '<div class="pvp-empty">대기 중인 방이 없어요<br><small style="opacity:.6">친구가 방을 만들면 여기 표시돼요</small></div>';
            return;
        }
        /* 배틀넷 스타일 row + 명시적 [Join] button — 카드 div 가 모바일에서
           click 안 받는 quirk 회피. button 은 모든 OS 에서 100% click 받음.
           card 자체는 div, button 만 클릭 가능. 자식 pointer-events:none. */
        list.innerHTML = data.map(r => {
            const ago = Math.max(0, Math.floor((Date.now() - new Date(r.created_at).getTime())/1000));
            const agoTxt = ago < 60 ? ago+'초 전' : Math.floor(ago/60)+'분 전';
            const lock  = r.has_password ? '🔒 ' : '';
            const full  = r.member_count >= 2;
            const args  = `'${r.room_id}', ${r.has_password?1:0}, '${escapeHtml(r.host_name).replace(/'/g, '&#39;')}'`;
            return `<div class="pvp-room ${full?'full':''}" data-room-id="${r.room_id}">
                <div class="pvp-rh">${lock}${escapeHtml(r.host_name)}
                    <small>아이템 ${r.item_count}개 · ${agoTxt} · ${r.member_count}/2 · W:0 L:0</small>
                </div>
                <button class="pvp-rjoin-btn" type="button"
                        onclick="window.spacezTryJoin(${args})"
                        ${full ? 'disabled' : ''}>${full ? '만석' : '참여'}</button>
            </div>`;
        }).join('');
    } catch(e){
        const msg = e?.message || String(e);
        if(msg.includes('does not exist') || msg.includes('PGRST') || msg.includes('function')){
            list.innerHTML = '<div class="pvp-empty">⚠ 인프라 미적용 — SQL 실행 필요</div>';
        } else if(msg.includes('auth_required') || msg.includes('JWT')){
            list.innerHTML = '<div class="pvp-empty">🔐 로그인이 필요해요</div>';
        } else {
            list.innerHTML = '<div class="pvp-empty">불러오기 실패</div>';
        }
    }
}

/* inline onclick fallback — 카드 click 시 항상 호출되는 함수.
   addEventListener 가 어떤 이유로 attach 안 되어도 onclick attribute 가
   직접 호출. private 방이면 비번 popup, public 이면 즉시 join. */
window.spacezTryJoin = function(roomId, isPrivateFlag, hostName){
    try {
        if(!roomId){ alert('방 ID 누락'); return; }
        if(isPrivateFlag){
            pvpState.pendingJoinRoomId = roomId;
            const h = $('pvpPwPromptHost'); if(h) h.textContent = '🔒 ' + (hostName || '') + ' 의 방';
            const i = $('pvpPwPromptInput'); if(i){ i.value = ''; }
            _setPvpErr('pvpPwPromptErr', '');
            _showPvpOverlay('pvpPwPrompt');
            setTimeout(() => { try { $('pvpPwPromptInput').focus(); } catch(_){} }, 50);
        } else {
            _doJoinRoom(roomId, null);
        }
    } catch(err){
        alert('[PvP join 클릭 에러] ' + (err && err.message || String(err)));
    }
};

async function _doJoinRoom(roomId, password){
    _setPvpErr('pvpJoinErr', '');
    _setPvpErr('pvpPwPromptErr', '');
    try {
        const sb = getSupabase();
        const { data, error } = await sb.rpc('spacez_join_room_by_id', {
            p_room_id: roomId, p_password: password
        });
        if(error) throw error;
        const row = Array.isArray(data) ? data[0] : data;
        if(!row || !row.room_id) throw new Error('no_room_returned');
        pvpState.roomId = row.room_id;
        pvpState.code = row.code;
        pvpState.seed = Number(row.seed);
        pvpState.itemCount = row.item_count;
        pvpState.role = 'guest';
        pvpState.isReady = false;
        if(pvpState.listRefreshTimer){ clearInterval(pvpState.listRefreshTimer); pvpState.listRefreshTimer = null; }
        await _enterPvpRoom();
    } catch(e){
        const msg = e?.message || String(e);
        const target = $('pvpPwPrompt').classList.contains('on') ? 'pvpPwPromptErr' : 'pvpJoinErr';
        if(msg.includes('auth_required') || msg.includes('JWT')) _setPvpErr(target, '🔐 로그인이 필요해요 (우상단 로그인)');
        else if(msg.includes('invalid_password')) _setPvpErr(target, '❌ 비밀번호가 틀렸어요');
        else if(msg.includes('room_not_found')) _setPvpErr(target, '방을 찾을 수 없어요 (만료됨)');
        else if(msg.includes('room_full')) _setPvpErr(target, '방이 가득 찼어요');
        else if(msg.includes('cannot_join_own_room')) _setPvpErr(target, '자기 방에는 참여할 수 없어요');
        else if(msg.includes('does not exist') || msg.includes('PGRST') || msg.includes('function')) _setPvpErr(target, '⚠ 인프라 미적용 — SQL 실행 필요');
        else _setPvpErr(target, '오류: ' + msg);
    }
}

$('pvpPwPromptCancel').addEventListener('click', () => {
    pvpState.pendingJoinRoomId = null;
    _showPvpOverlay('pvpJoin');
});
$('pvpPwPromptConfirm').addEventListener('click', async () => {
    const pw = ($('pvpPwPromptInput').value || '').trim();
    if(pw.length < 1){ _setPvpErr('pvpPwPromptErr', '비밀번호 입력'); return; }
    const roomId = pvpState.pendingJoinRoomId;
    if(!roomId) return;
    await _doJoinRoom(roomId, pw);
});

async function _subscribePvpRoom(){
    if(pvpState.channel){
        try { await pvpState.channel.unsubscribe(); } catch(_){}
        pvpState.channel = null;
    }
    const sb = getSupabase();
    const ch = sb.channel('spacez:room:' + pvpState.roomId, { config: { broadcast: { self: false } } });
    ch.on('broadcast', { event: 'member' }, () => _loadPvpMembers());
    ch.on('broadcast', { event: 'chat' }, (e) => _appendChat(e.payload?.nickname || '?', e.payload?.msg || ''));
    /* 호스트가 [시작] 누르면 broadcast 'game_start' { seed, item_count }.
       게스트는 받자마자 본인도 _startPvpGame 으로 진입. */
    ch.on('broadcast', { event: 'game_start' }, (e) => {
        const seed = Number(e.payload?.seed || pvpState.seed || 0);
        const itemCnt = Number(e.payload?.item_count || pvpState.itemCount || 2);
        if(seed) pvpState.seed = seed;
        if(itemCnt) pvpState.itemCount = itemCnt;
        _startPvpGame();
    });
    /* 1초 ping/pong — 상대 ping 받으면 즉시 pong 응답. 자기 pong 받으면 RTT 계산. */
    ch.on('broadcast', { event: 'ping' }, (e) => {
        try { ch.send({ type:'broadcast', event:'pong', payload:{ ts: e.payload?.ts } }); } catch(_){}
    });
    ch.on('broadcast', { event: 'pong' }, (e) => {
        const sentAt = Number(e.payload?.ts || 0);
        if(sentAt > 0){
            const rtt = Date.now() - sentAt;
            _pushPingSample(rtt);
        }
    });
    /* 상대 게임 종료 시 결과 알림. */
    ch.on('broadcast', { event: 'finished' }, (e) => {
        /* 상대 죽음 — 본인 살아있으면 본인 = winner. 본인도 즉시 종료. */
        const loserId = e.payload?.user_id;
        if(running && loserId && loserId !== pvpState.me?.id){
            pvpState.opponentDied = true;
            pvpState.declaredWinner = pvpState.me?.id || null;
            /* 자기 게임 강제 종료 — 자기 score 도 finish. */
            triggerGameOver();
        } else {
            _maybeShowPvpResult();
        }
    });
    /* 상대 우주선 위치 — 50ms 마다 받음. lerp 용 target 만 갱신, render 시 보간. */
    ch.on('broadcast', { event: 'pos' }, (e) => {
        if(!pvpState.opponent){
            const opName = pvpState.members.find(m => m.user_id !== pvpState.me?.id)?.nickname || '';
            pvpState.opponent = {
                x: undefined, y: undefined, targetX: 0, targetY: 0,
                prevX: 0, prevY: 0, prevT: 0,         /* 이전 snapshot — velocity 계산 */
                lastT: 0,                              /* 마지막 snapshot 의 sender timestamp */
                alive: true, nickname: opName, gravActive: false
            };
        }
        const op = pvpState.opponent;
        const newX = Number(e.payload?.x);
        const newY = Number(e.payload?.y);
        const senderT = Number(e.payload?.t || 0);
        /* 이전 snapshot 보관 (velocity 계산용) */
        op.prevX = op.targetX; op.prevY = op.targetY; op.prevT = op.lastT;
        op.targetX = newX; op.targetY = newY; op.lastT = senderT;
        op.alive = e.payload?.alive !== false;
        if(e.payload?.grav !== undefined) op.gravActive = !!e.payload.grav;
    });
    await ch.subscribe();
    pvpState.channel = ch;
    /* 채널 준비 후 ping loop 시작 */
    _startPingLoop();
}

/* ===== Ping (RTT) 측정 + 5칸 막대 ===== */
let _pingArr = [];     /* 최근 5 회 RTT (ms) */
let _pingTimer = null;
function _pushPingSample(rtt){
    _pingArr.push(rtt);
    if(_pingArr.length > 5) _pingArr.shift();
    _renderPingBar();
}
function _renderPingBar(){
    const el = document.getElementById('pvpPingBar');
    const ms = document.getElementById('pvpPingMs');
    if(!el) return;
    const n = _pingArr.length;
    const avg = n === 0 ? null : Math.round(_pingArr.reduce((a,b)=>a+b,0) / n);
    /* RTT → 칸 수 + 색상 매핑 */
    let bars = 0, color = 'good';
    if(avg === null){ bars = 0; }
    else if(avg < 60)  { bars = 5; color = 'good'; }
    else if(avg < 110) { bars = 4; color = 'good'; }
    else if(avg < 180) { bars = 3; color = 'warn'; }
    else if(avg < 280) { bars = 2; color = 'bad';  }
    else                { bars = 1; color = 'bad';  }
    el.innerHTML = '';
    for(let i = 0; i < 5; i++){
        const b = document.createElement('div');
        b.className = 'bar b' + (i+1) + (i < bars ? (' on ' + color) : '');
        el.appendChild(b);
    }
    if(ms) ms.textContent = avg !== null ? (avg + 'ms') : '— ';
}
function _startPingLoop(){
    _pingArr = [];
    _renderPingBar();
    if(_pingTimer) clearInterval(_pingTimer);
    _pingTimer = setInterval(() => {
        if(!pvpState.channel) return;
        const ts = Date.now();
        try { pvpState.channel.send({ type:'broadcast', event:'ping', payload:{ ts } }); } catch(_){}
    }, 1000);
}
function _stopPingLoop(){
    if(_pingTimer){ clearInterval(_pingTimer); _pingTimer = null; }
    _pingArr = [];
}

/* ===== Seeded RNG (PvP 메테오 패턴 deterministic 동기화용) =====
   mulberry32 — 32-bit PRNG. PvP 시 _setSeed(pvpState.seed) 로 양쪽 client
   동일 sequence 생성. spawnBullet / 메테오 위치/속도 의 random 은 rand() 사용.
   single-player 는 _resetRand() 로 Math.random 으로 복귀. */
let _seededRng = Math.random;
function _mulberry32(seed){
    return function(){
        let t = (seed += 0x6D2B79F5) | 0;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
}
function rand(){ return _seededRng(); }
function _setSeed(s){ _seededRng = _mulberry32((s|0) || 1); }
function _resetRand(){ _seededRng = Math.random; }

/* ===== PvP shared playfield ===== */
let _opPosBcastTimer = null;
function _startOpponentSync(){
    if(_opPosBcastTimer) clearInterval(_opPosBcastTimer);
    _opPosBcastTimer = setInterval(() => {
        if(!pvpState.channel || !running) return;
        try {
            pvpState.channel.send({
                type: 'broadcast',
                event: 'pos',
                payload: {
                    x: player.x, y: player.y,
                    alive: lives > 0,
                    grav: gravityFieldActive,
                    t: Date.now()        /* sender timestamp — receiver 가 latency 보정 */
                }
            });
        } catch(_){}
    }, 33);   /* 30Hz (50ms→33ms) — sync 정확도 개선 */
}
function _stopOpponentSync(){
    if(_opPosBcastTimer){ clearInterval(_opPosBcastTimer); _opPosBcastTimer = null; }
    pvpState.opponent = null;
}
/* PvP role 별 ship palette:
   - host  = silver/cyan (single-player 와 동일 — original)
   - guest = gold (희미한 금색 톤 — 본인 색과 비슷하지만 명확히 구분).
   양쪽 client 동일 — host 는 누가 봐도 cyan, guest 는 gold. */
const PVP_PALETTE = {
    silver: { body0:'#32404c', body1:'#7c8c9a', body2:'#c2ced8', body3:'#cad4de', body4:'#94a2ae', body5:'#42505c',
              fin0:'#1a2028', fin1:'#50606c', fin2:'#44545e', fin3:'#181e26',
              shadow:'rgba(170,188,210,0.50)' },
    gold:   { body0:'#3c3018', body1:'#a08858', body2:'#e8c890', body3:'#f0d098', body4:'#b89870', body5:'#4c3c20',
              fin0:'#2a2010', fin1:'#705820', fin2:'#5c4818', fin3:'#1c1408',
              shadow:'rgba(220,180,100,0.50)' }
};
function _opponentPalette(){
    const opRole = pvpState.role === 'host' ? 'guest' : 'host';
    return opRole === 'guest' ? PVP_PALETTE.gold : PVP_PALETTE.silver;
}
function _myPalette(){
    return pvpState.role === 'guest' ? PVP_PALETTE.gold : PVP_PALETTE.silver;
}

function _drawOpponentShip(){
    if(!(pvpState && pvpState.gameMode === 'pvp' && pvpState.opponent && pvpState.opponent.alive)) return;
    const op = pvpState.opponent;
    /* === Position prediction — sender timestamp + velocity 로 latency 보정 ===
       LTE RTT 260ms → 받는 위치는 130ms 전 정보. velocity 로 그만큼 미래 위치 추정.
       prev snapshot 과 cur snapshot 으로 velocity 계산. */
    if(op.targetX !== undefined){
        let predX = op.targetX, predY = op.targetY;
        if(op.lastT > 0 && op.prevT > 0 && op.lastT > op.prevT){
            const sampleDt = (op.lastT - op.prevT) / 1000;
            if(sampleDt > 0.005 && sampleDt < 0.5){
                const vx = (op.targetX - op.prevX) / sampleDt;
                const vy = (op.targetY - op.prevY) / sampleDt;
                /* receiver-side latency 추정: now - sender_time. 양쪽 시계 약간 차이
                   있을 수 있으나 Supabase relay 기준 수 ms 라 OK. cap at 200ms 으로
                   prediction 폭주 방지. */
                const lat = Math.min(0.20, Math.max(0, (Date.now() - op.lastT) / 1000));
                predX += vx * lat;
                predY += vy * lat;
            }
        }
        /* lazy snap: 위치 차이 너무 크면 (>120px) 즉시 jump — broadcast 누락 회복 */
        if(op.x === undefined){
            op.x = predX; op.y = predY;
        } else {
            const dx = predX - op.x, dy = predY - op.y;
            const d2 = dx*dx + dy*dy;
            if(d2 > 14400){   /* > 120px */
                op.x = predX; op.y = predY;
            } else {
                op.x += dx * 0.55;   /* lerp 0.30 → 0.55 — 더 빠른 따라잡기 */
                op.y += dy * 0.55;
            }
        }
        /* canvas 범위 clamp */
        op.x = Math.max(-20, Math.min(CW + 20, op.x));
        op.y = Math.max(-20, Math.min(CH + 20, op.y));
    }
    if(op.x === undefined || isNaN(op.x)) return;
    /* 같은 starship 모양 — palette 만 host/guest 따라 다름. */
    _drawStarshipAt(op.x, op.y, _opponentPalette(), 0.92);
    /* 닉네임 — 우주선 *아래* 에 투명. */
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.42)';
    ctx.font = 'bold 8px Orbitron, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText((op.nickname || '').substring(0, 10), op.x, op.y + 22);
    ctx.restore();
}

/* starship 본체 + fin + sheen (player.x, .y 위치 기준 상대 좌표 사용 안 함 — translate 후).
   본인 player 의 인라인 draw 와 동일 시각, palette 만 변경. PvP 시 재사용 — 본인 ship
   draw 도 이 함수 호출 가능 (다음 단계). 현재는 opponent 만. */
function _drawStarshipAt(px, py, p, alpha){
    ctx.save();
    ctx.translate(px, py);
    if(alpha !== undefined && alpha !== 1) ctx.globalAlpha = alpha;
    /* Aft delta fins */
    const finG = ctx.createLinearGradient(-16,5,16,5);
    finG.addColorStop(0, p.fin0); finG.addColorStop(0.30, p.fin1);
    finG.addColorStop(0.70, p.fin2); finG.addColorStop(1, p.fin3);
    ctx.fillStyle = finG;
    ctx.beginPath(); ctx.moveTo(5,2); ctx.lineTo(15,15); ctx.lineTo(6,9); ctx.lineTo(5,8); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-5,2); ctx.lineTo(-15,15); ctx.lineTo(-6,9); ctx.lineTo(-5,8); ctx.closePath(); ctx.fill();
    /* Body — ogive nose + cylinder */
    const bG = ctx.createLinearGradient(-5,0,5,0);
    bG.addColorStop(0, p.body0); bG.addColorStop(0.18, p.body1);
    bG.addColorStop(0.44, p.body2); bG.addColorStop(0.64, p.body3);
    bG.addColorStop(0.82, p.body4); bG.addColorStop(1, p.body5);
    ctx.shadowColor = p.shadow; ctx.shadowBlur = 8;
    ctx.fillStyle = bG;
    ctx.beginPath();
    ctx.moveTo(0,-19);
    ctx.quadraticCurveTo(4,-13,5,-9);
    ctx.lineTo(5,8); ctx.lineTo(-5,8); ctx.lineTo(-5,-9);
    ctx.quadraticCurveTo(-4,-13,0,-19);
    ctx.closePath(); ctx.fill();
    ctx.shadowBlur = 0;
    /* Specular sheen */
    const spG = ctx.createLinearGradient(-2,-18,-2,8);
    spG.addColorStop(0, 'rgba(255,255,255,0.32)');
    spG.addColorStop(0.45, 'rgba(255,255,255,0.12)');
    spG.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = spG;
    ctx.beginPath(); ctx.ellipse(-1.5,-5,1.5,11,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
}

/* ===== PvP game flow (Stage 1 — 단순 score 비교, state broadcast 없음) =====
   호스트가 [시작] 누르면 _startPvpGame 진입. 양쪽 모두 dodge.startGame 호출 →
   각자 dodge 게임 진행. 죽으면 _handlePvpGameOver — finish RPC + broadcast.
   양쪽 모두 finish 보고하면 server 가 winner 결정. polling 으로 winner 확인. */
function _startPvpGame(){
    pvpState.gameMode = 'pvp';
    pvpState.myFinished = false;
    pvpState.myFinalScore = null;
    pvpState.myFinalTime = null;
    pvpState.opponent = null;
    /* deterministic seeded RNG — 양쪽 같은 메테오 패턴.
       모든 spawnBullet 안 random 호출은 rand() 사용 (Math.random 아님). */
    _setSeed(pvpState.seed || 1);
    _showPvpOverlay(null);
    $('overlay').classList.add('hidden');
    if(!running){
        try { startGame(); } catch(e){ console.error('[PvP] startGame fail', e); }
    }
    /* 우주선 위치 broadcast 시작 (20Hz). 게임 끝나면 _stopOpponentSync 호출. */
    _startOpponentSync();
}

async function _handlePvpGameOver(duration, score){
    pvpState.myFinished = true;
    pvpState.myFinalScore = score;
    pvpState.myFinalTime = duration;
    /* 위치 broadcast 정리 + RNG 복귀 (다음 single-player 게임 영향 X). */
    _stopOpponentSync();
    _resetRand();
    /* spacez_finish_game RPC — 양쪽 보고 후 server 가 winner 결정. */
    try {
        const sb = getSupabase();
        await sb.rpc('spacez_finish_game', {
            p_room_id: pvpState.roomId,
            p_score: score,
            p_duration_ms: duration
        });
    } catch(e){ console.error('[PvP] finish_game RPC fail', e); }
    await _broadcastPvp('finished', { score, duration, user_id: pvpState.me?.id || null });
    _showPvpResult();
}

function _showPvpResult(){
    /* PvP 결과 overlay — 단일플레이의 다시하기 화면 대체. */
    const ov = $('overlay');
    const myDur = formatDuration(pvpState.myFinalTime || 0);
    ov.innerHTML =
        '<h2 class="play">⚔ 대결 종료</h2>' +
        '<div class="score-big" style="font-size:1.6em">' + myDur + '</div>' +
        '<p>나의 생존 시간</p>' +
        '<div id="pvpResultStatus" style="margin:14px 0;font-size:.95em;color:#FFE66D;min-height:1.4em">상대 결과 대기 중...</div>' +
        '<div class="ov-btn-row">' +
            '<button class="btn" id="ovBtn" type="button">룸으로 돌아가기</button>' +
        '</div>';
    ov.classList.remove('hidden');
    document.getElementById('ovBtn').addEventListener('click', () => {
        /* 룸 view 로 복귀 — 결과 확인 후 다시 ready 가능. 또는 leave 가능. */
        pvpState.gameMode = 'idle';
        pvpState.myFinished = false;
        ov.classList.add('hidden');
        /* 멤버 ready 상태 reset (server side 도 finished 후엔 reset). */
        pvpState.isReady = false;
        _enterPvpRoom();
    });
    _pollPvpResult(0);
}

async function _pollPvpResult(tries){
    /* client-side 즉시 winner 결정 — opponentDied 면 본인 = winner, declaredWinner 가
       있으면 그게 우선. server polling 결과는 보강 정보. */
    const status = document.getElementById('pvpResultStatus');
    if(!status) return;
    if(pvpState.declaredWinner === pvpState.me?.id){
        status.innerHTML = '<span style="color:#00E676;font-size:1.4em;font-weight:900">🏆 승리!</span>'
            + '<br><small style="color:rgba(255,255,255,.6)">상대 우주선 격추됨</small>';
        return;   /* 더 polling 안 함 */
    }
    if(tries > 20) return;   /* 30 초 timeout */
    /* RPC polling — server 가 양쪽 보고 후 winner_id 채워지면 그 결과 따름. */
    try {
        const sb = getSupabase();
        const { data } = await sb.rpc('spacez_get_room', { p_room_id: pvpState.roomId });
        const row = Array.isArray(data) ? data[0] : data;
        if(row && row.status === 'finished'){
            const members = row.members || [];
            const opponent = members.find(m => m.user_id !== pvpState.me?.id);
            const winnerId = row.winner_id;
            const isWin = winnerId === pvpState.me?.id;
            if(isWin){
                status.innerHTML = '<span style="color:#00E676;font-size:1.4em;font-weight:900">🏆 승리!</span>';
            } else if(winnerId){
                status.innerHTML = '<span style="color:#FF8888">패배 — ' + escapeHtml(opponent?.nickname || '?') + ' 승리</span>' +
                    (opponent?.final_time_ms ? '<br><small style="color:rgba(255,255,255,.6)">상대: ' + formatDuration(opponent.final_time_ms) + '</small>' : '');
            } else {
                /* server winner 결정 못 함 — 양쪽 score 동률. 상대 정보 보여줌. */
                status.innerHTML = '<span style="color:#FFE66D">동률</span>' +
                    (opponent?.final_time_ms ? '<br><small>상대: ' + formatDuration(opponent.final_time_ms) + '</small>' : '');
            }
            return;
        }
    } catch(_){}
    setTimeout(() => _pollPvpResult(tries + 1), 1500);
}

function _maybeShowPvpResult(){
    /* 상대가 finish broadcast 보냄 — 자기는 아직 게임 중이거나 끝났을 수 있음.
       끝났으면 polling 트리거. 아직 게임 중이면 ignore (자기 끝나면 자동 처리). */
    if(pvpState.myFinished){
        _pollPvpResult(0);
    }
}

let currentScope='world';
document.querySelectorAll('.lb-tab').forEach(b=>{
    b.addEventListener('click',()=>{
        document.querySelectorAll('.lb-tab').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        currentScope=b.dataset.scope;
        loadLeaderboard(currentScope);
    });
});
async function loadLeaderboard(scope){
    $('lbList').innerHTML='<div class="lb-empty">불러오는 중…</div>';
    try{
        const {data,error}=await getSupabase().rpc('dodge_leaderboard',{p_scope:scope,p_limit:50});
        try{ console.log('[dodge.leaderboard]', scope, error?'error':(data?data.length+' rows':'null'), error?error.message:''); }catch(_){}
        if(error||!data){ $('lbList').innerHTML='<div class="lb-empty">기록 없음</div>'; return; }
        if(!data.length){
            const emptyMsg = scope==='today'
                ? '🌅 오늘 (한국 시간 기준) 기록이 아직 없어요.<br>첫 기록의 주인공이 되세요!'
                : scope==='friends'
                ? '친구가 아직 플레이하지 않았어요.<br>친구 추가는 /messages/ 에서!'
                : '첫 기록의 주인공이 되세요!';
            $('lbList').innerHTML='<div class="lb-empty">'+emptyMsg+'</div>';
            return;
        }
        $('lbList').innerHTML=data.map(row=>{
            const isSelf=me&&row.user_id===me.id;
            const rnkCls=row.rnk===1?' gold':row.rnk===2?' silver':row.rnk===3?' bronze':'';
            const av=row.avatar_url
                ?'<div class="lb-av"><img src="'+esc(row.avatar_url)+'" referrerpolicy="no-referrer" alt=""></div>'
                :'<div class="lb-av">'+esc(initials(row.nickname))+'</div>';
            return '<div class="lb-row'+(isSelf?' self':'')+'">'
                 +'<div class="lb-rnk'+rnkCls+'">'+(row.rnk<=3?(['🥇','🥈','🥉'][row.rnk-1]):('#'+row.rnk))+'</div>'
                 +'<div class="lb-who">'+av+'<div class="lb-nick">'+esc(row.nickname||'?')+'</div></div>'
                 +'<div class="lb-score">'+formatTime(row.best_score)+'</div>'
                 +'</div>';
        }).join('');
    }catch(_){$('lbList').innerHTML='<div class="lb-empty">불러오기 실패</div>';}
}
