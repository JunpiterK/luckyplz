/* ================================================================
   Mobile portrait — PRIMARY design target.
   Tablet landscape + desktop are progressive enhancements via
   min-width media queries at the bottom.
   ================================================================ */
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --dark:#050518;--cyan:#00D9FF;--danger:#FF3366;
    --success:#00E676;--accent:#9C6FFF;
    --muted:rgba(255,255,255,.55);--muted-2:rgba(255,255,255,.35);
    --panel-br:rgba(255,255,255,.07);
    --sb-bottom: env(safe-area-inset-bottom, 0px);
}
html,body{height:100%;overscroll-behavior:none}
body{
    font-family:'Noto Sans KR',sans-serif;background:var(--dark);color:#fff;
    min-height:100dvh;overflow-x:hidden;letter-spacing:.01em;
    background-image:radial-gradient(ellipse at 50% 20%,rgba(0,217,255,.04) 0%,transparent 55%),linear-gradient(180deg,#050518 0%,#0a0a22 50%,#050518 100%);
    -webkit-tap-highlight-color:transparent;
    user-select:none;-webkit-user-select:none
}

/* ---- Topbar ---- */
.topbar{
    display:flex;align-items:center;gap:10px;
    padding:10px 14px;
    position:sticky;top:0;z-index:10;
    background:rgba(5,5,24,.88);backdrop-filter:blur(14px);
    border-bottom:1px solid var(--panel-br)
}
.topbar .home{text-decoration:none;color:rgba(255,255,255,.8);padding:7px 11px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);font-size:.78em;font-weight:700}
.topbar h1{font-family:'Orbitron','Noto Sans KR',sans-serif;font-size:1em;font-weight:900;margin:0;flex:1;text-align:center;background:linear-gradient(135deg,#00D9FF,#9C6FFF,#FF3366);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar .slot{min-width:64px;text-align:right}
.topbar .auth-chip{padding:5px 10px;border-radius:999px;background:rgba(0,217,255,.1);border:1px solid rgba(0,217,255,.25);color:#00D9FF;font-size:.72em;font-weight:700;text-decoration:none;white-space:nowrap}
.topbar .lb-btn{padding:6px 10px;border-radius:10px;background:rgba(0,217,255,.08);border:1px solid rgba(0,217,255,.3);color:#00D9FF;font-size:.78em;font-weight:800;cursor:pointer;font-family:inherit}
.topbar .lb-btn:active{background:rgba(0,217,255,.16)}

/* ---- Main column (phone) ---- */
.wrap{
    display:flex;flex-direction:column;align-items:center;gap:10px;
    padding:10px 12px calc(var(--sb-bottom) + 14px);
    max-width:460px;margin:0 auto
}
.left-col{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%}

/* ---- Score strip ---- */
.score-strip{
    display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%
}
.ss{
    background:linear-gradient(165deg,rgba(22,22,42,.55),rgba(12,12,28,.8));
    border:1px solid var(--panel-br);border-radius:14px;
    padding:10px 6px;text-align:center;min-height:58px;
    display:flex;flex-direction:column;align-items:center;justify-content:center
}
.ss .v{font-family:'Orbitron',sans-serif;font-size:1.6em;font-weight:900;line-height:1;color:#fff;font-variant-numeric:tabular-nums}
.ss .v.best{color:#00D9FF}
.ss .l{font-size:.6em;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);margin-top:4px;font-weight:800}

/* ---- Canvas ---- */
.canvas-wrap{
    position:relative;
    background:#050518;border:2px solid rgba(0,217,255,.22);border-radius:16px;
    box-shadow:0 14px 34px -10px rgba(0,217,255,.18),inset 0 0 40px rgba(0,217,255,.04);
    overflow:hidden;
    /* 3:5 aspect ratio (360×600 logical canvas) */
    aspect-ratio:3/5;
    width:100%;max-width:360px;
    touch-action:none
}
#dodge-canvas{display:block;width:100%;height:100%}

.overlay{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(5,5,24,.82);backdrop-filter:blur(6px);
    padding:18px;text-align:center;transition:opacity .18s;z-index:2
}
.overlay.hidden{opacity:0;pointer-events:none}
.overlay h2{font-family:'Orbitron',sans-serif;font-size:1.7em;font-weight:900;margin-bottom:4px}
.overlay h2.go{color:#FF3366}
.overlay h2.play{background:linear-gradient(135deg,#00D9FF,#9C6FFF,#FF3366);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.overlay p{color:rgba(255,255,255,.72);font-size:.86em;margin-bottom:12px;line-height:1.5;max-width:280px}
.overlay .score-big{font-family:'Orbitron',sans-serif;font-size:2.8em;font-weight:900;color:#00D9FF;margin:6px 0;line-height:1}
.overlay .pb{font-size:.84em;color:#00D9FF;margin-bottom:12px;font-weight:700;min-height:1.1em}
.overlay .btn{padding:12px 28px;border-radius:14px;border:0;background:linear-gradient(135deg,#00D9FF,#0099CC);color:#001828;font-family:'Orbitron',sans-serif;font-weight:900;letter-spacing:.08em;font-size:1em;cursor:pointer;box-shadow:0 10px 26px -6px rgba(0,217,255,.5)}
.overlay .btn:active{transform:translateY(1px)}
.overlay .kbd-hint{margin-top:12px;font-size:.72em;color:rgba(255,255,255,.35);letter-spacing:.03em}
.overlay .kbd-hint kbd{padding:2px 6px;border-radius:5px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);font-family:inherit;color:#fff}

.hint{

    padding:8px 12px;background:rgba(255,255,255,.02);border-radius:10px;

}

/* ---- Bottom sheet (leaderboard) ---- */
.sheet-backdrop{
    position:fixed;inset:0;z-index:50;background:rgba(5,5,24,.6);backdrop-filter:blur(4px);

}
.sheet-backdrop.on{opacity:1;pointer-events:auto}
.sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:51;
    max-height:78vh;overflow:hidden;
    background:linear-gradient(180deg,rgba(22,22,42,.98),rgba(12,12,28,1));
    border-top-left-radius:22px;border-top-right-radius:22px;
    border-top:1px solid rgba(255,255,255,.08);
    transform:translateY(100%);transition:transform .26s cubic-bezier(.2,.8,.4,1);
    padding-bottom:calc(var(--sb-bottom) + 14px);
    display:flex;flex-direction:column
}
.sheet.on{transform:translateY(0)}
.sheet .handle{width:42px;height:4px;border-radius:2px;background:rgba(255,255,255,.25);margin:10px auto}
.sheet h3{font-family:'Orbitron',sans-serif;font-size:.92em;font-weight:900;text-align:center;letter-spacing:.06em;color:#00D9FF;padding:2px 0 10px}
.sheet-body{overflow-y:auto;padding:0 14px;flex:1;min-height:0}
.sheet-body::-webkit-scrollbar{width:4px}
.sheet-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

.lb-tabs{
    display:flex;gap:6px;background:rgba(10,10,26,.55);padding:4px;
    border-radius:12px;border:1px solid var(--panel-br);
    margin:0 14px 12px
}
.lb-tab{flex:1;padding:10px 8px;border:0;background:transparent;color:rgba(255,255,255,.55);cursor:pointer;font-family:inherit;font-size:.82em;font-weight:700;letter-spacing:.04em;border-radius:8px}
.lb-tab.active{background:rgba(0,217,255,.14);color:#00D9FF}
.lb-list{background:rgba(255,255,255,.02);border:1px solid var(--panel-br);border-radius:14px;overflow:hidden;margin-bottom:10px}
.lb-row{display:grid;grid-template-columns:38px 1fr 88px;gap:10px;align-items:center;padding:10px 12px;border-bottom:1px solid var(--panel-br)}
.lb-row:last-child{border-bottom:0}
.lb-row.self{background:rgba(0,217,255,.06);border-left:3px solid #00D9FF;padding-left:9px}
.lb-rnk{font-family:'Orbitron',sans-serif;font-weight:900;font-size:.92em;color:var(--muted-2);text-align:center}
.lb-who{display:flex;align-items:center;gap:8px;min-width:0}
.lb-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#00D9FF,#9C6FFF);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-weight:900;font-size:.74em;color:#fff;flex-shrink:0;overflow:hidden}
.lb-av img{width:100%;height:100%;object-fit:cover}
.lb-nick{font-weight:600;font-size:.9em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-score{font-family:'Orbitron',sans-serif;font-weight:800;font-size:.92em;color:#00D9FF;text-align:right;font-variant-numeric:tabular-nums}
.lb-empty{padding:28px 14px;text-align:center;color:var(--muted-2);font-size:.86em}

/* ---- Shake on death ---- */
@keyframes shake{
    0%,100%{transform:translate(0,0)}
    20%{transform:translate(-3px,2px)}
    40%{transform:translate(3px,-2px)}
    60%{transform:translate(-2px,-2px)}
    80%{transform:translate(2px,3px)}
}
.canvas-wrap.shake{animation:shake .4s ease}

/* Ad slot */
#adSlot{width:100%;max-width:440px;min-height:80px;display:none;margin-top:2px}

/* ================================================================
   Tablet landscape / desktop (>= 1024px)
   ================================================================ */
@media(min-width:1024px){
    .wrap{max-width:none;flex-direction:row;align-items:flex-start;justify-content:center;gap:28px;padding:22px 26px;min-height:calc(100dvh - 60px)}
    .left-col{display:flex;flex-direction:column;gap:12px;align-items:center;flex:0 0 auto}
    .canvas-wrap{width:min(36vw, 360px)}
    .score-strip{max-width:360px;width:360px}
    .hint{max-width:360px;width:360px}
    .right-col{width:360px;flex-shrink:0}
    .right-col .sheet{position:static;transform:none;max-height:none;border-radius:18px;border:1px solid var(--panel-br);background:rgba(14,14,28,.55);padding-bottom:14px}
    .right-col .sheet .handle{display:none}
    .right-col .sheet-backdrop, .topbar .lb-btn{display:none}
    .right-col .sheet{transform:none!important;pointer-events:auto}
    .right-col .sheet-body{max-height:70vh}
}

<script src="/js/supabase-config.js?v=1777130570"></script>
<script>
const $=(id)=>document.getElementById(id);
const esc=(s)=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const initials=(n)=>(n||'?').trim()[0]?.toUpperCase()||'?';

let me=null;

/* ---- Auth gate ---- */
async function initAuth(){
    try{
        const u=await getUser();
        if(!u){ location.replace('/auth/?next='+encodeURIComponent(location.pathname)); return; }
        me=u;
        const prof=await getSupabase().from('profiles').select('nickname').eq('id',u.id).maybeSingle();
        const nick=prof.data?.nickname||'나';
        $('authSlot').innerHTML='<a class="auth-chip" href="/me/">'+esc(nick)+'</a>';
        loadMyStats();
    }catch(e){console.warn('auth init',e)}
}
async function loadMyStats(){
    if(!me)return;
    try{
        const {data,error}=await getSupabase().rpc('dodge_my_stats');
        if(error||!data||!data.has_record)return;
        $('bestScore').textContent=data.best_score;
    }catch(_){}
}

/* ======================================================
   GAME ENGINE
   Canvas logical size: 360 × 600 (3:5 ratio)
   ====================================================== */
const CW=360, CH=600;
const canvas=$('dodge-canvas');
const ctx=canvas.getContext('2d');

let dpr=1;
function fitCanvas(){
    dpr=Math.min(window.devicePixelRatio||1, 3);
    const rect=canvas.getBoundingClientRect();
    canvas.width=Math.round(rect.width*dpr);
    canvas.height=Math.round(rect.height*dpr);
    ctx.setTransform(dpr*rect.width/CW, 0, 0, dpr*rect.height/CH, 0, 0);
}
window.addEventListener('resize', fitCanvas);

/* ---- Rounded rect helper ---- */
function drawRR(x,y,w,h,r){
    r=Math.min(r,w/2,h/2);
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
}

/* ---- Stars ---- */
const STAR_COUNT=60;
const stars=[];
function initStars(){
    stars.length=0;
    for(let i=0;i<STAR_COUNT;i++){
        stars.push({
            x:Math.random()*CW,
            y:Math.random()*CH,
            r:Math.random()*1.4+0.4,
            speed:Math.random()*60+20,
            alpha:Math.random()*0.5+0.2
        });
    }
}
function updateStars(dt){
    for(const s of stars){
        s.y+=s.speed*dt;
        if(s.y>CH) s.y=-2;
    }
}
function drawStars(){
    for(const s of stars){
        ctx.globalAlpha=s.alpha;
        ctx.fillStyle='#fff';
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fill();
    }
    ctx.globalAlpha=1;
}

/* ---- Player ---- */
const PLAYER_SPEED=320;       // keyboard px/s
const FOLLOW_SPEED=900;       // pointer follow px/s
const HIT_RADIUS=5;
const INVINCIBLE_MS=2000;
const FLASH_INTERVAL=120;

let player={x:CW/2, y:CH*0.65};
let lives=3;
let invincibleUntil=0;
let flashVisible=true;
let lastFlashToggle=0;

/* ---- Pointer tracking ---- */
let pointer={x:player.x, y:player.y, active:false};

const canvasWrap=$('canvasWrap');
canvasWrap.addEventListener('mousemove',(e)=>{
    if(!running||paused)return;
    const r=canvas.getBoundingClientRect();
    pointer.x=(e.clientX-r.left)/r.width*CW;
    pointer.y=(e.clientY-r.top)/r.height*CH;
    pointer.active=true;
});
canvasWrap.addEventListener('touchmove',(e)=>{
    /* overlay 버튼 위는 건드리지 않음 */
    if(e.target.closest('.overlay')) return;
    e.preventDefault();
    if(!running||paused)return;
    const t=e.touches[0];
    const r=canvas.getBoundingClientRect();
    pointer.x=(t.clientX-r.left)/r.width*CW;
    pointer.y=(t.clientY-r.top)/r.height*CH;
    pointer.active=true;
},{passive:false});
canvasWrap.addEventListener('touchstart',(e)=>{
    /* overlay 버튼(시작/재시작)은 click 이벤트를 그대로 발생시켜야 함.
       preventDefault()를 호출하면 브라우저가 click 합성을 취소하여 버튼이 동작하지 않음. */
    if(e.target.closest('.overlay')) return;
    e.preventDefault();
    if(!running||paused)return;
    const t=e.touches[0];
    const r=canvas.getBoundingClientRect();
    pointer.x=(t.clientX-r.left)/r.width*CW;
    pointer.y=(t.clientY-r.top)/r.height*CH;
    pointer.active=true;
},{passive:false});
canvasWrap.addEventListener('mouseleave',()=>{ pointer.active=false; });
canvasWrap.addEventListener('touchend',()=>{ pointer.active=false; });

/* ---- Keyboard state ---- */
const keys={};
document.addEventListener('keydown',(e)=>{
    keys[e.key]=true;
    if(e.key===' '){ e.preventDefault(); if(running) paused=!paused; }
    if(e.key==='Enter'){ if(!running) startGame(); }
});
document.addEventListener('keyup',(e)=>{ keys[e.key]=false; });

/* ---- Bullets ---- */
let bullets=[];
let lastSpawn=0;
let elapsedMs=0;

function spawnBullet(now, speed, aimedRatio, multi){
    for(let m=0;m<multi;m++){
        /* pick a random edge: 0=top,1=right,2=bottom,3=left */
        const edge=Math.floor(Math.random()*4);
        let bx,by,vx,vy;
        let aimed=Math.random()<aimedRatio;
        let spread=(m-Math.floor(multi/2))*14; /* offset for multi-shot */

        if(edge===0){ /* top */
            bx=Math.random()*CW; by=-8;
            if(aimed){
                const dx=player.x-bx, dy=player.y-by;
                const d=Math.sqrt(dx*dx+dy*dy)||1;
                vx=dx/d*speed; vy=dy/d*speed;
            } else {
                /* toward center area with spread */
                const tx=CW*0.2+Math.random()*CW*0.6+spread;
                const ty=CH*0.3+Math.random()*CH*0.4;
                const dx=tx-bx, dy=ty-by;
                const d=Math.sqrt(dx*dx+dy*dy)||1;
                vx=dx/d*speed; vy=dy/d*speed;
            }
        } else if(edge===1){ /* right */
            bx=CW+8; by=Math.random()*CH;
            if(aimed){
                const dx=player.x-bx, dy=player.y-by;
                const d=Math.sqrt(dx*dx+dy*dy)||1;
                vx=dx/d*speed; vy=dy/d*speed;
            } else {
                const tx=CW*0.2+Math.random()*CW*0.4;
                const ty=CH*0.2+Math.random()*CH*0.6+spread;
                const dx=tx-bx, dy=ty-by;
                const d=Math.sqrt(dx*dx+dy*dy)||1;
                vx=dx/d*speed; vy=dy/d*speed;
            }
        } else if(edge===2){ /* bottom */
            bx=Math.random()*CW; by=CH+8;
            if(aimed){
                const dx=player.x-bx, dy=player.y-by;
                const d=Math.sqrt(dx*dx+dy*dy)||1;
                vx=dx/d*speed; vy=dy/d*speed;
            } else {
                const tx=CW*0.2+Math.random()*CW*0.6+spread;
                const ty=CH*0.3+Math.random()*CH*0.4;
                const dx=tx-bx, dy=ty-by;
                const d=Math.sqrt(dx*dx+dy*dy)||1;
                vx=dx/d*speed; vy=dy/d*speed;
            }
        } else { /* left */
            bx=-8; by=Math.random()*CH;
            if(aimed){
                const dx=player.x-bx, dy=player.y-by;
                const d=Math.sqrt(dx*dx+dy*dy)||1;
                vx=dx/d*speed; vy=dy/d*speed;
            } else {
                const tx=CW*0.6+Math.random()*CW*0.4;
                const ty=CH*0.2+Math.random()*CH*0.6+spread;
                const dx=tx-bx, dy=ty-by;
                const d=Math.sqrt(dx*dx+dy*dy)||1;
                vx=dx/d*speed; vy=dy/d*speed;
            }
        }
        bullets.push({x:bx, y:by, vx, vy, aimed, trail:[]});
    }
}

function updateDifficulty(){
    const s=elapsedMs/1000;
    return {
        spawnInterval: Math.max(260, 2400 - s*17.8),
        bulletSpeed:   Math.min(420, 120 + s*2.5),
        aimedRatio:    Math.min(0.65, s*0.005),
        multiShot:     s<50?1: s<90?2:3
    };
}

/* ---- Game state ---- */
let running=false, paused=false;
let startedAt=0, pausedAt=0, totalPausedMs=0;
let gameOverSent=false;
let flamePulse=0;

function resetGame(){
    player={x:CW/2, y:CH*0.65};
    pointer={x:CW/2, y:CH*0.65, active:false};
    lives=3;
    invincibleUntil=0;
    flashVisible=true;
    lastFlashToggle=0;
    bullets=[];
    lastSpawn=0;
    elapsedMs=0;
    flamePulse=0;
    $('scoreNow').textContent='0';
    $('timeNow').textContent='0:00';
    initStars();
}

function startGame(){
    resetGame();
    $('overlay').classList.add('hidden');
    running=true; paused=false;
    startedAt=performance.now();
    totalPausedMs=0;
    pausedAt=0;
    gameOverSent=false;
    requestAnimationFrame(gameLoop);
}

function triggerGameOver(){
    running=false;
    const duration=elapsedMs;
    const score=Math.floor(duration/100);
    const wrap=$('canvasWrap');
    wrap.classList.remove('shake'); void wrap.offsetWidth; wrap.classList.add('shake');
    if(navigator.vibrate)try{navigator.vibrate([40,20,80])}catch(_){}

    const mm=String(Math.floor(duration/60000)).padStart(1,'0');
    const ss=String(Math.floor((duration%60000)/1000)).padStart(2,'0');

    $('overlay').innerHTML=
        '<h2 class="go">GAME OVER</h2>'
      +'<div class="score-big">'+score+'</div>'
      +'<p>생존 시간 '+mm+':'+ss+'</p>'
      +'<div class="pb" id="ovPbLine"></div>'
      +'<button class="btn" id="ovBtn">다시하기</button>'
      +'<div class="kbd-hint"><kbd>Enter</kbd> 재시작</div>';
    $('overlay').classList.remove('hidden');
    $('ovBtn').addEventListener('click', (e)=>{ e.stopPropagation(); startGame(); });

    (async()=>{
        try{
            const {data,error}=await getSupabase().rpc('record_dodge_attempt',{p_duration_ms:duration});
            if(!error&&data?.is_personal_best){$('ovPbLine').textContent='🏆 개인 신기록!';}
            else if(error&&error.message?.includes('rate_limited')){$('ovPbLine').textContent='⏸ 1시간 내 30회 한도 초과';}
        }catch(_){}
        loadMyStats();
        loadLeaderboard(currentScope);
    })();

    try{
        const ad=$('adSlot');
        if(ad.style.display==='none'||!ad.style.display){ad.style.display='block';(adsbygoogle=window.adsbygoogle||[]).push({});}
    }catch(_){}
}

/* ---- Main loop ---- */
let lastFrame=0;
function gameLoop(now){
    if(!running)return;
    const rawDt=Math.min((now-lastFrame)/1000, 0.05);
    lastFrame=now;

    if(paused){
        drawFrame(now);
        requestAnimationFrame(gameLoop);
        return;
    }

    const dt=rawDt;
    elapsedMs=now - startedAt - totalPausedMs;

    /* ---- Move player via pointer (smooth follow) ---- */
    if(pointer.active){
        const dx=pointer.x-player.x, dy=pointer.y-player.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist>2){
            const step=Math.min(FOLLOW_SPEED*dt, dist);
            player.x+=dx/dist*step;
            player.y+=dy/dist*step;
        }
    } else {
        /* Keyboard movement */
        let mx=0,my=0;
        if(keys['ArrowLeft']||keys['a']||keys['A']) mx-=1;
        if(keys['ArrowRight']||keys['d']||keys['D']) mx+=1;
        if(keys['ArrowUp']||keys['w']||keys['W']) my-=1;
        if(keys['ArrowDown']||keys['s']||keys['S']) my+=1;
        if(mx||my){
            const mag=Math.sqrt(mx*mx+my*my);
            player.x+=mx/mag*PLAYER_SPEED*dt;
            player.y+=my/mag*PLAYER_SPEED*dt;
        }
    }
    /* Clamp player inside canvas */
    player.x=Math.max(16, Math.min(CW-16, player.x));
    player.y=Math.max(18, Math.min(CH-18, player.y));

    /* ---- Spawn bullets ---- */
    const diff=updateDifficulty();
    if(lastSpawn===0) lastSpawn=now;
    while(now-lastSpawn>=diff.spawnInterval){
        lastSpawn+=diff.spawnInterval;
        spawnBullet(now, diff.bulletSpeed, diff.aimedRatio, diff.multiShot);
    }

    /* ---- Update bullets + trails ---- */
    const alive=[];
    for(const b of bullets){
        b.trail.push({x:b.x, y:b.y});
        if(b.trail.length>7) b.trail.shift();
        b.x+=b.vx*dt;
        b.y+=b.vy*dt;
        if(b.x<-40||b.x>CW+40||b.y<-40||b.y>CH+40) continue;
        alive.push(b);
    }
    bullets=alive;

    /* ---- Collision ---- */
    if(now>invincibleUntil){
        for(const b of bullets){
            const dx=b.x-player.x, dy=b.y-player.y;
            if(dx*dx+dy*dy < (HIT_RADIUS+6)*(HIT_RADIUS+6)){
                lives--;
                invincibleUntil=now+INVINCIBLE_MS;
                flashVisible=true;
                lastFlashToggle=now;
                if(navigator.vibrate)try{navigator.vibrate(40)}catch(_){}
                bullets=bullets.filter(x=>x!==b);
                if(lives<=0){ triggerGameOver(); return; }
                break;
            }
        }
    }

    /* ---- Flash during invincibility ---- */
    if(now<invincibleUntil){
        if(now-lastFlashToggle>=FLASH_INTERVAL){
            flashVisible=!flashVisible;
            lastFlashToggle=now;
        }
    } else {
        flashVisible=true;
    }

    /* ---- Stars ---- */
    updateStars(dt);

    /* ---- Flame pulse ---- */
    flamePulse=(flamePulse+dt*12)%(Math.PI*2);

    /* ---- Update HUD ---- */
    const score=Math.floor(elapsedMs/100);
    $('scoreNow').textContent=score;
    const mm=String(Math.floor(elapsedMs/60000)).padStart(1,'0');
    const ss=String(Math.floor((elapsedMs%60000)/1000)).padStart(2,'0');
    $('timeNow').textContent=mm+':'+ss;

    drawFrame(now);
    requestAnimationFrame(gameLoop);
}

function drawFrame(now){
    /* Background */
    ctx.fillStyle='#050518';
    ctx.fillRect(0,0,CW,CH);

    /* Stars */
    drawStars();

    /* Bullets */
    for(const b of bullets){
        /* Trail */
        for(let i=0;i<b.trail.length;i++){
            const t=b.trail[i];
            const alpha=(i+1)/b.trail.length*0.35;
            ctx.globalAlpha=alpha;
            ctx.fillStyle=b.aimed?'#FF6622':'#ffffff';
            ctx.beginPath();
            ctx.arc(t.x,t.y,3,0,Math.PI*2);
            ctx.fill();
        }
        ctx.globalAlpha=1;
        /* Glow */
        const gColor=b.aimed?'rgba(255,80,20,0.4)':'rgba(200,200,255,0.35)';
        ctx.shadowColor=b.aimed?'#FF5500':'#aaaaff';
        ctx.shadowBlur=10;
        ctx.fillStyle=b.aimed?'#FF8844':'#ffffff';
        ctx.beginPath();
        ctx.arc(b.x,b.y,6,0,Math.PI*2);
        ctx.fill();
        ctx.shadowBlur=0;
    }
    ctx.globalAlpha=1;

    /* Player (fighter jet pointing up) */
    if(flashVisible){
        const px=player.x, py=player.y;
        ctx.save();
        ctx.translate(px, py);

        /* Engine flame (flicker at tail) */
        const flameLen=10+Math.sin(flamePulse)*4;
        const flameW=5+Math.cos(flamePulse*1.3)*2;
        const grad=ctx.createLinearGradient(0,8,0,8+flameLen+4);
        grad.addColorStop(0,'rgba(0,217,255,.95)');
        grad.addColorStop(0.4,'rgba(255,160,20,.9)');
        grad.addColorStop(1,'rgba(255,80,20,0)');
        ctx.fillStyle=grad;
        ctx.beginPath();
        ctx.moveTo(-flameW/2,8);
        ctx.lineTo(0,8+flameLen+4);
        ctx.lineTo(flameW/2,8);
        ctx.closePath();
        ctx.fill();

        /* Body */
        ctx.shadowColor='#00D9FF';
        ctx.shadowBlur=8;
        ctx.fillStyle='#00D9FF';
        ctx.beginPath();
        /* nose */
        ctx.moveTo(0,-14);
        /* right body */
        ctx.lineTo(5,-4);
        ctx.lineTo(4,8);
        /* right wing */
        ctx.lineTo(14,4);
        ctx.lineTo(10,10);
        /* tail right */
        ctx.lineTo(4,10);
        /* tail left */
        ctx.lineTo(-4,10);
        ctx.lineTo(-10,10);
        /* left wing */
        ctx.lineTo(-14,4);
        ctx.lineTo(-4,8);
        ctx.lineTo(-5,-4);
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur=0;

        /* Cockpit tint */
        ctx.fillStyle='rgba(5,5,40,0.65)';
        ctx.beginPath();
        ctx.ellipse(0,-5,3,5,0,0,Math.PI*2);
        ctx.fill();

        ctx.restore();
    }

    /* HUD: lives */
    const heartSize=16;
    const heartPad=4;
    for(let i=0;i<3;i++){
        ctx.globalAlpha=i<lives?1:0.18;
        ctx.fillStyle='#FF3366';
        ctx.font='bold '+heartSize+'px sans-serif';
        ctx.textBaseline='top';
        ctx.fillText('♥', 12+i*(heartSize+heartPad), 10);
    }
    ctx.globalAlpha=1;

    /* HUD: level badge (LV N when N>1) */
    const s=running?elapsedMs/1000:0;
    const lv=Math.floor(s/30)+1;
    if(lv>1){
        ctx.font='bold 13px Orbitron,sans-serif';
        ctx.fillStyle='rgba(0,217,255,.85)';
        ctx.textAlign='right';
        ctx.textBaseline='top';
        ctx.fillText('LV '+lv, CW-10, 10);
        ctx.textAlign='left';
    }

    /* Pause indicator */
    if(paused){
        ctx.fillStyle='rgba(5,5,24,.72)';
        ctx.fillRect(0,0,CW,CH);
        ctx.font='bold 28px Orbitron,sans-serif';
        ctx.fillStyle='#00D9FF';
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        ctx.fillText('PAUSED',CW/2,CH/2);
        ctx.font='13px Noto Sans KR,sans-serif';
        ctx.fillStyle='rgba(255,255,255,.55)';
        ctx.fillText('Space 또는 화면 탭으로 재개',CW/2,CH/2+36);
        ctx.textAlign='left';
    }
}

/* ---- RAF kick-off for idle star animation ---- */
function idleLoop(now){
    if(running)return;
    lastFrame=now;
    updateStars((now-(idleLoop._last||now))/1000);
    idleLoop._last=now;
    ctx.fillStyle='#050518';
    ctx.fillRect(0,0,CW,CH);
    drawStars();
    requestAnimationFrame(idleLoop);
}

/* Pause on canvas tap when running (pointer events come first; this is fallback) */
canvasWrap.addEventListener('click',()=>{
    if(running&&!pointer.active) paused=!paused;
});

/* ======== Bottom sheet ======== */
const sheet=$('sheet'), sheetBack=$('sheetBack');
function openSheet(){
    sheet.classList.add('on'); sheetBack.classList.add('on');
    loadLeaderboard(currentScope);
}
function closeSheet(){
    sheet.classList.remove('on'); sheetBack.classList.remove('on');
}
$('openLb').addEventListener('click', openSheet);
sheetBack.addEventListener('click', closeSheet);
let sheetDragY=null;
sheet.querySelector('.handle').addEventListener('touchstart',(e)=>{sheetDragY=e.touches[0].clientY},{passive:true});
sheet.querySelector('.handle').addEventListener('touchmove',(e)=>{
    if(sheetDragY==null)return;
    const dy=e.touches[0].clientY-sheetDragY;
    if(dy>50){ closeSheet(); sheetDragY=null; }
},{passive:true});
sheet.querySelector('.handle').addEventListener('touchend',()=>{sheetDragY=null},{passive:true});

/* ======== Leaderboards ======== */
let currentScope='world';
document.querySelectorAll('.lb-tab').forEach(b=>{
    b.addEventListener('click',()=>{
        document.querySelectorAll('.lb-tab').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        currentScope=b.dataset.scope;
        loadLeaderboard(currentScope);
    });
});
async function loadLeaderboard(scope){
    $('lbList').innerHTML='<div class="lb-empty">불러오는 중…</div>';
    try{
        const {data,error}=await getSupabase().rpc('dodge_leaderboard',{p_scope:scope,p_limit:50});
        if(error||!data){ $('lbList').innerHTML='<div class="lb-empty">기록 없음</div>'; return; }
        if(!data.length){ $('lbList').innerHTML='<div class="lb-empty">첫 기록의 주인공이 되세요!</div>'; return; }
        $('lbList').innerHTML=data.map(row=>{
            const isSelf=me&&row.user_id===me.id;
            const rnkCls=row.rnk===1?' gold':row.rnk===2?' silver':row.rnk===3?' bronze':'';
            const av=row.avatar_url
                ?'<div class="lb-av"><img src="'+esc(row.avatar_url)+'" referrerpolicy="no-referrer" alt=""></div>'
                :'<div class="lb-av">'+esc(initials(row.nickname))+'</div>';
            return '<div class="lb-row'+(isSelf?' self':'')+'">'
                 +'<div class="lb-rnk'+rnkCls+'">'+(row.rnk<=3?(['🥇','🥈','🥉'][row.rnk-1]):('#'+row.rnk))+'</div>'
                 +'<div class="lb-who">'+av+'<div class="lb-nick">'+esc(row.nickname||'?')+'</div></div>'
                 +'<div class="lb-score">'+row.best_score+'</div>'
                 +'</div>';
        }).join('');
    }catch(_){$('lbList').innerHTML='<div class="lb-empty">불러오기 실패</div>';}
}

/* ======== Boot ======== */
$('ovBtn').addEventListener('click', (e)=>{ e.stopPropagation(); startGame(); });
(async()=>{
    await initAuth();
    if(me){
        fitCanvas();
        initStars();
        requestAnimationFrame(idleLoop);
        if(matchMedia('(min-width:1024px)').matches) loadLeaderboard('world');
    }
})();
