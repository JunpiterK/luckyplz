    <style>
/* ================================================================
   Mobile portrait — PRIMARY design target.
   Tablet landscape + desktop are progressive enhancements via
   min-width media queries at the bottom. DO NOT reverse the order.
   See memory/mobile_first_games.md for the rationale.
   ================================================================ */
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --dark:#0A0A1A;--accent:#FFE66D;--danger:#FF3366;
    --success:#00E676;--cyan:#00D9FF;
    --muted:rgba(255,255,255,.55);--muted-2:rgba(255,255,255,.35);
    --panel-br:rgba(255,255,255,.07);
    --sb-bottom: env(safe-area-inset-bottom, 0px);
}
html,body{height:100%;overscroll-behavior:none}
body{
    font-family:'Noto Sans KR',sans-serif;background:var(--dark);color:#fff;
    min-height:100dvh;overflow-x:hidden;letter-spacing:.01em;
    background-image:radial-gradient(ellipse at 50% 20%,rgba(0,230,118,.04) 0%,transparent 55%),linear-gradient(180deg,#0A0A1A 0%,#10101F 50%,#0A0A1A 100%);
    -webkit-tap-highlight-color:transparent;
    user-select:none;-webkit-user-select:none
}

/* ---- Topbar ---- */
.topbar{
    display:flex;align-items:center;gap:10px;
    padding:10px 14px;
    position:sticky;top:0;z-index:10;
    background:rgba(10,10,26,.88);backdrop-filter:blur(14px);
    border-bottom:1px solid var(--panel-br)
}
.topbar .home{text-decoration:none;color:rgba(255,255,255,.8);padding:7px 11px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);font-size:.78em;font-weight:700}
.topbar h1{font-family:'Orbitron','Noto Sans KR',sans-serif;font-size:1em;font-weight:900;margin:0;flex:1;text-align:center;background:linear-gradient(135deg,#00E676,#FFE66D,#FF9A3C);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar .slot{min-width:64px;text-align:right}
.topbar .auth-chip{padding:5px 10px;border-radius:999px;background:rgba(255,230,109,.1);border:1px solid rgba(255,230,109,.25);color:#FFE66D;font-size:.72em;font-weight:700;text-decoration:none;white-space:nowrap}
.topbar .lb-btn{padding:6px 10px;border-radius:10px;background:rgba(0,217,255,.08);border:1px solid rgba(0,217,255,.3);color:#00D9FF;font-size:.78em;font-weight:800;cursor:pointer;font-family:inherit}
.topbar .lb-btn:active{background:rgba(0,217,255,.16)}

/* ---- Main column (phone) ---- */
.wrap{
    display:flex;flex-direction:column;align-items:center;gap:10px;
    padding:10px 12px calc(var(--sb-bottom) + 14px);
    max-width:460px;margin:0 auto
}
/* Left column wraps the score / canvas / dpad / hint stack. Previously
   only styled inside @media >=1024 — on mobile it was a default block
   so narrower children (the 92vw canvas) sat left-aligned instead of
   centered under the full-width score strip. */
.left-col{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%}

/* ---- Score strip ---- */
.score-strip{
    display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%
}
.ss{
    background:linear-gradient(165deg,rgba(22,22,42,.55),rgba(12,12,28,.8));
    border:1px solid var(--panel-br);border-radius:14px;
    padding:10px 6px;text-align:center;min-height:58px;
    display:flex;flex-direction:column;align-items:center;justify-content:center
}
.ss .v{font-family:'Orbitron',sans-serif;font-size:1.6em;font-weight:900;line-height:1;color:#fff;font-variant-numeric:tabular-nums}
.ss .v.best{color:#FFE66D}
.ss .l{font-size:.6em;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);margin-top:4px;font-weight:800}

/* ---- Canvas ---- */
.canvas-wrap{
    position:relative;
    background:#05120a;border:2px solid rgba(0,230,118,.22);border-radius:16px;
    box-shadow:0 14px 34px -10px rgba(0,230,118,.18),inset 0 0 40px rgba(0,230,118,.04);
    overflow:hidden;
    aspect-ratio:1/1;
    /* Fills the left-col (≤ 460 − padding ≈ 436 px on phone) so the
       board visually lines up with score strip and dpad. */
    width:100%;max-width:436px;
    touch-action:none
}
#snake-canvas{display:block;width:100%;height:100%}

.overlay{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(5,5,15,.78);backdrop-filter:blur(6px);
    padding:18px;text-align:center;transition:opacity .18s;z-index:2
}
.overlay.hidden{opacity:0;pointer-events:none}
.overlay h2{font-family:'Orbitron',sans-serif;font-size:1.7em;font-weight:900;margin-bottom:4px}
.overlay h2.go{color:#FF6B8B}
.overlay h2.play{background:linear-gradient(135deg,#00E676,#FFE66D);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.overlay p{color:rgba(255,255,255,.72);font-size:.86em;margin-bottom:12px;line-height:1.5;max-width:280px}
.overlay .score-big{font-family:'Orbitron',sans-serif;font-size:2.8em;font-weight:900;color:#00E676;margin:6px 0;line-height:1}
.overlay .pb{font-size:.84em;color:#FFE66D;margin-bottom:12px;font-weight:700;min-height:1.1em}
.overlay .btn{padding:12px 28px;border-radius:14px;border:0;background:linear-gradient(135deg,#00E676,#00C97A);color:#002818;font-family:'Orbitron',sans-serif;font-weight:900;letter-spacing:.08em;font-size:1em;cursor:pointer;box-shadow:0 10px 26px -6px rgba(0,230,118,.5)}
.overlay .btn:active{transform:translateY(1px)}
.overlay .kbd-hint{margin-top:12px;font-size:.72em;color:rgba(255,255,255,.35);letter-spacing:.03em}
.overlay .kbd-hint kbd{padding:2px 6px;border-radius:5px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);font-family:inherit;color:#fff}

/* ---- Thumb-zone D-pad (always visible on touch, fallback on desktop) ---- */
.dpad-wrap{
    width:100%;max-width:440px;
    padding:4px 0 0;
    display:flex;justify-content:center
}
/* 2-row layout: down sits directly beneath up (no pause slot in
   between). Pause is still reachable via Space on desktop. Removing
   the middle button tightens the up/down thumb travel. */
.dpad{
    display:grid;
    grid-template-columns:repeat(3,72px);grid-template-rows:repeat(2,72px);
    gap:8px
}
.dpad button{
    background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.12);
    color:rgba(255,255,255,.85);font-size:1.6em;border-radius:14px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    -webkit-tap-highlight-color:transparent;
    transition:transform .08s,background .12s,border-color .12s,color .12s;
    font-family:inherit;touch-action:none
}
.dpad button:active{background:rgba(0,230,118,.2);border-color:rgba(0,230,118,.55);color:#00E676;transform:scale(.92)}
.dpad .dp-up   {grid-column:2;grid-row:1}
.dpad .dp-left {grid-column:1;grid-row:2}
.dpad .dp-down {grid-column:2;grid-row:2}
.dpad .dp-right{grid-column:3;grid-row:2}

/* Hide D-pad on non-touch devices (keyboard is the better UX) */
@media(hover:hover) and (pointer:fine){
    .dpad-wrap{display:none}
}

.hint{
    font-size:.78em;color:var(--muted);line-height:1.5;
    padding:8px 12px;background:rgba(255,255,255,.02);border-radius:10px;
    border:1px solid rgba(255,255,255,.04);text-align:center;width:100%;max-width:440px
}

/* ---- Bottom sheet (leaderboard) ---- */
.sheet-backdrop{
    position:fixed;inset:0;z-index:50;background:rgba(5,5,15,.6);backdrop-filter:blur(4px);
    opacity:0;pointer-events:none;transition:opacity .22s
}
.sheet-backdrop.on{opacity:1;pointer-events:auto}
.sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:51;
    max-height:78vh;overflow:hidden;
    background:linear-gradient(180deg,rgba(22,22,42,.98),rgba(12,12,28,1));
    border-top-left-radius:22px;border-top-right-radius:22px;
    border-top:1px solid rgba(255,255,255,.08);
    transform:translateY(100%);transition:transform .26s cubic-bezier(.2,.8,.4,1);
    padding-bottom:calc(var(--sb-bottom) + 14px);
    display:flex;flex-direction:column
}
.sheet.on{transform:translateY(0)}
.sheet .handle{width:42px;height:4px;border-radius:2px;background:rgba(255,255,255,.25);margin:10px auto}
.sheet h3{font-family:'Orbitron',sans-serif;font-size:.92em;font-weight:900;text-align:center;letter-spacing:.06em;color:#00E676;padding:2px 0 10px}
.sheet-body{overflow-y:auto;padding:0 14px;flex:1;min-height:0}
.sheet-body::-webkit-scrollbar{width:4px}
.sheet-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

.lb-tabs{
    display:flex;gap:6px;background:rgba(10,10,26,.55);padding:4px;
    border-radius:12px;border:1px solid var(--panel-br);
    margin:0 14px 12px
}
.lb-tab{flex:1;padding:10px 8px;border:0;background:transparent;color:rgba(255,255,255,.55);cursor:pointer;font-family:inherit;font-size:.82em;font-weight:700;letter-spacing:.04em;border-radius:8px}
.lb-tab.active{background:rgba(0,230,118,.14);color:#00E676}
.lb-list{background:rgba(255,255,255,.02);border:1px solid var(--panel-br);border-radius:14px;overflow:hidden;margin-bottom:10px}
.lb-row{display:grid;grid-template-columns:38px 1fr 88px;gap:10px;align-items:center;padding:10px 12px;border-bottom:1px solid var(--panel-br)}
.lb-row:last-child{border-bottom:0}
.lb-row.self{background:rgba(255,230,109,.06);border-left:3px solid #FFE66D;padding-left:9px}
.lb-rnk{font-family:'Orbitron',sans-serif;font-weight:900;font-size:.92em;color:var(--muted-2);text-align:center}
.lb-who{display:flex;align-items:center;gap:8px;min-width:0}
.lb-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#FF6B35,#FF6B8B);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-weight:900;font-size:.74em;color:#fff;flex-shrink:0;overflow:hidden}
.lb-av img{width:100%;height:100%;object-fit:cover}
.lb-nick{font-weight:600;font-size:.9em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-score{font-family:'Orbitron',sans-serif;font-weight:800;font-size:.92em;color:#00E676;text-align:right;font-variant-numeric:tabular-nums}
.lb-empty{padding:28px 14px;text-align:center;color:var(--muted-2);font-size:.86em}

/* ---- Shake on death ---- */
@keyframes shake{
    0%,100%{transform:translate(0,0)}
    20%{transform:translate(-3px,2px)}
    40%{transform:translate(3px,-2px)}
    60%{transform:translate(-2px,-2px)}
    80%{transform:translate(2px,3px)}
}
.canvas-wrap.shake{animation:shake .4s ease}

/* Ad slot (shows after first game over) */
#adSlot{width:100%;max-width:440px;min-height:80px;display:none;margin-top:2px}

/* ================================================================
   Tablet landscape / desktop (>= 1024px):
   Persistent right-side leaderboard, D-pad hidden, canvas bigger.
   ================================================================ */
@media(min-width:1024px){
    .wrap{max-width:none;flex-direction:row;align-items:flex-start;justify-content:center;gap:28px;padding:22px 26px;min-height:calc(100dvh - 60px)}
    .left-col{display:flex;flex-direction:column;gap:12px;align-items:center;flex:0 0 auto}
    .canvas-wrap{width:min(56vw, 500px)}
    .score-strip{max-width:500px;width:500px}
    .hint{max-width:500px;width:500px}
    .right-col{width:360px;flex-shrink:0}
    .right-col .sheet{position:static;transform:none;max-height:none;border-radius:18px;border:1px solid var(--panel-br);background:rgba(14,14,28,.55);padding-bottom:14px}
    .right-col .sheet .handle, .right-col .sheet h3 + *{}
    .right-col .sheet .handle{display:none}
    .right-col .sheet-backdrop, .topbar .lb-btn{display:none}
    .right-col .sheet{transform:none!important;pointer-events:auto}
    .right-col .sheet-body{max-height:70vh}
}

<script>
const $=(id)=>document.getElementById(id);
const esc=(s)=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const initials=(n)=>(n||'?').trim()[0]?.toUpperCase()||'?';

let me=null;

/* ---- Auth gate (login-required game) ---- */
async function initAuth(){
    try{
        const u=await getUser();
        if(!u){ location.replace('/auth/?next='+encodeURIComponent(location.pathname)); return; }
        me=u;
        const prof=await getSupabase().from('profiles').select('nickname').eq('id',u.id).maybeSingle();
        const nick=prof.data?.nickname||'나';
        $('authSlot').innerHTML='<a class="auth-chip" href="/me/">'+esc(nick)+'</a>';
        loadMyStats();
    }catch(e){console.warn('auth init',e)}
}
async function loadMyStats(){
    if(!me)return;
    try{
        const {data,error}=await getSupabase().rpc('snake_my_stats');
        if(error||!data||!data.has_record)return;
        $('bestScore').textContent=data.best_score;
    }catch(_){}
}

/* ======== Game engine ======== */
const GRID=20;
const canvas=$('snake-canvas');
const ctx=canvas.getContext('2d');
const BASE_SIZE=400;
const cell=BASE_SIZE/GRID;

let snake=[], dir={x:1,y:0}, queued=[], food={x:15,y:10};
let score=0, foodsEaten=0, tickMs=130;
let running=false, paused=false, lastTick=0, startedAt=0;

function fitCanvas(){
    const dpr=Math.min(2, window.devicePixelRatio||1);
    const rect=canvas.getBoundingClientRect();
    canvas.width=Math.round(rect.width*dpr);
    canvas.height=Math.round(rect.height*dpr);
    ctx.setTransform(dpr*rect.width/BASE_SIZE,0,0,dpr*rect.height/BASE_SIZE,0,0);
}
window.addEventListener('resize', fitCanvas);

function randomEmptyCell(){
    const occupied=new Set(snake.map(s=>s.x+','+s.y));
    const cands=[];
    for(let y=0;y<GRID;y++)for(let x=0;x<GRID;x++){
        if(!occupied.has(x+','+y))cands.push({x,y});
    }
    return cands.length?cands[Math.floor(Math.random()*cands.length)]:null;
}

function resetGame(){
    snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
    dir={x:1,y:0}; queued=[];
    score=0; foodsEaten=0; tickMs=130;
    food=randomEmptyCell()||{x:15,y:10};
    $('scoreNow').textContent='0';
    $('lenNow').textContent='3';
}

function startGame(){
    resetGame();
    $('overlay').classList.add('hidden');
    running=true; paused=false;
    startedAt=performance.now(); lastTick=startedAt;
    requestAnimationFrame(loop);
}

function gameOver(){
    running=false;
    const duration=Math.round(performance.now()-startedAt);
    const wrap=$('canvasWrap');
    wrap.classList.remove('shake'); void wrap.offsetWidth; wrap.classList.add('shake');
    if(navigator.vibrate)try{navigator.vibrate([30,20,60])}catch(_){}

    $('overlay').innerHTML=
        '<h2 class="go">GAME OVER</h2>'
      +'<div class="score-big">'+score+'</div>'
      +'<p>먹이 '+foodsEaten+'개 · '+(duration/1000).toFixed(1)+'초</p>'
      +'<div class="pb" id="ovPbLine"></div>'
      +'<button class="btn" id="ovBtn">다시하기</button>'
      +'<div class="kbd-hint"><kbd>Enter</kbd> 재시작</div>';
    $('overlay').classList.remove('hidden');
    $('ovBtn').addEventListener('click', startGame);

    (async()=>{
        try{
            const {data,error}=await getSupabase().rpc('record_snake_attempt',{
                p_foods_eaten:foodsEaten, p_duration_ms:duration
            });
            if(!error&&data?.is_personal_best){$('ovPbLine').textContent='🏆 개인 신기록!';}
            else if(error){
                const m=(error.message||'').toLowerCase();
                if(m.includes('rate_limited'))$('ovPbLine').textContent='⏸ 1시간 내 30회 한도 초과';
            }
        }catch(_){}
        loadMyStats();
        loadLeaderboard(currentScope);
    })();

    try{
        const ad=$('adSlot');
        if(ad.style.display==='none' || !ad.style.display){ ad.style.display='block'; (adsbygoogle=window.adsbygoogle||[]).push({}); }
    }catch(_){}
}

function step(){
    while(queued.length){
        const q=queued.shift();
        if((q.x===-dir.x && q.y===-dir.y) || (q.x===dir.x && q.y===dir.y)) continue;
        dir=q; break;
    }
    const head=snake[0];
    const nx=head.x+dir.x, ny=head.y+dir.y;
    if(nx<0||nx>=GRID||ny<0||ny>=GRID){ gameOver(); return; }
    const willEat=(nx===food.x && ny===food.y);
    const body=willEat?snake:snake.slice(0,-1);
    if(body.some(s=>s.x===nx && s.y===ny)){ gameOver(); return; }
    snake.unshift({x:nx,y:ny});
    if(willEat){
        foodsEaten++; score=foodsEaten*10;
        $('scoreNow').textContent=score;
        $('lenNow').textContent=snake.length;
        if(foodsEaten===5) tickMs=115;
        else if(foodsEaten===12) tickMs=100;
        else if(foodsEaten===22) tickMs=90;
        else if(foodsEaten===35) tickMs=82;
        food=randomEmptyCell();
        if(!food){ gameOver(); return; }
        if(navigator.vibrate)try{navigator.vibrate(12)}catch(_){}
    } else snake.pop();
}

function render(){
    ctx.fillStyle='#05120a';
    ctx.fillRect(0,0,BASE_SIZE,BASE_SIZE);
    ctx.strokeStyle='rgba(0,230,118,.06)'; ctx.lineWidth=1;
    for(let i=1;i<GRID;i++){
        ctx.beginPath();
        ctx.moveTo(i*cell,0); ctx.lineTo(i*cell,BASE_SIZE);
        ctx.moveTo(0,i*cell); ctx.lineTo(BASE_SIZE,i*cell);
        ctx.stroke();
    }
    if(food){
        const pulse=1+0.04*Math.sin(performance.now()/220);
        const fx=food.x*cell+cell/2, fy=food.y*cell+cell/2;
        ctx.fillStyle='rgba(255,51,102,.25)';
        ctx.beginPath(); ctx.arc(fx,fy,cell*0.56*pulse,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#FF3366';
        ctx.beginPath(); ctx.arc(fx,fy,cell*0.38*pulse,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#00C97A';
        ctx.fillRect(fx-1,fy-cell*0.46,2,cell*0.14);
    }
    for(let i=snake.length-1;i>=0;i--){
        const s=snake[i];
        const t=1 - i/Math.max(1,snake.length);
        const r=Math.round(0+40*t), g=Math.round(200+30*t), b=Math.round(110+20*t);
        ctx.fillStyle=`rgb(${r},${g},${b})`;
        const pad=1.5;
        roundRect(ctx, s.x*cell+pad, s.y*cell+pad, cell-pad*2, cell-pad*2, i===0?6:4);
        ctx.fill();
    }
    if(snake.length){
        const h=snake[0];
        const cx=h.x*cell+cell/2, cy=h.y*cell+cell/2;
        const ex=dir.x, ey=dir.y;
        const px=-ey, py=ex;
        const off=cell*0.18, ahead=cell*0.18;
        ctx.fillStyle='#fff';
        ctx.beginPath(); ctx.arc(cx+ex*ahead+px*off, cy+ey*ahead+py*off, cell*0.09, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx+ex*ahead-px*off, cy+ey*ahead-py*off, cell*0.09, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle='#001800';
        ctx.beginPath(); ctx.arc(cx+ex*ahead*1.4+px*off, cy+ey*ahead*1.4+py*off, cell*0.045, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx+ex*ahead*1.4-px*off, cy+ey*ahead*1.4-py*off, cell*0.045, 0, Math.PI*2); ctx.fill();
    }
}
function roundRect(ctx,x,y,w,h,r){
    r=Math.min(r,w/2,h/2);
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
}
function loop(now){
    if(!running) return;
    if(!paused){
        while(now-lastTick>=tickMs){
            lastTick+=tickMs; step();
            if(!running){ render(); return; }
        }
    } else lastTick=now;
    render();
    requestAnimationFrame(loop);
}
function queueDir(x,y){
    if(queued.length>=2) queued.length=1;
    queued.push({x,y});
}

/* ======== Input ======== */
function onKey(e){
    const k=e.key;
    if(k==='ArrowUp'||k==='w'||k==='W') queueDir(0,-1);
    else if(k==='ArrowDown'||k==='s'||k==='S') queueDir(0,1);
    else if(k==='ArrowLeft'||k==='a'||k==='A') queueDir(-1,0);
    else if(k==='ArrowRight'||k==='d'||k==='D') queueDir(1,0);
    else if(k===' '){ paused = running ? !paused : paused; e.preventDefault(); }
    else if(k==='Enter'){ if(!running) startGame(); }
    else return;
    if(k.startsWith('Arrow')) e.preventDefault();
}
document.addEventListener('keydown', onKey);

document.querySelectorAll('.dpad button').forEach(b=>{
    const fire=(e)=>{
        e.preventDefault();
        const d=b.dataset.dir;
        if(d==='up') queueDir(0,-1);
        else if(d==='down') queueDir(0,1);
        else if(d==='left') queueDir(-1,0);
        else if(d==='right') queueDir(1,0);
        else if(d==='pause'){ if(running) paused=!paused; }
    };
    b.addEventListener('click', fire);
    /* Fire on touchstart too for lower latency on mobile */
    b.addEventListener('touchstart', fire, {passive:false});
});

let touchStart=null;
const wrap=$('canvasWrap');
wrap.addEventListener('touchstart',(e)=>{
    const t=e.touches[0];
    touchStart={x:t.clientX,y:t.clientY};
},{passive:true});
wrap.addEventListener('touchend',(e)=>{
    if(!touchStart) return;
    const t=e.changedTouches[0];
    const dx=t.clientX-touchStart.x, dy=t.clientY-touchStart.y;
    const ax=Math.abs(dx), ay=Math.abs(dy);
    touchStart=null;
    if(Math.max(ax,ay)<20) return;
    if(ax>ay) queueDir(dx>0?1:-1, 0);
    else      queueDir(0, dy>0?1:-1);
});

/* ======== Bottom sheet (leaderboard) ======== */
const sheet=$('sheet'), sheetBack=$('sheetBack');
function openSheet(){
    sheet.classList.add('on'); sheetBack.classList.add('on');
    loadLeaderboard(currentScope);
}
function closeSheet(){
    sheet.classList.remove('on'); sheetBack.classList.remove('on');
}
$('openLb').addEventListener('click', openSheet);
sheetBack.addEventListener('click', closeSheet);
/* Swipe down on handle/header to close on mobile */
let sheetDragY=null;
sheet.querySelector('.handle').addEventListener('touchstart',(e)=>{sheetDragY=e.touches[0].clientY},{passive:true});
sheet.querySelector('.handle').addEventListener('touchmove',(e)=>{
    if(sheetDragY==null)return;
    const dy=e.touches[0].clientY-sheetDragY;
    if(dy>50){ closeSheet(); sheetDragY=null; }
},{passive:true});
sheet.querySelector('.handle').addEventListener('touchend',()=>{sheetDragY=null},{passive:true});

/* ======== Leaderboards ======== */
let currentScope='world';
document.querySelectorAll('.lb-tab').forEach(b=>{
    b.addEventListener('click', ()=>{
        document.querySelectorAll('.lb-tab').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        currentScope=b.dataset.scope;
        loadLeaderboard(currentScope);
    });
});
async function loadLeaderboard(scope){
    $('lbList').innerHTML='<div class="lb-empty">불러오는 중…</div>';
    try{
        const {data,error}=await getSupabase().rpc('snake_leaderboard',{p_scope:scope,p_limit:50});
        if(error||!data){ $('lbList').innerHTML='<div class="lb-empty">기록 없음</div>'; return; }
        if(!data.length){ $('lbList').innerHTML='<div class="lb-empty">첫 기록의 주인공이 되세요!</div>'; return; }
        $('lbList').innerHTML=data.map(row=>{
            const isSelf=me && row.user_id===me.id;
            const rnkCls=row.rnk===1?' gold':row.rnk===2?' silver':row.rnk===3?' bronze':'';
            const av=row.avatar_url
                ? '<div class="lb-av"><img src="'+esc(row.avatar_url)+'" referrerpolicy="no-referrer" alt=""></div>'
                : '<div class="lb-av">'+esc(initials(row.nickname))+'</div>';
            return '<div class="lb-row'+(isSelf?' self':'')+'">'
                 +'<div class="lb-rnk'+rnkCls+'">'+(row.rnk<=3?(['🥇','🥈','🥉'][row.rnk-1]):('#'+row.rnk))+'</div>'
                 +'<div class="lb-who">'+av+'<div class="lb-nick">'+esc(row.nickname||'?')+'</div></div>'
                 +'<div class="lb-score">'+row.best_score+'</div>'
                 +'</div>';
        }).join('');
    }catch(_){$('lbList').innerHTML='<div class="lb-empty">불러오기 실패</div>';}
}

/* ======== Boot ======== */
$('ovBtn').addEventListener('click', startGame);
(async()=>{
    await initAuth();
    if(me){
        fitCanvas(); render();
        /* On desktop (>=1024px) the leaderboard is always visible in the
           right column — load immediately. On mobile it loads on sheet open. */
        if(matchMedia('(min-width:1024px)').matches) loadLeaderboard('world');
    }
})();

if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(r=>r.forEach(s=>s.unregister())).catch(()=>{})}
if('caches' in window){caches.keys().then(k=>k.forEach(n=>caches.delete(n))).catch(()=>{})}
