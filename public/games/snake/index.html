    <style>
/* ================================================================
   Mobile portrait — PRIMARY design target.
   Tablet landscape + desktop are progressive enhancements via
   min-width media queries at the bottom. DO NOT reverse the order.
   See memory/mobile_first_games.md for the rationale.
   ================================================================ */
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --dark:#0A0A1A;--accent:#FFE66D;--danger:#FF3366;
    --success:#00E676;--cyan:#00D9FF;
    --muted:rgba(255,255,255,.55);--muted-2:rgba(255,255,255,.35);
    --panel-br:rgba(255,255,255,.07);
    --sb-bottom: env(safe-area-inset-bottom, 0px);
}
html,body{height:100%;overscroll-behavior:none}
body{
    font-family:'Noto Sans KR',sans-serif;background:var(--dark);color:#fff;
    min-height:100dvh;overflow-x:hidden;letter-spacing:.01em;
    background-image:radial-gradient(ellipse at 50% 20%,rgba(0,230,118,.04) 0%,transparent 55%),linear-gradient(180deg,#0A0A1A 0%,#10101F 50%,#0A0A1A 100%);
    -webkit-tap-highlight-color:transparent;
    user-select:none;-webkit-user-select:none
}

/* ---- Topbar ---- */
.topbar{
    display:flex;align-items:center;gap:10px;
    padding:10px 14px;
    position:sticky;top:0;z-index:10;
    background:rgba(10,10,26,.88);backdrop-filter:blur(14px);
    border-bottom:1px solid var(--panel-br)
}
.topbar .home{text-decoration:none;color:rgba(255,255,255,.8);padding:7px 11px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);font-size:.78em;font-weight:700}
.topbar h1{font-family:'Orbitron','Noto Sans KR',sans-serif;font-size:1em;font-weight:900;margin:0;flex:1;text-align:center;background:linear-gradient(135deg,#00E676,#FFE66D,#FF9A3C);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar .slot{min-width:64px;text-align:right}
.topbar .auth-chip{padding:5px 10px;border-radius:999px;background:rgba(255,230,109,.1);border:1px solid rgba(255,230,109,.25);color:#FFE66D;font-size:.72em;font-weight:700;text-decoration:none;white-space:nowrap}
.topbar .lb-btn{padding:6px 10px;border-radius:10px;background:rgba(0,217,255,.08);border:1px solid rgba(0,217,255,.3);color:#00D9FF;font-size:.78em;font-weight:800;cursor:pointer;font-family:inherit}
.topbar .lb-btn:active{background:rgba(0,217,255,.16)}

/* ---- Main column (phone) ---- */
.wrap{
    display:flex;flex-direction:column;align-items:center;gap:10px;
    padding:10px 12px calc(var(--sb-bottom) + 14px);
    max-width:460px;margin:0 auto
}
/* Left column wraps the score / canvas / dpad / hint stack. Previously
   only styled inside @media >=1024 — on mobile it was a default block
   so narrower children (the 92vw canvas) sat left-aligned instead of
   centered under the full-width score strip. */
.left-col{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%}

/* ---- Score strip ---- */
.score-strip{
    display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%
}
.ss{
    background:linear-gradient(165deg,rgba(22,22,42,.55),rgba(12,12,28,.8));
    border:1px solid var(--panel-br);border-radius:14px;
    padding:10px 6px;text-align:center;min-height:58px;
    display:flex;flex-direction:column;align-items:center;justify-content:center
}
.ss .v{font-family:'Orbitron',sans-serif;font-size:1.6em;font-weight:900;line-height:1;color:#fff;font-variant-numeric:tabular-nums}
.ss .v.best{color:#FFE66D}
.ss .l{font-size:.6em;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);margin-top:4px;font-weight:800}

/* ---- Game control bar (visible during play across all viewports) ----
   Ensures mobile/tablet players have a tap target for pause; PC users
   keep Space + this button. Hidden until startGame() activates it. */
.game-ctrl{display:none;align-items:center;justify-content:center;width:100%;max-width:436px;gap:10px;margin:-2px 0 0}
.game-ctrl.on{display:flex}
.ctrl-btn{padding:8px 20px;border-radius:999px;background:rgba(0,217,255,.1);border:1px solid rgba(0,217,255,.42);color:#00D9FF;font-size:.85em;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:.04em;display:inline-flex;align-items:center;gap:6px;line-height:1}
.ctrl-btn:active{background:rgba(0,217,255,.22);transform:translateY(1px)}

/* ---- Canvas ---- */
.canvas-wrap{
    position:relative;
    background:#05120a;border:2px solid rgba(0,230,118,.22);border-radius:16px;
    box-shadow:0 14px 34px -10px rgba(0,230,118,.18),inset 0 0 40px rgba(0,230,118,.04);
    overflow:hidden;
    aspect-ratio:1/1;
    /* Fills the left-col (≤ 460 − padding ≈ 436 px on phone) so the
       board visually lines up with score strip and dpad. */
    width:100%;max-width:436px;
    touch-action:none
}
#snake-canvas{display:block;width:100%;height:100%}

.overlay{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(5,5,15,.78);backdrop-filter:blur(6px);
    padding:18px;text-align:center;transition:opacity .18s;z-index:2
}
.overlay.hidden{opacity:0;pointer-events:none}
.overlay h2{font-family:'Orbitron',sans-serif;font-size:1.7em;font-weight:900;margin-bottom:4px}
.overlay h2.go{color:#FF6B8B}
.overlay h2.play{background:linear-gradient(135deg,#00E676,#FFE66D);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.overlay p{color:rgba(255,255,255,.72);font-size:.86em;margin-bottom:12px;line-height:1.5;max-width:280px}
.overlay .score-big{font-family:'Orbitron',sans-serif;font-size:2.8em;font-weight:900;color:#00E676;margin:6px 0;line-height:1}
.overlay .pb{font-size:.84em;color:#FFE66D;margin-bottom:12px;font-weight:700;min-height:1.1em}
/* World ranking card — cyan-bordered panel sitting right above the
   "다시하기" button so the player's global standing reads as the
   primary post-game feedback, not a footnote. Width fills overlay
   (capped 320px on desktop) for visual prominence. */
.overlay .rank-card{width:100%;max-width:320px;background:linear-gradient(165deg,rgba(0,217,255,.12),rgba(0,217,255,.03));border:1px solid rgba(0,217,255,.42);border-radius:16px;padding:18px 20px;margin:8px 0 16px;display:flex;flex-direction:column;align-items:center;gap:8px;box-shadow:0 8px 24px -8px rgba(0,217,255,.4)}
.overlay .rank-card-rank{font-family:'Orbitron',sans-serif;font-size:1.5em;font-weight:900;color:#00D9FF;line-height:1.1;letter-spacing:.02em;text-align:center}
.overlay .rank-card-pct{font-size:1em;font-weight:700;color:rgba(255,255,255,.95);letter-spacing:.02em;text-align:center;min-height:1em}
.overlay .rank-card-pb{font-size:.88em;font-weight:700;color:#FFE66D;min-height:1em;margin:0;text-align:center}
.overlay .rank-card-link{margin-top:4px;padding:8px 18px;font-size:.85em;font-weight:800;color:#00D9FF;background:transparent;border:1px solid rgba(0,217,255,.5);border-radius:999px;cursor:pointer;font-family:inherit;letter-spacing:.04em}
.overlay .rank-card-link:active{transform:translateY(1px);background:rgba(0,217,255,.12)}
/* On-screen debug line for surfacing RPC error messages without a
   detour through DevTools. Shown only when a RPC actually fails — kept
   small + monospace so an `does not exist` / `permission denied` line
   is recognisable at a glance. */
.overlay .rank-card-debug{font-size:.68em;color:rgba(255,107,107,.92);font-family:'Courier New',monospace;letter-spacing:0;margin-top:0;min-height:0;text-align:center;word-break:break-word;max-width:100%;line-height:1.3}
.overlay .btn{padding:12px 28px;border-radius:14px;border:0;background:linear-gradient(135deg,#00E676,#00C97A);color:#002818;font-family:'Orbitron',sans-serif;font-weight:900;letter-spacing:.08em;font-size:1em;cursor:pointer;box-shadow:0 10px 26px -6px rgba(0,230,118,.5)}
.overlay .btn:active{transform:translateY(1px)}
.overlay .kbd-hint{margin-top:12px;font-size:.72em;color:rgba(255,255,255,.35);letter-spacing:.03em}
.overlay .kbd-hint kbd{padding:2px 6px;border-radius:5px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);font-family:inherit;color:#fff}

/* ---- 3-2-1 countdown overlay ----
   Sits on top of the canvas after the user presses Start (or restart),
   gives the player ~2.4s to put their fingers on the d-pad / hand on
   the keyboard before the snake actually starts moving. Without this,
   on phones especially, the snake immediately hits the right wall while
   the user is still reaching for the controls. The number animates in
   (scale up + opacity fade) so it's recognisable at a glance even
   peripherally. Same overlay element gets re-used for "GO!" with the
   accent gradient, signalling "now move". */
.countdown{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(5,5,15,.55);backdrop-filter:blur(4px);
    z-index:3;pointer-events:none;
    font-family:'Orbitron',sans-serif;font-weight:900;
    font-size:clamp(72px,18vw,140px);line-height:1;letter-spacing:.04em;
    color:#fff;text-shadow:0 0 32px rgba(0,230,118,.65),0 0 64px rgba(0,230,118,.35)
}
.countdown.hidden{display:none}
.countdown.go{
    background:linear-gradient(135deg,#00E676,#FFE66D);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    text-shadow:none;
    /* go variant gets a tinted backdrop instead of inheriting the count
       backdrop so the gradient text reads cleanly. */
}
.countdown.go::before{
    content:"";position:absolute;inset:0;background:rgba(5,5,15,.55);
    backdrop-filter:blur(4px);z-index:-1
}
@keyframes countPop{
    0%  {transform:scale(1.7);opacity:0}
    20% {transform:scale(1);  opacity:1}
    80% {transform:scale(1);  opacity:1}
    100%{transform:scale(.7); opacity:0}
}
.countdown.tick{animation:countPop .7s ease-out forwards}
.countdown.go-anim{animation:countPop .55s ease-out forwards}

/* ---- Thumb-zone D-pad (always visible on touch, fallback on desktop) ---- */
.dpad-wrap{
    width:100%;max-width:440px;
    padding:4px 0 0;
    display:flex;justify-content:center
}
/* 2-row layout: down sits directly beneath up (no pause slot in
   between). Pause is still reachable via Space on desktop. Removing
   the middle button tightens the up/down thumb travel. */
.dpad{
    display:grid;
    grid-template-columns:repeat(3,72px);grid-template-rows:repeat(2,72px);
    gap:8px
}
.dpad button{
    background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.12);
    color:rgba(255,255,255,.85);font-size:1.6em;border-radius:14px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    -webkit-tap-highlight-color:transparent;
    transition:transform .08s,background .12s,border-color .12s,color .12s;
    font-family:inherit;touch-action:none
}
.dpad button:active{background:rgba(0,230,118,.2);border-color:rgba(0,230,118,.55);color:#00E676;transform:scale(.92)}
.dpad .dp-up   {grid-column:2;grid-row:1}
.dpad .dp-left {grid-column:1;grid-row:2}
.dpad .dp-down {grid-column:2;grid-row:2}
.dpad .dp-right{grid-column:3;grid-row:2}

/* Hide D-pad on non-touch devices (keyboard is the better UX) */
@media(hover:hover) and (pointer:fine){
    .dpad-wrap{display:none}
}

.hint{
    font-size:.78em;color:var(--muted);line-height:1.5;
    padding:8px 12px;background:rgba(255,255,255,.02);border-radius:10px;
    border:1px solid rgba(255,255,255,.04);text-align:center;width:100%;max-width:440px
}

/* ---- Bottom sheet (leaderboard) ---- */
.sheet-backdrop{
    position:fixed;inset:0;z-index:50;background:rgba(5,5,15,.6);backdrop-filter:blur(4px);
    opacity:0;pointer-events:none;transition:opacity .22s
}
.sheet-backdrop.on{opacity:1;pointer-events:auto}
.sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:51;
    max-height:78vh;overflow:hidden;
    background:linear-gradient(180deg,rgba(22,22,42,.98),rgba(12,12,28,1));
    border-top-left-radius:22px;border-top-right-radius:22px;
    border-top:1px solid rgba(255,255,255,.08);
    transform:translateY(100%);transition:transform .26s cubic-bezier(.2,.8,.4,1);
    padding-bottom:calc(var(--sb-bottom) + 14px);
    display:flex;flex-direction:column
}
.sheet.on{transform:translateY(0)}
.sheet .handle{width:42px;height:4px;border-radius:2px;background:rgba(255,255,255,.25);margin:10px auto}
.sheet h3{font-family:'Orbitron',sans-serif;font-size:.92em;font-weight:900;text-align:center;letter-spacing:.06em;color:#00E676;padding:2px 0 10px}
.sheet-body{overflow-y:auto;padding:0 14px;flex:1;min-height:0}
.sheet-body::-webkit-scrollbar{width:4px}
.sheet-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

.lb-tabs{
    display:flex;gap:6px;background:rgba(10,10,26,.55);padding:4px;
    border-radius:12px;border:1px solid var(--panel-br);
    margin:0 14px 12px
}
.lb-tab{flex:1;padding:10px 8px;border:0;background:transparent;color:rgba(255,255,255,.55);cursor:pointer;font-family:inherit;font-size:.82em;font-weight:700;letter-spacing:.04em;border-radius:8px}
.lb-tab.active{background:rgba(0,230,118,.14);color:#00E676}
.lb-list{background:rgba(255,255,255,.02);border:1px solid var(--panel-br);border-radius:14px;overflow:hidden;margin-bottom:10px}
.lb-row{display:grid;grid-template-columns:38px 1fr 88px;gap:10px;align-items:center;padding:10px 12px;border-bottom:1px solid var(--panel-br)}
.lb-row:last-child{border-bottom:0}
.lb-row.self{background:rgba(255,230,109,.06);border-left:3px solid #FFE66D;padding-left:9px}
.lb-rnk{font-family:'Orbitron',sans-serif;font-weight:900;font-size:.92em;color:var(--muted-2);text-align:center}
.lb-who{display:flex;align-items:center;gap:8px;min-width:0}
.lb-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#FF6B35,#FF6B8B);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-weight:900;font-size:.74em;color:#fff;flex-shrink:0;overflow:hidden}
.lb-av img{width:100%;height:100%;object-fit:cover}
.lb-nick{font-weight:600;font-size:.9em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-score{font-family:'Orbitron',sans-serif;font-weight:800;font-size:.92em;color:#00E676;text-align:right;font-variant-numeric:tabular-nums}
.lb-empty{padding:28px 14px;text-align:center;color:var(--muted-2);font-size:.86em}

/* ---- Shake on death ---- */
@keyframes shake{
    0%,100%{transform:translate(0,0)}
    20%{transform:translate(-3px,2px)}
    40%{transform:translate(3px,-2px)}
    60%{transform:translate(-2px,-2px)}
    80%{transform:translate(2px,3px)}
}
.canvas-wrap.shake{animation:shake .4s ease}

/* Ad slot (shows after first game over) */
/* Ad slot — bottom of the stack on mobile/tablet via flex order, full
   left column on desktop (1280+). Hidden until the ad library populates
   it (existing js sets display:block once an impression returns). */
#adSlot.ad-col{width:100%;max-width:440px;min-height:80px;display:none;margin-top:2px;align-self:center;order:99}

/* ================================================================
   Tablet portrait / large phone landscape (768–1023px):
   Keep the single-column flow but stretch the canvas + score strip
   so a 768/820 px iPad doesn't show a phone-sized board floating in
   empty space. max-height caps the canvas at 70vh so a short
   landscape window doesn't push controls off-screen.
   ================================================================ */
@media(min-width:768px) and (max-width:1023px){
    .canvas-wrap{max-width:560px;max-height:70vh}
    .score-strip{max-width:560px}
    .game-ctrl{max-width:560px}
    .dpad-wrap{max-width:560px}
    .hint{max-width:560px}
}
/* ================================================================
   Tablet landscape / desktop (>= 1024px):
   Persistent right-side leaderboard, D-pad hidden, canvas bigger.
   ================================================================ */
@media(min-width:1024px){
    /* PC: viewport split into exact thirds.
       Left third = AdSense, centre third = game, right third = leaderboard.
       Each region centres its content via justify-self:center so the row
       reads as three balanced panels regardless of monitor width. */
    .wrap{max-width:none;margin:0;display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;align-items:start;padding:22px 24px;min-height:calc(100dvh - 60px)}
    .left-col{grid-column:2;display:flex;flex-direction:column;gap:12px;align-items:center;width:100%;max-width:560px;justify-self:center}
    /* canvas fills the centre column (capped by max-width on left-col)
       so it stays inside its third. aspect-ratio keeps the shape. */
    .canvas-wrap{width:100%;max-width:none;max-height:80vh}
    .score-strip{width:100%}
    .game-ctrl{width:100%}
    .hint{width:100%}
    #adSlot.ad-col{grid-column:1;display:block;width:100%;max-width:380px;justify-self:center;min-height:600px;margin:0;align-self:start;background:rgba(255,255,255,.02);border:1px dashed rgba(255,255,255,.06);border-radius:14px}
    .right-col{grid-column:3;width:100%;max-width:400px;justify-self:center}
    .right-col .sheet{position:static;transform:none;max-height:none;border-radius:18px;border:1px solid var(--panel-br);background:rgba(14,14,28,.55);padding-bottom:14px;width:100%}
    .right-col .sheet .handle, .right-col .sheet h3 + *{}
    .right-col .sheet .handle{display:none}
    .right-col .sheet-backdrop, .topbar .lb-btn{display:none}
    .right-col .sheet{transform:none!important;pointer-events:auto}
    .right-col .sheet-body{max-height:70vh}
}
    </style>

<body>

<header class="topbar">
    <a href="/" class="home" id="homeLink">← 홈</a>
    <h1>🐍 스네이크</h1>
    <div class="slot">
        <button class="lb-btn" id="openLb" aria-label="Ranking">🏆</button>
        <span id="authSlot"></span>
    </div>
</header>

<main class="wrap">

    <div class="left-col">

        <div class="score-strip">
            <div class="ss"><div class="v" id="scoreNow">0</div><div class="l">SCORE</div></div>
            <div class="ss"><div class="v" id="lenNow">3</div><div class="l">LENGTH</div></div>
            <div class="ss"><div class="v best" id="bestScore">—</div><div class="l">BEST</div></div>
        </div>

        <div class="game-ctrl" id="gameCtrl">
            <button class="ctrl-btn" id="pauseBtn" type="button" aria-label="일시정지/재개">⏸ 일시정지</button>
        </div>

        <div class="canvas-wrap" id="canvasWrap">
            <canvas id="snake-canvas" width="400" height="400"></canvas>
            <div class="overlay" id="overlay">
                <h2 class="play" id="ovTitle">PLAY SNAKE</h2>
                <p id="ovDesc">스와이프 · 화살표 · WASD로 조작.<br>먹이를 먹으면 길어지고 속도가 빨라져요.</p>
                <button class="btn" id="ovBtn">시작</button>
                <div class="kbd-hint"><kbd>↑↓←→</kbd> · <kbd>Space</kbd> 일시정지</div>
            </div>
            <!-- 3-2-1 countdown shown after the user presses Start, before
                 the snake actually starts moving. Same element re-used for
                 each tick (text content swapped + animation re-played). -->
            <div class="countdown hidden" id="countdown" aria-hidden="true"></div>
        </div>

        <div class="dpad-wrap">
            <div class="dpad">
                <button class="dp-up"    data-dir="up" aria-label="위">▲</button>
                <button class="dp-left"  data-dir="left" aria-label="왼쪽">◀</button>
                <button class="dp-down"  data-dir="down" aria-label="아래">▼</button>
                <button class="dp-right" data-dir="right" aria-label="오른쪽">▶</button>
            </div>

<script>
const $=(id)=>document.getElementById(id);
const esc=(s)=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const initials=(n)=>(n||'?').trim()[0]?.toUpperCase()||'?';

if(window.LpI18n){
    window.LpI18n.onChange(applyLanguage);
}
if(document.readyState !== 'loading') applyLanguage();
else document.addEventListener('DOMContentLoaded', applyLanguage);

let me=null;

/* ---- Auth init (anon-friendly) ----
   Anon users CAN play and view leaderboards but cannot save records.
   When not logged in we show a login chip instead of a profile chip,
   skip the profile/stats fetch, and let the game-over flow surface a
   "🔒 로그인하면 기록 저장!" hint while still loading world rankings. */
async function initAuth(){
    try{
        const u=await getUser();
        if(!u){
            me=null;
            $('authSlot').innerHTML='<a class="auth-chip" href="/auth/?next='+encodeURIComponent(location.pathname)+'">로그인</a>';
            return;
        }
        me=u;
        const prof=await getSupabase().from('profiles').select('nickname,avatar_url').eq('id',u.id).maybeSingle();
        const nick=prof.data?.nickname||tT('you');
        $('authSlot').innerHTML='<a class="auth-chip" href="/me/">'+esc(nick)+'</a>';
        try {
            window._lpMe = u;
            window._lpMyNickname = nick;
            window._lpMyAvatar = prof.data?.avatar_url || null;
        } catch(_){}
        loadMyStats();
    }catch(e){console.warn('auth init',e)}
}
/* 통합 랭크 윈도우 호출 — Snake 옵션. */
function openSnakeRankSheet(){
    if(!window.LpRankSheet) return;
    LpRankSheet.open({
        gameKey:           'snake',
        gameTitle:         'SNAKE',
        leaderboardRpc:    'snake_leaderboard',
        myStatsRpc:        'snake_my_stats',
        scoreField:        'best_score',
        myStatsRankField:  'world_rank',
        myStatsScoreField: 'best_score',
        formatScore:       n => Number(n).toLocaleString()
    });
}
async function loadMyStats(){
    if(!me)return;
    try{
        const {data,error}=await getSupabase().rpc('snake_my_stats');
        if(error||!data||!data.has_record)return;
        $('bestScore').textContent=data.best_score;
    }catch(_){}
}

/* ======== Game engine ======== */
const GRID=20;
const canvas=$('snake-canvas');
const ctx=canvas.getContext('2d');
const BASE_SIZE=400;
const cell=BASE_SIZE/GRID;

let snake=[], dir={x:1,y:0}, queued=[], food={x:15,y:10};
let score=0, foodsEaten=0, tickMs=130;
let running=false, paused=false, lastTick=0, startedAt=0;
/* True while the 3-2-1-GO countdown is animating. Blocks the game
   loop, pause toggles, and re-entry of startGame() so a rapid double-
   tap on the Start button can't stack two countdowns on top of each
   other. Cleared the moment the actual game loop starts. */
let countdownActive=false;
let countdownTimers=[];   /* setTimeout handles to cancel on early abort */

/* ---- Pause UI sync (mobile/tablet/PC parity) ---- */
function syncPauseUI(){
    const gc=$('gameCtrl'), btn=$('pauseBtn');
    if(!gc||!btn) return;
    if(running){
        gc.classList.add('on');
        btn.textContent = paused ? '▶ 재개' : '⏸ 일시정지';
        btn.setAttribute('aria-label', paused ? '재개' : '일시정지');
    } else {
        gc.classList.remove('on');
    }
}

function fitCanvas(){
    const dpr=Math.min(2, window.devicePixelRatio||1);
    const rect=canvas.getBoundingClientRect();
    canvas.width=Math.round(rect.width*dpr);
    canvas.height=Math.round(rect.height*dpr);
    ctx.setTransform(dpr*rect.width/BASE_SIZE,0,0,dpr*rect.height/BASE_SIZE,0,0);
}
window.addEventListener('resize', fitCanvas);

function randomEmptyCell(){
    const occupied=new Set(snake.map(s=>s.x+','+s.y));
    const cands=[];
    for(let y=0;y<GRID;y++)for(let x=0;x<GRID;x++){
        if(!occupied.has(x+','+y))cands.push({x,y});
    }
    return cands.length?cands[Math.floor(Math.random()*cands.length)]:null;
}

/* ========== Sound (LPAudio) — sfxr-style 8-bit synthesis ==========
   eat = "pickup/coin" two-tone ascending square (NES classic).
   levelup = bright 4-note arpeggio + noise sparkle (speed step).
   crash = noise burst + low saw downsweep + dissonant chord stab.
   over = descending mournful 4-note dirge.
   start = ascending fanfare. */
function sfxEat(){
    /* Coin pickup: short low click → high ping. */
    LPAudio.beep({freq:660, dur:0.05, vol:0.16, type:'square', decay:0.4});
    setTimeout(()=>LPAudio.beep({freq:990, dur:0.09, vol:0.18, type:'square', decay:0.5}), 45);
}
function sfxLevelUp(){
    LPAudio.seq([
        {f:523,d:0.07},{f:659,d:0.07},{f:784,d:0.07},{f:1047,d:0.18}
    ], {vol:0.2, type:'square'});
    setTimeout(()=>LPAudio.noise({dur:0.18, vol:0.06}), 280);
}
function sfxCrash(){
    /* impact: white noise burst + low rumble + brief dissonant 2-note. */
    LPAudio.noise({dur:0.22, vol:0.22});
    LPAudio.beep({freq:240, dur:0.32, vol:0.22, type:'sawtooth', slide:50, decay:0.85});
    LPAudio.chord([196, 233], {dur:0.18, vol:0.1, type:'square', decay:0.6});
}
function sfxStart(){
    LPAudio.seq([
        {f:392,d:0.07},{f:523,d:0.07},{f:659,d:0.07},{f:784,d:0.18}
    ], {vol:0.18, type:'triangle'});
}
function sfxOver(){
    LPAudio.seq([
        {f:440,d:0.12},{f:349,d:0.12},{f:262,d:0.14},{f:175,d:0.28}
    ], {vol:0.22, type:'sawtooth'});
    setTimeout(()=>LPAudio.beep({freq:90, dur:0.4, vol:0.14, type:'triangle', decay:0.85}), 60);
}

function resetGame(){
    snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
    dir={x:1,y:0}; queued=[];
    score=0; foodsEaten=0; tickMs=130;
    food=randomEmptyCell()||{x:15,y:10};
    $('scoreNow').textContent='0';
    $('lenNow').textContent='3';
}

/* Pre-game countdown — reset the board immediately (so the player sees
   their snake's starting position behind the count), display 3 → 2 → 1
   → GO over ~2.4s, THEN flip running=true and kick off the game loop.
   Same flow for first start AND restart (overlay's "다시하기" button).
   On phones especially, the snake immediately hits the right wall before
   the user can put their thumb on the d-pad — the countdown gives them
   a beat to settle in. Same UX every device for parity. */
function _clearCountdownTimers(){
    countdownTimers.forEach(function(t){clearTimeout(t)});
    countdownTimers=[];
}
function _showCountStep(text,isGo){
    const el=$('countdown');
    if(!el)return;
    /* Wipe + re-trigger the animation. Browsers debounce identical
       animation re-applications, so we have to remove the class, force
       a layout flush, and add it back. */
    el.classList.remove('tick','go-anim','go','hidden');
    el.textContent=text;
    void el.offsetWidth; /* reflow */
    if(isGo){
        el.classList.add('go','go-anim');
    }else{
        el.classList.add('tick');
    }
}
function _hideCountdown(){
    const el=$('countdown');
    if(el){el.classList.add('hidden');el.classList.remove('tick','go-anim','go')}
}

function startGame(){
    /* Block re-entry while a previous countdown is still animating —
       a quick double-tap on the start button used to stack two count-
       downs and then the game ran for both, which manifested as the
       snake stuttering at start. */
    if(countdownActive)return;
    _clearCountdownTimers();
    resetGame();
    $('overlay').classList.add('hidden');
    /* Render once so the user sees the snake's starting position
       behind the countdown overlay. Without this initial paint, the
       canvas is blank during the count and the user can't tell which
       direction they're facing. */
    if(typeof draw==='function')draw();
    sfxStart();
    countdownActive=true;
    /* Show "3" immediately, then 2/1/GO at 700ms intervals. Animation
       duration matches each step so the previous number fully fades
       before the next pops in. */
    _showCountStep('3',false);
    countdownTimers.push(setTimeout(function(){_showCountStep('2',false)},700));
    countdownTimers.push(setTimeout(function(){_showCountStep('1',false)},1400));
    countdownTimers.push(setTimeout(function(){_showCountStep('GO!',true)},2100));
    countdownTimers.push(setTimeout(function(){
        _hideCountdown();
        countdownActive=false;
        running=true; paused=false;
        /* Reset timing AT GAME START not at countdown start — the player's
           recorded duration / leaderboard time should be the actual play
           time, not 2.4s padded. */
        startedAt=performance.now(); lastTick=startedAt;
        syncPauseUI();
        requestAnimationFrame(loop);
    },2700));
}

function gameOver(){
    running=false;
    syncPauseUI();
    sfxOver();
    const duration=Math.round(performance.now()-startedAt);
    const wrap=$('canvasWrap');
    wrap.classList.remove('shake'); void wrap.offsetWidth; wrap.classList.add('shake');
    if(navigator.vibrate)try{navigator.vibrate([30,20,60])}catch(_){}

    $('overlay').innerHTML=
        '<h2 class="go">GAME OVER</h2>'
      +'<div class="score-big">'+score+'</div>'
      +'<p>먹이 '+foodsEaten+'개 · '+(duration/1000).toFixed(1)+'초</p>'
      +'<div class="rank-card" id="ovRankCard">'
      +  '<div class="rank-card-rank" id="ovRankNum">조회 중…</div>'
      +  '<div class="rank-card-pct" id="ovRankPct"></div>'
      +  '<div class="rank-card-pb" id="ovRankPb"></div>'
      +  '<div class="rank-card-debug" id="ovRankDebug"></div>'
      +  '<button class="rank-card-link" id="ovRankBtn">🏆 랭크</button>'
      +'</div>'
      +'<button class="btn" id="ovBtn">다시하기</button>'
      +'<div class="kbd-hint"><kbd>Enter</kbd> 재시작</div>';
    $('overlay').classList.remove('hidden');
    $('ovBtn').addEventListener('click', startGame);
    /* "랭크" — 통합 풀스크린 랭크 윈도우. 기존 sheet 도 PC 사이드에 그대로 유지. */
    $('ovRankBtn').addEventListener('click', openSnakeRankSheet);

    (async()=>{
        /* Categorize Supabase errors into user-friendly buckets so the
           overlay never surfaces raw PostgREST internals to end users.
           - 'missing_migration': function/table not found in schema cache.
             Means the admin hasn't deployed the latest SQL. Console gets
             a deployment hint pointing at the right migration file.
           - 'rate_limit': server enforced 30 attempts / 1h.
           - 'no_auth': RPC saw auth.uid()=null. Snake gates anon at boot
             so this should be unreachable but kept as a safety branch.
           - 'invalid': server-side validation tripped (bad_pace etc).
           - 'unknown': anything else. */
        /* 'no_login' bucket: synthetic — set directly when we skip the
           record RPC because the user is anonymous. Never returned by
           _classifyErr (anon path doesn't even hit the RPC); listed here
           for completeness. */
        function _classifyErr(err){
            const m=(err&&(err.message||err.error_description)||String(err||'')).toLowerCase();
            if(/(could not find|schema cache|does not exist)/.test(m)
               &&/(function|relation|table)/.test(m)){
                return 'missing_migration';
            }
            if(m.includes('rate_limited'))return 'rate_limit';
            if(m.includes('not_authenticated'))return 'no_auth';
            if(m.includes('impossible_pace')||/^bad_/.test(m)
               ||m.includes('bad_foods_eaten')||m.includes('bad_duration')){
                return 'invalid';
            }
            return 'unknown';
        }
        function _logDeployHint(){
            try{console.warn(
              '[snake] Supabase migration not deployed. Apply in SQL Editor:\n'+
              '  supabase/migrations/2026-04-22-snake-game.sql\n'+
              '  supabase/migrations/2026-04-26-game-rank-info.sql\n'+
              'Or run supabase/redeploy-action-games.sql (one-shot).');
            }catch(_){}
        }

        let pbMsg='', recordOk=false, recordErrKind=null;
        if(!me){
            /* Anon player: skip the record RPC entirely (it would just
               return not_authenticated). Mark a synthetic 'no_login'
               bucket so the dispatch below shows a friendly upsell
               instead of a generic failure. Leaderboard still loads. */
            recordErrKind='no_login';
        }else{
            try{
                const {data,error}=await getSupabase().rpc('record_snake_attempt',{
                    p_foods_eaten:foodsEaten, p_duration_ms:duration
                });
                if(!error){
                    recordOk=true;
                    if(data?.is_personal_best) pbMsg='🏆 개인 신기록!';
                }else{
                    recordErrKind=_classifyErr(error);
                    console.warn('[snake.record_snake_attempt]', error);
                    if(recordErrKind==='missing_migration')_logDeployHint();
                    if(recordErrKind==='rate_limit') pbMsg='⏸ 1시간 내 30회 한도 초과';
                }
            }catch(e){
                recordErrKind=_classifyErr(e);
                console.warn('[snake.record_snake_attempt]', e);
                if(recordErrKind==='missing_migration')_logDeployHint();
            }
        }

        let rankInfo=null, rankErrKind=null;
        if(me){
            try{
                const r=await getSupabase().rpc('snake_rank_info');
                if(r.error){
                    rankErrKind=_classifyErr(r.error);
                    console.warn('[snake.snake_rank_info]', r.error);
                    if(rankErrKind==='missing_migration')_logDeployHint();
                }else if(r.data?.has_record){
                    rankInfo=r.data;
                }
            }catch(e){
                rankErrKind=_classifyErr(e);
                console.warn('[snake.snake_rank_info]', e);
                if(rankErrKind==='missing_migration')_logDeployHint();
            }
        }
        /* Anon: skip personal rank_info (no auth.uid()). World leaderboard
           still loaded below via loadLeaderboard(currentScope). */

        /* Fallback: snake_my_stats already exposes world_rank since the
           original game migration. If snake_rank_info isn't deployed
           (e.g. user hasn't run the latest SQL yet), we still surface
           a real rank from the legacy RPC. total_world_players + percentile
           remain unknown without rank_info — those slots stay empty. */
        if(!rankInfo && rankErrKind && me){
            try{
                const m=await getSupabase().rpc('snake_my_stats');
                if(!m.error){
                    if(m.data?.has_record && m.data.world_rank!=null){
                        rankInfo={
                            has_record:true,
                            world_rank:m.data.world_rank,
                            total_world_players:null,
                            percentile:null,
                            best_score:m.data.best_score,
                            _fallback:true
                        };
                    }
                    /* my_stats RPC succeeded → dismiss the rank_info error
                       even when has_record is false. UI then falls into the
                       recordOk-driven branch below ("🎉 첫 기록" or the
                       record-failure branch) instead of an alarming
                       "랭킹 조회 실패". */
                    rankErrKind=null;
                }
            }catch(_){ }
        }

        if(rankInfo){
            const d=rankInfo;
            const rank=(d.world_rank||0).toLocaleString();
            /* Short headline + long subline so a narrow card never
               clips on the right edge. Subline parts are individually
               omitted when null so the my_stats fallback (no
               percentile/total) still renders cleanly. */
            $('ovRankNum').textContent='🌍 #'+rank;
            const parts=[];
            if(d.percentile!=null) parts.push('상위 '+d.percentile+'%');
            if(d.total_world_players!=null) parts.push(d.total_world_players.toLocaleString()+'명 중');
            $('ovRankPct').textContent=parts.join(' · ');
        }else if(rankErrKind==='missing_migration'||recordErrKind==='missing_migration'){
            /* Admin needs to deploy the migrations. Calmer language for
               end users (most won't be the admin); detail in console. */
            $('ovRankNum').textContent='🛠 랭킹 시스템 점검 중';
            $('ovRankPct').textContent='잠시 후 다시 시도해주세요';
        }else if(rankErrKind||recordErrKind==='unknown'){
            $('ovRankNum').textContent='⚠️ 랭킹 등록 실패';
            $('ovRankPct').textContent='네트워크를 확인하고 다시 시도해주세요';
        }else if(!recordOk && recordErrKind==='invalid'){
            $('ovRankNum').textContent='⚠️ 점수 검증 실패';
            $('ovRankPct').textContent='비정상적으로 빠른 진행 감지';
        }else if(!recordOk && recordErrKind==='no_auth'){
            $('ovRankNum').textContent='🔐 로그인이 필요해요';
            $('ovRankPct').textContent='로그인 후 다시 시도';
        }else if(!recordOk && recordErrKind==='no_login'){
            /* Anon-friendly upsell: not an error — they intentionally
               played without logging in. Encourage signup, but the world
               leaderboard still loads (loadLeaderboard call below). */
            $('ovRankNum').textContent='🔒 로그인하면 기록 저장!';
            $('ovRankPct').textContent='랭킹 등록은 로그인 사용자만 가능';
        }else if(!recordOk){
            $('ovRankNum').textContent='⚠️ 기록 저장 실패';
            $('ovRankPct').textContent='잠시 후 다시 시도해주세요';
        }else{
            $('ovRankNum').textContent='🎉 첫 기록 등록!';
            $('ovRankPct').textContent='월드 랭킹 진입 완료';
        }
        $('ovRankPb').textContent=pbMsg;
        /* Debug slot kept in DOM for inspection but blank for end users.
           Raw error text used to surface here (alarming + non-actionable).
           Devs can read details in console (we console.warn every error
           with a [game.rpc_name] prefix). */
        $('ovRankDebug').textContent='';

        loadMyStats();
        loadLeaderboard(currentScope);
    })();

    try{
        const ad=$('adSlot');
        if(ad.style.display==='none' || !ad.style.display){ ad.style.display='block'; (adsbygoogle=window.adsbygoogle||[]).push({}); }
    }catch(_){}
}

function step(){
    while(queued.length){
        const q=queued.shift();
        if((q.x===-dir.x && q.y===-dir.y) || (q.x===dir.x && q.y===dir.y)) continue;
        dir=q; break;
    }
    const head=snake[0];
    const nx=head.x+dir.x, ny=head.y+dir.y;
    if(nx<0||nx>=GRID||ny<0||ny>=GRID){ sfxCrash(); gameOver(); return; }
    const willEat=(nx===food.x && ny===food.y);
    const body=willEat?snake:snake.slice(0,-1);
    if(body.some(s=>s.x===nx && s.y===ny)){ sfxCrash(); gameOver(); return; }
    snake.unshift({x:nx,y:ny});
    if(willEat){
        foodsEaten++; score=foodsEaten*10;
        sfxEat();
        $('scoreNow').textContent=score;
        $('lenNow').textContent=snake.length;
        if(foodsEaten===5){ tickMs=115; sfxLevelUp(); }
        else if(foodsEaten===12){ tickMs=100; sfxLevelUp(); }
        else if(foodsEaten===22){ tickMs=90; sfxLevelUp(); }
        else if(foodsEaten===35){ tickMs=82; sfxLevelUp(); }
        food=randomEmptyCell();
        if(!food){ gameOver(); return; }
        if(navigator.vibrate)try{navigator.vibrate(12)}catch(_){}
    } else snake.pop();
}

function render(){
    ctx.fillStyle='#05120a';
    ctx.fillRect(0,0,BASE_SIZE,BASE_SIZE);
    ctx.strokeStyle='rgba(0,230,118,.06)'; ctx.lineWidth=1;
    for(let i=1;i<GRID;i++){
        ctx.beginPath();
        ctx.moveTo(i*cell,0); ctx.lineTo(i*cell,BASE_SIZE);
        ctx.moveTo(0,i*cell); ctx.lineTo(BASE_SIZE,i*cell);
        ctx.stroke();
    }
    if(food){
        const pulse=1+0.04*Math.sin(performance.now()/220);
        const fx=food.x*cell+cell/2, fy=food.y*cell+cell/2;
        ctx.fillStyle='rgba(255,51,102,.25)';
        ctx.beginPath(); ctx.arc(fx,fy,cell*0.56*pulse,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#FF3366';
        ctx.beginPath(); ctx.arc(fx,fy,cell*0.38*pulse,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#00C97A';
        ctx.fillRect(fx-1,fy-cell*0.46,2,cell*0.14);
    }
    for(let i=snake.length-1;i>=0;i--){
        const s=snake[i];
        const t=1 - i/Math.max(1,snake.length);
        const r=Math.round(0+40*t), g=Math.round(200+30*t), b=Math.round(110+20*t);
        ctx.fillStyle=`rgb(${r},${g},${b})`;
        const pad=1.5;
        roundRect(ctx, s.x*cell+pad, s.y*cell+pad, cell-pad*2, cell-pad*2, i===0?6:4);
        ctx.fill();
    }
    if(snake.length){
        const h=snake[0];
        const cx=h.x*cell+cell/2, cy=h.y*cell+cell/2;
        const ex=dir.x, ey=dir.y;
        const px=-ey, py=ex;
        const off=cell*0.18, ahead=cell*0.18;
        ctx.fillStyle='#fff';
        ctx.beginPath(); ctx.arc(cx+ex*ahead+px*off, cy+ey*ahead+py*off, cell*0.09, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx+ex*ahead-px*off, cy+ey*ahead-py*off, cell*0.09, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle='#001800';
        ctx.beginPath(); ctx.arc(cx+ex*ahead*1.4+px*off, cy+ey*ahead*1.4+py*off, cell*0.045, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx+ex*ahead*1.4-px*off, cy+ey*ahead*1.4-py*off, cell*0.045, 0, Math.PI*2); ctx.fill();
    }
    /* ---- Pause indicator ---- */
    if(paused && running){
        const W=canvas.width, H=canvas.height;
        ctx.fillStyle='rgba(5,5,15,.72)';
        ctx.fillRect(0,0,W,H);
        ctx.font='bold 28px Orbitron,sans-serif';
        ctx.fillStyle='#00D9FF';
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        ctx.fillText('PAUSED', W/2, H/2);
        ctx.font='13px Noto Sans KR,sans-serif';
        ctx.fillStyle='rgba(255,255,255,.6)';
        ctx.fillText('▶ 재개 버튼 / Space', W/2, H/2+34);
        ctx.textAlign='left';
        ctx.textBaseline='alphabetic';
    }
}
function roundRect(ctx,x,y,w,h,r){
    r=Math.min(r,w/2,h/2);
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
}
function loop(now){
    if(!running) return;
    if(!paused){
        while(now-lastTick>=tickMs){
            lastTick+=tickMs; step();
            if(!running){ render(); return; }
        }
    } else lastTick=now;
    render();
    requestAnimationFrame(loop);
}
function queueDir(x,y){
    if(queued.length>=2) queued.length=1;
    queued.push({x,y});
}

/* ======== Input ======== */
function onKey(e){
    const k=e.key;
    if(k==='ArrowUp'||k==='w'||k==='W') queueDir(0,-1);
    else if(k==='ArrowDown'||k==='s'||k==='S') queueDir(0,1);
    else if(k==='ArrowLeft'||k==='a'||k==='A') queueDir(-1,0);
    else if(k==='ArrowRight'||k==='d'||k==='D') queueDir(1,0);
    else if(k===' '){ paused = running ? !paused : paused; syncPauseUI(); e.preventDefault(); }
    else if(k==='Enter'){ if(!running) startGame(); }
    else return;
    if(k.startsWith('Arrow')) e.preventDefault();
}
document.addEventListener('keydown', onKey);

document.querySelectorAll('.dpad button').forEach(b=>{
    const fire=(e)=>{
        e.preventDefault();
        const d=b.dataset.dir;
        if(d==='up') queueDir(0,-1);
        else if(d==='down') queueDir(0,1);
        else if(d==='left') queueDir(-1,0);
        else if(d==='right') queueDir(1,0);
        else if(d==='pause'){ if(running){ paused=!paused; syncPauseUI(); } }
    };
    b.addEventListener('click', fire);
    /* Fire on touchstart too for lower latency on mobile */
    b.addEventListener('touchstart', fire, {passive:false});
});

let touchStart=null;
const wrap=$('canvasWrap');
wrap.addEventListener('touchstart',(e)=>{
    const t=e.touches[0];
    touchStart={x:t.clientX,y:t.clientY};
},{passive:true});
wrap.addEventListener('touchend',(e)=>{
    if(!touchStart) return;
    const t=e.changedTouches[0];
    const dx=t.clientX-touchStart.x, dy=t.clientY-touchStart.y;
    const ax=Math.abs(dx), ay=Math.abs(dy);
    touchStart=null;
    if(Math.max(ax,ay)<20) return;
    if(ax>ay) queueDir(dx>0?1:-1, 0);
    else      queueDir(0, dy>0?1:-1);
});

/* ======== Bottom sheet (leaderboard) ======== */
const sheet=$('sheet'), sheetBack=$('sheetBack');
function openSheet(){
    sheet.classList.add('on'); sheetBack.classList.add('on');
    loadLeaderboard(currentScope);
}
function closeSheet(){
    sheet.classList.remove('on'); sheetBack.classList.remove('on');
}
$('openLb').addEventListener('click', openSheet);
sheetBack.addEventListener('click', closeSheet);
/* Swipe down on handle/header to close on mobile */
let sheetDragY=null;
sheet.querySelector('.handle').addEventListener('touchstart',(e)=>{sheetDragY=e.touches[0].clientY},{passive:true});
sheet.querySelector('.handle').addEventListener('touchmove',(e)=>{
    if(sheetDragY==null)return;
    const dy=e.touches[0].clientY-sheetDragY;
    if(dy>50){ closeSheet(); sheetDragY=null; }
},{passive:true});
sheet.querySelector('.handle').addEventListener('touchend',()=>{sheetDragY=null},{passive:true});

/* ======== Leaderboards ======== */
let currentScope='world';
document.querySelectorAll('.lb-tab').forEach(b=>{
    b.addEventListener('click', ()=>{
        document.querySelectorAll('.lb-tab').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        currentScope=b.dataset.scope;
        loadLeaderboard(currentScope);
    });
});
async function loadLeaderboard(scope){
    $('lbList').innerHTML='<div class="lb-empty">불러오는 중…</div>';
    try{
        const {data,error}=await getSupabase().rpc('snake_leaderboard',{p_scope:scope,p_limit:50});
        try{ console.log('[snake.leaderboard]', scope, error?'error':(data?data.length+' rows':'null'), error?error.message:''); }catch(_){}
        if(error||!data){ $('lbList').innerHTML='<div class="lb-empty">기록 없음</div>'; return; }
        if(!data.length){
            const emptyMsg = scope==='today'
                ? '🌅 오늘 (한국 시간 기준) 기록이 아직 없어요.<br>첫 기록의 주인공이 되세요!'
                : scope==='friends'
                ? '친구가 아직 플레이하지 않았어요.<br>친구 추가는 /messages/ 에서!'
                : '첫 기록의 주인공이 되세요!';
            $('lbList').innerHTML='<div class="lb-empty">'+emptyMsg+'</div>';
            return;
        }
        $('lbList').innerHTML=data.map(row=>{
            const isSelf=me && row.user_id===me.id;
            const rnkCls=row.rnk===1?' gold':row.rnk===2?' silver':row.rnk===3?' bronze':'';
            const av=row.avatar_url
                ? '<div class="lb-av"><img src="'+esc(row.avatar_url)+'" referrerpolicy="no-referrer" alt=""></div>'
                : '<div class="lb-av">'+esc(initials(row.nickname))+'</div>';
            return '<div class="lb-row'+(isSelf?' self':'')+'">'
                 +'<div class="lb-rnk'+rnkCls+'">'+(row.rnk<=3?(['🥇','🥈','🥉'][row.rnk-1]):('#'+row.rnk))+'</div>'
                 +'<div class="lb-who">'+av+'<div class="lb-nick">'+esc(row.nickname||'?')+'</div></div>'
                 +'<div class="lb-score">'+row.best_score+'</div>'
                 +'</div>';
        }).join('');
    }catch(_){$('lbList').innerHTML='<div class="lb-empty">불러오기 실패</div>';}
}

/* ======== Boot ======== */
$('ovBtn').addEventListener('click', startGame);
$('pauseBtn').addEventListener('click', (e)=>{
    e.stopPropagation();
    if(!running) return;
    paused=!paused;
    syncPauseUI();
});
(async()=>{
    await initAuth();
    if(me){
        fitCanvas(); render();
        /* On desktop (>=1024px) the leaderboard is always visible in the
           right column — load immediately. On mobile it loads on sheet open. */
        if(matchMedia('(min-width:1024px)').matches) loadLeaderboard('world');
    }
})();

if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(r=>r.forEach(s=>s.unregister())).catch(()=>{})}
if('caches' in window){caches.keys().then(k=>k.forEach(n=>caches.delete(n))).catch(()=>{})}
