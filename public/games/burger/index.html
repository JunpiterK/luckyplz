/* Mobile-portrait first. See memory/mobile_first_games.md */
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --dark:#0A0A1A;--accent:#FFE66D;--danger:#FF3366;
    --success:#00E676;--cyan:#00D9FF;--tan:#FFB74D;
    --muted:rgba(255,255,255,.55);--muted-2:rgba(255,255,255,.35);
    --panel-br:rgba(255,255,255,.07);
    --sb-bottom: env(safe-area-inset-bottom, 0px);
}
html,body{height:100%;overscroll-behavior:none}
body{
    font-family:'Noto Sans KR',sans-serif;background:var(--dark);color:#fff;
    min-height:100dvh;overflow-x:hidden;letter-spacing:.01em;
    background-image:
        radial-gradient(ellipse at 50% 20%,rgba(255,183,77,.06) 0%,transparent 55%),
        linear-gradient(180deg,#0A0A1A 0%,#141422 50%,#0A0A1A 100%);
    -webkit-tap-highlight-color:transparent;
    user-select:none;-webkit-user-select:none
}

.topbar{display:flex;align-items:center;gap:10px;padding:10px 14px;position:sticky;top:0;z-index:10;background:rgba(10,10,26,.88);backdrop-filter:blur(14px);border-bottom:1px solid var(--panel-br)}
.topbar .home{text-decoration:none;color:rgba(255,255,255,.8);padding:7px 11px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);font-size:.78em;font-weight:700}
.topbar h1{font-family:'Orbitron','Noto Sans KR',sans-serif;font-size:1em;font-weight:900;margin:0;flex:1;text-align:center;background:linear-gradient(135deg,#FFB74D,#FFE66D,#FF8A65);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar .slot{min-width:64px;text-align:right;display:flex;gap:6px;align-items:center;justify-content:flex-end}
.topbar .auth-chip{padding:5px 10px;border-radius:999px;background:rgba(255,230,109,.1);border:1px solid rgba(255,230,109,.25);color:#FFE66D;font-size:.72em;font-weight:700;text-decoration:none;white-space:nowrap}
.topbar .lb-btn{padding:6px 10px;border-radius:10px;background:rgba(255,183,77,.08);border:1px solid rgba(255,183,77,.3);color:#FFB74D;font-size:.78em;font-weight:800;cursor:pointer;font-family:inherit}
.topbar .lb-btn:active{background:rgba(255,183,77,.2)}

.wrap{display:flex;flex-direction:column;align-items:center;gap:10px;padding:10px 12px calc(var(--sb-bottom) + 14px);max-width:420px;margin:0 auto}
.left-col{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%}

.score-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%}
.ss{background:linear-gradient(165deg,rgba(22,22,42,.55),rgba(12,12,28,.8));border:1px solid var(--panel-br);border-radius:14px;padding:10px 6px;text-align:center;min-height:58px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ss .v{font-family:'Orbitron',sans-serif;font-size:1.6em;font-weight:900;line-height:1;color:#fff;font-variant-numeric:tabular-nums}
.ss .v.best{color:#FFB74D}
.ss .v.lvl{color:#FFE66D}
.ss .l{font-size:.6em;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);margin-top:4px;font-weight:800}

/* Game control bar — visible during play across all viewports. */
.game-ctrl{display:none;align-items:center;justify-content:center;width:100%;max-width:396px;gap:10px;margin:-2px 0 0}
.game-ctrl.on{display:flex}
.ctrl-btn{padding:8px 20px;border-radius:999px;background:rgba(0,217,255,.1);border:1px solid rgba(0,217,255,.42);color:#00D9FF;font-size:.85em;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:.04em;display:inline-flex;align-items:center;gap:6px;line-height:1}
.ctrl-btn:active{background:rgba(0,217,255,.22);transform:translateY(1px)}

/* Play area is 2:3 portrait (360 × 540 base) — fills the left-col. */
.canvas-wrap{
    position:relative;
    background:linear-gradient(180deg,#191028 0%,#0E0820 45%,#120818 100%);
    border:2px solid rgba(255,183,77,.22);border-radius:18px;
    box-shadow:0 14px 34px -10px rgba(255,183,77,.22),inset 0 0 40px rgba(255,183,77,.04);
    overflow:hidden;
    aspect-ratio:2/3;
    width:100%;max-width:396px;
    touch-action:none
}
#burger-canvas{display:block;width:100%;height:100%;touch-action:none}

.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,5,15,.84);backdrop-filter:blur(6px);padding:18px;text-align:center;transition:opacity .18s;z-index:2}
.overlay.hidden{opacity:0;pointer-events:none}
.overlay h2{font-family:'Orbitron',sans-serif;font-size:1.6em;font-weight:900;margin-bottom:6px}
.overlay h2.go{color:#FF6B8B}
.overlay h2.play{background:linear-gradient(135deg,#FFB74D,#FFE66D,#FF8A65);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.overlay p{color:rgba(255,255,255,.72);font-size:.86em;margin-bottom:12px;line-height:1.55;max-width:280px}
.overlay .score-big{font-family:'Orbitron',sans-serif;font-size:2.6em;font-weight:900;color:#FFB74D;margin:6px 0;line-height:1}
.overlay .pb{font-size:.84em;color:#FFE66D;margin-bottom:12px;font-weight:700;min-height:1.1em}
.overlay .rank-card{width:100%;max-width:320px;background:linear-gradient(165deg,rgba(0,217,255,.12),rgba(0,217,255,.03));border:1px solid rgba(0,217,255,.42);border-radius:16px;padding:18px 20px;margin:8px 0 16px;display:flex;flex-direction:column;align-items:center;gap:8px;box-shadow:0 8px 24px -8px rgba(0,217,255,.4)}
.overlay .rank-card-rank{font-family:'Orbitron',sans-serif;font-size:1.5em;font-weight:900;color:#00D9FF;line-height:1.1;letter-spacing:.02em;text-align:center}
.overlay .rank-card-pct{font-size:1em;font-weight:700;color:rgba(255,255,255,.95);letter-spacing:.02em;text-align:center;min-height:1em}
.overlay .rank-card-pb{font-size:.88em;font-weight:700;color:#FFE66D;min-height:1em;margin:0;text-align:center}
.overlay .rank-card-link{margin-top:4px;padding:8px 18px;font-size:.85em;font-weight:800;color:#00D9FF;background:transparent;border:1px solid rgba(0,217,255,.5);border-radius:999px;cursor:pointer;font-family:inherit;letter-spacing:.04em}
.overlay .rank-card-link:active{transform:translateY(1px);background:rgba(0,217,255,.12)}
.overlay .rank-card-debug{font-size:.68em;color:rgba(255,107,107,.92);font-family:'Courier New',monospace;letter-spacing:0;margin-top:0;min-height:0;text-align:center;word-break:break-word;max-width:100%;line-height:1.3}
.overlay .btn{padding:12px 26px;border-radius:14px;border:0;background:linear-gradient(135deg,#FFB74D,#FF8A65);color:#3a1e00;font-family:'Orbitron',sans-serif;font-weight:900;letter-spacing:.08em;font-size:1em;cursor:pointer;box-shadow:0 10px 26px -6px rgba(255,183,77,.5)}
.overlay .btn:active{transform:translateY(1px)}
.overlay .kbd-hint{margin-top:12px;font-size:.72em;color:rgba(255,255,255,.35);letter-spacing:.03em}
.overlay .kbd-hint kbd{padding:2px 6px;border-radius:5px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);font-family:inherit;color:#fff}

.hint{
    font-size:.78em;color:var(--muted);line-height:1.5;
    padding:8px 12px;background:rgba(255,255,255,.02);border-radius:10px;
    border:1px solid rgba(255,255,255,.04);text-align:center;width:100%;max-width:440px
}

@keyframes shake{0%,100%{transform:translate(0,0)}20%{transform:translate(-4px,0)}40%{transform:translate(4px,-1px)}60%{transform:translate(-3px,1px)}80%{transform:translate(3px,0)}}
.canvas-wrap.shake{animation:shake .4s ease}

#adSlot.ad-col{width:100%;max-width:440px;min-height:80px;display:none;margin-top:2px;align-self:center;order:99}

/* ---- Bottom sheet (leaderboard) ---- */
.sheet-backdrop{position:fixed;inset:0;z-index:50;background:rgba(5,5,15,.6);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .22s}
.sheet-backdrop.on{opacity:1;pointer-events:auto}
.sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:51;
    background:linear-gradient(180deg,#171128 0%,#0d0818 100%);
    border-top:1px solid var(--panel-br);border-radius:18px 18px 0 0;
    padding:10px 16px calc(var(--sb-bottom) + 14px);max-height:75vh;
    transform:translateY(100%);transition:transform .28s cubic-bezier(.2,.9,.2,1);
    pointer-events:none;display:flex;flex-direction:column
}
.sheet.on{transform:translateY(0);pointer-events:auto}
.sheet .handle{width:42px;height:4px;border-radius:2px;background:rgba(255,255,255,.2);margin:2px auto 10px}
.sheet h3{font-family:'Orbitron',sans-serif;font-size:.95em;font-weight:900;margin-bottom:10px;letter-spacing:.08em}
.lb-tabs{display:flex;gap:6px;margin-bottom:10px}
.lb-tab{flex:1;padding:8px 0;border-radius:10px;border:1px solid var(--panel-br);background:rgba(255,255,255,.02);color:var(--muted);font-size:.76em;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:.04em}
.lb-tab.active{background:rgba(255,183,77,.12);border-color:rgba(255,183,77,.35);color:#FFB74D}
.sheet-body{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;padding-bottom:8px}
.lb-list{display:flex;flex-direction:column;gap:6px}
.lb-row{display:grid;grid-template-columns:38px 1fr auto;gap:10px;align-items:center;padding:8px 10px;background:rgba(255,255,255,.02);border:1px solid var(--panel-br);border-radius:10px}
.lb-row.self{background:rgba(255,183,77,.09);border-color:rgba(255,183,77,.3)}
.lb-rnk{font-family:'Orbitron',sans-serif;font-weight:900;font-size:.9em;color:var(--muted-2);text-align:center}
.lb-rnk.gold{color:#FFD700}.lb-rnk.silver{color:#C0C0C0}.lb-rnk.bronze{color:#CD7F32}
.lb-who{display:flex;align-items:center;gap:8px;min-width:0}
.lb-av{width:28px;height:28px;border-radius:50%;background:rgba(255,183,77,.18);display:flex;align-items:center;justify-content:center;font-size:.74em;font-weight:900;color:#FFB74D;overflow:hidden;flex-shrink:0}
.lb-av img{width:100%;height:100%;object-fit:cover}
.lb-nick{font-size:.82em;font-weight:700;color:rgba(255,255,255,.92);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-score{font-family:'Orbitron',sans-serif;font-weight:900;font-size:.92em;color:#FFB74D;font-variant-numeric:tabular-nums}
.lb-empty{padding:18px;text-align:center;color:var(--muted-2);font-size:.82em}

/* Tablet portrait / large phone landscape (768–1023px) — single column,
   bigger canvas. burger is 2:3 so cap by max-height too. */
@media(min-width:768px) and (max-width:1023px){
    .canvas-wrap{max-width:480px;max-height:72vh}
    .score-strip{max-width:480px}
    .game-ctrl{max-width:480px}
    .hint{max-width:480px}
}
@media(min-width:1024px){
    /* PC: viewport split into exact thirds. burger 2:3 portrait — cap
       mid-col 480 so the canvas stays tasteful. */
    .wrap{max-width:none;margin:0;display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;align-items:start;padding:22px 24px;min-height:calc(100dvh - 60px)}
    .left-col{grid-column:2;display:flex;flex-direction:column;gap:12px;align-items:center;width:100%;max-width:480px;justify-self:center}
    .canvas-wrap{width:100%;max-width:none;max-height:82vh}
    .score-strip{width:100%}
    .game-ctrl{width:100%}
    .hint{width:100%}
    #adSlot.ad-col{grid-column:1;display:block;width:100%;max-width:380px;justify-self:center;min-height:600px;margin:0;align-self:start;background:rgba(255,255,255,.02);border:1px dashed rgba(255,255,255,.06);border-radius:14px}
    .right-col{grid-column:3;width:100%;max-width:400px;justify-self:center}
    .right-col .sheet{position:static;transform:none!important;max-height:none;border-radius:18px;border:1px solid var(--panel-br);background:rgba(14,14,28,.55);padding-bottom:14px;pointer-events:auto;width:100%}
    .right-col .sheet .handle{display:none}
    .right-col .sheet-backdrop, .topbar .lb-btn{display:none}
}
    </style>

<body>

<header class="topbar">

<main class="wrap">

        <div class="score-strip">
            <div class="ss"><div class="v" id="scoreNow">0</div><div class="l">SCORE</div></div>
            <div class="ss"><div class="v lvl" id="levelNow">1</div><div class="l">LEVEL</div></div>

        <div class="canvas-wrap" id="canvasWrap">

    </div>

    <aside id="adSlot" class="ad-col" aria-label="광고"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-5370817769801923" data-ad-slot="3456789012" data-ad-format="auto" data-full-width-responsive="true"></ins></aside>

<script src="/js/supabase-config.js?v=1777809451"></script>
<script src="/js/lpI18n.js?v=1777809451"></script>

<script>
const $=(id)=>document.getElementById(id);
const esc=(s)=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const initials=(n)=>(n||'?').trim()[0]?.toUpperCase()||'?';

/* ---- i18n — Burger-specific. */
const BURGER_I18N = {
    en: { gameTitle: '🍔 Burger Chef' },
    ko: { gameTitle: '🍔 버거 셰프' },
    ja: { gameTitle: '🍔 バーガーシェフ' },
    zh: { gameTitle: '🍔 汉堡厨师' },
    es: { gameTitle: '🍔 Chef Burger' }
};
function tT(key){
    if(window.LpI18n) return window.LpI18n.T(key, BURGER_I18N);
    return (BURGER_I18N.en[key]) || key;
}
function applyLanguage(){
    const home = $('homeLink'); if(home) home.textContent = '← ' + tT('home');
    const h1 = document.querySelector('.topbar h1'); if(h1) h1.textContent = tT('gameTitle');
    const authSlot = $('authSlot');
    if(authSlot){
        if(me){
            const nick = (window._lpMyNickname) || tT('you');
            authSlot.innerHTML = '<a class="auth-chip" href="/me/">'+esc(nick)+'</a>';
        } else {
            authSlot.innerHTML = '<a class="auth-chip" href="/auth/?next='+encodeURIComponent(location.pathname)+'">'+esc(tT('login'))+'</a>';
        }
    }
    const sh3 = document.querySelector('.sheet h3'); if(sh3) sh3.textContent = '🏆 ' + tT('ranking');
    document.querySelectorAll('.lb-tab[data-scope="world"]').forEach(b => b.textContent = tT('world'));
    document.querySelectorAll('.lb-tab[data-scope="today"]').forEach(b => b.textContent = tT('today'));
    document.querySelectorAll('.lb-tab[data-scope="friends"]').forEach(b => b.textContent = tT('friends'));
}
if(window.LpI18n){
    window.LpI18n.onChange(applyLanguage);
}
if(document.readyState !== 'loading') applyLanguage();
else document.addEventListener('DOMContentLoaded', applyLanguage);

let me=null;
/* ID + nickname captured at initAuth so we can detect mid-game session
   changes (account switch in another tab, token rotation, browser-sync
   from another device). The score is server-attributed via auth.uid()
   at the moment record_burger_attempt runs — NOT against the cached
   `me.id` — so a divergence between boot and live session means the
   score lands on a DIFFERENT account than the user thinks. We surface
   this loudly. Same defensive pattern as dodge/space-z. */
let meIdAtBoot=null;
let meNickAtBoot='';

/* ---- Auth init (anon-friendly) ----
   Anon users CAN play and view leaderboards but cannot save records.
   When not logged in we show a login chip instead of a profile chip,
   skip the profile/stats fetch, and let the game-over flow surface a
   "🔒 로그인하면 기록 저장!" hint while still loading world rankings. */
async function initAuth(){
    try{
        const u=await getUser();
        if(!u){
            me=null;
            meIdAtBoot=null;
            meNickAtBoot='';
            $('authSlot').innerHTML='<a class="auth-chip" href="/auth/?next='+encodeURIComponent(location.pathname)+'">로그인</a>';
            return;
        }
        me=u;
        meIdAtBoot=u.id;
        try{
            console.log('[burger.auth] signed in as id=' + u.id +
                        ' email=' + (u.email||'(none)'));
        }catch(_){}
        const prof=await getSupabase().from('profiles').select('nickname,avatar_url').eq('id',u.id).maybeSingle();
        const nick=prof.data?.nickname||'나';
        meNickAtBoot=nick;
        $('authSlot').innerHTML='<a class="auth-chip" href="/me/">'+esc(nick)+'</a>';
        try {
            window._lpMe = u;
            window._lpMyNickname = nick;
            window._lpMyAvatar = prof.data?.avatar_url || null;
        } catch(_){}
        loadMyStats();
    }catch(e){console.warn('[burger.auth] init',e)}
}

/* Auth state listener — picks up sign-out / account-switch in other
   tabs OR token expiry. Mirror of the dodge implementation: if the
   live session diverges from boot, log loud + reload back to auth gate
   when the game isn't actively running so the new identity drives
   subsequent state. Guarded by `running` (game's own flag) so we
   don't yank the user mid-burger-stack. */
if(typeof onAuthChange==='function'){
    onAuthChange((event, session) => {
        const newId = session && session.user ? session.user.id : null;
        try{ console.log('[burger.auth] state change: event=' + event + ' newId=' + (newId||'(null)')); }catch(_){}
        if(event==='SIGNED_OUT'){
            /* User signed out somewhere else. We can't safely keep playing
               for a logged-in session — record_burger_attempt would now
               fail with not_authenticated. Reload to refresh state.
               Anon-at-boot users (meIdAtBoot=null) never had a session
               to lose, so we leave them alone. */
            if(meIdAtBoot && (typeof running==='undefined' || !running)){
                location.reload();
            }
            return;
        }
        if(meIdAtBoot && newId && newId !== meIdAtBoot){
            console.warn('[burger.auth] account switched mid-session from '
                + meIdAtBoot + ' to ' + newId + ' — reloading to refresh state');
            if(typeof running==='undefined' || !running){
                location.reload();
            }
        }
    });
}

/* ========================================================================
   Canvas setup — fixed logical 360×540 coord space (2:3 portrait). The
   real backing store is scaled by DPR so the cartoon shapes stay crisp
   on retina / high-density screens. setTransform is recomputed whenever
   the CSS size changes (orientation change, parent resize, etc).
   ======================================================================== */
const W = 360, H = 540;
const canvas = $('burger-canvas');
const ctx = canvas.getContext('2d');

function fitCanvas(){
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    const rect = canvas.getBoundingClientRect();
    canvas.width  = Math.round(rect.width  * dpr);
    canvas.height = Math.round(rect.height * dpr);
    ctx.setTransform(dpr * rect.width / W, 0, 0, dpr * rect.height / H, 0, 0);
}
window.addEventListener('resize', fitCanvas);

/* ========================================================================
   Ingredient catalog. Each entry draws itself at a given (cx,cy) centre
   with a given width/height — chosen so the piece reads instantly even
   at the small target-strip size. Shapes are intentionally simple (flat
   fills, 2-3 colour accents each) for the cartoon/flat-illustration vibe
   the user asked for; heavy textures would muddy the look at 32 px tall.
   ======================================================================== */
function drawRR(x, y, w, h, r){
    if (typeof r === 'number') r = [r,r,r,r];
    ctx.beginPath();
    ctx.moveTo(x+r[0], y);
    ctx.lineTo(x+w-r[1], y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r[1]);
    ctx.lineTo(x+w, y+h-r[2]);
    ctx.quadraticCurveTo(x+w, y+h, x+w-r[2], y+h);
    ctx.lineTo(x+r[3], y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r[3]);
    ctx.lineTo(x, y+r[0]);
    ctx.quadraticCurveTo(x, y, x+r[0], y);
    ctx.closePath();
}

/* ========================================================================
   Ingredient catalog v2. Each ingredient draws itself within a (cx, cy,
   w, h) box, but uses DISTINCT silhouettes and volumetric gradients so
   the stacked burger reads as real food — a puffy domed bun on top, a
   THICK irregular patty, a THIN glossy tomato round, fluffy overlapping
   lettuce curls, etc. Layers also have DIFFERENT natural heights (see
   LAYER_H table below) — previously every layer was the same 16 px so
   the stack looked like a striped bar, not a burger.

   Each drawer should:
   - fill the horizontal extent (some fillings extend slightly past the
     stack width so the bun clearly "holds" them)
   - use multi-stop gradients (not flat fills) for dimensionality
   - commit at least one accent detail (seeds, grill marks, juice
     droplets, cheese holes) to sell the cartoon-illustration look
   ======================================================================== */
const INGREDIENTS = {
    /* Bottom bun — flat top (fillings rest on it), rounded bottom. Rich
       warm-tan gradient top-to-bottom so it reads domed / baked even
       though the top edge is horizontal. */
    bunBottom: { name:'밑빵', draw(cx,cy,w,h){
        const x=cx-w/2, y=cy-h/2;
        // Main shape: flat top, rounded bottom corners
        const g = ctx.createLinearGradient(0, y, 0, y+h);
        g.addColorStop(0,   '#F2BC80');
        g.addColorStop(0.55,'#D48C4B');
        g.addColorStop(1,   '#8B5423');
        ctx.fillStyle = g;
        const br = Math.min(h*0.7, w*0.1);
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x+w, y);
        ctx.lineTo(x+w, y+h-br);
        ctx.quadraticCurveTo(x+w, y+h, x+w-br, y+h);
        ctx.lineTo(x+br, y+h);
        ctx.quadraticCurveTo(x, y+h, x, y+h-br);
        ctx.closePath();
        ctx.fill();
        // Crust darkening along the rounded bottom
        ctx.fillStyle = 'rgba(90,45,15,.28)';
        ctx.beginPath();
        ctx.moveTo(x, y+h-br);
        ctx.quadraticCurveTo(x, y+h, x+br, y+h);
        ctx.lineTo(x+w-br, y+h);
        ctx.quadraticCurveTo(x+w, y+h, x+w, y+h-br);
        ctx.lineTo(x+w, y+h*0.75);
        ctx.lineTo(x, y+h*0.75);
        ctx.closePath();
        ctx.fill();
        // Crumb highlight strip near the flat top (bakery shine)
        ctx.fillStyle = 'rgba(255,240,210,.55)';
        ctx.fillRect(x+w*0.08, y+Math.max(1,h*0.1), w*0.84, Math.max(1,h*0.15));
    }},

    /* Top bun — fully domed, flat bottom (sits on the highest filling).
       Radial gradient puts the highlight on the upper-left and shades
       down to a rich bake-brown on the lower-right; 5 irregular sesame
       seeds each cast their own small shadow. */
    bunTop: { name:'윗빵', draw(cx,cy,w,h){
        // Dome shape — flat bottom edge, bezier arch over the top
        const grad = ctx.createRadialGradient(cx-w*.22, cy-h*.25, w*.08, cx, cy+h*.1, w*.65);
        grad.addColorStop(0,    '#F7C88C');
        grad.addColorStop(0.45, '#D98B48');
        grad.addColorStop(1,    '#804520');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(cx-w/2, cy+h/2);
        ctx.lineTo(cx-w/2, cy+h*0.28);
        ctx.bezierCurveTo(cx-w*0.55, cy-h*0.55, cx+w*0.55, cy-h*0.55, cx+w/2, cy+h*0.28);
        ctx.lineTo(cx+w/2, cy+h/2);
        ctx.closePath();
        ctx.fill();
        // Upper-left gloss
        ctx.fillStyle = 'rgba(255,248,220,.55)';
        ctx.beginPath();
        ctx.ellipse(cx-w*.18, cy-h*.2, w*.22, h*.17, -.35, 0, Math.PI*2);
        ctx.fill();
        // Crust shadow along the bottom of the dome (where it meets the filling)
        ctx.fillStyle = 'rgba(80,40,10,.3)';
        ctx.fillRect(cx-w/2+1, cy+h*0.3, w-2, Math.max(1, h*0.15));
        // Sesame seeds — 5 in irregular positions, each with a shadow
        const seeds = [
            [-w*.30, -h*.12],
            [-w*.08, -h*.30],
            [ w*.12, -h*.24],
            [ w*.26, -h*.06],
            [-w*.18,  h*.05]
        ];
        const sw = Math.max(1.3, w*.038), sh = Math.max(2.4, h*.11);
        seeds.forEach(([dx,dy])=>{
            const sx=cx+dx, sy=cy+dy;
            ctx.fillStyle = 'rgba(90,50,18,.45)';
            ctx.beginPath();
            ctx.ellipse(sx+.5, sy+.8, sw, sh, .28, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#FFF4D0';
            ctx.beginPath();
            ctx.ellipse(sx, sy, sw, sh, .28, 0, Math.PI*2);
            ctx.fill();
            // Seed sheen
            ctx.fillStyle = 'rgba(255,255,255,.55)';
            ctx.beginPath();
            ctx.ellipse(sx-sw*.3, sy-sh*.4, sw*.35, sh*.3, .28, 0, Math.PI*2);
            ctx.fill();
        });
    }},

    /* Patty — thickest layer, bumpy edges, rich dark-brown gradient with
       red-orange undertone. Four visible grill marks + scattered juice
       droplets sell the "grilled beef" read. */
    patty: { name:'패티', draw(cx,cy,w,h){
        const x=cx-w/2, y=cy-h/2;
        // Extended slightly past stack width so patty pokes out of the bun
        const pw = w*1.02, px = cx-pw/2;
        // Irregular bumpy outline (8 bumps top + bottom)
        const g = ctx.createLinearGradient(0, y, 0, y+h);
        g.addColorStop(0,    '#6E3C20');
        g.addColorStop(0.5,  '#4A2512');
        g.addColorStop(1,    '#2B1205');
        ctx.fillStyle = g;
        const r = h*0.38;
        const bumps = 7;
        ctx.beginPath();
        ctx.moveTo(px+r, y);
        for (let i=1;i<bumps;i++){
            const t = i/bumps;
            const bx = px + r + (pw-2*r)*t;
            const by = y + (i%2===0 ? -h*0.04 : h*0.04);
            ctx.lineTo(bx, by);
        }
        ctx.lineTo(px+pw-r, y);
        ctx.quadraticCurveTo(px+pw, y, px+pw, y+r);
        ctx.lineTo(px+pw, y+h-r);
        ctx.quadraticCurveTo(px+pw, y+h, px+pw-r, y+h);
        for (let i=bumps-1;i>=1;i--){
            const t = i/bumps;
            const bx = px + r + (pw-2*r)*t;
            const by = y + h + (i%2===0 ? h*0.04 : -h*0.04);
            ctx.lineTo(bx, by);
        }
        ctx.lineTo(px+r, y+h);
        ctx.quadraticCurveTo(px, y+h, px, y+h-r);
        ctx.lineTo(px, y+r);
        ctx.quadraticCurveTo(px, y, px+r, y);
        ctx.closePath();
        ctx.fill();
        // Top rim warm highlight
        ctx.fillStyle = 'rgba(255,160,90,.35)';
        ctx.beginPath();
        ctx.moveTo(px+r*0.8, y+h*0.1);
        for (let i=1;i<bumps;i++){
            const t = i/bumps;
            const bx = px + r + (pw-2*r)*t;
            ctx.lineTo(bx, y+h*0.1 + (i%2===0 ? -h*0.04 : h*0.02));
        }
        ctx.lineTo(px+pw-r*0.8, y+h*0.1);
        ctx.lineTo(px+pw-r*0.8, y+h*0.22);
        ctx.lineTo(px+r*0.8, y+h*0.22);
        ctx.closePath();
        ctx.fill();
        // Grill marks — 4 darker vertical bands
        ctx.fillStyle = 'rgba(12,4,0,.55)';
        for (let i=0;i<4;i++){
            const gx = px + pw*(0.14 + i*0.22);
            ctx.fillRect(gx, y+h*0.18, Math.max(1.2, pw*0.035), h*0.64);
        }
        // Juice/sear highlights
        ctx.fillStyle = 'rgba(255,190,130,.4)';
        [[-.22,-.18],[ .18,-.08],[-.04, .22],[ .24, .12]].forEach(([dx,dy])=>{
            ctx.beginPath();
            ctx.ellipse(cx+dx*pw, cy+dy*h, Math.max(.9, pw*.035), Math.max(.8, h*.09), 0, 0, Math.PI*2);
            ctx.fill();
        });
    }},

    /* Cheese — BRIGHT yellow thin slice, clearly overhanging on one side
       (melty droop). Drips along the bottom edge in irregular finger-
       shapes. A few darker gold cheese holes on the top surface. */
    cheese: { name:'치즈', draw(cx,cy,w,h){
        const x=cx-w/2, y=cy-h/2;
        // Extend horizontally past the stack width so cheese "droops" out
        const cw = w*1.06, cx0 = cx-cw/2;
        // Main slab (top 65%) + drippy bottom (35%)
        const g = ctx.createLinearGradient(0, y, 0, y+h*0.65);
        g.addColorStop(0,   '#FFE570');
        g.addColorStop(0.5, '#FFCE2E');
        g.addColorStop(1,   '#E8A412');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.moveTo(cx0, y);
        ctx.lineTo(cx0+cw, y);
        ctx.lineTo(cx0+cw, y+h*0.6);
        // Drippy bottom edge — 4 irregular melt fingers
        const drips = [
            [0.00, 0.65],
            [0.12, 1.00],
            [0.25, 0.70],
            [0.40, 0.95],
            [0.55, 0.72],
            [0.72, 1.05],
            [0.88, 0.68],
            [1.00, 0.80]
        ];
        for (const [tx,ty] of drips){
            ctx.lineTo(cx0 + cw*tx, y + h*ty);
        }
        ctx.lineTo(cx0, y+h*0.6);
        ctx.closePath();
        ctx.fill();
        // Top shine strip
        ctx.fillStyle = 'rgba(255,255,220,.6)';
        ctx.fillRect(cx0+cw*0.06, y+Math.max(.5,h*0.07), cw*0.55, Math.max(1, h*0.14));
        // Cheese holes (3, scattered)
        ctx.fillStyle = 'rgba(180,130,20,.65)';
        [[.32,.35],[.58,.28],[.48,.48]].forEach(([tx,ty])=>{
            ctx.beginPath();
            ctx.arc(cx0+cw*tx, y+h*ty, Math.max(.8, h*.08), 0, Math.PI*2);
            ctx.fill();
        });
        // Tiny rim shade on the overhangs
        ctx.strokeStyle = 'rgba(170,110,20,.5)';
        ctx.lineWidth = Math.max(.7, h*.06);
        ctx.beginPath();
        ctx.moveTo(cx0, y+h*0.6);
        for (const [tx,ty] of drips){
            ctx.lineTo(cx0 + cw*tx, y + h*ty);
        }
        ctx.stroke();
    }},

    /* Lettuce — fluffy multi-curl. Extends BEYOND the stack width; has
       a darker underside peeking along the bottom and three bright-green
       curl-bumps on top. Reads as a ruffled leaf, not a flat green bar. */
    lettuce: { name:'양상추', draw(cx,cy,w,h){
        // Extend WAY past the stack width — lettuce spills out of the bun
        const lw = w*1.14, lx = cx-lw/2;
        // Shadowed underside (bottom 40%)
        ctx.fillStyle = '#2E6A18';
        ctx.beginPath();
        ctx.moveTo(lx, cy+h*0.1);
        for (let i=0;i<=10;i++){
            const t = i/10;
            const px = lx + lw*t;
            const py = cy + h*0.1 + (i%2===0 ? h*0.12 : h*0.35);
            ctx.lineTo(px, py);
        }
        ctx.lineTo(lx+lw, cy+h*0.1);
        ctx.closePath();
        ctx.fill();
        // Main green body with top ruffle
        const g = ctx.createLinearGradient(0, cy-h*0.5, 0, cy+h*0.2);
        g.addColorStop(0, '#9BE14B');
        g.addColorStop(1, '#5AAD28');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.moveTo(lx, cy+h*0.15);
        for (let i=0;i<=10;i++){
            const t = i/10;
            const px = lx + lw*t;
            const py = cy + (i%2===0 ? h*0.15 : -h*0.40);
            ctx.lineTo(px, py);
        }
        ctx.lineTo(lx+lw, cy+h*0.15);
        ctx.closePath();
        ctx.fill();
        // Three bright curl bumps on top (suggest multiple leaf layers)
        ctx.fillStyle = '#B5F06A';
        for (let i=0;i<4;i++){
            const bx = lx + lw*(0.18 + i*0.22);
            const by = cy - h*0.15 + (i%2===0 ? -h*0.08 : h*0.02);
            ctx.beginPath();
            ctx.ellipse(bx, by, lw*0.08, h*0.28, 0, 0, Math.PI*2);
            ctx.fill();
        }
        // Vein highlights
        ctx.strokeStyle = 'rgba(255,255,255,.25)';
        ctx.lineWidth = Math.max(.6, h*.05);
        ctx.beginPath();
        for (let i=0;i<4;i++){
            const bx = lx + lw*(0.18 + i*0.22);
            ctx.moveTo(bx, cy-h*0.1);
            ctx.lineTo(bx, cy+h*0.1);
        }
        ctx.stroke();
    }},

    /* Tomato — thin glossy red slice. Darker red outer rim, brighter
       red-orange centre via gradient, 5 yellow seeds arranged in a
       natural scatter, and a single specular gloss highlight up-left. */
    tomato: { name:'토마토', draw(cx,cy,w,h){
        // Slight horizontal extension for that "slipping out" look
        const tw = w*1.06, tx = cx-tw/2;
        const y = cy-h/2;
        // Outer rim
        ctx.fillStyle = '#A8201A';
        drawRR(tx, y, tw, h, h*0.5);
        ctx.fill();
        // Inner flesh with gradient
        const inset = Math.max(1, h*0.18);
        const g = ctx.createLinearGradient(0, y+inset, 0, y+h-inset);
        g.addColorStop(0,   '#FF7A6A');
        g.addColorStop(0.5, '#E83535');
        g.addColorStop(1,   '#B51E1E');
        ctx.fillStyle = g;
        drawRR(tx+inset, y+inset, tw-2*inset, h-2*inset, (h-2*inset)*0.5);
        ctx.fill();
        // Seeds — 5 in natural scatter, each with its own drop shadow
        const seeds = [[.22,-.1],[.38, .08],[.52,-.12],[.68, .06],[.82,-.08]];
        for (const [tx2, ty2] of seeds){
            const sx = tx + tw*tx2, sy = cy + h*ty2;
            const sw = Math.max(1.2, w*.032), sh = Math.max(2.2, h*.22);
            ctx.fillStyle = 'rgba(150,40,30,.5)';
            ctx.beginPath();
            ctx.ellipse(sx+.4, sy+.7, sw, sh, .3, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#FFE583';
            ctx.beginPath();
            ctx.ellipse(sx, sy, sw, sh, .3, 0, Math.PI*2);
            ctx.fill();
        }
        // Gloss highlight
        ctx.fillStyle = 'rgba(255,255,255,.38)';
        ctx.beginPath();
        ctx.ellipse(cx-tw*.22, cy-h*.22, tw*.2, h*.16, 0, 0, Math.PI*2);
        ctx.fill();
    }},

    /* Onion — VERY thin pale slice with a subtle cool-pink tinge
       (suggests red onion). Vertical hairlines reproduce the radial
       layer boundaries seen edge-on: when you slice an onion across
       its rings and view the slice from the side, each concentric
       ring wall projects to a near-vertical line on the cut face.
       Previously rendered as two HORIZONTAL lines, which read like
       a single ring stack rather than a multi-layer cross section
       — confusing for users familiar with what an onion slice
       actually looks like. */
    onion: { name:'양파', draw(cx,cy,w,h){
        const ow = w*1.02, ox = cx-ow/2;
        const y = cy-h/2;
        const g = ctx.createLinearGradient(0, y, 0, y+h);
        g.addColorStop(0, '#FDF4F4');
        g.addColorStop(0.5, '#E7D4D8');
        g.addColorStop(1, '#B896A1');
        ctx.fillStyle = g;
        drawRR(ox, y, ow, h, h*0.5);
        ctx.fill();
        // Gloss band
        ctx.fillStyle = 'rgba(255,255,255,.55)';
        ctx.fillRect(ox+ow*0.08, y+Math.max(.5,h*0.12), ow*0.5, Math.max(.8, h*0.2));
        // Layer hairlines — VERTICAL, evenly spaced across the slice's
        // horizontal extent. Each line represents a ring-layer wall cut
        // through and seen edge-on. Inset from the rounded caps so they
        // don't crash into the rim curve. Spans ~70% of the slice height
        // vertically so even very thin slices (h=8 in stack view) still
        // show the partition cue.
        ctx.strokeStyle = 'rgba(120,70,85,.5)';
        ctx.lineWidth = Math.max(.5, h*.08);
        ctx.beginPath();
        const lineCount = 5;
        const startX = ox + h*0.6;          // skip past the rounded left cap
        const endX   = ox + ow - h*0.6;     // skip past the rounded right cap
        const lineTop    = y + h*0.18;
        const lineBottom = y + h*0.82;
        for (let i=1; i<=lineCount; i++){
            const t  = i / (lineCount + 1);
            const px = startX + (endX - startX) * t;
            ctx.moveTo(px, lineTop);
            ctx.lineTo(px, lineBottom);
        }
        ctx.stroke();
        // Rim tinge along outer edge
        ctx.strokeStyle = 'rgba(140,80,100,.35)';
        ctx.lineWidth = Math.max(.6, h*.08);
        drawRR(ox+.5, y+.5, ow-1, h-1, (h-1)*0.5);
        ctx.stroke();
    }}
};

/* Per-ingredient natural stack height. Previously every layer was a
   uniform 16 px which made the stack read as a striped bar. Real
   burger layers vary in thickness: buns are domes, patty is thick,
   cheese + tomato + onion are thin slices, lettuce sits fluffier.
   The panel plate area is ~200 px tall, so even a 7-filling L9 sample
   (18*7 ≤ 126 plus 16+26 buns = 168) fits. */
const LAYER_H = {
    bunBottom: 16,
    bunTop:    26,
    patty:     22,
    cheese:    12,
    lettuce:   16,
    tomato:    10,
    onion:     8
};

/* ========================================================================
   Sample generation — the target burger's middle fillings (a bottom +
   top bun are drawn automatically around these in both panels). Each
   filling is picked from the 5 TAP_IDS with repeats allowed so a L3
   sample can be "patty / cheese / patty" (a double-cheeseburger). We
   avoid 3-in-a-row to keep patterns interesting. Length grows from 3
   at L1 to 7 at L9+, capped so the stack always fits the panel height.
   ======================================================================== */
const TAP_IDS = ['lettuce','patty','cheese','onion','tomato'];
function generateSample(lvl){
    const len = Math.min(3 + Math.floor(lvl/2), 7);
    const out = [];
    for (let i=0; i<len; i++){
        let id;
        do { id = TAP_IDS[Math.floor(Math.random()*TAP_IDS.length)]; }
        while (out.length >= 2 && out[out.length-1] === id && out[out.length-2] === id);
        out.push(id);
    }
    return out;
}
function timeForLevel(lvl){
    /* All stages share the same time budget. Difficulty rises via
       sample length (generateSample uses lvl) instead of a tightening
       clock — the player gets the same window to memorise + tap a
       longer recipe at higher levels.

       2026-04-29: Tightened from 14 → 11.2 s per stage (-20%) after
       playtesters reported the timer felt too generous. Sample length
       still scales by level, but the tighter window puts honest
       pressure on the memorisation phase too — at L1 (3 fillings) you
       still have ~3.7 s per tap, at L9 (7 fillings) it drops to 1.6 s
       which forces real fluency. */
    return 11.2;
}

/* ========================================================================
   Game state
   ======================================================================== */
let level, score;
let sample;             /* filling IDs only (no buns) */
let progress;           /* how many of the sample have been tapped correctly */
let timeLeft, timeLevelBudget;
let combo, maxCombo;
let running, paused;

/* ---- Pause UI sync (mobile/tablet/PC parity) ---- */
function syncPauseUI(){
    const gc=$('gameCtrl'), btn=$('pauseBtn');
    if(!gc||!btn) return;
    if(running){
        gc.classList.add('on');
        btn.textContent = paused ? '▶ 재개' : '⏸ 일시정지';
        btn.setAttribute('aria-label', paused ? '재개' : '일시정지');
    } else {
        gc.classList.remove('on');
    }
}
let startedAt, lastTick;
let ingredientsCaught, burgersCompleted;
let popUntil, popText, popKind;
let shakeUntil, flashUntil, clearUntil;
let tapFlashes;         /* [{idx, bornAt, kind:'good'|'bad'}] */
let plateLifts;         /* [{idx, bornAt}] — fast bounce-up animation
                           per tap; the plate visually pops ~10 px up
                           and settles back over 250 ms so the user
                           gets crisp feedback that their tap landed,
                           independent of the right/wrong outcome. */
let stackPops;          /* [{layer, bornAt}] — entry-scale anim on WIP layer */
let burgersThisLevel;   /* 0..LEVEL_BURGERS — only levels up on LEVEL_BURGERS */

/* Clear 5 burgers at a given level before it ticks over. Previous build
   incremented level after every single burger, so there was no sense of
   "settling into" a difficulty tier — each completion immediately made
   the sample longer AND the clock tighter. 5-per-level lets the player
   rack up combos at a comfortable tempo before the next jump. */
const LEVEL_BURGERS = 5;

/* ========== Sound (LPAudio) — kitchen tap synthesis ==========
   tap = "skewer click" + bell partial; pitch rises with combo so a
        streak audibly escalates rather than reading flat.
   wrong = low sawtooth buzz + soft noise = grumpy timer.
   complete = bright 4-note + sparkle topping (high triangle chord).
   levelup = 6-note ascending fanfare + final bell chord stab.
   start = chef's bell (octave chord with click body).
   over = mournful descending 4-note + low thud. */
function sfxTap(combo){
    const c = Math.max(0, Math.min(combo|0, 12));
    const base = 660 + c * 35;
    LPAudio.noise({dur:0.025, vol:0.06});
    LPAudio.beep({freq:base, dur:0.06, vol:0.16, type:'square', decay:0.45});
    /* Bell partial 1.5x adds a "ding" overtone above the click body. */
    LPAudio.beep({freq:base*1.5, dur:0.08, vol:0.07, type:'triangle', decay:0.6});
}
function sfxWrong(){
    LPAudio.beep({freq:220, dur:0.2, vol:0.2, type:'sawtooth', slide:80, decay:0.7});
    LPAudio.noise({dur:0.06, vol:0.08});
    LPAudio.beep({freq:165, dur:0.18, vol:0.12, type:'square', decay:0.7});
}
function sfxComplete(){
    LPAudio.seq([
        {f:523,d:0.07},{f:659,d:0.07},{f:784,d:0.07},{f:1047,d:0.18}
    ], {vol:0.2, type:'square'});
    /* Sparkle topping on the last beat. */
    setTimeout(()=>LPAudio.noise({dur:0.06, vol:0.06}), 260);
    setTimeout(()=>LPAudio.chord([1047, 1568], {dur:0.22, vol:0.08, type:'triangle', decay:0.85}), 280);
}
function sfxLevelUp(){
    LPAudio.seq([
        {f:523,d:0.07},{f:659,d:0.07},{f:784,d:0.07},{f:1047,d:0.07},
        {f:1319,d:0.08},{f:1568,d:0.24}
    ], {vol:0.22, type:'triangle'});
    /* Final chord stab + sparkle = level-up climax. */
    setTimeout(()=>LPAudio.chord([784, 1047, 1568], {dur:0.4, vol:0.1, type:'square', decay:0.85}), 470);
    setTimeout(()=>LPAudio.noise({dur:0.18, vol:0.08}), 490);
}
function sfxStart(){
    LPAudio.chord([523, 1047], {dur:0.3, vol:0.14, type:'triangle', decay:0.85});
    LPAudio.beep({freq:523, dur:0.06, vol:0.08, type:'square', decay:0.4});
}
function sfxOver(){
    LPAudio.seq([
        {f:494,d:0.12},{f:392,d:0.12},{f:294,d:0.14},{f:196,d:0.28}
    ], {vol:0.22, type:'sawtooth'});
    setTimeout(()=>LPAudio.beep({freq:110, dur:0.4, vol:0.14, type:'triangle', decay:0.85}), 60);
}
/* Plate "tink" — high-pitched ceramic ping that fires alongside the
   plate-lift animation when the user taps an ingredient. Designed to
   sit on top of sfxTap (right tap) or sfxWrong (mis-tap) without
   masking either — short duration + high frequency keeps it in its
   own spectral band. */
function sfxPlate(){
    LPAudio.beep({freq:2100, dur:0.06, vol:0.09, type:'triangle', decay:0.88});
    LPAudio.beep({freq:2800, dur:0.05, vol:0.05, type:'sine',     decay:0.85});
    LPAudio.noise({dur:0.018, vol:0.04});
}

function resetGame(){
    level = 1; score = 0;
    sample = generateSample(level);
    progress = 0;
    timeLevelBudget = timeForLevel(level);
    timeLeft = timeLevelBudget;
    combo = 0; maxCombo = 0;
    ingredientsCaught = 0; burgersCompleted = 0;
    burgersThisLevel = 0;
    popUntil = 0; popText = ''; popKind = '';
    shakeUntil = 0; flashUntil = 0; clearUntil = 0;
    tapFlashes = []; stackPops = []; plateLifts = [];
    $('scoreNow').textContent = '0';
    $('levelNow').textContent = '1';
}

function startGame(){
    resetGame();
    fitCanvas();
    $('overlay').classList.add('hidden');
    sfxStart();
    running = true; paused = false;
    startedAt = performance.now(); lastTick = startedAt;
    syncPauseUI();
    requestAnimationFrame(loop);
}

function gameOver(){
    running = false;
    syncPauseUI();
    sfxOver();
    const duration = Math.round(performance.now() - startedAt);
    const wrap = $('canvasWrap');
    wrap.classList.remove('shake'); void wrap.offsetWidth; wrap.classList.add('shake');
    if(navigator.vibrate) try{ navigator.vibrate([30,20,60]); }catch(_){}

    /* "기록 등록 계정" line — visible reminder of which account this
       attempt will be saved under. Critical when the device is shared
       (multiple people with separate accounts). Filled in below from
       the LIVE session (not the cached me) — see the verification block.
       Same UI as dodge/space-z. */
    $('overlay').innerHTML =
        '<h2 class="go">TIME OUT</h2>'
      + '<div class="score-big">'+score+'</div>'
      + '<p>레벨 '+level+' 도달 · 버거 '+burgersCompleted+'개 완성 · 탭 '+ingredientsCaught+'회<br>'
      + '최고 콤보 '+maxCombo+' · 소요 '+(duration/1000).toFixed(1)+'초</p>'
      + '<div class="rank-card" id="ovRankCard">'
      +   '<div class="rank-card-rank" id="ovRankNum">조회 중…</div>'
      +   '<div class="rank-card-pct" id="ovRankPct"></div>'
      +   '<div class="rank-card-pb" id="ovRankPb"></div>'
      +   '<div class="rank-card-debug" id="ovRankDebug"></div>'
      +   '<div class="rank-card-acct" id="ovRankAcct" style="font-size:.74em;color:rgba(255,255,255,.55);margin-top:6px;letter-spacing:.02em"></div>'
      +   '<button class="rank-card-link" id="ovRankBtn">🏆 랭크</button>'
      + '</div>'
      + '<button class="btn" id="ovBtn">다시하기</button>'
      + '<div class="kbd-hint"><kbd>Enter</kbd> 재시작</div>';
    $('overlay').classList.remove('hidden');
    $('ovBtn').addEventListener('click', startGame);
    $('ovRankBtn').addEventListener('click', openBurgerRankSheet);

    (async()=>{
        /* Categorize Supabase errors into user-friendly buckets so the
           overlay never surfaces raw PostgREST internals to end users.
           - 'missing_migration': function/table not found in schema cache.
             Means the admin hasn't deployed the latest SQL. Console gets
             a deployment hint pointing at the right migration file.
           - 'rate_limit': server enforced 30 attempts / 1h.
           - 'no_auth': RPC saw auth.uid()=null. Anon users now skip the
             record RPC entirely (see 'no_login' below) so this branch is
             only reachable if a logged-in session lapsed mid-game.
           - 'invalid': server-side validation tripped (bad_pace etc).
           - 'unknown': anything else. */
        /* 'no_login' bucket: synthetic — set directly when we skip the
           record RPC because the user is anonymous. Never returned by
           _classifyErr (anon path doesn't even hit the RPC); listed here
           for completeness. */
        function _classifyErr(err){
            const m=(err&&(err.message||err.error_description)||String(err||'')).toLowerCase();
            if(/(could not find|schema cache|does not exist)/.test(m)
               &&/(function|relation|table)/.test(m)){
                return 'missing_migration';
            }
            if(m.includes('rate_limited'))return 'rate_limit';
            if(m.includes('not_authenticated'))return 'no_auth';
            if(m.includes('impossible_pace')||/^bad_/.test(m)
               ||m.includes('bad_burgers_completed')||m.includes('bad_ingredients_caught')
               ||m.includes('bad_level_reached')||m.includes('bad_duration')){
                return 'invalid';
            }
            return 'unknown';
        }
        function _logDeployHint(){
            try{console.warn(
              '[burger] Supabase migration not deployed. Apply in SQL Editor:\n'+
              '  supabase/migrations/2026-04-22-burger-game.sql\n'+
              '  supabase/migrations/2026-04-26-game-rank-info.sql\n'+
              'Or run supabase/redeploy-action-games.sql (one-shot).');
            }catch(_){}
        }

        /* Session verification — fetch the LIVE auth user right before
           recording so we know exactly which account the score will land
           on. The server-side record_burger_attempt uses auth.uid() at
           call time, NOT our cached me.id. Mid-game session change
           (other-tab account switch, token expiry, browser-sync from
           another device) silently sends the score to a different
           account. We log this divergence loudly + flag the on-screen
           "기록 등록 계정" line so the user notices BEFORE closing the
           overlay. Same pattern as dodge/space-z.
           Anon path (me=null): skip this block entirely — there's no
           session to verify and no record RPC will be called. */
        let liveUser = null;
        let liveNick = '';
        let pbMsg='', recordOk=false, recordErrKind=null;
        if(!me){
            /* Anon player: skip the record RPC entirely (it would just
               return not_authenticated). Mark a synthetic 'no_login'
               bucket so the dispatch below shows a friendly upsell
               instead of a generic failure. Leaderboard still loads. */
            recordErrKind='no_login';
        }else{
            try {
                liveUser = await getUser();
                try{
                    console.log('[burger.record] live user.id =', liveUser ? liveUser.id : '(null)',
                                '· me.id at boot =', meIdAtBoot);
                }catch(_){}
                if (!liveUser) {
                    console.warn('[burger.record] no live session — aborting record');
                } else if (meIdAtBoot && liveUser.id !== meIdAtBoot) {
                    console.warn('[burger.record] session changed since boot. boot=' + meIdAtBoot +
                                 ' live=' + liveUser.id + ' — score will go to LIVE user');
                }
                if (liveUser) {
                    try {
                        const lp = await getSupabase().from('profiles')
                            .select('nickname').eq('id', liveUser.id).maybeSingle();
                        liveNick = (lp.data && lp.data.nickname) || liveUser.email || '';
                    } catch(_) { liveNick = liveUser.email || ''; }
                }
            } catch(e) {
                console.warn('[burger.record] getUser threw:', e);
            }

            try{
                const {data,error}=await getSupabase().rpc('record_burger_attempt',{
                    p_burgers_completed: burgersCompleted,
                    p_ingredients_caught: ingredientsCaught,
                    p_level_reached: level,
                    p_duration_ms: duration
                });
                if(!error){
                    recordOk=true;
                    if(data?.is_personal_best) pbMsg='🏆 개인 신기록!';
                    try{
                        console.log('[burger.record] OK score=' + (data&&data.score) +
                                    ' is_pb=' + (data&&data.is_personal_best) +
                                    ' attributed to live user.id=' + (liveUser&&liveUser.id));
                    }catch(_){}
                }else{
                    recordErrKind=_classifyErr(error);
                    console.warn('[burger.record_burger_attempt]', error);
                    if(recordErrKind==='missing_migration')_logDeployHint();
                    if(recordErrKind==='rate_limit') pbMsg='⏸ 1시간 내 30회 한도 초과';
                }
            }catch(e){
                recordErrKind=_classifyErr(e);
                console.warn('[burger.record_burger_attempt]', e);
                if(recordErrKind==='missing_migration')_logDeployHint();
            }
        }

        let rankInfo=null, rankErrKind=null;
        if(me){
            try{
                const r=await getSupabase().rpc('burger_rank_info');
                if(r.error){
                    rankErrKind=_classifyErr(r.error);
                    console.warn('[burger.burger_rank_info]', r.error);
                    if(rankErrKind==='missing_migration')_logDeployHint();
                }else if(r.data?.has_record){
                    rankInfo=r.data;
                }
            }catch(e){
                rankErrKind=_classifyErr(e);
                console.warn('[burger.burger_rank_info]', e);
                if(rankErrKind==='missing_migration')_logDeployHint();
            }
        }
        /* Anon: skip personal rank_info (no auth.uid()). World leaderboard
           still loaded below via loadLeaderboard(currentScope). */

        /* Fallback: burger_my_stats already exposes world_rank since the
           original game migration. If burger_rank_info isn't deployed
           (e.g. user hasn't run the latest SQL yet), we still surface
           a real rank from the legacy RPC. total_world_players + percentile
           remain unknown without rank_info — those slots stay empty. */
        if(!rankInfo && rankErrKind && me){
            try{
                const m=await getSupabase().rpc('burger_my_stats');
                if(!m.error){
                    if(m.data?.has_record && m.data.world_rank!=null){
                        rankInfo={
                            has_record:true,
                            world_rank:m.data.world_rank,
                            total_world_players:null,
                            percentile:null,
                            best_score:m.data.best_score,
                            _fallback:true
                        };
                    }
                    /* my_stats RPC succeeded → dismiss the rank_info error
                       even when has_record is false. UI then falls into the
                       recordOk-driven branch below ("🎉 첫 기록" or the
                       record-failure branch) instead of an alarming
                       "랭킹 조회 실패". */
                    rankErrKind=null;
                }
            }catch(_){ }
        }

        if(rankInfo){
            const d=rankInfo;
            const rank=(d.world_rank||0).toLocaleString();
            /* Short headline + long subline so a narrow card never
               clips on the right edge. Subline parts are individually
               omitted when null so the my_stats fallback (no
               percentile/total) still renders cleanly. */
            $('ovRankNum').textContent='🌍 #'+rank;
            const parts=[];
            if(d.percentile!=null) parts.push('상위 '+d.percentile+'%');
            if(d.total_world_players!=null) parts.push(d.total_world_players.toLocaleString()+'명 중');
            $('ovRankPct').textContent=parts.join(' · ');
        }else if(rankErrKind==='missing_migration'||recordErrKind==='missing_migration'){
            /* Admin needs to deploy the migrations. Calmer language for
               end users (most won't be the admin); detail in console. */
            $('ovRankNum').textContent='🛠 랭킹 시스템 점검 중';
            $('ovRankPct').textContent='잠시 후 다시 시도해주세요';
        }else if(rankErrKind||recordErrKind==='unknown'){
            $('ovRankNum').textContent='⚠️ 랭킹 등록 실패';
            $('ovRankPct').textContent='네트워크를 확인하고 다시 시도해주세요';
        }else if(!recordOk && recordErrKind==='invalid'){
            $('ovRankNum').textContent='⚠️ 점수 검증 실패';
            $('ovRankPct').textContent='비정상적으로 빠른 진행 감지';
        }else if(!recordOk && recordErrKind==='no_auth'){
            $('ovRankNum').textContent='🔐 로그인이 필요해요';
            $('ovRankPct').textContent='로그인 후 다시 시도';
        }else if(recordErrKind==='no_login'){
            /* Anon-friendly upsell: not an error — they intentionally
               played without logging in. Encourage signup, but the world
               leaderboard still loads (loadLeaderboard call below). */
            $('ovRankNum').textContent='🔒 로그인하면 기록 저장!';
            $('ovRankPct').textContent='랭킹 등록은 로그인 사용자만 가능';
        }else if(!recordOk){
            $('ovRankNum').textContent='⚠️ 기록 저장 실패';
            $('ovRankPct').textContent='잠시 후 다시 시도해주세요';
        }else{
            $('ovRankNum').textContent='🎉 첫 기록 등록!';
            $('ovRankPct').textContent='월드 랭킹 진입 완료';
        }
        $('ovRankPb').textContent=pbMsg;
        /* Debug slot kept in DOM for inspection but blank for end users.
           Raw error text used to surface here (alarming + non-actionable).
           Devs can read details in console (we console.warn every error
           with a [game.rpc_name] prefix). */
        $('ovRankDebug').textContent='';

        /* "기록 등록 계정" line — visible reminder of which account just
           received this score. Reads the LIVE session (resolved above as
           liveUser/liveNick) so a session mismatch is obvious before the
           user closes the overlay. Same logic as dodge/space-z: if the
           live session differs from the booted session, flag it as a
           warning since the score has actually been recorded under
           liveUser, not the cached chip nickname in the topbar. */
        const acctEl = $('ovRankAcct');
        if (acctEl) {
            if (!me) {
                /* Anon player — friendly upsell, NOT an error. Cyan tone
                   matches the rest of the anon hint above. */
                acctEl.textContent = '🌐 비회원 (게스트 플레이) — 로그인하면 기록 저장';
                acctEl.style.color = 'rgba(0,217,255,.85)';
            } else if (!liveUser) {
                acctEl.textContent = '⚠ 로그인 세션이 끊김 — 점수 미등록';
                acctEl.style.color = 'rgba(255,180,80,.85)';
            } else if (meIdAtBoot && liveUser.id !== meIdAtBoot) {
                acctEl.innerHTML = '⚠ 게임 도중 계정 전환 — 기록 등록 계정: <strong>'
                    + esc(liveNick || '(' + liveUser.id.slice(0,8) + ')') + '</strong>';
                acctEl.style.color = 'rgba(255,180,80,.95)';
            } else if (recordOk) {
                acctEl.innerHTML = '기록 등록 계정: <strong>'
                    + esc(liveNick || meNickAtBoot || '(나)') + '</strong>';
                acctEl.style.color = 'rgba(255,255,255,.55)';
            } else {
                acctEl.innerHTML = '대상 계정: <strong>'
                    + esc(liveNick || meNickAtBoot || '(나)') + '</strong>';
                acctEl.style.color = 'rgba(255,255,255,.45)';
            }
        }

        loadMyStats();
        loadLeaderboard(currentScope);
    })();

    try{
        const ad=$('adSlot');
        if(ad.style.display==='none' || !ad.style.display){
            ad.style.display='block';
            (adsbygoogle=window.adsbygoogle||[]).push({});
        }
    }catch(_){}
}

/* ========================================================================
   Layout constants — derived from W × H (360 × 540 logical). All coords
   below are relative to that logical space; fitCanvas takes care of DPR.
   ======================================================================== */
const HUD_H = 40;
const PANEL_Y = HUD_H + 14;
const PANEL_H = 230;
const TIMEBAR_Y = PANEL_Y + PANEL_H + 10;
const TIMEBAR_H = 14;
const PLATE_ROW_Y = TIMEBAR_Y + TIMEBAR_H + 14;
const PLATE_ROW_H = 114;
const PLATE_W = 60;
const PLATE_GAP = 6;
const PLATE_ROW_TOTAL_W = 5*PLATE_W + 4*PLATE_GAP;
const PLATE_ROW_X0 = (W - PLATE_ROW_TOTAL_W) / 2;

/* ========================================================================
   Update — pure time decay; all real game state advances inside onTap().
   ======================================================================== */
function update(now, dt){
    timeLeft -= dt;
    if (timeLeft <= 0){
        timeLeft = 0;
        gameOver();
    }
    /* Prune stale flash/pop records so the lists don't grow unbounded. */
    if (tapFlashes.length){
        tapFlashes = tapFlashes.filter(f => now - f.bornAt < 500);
    }
    if (stackPops.length > 16){
        stackPops = stackPops.filter(s => now - s.bornAt < 400);
    }
    if (plateLifts.length){
        plateLifts = plateLifts.filter(l => now - l.bornAt < 260);
    }
}

/* ========================================================================
   Tap handler — maps a canvas-local (x,y) to an ingredient plate index,
   or ignores the tap if it landed outside the plate row. Correct tap
   advances progress + combo; wrong tap resets combo and docks 2 s.
   ======================================================================== */
function plateHitIndex(x, y){
    const top = PLATE_ROW_Y - 4;
    const bot = PLATE_ROW_Y + PLATE_ROW_H + 4;
    if (y < top || y > bot) return -1;
    const rel = x - PLATE_ROW_X0;
    for (let i=0; i<5; i++){
        const x0 = i*(PLATE_W + PLATE_GAP);
        if (rel >= x0 - 4 && rel <= x0 + PLATE_W + 4) return i;
    }
    return -1;
}

function onTap(x, y){
    if (!running || paused) return;
    const idx = plateHitIndex(x, y);
    if (idx < 0) return;
    const id = TAP_IDS[idx];
    const now = performance.now();
    const expected = sample[progress];

    /* Plate-lift bounce + ceramic "tink" — fires for ANY tap (right or
       wrong) so the player gets immediate physical feedback that their
       tap landed before the score/timer logic below decides the outcome. */
    plateLifts.push({ idx, bornAt: now });
    sfxPlate();

    if (id === expected){
        progress++;
        ingredientsCaught++;
        combo++;
        if (combo > maxCombo) maxCombo = combo;
        const gain = Math.round(10 * level * (1 + combo*0.05));
        score += gain;
        tapFlashes.push({ idx, bornAt: now, kind:'good' });
        stackPops.push({ layer: progress-1, bornAt: now });
        popText = combo >= 2 ? (combo + ' COMBO') : ('+' + gain);
        popKind = 'good';
        popUntil = now + 550;
        sfxTap(combo);
        if(navigator.vibrate) try{ navigator.vibrate(8); }catch(_){}

        if (progress >= sample.length){
            /* Burger done — count it, award bonus, and REFRESH the sample
               at the SAME level until we've cleared LEVEL_BURGERS (=5) of
               them. Only then does the difficulty step up. This gives the
               player a stable tier to settle into before the next jump. */
            burgersCompleted++;
            burgersThisLevel++;
            clearUntil = now + 1300;
            const levelingUp = burgersThisLevel >= LEVEL_BURGERS;
            const bonus = (levelingUp ? 200 : 100) * level + Math.floor(timeLeft) * 5;
            score += bonus;
            popText = levelingUp ? ('LEVEL UP! +' + bonus) : ('COMPLETE +' + bonus);
            popKind = 'complete';
            popUntil = now + (levelingUp ? 1200 : 950);
            flashUntil = now + (levelingUp ? 800 : 550);
            if (levelingUp){
                level++;
                burgersThisLevel = 0;
                sfxLevelUp();
            } else {
                sfxComplete();
            }
            /* Each burger ends a stage → timer refills to the full
               per-stage budget. Difficulty comes from sample length
               (generateSample uses level), not a shrinking clock. */
            timeLevelBudget = timeForLevel(level);
            timeLeft = timeLevelBudget;
            sample = generateSample(level);
            progress = 0;
            stackPops = [];
            if(navigator.vibrate) try{ navigator.vibrate(levelingUp ? [25,40,25,40,25,40,120] : [20,40,20,40,100]); }catch(_){}
        }
        $('scoreNow').textContent = score;
        $('levelNow').textContent = level;
    } else {
        combo = 0;
        timeLeft = Math.max(0, timeLeft - 2);
        tapFlashes.push({ idx, bornAt: now, kind:'bad' });
        popText = '-2초';
        popKind = 'bad';
        popUntil = now + 650;
        shakeUntil = now + 320;
        sfxWrong();
        const wrap = $('canvasWrap');
        wrap.classList.remove('shake'); void wrap.offsetWidth; wrap.classList.add('shake');
        setTimeout(()=>wrap.classList.remove('shake'), 420);
        if(navigator.vibrate) try{ navigator.vibrate([40,30,90]); }catch(_){}
        if (timeLeft <= 0) gameOver();
    }
}

/* ========================================================================
   Render
   ======================================================================== */
function draw(now){
    /* Base background + warm floor-glow to echo the image's "cartoon
       diner" feel without dropping the dark-theme consistency. */
    ctx.fillStyle = '#1c1230';
    ctx.fillRect(0, 0, W, H);
    const g = ctx.createRadialGradient(W/2, H-40, 30, W/2, H-40, W*0.85);
    g.addColorStop(0, 'rgba(255,183,77,.14)');
    g.addColorStop(1, 'rgba(255,183,77,0)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

    drawHUD(now);
    drawBurgerPanels(now);
    drawTimeBar(now);
    drawIngredientRow(now);
    drawPops(now);
    drawClearBanner(now);

    if (now < flashUntil){
        const rem = flashUntil - now;
        ctx.fillStyle = 'rgba(0,230,118,'+ (rem/1500) +')';
        ctx.fillRect(0, 0, W, H);
    }
    /* ---- Pause indicator ---- */
    if(paused && running){
        ctx.fillStyle='rgba(5,5,15,.74)';
        ctx.fillRect(0, 0, W, H);
        ctx.font='bold 28px Orbitron,sans-serif';
        ctx.fillStyle='#FFB74D';
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        ctx.fillText('PAUSED', W/2, H/2);
        ctx.font='13px Noto Sans KR,sans-serif';
        ctx.fillStyle='rgba(255,255,255,.6)';
        ctx.fillText('▶ 재개 버튼 / Space', W/2, H/2+34);
        ctx.textAlign='left';
        ctx.textBaseline='alphabetic';
    }
}

function drawHUD(now){
    /* Left: LV badge + 5-burgers-per-level progress dots.
       Centre:  score.
       Right:   seconds remaining (reddens when critical). */
    ctx.fillStyle = '#FFE66D';
    ctx.font = '900 15px Orbitron, sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    const lvLabel = 'LV ' + level;
    ctx.fillText(lvLabel, 14, HUD_H/2);
    const lvTextW = ctx.measureText(lvLabel).width;
    /* Progress dots: filled for completed burgers at this level, hollow
       for remaining. LEVEL_BURGERS = 5 so the row is always exactly 5
       pips wide. */
    const dotR = 3;
    const dotGap = 5;
    const dotsX0 = 14 + lvTextW + 8;
    for (let i=0; i<LEVEL_BURGERS; i++){
        const dx = dotsX0 + i*(dotR*2 + dotGap);
        if (i < burgersThisLevel){
            ctx.fillStyle = '#00E676';
            ctx.beginPath();
            ctx.arc(dx, HUD_H/2, dotR, 0, Math.PI*2);
            ctx.fill();
        } else {
            ctx.strokeStyle = 'rgba(255,255,255,.35)';
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.arc(dx, HUD_H/2, dotR, 0, Math.PI*2);
            ctx.stroke();
        }
    }

    ctx.fillStyle = '#fff';
    ctx.font = '900 17px Orbitron, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(score, W/2, HUD_H/2);

    const critical = timeLeft < 3;
    ctx.fillStyle = critical ? '#FF6B8B' : '#FFB74D';
    ctx.font = '900 17px Orbitron, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText((Math.max(0, timeLeft)).toFixed(1) + 's', W-14, HUD_H/2);

    ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
}

function drawBurgerPanels(now){
    const panelW = 150;
    const gap = 16;
    const leftX  = (W/2) - panelW - gap/2;
    const rightX = (W/2) + gap/2;

    drawBurgerIn(now, leftX,  PANEL_Y, panelW, PANEL_H, sample, sample.length, 'sample');
    drawBurgerIn(now, rightX, PANEL_Y, panelW, PANEL_H, sample.slice(0, progress), progress, 'wip');

    /* Labels below each plate. 내 버거 turns green on completion. */
    ctx.textAlign = 'center';
    ctx.font = '700 11px "Noto Sans KR", sans-serif';
    ctx.fillStyle = 'rgba(255,230,109,.75)';
    ctx.fillText('🎯 목표', leftX + panelW/2, PANEL_Y + PANEL_H - 2);
    ctx.fillStyle = progress >= sample.length ? '#00E676' : 'rgba(255,183,77,.8)';
    ctx.fillText('내 버거', rightX + panelW/2, PANEL_Y + PANEL_H - 2);

    /* Thin dashed divider down the middle between the two panels. */
    ctx.strokeStyle = 'rgba(255,255,255,.10)';
    ctx.setLineDash([4, 5]);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(W/2, PANEL_Y + 20);
    ctx.lineTo(W/2, PANEL_Y + PANEL_H - 28);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.textAlign = 'start';
}

function drawBurgerIn(now, px, py, pw, ph, fillings, filledCount, kind){
    const plateCx = px + pw/2;
    const plateCy = py + ph - 24;
    const plateW = pw - 28;
    const plateH = 16;

    /* Plate shadow */
    ctx.fillStyle = 'rgba(0,0,0,.32)';
    ctx.beginPath();
    ctx.ellipse(plateCx, plateCy + 9, plateW*0.55, 5, 0, 0, Math.PI*2);
    ctx.fill();

    /* Plate disk — soft 3-stop gradient so it reads as actual porcelain
       instead of a flat oval (matches the bright cartoon vibe of the
       ingredients above). */
    const pg = ctx.createLinearGradient(0, plateCy-9, 0, plateCy+9);
    pg.addColorStop(0,   '#FFFFFF');
    pg.addColorStop(0.6, '#EEF1F6');
    pg.addColorStop(1,   '#C8CDD9');
    ctx.fillStyle = pg;
    ctx.beginPath();
    ctx.ellipse(plateCx, plateCy, plateW/2, plateH/2, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,.14)';
    ctx.lineWidth = 1.2;
    ctx.stroke();
    /* Plate rim shine */
    ctx.fillStyle = 'rgba(255,255,255,.45)';
    ctx.beginPath();
    ctx.ellipse(plateCx - plateW*0.18, plateCy - plateH*0.22, plateW*0.12, plateH*0.22, 0, 0, Math.PI*2);
    ctx.fill();

    /* Per-ingredient stack heights — buns are domes / patty is thick /
       cheese-tomato-onion are thin slices. Previously every layer was a
       uniform 16 px, which made the "burger" look like a striped bar
       instead of real food. */
    const innerW = Math.min(plateW * 0.92, 124);
    let y = plateCy - 9;   /* top edge of the topmost item so far (going up) */

    /* Bottom bun always visible */
    y -= LAYER_H.bunBottom;
    INGREDIENTS.bunBottom.draw(plateCx, y + LAYER_H.bunBottom/2, innerW, LAYER_H.bunBottom);

    /* Filling layers */
    for (let i = 0; i < filledCount; i++){
        const id = fillings[i];
        const layerH = LAYER_H[id];
        y -= layerH;
        let scale = 1;
        if (kind === 'wip'){
            const pop = stackPops.find(p => p.layer === i && now - p.bornAt < 260);
            if (pop){
                const t = (now - pop.bornAt) / 260;
                scale = 1 + (1-t) * 0.3;
            }
        }
        ctx.save();
        ctx.translate(plateCx, y + layerH/2);
        ctx.scale(scale, scale);
        INGREDIENTS[id].draw(0, 0, innerW, layerH);
        ctx.restore();
    }

    const showTop = kind === 'sample' || filledCount >= sample.length;
    if (showTop){
        y -= LAYER_H.bunTop;
        INGREDIENTS.bunTop.draw(plateCx, y + LAYER_H.bunTop/2, innerW, LAYER_H.bunTop);
    } else if (kind === 'wip'){
        /* "Next needed" ghost — translucent pulsing silhouette of the
           expected filling at the next slot, plus a dashed yellow frame
           around it. Lets the player see what to tap without glancing
           back at the target panel. */
        const id = sample[filledCount];
        const layerH = LAYER_H[id];
        y -= layerH;
        const pulse = 0.30 + 0.18*Math.sin(now/220);
        ctx.save();
        ctx.globalAlpha = pulse;
        INGREDIENTS[id].draw(plateCx, y + layerH/2, innerW, layerH);
        ctx.restore();
        ctx.save();
        ctx.strokeStyle = 'rgba(255,230,102,.75)';
        ctx.setLineDash([3,3]);
        ctx.lineWidth = 1;
        drawRR(plateCx-innerW/2-3, y-2, innerW+6, layerH+4, 5);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
    }
}

function drawTimeBar(now){
    const x = 18, y = TIMEBAR_Y, w = W - 36, h = TIMEBAR_H;
    /* Track */
    ctx.fillStyle = 'rgba(255,255,255,.06)';
    drawRR(x, y, w, h, h/2); ctx.fill();
    /* Fill */
    const frac = timeLevelBudget > 0 ? Math.max(0, Math.min(1, timeLeft / timeLevelBudget)) : 0;
    const fw = Math.max(0, (w - 2) * frac);
    let col = '#00E676';
    if (frac <= 0.25)      col = '#FF6B8B';
    else if (frac <= 0.5)  col = '#FFE066';
    if (fw > 0){
        ctx.fillStyle = col;
        drawRR(x+1, y+1, fw, h-2, (h-2)/2); ctx.fill();
    }
    /* Critical-time pulse overlay */
    if (frac <= 0.25 && fw > 0){
        const pulse = 0.35 + 0.35*Math.abs(Math.sin(now/120));
        ctx.fillStyle = 'rgba(255,107,139,'+pulse+')';
        drawRR(x+1, y+1, fw, h-2, (h-2)/2); ctx.fill();
    }
}

/* ========================================================================
   drawCylinderSide — paints the SIDE WALL of a round ingredient (patty,
   tomato, onion) viewed from 15° above the horizontal. Unlike the flat
   2D rectangle that INGREDIENTS catalog draw uses, this path has CURVED
   top + bottom edges (the front halves of each rim ellipse), so the
   filling reads as "a cylindrical slice tilted toward the viewer", not
   as a flat decal. Used for round ingredients only — lettuce stays
   INGREDIENTS-irregular (real lettuce is fluffy/non-cylindrical) and
   cheese stays INGREDIENTS-rectangular (square slab).

   Path geometry — h is the shape's full vertical extent on screen:
     - Sides: vertical lines at x = cx ± rx
     - Top edge: front half of top ellipse (curving DOWN at center,
       since we see the front rim of the top from slightly above)
     - Bottom edge: front half of bottom ellipse (same curve)
     - The shape is taller at the center column (where the front of
       top dips down + the front of bottom bulges down) than at the
       sides — exactly the silhouette of a tilted cylinder.

   Per-ingredient fill: vertical gradient + clipped texture pass +
   outline. Texture echoes the INGREDIENTS catalog (bumpy patty char,
   tomato seed pockets, onion ring partitions) reinterpreted for a
   cylinder surface rather than a flat side decal.
   ======================================================================== */
function drawCylinderSide(id, cx, cy, w, h){
    const rx = w / 2;
    const ry = Math.max(2, rx * 0.26);
    function _path(){
        ctx.beginPath();
        ctx.moveTo(cx - rx, cy - h/2);                              /* top-left corner */
        ctx.ellipse(cx, cy - h/2, rx, ry, 0, Math.PI, 0, true);     /* front of top rim */
        ctx.lineTo(cx + rx, cy + h/2 - ry);                         /* down right edge */
        ctx.ellipse(cx, cy + h/2 - ry, rx, ry, 0, 0, Math.PI, false); /* front of bottom rim */
        ctx.closePath();
    }

    switch (id){
        case 'patty': {
            /* Dark brown grilled meat. Vertical gradient (lit on top from
               key light + shaded at the bottom). Texture: char fragments
               + warm juice droplets, scattered through the side wall. */
            const g = ctx.createLinearGradient(0, cy - h/2, 0, cy + h/2);
            g.addColorStop(0,    '#7E4622');
            g.addColorStop(0.45, '#4A2512');
            g.addColorStop(1,    '#1F0C04');
            ctx.fillStyle = g;
            _path(); ctx.fill();
            ctx.save();
            _path(); ctx.clip();
            ctx.fillStyle = 'rgba(160,90,50,.6)';
            [[-.5,-.1],[.4,.0],[-.2,.2],[.5,.3],[.0,-.3],[-.4,.3]].forEach(([dx,dy])=>{
                ctx.beginPath();
                ctx.ellipse(cx + dx*rx, cy + dy*h*0.4, rx*0.08, ry*0.9, 0, 0, Math.PI*2);
                ctx.fill();
            });
            ctx.fillStyle = 'rgba(255,180,90,.5)';
            [[-.3,.1],[.2,-.15],[.4,.2]].forEach(([dx,dy])=>{
                ctx.beginPath();
                ctx.arc(cx + dx*rx, cy + dy*h*0.35, Math.max(0.7, rx*0.06), 0, Math.PI*2);
                ctx.fill();
            });
            ctx.restore();
            ctx.strokeStyle = 'rgba(0,0,0,.5)';
            ctx.lineWidth = 0.85;
            _path(); ctx.stroke();
            break;
        }
        case 'tomato': {
            /* Glossy red flesh. Pale yellow seed pockets (vertical
               streaks) scattered around the side, with tiny brown seeds
               inside. Top half gets a sheen overlay for the wet glossy
               read. */
            const g = ctx.createLinearGradient(0, cy - h/2, 0, cy + h/2);
            g.addColorStop(0,    '#FF7A6A');
            g.addColorStop(0.4,  '#E73E2E');
            g.addColorStop(1,    '#9C1F1B');
            ctx.fillStyle = g;
            _path(); ctx.fill();
            ctx.save();
            _path(); ctx.clip();
            ctx.fillStyle = 'rgba(255,248,180,.72)';
            const seeds = [[-.5,0],[-.2,-.15],[.1,.1],[.35,-.15],[.5,.2],[-.35,.3]];
            seeds.forEach(([dx,dy])=>{
                ctx.beginPath();
                ctx.ellipse(cx + dx*rx, cy + dy*h*0.4, rx*0.07, ry*0.9, 0, 0, Math.PI*2);
                ctx.fill();
            });
            ctx.fillStyle = 'rgba(140,100,30,.7)';
            seeds.forEach(([dx,dy])=>{
                ctx.beginPath();
                ctx.arc(cx + dx*rx, cy + dy*h*0.4, Math.max(0.5, rx*0.035), 0, Math.PI*2);
                ctx.fill();
            });
            const sg = ctx.createLinearGradient(0, cy - h/2, 0, cy);
            sg.addColorStop(0, 'rgba(255,200,180,.42)');
            sg.addColorStop(1, 'rgba(255,200,180,0)');
            ctx.fillStyle = sg;
            ctx.fillRect(cx - rx, cy - h/2, rx*2, h*0.6);
            ctx.restore();
            ctx.strokeStyle = 'rgba(120,20,20,.55)';
            ctx.lineWidth = 0.75;
            _path(); ctx.stroke();
            break;
        }
        case 'onion': {
            /* Pale onion flesh. Vertical hairlines mark the radial layer
               boundaries seen edge-on (concentric onion rings cut
               vertically project to vertical partitions on the side
               wall). Subtle horizontal bands suggest the natural curve
               of the cylinder under the light. */
            const g = ctx.createLinearGradient(0, cy - h/2, 0, cy + h/2);
            g.addColorStop(0,    '#FBF4FD');
            g.addColorStop(0.5,  '#E2D2EC');
            g.addColorStop(1,    '#A382C0');
            ctx.fillStyle = g;
            _path(); ctx.fill();
            ctx.save();
            _path(); ctx.clip();
            ctx.strokeStyle = 'rgba(140,105,170,.55)';
            ctx.lineWidth = 0.7;
            for (let i=1; i<=4; i++){
                const px = cx - rx + (i / 5) * rx * 2;
                ctx.beginPath();
                ctx.moveTo(px, cy - h/2);
                ctx.lineTo(px, cy + h/2);
                ctx.stroke();
            }
            ctx.strokeStyle = 'rgba(180,160,200,.3)';
            ctx.lineWidth = 0.5;
            for (let i=1; i<3; i++){
                const ly = cy - h/2 + ry + (i / 3) * (h - ry);
                ctx.beginPath();
                ctx.moveTo(cx - rx, ly);
                ctx.lineTo(cx + rx, ly);
                ctx.stroke();
            }
            ctx.restore();
            ctx.strokeStyle = 'rgba(100,80,140,.55)';
            ctx.lineWidth = 0.75;
            _path(); ctx.stroke();
            break;
        }
    }
}

/* ========================================================================
   drawCheesePalette — swiss-style cheese block on a plate, viewed from
   ~15° diagonal. Different rendering from the burger-stack cheese
   (INGREDIENTS.cheese, which has melt drips appropriate for between-bun
   context). Here on the plate, the cheese is a fresh slab with eyes
   (holes), trapezoidal top via slight one-point perspective (back edge
   converges to ~88 % of front width), and a thin front-facing side wall
   showing thickness — matches the swiss-cheese reference image the
   user shared.

   Inputs:
     cx        horizontal centre
     bottomY   y-coordinate where the cheese bottom rests on the plate
     w         total horizontal width
     thick     side-wall thickness in screen pixels (typically 2–3 for
               a thin slice)

   Geometry:
     Front edge   y = bottomY − thick                 width = w
     Back edge    y = bottomY − thick − 2·ry          width = w·0.88
     ry = w/2 × sin(15°) ≈ 0.26 × rx
     Total visual height = 2·ry + thick (≈ 13 px for w=44, thick=2)
   ======================================================================== */
function drawCheesePalette(cx, bottomY, w, thick){
    const rx = w / 2;
    const ry = rx * 0.26;
    const backShrink = 0.88;     /* back edge width = 88 % of front */

    const fY = bottomY - thick;
    const bY = fY - 2 * ry;
    const fL = cx - rx,            fR = cx + rx;
    const bL = cx - rx*backShrink, bR = cx + rx*backShrink;

    /* Side wall (front face), drawn first so anything that overlaps
       from above lands on top of it. Vertical gradient warm yellow →
       darker amber at the bottom. */
    const wallG = ctx.createLinearGradient(0, fY, 0, bottomY);
    wallG.addColorStop(0, '#E8B92E');
    wallG.addColorStop(1, '#A87714');
    ctx.fillStyle = wallG;
    ctx.fillRect(fL, fY, rx*2, thick);
    /* Subtle shadow at the joint with the top face. */
    const wallShadow = ctx.createLinearGradient(0, fY, 0, fY + thick*0.55);
    wallShadow.addColorStop(0, 'rgba(80,50,5,.35)');
    wallShadow.addColorStop(1, 'rgba(80,50,5,0)');
    ctx.fillStyle = wallShadow;
    ctx.fillRect(fL, fY, rx*2, thick*0.55);

    /* Top face (trapezoid). Bright yellow at the back (key-light face),
       warmer mid, deeper amber at the front rim. */
    const topG = ctx.createLinearGradient(0, bY, 0, fY);
    topG.addColorStop(0,    '#FFEC8A');
    topG.addColorStop(0.5,  '#FFD445');
    topG.addColorStop(1,    '#E8A412');
    ctx.fillStyle = topG;
    ctx.beginPath();
    ctx.moveTo(fL, fY);
