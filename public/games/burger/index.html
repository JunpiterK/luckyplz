    ctx.lineTo(fR, fY);
    ctx.lineTo(bR, bY);
    ctx.lineTo(bL, bY);
    ctx.closePath();
    ctx.fill();

    /* Cheese eyes — fixed deterministic positions in normalized
       (u, v) coords. u ∈ [−1, 1] is horizontal at the depth's local
       half-width, v ∈ [0, 1] interpolates back→front. Sizes shrink
       slightly toward the back so the perspective scales feel right. */
    const eyes = [
        [-0.50, 0.22, 0.13],
        [-0.12, 0.55, 0.10],
        [ 0.28, 0.32, 0.08],
        [ 0.48, 0.68, 0.06],
        [-0.65, 0.55, 0.06],
        [ 0.15, 0.85, 0.07],
        [-0.30, 0.85, 0.05],
        [ 0.55, 0.18, 0.05]
    ];
    ctx.save();
    /* Clip to the trapezoid so eyes near the rim don't bleed outside. */
    ctx.beginPath();
    ctx.moveTo(fL, fY); ctx.lineTo(fR, fY);
    ctx.lineTo(bR, bY); ctx.lineTo(bL, bY);
    ctx.closePath();
    ctx.clip();
    eyes.forEach(([u, v, s]) => {
        const halfW = rx * (backShrink + (1 - backShrink) * v);
        const ex = cx + u * halfW;
        const ey = bY + (fY - bY) * v;
        /* Min 0.7 px so even the smallest eye stays visible on a tiny
           palette tile. */
        const er = Math.max(0.7, rx * s * (backShrink + (1 - backShrink) * v));
        /* Outer rim — slightly darker than base so the hole reads as
           recessed. */
        ctx.fillStyle = '#A07514';
        ctx.beginPath();
        ctx.arc(ex, ey, er, 0, Math.PI*2);
        ctx.fill();
        /* Inner shadow gradient — radial, brighter on upper-left where
           the rim catches light, darker on lower-right. */
        const eg = ctx.createRadialGradient(
            ex - er*0.25, ey - er*0.3, er*0.05,
            ex,            ey,         er*0.95
        );
        eg.addColorStop(0,   'rgba(170,110,15,.55)');
        eg.addColorStop(0.6, 'rgba(110,75,8,.85)');
        eg.addColorStop(1,   'rgba(70,45,5,.7)');
        ctx.fillStyle = eg;
        ctx.beginPath();
        ctx.arc(ex, ey, er * 0.92, 0, Math.PI*2);
        ctx.fill();
    });
    ctx.restore();

    /* Outline. Trapezoid + front side wall rectangle outlines for
       crispness against the plate. */
    ctx.strokeStyle = 'rgba(120,75,8,.55)';
    ctx.lineWidth = 0.85;
    ctx.beginPath();
    ctx.moveTo(fL, fY); ctx.lineTo(fR, fY);
    ctx.lineTo(bR, bY); ctx.lineTo(bL, bY);
    ctx.closePath();
    ctx.stroke();
    /* Side wall: bottom edge + 2 vertical sides. */
    ctx.beginPath();
    ctx.moveTo(fL, bottomY); ctx.lineTo(fR, bottomY);
    ctx.moveTo(fL, fY);      ctx.lineTo(fL, bottomY);
    ctx.moveTo(fR, fY);      ctx.lineTo(fR, bottomY);
    ctx.stroke();
}

/* ========================================================================
   drawIngredientTop — paints the 15°-perspective TOP face of an ingredient
   above the side body produced by INGREDIENTS[id].draw(). Combined with
   the side body, this gives each filling the look of "a ~5cm round slice
   on a plate, viewed from 15° above" — the side body carries the visual
   personality (bumpy patty, ruffled lettuce, juicy tomato seed pockets,
   onion rings, melty cheese) and the top face confirms the 3D shape.

   Round ingredients (lettuce, patty, tomato, onion) get an ELLIPSE top;
   cheese is the only ingredient with a RECTANGULAR top (real cheese
   slices are square slabs). The ellipse/rectangle has ry/height equal
   to rx*sin(15°) ≈ 0.26 — same foreshortening factor used for the plate
   so all 3D objects in the scene share a consistent viewing angle.

   Geometry: cx = horizontal centre, cy = top-face VERTICAL CENTRE in
   screen coords. The top face spans [cy − ry, cy + ry]. The bottom half
   visually overlaps the top of the side body (which is correct — that's
   the front rim of the cylinder), so callers should place this with
   cy = side_body_top_y for the front rim to align cleanly.
   ======================================================================== */
function drawIngredientTop(id, cx, cy, rx, ry){
    if (id === 'cheese'){
        /* Square cheese: 15°-foreshortened rectangle (width unchanged,
           height = depth × sin(15°)). Placed centred at cy so its bottom
           half aligns with the side-slab top edge below. */
        const topY = cy - ry;
        const cheeseW = rx * 2;
        const cheeseH = ry * 2;
        const g = ctx.createLinearGradient(0, topY, 0, topY + cheeseH);
        g.addColorStop(0,    '#FFEC8A');
        g.addColorStop(0.5,  '#FFD445');
        g.addColorStop(1,    '#E8A412');
        ctx.fillStyle = g;
        ctx.fillRect(cx - rx, topY, cheeseW, cheeseH);
        /* Specular sheen across the upper portion. */
        const sg = ctx.createLinearGradient(0, topY, 0, topY + cheeseH*0.6);
        sg.addColorStop(0, 'rgba(255,255,220,.55)');
        sg.addColorStop(1, 'rgba(255,255,220,0)');
        ctx.fillStyle = sg;
        ctx.fillRect(cx - rx, topY, cheeseW, cheeseH*0.6);
        /* Edge outline (darker on bottom for grounding). */
        ctx.strokeStyle = 'rgba(140,90,10,.45)';
        ctx.lineWidth = 0.7;
        ctx.strokeRect(cx - rx, topY, cheeseW, cheeseH);
        return;
    }

    /* Round ingredients — foreshortened ellipse with per-ingredient texture. */
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2);
    ctx.clip();
    switch(id){
        case 'lettuce': {
            const g = ctx.createRadialGradient(cx-rx*0.25, cy-ry*0.4, rx*0.1, cx, cy, rx);
            g.addColorStop(0, '#A4D973');
            g.addColorStop(1, '#3F8C26');
            ctx.fillStyle = g;
            ctx.fillRect(cx-rx, cy-ry, rx*2, ry*2);
            /* Curly leaf-tip dots around the rim. */
            ctx.fillStyle = 'rgba(38,80,30,.55)';
            for (let a=0; a<10; a++){
                const ang = a * Math.PI / 5;
                const px = cx + Math.cos(ang) * rx*0.78;
                const py = cy + Math.sin(ang) * ry*0.78;
                ctx.beginPath();
                ctx.arc(px, py, Math.max(0.8, rx*0.06), 0, Math.PI*2);
                ctx.fill();
            }
            /* Pale heart highlight. */
            ctx.fillStyle = 'rgba(196,235,160,.45)';
            ctx.beginPath();
            ctx.ellipse(cx, cy, rx*0.4, ry*0.4, 0, 0, Math.PI*2);
            ctx.fill();
            break;
        }
        case 'patty': {
            const g = ctx.createRadialGradient(cx-rx*0.15, cy-ry*0.4, rx*0.1, cx, cy, rx);
            g.addColorStop(0, '#5C341B');
            g.addColorStop(1, '#28110A');
            ctx.fillStyle = g;
            ctx.fillRect(cx-rx, cy-ry, rx*2, ry*2);
            /* Three diagonal grill marks. */
            ctx.strokeStyle = 'rgba(15,5,2,.78)';
            ctx.lineWidth = 1.2;
            for (let i=-1; i<=1; i++){
                ctx.beginPath();
                ctx.moveTo(cx - rx, cy + i * ry*0.5);
                ctx.lineTo(cx + rx, cy + i * ry*0.5);
                ctx.stroke();
            }
            /* Speckled char highlights. */
            ctx.fillStyle = 'rgba(170,90,40,.55)';
            for (let i=0; i<4; i++){
                const px = cx + (i - 1.5) * rx*0.45;
                const py = cy + (i % 2 ? ry*0.35 : -ry*0.35);
                ctx.beginPath();
                ctx.ellipse(px, py, rx*0.07, ry*0.5, 0, 0, Math.PI*2);
                ctx.fill();
            }
            break;
        }
        case 'tomato': {
            /* Bright red rim, paler pulpy core. */
            const g = ctx.createRadialGradient(cx, cy, rx*0.05, cx, cy, rx);
            g.addColorStop(0,    '#FFB3A1');
            g.addColorStop(0.45, '#E84A4A');
            g.addColorStop(1,    '#A8221F');
            ctx.fillStyle = g;
            ctx.fillRect(cx-rx, cy-ry, rx*2, ry*2);
            /* Five seed-pocket wedges around the core. */
            ctx.fillStyle = 'rgba(255,248,170,.7)';
            for (let i=0; i<5; i++){
                const ang = i*Math.PI*2/5 + Math.PI/2;
                const px = cx + Math.cos(ang) * rx*0.45;
                const py = cy + Math.sin(ang) * ry*0.45;
                ctx.beginPath();
                ctx.ellipse(px, py, rx*0.11, ry*0.5, ang, 0, Math.PI*2);
                ctx.fill();
            }
            /* Tiny seeds on the wedges. */
            ctx.fillStyle = 'rgba(180,140,30,.7)';
            for (let i=0; i<5; i++){
                const ang = i*Math.PI*2/5 + Math.PI/2;
                const px = cx + Math.cos(ang) * rx*0.45;
                const py = cy + Math.sin(ang) * ry*0.45;
                ctx.beginPath();
                ctx.arc(px, py, Math.max(0.6, rx*0.04), 0, Math.PI*2);
                ctx.fill();
            }
            break;
        }
        case 'onion': {
            const g = ctx.createLinearGradient(0, cy-ry, 0, cy+ry);
            g.addColorStop(0,    '#F7ECFA');
            g.addColorStop(0.55, '#D9C0E5');
            g.addColorStop(1,    '#9C7FAB');
            ctx.fillStyle = g;
            ctx.fillRect(cx-rx, cy-ry, rx*2, ry*2);
            /* Concentric rings — 3 layers. */
            const ringFills = ['#9C7FAB', '#F4EAFA', '#B091C4'];
            for (let i=1; i<=3; i++){
                const sc = 1 - i*0.21;
                ctx.fillStyle = ringFills[(i-1) % ringFills.length];
                ctx.beginPath();
                ctx.ellipse(cx, cy, rx*sc, ry*sc, 0, 0, Math.PI*2);
                ctx.fill();
            }
            /* Centre highlight. */
            ctx.fillStyle = 'rgba(255,255,255,.5)';
            ctx.beginPath();
            ctx.ellipse(cx, cy, rx*0.16, ry*0.16, 0, 0, Math.PI*2);
            ctx.fill();
            break;
        }
    }
    ctx.restore();
    /* Top edge outline so the 15° face reads against the side body below. */
    ctx.strokeStyle = 'rgba(0,0,0,.28)';
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2);
    ctx.stroke();
}

/* ========================================================================
   drawSliceSide — DEPRECATED (kept for reference only, no longer called).
   ========================================================================
   The first iteration of the ingredient palette rendered each filling as
   an abstract cylinder via this function. User feedback was that the
   results "looked like different ingredients" — the cylinders didn't
   carry the personality (bumpy patty, sesame bun-style cheese rim,
   ruffled lettuce, juicy tomato seed pockets) that makes each ingredient
   recognisable at a glance.

   The palette now reuses the SAME INGREDIENTS catalog draw functions the
   stacked burger panel uses (see drawIngredientRow below), with proper
   per-ingredient thicknesses (PALETTE_H map). This function is kept here
   purely so a future contributor reading the file can see the original
   approach and the reasoning behind moving away from it. Safe to delete
   if anyone cleaning up wants to.
   ======================================================================== */
function drawSliceSide(id, cx, cy, w, thick){
    const rx = w / 2;
    const ry = Math.max(2, rx * 0.26);
    /* Side wall closed path: front-half of top ellipse → down the right
       edge → front-half of bottom ellipse (back to left) → up the left
       edge. closePath ties it off. */
    function _wallPath(){
        ctx.beginPath();
        ctx.moveTo(cx - rx, cy);
        /* Front half of top ellipse: PI → 0 anticlockwise (through PI/2 = bottom). */
        ctx.ellipse(cx, cy, rx, ry, 0, Math.PI, 0, true);
        ctx.lineTo(cx + rx, cy + thick);
        /* Front half of bottom ellipse: 0 → PI clockwise (through PI/2). */
        ctx.ellipse(cx, cy + thick, rx, ry, 0, 0, Math.PI, false);
        ctx.closePath();
    }
    function _topPath(){
        ctx.beginPath();
        ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2);
    }

    /* Paint side wall first, then top face (paint order = back-to-front). */
    switch(id){
        case 'lettuce': {
            /* Side: ruffled green band with paler highlights. Top: leafy with
               curly waves around the rim. */
            const sg = ctx.createLinearGradient(0, cy, 0, cy + thick);
            sg.addColorStop(0,    '#5DAE3F');
            sg.addColorStop(0.55, '#3F8C26');
            sg.addColorStop(1,    '#23601A');
            ctx.fillStyle = sg; _wallPath(); ctx.fill();
            /* Vertical streaks → suggest leaf veins from the side. */
            ctx.strokeStyle = 'rgba(160,210,120,.4)';
            ctx.lineWidth = 1;
            for (let i=-2; i<=2; i++){
                ctx.beginPath();
                const x = cx + (i * rx*0.36);
                ctx.moveTo(x, cy + 1);
                ctx.lineTo(x, cy + thick - 1);
                ctx.stroke();
            }
            const tg = ctx.createRadialGradient(cx-rx*.2, cy-ry*.4, rx*.1, cx, cy, rx*1.05);
            tg.addColorStop(0, '#A4D973');
            tg.addColorStop(1, '#3F8C26');
            ctx.fillStyle = tg; _topPath(); ctx.fill();
            /* Curly leaf-tip dots around the rim. */
            ctx.fillStyle = 'rgba(38,80,30,.55)';
            for (let a=0; a<8; a++){
                const ang = a * Math.PI/4;
                const px = cx + Math.cos(ang) * rx*0.78;
                const py = cy + Math.sin(ang) * ry*0.78;
                ctx.beginPath(); ctx.arc(px, py, Math.max(1, rx*0.07), 0, Math.PI*2); ctx.fill();
            }
            break;
        }
        case 'patty': {
            /* Side: very dark grilled crust with even darker bottom. Top:
               char-brown with three diagonal grill marks. */
            const sg = ctx.createLinearGradient(0, cy, 0, cy + thick);
            sg.addColorStop(0,    '#5A2E18');
            sg.addColorStop(0.5,  '#3A1B0C');
            sg.addColorStop(1,    '#1F0E04');
            ctx.fillStyle = sg; _wallPath(); ctx.fill();
            /* Char highlights — bumpy lighter dots on the side wall. */
            ctx.fillStyle = 'rgba(120,60,30,.55)';
            for (let i=0; i<5; i++){
                const px = cx - rx*0.7 + i * (rx*1.4/4);
                const py = cy + thick*0.4 + (i%2) * thick*0.2;
                ctx.beginPath(); ctx.ellipse(px, py, rx*0.1, ry*0.7, 0, 0, Math.PI*2); ctx.fill();
            }
            const tg = ctx.createRadialGradient(cx-rx*.1, cy-ry*.4, rx*.1, cx, cy, rx);
            tg.addColorStop(0, '#5A331C');
            tg.addColorStop(1, '#2A1408');
            ctx.fillStyle = tg; _topPath(); ctx.fill();
            /* Grill marks across the top (visible on the foreshortened ellipse). */
            ctx.strokeStyle = 'rgba(20,8,2,.7)';
            ctx.lineWidth = 1.3;
            ctx.save(); ctx.beginPath(); ctx.ellipse(cx, cy, rx*0.92, ry*0.92, 0, 0, Math.PI*2); ctx.clip();
            for (let i=-1; i<=1; i++){
                ctx.beginPath();
                ctx.moveTo(cx - rx, cy + i * ry*0.45);
                ctx.lineTo(cx + rx, cy + i * ry*0.45);
                ctx.stroke();
            }
            ctx.restore();
            break;
        }
        case 'cheese': {
            /* Side: thinner slab — uses thick*0.55 internally so cheese
               reads as the lone "thin slice" among thicker fillings. */
            const useThick = thick * 0.55;
            const sg = ctx.createLinearGradient(0, cy, 0, cy + useThick);
            sg.addColorStop(0,    '#FFE066');
            sg.addColorStop(0.5,  '#F4B92E');
            sg.addColorStop(1,    '#C68B0E');
            ctx.fillStyle = sg;
            ctx.beginPath();
            ctx.moveTo(cx - rx, cy);
            ctx.ellipse(cx, cy, rx, ry, 0, Math.PI, 0, true);
            ctx.lineTo(cx + rx, cy + useThick);
            ctx.ellipse(cx, cy + useThick, rx, ry, 0, 0, Math.PI, false);
            ctx.closePath();
            ctx.fill();
            /* Top face with subtle melt sheen. */
            const tg = ctx.createRadialGradient(cx-rx*.25, cy-ry*.5, rx*.1, cx, cy, rx);
            tg.addColorStop(0, '#FFEC8A');
            tg.addColorStop(1, '#E8A91C');
            ctx.fillStyle = tg; _topPath(); ctx.fill();
            /* A few cheese-hole dots. */
            ctx.fillStyle = 'rgba(190,120,10,.4)';
            [[-.3,-.1],[.2,-.25],[.3,.15],[-.05,.25]].forEach(([dx,dy])=>{
                ctx.beginPath();
                ctx.arc(cx + dx*rx, cy + dy*ry, Math.max(1, rx*0.06), 0, Math.PI*2);
                ctx.fill();
            });
            break;
        }
        case 'onion': {
            /* Side: pale translucent rings (concentric vertical layers
               showing through). Top: classic onion-ring concentric pattern. */
            const sg = ctx.createLinearGradient(0, cy, 0, cy + thick);
            sg.addColorStop(0,    '#F5E8FF');
            sg.addColorStop(0.55, '#D9C0E5');
            sg.addColorStop(1,    '#9C7FAB');
            ctx.fillStyle = sg; _wallPath(); ctx.fill();
            /* Vertical "ring layer" hairlines on the side wall. */
            ctx.strokeStyle = 'rgba(155,120,180,.45)';
            ctx.lineWidth = 0.7;
            for (let i=1; i<=3; i++){
                const t = i / 4;
                ctx.beginPath();
                ctx.moveTo(cx - rx + t*rx, cy);
                ctx.lineTo(cx - rx + t*rx, cy + thick);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cx + rx - t*rx, cy);
                ctx.lineTo(cx + rx - t*rx, cy + thick);
                ctx.stroke();
            }
            /* Top face — concentric onion rings. */
            ctx.fillStyle = '#E8DBF1'; _topPath(); ctx.fill();
            const ringFills = ['#9C7FAB', '#E8DBF1', '#B091C4', '#F4EAFA'];
            for (let i=1; i<=3; i++){
                const sc = 1 - i*0.22;
                ctx.fillStyle = ringFills[i % ringFills.length];
                ctx.beginPath();
                ctx.ellipse(cx, cy, rx*sc, ry*sc, 0, 0, Math.PI*2);
                ctx.fill();
            }
            break;
        }
        case 'tomato': {
            /* Side: red flesh with seedy interior pockets. Top: red wedges
               around a central pulpy core. */
            const sg = ctx.createLinearGradient(0, cy, 0, cy + thick);
            sg.addColorStop(0,    '#E84A4A');
            sg.addColorStop(0.5,  '#C12A2A');
            sg.addColorStop(1,    '#7F1414');
            ctx.fillStyle = sg; _wallPath(); ctx.fill();
            /* Seed pockets on the side — pale yellow dots. */
            ctx.fillStyle = 'rgba(255,248,180,.85)';
            const seedRows = [
                [-rx*0.5, thick*0.35],[rx*0.0, thick*0.55],[rx*0.45, thick*0.4],
                [-rx*0.25, thick*0.7],[rx*0.25, thick*0.75]
            ];
            seedRows.forEach(([dx,dy])=>{
                ctx.beginPath();
                ctx.ellipse(cx + dx, cy + dy, rx*0.08, ry*0.6, 0, 0, Math.PI*2);
                ctx.fill();
            });
            /* Top face — bright red rim, paler core. */
            const tg = ctx.createRadialGradient(cx, cy, rx*.05, cx, cy, rx);
            tg.addColorStop(0,    '#FFB3A1');
            tg.addColorStop(0.45, '#E84A4A');
            tg.addColorStop(1,    '#A8221F');
            ctx.fillStyle = tg; _topPath(); ctx.fill();
            /* Six pale-yellow wedges around the core (locule pattern). */
            ctx.fillStyle = 'rgba(255,248,170,.55)';
            for (let i=0; i<6; i++){
                const ang = i*Math.PI/3 + Math.PI/6;
                const px = cx + Math.cos(ang) * rx*0.45;
                const py = cy + Math.sin(ang) * ry*0.45;
                ctx.beginPath();
                ctx.ellipse(px, py, rx*0.13, ry*0.45, ang, 0, Math.PI*2);
                ctx.fill();
            }
            break;
        }
    }
    /* Subtle outline so the slice reads against any background. */
    ctx.strokeStyle = 'rgba(0,0,0,.32)';
    ctx.lineWidth = 0.9;
    _wallPath(); ctx.stroke();
    _topPath();  ctx.stroke();
}

function drawIngredientRow(now){
    for (let i=0; i<5; i++){
        const x = PLATE_ROW_X0 + i*(PLATE_W + PLATE_GAP);
        const y = PLATE_ROW_Y;
        const cx = x + PLATE_W/2;

        /* Per-tile lift offset — half-sine bounce over 250 ms. Applied to
           plate Y AND slice Y together so the food rides the plate up. */
        const lift = plateLifts.find(l => l.idx === i);
        let lyOff = 0;
        if (lift){
            const t = (now - lift.bornAt) / 250;
            if (t > 0 && t < 1) lyOff = -Math.sin(t * Math.PI) * 12;
        }

        /* Card background — flash colour pulses for ~400 ms after a tap. */
        const flash = tapFlashes.find(f => f.idx === i);
        let flashCol = null, flashA = 0;
        if (flash){
            const t = (now - flash.bornAt) / 400;
            if (t < 1){
                flashA = 1 - t;
                flashCol = flash.kind === 'good' ? '#00E676' : '#FF6B8B';
            }
        }
        ctx.save();
        ctx.fillStyle = 'rgba(255,255,255,.03)';
        ctx.strokeStyle = flashCol || 'rgba(255,255,255,.1)';
        ctx.lineWidth = flashCol ? 2 : 1;
        drawRR(x, y, PLATE_W, PLATE_ROW_H, 14); ctx.fill(); ctx.stroke();
        if (flashCol){
            ctx.globalAlpha = flashA*0.18;
            ctx.fillStyle = flashCol;
            drawRR(x, y, PLATE_W, PLATE_ROW_H, 14); ctx.fill();
        }
        ctx.restore();

        /* Plate geometry — viewed from ~15° elevation, so a flat ellipse
           with ry/rx ≈ sin(15°). Centred low in the tile so the
           ingredient + the rim highlight have room above. */
        const plateCx = cx;
        const plateCy = y + 90 + lyOff;
        const plateW  = PLATE_W * 0.92;   /* 55 px outer rim */
        const plateRy = plateW * 0.18;    /* ~10 px — flat ellipse for 15° view */
        const wellW   = plateW - 7;       /* ~48 px inner well (plate has a 3.5 px rim) */
        const wellRy  = plateRy - 1.6;
        const wellY   = plateCy + 0.6;     /* well sits a hair below rim (recessed look) */

        /* === Realistic ceramic plate === ----------------------------------
           Layered for depth, light from upper-left:
             1. Static ground shadow (anchored to tile so the lift gap
                visually says "the plate is up").
             2. Outer rim disc — cool grey gradient, slight glaze.
             3. Soft inner rim shadow ring (the rim catches light, casts
                a faint shadow into the well).
             4. Well disc — warm off-white with a vertical gradient.
             5. Specular arc on upper rim (porcelain glaze highlight).
             6. Subtle inner rim line.
           ------------------------------------------------------------------ */

        /* (1) Ground shadow — softer + larger when plate is lifted. */
        const liftMag = lyOff < 0 ? -lyOff : 0;
        const shadowSpread = 4 + liftMag * 0.18;
        const shadowAlpha  = Math.max(0.18, 0.34 - liftMag * 0.012);
        ctx.fillStyle = 'rgba(0,0,0,' + shadowAlpha.toFixed(3) + ')';
        ctx.beginPath();
        ctx.ellipse(plateCx, y + 102, plateW*0.42 + liftMag*0.08, shadowSpread, 0, 0, Math.PI*2);
        ctx.fill();

        /* (2) Outer rim disc — cool porcelain. Vertical gradient for the
              top-lit feel. */
        const rimG = ctx.createLinearGradient(0, plateCy - plateRy, 0, plateCy + plateRy);
        rimG.addColorStop(0,    '#FBFCFD');   /* top edge: brightest highlight */
        rimG.addColorStop(0.45, '#E2E6EE');   /* mid: cool body */
        rimG.addColorStop(1,    '#9DA5B3');   /* bottom: shaded underside */
        ctx.fillStyle = rimG;
        ctx.beginPath();
        ctx.ellipse(plateCx, plateCy, plateW/2, plateRy, 0, 0, Math.PI*2);
        ctx.fill();

        /* (3) Soft inner rim shadow — radial gradient from well edge fades
              outward, simulating the rim casting a tiny shadow into the
              well. Drawn before the well so the well's light surface
              partially covers it. */
        const innerShadow = ctx.createRadialGradient(plateCx, wellY, wellW*0.45, plateCx, wellY, wellW*0.5);
        innerShadow.addColorStop(0,   'rgba(0,0,0,0)');
        innerShadow.addColorStop(0.7, 'rgba(0,0,0,0)');
        innerShadow.addColorStop(1,   'rgba(0,0,0,.18)');
        ctx.fillStyle = innerShadow;
        ctx.beginPath();
        ctx.ellipse(plateCx, wellY, wellW/2, wellRy, 0, 0, Math.PI*2);
        ctx.fill();

        /* (4) Well — warm off-white. Slight peach undertone reads as
              ceramic, not plastic. Vertical gradient (a hair darker at the
              bottom) adds depth. */
        const wellG = ctx.createLinearGradient(0, wellY - wellRy, 0, wellY + wellRy);
        wellG.addColorStop(0,    '#FFFFFF');
        wellG.addColorStop(0.55, '#FBF6EE');
        wellG.addColorStop(1,    '#E2DAC9');
        ctx.fillStyle = wellG;
        ctx.beginPath();
        ctx.ellipse(plateCx, wellY, wellW/2, wellRy, 0, 0, Math.PI*2);
        ctx.fill();

        /* (5) Specular arc — thin glossy highlight along the upper-left
              rim, suggesting wet/glazed porcelain catching the key light. */
        ctx.save();
        ctx.beginPath();
        ctx.ellipse(plateCx, plateCy, plateW/2 - 0.6, plateRy - 0.6, 0, 0, Math.PI*2);
        ctx.clip();
        const specG = ctx.createLinearGradient(plateCx - plateW*0.4, plateCy - plateRy*0.9,
                                                plateCx + plateW*0.1, plateCy - plateRy*0.2);
        specG.addColorStop(0,   'rgba(255,255,255,0)');
        specG.addColorStop(0.5, 'rgba(255,255,255,.55)');
        specG.addColorStop(1,   'rgba(255,255,255,0)');
        ctx.fillStyle = specG;
        ctx.beginPath();
        ctx.ellipse(plateCx - plateW*0.18, plateCy - plateRy*0.55,
                    plateW*0.32, plateRy*0.5, -0.4, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();

        /* (6) Subtle outer outline + inner rim line for definition. */
        ctx.strokeStyle = 'rgba(0,0,0,.22)';
        ctx.lineWidth = 0.9;
        ctx.beginPath();
        ctx.ellipse(plateCx, plateCy, plateW/2, plateRy, 0, 0, Math.PI*2);
        ctx.stroke();
        ctx.strokeStyle = 'rgba(0,0,0,.13)';
        ctx.lineWidth = 0.6;
        ctx.beginPath();
        ctx.ellipse(plateCx, wellY, wellW/2, wellRy, 0, 0, Math.PI*2);
        ctx.stroke();

        /* === Ingredient on the plate ====================================
           Two-pass render so each filling reads as a 3D round (or square,
           for cheese) slice viewed from 15° above the horizontal:

             Pass 1 — SIDE BODY: INGREDIENTS[id].draw() from the same
                catalog the stacked burger panel uses. Carries the visual
                personality (bumpy patty, ruffled lettuce, overhanging
                cheese, juicy tomato).
             Pass 2 — TOP FACE: drawIngredientTop() paints a foreshortened
                ellipse (or rectangle for cheese) above the side body's
                top edge. The ellipse's bottom half overlaps the side
                body's topmost pixels, completing the cylinder illusion.

           PALETTE_H — thickness map. Real-burger ratios suggest patty
           ~3× cheese, but at the small palette tile size (60×114 px) a
           huge patty just makes the row look unbalanced (user feedback:
           "고기 패티만 너무 두꺼워보여"). We compress the range to
           10–20 px so all five ingredients carry similar visual weight
           while the relative ordering (patty > lettuce > tomato > onion
           > cheese) still reads correctly.

           ANCHORING: cy = wellY − h/2 places each ingredient's bottom
           face on the plate's well centre Y (the visible surface plane).
           The 15° top face sits just above the side body — so the whole
           rendered shape extends from (wellY − h) up to (wellY − h − ry)
           where ry = ingW × sin(15°)/2.
           ================================================================ */
        const PALETTE_H = {
            patty:   20,   // thickest filling
            lettuce: 18,   // fluffy
            tomato:  14,   // medium-thin juicy slice
            onion:   12,   // thin ring slice
            cheese:  10    // thinnest, square slab
        };
        const id = TAP_IDS[i];
        const ingH = PALETTE_H[id] || 14;
        const ingW = wellW - 4;          /* ingredient barely smaller than well */
        const ingCy = wellY - ingH/2;    /* bottom of side body = plate surface */

        /* Render dispatch. Each ingredient picks the rendering style that
           matches its real-world shape:
             - patty / tomato / onion: round cylinder slice, side body is
               drawCylinderSide (curved top/bottom rims = 15° tilt cue),
               topped with an elliptical 15° face.
             - lettuce: irregular leafy mass — INGREDIENTS catalog draw,
               which already has ruffled curls + multi-tone leaf body, no
               artificial cylinder top would fit naturally.
             - cheese: square slab — INGREDIENTS catalog draw (with melt
               drips), topped with a 15° rectangular face. */
        if (id === 'patty' || id === 'tomato' || id === 'onion'){
            drawCylinderSide(id, plateCx, ingCy, ingW, ingH);
            const topRx = ingW / 2;
            const topRy = topRx * 0.26;
            /* The top ellipse's centre y matches the side body's TOP
               edge — its bottom half overlaps the body's topmost
               pixels, completing the cylinder illusion. */
            drawIngredientTop(id, plateCx, ingCy - ingH/2, topRx, topRy);
        } else if (id === 'lettuce'){
            /* Lettuce stays organic — no flat top, no cylinder side.
               Just the catalog's fluffy ruffled drawing. */
            INGREDIENTS.lettuce.draw(plateCx, ingCy, ingW, ingH);
        } else { /* cheese */
            /* Swiss-cheese style block: trapezoidal top (slight back-edge
               convergence for 15° one-point perspective) + thin front
               side wall + scattered eyes (holes). Different look from
               INGREDIENTS.cheese (used in burger stack with melt drips
               appropriate for between-bun context). bottomY = wellY puts
               the cheese's base on the plate surface; thick=2 keeps the
               slice visibly thinner than the round fillings. */
            drawCheesePalette(plateCx, wellY, ingW, 2);
        }

        /* Number badge — stays anchored to tile (doesn't lift with plate). */
        ctx.fillStyle = 'rgba(0,0,0,.5)';
        ctx.beginPath();
        ctx.arc(x+11, y+11, 9, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#FFE066';
        ctx.font = '900 10px Orbitron, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(String(i+1), x+11, y+11);
        ctx.textBaseline = 'alphabetic';
        ctx.textAlign = 'start';
    }

    /* One-line progress hint under the row. */
    ctx.fillStyle = 'rgba(255,255,255,.45)';
    ctx.font = '500 11px "Noto Sans KR", sans-serif';
    ctx.textAlign = 'center';
    const hint = progress === 0
        ? '샘플과 같은 순서로 탭'
        : (progress + ' / ' + sample.length + ' · 계속!');
    ctx.fillText(hint, W/2, PLATE_ROW_Y + PLATE_ROW_H + 14);
    ctx.textAlign = 'start';
}

function drawClearBanner(now){
    if (now >= clearUntil) return;
    const rem = clearUntil - now;
    const dur = 1300;
    const t = 1 - rem/dur;
    /* Fade in fast (first 120ms), hold, then fade out in last 300ms */
    const alpha = t < 0.09 ? t/0.09 : (rem < 300 ? rem/300 : 1);
    const scale = t < 0.09 ? (0.6 + 0.4*(t/0.09)) : 1;
    const yOff = t < 0.09 ? (1-t/0.09)*24 : 0;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(W/2, H*0.42 + yOff);
    ctx.scale(scale, scale);
    /* Glow shadow */
    ctx.shadowColor = '#00E676';
    ctx.shadowBlur = 28;
    ctx.fillStyle = '#00E676';
    ctx.font = '900 52px Orbitron, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('CLEAR!', 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();
    ctx.textBaseline = 'alphabetic'; ctx.textAlign = 'start';
}

function drawPops(now){
    if (now >= popUntil || !popText) return;
    const rem = popUntil - now;
    const total = popKind === 'complete' ? 950 : (popKind === 'bad' ? 650 : 550);
    const t = 1 - rem/total;
    const alpha = Math.min(1, rem/180);
    const yLift = t * 38;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.textAlign = 'center';
    if (popKind === 'complete'){
        ctx.fillStyle = '#00E676';
        ctx.font = '900 20px Orbitron, sans-serif';
    } else if (popKind === 'good'){
        ctx.fillStyle = '#FFE066';
        ctx.font = '900 18px Orbitron, sans-serif';
    } else {
        ctx.fillStyle = '#FF6B8B';
        ctx.font = '900 17px Orbitron, sans-serif';
    }
    ctx.fillText(popText, W/2, PANEL_Y + PANEL_H*0.45 - yLift);
    ctx.restore();
    ctx.textAlign = 'start';
}

function loop(now){
    if (!running) return;
    if (!paused){
        const dt = Math.min(0.05, Math.max(0, (now - lastTick) / 1000));
        lastTick = now;
        update(now, dt);
        if (!running){ draw(now); return; }
    } else {
        lastTick = now;
    }
    draw(now);
    requestAnimationFrame(loop);
}

/* ========================================================================
   Input — one pointerdown = one tap (no drag). Desktop 1-5 keys mirror
   the five plates left-to-right. Space pauses the game; Enter restarts
   once on the game-over overlay.
   ======================================================================== */
canvas.addEventListener('pointerdown', (e)=>{
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (W / rect.width);
    const y = (e.clientY - rect.top)  * (H / rect.height);
    onTap(x, y);
    e.preventDefault();
});
canvas.addEventListener('touchstart', e=>e.preventDefault(), {passive:false});
canvas.addEventListener('touchmove',  e=>e.preventDefault(), {passive:false});

document.addEventListener('keydown', (e)=>{
    const k = e.key;
    if (/^[1-5]$/.test(k)){
        if (!running || paused) return;
        const idx = parseInt(k, 10) - 1;
        onTap(
            PLATE_ROW_X0 + idx*(PLATE_W + PLATE_GAP) + PLATE_W/2,
            PLATE_ROW_Y + PLATE_ROW_H/2
        );
        e.preventDefault();
    } else if (k === ' '){
        if (running){ paused = !paused; syncPauseUI(); }
        e.preventDefault();
    } else if (k === 'Enter'){
        if (!running) startGame();
    }
});

/* ========== Bottom sheet + Leaderboards ========== */
const sheet=$('sheet'), sheetBack=$('sheetBack');
function openSheet(){ sheet.classList.add('on'); sheetBack.classList.add('on'); loadLeaderboard(currentScope); }
function closeSheet(){ sheet.classList.remove('on'); sheetBack.classList.remove('on'); }
$('openLb').addEventListener('click', openSheet);
sheetBack.addEventListener('click', closeSheet);

let currentScope='world';
document.querySelectorAll('.lb-tab').forEach(b=>{
    b.addEventListener('click', ()=>{
        document.querySelectorAll('.lb-tab').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        currentScope=b.dataset.scope;
        loadLeaderboard(currentScope);
    });
});
async function loadLeaderboard(scope){
    $('lbList').innerHTML='<div class="lb-empty">불러오는 중…</div>';
    try{
        const {data,error}=await getSupabase().rpc('burger_leaderboard',{p_scope:scope,p_limit:50});
        try{ console.log('[burger.leaderboard]', scope, error?'error':(data?data.length+' rows':'null'), error?error.message:''); }catch(_){}
        if(error||!data){ $('lbList').innerHTML='<div class="lb-empty">기록 없음</div>'; return; }
        if(!data.length){
            const emptyMsg = scope==='today'
                ? '🌅 오늘 (한국 시간 기준) 기록이 아직 없어요.<br>첫 기록의 주인공이 되세요!'
                : scope==='friends'
                ? '친구가 아직 플레이하지 않았어요.<br>친구 추가는 /messages/ 에서!'
                : '첫 기록의 주인공이 되세요!';
            $('lbList').innerHTML='<div class="lb-empty">'+emptyMsg+'</div>';
            return;
        }
        $('lbList').innerHTML=data.map(row=>{
            const isSelf=me && row.user_id===me.id;
            const rnkCls=row.rnk===1?' gold':row.rnk===2?' silver':row.rnk===3?' bronze':'';
            const av=row.avatar_url
                ? '<div class="lb-av"><img src="'+esc(row.avatar_url)+'" referrerpolicy="no-referrer" alt=""></div>'
                : '<div class="lb-av">'+esc(initials(row.nickname))+'</div>';
            return '<div class="lb-row'+(isSelf?' self':'')+'">'
                 +'<div class="lb-rnk'+rnkCls+'">'+(row.rnk<=3?(['🥇','🥈','🥉'][row.rnk-1]):('#'+row.rnk))+'</div>'
                 +'<div class="lb-who">'+av+'<div class="lb-nick">'+esc(row.nickname||'?')+'</div></div>'
                 +'<div class="lb-score">'+row.best_score+'</div>'
                 +'</div>';
        }).join('');
    }catch(_){$('lbList').innerHTML='<div class="lb-empty">불러오기 실패</div>';}
}

/* ========== Boot ========== */
$('ovBtn').addEventListener('click', startGame);
$('pauseBtn').addEventListener('click', (e)=>{
    e.stopPropagation();
    if(!running) return;
    paused=!paused;
    syncPauseUI();
});
(async()=>{
    await initAuth();
    /* Initial idle render runs for both logged-in and anon users so the
       empty plate / overlay layout is visible before first tap. */
    resetGame();
    fitCanvas();
    draw(performance.now());
})();

/* Inline SW cleanup — same pattern as every other page to nuke any
   legacy service-worker registrations lingering on old installs. */
try{
    if('serviceWorker' in navigator){
        navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister()));
    }
}catch(_){}
