<script>
const $=(id)=>document.getElementById(id);
const esc=(s)=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const initials=(n)=>(n||'?').trim()[0]?.toUpperCase()||'?';

let me=null;

async function initAuth(){
    try{
        const u=await getUser();
        if(!u){ location.replace('/auth/?next='+encodeURIComponent(location.pathname)); return; }
        me=u;
        const prof=await getSupabase().from('profiles').select('nickname').eq('id',u.id).maybeSingle();
        const nick=prof.data?.nickname||'나';
        $('authSlot').innerHTML='<a class="auth-chip" href="/me/">'+esc(nick)+'</a>';
        loadMyStats();
    }catch(e){}
}
async function loadMyStats(){
    if(!me)return;
    try{
        const {data,error}=await getSupabase().rpc('burger_my_stats');
        if(error||!data||!data.has_record)return;
        $('bestScore').textContent=data.best_score;
    }catch(_){}
}

/* ========================================================================
   Canvas setup — fixed logical 360×540 coord space (2:3 portrait). The
   real backing store is scaled by DPR so the cartoon shapes stay crisp
   on retina / high-density screens. setTransform is recomputed whenever
   the CSS size changes (orientation change, parent resize, etc).
   ======================================================================== */
const W = 360, H = 540;
const canvas = $('burger-canvas');
const ctx = canvas.getContext('2d');

function fitCanvas(){
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    const rect = canvas.getBoundingClientRect();
    canvas.width  = Math.round(rect.width  * dpr);
    canvas.height = Math.round(rect.height * dpr);
    ctx.setTransform(dpr * rect.width / W, 0, 0, dpr * rect.height / H, 0, 0);
}
window.addEventListener('resize', fitCanvas);

/* ========================================================================
   Ingredient catalog. Each entry draws itself at a given (cx,cy) centre
   with a given width/height — chosen so the piece reads instantly even
   at the small target-strip size. Shapes are intentionally simple (flat
   fills, 2-3 colour accents each) for the cartoon/flat-illustration vibe
   the user asked for; heavy textures would muddy the look at 32 px tall.
   ======================================================================== */
function drawRR(x, y, w, h, r){
    if (typeof r === 'number') r = [r,r,r,r];
    ctx.beginPath();
    ctx.moveTo(x+r[0], y);
    ctx.lineTo(x+w-r[1], y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r[1]);
    ctx.lineTo(x+w, y+h-r[2]);
    ctx.quadraticCurveTo(x+w, y+h, x+w-r[2], y+h);
    ctx.lineTo(x+r[3], y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r[3]);
    ctx.lineTo(x, y+r[0]);
    ctx.quadraticCurveTo(x, y, x+r[0], y);
    ctx.closePath();
}

/* ========================================================================
   Ingredient catalog v2. Each ingredient draws itself within a (cx, cy,
   w, h) box, but uses DISTINCT silhouettes and volumetric gradients so
   the stacked burger reads as real food — a puffy domed bun on top, a
   THICK irregular patty, a THIN glossy tomato round, fluffy overlapping
   lettuce curls, etc. Layers also have DIFFERENT natural heights (see
   LAYER_H table below) — previously every layer was the same 16 px so
   the stack looked like a striped bar, not a burger.

   Each drawer should:
   - fill the horizontal extent (some fillings extend slightly past the
     stack width so the bun clearly "holds" them)
   - use multi-stop gradients (not flat fills) for dimensionality
   - commit at least one accent detail (seeds, grill marks, juice
     droplets, cheese holes) to sell the cartoon-illustration look
   ======================================================================== */
const INGREDIENTS = {
    /* Bottom bun — flat top (fillings rest on it), rounded bottom. Rich
       warm-tan gradient top-to-bottom so it reads domed / baked even
       though the top edge is horizontal. */
    bunBottom: { name:'밑빵', draw(cx,cy,w,h){
        const x=cx-w/2, y=cy-h/2;
        // Main shape: flat top, rounded bottom corners
        const g = ctx.createLinearGradient(0, y, 0, y+h);
        g.addColorStop(0,   '#F2BC80');
        g.addColorStop(0.55,'#D48C4B');
        g.addColorStop(1,   '#8B5423');
        ctx.fillStyle = g;
        const br = Math.min(h*0.7, w*0.1);
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x+w, y);
        ctx.lineTo(x+w, y+h-br);
        ctx.quadraticCurveTo(x+w, y+h, x+w-br, y+h);
        ctx.lineTo(x+br, y+h);
        ctx.quadraticCurveTo(x, y+h, x, y+h-br);
        ctx.closePath();
        ctx.fill();
        // Crust darkening along the rounded bottom
        ctx.fillStyle = 'rgba(90,45,15,.28)';
        ctx.beginPath();
        ctx.moveTo(x, y+h-br);
        ctx.quadraticCurveTo(x, y+h, x+br, y+h);
        ctx.lineTo(x+w-br, y+h);
        ctx.quadraticCurveTo(x+w, y+h, x+w, y+h-br);
        ctx.lineTo(x+w, y+h*0.75);
        ctx.lineTo(x, y+h*0.75);
        ctx.closePath();
        ctx.fill();
        // Crumb highlight strip near the flat top (bakery shine)
        ctx.fillStyle = 'rgba(255,240,210,.55)';
        ctx.fillRect(x+w*0.08, y+Math.max(1,h*0.1), w*0.84, Math.max(1,h*0.15));
    }},

    /* Top bun — fully domed, flat bottom (sits on the highest filling).
       Radial gradient puts the highlight on the upper-left and shades
       down to a rich bake-brown on the lower-right; 5 irregular sesame
       seeds each cast their own small shadow. */
    bunTop: { name:'윗빵', draw(cx,cy,w,h){
        // Dome shape — flat bottom edge, bezier arch over the top
        const grad = ctx.createRadialGradient(cx-w*.22, cy-h*.25, w*.08, cx, cy+h*.1, w*.65);
        grad.addColorStop(0,    '#F7C88C');
        grad.addColorStop(0.45, '#D98B48');
        grad.addColorStop(1,    '#804520');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(cx-w/2, cy+h/2);
        ctx.lineTo(cx-w/2, cy+h*0.28);
        ctx.bezierCurveTo(cx-w*0.55, cy-h*0.55, cx+w*0.55, cy-h*0.55, cx+w/2, cy+h*0.28);
        ctx.lineTo(cx+w/2, cy+h/2);
        ctx.closePath();
        ctx.fill();
        // Upper-left gloss
        ctx.fillStyle = 'rgba(255,248,220,.55)';
        ctx.beginPath();
        ctx.ellipse(cx-w*.18, cy-h*.2, w*.22, h*.17, -.35, 0, Math.PI*2);
        ctx.fill();
        // Crust shadow along the bottom of the dome (where it meets the filling)
        ctx.fillStyle = 'rgba(80,40,10,.3)';
        ctx.fillRect(cx-w/2+1, cy+h*0.3, w-2, Math.max(1, h*0.15));
        // Sesame seeds — 5 in irregular positions, each with a shadow
        const seeds = [
            [-w*.30, -h*.12],
            [-w*.08, -h*.30],
            [ w*.12, -h*.24],
            [ w*.26, -h*.06],
            [-w*.18,  h*.05]
        ];
        const sw = Math.max(1.3, w*.038), sh = Math.max(2.4, h*.11);
        seeds.forEach(([dx,dy])=>{
            const sx=cx+dx, sy=cy+dy;
            ctx.fillStyle = 'rgba(90,50,18,.45)';
            ctx.beginPath();
            ctx.ellipse(sx+.5, sy+.8, sw, sh, .28, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#FFF4D0';
            ctx.beginPath();
            ctx.ellipse(sx, sy, sw, sh, .28, 0, Math.PI*2);
            ctx.fill();
            // Seed sheen
            ctx.fillStyle = 'rgba(255,255,255,.55)';
            ctx.beginPath();
            ctx.ellipse(sx-sw*.3, sy-sh*.4, sw*.35, sh*.3, .28, 0, Math.PI*2);
            ctx.fill();
        });
    }},

    /* Patty — thickest layer, bumpy edges, rich dark-brown gradient with
       red-orange undertone. Four visible grill marks + scattered juice
       droplets sell the "grilled beef" read. */
    patty: { name:'패티', draw(cx,cy,w,h){
        const x=cx-w/2, y=cy-h/2;
        // Extended slightly past stack width so patty pokes out of the bun
        const pw = w*1.02, px = cx-pw/2;
        // Irregular bumpy outline (8 bumps top + bottom)
        const g = ctx.createLinearGradient(0, y, 0, y+h);
        g.addColorStop(0,    '#6E3C20');
        g.addColorStop(0.5,  '#4A2512');
        g.addColorStop(1,    '#2B1205');
        ctx.fillStyle = g;
        const r = h*0.38;
        const bumps = 7;
        ctx.beginPath();
        ctx.moveTo(px+r, y);
        for (let i=1;i<bumps;i++){
            const t = i/bumps;
            const bx = px + r + (pw-2*r)*t;
            const by = y + (i%2===0 ? -h*0.04 : h*0.04);
            ctx.lineTo(bx, by);
        }
        ctx.lineTo(px+pw-r, y);
        ctx.quadraticCurveTo(px+pw, y, px+pw, y+r);
        ctx.lineTo(px+pw, y+h-r);
        ctx.quadraticCurveTo(px+pw, y+h, px+pw-r, y+h);
        for (let i=bumps-1;i>=1;i--){
            const t = i/bumps;
            const bx = px + r + (pw-2*r)*t;
            const by = y + h + (i%2===0 ? h*0.04 : -h*0.04);
            ctx.lineTo(bx, by);
        }
        ctx.lineTo(px+r, y+h);
        ctx.quadraticCurveTo(px, y+h, px, y+h-r);
        ctx.lineTo(px, y+r);
        ctx.quadraticCurveTo(px, y, px+r, y);
        ctx.closePath();
        ctx.fill();
        // Top rim warm highlight
        ctx.fillStyle = 'rgba(255,160,90,.35)';
        ctx.beginPath();
        ctx.moveTo(px+r*0.8, y+h*0.1);
        for (let i=1;i<bumps;i++){
            const t = i/bumps;
            const bx = px + r + (pw-2*r)*t;
            ctx.lineTo(bx, y+h*0.1 + (i%2===0 ? -h*0.04 : h*0.02));
        }
        ctx.lineTo(px+pw-r*0.8, y+h*0.1);
        ctx.lineTo(px+pw-r*0.8, y+h*0.22);
        ctx.lineTo(px+r*0.8, y+h*0.22);
        ctx.closePath();
        ctx.fill();
        // Grill marks — 4 darker vertical bands
        ctx.fillStyle = 'rgba(12,4,0,.55)';
        for (let i=0;i<4;i++){
            const gx = px + pw*(0.14 + i*0.22);
            ctx.fillRect(gx, y+h*0.18, Math.max(1.2, pw*0.035), h*0.64);
        }
        // Juice/sear highlights
        ctx.fillStyle = 'rgba(255,190,130,.4)';
        [[-.22,-.18],[ .18,-.08],[-.04, .22],[ .24, .12]].forEach(([dx,dy])=>{
            ctx.beginPath();
            ctx.ellipse(cx+dx*pw, cy+dy*h, Math.max(.9, pw*.035), Math.max(.8, h*.09), 0, 0, Math.PI*2);
            ctx.fill();
        });
    }},

    /* Cheese — BRIGHT yellow thin slice, clearly overhanging on one side
       (melty droop). Drips along the bottom edge in irregular finger-
       shapes. A few darker gold cheese holes on the top surface. */
    cheese: { name:'치즈', draw(cx,cy,w,h){
        const x=cx-w/2, y=cy-h/2;
        // Extend horizontally past the stack width so cheese "droops" out
        const cw = w*1.06, cx0 = cx-cw/2;
        // Main slab (top 65%) + drippy bottom (35%)
        const g = ctx.createLinearGradient(0, y, 0, y+h*0.65);
        g.addColorStop(0,   '#FFE570');
        g.addColorStop(0.5, '#FFCE2E');
        g.addColorStop(1,   '#E8A412');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.moveTo(cx0, y);
        ctx.lineTo(cx0+cw, y);
        ctx.lineTo(cx0+cw, y+h*0.6);
        // Drippy bottom edge — 4 irregular melt fingers
        const drips = [
            [0.00, 0.65],
            [0.12, 1.00],
            [0.25, 0.70],
            [0.40, 0.95],
            [0.55, 0.72],
            [0.72, 1.05],
            [0.88, 0.68],
            [1.00, 0.80]
        ];
        for (const [tx,ty] of drips){
            ctx.lineTo(cx0 + cw*tx, y + h*ty);
        }
        ctx.lineTo(cx0, y+h*0.6);
        ctx.closePath();
        ctx.fill();
        // Top shine strip
        ctx.fillStyle = 'rgba(255,255,220,.6)';
        ctx.fillRect(cx0+cw*0.06, y+Math.max(.5,h*0.07), cw*0.55, Math.max(1, h*0.14));
        // Cheese holes (3, scattered)
        ctx.fillStyle = 'rgba(180,130,20,.65)';
        [[.32,.35],[.58,.28],[.48,.48]].forEach(([tx,ty])=>{
            ctx.beginPath();
            ctx.arc(cx0+cw*tx, y+h*ty, Math.max(.8, h*.08), 0, Math.PI*2);
            ctx.fill();
        });
        // Tiny rim shade on the overhangs
        ctx.strokeStyle = 'rgba(170,110,20,.5)';
        ctx.lineWidth = Math.max(.7, h*.06);
        ctx.beginPath();
        ctx.moveTo(cx0, y+h*0.6);
        for (const [tx,ty] of drips){
            ctx.lineTo(cx0 + cw*tx, y + h*ty);
        }
        ctx.stroke();
    }},

    /* Lettuce — fluffy multi-curl. Extends BEYOND the stack width; has
       a darker underside peeking along the bottom and three bright-green
       curl-bumps on top. Reads as a ruffled leaf, not a flat green bar. */
    lettuce: { name:'양상추', draw(cx,cy,w,h){
        // Extend WAY past the stack width — lettuce spills out of the bun
        const lw = w*1.14, lx = cx-lw/2;
        // Shadowed underside (bottom 40%)
        ctx.fillStyle = '#2E6A18';
        ctx.beginPath();
        ctx.moveTo(lx, cy+h*0.1);
        for (let i=0;i<=10;i++){
            const t = i/10;
            const px = lx + lw*t;
            const py = cy + h*0.1 + (i%2===0 ? h*0.12 : h*0.35);
            ctx.lineTo(px, py);
        }
        ctx.lineTo(lx+lw, cy+h*0.1);
        ctx.closePath();
        ctx.fill();
        // Main green body with top ruffle
        const g = ctx.createLinearGradient(0, cy-h*0.5, 0, cy+h*0.2);
        g.addColorStop(0, '#9BE14B');
        g.addColorStop(1, '#5AAD28');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.moveTo(lx, cy+h*0.15);
        for (let i=0;i<=10;i++){
            const t = i/10;
            const px = lx + lw*t;
            const py = cy + (i%2===0 ? h*0.15 : -h*0.40);
            ctx.lineTo(px, py);
        }
        ctx.lineTo(lx+lw, cy+h*0.15);
        ctx.closePath();
        ctx.fill();
        // Three bright curl bumps on top (suggest multiple leaf layers)
        ctx.fillStyle = '#B5F06A';
        for (let i=0;i<4;i++){
            const bx = lx + lw*(0.18 + i*0.22);
            const by = cy - h*0.15 + (i%2===0 ? -h*0.08 : h*0.02);
            ctx.beginPath();
            ctx.ellipse(bx, by, lw*0.08, h*0.28, 0, 0, Math.PI*2);
            ctx.fill();
        }
        // Vein highlights
        ctx.strokeStyle = 'rgba(255,255,255,.25)';
        ctx.lineWidth = Math.max(.6, h*.05);
        ctx.beginPath();
        for (let i=0;i<4;i++){
            const bx = lx + lw*(0.18 + i*0.22);
            ctx.moveTo(bx, cy-h*0.1);
            ctx.lineTo(bx, cy+h*0.1);
        }
        ctx.stroke();
    }},

    /* Tomato — thin glossy red slice. Darker red outer rim, brighter
       red-orange centre via gradient, 5 yellow seeds arranged in a
       natural scatter, and a single specular gloss highlight up-left. */
    tomato: { name:'토마토', draw(cx,cy,w,h){
        // Slight horizontal extension for that "slipping out" look
        const tw = w*1.06, tx = cx-tw/2;
        const y = cy-h/2;
        // Outer rim
        ctx.fillStyle = '#A8201A';
        drawRR(tx, y, tw, h, h*0.5);
        ctx.fill();
        // Inner flesh with gradient
        const inset = Math.max(1, h*0.18);
        const g = ctx.createLinearGradient(0, y+inset, 0, y+h-inset);
        g.addColorStop(0,   '#FF7A6A');
        g.addColorStop(0.5, '#E83535');
        g.addColorStop(1,   '#B51E1E');
        ctx.fillStyle = g;
        drawRR(tx+inset, y+inset, tw-2*inset, h-2*inset, (h-2*inset)*0.5);
        ctx.fill();
        // Seeds — 5 in natural scatter, each with its own drop shadow
        const seeds = [[.22,-.1],[.38, .08],[.52,-.12],[.68, .06],[.82,-.08]];
        for (const [tx2, ty2] of seeds){
            const sx = tx + tw*tx2, sy = cy + h*ty2;
            const sw = Math.max(1.2, w*.032), sh = Math.max(2.2, h*.22);
            ctx.fillStyle = 'rgba(150,40,30,.5)';
            ctx.beginPath();
            ctx.ellipse(sx+.4, sy+.7, sw, sh, .3, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#FFE583';
            ctx.beginPath();
            ctx.ellipse(sx, sy, sw, sh, .3, 0, Math.PI*2);
            ctx.fill();
        }
        // Gloss highlight
        ctx.fillStyle = 'rgba(255,255,255,.38)';
        ctx.beginPath();
        ctx.ellipse(cx-tw*.22, cy-h*.22, tw*.2, h*.16, 0, 0, Math.PI*2);
        ctx.fill();
    }},

    /* Onion — VERY thin pale slice with a subtle cool-pink tinge
       (suggests red onion). Two faint layer lines suggest the rings
       without making it look like a top-down onion ring. */
    onion: { name:'양파', draw(cx,cy,w,h){
        const ow = w*1.02, ox = cx-ow/2;
        const y = cy-h/2;
        const g = ctx.createLinearGradient(0, y, 0, y+h);
        g.addColorStop(0, '#FDF4F4');
        g.addColorStop(0.5, '#E7D4D8');
        g.addColorStop(1, '#B896A1');
        ctx.fillStyle = g;
        drawRR(ox, y, ow, h, h*0.5);
        ctx.fill();
        // Gloss band
        ctx.fillStyle = 'rgba(255,255,255,.55)';
        ctx.fillRect(ox+ow*0.08, y+Math.max(.5,h*0.12), ow*0.5, Math.max(.8, h*0.2));
        // Layer lines (2 thin horizontal)
        ctx.strokeStyle = 'rgba(120,70,85,.45)';
        ctx.lineWidth = Math.max(.5, h*.08);
        ctx.beginPath();
        ctx.moveTo(ox+h*0.4, cy-h*0.15);
        ctx.lineTo(ox+ow-h*0.4, cy-h*0.15);
        ctx.moveTo(ox+h*0.4, cy+h*0.18);
        ctx.lineTo(ox+ow-h*0.4, cy+h*0.18);
        ctx.stroke();
        // Rim tinge along outer edge
        ctx.strokeStyle = 'rgba(140,80,100,.35)';
        ctx.lineWidth = Math.max(.6, h*.08);
        drawRR(ox+.5, y+.5, ow-1, h-1, (h-1)*0.5);
        ctx.stroke();
    }}
};

/* Per-ingredient natural stack height. Previously every layer was a
   uniform 16 px which made the stack read as a striped bar. Real
   burger layers vary in thickness: buns are domes, patty is thick,
   cheese + tomato + onion are thin slices, lettuce sits fluffier.
   The panel plate area is ~200 px tall, so even a 7-filling L9 sample
   (18*7 ≤ 126 plus 16+26 buns = 168) fits. */
const LAYER_H = {
    bunBottom: 16,
    bunTop:    26,
    patty:     22,
    cheese:    12,
    lettuce:   16,
    tomato:    10,
    onion:     8
};

/* ========================================================================
   Sample generation — the target burger's middle fillings (a bottom +
   top bun are drawn automatically around these in both panels). Each
   filling is picked from the 5 TAP_IDS with repeats allowed so a L3
   sample can be "patty / cheese / patty" (a double-cheeseburger). We
   avoid 3-in-a-row to keep patterns interesting. Length grows from 3
   at L1 to 7 at L9+, capped so the stack always fits the panel height.
   ======================================================================== */
const TAP_IDS = ['lettuce','patty','cheese','onion','tomato'];
function generateSample(lvl){
    const len = Math.min(3 + Math.floor(lvl/2), 7);
    const out = [];
    for (let i=0; i<len; i++){
        let id;
        do { id = TAP_IDS[Math.floor(Math.random()*TAP_IDS.length)]; }
        while (out.length >= 2 && out[out.length-1] === id && out[out.length-2] === id);
        out.push(id);
    }
    return out;
}
function timeForLevel(lvl){
    /* L1 = 14 s, each level shaves 0.6 s; floor at 5 s. Because samples
       also get longer, at L10+ even a perfect player is under real
       pressure — that's the "순발력" (quick-reaction) feeling. */
    return Math.max(5, 14 - (lvl-1) * 0.6);
}

/* ========================================================================
   Game state
   ======================================================================== */
let level, score;
let sample;             /* filling IDs only (no buns) */
let progress;           /* how many of the sample have been tapped correctly */
let timeLeft, timeLevelBudget;
let combo, maxCombo;
let running, paused;
let startedAt, lastTick;
let ingredientsCaught, burgersCompleted;
let popUntil, popText, popKind;
let shakeUntil, flashUntil;
let tapFlashes;         /* [{idx, bornAt, kind:'good'|'bad'}] */
let stackPops;          /* [{layer, bornAt}] — entry-scale anim on WIP layer */
let burgersThisLevel;   /* 0..LEVEL_BURGERS — only levels up on LEVEL_BURGERS */

/* Clear 5 burgers at a given level before it ticks over. Previous build
   incremented level after every single burger, so there was no sense of
   "settling into" a difficulty tier — each completion immediately made
   the sample longer AND the clock tighter. 5-per-level lets the player
   rack up combos at a comfortable tempo before the next jump. */
const LEVEL_BURGERS = 5;

function resetGame(){
    level = 1; score = 0;
    sample = generateSample(level);
    progress = 0;
    timeLevelBudget = timeForLevel(level);
    timeLeft = timeLevelBudget;
    combo = 0; maxCombo = 0;
    ingredientsCaught = 0; burgersCompleted = 0;
    burgersThisLevel = 0;
    popUntil = 0; popText = ''; popKind = '';
    shakeUntil = 0; flashUntil = 0;
    tapFlashes = []; stackPops = [];
    $('scoreNow').textContent = '0';
    $('levelNow').textContent = '1';
}

function startGame(){
    resetGame();
    fitCanvas();
    $('overlay').classList.add('hidden');
    running = true; paused = false;
    startedAt = performance.now(); lastTick = startedAt;
    requestAnimationFrame(loop);
}

function gameOver(){
    running = false;
    const duration = Math.round(performance.now() - startedAt);
    const wrap = $('canvasWrap');
    wrap.classList.remove('shake'); void wrap.offsetWidth; wrap.classList.add('shake');
    if(navigator.vibrate) try{ navigator.vibrate([30,20,60]); }catch(_){}

    $('overlay').innerHTML =
        '<h2 class="go">TIME OUT</h2>'
      + '<div class="score-big">'+score+'</div>'
      + '<p>레벨 '+level+' 도달 · 버거 '+burgersCompleted+'개 완성 · 탭 '+ingredientsCaught+'회<br>'
      + '최고 콤보 '+maxCombo+' · 소요 '+(duration/1000).toFixed(1)+'초</p>'
      + '<div class="pb" id="ovPbLine"></div>'
      + '<button class="btn" id="ovBtn">다시하기</button>'
      + '<div class="kbd-hint"><kbd>Enter</kbd> 재시작</div>';
    $('overlay').classList.remove('hidden');
    $('ovBtn').addEventListener('click', startGame);

    (async()=>{
        try{
            const {data,error}=await getSupabase().rpc('record_burger_attempt',{
                p_burgers_completed: burgersCompleted,
                p_ingredients_caught: ingredientsCaught,
                p_level_reached: level,
                p_duration_ms: duration
            });
            if(!error && data?.is_personal_best){ $('ovPbLine').textContent='🏆 개인 신기록!'; }
            else if(error){
                const m=(error.message||'').toLowerCase();
                if(m.includes('rate_limited')) $('ovPbLine').textContent='⏸ 1시간 내 30회 한도 초과';
            }
        }catch(_){}
        loadMyStats();
        loadLeaderboard(currentScope);
    })();

    try{
        const ad=$('adSlot');
        if(ad.style.display==='none' || !ad.style.display){
            ad.style.display='block';
            (adsbygoogle=window.adsbygoogle||[]).push({});
        }
    }catch(_){}
}

/* ========================================================================
   Layout constants — derived from W × H (360 × 540 logical). All coords
   below are relative to that logical space; fitCanvas takes care of DPR.
   ======================================================================== */
const HUD_H = 40;
const PANEL_Y = HUD_H + 14;
const PANEL_H = 230;
const TIMEBAR_Y = PANEL_Y + PANEL_H + 10;
const TIMEBAR_H = 14;
const PLATE_ROW_Y = TIMEBAR_Y + TIMEBAR_H + 14;
const PLATE_ROW_H = 114;
const PLATE_W = 60;
const PLATE_GAP = 6;
const PLATE_ROW_TOTAL_W = 5*PLATE_W + 4*PLATE_GAP;
const PLATE_ROW_X0 = (W - PLATE_ROW_TOTAL_W) / 2;

/* ========================================================================
   Update — pure time decay; all real game state advances inside onTap().
   ======================================================================== */
function update(now, dt){
    timeLeft -= dt;
    if (timeLeft <= 0){
        timeLeft = 0;
        gameOver();
    }
    /* Prune stale flash/pop records so the lists don't grow unbounded. */
    if (tapFlashes.length){
        tapFlashes = tapFlashes.filter(f => now - f.bornAt < 500);
    }
    if (stackPops.length > 16){
        stackPops = stackPops.filter(s => now - s.bornAt < 400);
    }
}

/* ========================================================================
   Tap handler — maps a canvas-local (x,y) to an ingredient plate index,
   or ignores the tap if it landed outside the plate row. Correct tap
   advances progress + combo; wrong tap resets combo and docks 2 s.
   ======================================================================== */
function plateHitIndex(x, y){
    const top = PLATE_ROW_Y - 4;
    const bot = PLATE_ROW_Y + PLATE_ROW_H + 4;
    if (y < top || y > bot) return -1;
    const rel = x - PLATE_ROW_X0;
    for (let i=0; i<5; i++){
        const x0 = i*(PLATE_W + PLATE_GAP);
        if (rel >= x0 - 4 && rel <= x0 + PLATE_W + 4) return i;
    }
    return -1;
}

function onTap(x, y){
    if (!running || paused) return;
    const idx = plateHitIndex(x, y);
    if (idx < 0) return;
    const id = TAP_IDS[idx];
    const now = performance.now();
    const expected = sample[progress];

    if (id === expected){
        progress++;
        ingredientsCaught++;
        combo++;
        if (combo > maxCombo) maxCombo = combo;
        const gain = Math.round(10 * level * (1 + combo*0.05));
        score += gain;
        tapFlashes.push({ idx, bornAt: now, kind:'good' });
        stackPops.push({ layer: progress-1, bornAt: now });
        popText = combo >= 2 ? (combo + ' COMBO') : ('+' + gain);
        popKind = 'good';
        popUntil = now + 550;
        if(navigator.vibrate) try{ navigator.vibrate(8); }catch(_){}

        if (progress >= sample.length){
            /* Burger done — count it, award bonus, and REFRESH the sample
               at the SAME level until we've cleared LEVEL_BURGERS (=5) of
               them. Only then does the difficulty step up. This gives the
               player a stable tier to settle into before the next jump. */
            burgersCompleted++;
            burgersThisLevel++;
            const levelingUp = burgersThisLevel >= LEVEL_BURGERS;
            const bonus = (levelingUp ? 200 : 100) * level + Math.floor(timeLeft) * 5;
            score += bonus;
            popText = levelingUp ? ('LEVEL UP! +' + bonus) : ('COMPLETE +' + bonus);
            popKind = 'complete';
            popUntil = now + (levelingUp ? 1200 : 950);
            flashUntil = now + (levelingUp ? 800 : 550);
            if (levelingUp){
                level++;
                burgersThisLevel = 0;
                timeLevelBudget = timeForLevel(level);
                timeLeft = Math.min(timeLevelBudget, timeLeft + 4);
            } else {
                /* Same level — give a small breather and keep the
                   original budget; the player's been doing well. */
                timeLeft = Math.min(timeLevelBudget, timeLeft + 2.5);
            }
            sample = generateSample(level);
            progress = 0;
            stackPops = [];
            if(navigator.vibrate) try{ navigator.vibrate(levelingUp ? [25,40,25,40,25,40,120] : [20,40,20,40,100]); }catch(_){}
        }
        $('scoreNow').textContent = score;
        $('levelNow').textContent = level;
    } else {
        combo = 0;
        timeLeft = Math.max(0, timeLeft - 2);
        tapFlashes.push({ idx, bornAt: now, kind:'bad' });
        popText = '-2초';
        popKind = 'bad';
        popUntil = now + 650;
        shakeUntil = now + 320;
        const wrap = $('canvasWrap');
        wrap.classList.remove('shake'); void wrap.offsetWidth; wrap.classList.add('shake');
        setTimeout(()=>wrap.classList.remove('shake'), 420);
        if(navigator.vibrate) try{ navigator.vibrate([40,30,90]); }catch(_){}
        if (timeLeft <= 0) gameOver();
    }
}

/* ========================================================================
   Render
   ======================================================================== */
function draw(now){
    /* Base background + warm floor-glow to echo the image's "cartoon
       diner" feel without dropping the dark-theme consistency. */
    ctx.fillStyle = '#1c1230';
    ctx.fillRect(0, 0, W, H);
    const g = ctx.createRadialGradient(W/2, H-40, 30, W/2, H-40, W*0.85);
    g.addColorStop(0, 'rgba(255,183,77,.14)');
    g.addColorStop(1, 'rgba(255,183,77,0)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

    drawHUD(now);
    drawBurgerPanels(now);
    drawTimeBar(now);
    drawIngredientRow(now);
    drawPops(now);

    if (now < flashUntil){
        const rem = flashUntil - now;
        ctx.fillStyle = 'rgba(0,230,118,'+ (rem/1500) +')';
        ctx.fillRect(0, 0, W, H);
    }
}

function drawHUD(now){
    /* Left: LV badge + 5-burgers-per-level progress dots.
       Centre:  score.
       Right:   seconds remaining (reddens when critical). */
    ctx.fillStyle = '#FFE66D';
    ctx.font = '900 15px Orbitron, sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    const lvLabel = 'LV ' + level;
    ctx.fillText(lvLabel, 14, HUD_H/2);
    const lvTextW = ctx.measureText(lvLabel).width;
    /* Progress dots: filled for completed burgers at this level, hollow
       for remaining. LEVEL_BURGERS = 5 so the row is always exactly 5
       pips wide. */
    const dotR = 3;
    const dotGap = 5;
    const dotsX0 = 14 + lvTextW + 8;
    for (let i=0; i<LEVEL_BURGERS; i++){
        const dx = dotsX0 + i*(dotR*2 + dotGap);
        if (i < burgersThisLevel){
            ctx.fillStyle = '#00E676';
            ctx.beginPath();
            ctx.arc(dx, HUD_H/2, dotR, 0, Math.PI*2);
            ctx.fill();
        } else {
            ctx.strokeStyle = 'rgba(255,255,255,.35)';
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.arc(dx, HUD_H/2, dotR, 0, Math.PI*2);
            ctx.stroke();
        }
    }

    ctx.fillStyle = '#fff';
    ctx.font = '900 17px Orbitron, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(score, W/2, HUD_H/2);

    const critical = timeLeft < 3;
    ctx.fillStyle = critical ? '#FF6B8B' : '#FFB74D';
    ctx.font = '900 17px Orbitron, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText((Math.max(0, timeLeft)).toFixed(1) + 's', W-14, HUD_H/2);

    ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
}

function drawBurgerPanels(now){
    const panelW = 150;
    const gap = 16;
    const leftX  = (W/2) - panelW - gap/2;
    const rightX = (W/2) + gap/2;

    drawBurgerIn(now, leftX,  PANEL_Y, panelW, PANEL_H, sample, sample.length, 'sample');
    drawBurgerIn(now, rightX, PANEL_Y, panelW, PANEL_H, sample.slice(0, progress), progress, 'wip');

    /* Labels below each plate. 내 버거 turns green on completion. */
    ctx.textAlign = 'center';
    ctx.font = '700 11px "Noto Sans KR", sans-serif';
    ctx.fillStyle = 'rgba(255,230,109,.75)';
    ctx.fillText('🎯 목표', leftX + panelW/2, PANEL_Y + PANEL_H - 2);
    ctx.fillStyle = progress >= sample.length ? '#00E676' : 'rgba(255,183,77,.8)';
    ctx.fillText('내 버거', rightX + panelW/2, PANEL_Y + PANEL_H - 2);

    /* Thin dashed divider down the middle between the two panels. */
    ctx.strokeStyle = 'rgba(255,255,255,.10)';
    ctx.setLineDash([4, 5]);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(W/2, PANEL_Y + 20);
    ctx.lineTo(W/2, PANEL_Y + PANEL_H - 28);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.textAlign = 'start';
}

function drawBurgerIn(now, px, py, pw, ph, fillings, filledCount, kind){
    const plateCx = px + pw/2;
    const plateCy = py + ph - 24;
    const plateW = pw - 28;
    const plateH = 16;

    /* Plate shadow */
    ctx.fillStyle = 'rgba(0,0,0,.32)';
    ctx.beginPath();
    ctx.ellipse(plateCx, plateCy + 9, plateW*0.55, 5, 0, 0, Math.PI*2);
    ctx.fill();

    /* Plate disk — soft 3-stop gradient so it reads as actual porcelain
       instead of a flat oval (matches the bright cartoon vibe of the
       ingredients above). */
    const pg = ctx.createLinearGradient(0, plateCy-9, 0, plateCy+9);
    pg.addColorStop(0,   '#FFFFFF');
    pg.addColorStop(0.6, '#EEF1F6');
    pg.addColorStop(1,   '#C8CDD9');
    ctx.fillStyle = pg;
    ctx.beginPath();
    ctx.ellipse(plateCx, plateCy, plateW/2, plateH/2, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,.14)';
    ctx.lineWidth = 1.2;
    ctx.stroke();
    /* Plate rim shine */
    ctx.fillStyle = 'rgba(255,255,255,.45)';
    ctx.beginPath();
    ctx.ellipse(plateCx - plateW*0.18, plateCy - plateH*0.22, plateW*0.12, plateH*0.22, 0, 0, Math.PI*2);
    ctx.fill();

    /* Per-ingredient stack heights — buns are domes / patty is thick /
       cheese-tomato-onion are thin slices. Previously every layer was a
       uniform 16 px, which made the "burger" look like a striped bar
       instead of real food. */
    const innerW = Math.min(plateW * 0.92, 124);
    let y = plateCy - 9;   /* top edge of the topmost item so far (going up) */

    /* Bottom bun always visible */
    y -= LAYER_H.bunBottom;
    INGREDIENTS.bunBottom.draw(plateCx, y + LAYER_H.bunBottom/2, innerW, LAYER_H.bunBottom);

    /* Filling layers */
    for (let i = 0; i < filledCount; i++){
        const id = fillings[i];
        const layerH = LAYER_H[id];
        y -= layerH;
        let scale = 1;
        if (kind === 'wip'){
            const pop = stackPops.find(p => p.layer === i && now - p.bornAt < 260);
            if (pop){
                const t = (now - pop.bornAt) / 260;
                scale = 1 + (1-t) * 0.3;
            }
        }
        ctx.save();
        ctx.translate(plateCx, y + layerH/2);
        ctx.scale(scale, scale);
        INGREDIENTS[id].draw(0, 0, innerW, layerH);
        ctx.restore();
    }

    const showTop = kind === 'sample' || filledCount >= sample.length;
    if (showTop){
        y -= LAYER_H.bunTop;
        INGREDIENTS.bunTop.draw(plateCx, y + LAYER_H.bunTop/2, innerW, LAYER_H.bunTop);
    } else if (kind === 'wip'){
        /* "Next needed" ghost — translucent pulsing silhouette of the
           expected filling at the next slot, plus a dashed yellow frame
           around it. Lets the player see what to tap without glancing
           back at the target panel. */
        const id = sample[filledCount];
        const layerH = LAYER_H[id];
        y -= layerH;
        const pulse = 0.30 + 0.18*Math.sin(now/220);
        ctx.save();
        ctx.globalAlpha = pulse;
        INGREDIENTS[id].draw(plateCx, y + layerH/2, innerW, layerH);
        ctx.restore();
        ctx.save();
        ctx.strokeStyle = 'rgba(255,230,102,.75)';
        ctx.setLineDash([3,3]);
        ctx.lineWidth = 1;
        drawRR(plateCx-innerW/2-3, y-2, innerW+6, layerH+4, 5);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
    }
}

function drawTimeBar(now){
    const x = 18, y = TIMEBAR_Y, w = W - 36, h = TIMEBAR_H;
    /* Track */
    ctx.fillStyle = 'rgba(255,255,255,.06)';
    drawRR(x, y, w, h, h/2); ctx.fill();
    /* Fill */
    const frac = timeLevelBudget > 0 ? Math.max(0, Math.min(1, timeLeft / timeLevelBudget)) : 0;
    const fw = Math.max(0, (w - 2) * frac);
    let col = '#00E676';
    if (frac <= 0.25)      col = '#FF6B8B';
    else if (frac <= 0.5)  col = '#FFE066';
    if (fw > 0){
        ctx.fillStyle = col;
        drawRR(x+1, y+1, fw, h-2, (h-2)/2); ctx.fill();
    }
    /* Critical-time pulse overlay */
    if (frac <= 0.25 && fw > 0){
        const pulse = 0.35 + 0.35*Math.abs(Math.sin(now/120));
        ctx.fillStyle = 'rgba(255,107,139,'+pulse+')';
        drawRR(x+1, y+1, fw, h-2, (h-2)/2); ctx.fill();
    }
}

function drawIngredientRow(now){
    for (let i=0; i<5; i++){
        const x = PLATE_ROW_X0 + i*(PLATE_W + PLATE_GAP);
        const y = PLATE_ROW_Y;
        const cx = x + PLATE_W/2;
        const cy = y + PLATE_ROW_H*0.44;

        /* Card background — subtle by default, lights up green/red on tap. */
        const flash = tapFlashes.find(f => f.idx === i);
        let flashCol = null, flashA = 0;
        if (flash){
            const t = (now - flash.bornAt) / 400;
            if (t < 1){
                flashA = 1 - t;
                flashCol = flash.kind === 'good' ? '#00E676' : '#FF6B8B';
            }
        }
        ctx.save();
        ctx.fillStyle = 'rgba(255,255,255,.03)';
        ctx.strokeStyle = flashCol || 'rgba(255,255,255,.1)';
        ctx.lineWidth = flashCol ? 2 : 1;
        drawRR(x, y, PLATE_W, PLATE_ROW_H, 14); ctx.fill(); ctx.stroke();
        if (flashCol){
            ctx.globalAlpha = flashA*0.18;
            ctx.fillStyle = flashCol;
            drawRR(x, y, PLATE_W, PLATE_ROW_H, 14); ctx.fill();
        }
        ctx.restore();

        /* Button plate (small) */
        const pShadow = 'rgba(0,0,0,.28)';
        ctx.fillStyle = pShadow;
        ctx.beginPath();
        ctx.ellipse(cx, cy+18, PLATE_W*0.36, 4, 0, 0, Math.PI*2);
        ctx.fill();
        const pg = ctx.createLinearGradient(0, cy+4, 0, cy+16);
        pg.addColorStop(0, '#FFFFFF');
        pg.addColorStop(1, '#C7CCD7');
        ctx.fillStyle = pg;
        ctx.beginPath();
        ctx.ellipse(cx, cy+10, PLATE_W*0.42, 7, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,.14)';
        ctx.lineWidth = 1.1;
        ctx.stroke();

        /* Ingredient rendered larger (~45 px wide) for clear identification. */
        INGREDIENTS[TAP_IDS[i]].draw(cx, cy-2, PLATE_W*0.76, 28);

        /* Small key-hint badge top-left so desktop users see 1-5 mapping. */
        ctx.fillStyle = 'rgba(0,0,0,.5)';
        ctx.beginPath();
        ctx.arc(x+11, y+11, 9, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#FFE066';
        ctx.font = '900 10px Orbitron, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(String(i+1), x+11, y+11);
        ctx.textBaseline = 'alphabetic';
        ctx.textAlign = 'start';
    }

    /* One-line progress hint under the row. */
    ctx.fillStyle = 'rgba(255,255,255,.45)';
    ctx.font = '500 11px "Noto Sans KR", sans-serif';
    ctx.textAlign = 'center';
    const hint = progress === 0
        ? '샘플과 같은 순서로 탭'
        : (progress + ' / ' + sample.length + ' · 계속!');
    ctx.fillText(hint, W/2, PLATE_ROW_Y + PLATE_ROW_H + 14);
    ctx.textAlign = 'start';
}

function drawPops(now){
    if (now >= popUntil || !popText) return;
    const rem = popUntil - now;
    const total = popKind === 'complete' ? 950 : (popKind === 'bad' ? 650 : 550);
    const t = 1 - rem/total;
    const alpha = Math.min(1, rem/180);
    const yLift = t * 38;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.textAlign = 'center';
    if (popKind === 'complete'){
        ctx.fillStyle = '#00E676';
        ctx.font = '900 20px Orbitron, sans-serif';
    } else if (popKind === 'good'){
        ctx.fillStyle = '#FFE066';
        ctx.font = '900 18px Orbitron, sans-serif';
    } else {
        ctx.fillStyle = '#FF6B8B';
        ctx.font = '900 17px Orbitron, sans-serif';
    }
    ctx.fillText(popText, W/2, PANEL_Y + PANEL_H*0.45 - yLift);
    ctx.restore();
    ctx.textAlign = 'start';
}

function loop(now){
    if (!running) return;
    if (!paused){
        const dt = Math.min(0.05, Math.max(0, (now - lastTick) / 1000));
        lastTick = now;
        update(now, dt);
        if (!running){ draw(now); return; }
    } else {
        lastTick = now;
    }
    draw(now);
    requestAnimationFrame(loop);
}

/* ========================================================================
   Input — one pointerdown = one tap (no drag). Desktop 1-5 keys mirror
   the five plates left-to-right. Space pauses the game; Enter restarts
   once on the game-over overlay.
   ======================================================================== */
canvas.addEventListener('pointerdown', (e)=>{
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (W / rect.width);
    const y = (e.clientY - rect.top)  * (H / rect.height);
    onTap(x, y);
    e.preventDefault();
});
canvas.addEventListener('touchstart', e=>e.preventDefault(), {passive:false});
canvas.addEventListener('touchmove',  e=>e.preventDefault(), {passive:false});

document.addEventListener('keydown', (e)=>{
    const k = e.key;
    if (/^[1-5]$/.test(k)){
        if (!running || paused) return;
        const idx = parseInt(k, 10) - 1;
        onTap(
            PLATE_ROW_X0 + idx*(PLATE_W + PLATE_GAP) + PLATE_W/2,
            PLATE_ROW_Y + PLATE_ROW_H/2
        );
        e.preventDefault();
    } else if (k === ' '){
        if (running) paused = !paused;
        e.preventDefault();
    } else if (k === 'Enter'){
        if (!running) startGame();
    }
});

/* ========== Bottom sheet + Leaderboards ========== */
const sheet=$('sheet'), sheetBack=$('sheetBack');
function openSheet(){ sheet.classList.add('on'); sheetBack.classList.add('on'); loadLeaderboard(currentScope); }
function closeSheet(){ sheet.classList.remove('on'); sheetBack.classList.remove('on'); }
$('openLb').addEventListener('click', openSheet);
sheetBack.addEventListener('click', closeSheet);

let currentScope='world';
document.querySelectorAll('.lb-tab').forEach(b=>{
    b.addEventListener('click', ()=>{
        document.querySelectorAll('.lb-tab').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        currentScope=b.dataset.scope;
        loadLeaderboard(currentScope);
    });
});
async function loadLeaderboard(scope){
    $('lbList').innerHTML='<div class="lb-empty">불러오는 중…</div>';
    try{
        const {data,error}=await getSupabase().rpc('burger_leaderboard',{p_scope:scope,p_limit:50});
        if(error||!data){ $('lbList').innerHTML='<div class="lb-empty">기록 없음</div>'; return; }
        if(!data.length){ $('lbList').innerHTML='<div class="lb-empty">첫 기록의 주인공이 되세요!</div>'; return; }
        $('lbList').innerHTML=data.map(row=>{
            const isSelf=me && row.user_id===me.id;
            const rnkCls=row.rnk===1?' gold':row.rnk===2?' silver':row.rnk===3?' bronze':'';
            const av=row.avatar_url
                ? '<div class="lb-av"><img src="'+esc(row.avatar_url)+'" referrerpolicy="no-referrer" alt=""></div>'
                : '<div class="lb-av">'+esc(initials(row.nickname))+'</div>';
            return '<div class="lb-row'+(isSelf?' self':'')+'">'
                 +'<div class="lb-rnk'+rnkCls+'">'+(row.rnk<=3?(['🥇','🥈','🥉'][row.rnk-1]):('#'+row.rnk))+'</div>'
                 +'<div class="lb-who">'+av+'<div class="lb-nick">'+esc(row.nickname||'?')+'</div></div>'
                 +'<div class="lb-score">'+row.best_score+'</div>'
                 +'</div>';
        }).join('');
    }catch(_){$('lbList').innerHTML='<div class="lb-empty">불러오기 실패</div>';}
}

/* ========== Boot ========== */
$('ovBtn').addEventListener('click', startGame);
(async()=>{
    await initAuth();
    if (me){
        resetGame();
        fitCanvas();
        draw(performance.now());
    }
})();

        navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister()));
    }
}catch(_){}
