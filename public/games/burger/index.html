<script>
const $=(id)=>document.getElementById(id);
const esc=(s)=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const initials=(n)=>(n||'?').trim()[0]?.toUpperCase()||'?';

let me=null;

async function initAuth(){
    try{
        const u=await getUser();
        if(!u){ location.replace('/auth/?next='+encodeURIComponent(location.pathname)); return; }
        me=u;
        const prof=await getSupabase().from('profiles').select('nickname').eq('id',u.id).maybeSingle();
        const nick=prof.data?.nickname||'나';
        $('authSlot').innerHTML='<a class="auth-chip" href="/me/">'+esc(nick)+'</a>';
        loadMyStats();
    }catch(e){}
}
async function loadMyStats(){
    if(!me)return;
    try{
        const {data,error}=await getSupabase().rpc('burger_my_stats');
        if(error||!data||!data.has_record)return;
        $('bestScore').textContent=data.best_score;
    }catch(_){}
}

/* ========================================================================
   Canvas setup — fixed logical 360×540 coord space (2:3 portrait). The
   real backing store is scaled by DPR so the cartoon shapes stay crisp
   on retina / high-density screens. setTransform is recomputed whenever
   the CSS size changes (orientation change, parent resize, etc).
   ======================================================================== */
const W = 360, H = 540;
const canvas = $('burger-canvas');
const ctx = canvas.getContext('2d');

function fitCanvas(){
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    const rect = canvas.getBoundingClientRect();
    canvas.width  = Math.round(rect.width  * dpr);
    canvas.height = Math.round(rect.height * dpr);
    ctx.setTransform(dpr * rect.width / W, 0, 0, dpr * rect.height / H, 0, 0);
}
window.addEventListener('resize', fitCanvas);

/* ========================================================================
   Ingredient catalog. Each entry draws itself at a given (cx,cy) centre
   with a given width/height — chosen so the piece reads instantly even
   at the small target-strip size. Shapes are intentionally simple (flat
   fills, 2-3 colour accents each) for the cartoon/flat-illustration vibe
   the user asked for; heavy textures would muddy the look at 32 px tall.
   ======================================================================== */
function drawRR(x, y, w, h, r){
    if (typeof r === 'number') r = [r,r,r,r];
    ctx.beginPath();
    ctx.moveTo(x+r[0], y);
    ctx.lineTo(x+w-r[1], y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r[1]);
    ctx.lineTo(x+w, y+h-r[2]);
    ctx.quadraticCurveTo(x+w, y+h, x+w-r[2], y+h);
    ctx.lineTo(x+r[3], y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r[3]);
    ctx.lineTo(x, y+r[0]);
    ctx.quadraticCurveTo(x, y, x+r[0], y);
    ctx.closePath();
}

/* Each drawer receives (cx, cy, w, h). Shapes stay within the (w,h) box. */
const INGREDIENTS = {
    bunBottom: { name:'밑빵', draw(cx,cy,w,h){
        const x=cx-w/2, y=cy-h/2;
        /* Tan dome-DOWN: flat top, rounded bottom (classic burger base). */
        ctx.fillStyle='#E8A868';
        drawRR(x, y, w, h, [4,4,h*0.7,h*0.7]);
        ctx.fill();
        /* Inner crumb highlight */
        ctx.fillStyle='rgba(255,255,255,.18)';
        drawRR(x+2, y+2, w-4, h*0.4, [2,2,0,0]);
        ctx.fill();
    }},
    bunTop: { name:'윗빵', draw(cx,cy,w,h){
        /* Dome UP with sesame seeds. */
        ctx.fillStyle='#D68F4E';
        ctx.beginPath();
        ctx.moveTo(cx-w/2, cy+h/2);
        ctx.lineTo(cx-w/2, cy+h/4);
        ctx.quadraticCurveTo(cx-w/2, cy-h/2, cx, cy-h/2);
        ctx.quadraticCurveTo(cx+w/2, cy-h/2, cx+w/2, cy+h/4);
        ctx.lineTo(cx+w/2, cy+h/2);
        ctx.closePath();
        ctx.fill();
        /* Lighter top gloss */
        ctx.fillStyle='rgba(255,235,180,.35)';
        ctx.beginPath();
        ctx.ellipse(cx-w*.12, cy-h*.18, w*.18, h*.18, -.3, 0, Math.PI*2);
        ctx.fill();
        /* Sesame seeds */
        ctx.fillStyle='#FFF4D0';
        [[-w*.22,-h*.08],[0,-h*.22],[w*.22,-h*.08]].forEach(([dx,dy])=>{
            ctx.beginPath();
            ctx.ellipse(cx+dx, cy+dy, Math.max(1.2,w*.035), Math.max(2.2,h*.12), .3, 0, Math.PI*2);
            ctx.fill();
        });
    }},
    patty: { name:'패티', draw(cx,cy,w,h){
        const x=cx-w/2, y=cy-h/2;
        ctx.fillStyle='#5B2E10';
        drawRR(x, y, w, h, h*0.28);
        ctx.fill();
        /* Darker grill marks */
        ctx.fillStyle='#3a1d08';
        for (let i=0;i<3;i++){
            ctx.fillRect(x+w*0.18 + i*w*0.22, y+h*0.25, w*0.06, h*0.5);
        }
        /* Juice highlight */
        ctx.fillStyle='rgba(255,180,120,.28)';
        ctx.beginPath();
        ctx.ellipse(cx-w*.2, cy-h*.15, w*.12, h*.14, 0, 0, Math.PI*2);
        ctx.fill();
    }},
    cheese: { name:'치즈', draw(cx,cy,w,h){
        const x=cx-w/2, y=cy-h/2;
        /* Base slab */
        ctx.fillStyle='#FFCB29';
        drawRR(x, y, w, h*0.7, 3);
        ctx.fill();
        /* Melty drip */
        ctx.fillStyle='#FFCB29';
        ctx.beginPath();
        ctx.moveTo(x, y+h*0.7);
        ctx.lineTo(x+w*0.18, y+h);
        ctx.lineTo(x+w*0.36, y+h*0.72);
        ctx.lineTo(x+w*0.58, y+h*0.98);
        ctx.lineTo(x+w*0.8, y+h*0.7);
        ctx.lineTo(x+w, y+h*0.9);
        ctx.lineTo(x+w, y+h*0.7);
        ctx.closePath();
        ctx.fill();
        /* Shine */
        ctx.fillStyle='rgba(255,255,255,.38)';
        ctx.fillRect(x+w*0.18, y+h*0.1, w*0.16, h*0.12);
    }},
    lettuce: { name:'양상추', draw(cx,cy,w,h){
        /* Wavy top edge; thick green base. */
        ctx.fillStyle='#6FC13B';
        ctx.beginPath();
        const segs=7, x0=cx-w/2;
        ctx.moveTo(x0, cy+h*0.3);
        for (let i=0; i<=segs; i++){
            const xp = x0 + (w*i/segs);
            const dip = (i%2===0) ? cy-h*0.1 : cy-h*0.4;
            ctx.lineTo(xp, dip);
        }
        ctx.lineTo(cx+w/2, cy+h*0.5);
        ctx.lineTo(x0, cy+h*0.5);
        ctx.closePath();
        ctx.fill();
        /* Lighter ruffle highlight */
        ctx.fillStyle='#A0E868';
        ctx.beginPath();
        ctx.moveTo(x0, cy);
        for (let i=0; i<=segs; i++){
            const xp = x0 + (w*i/segs);
            const dip = (i%2===0) ? cy-h*0.05 : cy-h*0.3;
            ctx.lineTo(xp, dip);
        }
        ctx.lineTo(cx+w/2, cy+h*0.15);
        ctx.lineTo(x0, cy+h*0.15);
        ctx.closePath();
        ctx.fill();
    }},
    tomato: { name:'토마토', draw(cx,cy,w,h){
        const x=cx-w/2, y=cy-h/2;
        ctx.fillStyle='#E94A3F';
        drawRR(x, y, w, h, h*0.45);
        ctx.fill();
        /* Seeds */
        ctx.fillStyle='#FFE58A';
        const seeds=4;
        for (let i=0;i<seeds;i++){
            ctx.beginPath();
            ctx.ellipse(x+w*(0.2+i*0.2), cy, Math.max(1.4,w*.04), Math.max(2.4,h*.16), 0, 0, Math.PI*2);
            ctx.fill();
        }
        /* Gloss */
        ctx.fillStyle='rgba(255,255,255,.25)';
        ctx.beginPath();
        ctx.ellipse(cx-w*.25, cy-h*.18, w*.18, h*.12, 0, 0, Math.PI*2);
        ctx.fill();
    }},
    bacon: { name:'베이컨', draw(cx,cy,w,h){
        const x=cx-w/2, y=cy-h/2;
        /* Alternating pink + deep-red streaks for a cartoon bacon look. */
        ctx.fillStyle='#C93C2C';
        drawRR(x, y, w, h, h*0.35);
        ctx.fill();
        ctx.fillStyle='#F2B4A3';
        /* Fat ribbons */
        ctx.beginPath();
        ctx.moveTo(x, cy-h*0.18);
        for (let i=0;i<=6;i++){
            const xp = x + (w*i/6);
            const yp = cy-h*0.18 + Math.sin(i*1.2)*h*0.08;
            ctx.lineTo(xp, yp);
        }
        for (let i=6;i>=0;i--){
            const xp = x + (w*i/6);
            const yp = cy-h*0.02 + Math.sin(i*1.2)*h*0.08;
            ctx.lineTo(xp, yp);
        }
        ctx.closePath();
        ctx.fill();
    }},
    onion: { name:'양파', draw(cx,cy,w,h){
        const x=cx-w/2, y=cy-h/2;
        ctx.fillStyle='#F5EFE0';
        drawRR(x, y, w, h, h*0.45);
        ctx.fill();
        /* Concentric ring suggestion */
        ctx.strokeStyle='rgba(180,160,130,.55)';
        ctx.lineWidth=1.2;
        ctx.beginPath();
        ctx.ellipse(cx, cy, w*.38, h*.28, 0, 0, Math.PI*2);
        ctx.stroke();
        ctx.beginPath();
        ctx.ellipse(cx, cy, w*.2, h*.14, 0, 0, Math.PI*2);
        ctx.stroke();
    }},
    egg: { name:'계란', draw(cx,cy,w,h){
        /* White oval + yellow yolk. */
        ctx.fillStyle='#FFFFFF';
        ctx.beginPath();
        ctx.ellipse(cx, cy, w*0.48, h*0.45, 0, 0, Math.PI*2);
        ctx.fill();
        /* Crinkle edge */
        ctx.fillStyle='#FFFFFF';
        for (let i=0;i<8;i++){
            const a = i*Math.PI*2/8;
            ctx.beginPath();
            ctx.arc(cx+Math.cos(a)*w*0.46, cy+Math.sin(a)*h*0.42, Math.max(2,w*.07), 0, Math.PI*2);
            ctx.fill();
        }
        ctx.fillStyle='#FFD446';
        ctx.beginPath();
        ctx.ellipse(cx, cy, w*0.22, h*0.22, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.5)';
        ctx.beginPath();
        ctx.ellipse(cx-w*.05, cy-h*.05, w*0.08, h*0.07, 0, 0, Math.PI*2);
        ctx.fill();
    }}
};
const INGREDIENT_IDS = Object.keys(INGREDIENTS);
const FILLER_IDS = ['patty','cheese','lettuce','tomato','bacon','onion','egg'];

/* ========================================================================
   Target generation — the sample burger the player must replicate this
   level. Always bookended by a bottom bun (stacked first) and a top bun
   (stacked last); middle fillings chosen at random from the filler pool.
   Length grows with level (3 → 7) up to a hard cap.
   ======================================================================== */
function generateTarget(lvl){
    const totalLen = Math.min(3 + Math.floor(lvl/2), 7);
    const middles  = totalLen - 2;
    const pat = ['bunBottom'];
    for (let i=0; i<middles; i++){
        pat.push(FILLER_IDS[Math.floor(Math.random()*FILLER_IDS.length)]);
    }
    pat.push('bunTop');
    return pat;
}

/* ========================================================================
   Game state
   ======================================================================== */
let level, score, lives;
let target, stackIdx;
let fallers;            /* {id, x, y, vy, rot, vrot} */
let plate;              /* {x, w} — centre-x and width in logical px */
let nextSpawnAt;
let running, paused;
let startedAt, lastTick;
let ingredientsCaught, burgersCompleted;
let shakeUntil, flashUntil, popUntil, popText;
let keyLeft, keyRight;
let dragPointerId;

function resetGame(){
    level = 1; score = 0; lives = 3;
    target = generateTarget(level);
    stackIdx = 0;
    fallers = [];
    plate = { x: W/2, w: 96 };
    nextSpawnAt = 0;
    ingredientsCaught = 0;
    burgersCompleted = 0;
    shakeUntil = 0;
    flashUntil = 0;
    popUntil = 0;
    popText = '';
    keyLeft = false; keyRight = false;
    dragPointerId = null;
    $('scoreNow').textContent='0';
    $('levelNow').textContent='1';
}

function startGame(){
    resetGame();
    fitCanvas();
    $('overlay').classList.add('hidden');
    running = true; paused = false;
    startedAt = performance.now(); lastTick = startedAt;
    nextSpawnAt = startedAt + 600;
    requestAnimationFrame(loop);
}

function gameOver(){
    running = false;
    const duration = Math.round(performance.now() - startedAt);
    const wrap = $('canvasWrap');
    wrap.classList.remove('shake'); void wrap.offsetWidth; wrap.classList.add('shake');
    if(navigator.vibrate) try{ navigator.vibrate([30,20,60]); }catch(_){}

    $('overlay').innerHTML =
        '<h2 class="go">GAME OVER</h2>'
      + '<div class="score-big">'+score+'</div>'
      + '<p>레벨 '+level+' 도달 · 버거 '+burgersCompleted+'개 완성 · 재료 '+ingredientsCaught+'개<br>'
      + '소요 '+(duration/1000).toFixed(1)+'초</p>'
      + '<div class="pb" id="ovPbLine"></div>'
      + '<button class="btn" id="ovBtn">다시하기</button>'
      + '<div class="kbd-hint"><kbd>Enter</kbd> 재시작</div>';
    $('overlay').classList.remove('hidden');
    $('ovBtn').addEventListener('click', startGame);

    (async()=>{
        try{
            const {data,error}=await getSupabase().rpc('record_burger_attempt',{
                p_burgers_completed: burgersCompleted,
                p_ingredients_caught: ingredientsCaught,
                p_level_reached: level,
                p_duration_ms: duration
            });
            if(!error && data?.is_personal_best){ $('ovPbLine').textContent='🏆 개인 신기록!'; }
            else if(error){
                const m=(error.message||'').toLowerCase();
                if(m.includes('rate_limited')) $('ovPbLine').textContent='⏸ 1시간 내 30회 한도 초과';
            }
        }catch(_){}
        loadMyStats();
        loadLeaderboard(currentScope);
    })();

    try{
        const ad=$('adSlot');
        if(ad.style.display==='none' || !ad.style.display){
            ad.style.display='block';
            (adsbygoogle=window.adsbygoogle||[]).push({});
        }
    }catch(_){}
}

/* ========================================================================
   Spawning — one ingredient every (1100 - 60*lvl) ms give-or-take. 55 %
   chance of spawning the NEXT-NEEDED ingredient (so the game rewards
   attention rather than luck); the other 45 % are random distractors.
   If there's no correct-ingredient on screen we always spawn correct so
   the player is never stuck waiting.
   ======================================================================== */
function spawnFaller(now){
    const needed = target[stackIdx];
    const correctOnScreen = fallers.some(f => f.id === needed);
    const pickCorrect = !correctOnScreen || Math.random() < 0.55;
    let id;
    if (pickCorrect){
        id = needed;
    } else {
        const wrongs = INGREDIENT_IDS.filter(x => x !== needed);
        id = wrongs[Math.floor(Math.random()*wrongs.length)];
    }
    const size = 44;
    fallers.push({
        id,
        x: size/2 + 8 + Math.random() * (W - size - 16),
        y: -size,
        vy: 110 + level * 16,
        rot: (Math.random() - 0.5) * 0.25,
        vrot: (Math.random() - 0.5) * 1.8,
        size
    });
}

function maybeSpawn(now){
    if (now >= nextSpawnAt){
        spawnFaller(now);
        const baseMs = 1100 - level * 55;
        const interval = Math.max(420, baseMs) + Math.random() * 280;
        nextSpawnAt = now + interval;
    }
}

/* ========================================================================
   Update — plate physics, falling, catch detection.
   The "plate catch zone" is a small rectangle just above the plate disk.
   When an ingredient's centre enters it, the ingredient is caught.
   ======================================================================== */
const PLATE_Y = H - 54;        /* centre-y of the plate disk */
const CATCH_Y = PLATE_Y - 14;  /* y at which ingredients can be caught */

function update(now, dt){
    /* Plate keyboard motion */
    const plateSpeed = 360;
    if (keyLeft  && !keyRight) plate.x -= plateSpeed * dt;
    if (keyRight && !keyLeft)  plate.x += plateSpeed * dt;
    plate.x = Math.max(plate.w/2, Math.min(W - plate.w/2, plate.x));

    maybeSpawn(now);

    /* Falling ingredients */
    for (let i = fallers.length - 1; i >= 0; i--){
        const f = fallers[i];
        f.y += f.vy * dt;
        f.rot += f.vrot * dt;

        /* Catch window: ingredient centre crossed CATCH_Y + horizontal
           overlap with the plate (a bit of grace: plate-width + 10 px). */
        if (f.y >= CATCH_Y && Math.abs(f.x - plate.x) < plate.w/2 + 10){
            handleCatch(f, now);
            fallers.splice(i, 1);
            continue;
        }
        if (f.y > H + 40){
            fallers.splice(i, 1);
        }
    }
}

function handleCatch(f, now){
    const expected = target[stackIdx];
    if (f.id === expected){
        ingredientsCaught++;
        stackIdx++;
        score += 10 * level;
        popText = '+' + (10*level);
        popUntil = now + 500;
        if (stackIdx >= target.length){
            burgersCompleted++;
            const bonus = 50 + level * 10;
            score += bonus;
            flashUntil = now + 500;
            popText = '🎉 +' + bonus;
            level++;
            target = generateTarget(level);
            stackIdx = 0;
            if(navigator.vibrate) try{ navigator.vibrate([15,25,15,25,60]); }catch(_){}
        } else {
            if(navigator.vibrate) try{ navigator.vibrate(8); }catch(_){}
        }
        $('scoreNow').textContent = score;
        $('levelNow').textContent = level;
    } else {
        lives--;
        shakeUntil = now + 320;
        popText = '-❤';
        popUntil = now + 600;
        const wrap = $('canvasWrap');
        wrap.classList.remove('shake'); void wrap.offsetWidth; wrap.classList.add('shake');
        setTimeout(()=>wrap.classList.remove('shake'), 420);
        if(navigator.vibrate) try{ navigator.vibrate([40,30,90]); }catch(_){}
        if (lives <= 0){
            gameOver();
            return;
        }
    }
}

/* ========================================================================
   Render
   ======================================================================== */
const TARGET_STRIP_H = 52;

function draw(now){
    /* Background */
    ctx.fillStyle = '#14092A';
    ctx.fillRect(0,0,W,H);
    /* Decorative radial gradient floor-glow where the plate sits */
    const g = ctx.createRadialGradient(W/2, H-20, 20, W/2, H-20, W*0.7);
    g.addColorStop(0, 'rgba(255,183,77,.15)');
    g.addColorStop(1, 'rgba(255,183,77,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    /* Play-area separator line */
    ctx.strokeStyle = 'rgba(255,255,255,.06)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, TARGET_STRIP_H);
    ctx.lineTo(W, TARGET_STRIP_H);
    ctx.stroke();

    drawTargetStrip(now);
    drawFallers(now);
    drawPlate(now);
    drawHUD(now);

    /* Pop text overlay */
    if (now < popUntil && popText){
        const rem = popUntil - now;
        const a = Math.min(1, rem/200);
        ctx.globalAlpha = a;
        ctx.fillStyle = popText.includes('❤') ? '#FF6B8B' : '#FFE066';
        ctx.font = '700 20px Orbitron, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(popText, plate.x, PLATE_Y - 30 - (500-rem)*0.06);
        ctx.globalAlpha = 1;
        ctx.textAlign = 'start';
    }
    /* Level-up green flash */
    if (now < flashUntil){
        const rem = flashUntil - now;
        ctx.fillStyle = 'rgba(0,230,118,'+ (rem/1200) +')';
        ctx.fillRect(0,0,W,H);
    }
}

function drawTargetStrip(now){
    /* Strip background */
    ctx.fillStyle = 'rgba(255,255,255,.04)';
    ctx.fillRect(0, 0, W, TARGET_STRIP_H);

    const n = target.length;
    const pad = 10;
    const slot = (W - pad*2) / n;
    for (let i=0; i<n; i++){
        const cx = pad + slot*i + slot/2;
        const cy = TARGET_STRIP_H/2;
        const iw = Math.min(slot - 8, 38);
        const ih = Math.min(28, iw*0.7);

        /* Status: caught / current / upcoming */
        const caught = i < stackIdx;
        const current = i === stackIdx;

        if (current){
            /* Glowing ring */
            const pulse = 1 + 0.15*Math.sin(now/180);
            ctx.strokeStyle = 'rgba(255,230,102,.85)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.ellipse(cx, cy, (iw/2 + 6)*pulse, (ih/2 + 6)*pulse, 0, 0, Math.PI*2);
            ctx.stroke();
        }
        ctx.globalAlpha = caught ? 0.35 : 1;
        INGREDIENTS[target[i]].draw(cx, cy, iw, ih);
        ctx.globalAlpha = 1;
        if (caught){
            /* Check mark */
            ctx.strokeStyle = '#00E676';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(cx-5, cy+1);
            ctx.lineTo(cx-1, cy+5);
            ctx.lineTo(cx+6, cy-4);
            ctx.stroke();
        }
    }
}

function drawFallers(now){
    for (const f of fallers){
        ctx.save();
        ctx.translate(f.x, f.y);
        ctx.rotate(f.rot);
        /* Drop shadow */
        ctx.fillStyle = 'rgba(0,0,0,.35)';
        ctx.beginPath();
        ctx.ellipse(0, f.size*0.55, f.size*0.38, f.size*0.14, 0, 0, Math.PI*2);
        ctx.fill();
        INGREDIENTS[f.id].draw(0, 0, f.size, f.size*0.6);
        ctx.restore();
    }
}

function drawPlate(now){
    /* Stack on plate — caught ingredients pile bottom-up. */
    const stackBaseY = PLATE_Y - 6;
    const itemH = 16;
    for (let i = 0; i < stackIdx; i++){
        const iy = stackBaseY - i*itemH - itemH/2;
        INGREDIENTS[target[i]].draw(plate.x, iy, plate.w*0.82, itemH-1);
    }

    /* Plate (oval) */
    const plateW = plate.w, plateH = 18;
    /* Shadow below plate */
    ctx.fillStyle = 'rgba(0,0,0,.35)';
    ctx.beginPath();
    ctx.ellipse(plate.x, PLATE_Y + 14, plateW*0.55, 5, 0, 0, Math.PI*2);
    ctx.fill();
    /* Plate base */
    const pg = ctx.createLinearGradient(0, PLATE_Y-10, 0, PLATE_Y+10);
    pg.addColorStop(0, '#FFFFFF');
    pg.addColorStop(1, '#D6DAE6');
    ctx.fillStyle = pg;
    ctx.beginPath();
    ctx.ellipse(plate.x, PLATE_Y, plateW/2, plateH/2, 0, 0, Math.PI*2);
    ctx.fill();
    /* Plate rim */
    ctx.strokeStyle = 'rgba(0,0,0,.15)';
    ctx.lineWidth = 1.4;
    ctx.stroke();
    /* Inner highlight */
    ctx.fillStyle = 'rgba(255,255,255,.5)';
    ctx.beginPath();
    ctx.ellipse(plate.x - plateW*0.2, PLATE_Y - 2, plateW*0.12, 2, 0, 0, Math.PI*2);
    ctx.fill();
}

function drawHUD(now){
    /* Hearts top-right of canvas */
    const hr = 12;
    for (let i=0;i<3;i++){
        const x = W - 14 - i*22;
        const y = 14 + TARGET_STRIP_H + 8;
        const alive = i < lives;
        drawHeart(x, y, hr, alive ? '#FF4B6B' : 'rgba(255,255,255,.15)');
    }
}

function drawHeart(cx, cy, r, fill){
    ctx.save();
    ctx.fillStyle = fill;
    ctx.beginPath();
    ctx.moveTo(cx, cy + r*0.5);
    ctx.bezierCurveTo(cx - r*1.1, cy - r*0.3, cx - r*0.5, cy - r*1.1, cx, cy - r*0.3);
    ctx.bezierCurveTo(cx + r*0.5, cy - r*1.1, cx + r*1.1, cy - r*0.3, cx, cy + r*0.5);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
}

function loop(now){
    if (!running) return;
    if (!paused){
        const dt = Math.min(0.05, Math.max(0, (now - lastTick) / 1000));
        lastTick = now;
        update(now, dt);
        if (!running){ draw(now); return; }
    } else {
        lastTick = now;
    }
    draw(now);
    requestAnimationFrame(loop);
}

/* ========================================================================
   Input — keyboard arrows for desktop; pointer / touch drag for phone.
   Drag uses absolute positioning (plate jumps to where the finger is)
   because for a catch-the-falling-object game this is more responsive
   than relative-delta dragging. We also capture the pointer so the
   drag keeps tracking even when the finger leaves the canvas bounds.
   ======================================================================== */
document.addEventListener('keydown', (e)=>{
    const k = e.key;
    if (k === 'ArrowLeft' || k === 'a' || k === 'A') keyLeft = true;
    else if (k === 'ArrowRight' || k === 'd' || k === 'D') keyRight = true;
    else if (k === ' '){ if (running) paused = !paused; e.preventDefault(); }
    else if (k === 'Enter'){ if (!running) startGame(); }
    else return;
    if (k.startsWith('Arrow')) e.preventDefault();
});
document.addEventListener('keyup', (e)=>{
    const k = e.key;
    if (k === 'ArrowLeft' || k === 'a' || k === 'A') keyLeft = false;
    else if (k === 'ArrowRight' || k === 'd' || k === 'D') keyRight = false;
});

function pointerXToCanvas(clientX){
    const rect = canvas.getBoundingClientRect();
    return (clientX - rect.left) * (W / rect.width);
}
canvas.addEventListener('pointerdown', (e)=>{
    if (!running) return;
    dragPointerId = e.pointerId;
    try { canvas.setPointerCapture(e.pointerId); } catch(_){}
    const x = pointerXToCanvas(e.clientX);
    plate.x = Math.max(plate.w/2, Math.min(W - plate.w/2, x));
    e.preventDefault();
});
canvas.addEventListener('pointermove', (e)=>{
    if (dragPointerId === null || e.pointerId !== dragPointerId) return;
    const x = pointerXToCanvas(e.clientX);
    plate.x = Math.max(plate.w/2, Math.min(W - plate.w/2, x));
    e.preventDefault();
});
function endPointer(e){
    if (dragPointerId !== null && e.pointerId === dragPointerId){
        try { canvas.releasePointerCapture(e.pointerId); } catch(_){}
        dragPointerId = null;
    }
}
canvas.addEventListener('pointerup', endPointer);
canvas.addEventListener('pointercancel', endPointer);
canvas.addEventListener('pointerleave', endPointer);

/* Touch — prevent page scroll when dragging on the canvas. */
canvas.addEventListener('touchstart', e=>e.preventDefault(), {passive:false});
canvas.addEventListener('touchmove',  e=>e.preventDefault(), {passive:false});

/* ========== Bottom sheet + Leaderboards ========== */
const sheet=$('sheet'), sheetBack=$('sheetBack');
function openSheet(){ sheet.classList.add('on'); sheetBack.classList.add('on'); loadLeaderboard(currentScope); }
function closeSheet(){ sheet.classList.remove('on'); sheetBack.classList.remove('on'); }
$('openLb').addEventListener('click', openSheet);
sheetBack.addEventListener('click', closeSheet);

let currentScope='world';
document.querySelectorAll('.lb-tab').forEach(b=>{
    b.addEventListener('click', ()=>{
        document.querySelectorAll('.lb-tab').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        currentScope=b.dataset.scope;
        loadLeaderboard(currentScope);
    });
});
async function loadLeaderboard(scope){
    $('lbList').innerHTML='<div class="lb-empty">불러오는 중…</div>';
    try{
        const {data,error}=await getSupabase().rpc('burger_leaderboard',{p_scope:scope,p_limit:50});
        if(error||!data){ $('lbList').innerHTML='<div class="lb-empty">기록 없음</div>'; return; }
        if(!data.length){ $('lbList').innerHTML='<div class="lb-empty">첫 기록의 주인공이 되세요!</div>'; return; }
        $('lbList').innerHTML=data.map(row=>{
            const isSelf=me && row.user_id===me.id;
            const rnkCls=row.rnk===1?' gold':row.rnk===2?' silver':row.rnk===3?' bronze':'';
            const av=row.avatar_url
                ? '<div class="lb-av"><img src="'+esc(row.avatar_url)+'" referrerpolicy="no-referrer" alt=""></div>'
                : '<div class="lb-av">'+esc(initials(row.nickname))+'</div>';
            return '<div class="lb-row'+(isSelf?' self':'')+'">'
                 +'<div class="lb-rnk'+rnkCls+'">'+(row.rnk<=3?(['🥇','🥈','🥉'][row.rnk-1]):('#'+row.rnk))+'</div>'
                 +'<div class="lb-who">'+av+'<div class="lb-nick">'+esc(row.nickname||'?')+'</div></div>'
                 +'<div class="lb-score">'+row.best_score+'</div>'
                 +'</div>';
        }).join('');
    }catch(_){$('lbList').innerHTML='<div class="lb-empty">불러오기 실패</div>';}
}

/* ========== Boot ========== */
$('ovBtn').addEventListener('click', startGame);
(async()=>{
    await initAuth();
    if (me){
        resetGame();
        fitCanvas();
        draw(performance.now());
    }
})();

/* Inline SW cleanup — same pattern as every other page to nuke any
   legacy service-worker registrations lingering on old installs. */
try{
    if('serviceWorker' in navigator){
        navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister()));
    }
}catch(_){}
