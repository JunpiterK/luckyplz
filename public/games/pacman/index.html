    <style>
/* Mobile-portrait first. See memory/mobile_first_games.md */
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --dark:#0A0A1A;--accent:#FFE66D;--danger:#FF3366;
    --success:#00E676;--cyan:#00D9FF;--pac:#FFD500;--wall:#2a2a6e;
    --muted:rgba(255,255,255,.55);--muted-2:rgba(255,255,255,.35);
    --panel-br:rgba(255,255,255,.07);
    --sb-bottom: env(safe-area-inset-bottom, 0px);
}
html,body{height:100%;overscroll-behavior:none}
body{
    font-family:'Noto Sans KR',sans-serif;background:var(--dark);color:#fff;
    min-height:100dvh;overflow-x:hidden;letter-spacing:.01em;
    background-image:radial-gradient(ellipse at 50% 20%,rgba(255,213,0,.04) 0%,transparent 55%),linear-gradient(180deg,#0A0A1A 0%,#10101F 50%,#0A0A1A 100%);
    -webkit-tap-highlight-color:transparent;
    user-select:none;-webkit-user-select:none
}

.topbar{display:flex;align-items:center;gap:10px;padding:10px 14px;position:sticky;top:0;z-index:10;background:rgba(10,10,26,.88);backdrop-filter:blur(14px);border-bottom:1px solid var(--panel-br)}
.topbar .home{text-decoration:none;color:rgba(255,255,255,.8);padding:7px 11px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);font-size:.78em;font-weight:700}
.topbar h1{font-family:'Orbitron','Noto Sans KR',sans-serif;font-size:1em;font-weight:900;margin:0;flex:1;text-align:center;background:linear-gradient(135deg,#FFD500,#FFE66D,#FF9A3C);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar .slot{min-width:64px;text-align:right;display:flex;gap:6px;align-items:center;justify-content:flex-end}
.topbar .auth-chip{padding:5px 10px;border-radius:999px;background:rgba(255,230,109,.1);border:1px solid rgba(255,230,109,.25);color:#FFE66D;font-size:.72em;font-weight:700;text-decoration:none;white-space:nowrap}
.topbar .lb-btn{padding:6px 10px;border-radius:10px;background:rgba(255,213,0,.08);border:1px solid rgba(255,213,0,.3);color:#FFD500;font-size:.78em;font-weight:800;cursor:pointer;font-family:inherit}
.topbar .lb-btn:active{background:rgba(255,213,0,.2)}

.wrap{display:flex;flex-direction:column;align-items:center;gap:10px;padding:10px 12px calc(var(--sb-bottom) + 14px);max-width:420px;margin:0 auto}
/* Left column wraps the score / canvas / dpad / hint stack. Previously
   only styled on desktop (@media >=1024) — on mobile it was a default
   block, so narrower children (the canvas) sat left-aligned instead
   of centered under the full-width score strip. Base flex-column
   with align-items:center keeps the whole stack on the same axis
   regardless of child width. */
.left-col{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%}

.score-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%}
.ss{background:linear-gradient(165deg,rgba(22,22,42,.55),rgba(12,12,28,.8));border:1px solid var(--panel-br);border-radius:14px;padding:10px 6px;text-align:center;min-height:58px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ss .v{font-family:'Orbitron',sans-serif;font-size:1.6em;font-weight:900;line-height:1;color:#fff;font-variant-numeric:tabular-nums}
.ss .v.best{color:#FFD500}
.ss .l{font-size:.6em;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);margin-top:4px;font-weight:800}

/* Game control bar — visible during play across all viewports. */
.game-ctrl{display:none;align-items:center;justify-content:center;width:100%;max-width:396px;gap:10px;margin:-2px 0 0}
.game-ctrl.on{display:flex}
.ctrl-btn{padding:8px 20px;border-radius:999px;background:rgba(0,217,255,.1);border:1px solid rgba(0,217,255,.42);color:#00D9FF;font-size:.85em;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:.04em;display:inline-flex;align-items:center;gap:6px;line-height:1}
.ctrl-btn:active{background:rgba(0,217,255,.22);transform:translateY(1px)}

/* Maze is 13 wide × 15 tall → aspect 13/15. Fit portrait-friendly. */
.canvas-wrap{
    position:relative;
    background:#05050f;border:2px solid rgba(255,213,0,.22);border-radius:16px;
    box-shadow:0 14px 34px -10px rgba(255,213,0,.18),inset 0 0 40px rgba(255,213,0,.04);
    overflow:hidden;
    aspect-ratio:13/15;
    /* Fills the left-col width (≤ 420 − padding ≈ 396 px on phone) so
       the canvas visually lines up with the score strip above and the
       dpad wrap below. Previously width:min(92vw,390px) produced a
       narrower-than-siblings board that read as left-shifted. */
    width:100%;max-width:396px;
    touch-action:none
}
#pac-canvas{display:block;width:100%;height:100%}

.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,5,15,.82);backdrop-filter:blur(6px);padding:18px;text-align:center;transition:opacity .18s;z-index:2}
.overlay.hidden{opacity:0;pointer-events:none}
.overlay h2{font-family:'Orbitron',sans-serif;font-size:1.6em;font-weight:900;margin-bottom:4px}
.overlay h2.go{color:#FF6B8B}
.overlay h2.win{color:#00E676}
.overlay h2.play{background:linear-gradient(135deg,#FFD500,#FF9A3C);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.overlay p{color:rgba(255,255,255,.72);font-size:.86em;margin-bottom:12px;line-height:1.5;max-width:280px}
.overlay .score-big{font-family:'Orbitron',sans-serif;font-size:2.6em;font-weight:900;color:#FFD500;margin:6px 0;line-height:1}
.overlay .pb{font-size:.84em;color:#FFD500;margin-bottom:12px;font-weight:700;min-height:1.1em}
.overlay .rank-card{width:100%;max-width:320px;background:linear-gradient(165deg,rgba(0,217,255,.12),rgba(0,217,255,.03));border:1px solid rgba(0,217,255,.42);border-radius:16px;padding:18px 20px;margin:8px 0 16px;display:flex;flex-direction:column;align-items:center;gap:8px;box-shadow:0 8px 24px -8px rgba(0,217,255,.4)}
.overlay .rank-card-rank{font-family:'Orbitron',sans-serif;font-size:1.5em;font-weight:900;color:#00D9FF;line-height:1.1;letter-spacing:.02em;text-align:center}
.overlay .rank-card-pct{font-size:1em;font-weight:700;color:rgba(255,255,255,.95);letter-spacing:.02em;text-align:center;min-height:1em}
.overlay .rank-card-pb{font-size:.88em;font-weight:700;color:#FFD500;min-height:1em;margin:0;text-align:center}
.overlay .rank-card-link{margin-top:4px;padding:8px 18px;font-size:.85em;font-weight:800;color:#00D9FF;background:transparent;border:1px solid rgba(0,217,255,.5);border-radius:999px;cursor:pointer;font-family:inherit;letter-spacing:.04em}
.overlay .rank-card-link:active{transform:translateY(1px);background:rgba(0,217,255,.12)}
.overlay .rank-card-debug{font-size:.68em;color:rgba(255,107,107,.92);font-family:'Courier New',monospace;letter-spacing:0;margin-top:0;min-height:0;text-align:center;word-break:break-word;max-width:100%;line-height:1.3}
.overlay .btn{padding:12px 26px;border-radius:14px;border:0;background:linear-gradient(135deg,#FFD500,#FF9A3C);color:#201800;font-family:'Orbitron',sans-serif;font-weight:900;letter-spacing:.08em;font-size:1em;cursor:pointer;box-shadow:0 10px 26px -6px rgba(255,213,0,.5)}
.overlay .btn:active{transform:translateY(1px)}
.overlay .kbd-hint{margin-top:12px;font-size:.72em;color:rgba(255,255,255,.35);letter-spacing:.03em}
.overlay .kbd-hint kbd{padding:2px 6px;border-radius:5px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);font-family:inherit;color:#fff}

.dpad-wrap{width:100%;max-width:440px;padding:4px 0 0;display:flex;justify-content:center}
/* 2-row layout: down sits directly beneath up (no pause button
   in between). Pause is still reachable via Space on desktop; on
   mobile a user can just stop moving to "pause" the game naturally.
   Removing the middle button tightens the thumb-travel between up
   and down which several testers said felt awkward before. */
.dpad{display:grid;grid-template-columns:repeat(3,72px);grid-template-rows:repeat(2,72px);gap:8px}
.dpad button{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.12);color:rgba(255,255,255,.85);font-size:1.6em;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:transform .08s,background .12s,border-color .12s,color .12s;font-family:inherit;touch-action:none}
.dpad button:active{background:rgba(255,213,0,.18);border-color:rgba(255,213,0,.5);color:#FFD500;transform:scale(.92)}
.dpad .dp-up   {grid-column:2;grid-row:1}
.dpad .dp-left {grid-column:1;grid-row:2}
.dpad .dp-down {grid-column:2;grid-row:2}
.dpad .dp-right{grid-column:3;grid-row:2}
@media(hover:hover) and (pointer:fine){ .dpad-wrap{display:none} }

.hint{font-size:.78em;color:var(--muted);line-height:1.5;padding:8px 12px;background:rgba(255,255,255,.02);border-radius:10px;border:1px solid rgba(255,255,255,.04);text-align:center;width:100%;max-width:440px}

/* Bottom sheet */
.sheet-backdrop{position:fixed;inset:0;z-index:50;background:rgba(5,5,15,.6);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .22s}
.sheet-backdrop.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:51;max-height:78vh;overflow:hidden;background:linear-gradient(180deg,rgba(22,22,42,.98),rgba(12,12,28,1));border-top-left-radius:22px;border-top-right-radius:22px;border-top:1px solid rgba(255,255,255,.08);transform:translateY(100%);transition:transform .26s cubic-bezier(.2,.8,.4,1);padding-bottom:calc(var(--sb-bottom) + 14px);display:flex;flex-direction:column}
.sheet.on{transform:translateY(0)}
.sheet .handle{width:42px;height:4px;border-radius:2px;background:rgba(255,255,255,.25);margin:10px auto}
.sheet h3{font-family:'Orbitron',sans-serif;font-size:.92em;font-weight:900;text-align:center;letter-spacing:.06em;color:#FFD500;padding:2px 0 10px}
.sheet-body{overflow-y:auto;padding:0 14px;flex:1;min-height:0}

.lb-tabs{display:flex;gap:6px;background:rgba(10,10,26,.55);padding:4px;border-radius:12px;border:1px solid var(--panel-br);margin:0 14px 12px}
.lb-tab{flex:1;padding:10px 8px;border:0;background:transparent;color:rgba(255,255,255,.55);cursor:pointer;font-family:inherit;font-size:.82em;font-weight:700;letter-spacing:.04em;border-radius:8px}
.lb-tab.active{background:rgba(255,213,0,.14);color:#FFD500}
.lb-list{background:rgba(255,255,255,.02);border:1px solid var(--panel-br);border-radius:14px;overflow:hidden;margin-bottom:10px}
.lb-row{display:grid;grid-template-columns:38px 1fr 88px;gap:10px;align-items:center;padding:10px 12px;border-bottom:1px solid var(--panel-br)}
.lb-row:last-child{border-bottom:0}
.lb-row.self{background:rgba(255,230,109,.06);border-left:3px solid #FFE66D;padding-left:9px}
.lb-rnk{font-family:'Orbitron',sans-serif;font-weight:900;font-size:.92em;color:var(--muted-2);text-align:center}
.lb-who{display:flex;align-items:center;gap:8px;min-width:0}
.lb-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#FF6B35,#FF6B8B);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-weight:900;font-size:.74em;color:#fff;flex-shrink:0;overflow:hidden}
.lb-av img{width:100%;height:100%;object-fit:cover}
.lb-nick{font-weight:600;font-size:.9em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-score{font-family:'Orbitron',sans-serif;font-weight:800;font-size:.92em;color:#FFD500;text-align:right;font-variant-numeric:tabular-nums}
.lb-empty{padding:28px 14px;text-align:center;color:var(--muted-2);font-size:.86em}

@keyframes shake{0%,100%{transform:translate(0,0)}20%{transform:translate(-3px,2px)}40%{transform:translate(3px,-2px)}60%{transform:translate(-2px,-2px)}80%{transform:translate(2px,3px)}}
.canvas-wrap.shake{animation:shake .4s ease}

#adSlot.ad-col{width:100%;max-width:440px;min-height:80px;display:none;margin-top:2px;align-self:center;order:99}

/* Tablet portrait / large phone landscape (768–1023px) — single column,
   bigger canvas. pacman is 13:15 so cap by max-height. */
@media(min-width:768px) and (max-width:1023px){
    .canvas-wrap{max-width:480px;max-height:72vh}
    .score-strip{max-width:480px}
    .game-ctrl{max-width:480px}
    .dpad-wrap{max-width:480px}
    .hint{max-width:480px}
}
@media(min-width:1024px){
    /* PC: viewport split into exact thirds. pacman 13:15 portrait —
       cap mid-col 500 to keep the maze legible. */
    .wrap{max-width:none;margin:0;display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;align-items:start;padding:22px 24px;min-height:calc(100dvh - 60px)}
    .left-col{grid-column:2;display:flex;flex-direction:column;gap:12px;align-items:center;width:100%;max-width:500px;justify-self:center}
    .canvas-wrap{width:100%;max-width:none;max-height:82vh}
    .score-strip{width:100%}
    .game-ctrl{width:100%}
    .hint{width:100%}
    #adSlot.ad-col{grid-column:1;display:block;width:100%;max-width:380px;justify-self:center;min-height:600px;margin:0;align-self:start;background:rgba(255,255,255,.02);border:1px dashed rgba(255,255,255,.06);border-radius:14px}
    .right-col{grid-column:3;width:100%;max-width:400px;justify-self:center}
    .right-col .sheet{position:static;transform:none!important;max-height:none;border-radius:18px;border:1px solid var(--panel-br);background:rgba(14,14,28,.55);padding-bottom:14px;pointer-events:auto;width:100%}
    .right-col .sheet .handle{display:none}
    .right-col .sheet-backdrop, .topbar .lb-btn{display:none}
}
    </style>

<script>
const $=(id)=>document.getElementById(id);
const esc=(s)=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const initials=(n)=>(n||'?').trim()[0]?.toUpperCase()||'?';

let me=null;

/* ---- Auth init (anon-friendly) ----
   Anon users CAN play and view leaderboards but cannot save records.
   When not logged in we show a login chip instead of a profile chip,
   skip the profile/stats fetch, and let the game-over flow surface a
   "🔒 로그인하면 기록 저장!" hint while still loading world rankings. */
async function initAuth(){
    try{
        const u=await getUser();
        if(!u){
            me=null;
            $('authSlot').innerHTML='<a class="auth-chip" href="/auth/?next='+encodeURIComponent(location.pathname)+'">로그인</a>';
            return;
        }
        me=u;
        const prof=await getSupabase().from('profiles').select('nickname,avatar_url').eq('id',u.id).maybeSingle();
        const nick=prof.data?.nickname||'나';
        $('authSlot').innerHTML='<a class="auth-chip" href="/me/">'+esc(nick)+'</a>';
        try {
            window._lpMe = u;
            window._lpMyNickname = nick;
            window._lpMyAvatar = prof.data?.avatar_url || null;
        } catch(_){}
        loadMyStats();
    }catch(e){console.warn('auth init',e)}
}
function openPacmanRankSheet(){
    if(!window.LpRankSheet) return;
    LpRankSheet.open({
        gameKey:           'pacman',
        gameTitle:         'PAC-MAN',
        leaderboardRpc:    'pacman_leaderboard',
        myStatsRpc:        'pacman_my_stats',
        scoreField:        'best_score',
        myStatsRankField:  'world_rank',
        myStatsScoreField: 'best_score',
        formatScore:       n => Number(n).toLocaleString()
    });
}
async function loadMyStats(){
    if(!me)return;
    try{
        const {data,error}=await getSupabase().rpc('pacman_my_stats');
        if(error||!data||!data.has_record)return;
        $('bestScore').textContent=data.best_score;
    }catch(_){}
}

/* =========================================================
   Maze — 13 cols × 15 rows.
   # wall  . dot  P power pellet  _ empty (tunnel / ghost spawn)

   THREE STAGES — each clears when all dots+pellets are eaten. Stage
   advances ghost speed slightly so the run gets harder as the player
   progresses (5.6 → 6.0 → 6.4 tiles/sec). Final stage cleared = full
   victory bonus.

   Connectivity audit (2026-04-29): the previous SINGLE maze had four
   orphan dot cells at (3,6), (4,6), (10,6), (11,6) — each pair
   surrounded by walls on three sides, only connected to its mirror
   pair. Result: dots that could never be eaten, win-condition
   permanently blocked. Fixed by closing those cells (col 6 of rows
   3, 4, 10, 11 → wall) so the maze is fully connected.
   ========================================================= */
const MAZES = [
    /* ---- STAGE 1 — classic 4-quadrant layout (fixed orphan cells) ---- */
    [
        '#############',
        '#...........#',
        '#.###.#.###.#',
        '#P...###...P#',  /* col 6: . → # (was orphan) */
        '#.##.###.##.#',  /* col 6: . → # (was orphan) */
        '#.....#.....#',
        '#.###.#.###.#',
        '#..._...._..#',   /* central corridor — _ = no dot, free path */
        '#.###.#.###.#',
        '#.....#.....#',
        '#.##.###.##.#',  /* col 6: . → # (mirror, was orphan) */
        '#P...###...P#',  /* col 6: . → # (mirror, was orphan) */
        '#.###.#.###.#',
        '#...........#',
        '#############'
    ],
    /* ---- STAGE 2 — open-centre variant. Top + bottom thirds opened
       up so the player can sprint across; mid-section keeps the cross
       walls for ghost containment. More dots overall (~93 vs ~85 in
       stage 1). ----------------------------------------------------- */
    [
        '#############',
        '#...........#',
        '#.###...###.#',  /* centre (cols 5-7) opened */
        '#P.........P#',  /* full corridor */
        '#.##.....##.#',  /* centre (cols 4-8) opened */
        '#.....#.....#',
        '#.###.#.###.#',
        '#..._...._..#',
        '#.###.#.###.#',
        '#.....#.....#',
        '#.##.....##.#',  /* mirror */
        '#P.........P#',  /* mirror */
        '#.###...###.#',  /* mirror */
        '#...........#',
        '#############'
    ],
    /* ---- STAGE 3 — pillared variant. Rows 6 & 8 have alternating
       wall pillars (col 2/4/6/8/10 walls, col 1/3/5/7/9/11 paths) so
       movement zigzags. Ghosts can corner you faster — pairs with the
       per-stage speed bump. ---------------------------------------- */
    [
        '#############',
        '#...........#',
        '#.###.#.###.#',
        '#P...###...P#',
        '#.##.###.##.#',
        '#.....#.....#',
        '#.#.#.#.#.#.#',  /* alternating pillars */
        '#..._...._..#',
        '#.#.#.#.#.#.#',  /* alternating pillars */
        '#.....#.....#',
        '#.##.###.##.#',
        '#P...###...P#',
        '#.###.#.###.#',
        '#...........#',
        '#############'
    ]
];
const COLS = MAZES[0][0].length;
const ROWS = MAZES[0].length;
/* Active maze pointer — set in resetGame() based on currentStage. */
let MAZE_STR = MAZES[0];
const CELL = 20;                   /* internal pixel size per cell */
const BW = COLS * CELL, BH = ROWS * CELL;

const canvas = $('pac-canvas');
canvas.width = BW; canvas.height = BH;
const ctx = canvas.getContext('2d');

/* ========== Sound (LPAudio shared engine) ========== */
let _wakaToggle = false;
function sfxDot(){
    _wakaToggle = !_wakaToggle;
    LPAudio.beep({freq:_wakaToggle?420:320, dur:0.08, vol:0.12, type:'square', decay:0.5});
}
function sfxPower(){
    LPAudio.seq([{f:200,d:0.07},{f:250,d:0.07},{f:300,d:0.07},{f:380,d:0.12}], {vol:0.22, type:'sawtooth'});
}
function sfxEatGhost(){
    LPAudio.seq([{f:600,d:0.05},{f:500,d:0.05},{f:700,d:0.05},{f:900,d:0.1}], {vol:0.2, type:'square'});
}
function sfxDie(){
    LPAudio.seq([
        {f:480,d:0.07},{f:400,d:0.07},{f:320,d:0.07},{f:240,d:0.07},
        {f:160,d:0.07},{f:100,d:0.07},{f:60,d:0.18}
    ], {vol:0.2, type:'sawtooth'});
}
function sfxWin(){
    LPAudio.seq([
        {f:330,d:0.1},{f:392,d:0.1},{f:494,d:0.1},{f:523,d:0.1},
        {f:587,d:0.1},{f:659,d:0.1},{f:784,d:0.2}
    ], {vol:0.2, type:'triangle'});

function sfxStart(){
    LPAudio.seq([
        {f:294,d:0.1},{f:370,d:0.1},{f:440,d:0.1},{f:523,d:0.18}
    ], {vol:0.18, type:'triangle'});
}

/* Parse maze into walkable bitmap + dot set.
   Reads from the active MAZE_STR which is set by resetGame() to the
   current stage's layout (MAZES[currentStage]). Caller is expected
   to have updated MAZE_STR before invoking. */
let wall = [];   /* wall[y][x] = true if wall */
let dots, powers;
let totalDotsInitial = 0;
function loadMaze(){
    wall = MAZE_STR.map(r => r.split('').map(c => c==='#'));
    dots = new Set();
    powers = new Set();
    totalDotsInitial = 0;
    for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++){
        const c = MAZE_STR[y][x];
        if(c==='.'){ dots.add(x+','+y); totalDotsInitial++; }
        else if(c==='P'){ powers.add(x+','+y); totalDotsInitial++; }
    }
}
loadMaze();

/* Game state.
   Player/ghost positions are FLOAT tile coordinates so rendering is
   smooth (continuous movement) instead of tile-hopping every 130 ms.
   Speed is tiles-per-second; 7.7 tps ≈ the old 130 ms/tile cadence,
   8.5 tps for player feels noticeably more responsive without
   outpacing the chaser ghost (7.0 tps) enough to break the chase. */
let player, ghosts, dir, nextDir;
let score = 0, dotsEaten = 0, ghostsEaten = 0;
let running = false, paused = false;
/* Stage progression — index into MAZES. Reset to 0 on a new game,
   advances on stage clear (all dots eaten). Final stage clear =
   game over with the cumulative-victory bonus. */
let currentStage = 0;
const STAGE_COUNT = MAZES.length;

/* ---- Pause UI sync (mobile/tablet/PC parity) ---- */
function syncPauseUI(){
    const gc=$('gameCtrl'), btn=$('pauseBtn');
    if(!gc||!btn) return;
    if(running){
        gc.classList.add('on');
        btn.textContent = paused ? '▶ 재개' : '⏸ 일시정지';
        btn.setAttribute('aria-label', paused ? '재개' : '일시정지');
    } else {
        gc.classList.remove('on');
    }
}
let startedAt = 0, lastTick = 0;
/* Speed tuning notes:
   - playerSpeed > ghostSpeed by design — without a margin, ghosts
     overtake on every straight corridor and the game's unwinnable.
   - Original values (player 8.5, ghost 7.0, power 6000 ms) play-tested
     too aggressively for casual users who reported "유령이 너무 빨라
     도망 못 다님". 2026-04-29 retune drops ghosts ~20 % and stretches
     the power-pellet window ~33 %, combining for a perceived ~30 %
     easier session at our target audience's reaction-time band. */
let playerSpeed = 8.5;   /* tiles/sec — kept as-is */
let ghostSpeed  = 5.6;   /* tiles/sec — was 7.0 (-20 %) */
let vulnerableUntil = 0;
let mouthPhase = 0;   /* 0..1 for Pac-Man mouth animation */

function cellKey(x,y){ return x+','+y }
function isWall(x,y){
    if (x<0||x>=COLS||y<0||y>=ROWS) return true;
    return wall[y][x];
}
function canMove(x,y,d){
    const nx=x+d.x, ny=y+d.y;
    return !isWall(nx,ny);
}

/* Per-stage difficulty tier. Ghost speed steps up each stage so the
   final stage has noticeably more chase pressure than stage 1. The
   base value (5.6) was already retuned -20 % from the original 7.0
   on user feedback "유령이 너무 빨라"; this table preserves that
   easier baseline at stage 1 while reintroducing pressure as the
   player progresses. */
const STAGE_GHOST_SPEED = [5.6, 6.0, 6.4];

/* Reset for a SPECIFIC stage. Loads that stage's maze, resets entity
   positions, recomputes ghostSpeed for the tier. Score/dotsEaten/etc
   are NOT touched here — they accumulate across stages until game
   over (so a 3-stage clear gives the cumulative score of dots in all
   three layouts). resetForNewGame() is the higher-level wrapper that
   ALSO zeros the score and stage. */
function resetForStage(stageIdx){
    currentStage = stageIdx;
    MAZE_STR = MAZES[stageIdx];
    loadMaze();
    ghostSpeed = STAGE_GHOST_SPEED[stageIdx] || STAGE_GHOST_SPEED[STAGE_GHOST_SPEED.length-1];
    /* x,y are floats in tile units. Ghosts store a lastPickCell to
       avoid re-picking a new direction multiple times while sitting
       centered on the same tile. */
    player = {x:6, y:13};
    ghosts = [
        {x:5, y:7, dir:{x:-1,y:0}, color:'#FF3366', kind:'chaser', lastPickKey:''},
        {x:7, y:7, dir:{x:1,y:0},  color:'#00D9FF', kind:'wander', lastPickKey:''}
    ];
    dir = {x:-1, y:0}; nextDir = null;
    vulnerableUntil = 0;
    /* Update the LIFE column in the score strip to show STAGE x/N. */
    const livesEl = $('livesNow');
    if (livesEl) livesEl.textContent = (stageIdx+1) + '/' + STAGE_COUNT;
    const livesLabel = livesEl && livesEl.parentElement && livesEl.parentElement.querySelector('.l');
    if (livesLabel) livesLabel.textContent = 'STAGE';
}

function resetGame(){
    /* Full reset for a new game: stage 0, score 0, all counters zero. */
    score = 0; dotsEaten = 0; ghostsEaten = 0;
    resetForStage(0);
    $('scoreNow').textContent='0';
}

function startGame(){
    resetGame();
    $('overlay').classList.add('hidden');
    sfxStart();
    running = true; paused = false;
    startedAt = performance.now(); lastTick = startedAt;
    syncPauseUI();
    requestAnimationFrame(loop);
}

function gameOver(won){
    running = false;
    syncPauseUI();
    const duration = Math.round(performance.now()-startedAt);
    const wrap = $('canvasWrap');
    wrap.classList.remove('shake'); void wrap.offsetWidth; wrap.classList.add('shake');
    if(won) sfxWin(); /* sfxDie already called before gameOver(false) */
    if(navigator.vibrate)try{navigator.vibrate(won?[20,20,20,20,60]:[30,20,60])}catch(_){}

    const finalScore = score + (won ? 500 : 0);
    /* Stage progress line — shows where the player got to. "전 클리어!"
       only when they finished the last stage. */
    const stageLabel = won
        ? '🏆 전 ' + STAGE_COUNT + '단계 클리어!'
        : 'Stage ' + (currentStage + 1) + '/' + STAGE_COUNT + '에서 종료';
    $('overlay').innerHTML =
        '<h2 class="'+(won?'win':'go')+'">'+(won?'🎉 CLEAR!':'GAME OVER')+'</h2>'
      + '<div class="score-big">'+finalScore+'</div>'
      + '<p>'+stageLabel+'<br>점 '+dotsEaten+'개 · 유령 '+ghostsEaten+'마리 · '+(duration/1000).toFixed(1)+'초'+(won?' · 🎁 +500':'')+'</p>'
      + '<div class="rank-card" id="ovRankCard">'
      +   '<div class="rank-card-rank" id="ovRankNum">조회 중…</div>'
      +   '<div class="rank-card-pct" id="ovRankPct"></div>'
      +   '<div class="rank-card-pb" id="ovRankPb"></div>'
      +   '<div class="rank-card-debug" id="ovRankDebug"></div>'
      +   '<button class="rank-card-link" id="ovRankBtn">🏆 랭크'
      + '</div>'
      + '<button class="btn" id="ovBtn">다시하기</button>'
      + '<div class="kbd-hint"><kbd>Enter</kbd> 재시작</div>';
    $('overlay').classList.remove('hidden');
    $('ovBtn').addEventListener('click', startGame);
    $('ovRankBtn').addEventListener('click', openPacmanRankSheet);

    (async()=>{
        /* Categorize Supabase errors into user-friendly buckets so the
           overlay never surfaces raw PostgREST internals to end users.
           - 'missing_migration': function/table not found in schema cache.
             Means the admin hasn't deployed the latest SQL. Console gets
             a deployment hint pointing at the right migration file.
           - 'rate_limit': server enforced 30 attempts / 1h.
           - 'no_auth': RPC saw auth.uid()=null. Anon users now skip the
             record RPC entirely (see 'no_login' below) so this branch is
             only reachable if a logged-in session lapsed mid-game.
           - 'invalid': server-side validation tripped (bad_dots_eaten etc).
           - 'unknown': anything else. */
        /* 'no_login' bucket: synthetic — set directly when we skip the
           record RPC because the user is anonymous. Never returned by
           _classifyErr (anon path doesn't even hit the RPC); listed here
           for completeness. */
        function _classifyErr(err){
            const m=(err&&(err.message||err.error_description)||String(err||'')).toLowerCase();
            if(/(could not find|schema cache|does not exist)/.test(m)
               &&/(function|relation|table)/.test(m)){
                return 'missing_migration';
            }
            if(m.includes('rate_limited'))return 'rate_limit';
            if(m.includes('not_authenticated'))return 'no_auth';
            if(m.includes('impossible_pace')||/^bad_/.test(m)
               ||m.includes('bad_dots_eaten')||m.includes('bad_ghosts_eaten')
               ||m.includes('bad_duration')){
                return 'invalid';
            }
            return 'unknown';
        }
        function _logDeployHint(){
            try{console.warn(
              '[pacman] Supabase migration not deployed. Apply in SQL Editor:\n'+
              '  supabase/migrations/2026-04-22-pacman-game.sql\n'+
              '  supabase/migrations/2026-04-26-game-rank-info.sql\n'+
              'Or run supabase/redeploy-action-games.sql (one-shot).');
            }catch(_){}
        }

        let pbMsg='', recordOk=false, recordErrKind=null;
        if(!me){
            /* Anon player: skip the record RPC entirely (it would just
               return not_authenticated). Mark a synthetic 'no_login'
               bucket so the dispatch below shows a friendly upsell
               instead of a generic failure. Leaderboard still loads. */
            recordErrKind='no_login';
        }else{
            try{
                const {data,error}=await getSupabase().rpc('record_pacman_attempt',{
                    p_dots_eaten: dotsEaten,
                    p_ghosts_eaten: ghostsEaten,
                    p_duration_ms: duration,
                    p_won: !!won
                });
                if(!error){
                    recordOk=true;
                    if(data?.is_personal_best) pbMsg='🏆 개인 신기록!';
                }else{
                    recordErrKind=_classifyErr(error);
                    console.warn('[pacman.record_pacman_attempt]', error);
                    if(recordErrKind==='missing_migration')_logDeployHint();
                    if(recordErrKind==='rate_limit') pbMsg='⏸ 1시간 내 30회 한도 초과';
                }
            }catch(e){
                recordErrKind=_classifyErr(e);
                console.warn('[pacman.record_pacman_attempt]', e);
                if(recordErrKind==='missing_migration')_logDeployHint();
            }
        }

        let rankInfo=null, rankErrKind=null;
        if(me){
            try{
                const r=await getSupabase().rpc('pacman_rank_info');
                if(r.error){
                    rankErrKind=_classifyErr(r.error);
                    console.warn('[pacman.pacman_rank_info]', r.error);
                    if(rankErrKind==='missing_migration')_logDeployHint();
                }else if(r.data?.has_record){
                    rankInfo=r.data;
                }
            }catch(e){
                rankErrKind=_classifyErr(e);
                console.warn('[pacman.pacman_rank_info]', e);
                if(rankErrKind==='missing_migration')_logDeployHint();
            }
        }
        /* Anon: skip personal rank_info (no auth.uid()). World leaderboard
           still loaded below via loadLeaderboard(currentScope). */

        /* Fallback: pacman_my_stats already exposes world_rank since the
           original game migration. If pacman_rank_info isn't deployed
           (e.g. user hasn't run the latest SQL yet), we still surface
           a real rank from the legacy RPC. total_world_players + percentile
           remain unknown without rank_info — those slots stay empty. */
        if(!rankInfo && rankErrKind && me){
            try{
                const m=await getSupabase().rpc('pacman_my_stats');
                if(!m.error){
                    if(m.data?.has_record && m.data.world_rank!=null){
                        rankInfo={
                            has_record:true,
                            world_rank:m.data.world_rank,
                            total_world_players:null,
                            percentile:null,
                            best_score:m.data.best_score,
                            _fallback:true
                        };
                    }
                    /* my_stats RPC succeeded → dismiss the rank_info error
                       even when has_record is false. UI then falls into the
                       recordOk-driven branch below ("🎉 첫 기록" or the
                       record-failure branch) instead of an alarming
                       "랭킹 조회 실패". */
                    rankErrKind=null;
                }
            }catch(_){ }
        }

        if(rankInfo){
            const d=rankInfo;
            const rank=(d.world_rank||0).toLocaleString();
            /* Short headline + long subline so a narrow card never
               clips on the right edge. Subline parts are individually
               omitted when null so the my_stats fallback (no
               percentile/total) still renders cleanly. */
            $('ovRankNum').textContent='🌍 #'+rank;
            const parts=[];
            if(d.percentile!=null) parts.push('상위 '+d.percentile+'%');
            if(d.total_world_players!=null) parts.push(d.total_world_players.toLocaleString()+'명 중');
            $('ovRankPct').textContent=parts.join(' · ');
        }else if(rankErrKind==='missing_migration'||recordErrKind==='missing_migration'){
            /* Admin needs to deploy the migrations. Calmer language for
               end users (most won't be the admin); detail in console. */
            $('ovRankNum').textContent='🛠 랭킹 시스템 점검 중';
            $('ovRankPct').textContent='잠시 후 다시 시도해주세요';
        }else if(rankErrKind||recordErrKind==='unknown'){
            $('ovRankNum').textContent='⚠️ 랭킹 등록 실패';
            $('ovRankPct').textContent='네트워크를 확인하고 다시 시도해주세요';
        }else if(!recordOk && recordErrKind==='invalid'){
            $('ovRankNum').textContent='⚠️ 점수 검증 실패';
            $('ovRankPct').textContent='비정상적으로 빠른 진행 감지';
        }else if(!recordOk && recordErrKind==='no_auth'){
            $('ovRankNum').textContent='🔐 로그인이 필요해요';
            $('ovRankPct').textContent='로그인 후 다시 시도';
        }else if(!recordOk && recordErrKind==='no_login'){
            /* Anon-friendly upsell: not an error — they intentionally
               played without logging in. Encourage signup, but the world
               leaderboard still loads (loadLeaderboard call below). */
            $('ovRankNum').textContent='🔒 로그인하면 기록 저장!';
            $('ovRankPct').textContent='랭킹 등록은 로그인 사용자만 가능';
        }else if(!recordOk){
            $('ovRankNum').textContent='⚠️ 기록 저장 실패';
            $('ovRankPct').textContent='잠시 후 다시 시도해주세요';
        }else{
            $('ovRankNum').textContent='🎉 첫 기록 등록!';
            $('ovRankPct').textContent='월드 랭킹 진입 완료';
        }
        $('ovRankPb').textContent=pbMsg;
        /* Debug slot kept in DOM for inspection but blank for end users.
           Raw error text used to surface here (alarming + non-actionable).
           Devs can read details in console (we console.warn every error
           with a [game.rpc_name] prefix). */
        $('ovRankDebug').textContent='';

        loadMyStats();
        loadLeaderboard(currentScope);
    })();

    try{
        const ad=$('adSlot');
        if(ad.style.display==='none' || !ad.style.display){ ad.style.display='block'; (adsbygoogle=window.adsbygoogle||[]).push({}); }
    }catch(_){}
}

/* Player movement — smooth float-based with classic Pac-Man cornering.
   Previous implementation moved one integer cell per 130 ms tick so
   both visuals and input response felt step-function jerky. Now:
   - position is float (tiles), advanced by dt*speed each frame
   - 180° reverse is accepted INSTANTLY (the cell behind is always open)
   - 90° turn requires near-tile-center alignment (< 0.2 tiles off) AND
     the requested neighbor cell to be passable; on accept we snap to
     the center so the turn tracks the corridor axis
   - wall contact clamps to the current cell center rather than a tick-
     wait, so a swipe into a wall instantly stops the player at the
     center with nextDir pending (tapped early = turn at next opening) */
function stepPlayer(now, dt){
    const cx = Math.round(player.x), cy = Math.round(player.y);
    const ofx = player.x - cx, ofy = player.y - cy;

    if (nextDir){
        const isReverse = (nextDir.x === -dir.x && nextDir.y === -dir.y);
        if (isReverse){
            dir = nextDir; nextDir = null;
        } else if (Math.abs(ofx) < 0.2 && Math.abs(ofy) < 0.2
                   && canMove(cx, cy, nextDir)){
            player.x = cx; player.y = cy;
            dir = nextDir; nextDir = null;
        }
    }

    const mv = dt * playerSpeed;
    let nx = player.x + dir.x * mv;
    let ny = player.y + dir.y * mv;
    /* Wall clamp: don't let the float position overshoot the current
       cell center if the next cell in this direction is solid. */
    if (dir.x > 0 && isWall(cx+1, cy) && nx > cx) nx = cx;
    else if (dir.x < 0 && isWall(cx-1, cy) && nx < cx) nx = cx;
    if (dir.y > 0 && isWall(cx, cy+1) && ny > cy) ny = cy;
    else if (dir.y < 0 && isWall(cx, cy-1) && ny < cy) ny = cy;
    player.x = nx; player.y = ny;

    /* Eat the dot/pellet when Pac-Man is close to a cell's center. */
    const ncx = Math.round(player.x), ncy = Math.round(player.y);
    const cdist = Math.hypot(player.x-ncx, player.y-ncy);
    if (cdist < 0.4){
        const k = cellKey(ncx, ncy);
        if (dots.has(k)){
            dots.delete(k); dotsEaten++;
            score += 10;
            sfxDot();
        } else if (powers.has(k)){
            powers.delete(k); dotsEaten++;
            score += 50;
            /* Vulnerable window 6000 → 8000 ms (+33 %) so the player has
               more time to chase ghosts down + clear neighbourhoods
               while ghosts are blue. Pairs with the slower ghostSpeed
               retune above for the targeted ~30 % easier session. */
            vulnerableUntil = now + 8000;
            sfxPower();
            if(navigator.vibrate)try{navigator.vibrate([20,30,20])}catch(_){}
        }
        $('scoreNow').textContent = score;
        if (dots.size === 0 && powers.size === 0){
            /* Stage cleared. If more stages remain, advance to the next
               one — the player keeps their score, dotsEaten, ghostsEaten
               counters cumulative. The new maze loads, ghosts respawn at
               the central row, ghostSpeed bumps up per the stage tier.
               If this was the LAST stage, fire the original gameOver(true)
               with the full-victory bonus. */
            if (currentStage + 1 < STAGE_COUNT){
                /* Per-stage clear bonus: +200 × (stage cleared, 1-indexed).
                   So clearing stage 1 adds 200, stage 2 adds 400. The win
                   bonus +500 only fires after the FINAL stage. */
                const stageBonus = 200 * (currentStage + 1);
                score += stageBonus;
                $('scoreNow').textContent = score;
                sfxWin();   /* victory chime between stages */
                /* Brief pause so the player visually registers stage clear
                   before the new maze appears. 600 ms = roughly the chime
                   duration. */
                setTimeout(() => {
                    if (!running) return;   /* in case user paused / quit during the gap */
                    resetForStage(currentStage + 1);
                    sfxStart();
                }, 600);
                return;
            }
            /* Final stage cleared — full victory. */
            gameOver(true);
            return;
        }
    }
}

/* Ghost AI — pick a direction at each step based on kind.
   Now operates on the ghost's CURRENT tile (rounded) since the
   position is a float; distance heuristic compares against the
   player's rounded tile for the same reason (fractional pursuit
   was jittery). Vulnerable chaser flees (maximizes distance). */
const DIRS = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
function pickGhostDir(g, vulnerable){
    const gx = Math.round(g.x), gy = Math.round(g.y);
    const px = Math.round(player.x), py = Math.round(player.y);
    const opposite = {x:-g.dir.x, y:-g.dir.y};
    const options = DIRS.filter(d=>{
        if (isWall(gx+d.x, gy+d.y)) return false;
        if (d.x===opposite.x && d.y===opposite.y) return false;
        return true;
    });
    const pool = options.length ? options : DIRS.filter(d => !isWall(gx+d.x, gy+d.y));
    if (!pool.length) return g.dir;

    if (g.kind === 'wander'){
        return pool[Math.floor(Math.random()*pool.length)];
    }
    let best = pool[0], bestDist = vulnerable ? -Infinity : Infinity;
    for (const d of pool){
        const dist = Math.abs(gx+d.x-px) + Math.abs(gy+d.y-py);
        if (vulnerable ? dist > bestDist : dist < bestDist){
            bestDist = dist; best = d;
        }
    }
    return best;
}
/* Ghost movement — mirror of stepPlayer. Direction is re-chosen only
   when the ghost crosses a tile center (tracked via lastPickKey so we
   don't spam the picker multiple frames in a row on the same cell). */
function stepGhost(g, now, dt){
    const vulnerable = now < vulnerableUntil;
    const speed = vulnerable ? ghostSpeed / 1.6 : ghostSpeed;
    const cx = Math.round(g.x), cy = Math.round(g.y);
    const ofx = g.x - cx, ofy = g.y - cy;

    if (Math.abs(ofx) < 0.1 && Math.abs(ofy) < 0.1){
        const key = cx+','+cy;
        if (g.lastPickKey !== key){
            g.x = cx; g.y = cy;
            g.dir = pickGhostDir(g, vulnerable);
            g.lastPickKey = key;
        }
    }

    const mv = dt * speed;
    let nx = g.x + g.dir.x * mv;
    let ny = g.y + g.dir.y * mv;
    if (g.dir.x > 0 && isWall(cx+1, cy) && nx > cx) nx = cx;
    else if (g.dir.x < 0 && isWall(cx-1, cy) && nx < cx) nx = cx;
    if (g.dir.y > 0 && isWall(cx, cy+1) && ny > cy) ny = cy;
    else if (g.dir.y < 0 && isWall(cx, cy-1) && ny < cy) ny = cy;
    g.x = nx; g.y = ny;
}

/* Collision check after both player + ghosts have moved.
   Distance-based since positions are floats. 0.75 tiles feels fair:
   ghosts have to pass through Pac-Man's body, not just the same tile. */
function checkCollisions(now){
    const vulnerable = now < vulnerableUntil;
    for (const g of ghosts){
        if (Math.hypot(g.x - player.x, g.y - player.y) < 0.75){
            if (vulnerable){
                ghostsEaten++;
                score += 200;
                $('scoreNow').textContent = score;
                g.x = 6; g.y = 7;
                g.dir = {x:Math.random()<.5?1:-1, y:0};
                g.lastPickKey = '';
                sfxEatGhost();
                if(navigator.vibrate)try{navigator.vibrate(18)}catch(_){}
            } else {
                sfxDie();
                gameOver(false);
                return;
            }
        }
    }
}

/* ========== Render ========== */
function draw(now){
    /* Background */
    ctx.fillStyle = '#05050f';
    ctx.fillRect(0,0,BW,BH);

    /* Walls — rounded blue lines */
    ctx.fillStyle = '#1a1a3e';
    ctx.strokeStyle = '#2a2a6e';
    ctx.lineWidth = 2;
    for (let y=0;y<ROWS;y++) for (let x=0;x<COLS;x++){
        if (wall[y][x]){
            const px = x*CELL, py = y*CELL;
            ctx.fillRect(px+1, py+1, CELL-2, CELL-2);
        }
    }

    /* Dots */
    ctx.fillStyle = '#ffe0a8';
    for (const k of dots){
        const [x,y] = k.split(',').map(Number);
        ctx.beginPath();
        ctx.arc(x*CELL+CELL/2, y*CELL+CELL/2, 1.8, 0, Math.PI*2);
        ctx.fill();
    }
    /* Power pellets — pulsing */
    const pulse = 1 + 0.2*Math.sin(now/140);
    ctx.fillStyle = '#FFD500';
    for (const k of powers){
        const [x,y] = k.split(',').map(Number);
        ctx.beginPath();
        ctx.arc(x*CELL+CELL/2, y*CELL+CELL/2, 4*pulse, 0, Math.PI*2);
        ctx.fill();
    }

    /* Player — Pac-Man arc */
    mouthPhase = (mouthPhase + 0.08) % (Math.PI*2);
    const mouth = 0.25 + 0.22*Math.abs(Math.sin(mouthPhase));  /* radians */
    const angle = Math.atan2(dir.y, dir.x);
    const pcx = player.x*CELL + CELL/2;
    const pcy = player.y*CELL + CELL/2;
    ctx.fillStyle = '#FFD500';
    ctx.beginPath();
    ctx.moveTo(pcx, pcy);
    ctx.arc(pcx, pcy, CELL*0.45, angle+mouth, angle-mouth+Math.PI*2);
    ctx.closePath();
    ctx.fill();

    /* Ghosts — rounded body + wobbly bottom */
    const vulnerable = now < vulnerableUntil;
    const vulnRemain = Math.max(0, vulnerableUntil-now);
    const blinking = vulnerable && vulnRemain < 1500 && Math.floor(now/180)%2===0;
    for (const g of ghosts){
        const gcx = g.x*CELL + CELL/2;
        const gcy = g.y*CELL + CELL/2;
        const color = vulnerable
            ? (blinking ? '#fff' : '#2a2ab8')
            : g.color;
        ctx.fillStyle = color;
        const rad = CELL*0.45;
        ctx.beginPath();
        /* Head: half circle */
        ctx.arc(gcx, gcy-2, rad, Math.PI, 0);
        /* Body side */
        ctx.lineTo(gcx+rad, gcy+rad-2);
        /* Wobbly bottom: 3 bumps */
        const bump = 3;
        for (let i=0;i<bump;i++){
            const t = i/(bump);
            const bx = gcx+rad - (rad*2)*(i+0.5)/bump;
            const by = gcy+rad-2 - (Math.sin((now/120)+i)*1.5);
            ctx.quadraticCurveTo(bx + rad/bump/2, gcy+rad+3, bx, by);
        }
        ctx.lineTo(gcx-rad, gcy+rad-2);
        ctx.closePath();
        ctx.fill();
        /* Eyes */
        if (!vulnerable){
            ctx.fillStyle='#fff';
            ctx.beginPath(); ctx.arc(gcx-rad*0.35, gcy-2, 2.6, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(gcx+rad*0.25, gcy-2, 2.6, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle='#001144';
            ctx.beginPath(); ctx.arc(gcx-rad*0.35 + g.dir.x*1.1, gcy-2 + g.dir.y*1.1, 1.3, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(gcx+rad*0.25 + g.dir.x*1.1, gcy-2 + g.dir.y*1.1, 1.3, 0, Math.PI*2); ctx.fill();
        } else {
            /* Vulnerable eyes: tiny white dots */
            ctx.fillStyle=blinking?'#000':'#fff';
            ctx.beginPath(); ctx.arc(gcx-rad*0.3, gcy-2, 1.5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(gcx+rad*0.2, gcy-2, 1.5, 0, Math.PI*2); ctx.fill();
        }
    }
    /* ---- Pause indicator ---- */
    if(paused && running){
        const W=canvas.width, H=canvas.height;
        ctx.fillStyle='rgba(5,5,15,.72)';
        ctx.fillRect(0,0,W,H);
        ctx.font='bold 22px Orbitron,sans-serif';
        ctx.fillStyle='#FFD500';
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        ctx.fillText('PAUSED', W/2, H/2);
        ctx.font='11px Noto Sans KR,sans-serif';
        ctx.fillStyle='rgba(255,255,255,.6)';
        ctx.fillText('▶ 재개 버튼 / Space', W/2, H/2+26);
        ctx.textAlign='left';
        ctx.textBaseline='alphabetic';
    }
}

function loop(now){
    if (!running) return;
    if (!paused){
        /* dt clamped so a long tab-switch / background resume doesn't
           teleport the player halfway across the maze. 0.05 s = 50 ms
           cap ≈ skipped frames at 20 fps or below are silently dropped. */
        const dt = Math.min(0.05, Math.max(0, (now - lastTick) / 1000));
        lastTick = now;
        stepPlayer(now, dt);
        for (const g of ghosts) stepGhost(g, now, dt);
        checkCollisions(now);
        if (!running){ draw(now); return; }
    } else {
        lastTick = now;
    }
    draw(now);
    requestAnimationFrame(loop);
}

/* ========== Input ========== */
function queueDir(x, y){
    nextDir = {x, y};
}
document.addEventListener('keydown',(e)=>{
    const k=e.key;
    if (k==='ArrowUp'||k==='w'||k==='W') queueDir(0,-1);
    else if (k==='ArrowDown'||k==='s'||k==='S') queueDir(0,1);
    else if (k==='ArrowLeft'||k==='a'||k==='A') queueDir(-1,0);
    else if (k==='ArrowRight'||k==='d'||k==='D') queueDir(1,0);
    else if (k===' '){ if(running){ paused=!paused; syncPauseUI(); } e.preventDefault(); }
    else if (k==='Enter'){ if(!running) startGame(); }
    else return;
    if (k.startsWith('Arrow')) e.preventDefault();
});
document.querySelectorAll('.dpad button').forEach(b=>{
    const fire=(e)=>{
        e.preventDefault();
        const d=b.dataset.dir;
        if(d==='up') queueDir(0,-1);
        else if(d==='down') queueDir(0,1);
        else if(d==='left') queueDir(-1,0);
        else if(d==='right') queueDir(1,0);
        else if(d==='pause'){ if(running){ paused=!paused; syncPauseUI(); } }
    };
    b.addEventListener('click', fire);
    b.addEventListener('touchstart', fire, {passive:false});
});
let touchStart=null;
const wrap=$('canvasWrap');
wrap.addEventListener('touchstart',(e)=>{
    const t=e.touches[0];
    touchStart={x:t.clientX,y:t.clientY};
},{passive:true});
wrap.addEventListener('touchend',(e)=>{
    if(!touchStart) return;
    const t=e.changedTouches[0];
    const dx=t.clientX-touchStart.x, dy=t.clientY-touchStart.y;
    const ax=Math.abs(dx), ay=Math.abs(dy);
    touchStart=null;
    /* 14 px threshold — below 10 triggers on accidental taps, above
       20 ignores tight finger flicks. 14 was picked after confirming
       it still survives 300 ms accidental scroll gestures. */
    if(Math.max(ax,ay)<14) return;
    if(ax>ay) queueDir(dx>0?1:-1, 0);
    else      queueDir(0, dy>0?1:-1);
});

/* ========== Bottom sheet + Leaderboards ========== */
const sheet=$('sheet'), sheetBack=$('sheetBack');
function openSheet(){ sheet.classList.add('on'); sheetBack.classList.add('on'); loadLeaderboard(currentScope); }
function closeSheet(){ sheet.classList.remove('on'); sheetBack.classList.remove('on'); }
$('openLb').addEventListener('click', openSheet);
sheetBack.addEventListener('click', closeSheet);

let currentScope='world';
document.querySelectorAll('.lb-tab').forEach(b=>{
    b.addEventListener('click', ()=>{
        document.querySelectorAll('.lb-tab').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        currentScope=b.dataset.scope;
        loadLeaderboard(currentScope);
    });
});
async function loadLeaderboard(scope){
    $('lbList').innerHTML='<div class="lb-empty">불러오는 중…</div>';
    try{
        const {data,error}=await getSupabase().rpc('pacman_leaderboard',{p_scope:scope,p_limit:50});
        try{ console.log('[pacman.leaderboard]', scope, error?'error':(data?data.length+' rows':'null'), error?error.message:''); }catch(_){}
        if(error||!data){ $('lbList').innerHTML='<div class="lb-empty">기록 없음</div>'; return; }
        if(!data.length){
            const emptyMsg = scope==='today'
                ? '🌅 오늘 (한국 시간 기준) 기록이 아직 없어요.<br>첫 기록의 주인공이 되세요!'
                : scope==='friends'
                ? '친구가 아직 플레이하지 않았어요.<br>친구 추가는 /messages/ 에서!'
                : '첫 기록의 주인공이 되세요!';
            $('lbList').innerHTML='<div class="lb-empty">'+emptyMsg+'</div>';
            return;
        }
        $('lbList').innerHTML=data.map(row=>{
            const isSelf=me && row.user_id===me.id;
            const rnkCls=row.rnk===1?' gold':row.rnk===2?' silver':row.rnk===3?' bronze':'';
            const av=row.avatar_url
                ? '<div class="lb-av"><img src="'+esc(row.avatar_url)+'" referrerpolicy="no-referrer" alt=""></div>'
                : '<div class="lb-av">'+esc(initials(row.nickname))+'</div>';
            return '<div class="lb-row'+(isSelf?' self':'')+'">'
                 +'<div class="lb-rnk'+rnkCls+'">'+(row.rnk<=3?(['🥇','🥈','🥉'][row.rnk-1]):('#'+row.rnk))+'</div>'
                 +'<div class="lb-who">'+av+'<div class="lb-nick">'+esc(row.nickname||'?')+'</div></div>'
                 +'<div class="lb-score">'+row.best_score+'</div>'
                 +'</div>';
        }).join('');
    }catch(_){$('lbList').innerHTML='<div class="lb-empty">불러오기 실패</div>';}
}

/* ========== Boot ========== */
$('ovBtn').addEventListener('click', startGame);
$('pauseBtn').addEventListener('click', (e)=>{
    e.stopPropagation();
    if(!running) return;
    paused=!paused;
    syncPauseUI();
});
(async()=>{
    await initAuth();
    /* Anon-friendly: render the maze and (on PC) the leaderboard regardless
       of login state. me=null path skips loadMyStats / record RPC; the rest
       of the game loop is identical. */
    resetGame();
    draw(performance.now());
    if(matchMedia('(min-width:1024px)').matches) loadLeaderboard('world');
})();

if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(r=>r.forEach(s=>s.unregister())).catch(()=>{})}
if('caches' in window){caches.keys().then(k=>k.forEach(n=>caches.delete(n))).catch(()=>{})}
