    <style>
/* ================================================================
   Mobile portrait — PRIMARY design target.
   Tablet landscape + desktop are progressive enhancements via
   min-width media queries at the bottom. DO NOT reverse the order.
   ================================================================ */
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --dark:#0A0A1A;--accent:#FFE66D;--danger:#FF3366;
    --success:#00E676;--cyan:#00D9FF;
    --piece-i:#00D9FF;--piece-o:#FFE66D;--piece-t:#A855F7;
    --piece-s:#00E676;--piece-z:#FF3366;
    --piece-j:#3B82F6;--piece-l:#FF9A3C;
    --muted:rgba(255,255,255,.55);--muted-2:rgba(255,255,255,.35);
    --panel-br:rgba(255,255,255,.07);
    --sb-bottom: env(safe-area-inset-bottom, 0px);
}
html,body{height:100%;overscroll-behavior:none}
body{
    font-family:'Noto Sans KR',sans-serif;background:var(--dark);color:#fff;
    min-height:100dvh;overflow-x:hidden;letter-spacing:.01em;
    background-image:radial-gradient(ellipse at 50% 20%,rgba(0,217,255,.04) 0%,transparent 55%),linear-gradient(180deg,#0A0A1A 0%,#10101F 50%,#0A0A1A 100%);
    -webkit-tap-highlight-color:transparent;
    user-select:none;-webkit-user-select:none
}

/* ---- Topbar ---- */
.topbar{
    display:flex;align-items:center;gap:10px;
    padding:10px 14px;
    position:sticky;top:0;z-index:10;
    background:rgba(10,10,26,.88);backdrop-filter:blur(14px);
    border-bottom:1px solid var(--panel-br)
}
.topbar .home{text-decoration:none;color:rgba(255,255,255,.8);padding:7px 11px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);font-size:.78em;font-weight:700}
.topbar h1{font-family:'Orbitron','Noto Sans KR',sans-serif;font-size:1em;font-weight:900;margin:0;flex:1;text-align:center;background:linear-gradient(135deg,#00D9FF,#A855F7,#FF3366);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar .slot{min-width:64px;text-align:right}
.topbar .auth-chip{padding:5px 10px;border-radius:999px;background:rgba(255,230,109,.1);border:1px solid rgba(255,230,109,.25);color:#FFE66D;font-size:.72em;font-weight:700;text-decoration:none;white-space:nowrap}
.topbar .lb-btn{padding:6px 10px;border-radius:10px;background:rgba(0,217,255,.08);border:1px solid rgba(0,217,255,.3);color:#00D9FF;font-size:.78em;font-weight:800;cursor:pointer;font-family:inherit}
.topbar .lb-btn:active{background:rgba(0,217,255,.16)}

/* ---- Main column ---- */
.wrap{
    display:flex;flex-direction:column;align-items:center;gap:10px;
    padding:10px 12px calc(var(--sb-bottom) + 14px);
    max-width:460px;margin:0 auto
}
.left-col{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%}

/* ---- HUD: score + lines + level + next-piece preview ---- */
.hud{
    display:grid;grid-template-columns:1fr 1fr 1fr 80px;gap:6px;width:100%;
    align-items:stretch
}
.ss{
    background:linear-gradient(165deg,rgba(22,22,42,.55),rgba(12,12,28,.8));
    border:1px solid var(--panel-br);border-radius:12px;
    padding:8px 4px;text-align:center;min-height:54px;
    display:flex;flex-direction:column;align-items:center;justify-content:center
}
.ss .v{font-family:'Orbitron',sans-serif;font-size:1.3em;font-weight:900;line-height:1;color:#fff;font-variant-numeric:tabular-nums}
.ss .v.best{color:#FFE66D}
.ss .v.acc{color:var(--cyan)}
.ss .l{font-size:.55em;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);margin-top:3px;font-weight:800}
/* Next piece preview tile — 4x4 grid using same cell painter as the board. */
.next-tile{
    background:linear-gradient(165deg,rgba(22,22,42,.55),rgba(12,12,28,.8));
    border:1px solid var(--panel-br);border-radius:12px;
    padding:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:3px;min-height:54px
}
.next-tile .l{font-size:.55em;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);font-weight:800}
.next-tile canvas{width:54px;height:54px;display:block}

/* ---- Game control bar (visible during play across all viewports) ---- */
.game-ctrl{
    display:none;width:100%;
    align-items:center;justify-content:center;gap:8px
}
.game-ctrl.on{display:flex}
.ctrl-btn{
    padding:8px 14px;border-radius:10px;
    background:rgba(0,217,255,.08);border:1px solid rgba(0,217,255,.3);
    color:#00D9FF;font-family:inherit;font-size:.84em;font-weight:800;cursor:pointer;
    letter-spacing:.04em
}
.ctrl-btn:active{background:rgba(0,217,255,.16)}

/* ---- Canvas wrap (the 10x20 playfield) ----
   aspect-ratio 1/2 because the board is 10 cols wide, 20 rows tall. */
.canvas-wrap{
    position:relative;
    width:min(86vw, calc((100dvh - 360px) * 0.5));
    aspect-ratio:1/2;
    border-radius:14px;overflow:hidden;
    background:linear-gradient(165deg,rgba(0,217,255,.04),rgba(168,85,247,.04));
    border:1px solid rgba(0,217,255,.18);
    box-shadow:0 0 20px rgba(0,217,255,.08)
}
.canvas-wrap canvas{display:block;width:100%;height:100%;background:#020516}

/* ---- Overlay (start / game over) ---- */
.overlay{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:18px;text-align:center;gap:10px;
    background:rgba(5,5,15,.82);backdrop-filter:blur(8px);
    z-index:5
}
.overlay.hidden{display:none}
.overlay h2{font-family:'Orbitron',sans-serif;font-size:1.4em;font-weight:900;letter-spacing:.06em;
    background:linear-gradient(135deg,#00D9FF,#A855F7,#FF3366);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.overlay h2.over{background:linear-gradient(135deg,#FF3366,#FF9A3C,#FFE66D);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.overlay p{font-size:.84em;color:var(--muted);line-height:1.55}
.overlay .btn{
    padding:12px 26px;border-radius:14px;border:0;cursor:pointer;
    background:linear-gradient(135deg,#00D9FF,#A855F7);color:#fff;
    font-family:'Orbitron','Noto Sans KR',sans-serif;font-weight:900;
    font-size:.92em;letter-spacing:.08em;text-transform:uppercase;
    box-shadow:0 8px 24px -6px rgba(168,85,247,.5),inset 0 1px 0 rgba(255,255,255,.22)
}
.overlay .btn:active{transform:translateY(1px)}
.kbd-hint{font-size:.72em;color:var(--muted-2);margin-top:4px}
.kbd-hint kbd{
    display:inline-block;padding:2px 7px;margin:0 2px;
    background:rgba(255,255,255,.06);border:1px solid var(--panel-br);
    border-radius:5px;font-family:'JetBrains Mono','Courier New',monospace;font-size:.95em
}
/* Game over result block */
.over-stats{
    margin-top:6px;padding:10px 14px;border-radius:12px;
    background:rgba(255,255,255,.03);border:1px solid var(--panel-br);
    width:100%;max-width:280px
}
.over-stats .row{display:flex;justify-content:space-between;font-size:.78em;line-height:1.7;color:var(--muted)}
.over-stats .row b{color:#fff;font-weight:700;font-variant-numeric:tabular-nums}
.over-rank{margin-top:8px;font-size:.86em;color:var(--cyan);font-weight:700}
.over-pb{margin-top:4px;font-size:.78em;color:var(--success);font-weight:700}

/* ---- Controls (mobile-first 6-button layout) ----
   Layout (portrait phone):
   ┌────────────────────────┐
   │  ←   →   |   ↶   ↷    │   ← move + rotate
   ├────────────────────────┤
   │   ↓SOFT   |   ⇩HARD    │   ← drop
   └────────────────────────┘ */
.controls{
    width:100%;display:flex;flex-direction:column;gap:8px;
    padding:6px 0
}
.ctrl-row{display:grid;grid-template-columns:1fr 1fr 8px 1fr 1fr;gap:8px;align-items:stretch}
.ctrl-row.split-2{grid-template-columns:1fr 8px 1fr}
.ctrl-row .gap{background:transparent}
.cbtn{
    background:linear-gradient(165deg,rgba(22,22,42,.65),rgba(12,12,28,.9));
    border:1px solid var(--panel-br);border-radius:14px;
    color:#fff;font-family:inherit;font-weight:800;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;padding:14px 4px;
    box-shadow:0 4px 12px -4px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05);
    transition:transform .08s,background .15s,border-color .15s;
    -webkit-tap-highlight-color:transparent
}
.cbtn:active{transform:translateY(2px) scale(.97);background:rgba(0,217,255,.12);border-color:rgba(0,217,255,.4)}
.cbtn .ico{font-size:1.6em;line-height:1;font-family:'Orbitron',sans-serif;font-weight:900}
.cbtn .lab{font-size:.62em;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-2)}

.cbtn.move .ico{color:#00D9FF}
.cbtn.rot .ico{color:#A855F7}
.cbtn.drop-soft{background:linear-gradient(165deg,rgba(0,230,118,.12),rgba(0,230,118,.04));border-color:rgba(0,230,118,.28)}
.cbtn.drop-soft .ico{color:#00E676}
.cbtn.drop-hard{background:linear-gradient(165deg,rgba(255,51,102,.18),rgba(255,51,102,.05));border-color:rgba(255,51,102,.34)}
.cbtn.drop-hard .ico{color:#FF3366}

.hint{
    font-size:.72em;color:var(--muted-2);text-align:center;line-height:1.55;
    padding:0 16px;margin-top:4px
}
.hint b{color:rgba(255,255,255,.65)}

/* ---- Bottom-sheet leaderboard (mobile) ---- */
.sheet-backdrop{
    display:none;position:fixed;inset:0;background:rgba(5,5,15,.6);backdrop-filter:blur(4px);z-index:50
}
.sheet-backdrop.on{display:block}
.sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:60;
    background:linear-gradient(180deg,rgba(20,20,38,.97),rgba(10,10,26,.97));
    border-top:1px solid var(--panel-br);
    border-radius:18px 18px 0 0;
    transform:translateY(100%);transition:transform .25s ease-out;
    max-height:80vh;display:flex;flex-direction:column;
    padding-bottom:calc(var(--sb-bottom) + 8px)
}
.sheet.on{transform:translateY(0)}
.sheet .handle{width:48px;height:4px;background:rgba(255,255,255,.2);border-radius:99px;margin:8px auto}
.sheet h3{font-family:'Orbitron',sans-serif;font-size:.95em;font-weight:900;margin:0 14px 10px;letter-spacing:.06em}
.sheet .lb-tabs{display:flex;gap:6px;padding:0 14px 8px}
.sheet .lb-tab{flex:1;padding:8px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid var(--panel-br);color:var(--muted);font-size:.78em;font-weight:700;cursor:pointer;font-family:inherit}
.sheet .lb-tab.active{background:rgba(0,217,255,.12);border-color:rgba(0,217,255,.4);color:#00D9FF}
.sheet .sheet-body{overflow-y:auto;padding:0 14px 14px;-webkit-overflow-scrolling:touch}
.lb-list{display:flex;flex-direction:column;gap:5px}
.lb-empty{padding:24px;text-align:center;color:var(--muted-2);font-size:.85em;line-height:1.6}
.lb-row{display:grid;grid-template-columns:42px 1fr 70px;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;background:rgba(255,255,255,.025);border:1px solid var(--panel-br);font-size:.84em}
.lb-row.self{background:rgba(255,230,109,.06);border-color:rgba(255,230,109,.25)}
.lb-rnk{font-family:'Orbitron',sans-serif;font-weight:900;text-align:center;font-size:.95em;color:var(--muted)}
.lb-rnk.gold{color:#FFE66D}
.lb-rnk.silver{color:#cbd5e1}
.lb-rnk.bronze{color:#f59e0b}
.lb-who{display:flex;align-items:center;gap:8px;min-width:0}
.lb-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#00D9FF,#A855F7);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.78em;color:#fff;overflow:hidden;flex-shrink:0}
.lb-av img{width:100%;height:100%;object-fit:cover}
.lb-nick{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-score{font-family:'Orbitron',sans-serif;font-weight:900;font-variant-numeric:tabular-nums;text-align:right;color:#fff}

#adSlot.ad-col{display:none}
.right-col{display:none}

/* ================================================================
   Tablet portrait / large phone landscape (768–1023px):
   Single column wider, controls more breathing room.
   ================================================================ */
@media(min-width:768px) and (max-width:1023px){
    .canvas-wrap{
        max-width:none;
        width:min(80vw, calc((100dvh - 320px) * 0.5));
        max-height:74vh
    }
    .hud{max-width:560px}
    .game-ctrl{max-width:560px}
    .controls{max-width:560px}
    .hint{max-width:560px}
    .cbtn{padding:18px 8px}
    .cbtn .ico{font-size:1.9em}
    .cbtn .lab{font-size:.7em}
}
/* ================================================================
   Tablet landscape / desktop (>= 1024px):
   3-column grid: ad | game | leaderboard. Touch controls hidden in
   favor of keyboard (←→ ↑↓ Z X Space). Canvas grows.
   ================================================================ */
@media(min-width:1024px){
    .wrap{
        max-width:none;margin:0;display:grid;
        grid-template-columns:1fr 1fr 1fr;gap:24px;align-items:start;
        padding:22px 24px;min-height:calc(100dvh - 60px)
    }
    .left-col{
        grid-column:2;display:flex;flex-direction:column;gap:12px;align-items:center;
        width:100%;max-width:560px;justify-self:center
    }
    .canvas-wrap{
        width:auto;max-width:none;
        height:min(80vh, calc(560px * 2));
        aspect-ratio:1/2;max-height:80vh
    }
    .hud{width:100%}
    .game-ctrl{width:100%}
    .hint{width:100%}
    /* Touch buttons still useful for accessibility / users without
       keyboard — keep visible but slightly smaller. */
    .controls{width:100%}
    .cbtn{padding:12px 6px}
    .cbtn .ico{font-size:1.5em}
    /* Ads + leaderboard side panels */
    #adSlot.ad-col{
        grid-column:1;display:block;width:100%;max-width:380px;
        justify-self:center;min-height:600px;margin:0;align-self:start;
        background:rgba(255,255,255,.02);
        border:1px dashed rgba(255,255,255,.06);border-radius:14px
    }
    .right-col{
        grid-column:3;display:block;width:100%;max-width:400px;justify-self:center
    }
    .right-col .sheet{
        position:static;transform:none;max-height:none;border-radius:18px;
        border:1px solid var(--panel-br);background:rgba(14,14,28,.55);
        padding-bottom:14px;width:100%;display:flex
    }
    .right-col .sheet .handle{display:none}
    .right-col .sheet-backdrop, .topbar .lb-btn{display:none}
    .right-col .sheet{transform:none!important;pointer-events:auto}
    .right-col .sheet-body{max-height:70vh}
}
    </style>

</head>
<body>

<header class="topbar">
    <a href="/" class="home">← 홈</a>
    <h1>🟦 테트리스</h1>
    <div class="slot">
        <button class="lb-btn" id="openLb" aria-label="랭킹 보기">🏆</button>
        <span id="authSlot"></span>
    </div>
</header>

<main class="wrap">
    <div class="left-col">

        <!-- HUD: score / lines / level / next-piece -->
        <div class="hud">
            <div class="ss"><div class="v" id="scoreNow">0</div><div class="l">SCORE</div></div>
            <div class="ss"><div class="v acc" id="linesNow">0</div><div class="l">LINES</div></div>
            <div class="ss"><div class="v acc" id="levelNow">1</div><div class="l">LEVEL</div></div>
            <div class="next-tile"><div class="l">NEXT</div><canvas id="next-canvas" width="80" height="80"></canvas></div>
        </div>

        <div class="game-ctrl" id="gameCtrl">
            <button class="ctrl-btn" id="pauseBtn" type="button" aria-label="일시정지/재개">⏸ 일시정지</button>
        </div>

        <div class="canvas-wrap" id="canvasWrap">
            <canvas id="tetris-canvas" width="200" height="400"></canvas>
            <div class="overlay" id="overlay">
                <h2 class="play" id="ovTitle">PLAY TETRIS</h2>
                <p id="ovDesc">블록을 회전·이동·드롭으로 라인 완성.<br>4줄 동시 = 테트리스 보너스!</p>
                <button class="btn" id="ovBtn">시작</button>
                <div class="kbd-hint"><kbd>← →</kbd> 이동 · <kbd>Z X</kbd> 회전 · <kbd>↓</kbd> 소프트 · <kbd>Space</kbd> 하드드롭</div>
            </div>
        </div>

        <!-- 6-button mobile controls
             Row 1: ← → | CCW CW
             Row 2: SOFT-DROP | HARD-DROP -->
        <div class="controls" id="controls">
            <div class="ctrl-row">
                <button class="cbtn move" data-act="left"  type="button" aria-label="왼쪽">
                    <span class="ico">◀</span><span class="lab">LEFT</span>
                </button>
                <button class="cbtn move" data-act="right" type="button" aria-label="오른쪽">
                    <span class="ico">▶</span><span class="lab">RIGHT</span>
                </button>
                <span class="gap"></span>
                <button class="cbtn rot"  data-act="ccw"   type="button" aria-label="반시계 회전">
                    <span class="ico">↶</span><span class="lab">CCW</span>
                </button>
                <button class="cbtn rot"  data-act="cw"    type="button" aria-label="시계 회전">
                    <span class="ico">↷</span><span class="lab">CW</span>
                </button>
            </div>
            <div class="ctrl-row split-2">
                <button class="cbtn drop-soft" data-act="soft" type="button" aria-label="빠르게 내리기">
                    <span class="ico">↓↓</span><span class="lab">SOFT DROP</span>
                </button>
                <span class="gap"></span>
                <button class="cbtn drop-hard" data-act="hard" type="button" aria-label="바로 내리기">
                    <span class="ico">⇩</span><span class="lab">HARD DROP</span>
                </button>
            </div>
        </div>

        <div class="hint">라인 완성 = 점수. 한번에 4줄 = <b>TETRIS 보너스</b>. 천장에 닿으면 게임 오버.</div>
    </div>

    <aside id="adSlot" class="ad-col" aria-label="광고"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-5370817769801923" data-ad-slot="3456789012" data-ad-format="auto" data-full-width-responsive="true"></ins></aside>

    <div class="right-col">
        <div class="sheet-backdrop" id="sheetBack"></div>
        <aside class="sheet" id="sheet" aria-label="랭킹">
            <div class="handle"></div>
            <h3>🏆 랭킹</h3>
            <div class="lb-tabs">
                <button class="lb-tab active" data-scope="world">월드</button>
                <button class="lb-tab" data-scope="today">오늘</button>
                <button class="lb-tab" data-scope="friends">친구</button>
            </div>
            <div class="sheet-body">
                <div class="lb-list" id="lbList"><div class="lb-empty">불러오는 중…</div></div>
            </div>
        </aside>
    </div>
</main>

<script>
const $=(id)=>document.getElementById(id);
const esc=(s)=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const initials=(n)=>(n||'?').trim()[0]?.toUpperCase()||'?';

let me=null;

async function initAuth(){
    try{
        const u=await getUser();
        if(!u){
            me=null;
            $('authSlot').innerHTML='<a class="auth-chip" href="/auth/?next='+encodeURIComponent(location.pathname)+'">로그인</a>';
            return;
        }
        me=u;

async function loadMyStats(){
    if(!me)return;
    try{
        const {data,error}=await getSupabase().rpc('tetris_my_stats');
        if(error||!data||!data.has_record)return;
        /* No "best" cell in HUD (limited space — 4 boxes already), so we
           cache it and surface it on the game-over overlay. */
        window._tetrisBest = data.best_score;
    }catch(_){}
}

/* ================================================================
   AUDIO ENGINE — chip-style SFX. Renamed `Sfx` (not `Audio`) to avoid
   shadowing the global Audio constructor that lpBgm.js relies on
   (see ladder bug 2026-04-30).
   ================================================================ */
const Sfx=(()=>{
    let actx;
    function getCtx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}
    function play(freq,dur,type='square',vol=0.06){
        try{const c=getCtx(),o=c.createOscillator(),g=c.createGain();
            o.type=type;o.frequency.value=freq;
            g.gain.setValueAtTime(vol,c.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
            o.connect(g);g.connect(c.destination);
            o.start();o.stop(c.currentTime+dur)}catch(_){}}
    return{
        move(){play(440,0.04,'square',0.04)},
        rotate(){play(660,0.05,'triangle',0.05)},
        soft(){play(330,0.03,'square',0.03)},
        hard(){play(220,0.08,'sawtooth',0.07);setTimeout(()=>play(165,0.05,'square',0.05),40)},
        lock(){play(180,0.06,'square',0.05)},
        clear1(){play(523,0.1,'square',0.06);setTimeout(()=>play(659,0.1,'square',0.06),80)},
        clear2(){play(523,0.1,'square',0.07);setTimeout(()=>play(659,0.1,'square',0.07),80);setTimeout(()=>play(784,0.12,'square',0.08),160)},
        clear3(){[523,659,784,1047].forEach((n,i)=>setTimeout(()=>play(n,0.1,'square',0.07),i*70))},
        tetris(){
            /* TETRIS! 4-line bonus — bigger fanfare */
            [523,659,784,1047,1319,1568].forEach((n,i)=>setTimeout(()=>play(n,0.12,'square',0.09),i*55));
        },
        levelUp(){[440,554,659,880].forEach((n,i)=>setTimeout(()=>play(n,0.08,'triangle',0.07),i*60))},
        gameOver(){[330,294,247,196,165].forEach((n,i)=>setTimeout(()=>play(n,0.16,'sawtooth',0.07),i*120))},
        getCtx
    };
})();

/* ================================================================
   TETRIS PIECES & SRS ROTATION
   ================================================================
   Each piece has 4 rotation states (O has 1 but stored as 4 for
   uniform indexing). Coordinates are (col, row) offsets from the
   piece's pivot. Standard SRS layout used by modern Tetris.

   I-piece uses a 4x4 bounding box; others use 3x3. Encoded directly
   here rather than computed from base shape because the kick-test
   tables are tightly tied to these specific orientations.
   ================================================================ */
const PIECES = {
    /* I — cyan */
    I: {
        color: '#00D9FF',
        shapes: [
            [[0,1],[1,1],[2,1],[3,1]],  /* horizontal */
            [[2,0],[2,1],[2,2],[2,3]],  /* vertical right */
            [[0,2],[1,2],[2,2],[3,2]],  /* horizontal lower */
            [[1,0],[1,1],[1,2],[1,3]]   /* vertical left */
        ]
    },
    /* O — yellow (no rotation effect, but 4 entries for index parity) */
    O: {
        color: '#FFE66D',
        shapes: [
            [[1,0],[2,0],[1,1],[2,1]],
            [[1,0],[2,0],[1,1],[2,1]],
            [[1,0],[2,0],[1,1],[2,1]],
            [[1,0],[2,0],[1,1],[2,1]]
        ]
    },
    /* T — purple */
    T: {
        color: '#A855F7',
        shapes: [
            [[1,0],[0,1],[1,1],[2,1]],
            [[1,0],[1,1],[2,1],[1,2]],
            [[0,1],[1,1],[2,1],[1,2]],
            [[1,0],[0,1],[1,1],[1,2]]
        ]
    },
    /* S — green */
    S: {
        color: '#00E676',
        shapes: [
            [[1,0],[2,0],[0,1],[1,1]],
            [[1,0],[1,1],[2,1],[2,2]],
            [[1,1],[2,1],[0,2],[1,2]],
            [[0,0],[0,1],[1,1],[1,2]]
        ]
    },
    /* Z — red */
    Z: {
        color: '#FF3366',
        shapes: [
            [[0,0],[1,0],[1,1],[2,1]],
            [[2,0],[1,1],[2,1],[1,2]],
            [[0,1],[1,1],[1,2],[2,2]],
            [[1,0],[0,1],[1,1],[0,2]]
        ]
    },
    /* J — blue */
    J: {
        color: '#3B82F6',
        shapes: [
            [[0,0],[0,1],[1,1],[2,1]],
            [[1,0],[2,0],[1,1],[1,2]],
            [[0,1],[1,1],[2,1],[2,2]],
            [[1,0],[1,1],[0,2],[1,2]]
        ]
    },
    /* L — orange */
    L: {
        color: '#FF9A3C',
        shapes: [
            [[2,0],[0,1],[1,1],[2,1]],
            [[1,0],[1,1],[1,2],[2,2]],
            [[0,1],[1,1],[2,1],[0,2]],
            [[0,0],[1,0],[1,1],[1,2]]
        ]
    }
};
const PIECE_TYPES = ['I','O','T','S','Z','J','L'];

/* SRS wall-kick offsets (JLSTZ table). Tested in order; first one that
   fits wins. I-piece has its own table (slightly wider). O doesn't kick
   (rotation is no-op). Index: from-rotation → to-rotation. */
const KICKS_JLSTZ = {
    '0->1': [[0,0],[-1,0],[-1,-1],[0,2],[-1,2]],
    '1->0': [[0,0],[ 1,0],[ 1, 1],[0,-2],[ 1,-2]],
    '1->2': [[0,0],[ 1,0],[ 1, 1],[0,-2],[ 1,-2]],
    '2->1': [[0,0],[-1,0],[-1,-1],[0, 2],[-1, 2]],
    '2->3': [[0,0],[ 1,0],[ 1,-1],[0, 2],[ 1, 2]],
    '3->2': [[0,0],[-1,0],[-1, 1],[0,-2],[-1,-2]],
    '3->0': [[0,0],[-1,0],[-1, 1],[0,-2],[-1,-2]],
    '0->3': [[0,0],[ 1,0],[ 1,-1],[0, 2],[ 1, 2]]
};
const KICKS_I = {
    '0->1': [[0,0],[-2,0],[ 1,0],[-2, 1],[ 1,-2]],
    '1->0': [[0,0],[ 2,0],[-1,0],[ 2,-1],[-1, 2]],
    '1->2': [[0,0],[-1,0],[ 2,0],[-1,-2],[ 2, 1]],
    '2->1': [[0,0],[ 1,0],[-2,0],[ 1, 2],[-2,-1]],
    '2->3': [[0,0],[ 2,0],[-1,0],[ 2,-1],[-1, 2]],
    '3->2': [[0,0],[-2,0],[ 1,0],[-2, 1],[ 1,-2]],
    '3->0': [[0,0],[ 1,0],[-2,0],[ 1, 2],[-2,-1]],
    '0->3': [[0,0],[-1,0],[ 2,0],[-1,-2],[ 2, 1]]
};

/* ================================================================
   BOARD + STATE
   ================================================================ */
const COLS = 10, ROWS = 20;
const canvas = $('tetris-canvas');
const ctx = canvas.getContext('2d');
const nextCanvas = $('next-canvas');
const nextCtx = nextCanvas.getContext('2d');

let board = null;     /* 20x10 array of color strings or null */
let bag = [];         /* 7-bag random generator */
let current = null;   /* {type, rot, x, y} */
let nextType = null;
let level = 1, lines = 0, score = 0;
let dropMs = 800;     /* gravity per step */
let lastDrop = 0;
let lockTimer = 0, lockDelay = 500;   /* ms between landing and lock */
let landed = false;
let running = false, paused = false, gameOverFlag = false;
let startedAt = 0;
let softDropping = false;

/* ---- Pause UI sync ---- */
function syncPauseUI(){
    const gc=$('gameCtrl'), btn=$('pauseBtn');
    if(!gc||!btn) return;
    if(running && !gameOverFlag){
        gc.classList.add('on');
        btn.textContent = paused ? '▶ 재개' : '⏸ 일시정지';
        btn.setAttribute('aria-label', paused ? '재개' : '일시정지');
    } else {
        gc.classList.remove('on');
    }
}

/* ---- Canvas DPI fit ---- */
function fitCanvas(){
    const dpr=Math.min(2, window.devicePixelRatio||1);
    const rect=canvas.getBoundingClientRect();
    canvas.width=Math.round(rect.width*dpr);
    canvas.height=Math.round(rect.height*dpr);
    ctx.setTransform(dpr*rect.width/(COLS*20), 0, 0, dpr*rect.height/(ROWS*20), 0, 0);
    /* Logical units: each cell = 20×20 in canvas-internal coordinates. */
    const nrect=nextCanvas.getBoundingClientRect();
    nextCanvas.width=Math.round(nrect.width*dpr);
    nextCanvas.height=Math.round(nrect.height*dpr);
    nextCtx.setTransform(dpr*nrect.width/80, 0, 0, dpr*nrect.height/80, 0, 0);
}
window.addEventListener('resize', fitCanvas);

/* ---- 7-bag random ----
   Standard modern Tetris piece distribution. Each "bag" contains all
   7 piece types in random order; we draw from it until empty, then
   reshuffle. Guarantees no piece appears 4+ times in a row, no piece
   misses for >12 spawns. */
function refillBag(){
    bag = PIECE_TYPES.slice();
    for(let i=bag.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [bag[i],bag[j]]=[bag[j],bag[i]];
    }
}
function drawNextType(){
    if(bag.length===0) refillBag();
    return bag.pop();
}

/* ---- Collision check ----
   `tryPos` returns true if `type` at rotation `rot` placed at (x,y)
   doesn't overlap the board or go out of bounds. Used for movement,
   rotation kicks, and lock detection. */
function tryPos(type, rot, x, y){
    const shape = PIECES[type].shapes[rot];
    for(const [dx, dy] of shape){
        const cx = x + dx, cy = y + dy;
        if(cx < 0 || cx >= COLS) return false;
        if(cy >= ROWS) return false;
        if(cy >= 0 && board[cy][cx] != null) return false;
    }
    return true;
}

function spawnPiece(){
    const type = nextType || drawNextType();
    nextType = drawNextType();
    /* Standard Tetris spawn: top center. I/O spawn x=3, others x=3.
       y=-1 lets piece appear partially above the visible field. */
    current = { type, rot: 0, x: 3, y: type==='I' ? -1 : -1 };
    landed = false;
    lockTimer = 0;
    /* Check spawn collision = game over (board too full to fit new piece) */
    if(!tryPos(current.type, current.rot, current.x, current.y)){
        gameOver();
        return false;
    }
    drawNextPreview();
    return true;
}

/* ---- Movement ---- */
function moveX(dx){
    if(!current || paused || gameOverFlag) return false;
    if(tryPos(current.type, current.rot, current.x + dx, current.y)){
        current.x += dx;
        Sfx.move();
        if(landed){ lockTimer = 0; }   /* lock-delay reset on horizontal move */
        return true;
    }
    return false;
}
function rotate(dir){  /* dir = +1 (CW) or -1 (CCW) */
    if(!current || paused || gameOverFlag) return false;
    if(current.type === 'O'){ Sfx.rotate(); return true; }
    const fromRot = current.rot;
    const toRot = (fromRot + dir + 4) % 4;
    const kickKey = fromRot + '->' + toRot;
    const kickTable = current.type === 'I' ? KICKS_I : KICKS_JLSTZ;
    const kicks = kickTable[kickKey] || [[0,0]];
    for(const [kx, ky] of kicks){
        if(tryPos(current.type, toRot, current.x + kx, current.y - ky)){
            current.rot = toRot;
            current.x += kx;
            current.y -= ky;
            Sfx.rotate();
            if(landed){ lockTimer = 0; }
            return true;
        }
    }
    return false;
}

/* Drop one cell. Returns true if moved, false if landed on stack. */
function dropOne(){
    if(!current || paused || gameOverFlag) return false;
    if(tryPos(current.type, current.rot, current.x, current.y + 1)){
        current.y += 1;
        return true;
    }
    /* Can't move down → mark landed, lock-delay timer starts */
    if(!landed){
        landed = true;
        lockTimer = 0;
    }
    return false;
}
function softDrop(){
    if(dropOne()){
        score += 1;   /* +1 per cell soft-dropped */
        Sfx.soft();
        $('scoreNow').textContent = score.toLocaleString();
    }
}
function hardDrop(){
    if(!current || paused || gameOverFlag) return;
    let cells = 0;
    while(tryPos(current.type, current.rot, current.x, current.y + 1)){
        current.y += 1;
        cells++;
    }
    score += cells * 2;   /* +2 per cell hard-dropped */
    $('scoreNow').textContent = score.toLocaleString();
    Sfx.hard();
    lock();
}

/* ---- Lock + clear lines + spawn next ---- */
function lock(){
    if(!current) return;
    const shape = PIECES[current.type].shapes[current.rot];
    const color = PIECES[current.type].color;
    let topRow = ROWS;
    for(const [dx, dy] of shape){
        const cy = current.y + dy, cx = current.x + dx;
        if(cy < 0){
            /* Piece locked above visible board → game over */
            gameOver();
            return;
        }
        board[cy][cx] = color;
        if(cy < topRow) topRow = cy;
    }
    Sfx.lock();
    /* Detect & clear completed lines */
    const cleared = [];
    for(let y = 0; y < ROWS; y++){
        if(board[y].every(c => c != null)) cleared.push(y);
    }
    if(cleared.length > 0){
        /* Visual: brief flash, then collapse */
        cleared.forEach(y => board[y].fill('#fff'));
        render();
        setTimeout(() => {
            for(const y of cleared) board.splice(y, 1);
            for(let i = 0; i < cleared.length; i++) board.unshift(Array(COLS).fill(null));
            const lineScore = [0, 40, 100, 300, 1200][cleared.length] || 0;
            score += lineScore * (level + 0);   /* level 1 multiplier = 1, level 2 = 2, ... */
            lines += cleared.length;
            $('scoreNow').textContent = score.toLocaleString();
            $('linesNow').textContent = lines;
            /* Sound by line count */
            if(cleared.length === 4) Sfx.tetris();
            else if(cleared.length === 3) Sfx.clear3();
            else if(cleared.length === 2) Sfx.clear2();
            else Sfx.clear1();
            /* Level-up every 10 lines, speed up */
            const newLevel = 1 + Math.floor(lines / 10);
            if(newLevel > level){
                level = Math.min(newLevel, 30);
                $('levelNow').textContent = level;
                /* NES-ish speed curve: ~50ms per level, capped at 50ms */
                dropMs = Math.max(50, 800 - (level - 1) * 60);
                Sfx.levelUp();
            }
            spawnPiece();
        }, 180);
    } else {
        spawnPiece();
    }
    landed = false;
    lockTimer = 0;
}

/* ---- Render ---- */
const CELL = 20;   /* logical cell size; canvas transform handles scaling */
function drawCell(cctx, cx, cy, color, alpha){
    if(alpha == null) alpha = 1;
    const px = cx * CELL, py = cy * CELL;
    cctx.globalAlpha = alpha;
    cctx.fillStyle = color;
    cctx.fillRect(px + 1, py + 1, CELL - 2, CELL - 2);
    /* Inner highlight for that retro 3D look */
    cctx.fillStyle = 'rgba(255,255,255,0.18)';
    cctx.fillRect(px + 2, py + 2, CELL - 4, 3);
    cctx.fillRect(px + 2, py + 2, 3, CELL - 4);
    cctx.fillStyle = 'rgba(0,0,0,0.25)';
    cctx.fillRect(px + 2, py + CELL - 5, CELL - 4, 3);
    cctx.fillRect(px + CELL - 5, py + 2, 3, CELL - 4);
    cctx.globalAlpha = 1;
}
function getGhostY(){
    if(!current) return 0;
    let y = current.y;
    while(tryPos(current.type, current.rot, current.x, y + 1)) y++;
    return y;
}
function render(){
    /* Background */
    ctx.fillStyle = '#020516';
    ctx.fillRect(0, 0, COLS * CELL, ROWS * CELL);
    /* Subtle grid lines */
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    for(let i = 1; i < COLS; i++){
        ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, ROWS * CELL); ctx.stroke();
    }
    for(let i = 1; i < ROWS; i++){
        ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(COLS * CELL, i * CELL); ctx.stroke();
    }
    /* Locked cells */
    for(let y = 0; y < ROWS; y++){
        for(let x = 0; x < COLS; x++){
            if(board[y][x]) drawCell(ctx, x, y, board[y][x]);
        }
    }
    /* Ghost piece (where current would land) */
    if(current && !gameOverFlag){
        const ghostY = getGhostY();
        if(ghostY !== current.y){
            const shape = PIECES[current.type].shapes[current.rot];
            const color = PIECES[current.type].color;
            for(const [dx, dy] of shape){
                const cx = current.x + dx, cy = ghostY + dy;
                if(cy >= 0) drawCell(ctx, cx, cy, color, 0.22);
            }
        }
    }
    /* Current piece */
    if(current){
        const shape = PIECES[current.type].shapes[current.rot];
        const color = PIECES[current.type].color;
        for(const [dx, dy] of shape){
            const cx = current.x + dx, cy = current.y + dy;
            if(cy >= 0) drawCell(ctx, cx, cy, color);
        }
    }
    /* Pause overlay */
    if(paused && running){
        ctx.fillStyle = 'rgba(5,5,15,.72)';
        ctx.fillRect(0, 0, COLS * CELL, ROWS * CELL);
        ctx.font = 'bold 16px Orbitron, sans-serif';
        ctx.fillStyle = '#00D9FF';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('PAUSED', COLS * CELL / 2, ROWS * CELL / 2);
        ctx.textAlign = 'left';
        ctx.textBaseline = 'alphabetic';
    }
}
function drawNextPreview(){
    nextCtx.fillStyle = '#020516';
    nextCtx.fillRect(0, 0, 80, 80);
    if(!nextType) return;
    const shape = PIECES[nextType].shapes[0];
    const color = PIECES[nextType].color;
    /* Center the piece in the 80×80 preview area.
       Find shape bounds (could be 2x2 to 4x4) and center. */
    let minX=99, maxX=-99, minY=99, maxY=-99;
    for(const [dx, dy] of shape){
        if(dx < minX) minX = dx;
        if(dx > maxX) maxX = dx;
        if(dy < minY) minY = dy;
        if(dy > maxY) maxY = dy;
    }
    const w = maxX - minX + 1, h = maxY - minY + 1;
    const cellSize = Math.min(80 / Math.max(w, 4), 80 / Math.max(h, 4)) * 0.9;
    const offsetX = (80 - w * cellSize) / 2 - minX * cellSize;
    const offsetY = (80 - h * cellSize) / 2 - minY * cellSize;
    for(const [dx, dy] of shape){
        const px = offsetX + dx * cellSize;
        const py = offsetY + dy * cellSize;
        nextCtx.fillStyle = color;
        nextCtx.fillRect(px + 1, py + 1, cellSize - 2, cellSize - 2);
        nextCtx.fillStyle = 'rgba(255,255,255,0.18)';
        nextCtx.fillRect(px + 2, py + 2, cellSize - 4, 2);
        nextCtx.fillRect(px + 2, py + 2, 2, cellSize - 4);
    }
}

/* ---- Game loop ---- */
function loop(now){
    if(!running) return;
    if(!paused){
        const interval = softDropping ? Math.min(50, dropMs) : dropMs;
        while(now - lastDrop >= interval){
            lastDrop += interval;
            const moved = dropOne();
            if(moved){
                if(softDropping){ score += 1; $('scoreNow').textContent = score.toLocaleString(); }
            }
            if(landed){
                lockTimer += interval;
                if(lockTimer >= lockDelay){
                    lock();
                    if(!running) return;
                    lockTimer = 0;
                }
            }
            if(!running) return;
        }
    } else {
        lastDrop = now;
    }
    render();
    requestAnimationFrame(loop);
}

/* ---- Game lifecycle ---- */
function startGame(){
    /* Init state */
    board = Array.from({length: ROWS}, () => Array(COLS).fill(null));
    bag = [];
    refillBag();
    nextType = drawNextType();
    score = 0; lines = 0; level = 1;
    dropMs = 800;
    softDropping = false;
    paused = false; gameOverFlag = false; running = true;
    landed = false; lockTimer = 0;
    startedAt = performance.now();
    $('scoreNow').textContent = '0';
    $('linesNow').textContent = '0';
    $('levelNow').textContent = '1';
    $('overlay').classList.add('hidden');
    syncPauseUI();
    spawnPiece();
    Sfx.getCtx();   /* unlock AudioContext on the click that started us */
    lastDrop = performance.now();
    requestAnimationFrame(loop);
    fitCanvas();
}

function gameOver(){
    if(gameOverFlag) return;
    gameOverFlag = true;
    running = false;
    Sfx.gameOver();
    syncPauseUI();
    render();
    showGameOverOverlay();
}

async function showGameOverOverlay(){
    const duration = Math.max(0, Math.floor(performance.now() - startedAt));
    const ov = $('overlay');
    ov.innerHTML = ''
        + '<h2 class="over">GAME OVER</h2>'
        + '<div class="over-stats">'
        + '<div class="row"><span>Score</span><b>' + score.toLocaleString() + '</b></div>'
        + '<div class="row"><span>Lines</span><b>' + lines + '</b></div>'
        + '<div class="row"><span>Level</span><b>' + level + '</b></div>'
        + '<div class="row"><span>Time</span><b>' + Math.floor(duration/1000) + 's</b></div>'
        + '</div>'
        + '<div class="over-rank" id="ovRankNum">기록 등록 중…</div>'
        + '<div class="over-pb" id="ovRankPb"></div>'
        + '<button class="btn" id="ovBtnRetry">다시 도전</button>'
        + '<div class="kbd-hint" style="margin-top:6px"><kbd>Enter</kbd> 재시작</div>';
    ov.classList.remove('hidden');
    $('ovBtnRetry').addEventListener('click', startGame);

    /* Submit the score (anon: skip) */
    let recordOk = false, recordErrKind = null;
    if(me){
        try{
            const {data, error} = await getSupabase().rpc('record_tetris_attempt', {
                p_score: score, p_lines: lines, p_level: level, p_duration_ms: duration
            });
            if(error){
                console.warn('[tetris.record]', error.message);
                if(/not_authenticated/.test(error.message)) recordErrKind = 'no_auth';
                else if(/impossible_pace|score_lines_mismatch|bad_/.test(error.message)) recordErrKind = 'invalid';
                else if(/rate_limited/.test(error.message)) recordErrKind = 'rate_limited';
                else recordErrKind = 'unknown';
            } else if(data?.ok){
                recordOk = true;
                if(data.is_personal_best){
                    $('ovRankPb').textContent = '🎉 자기 최고 기록!';
                } else if(data.prior_best){
                    $('ovRankPb').textContent = '베스트: ' + data.prior_best.toLocaleString();
                }
            }
        } catch(e){
            console.warn('[tetris.record] threw', e);
            recordErrKind = 'unknown';
        }
    } else {
        recordErrKind = 'no_login';
    }

    /* Show world rank */
    if(recordOk && me){
        try{
            const {data: stats} = await getSupabase().rpc('tetris_my_stats');
            if(stats?.has_record){
                $('ovRankNum').textContent = '🌍 #' + (stats.world_rank||'?').toLocaleString();
            } else {
                $('ovRankNum').textContent = '🎉 첫 기록!';
            }
        } catch(_){
            $('ovRankNum').textContent = '🌍 랭킹 조회 실패';
        }
    } else if(recordErrKind === 'no_login'){
        $('ovRankNum').textContent = '🔒 로그인하면 기록 저장!';
    } else if(recordErrKind === 'rate_limited'){
        $('ovRankNum').textContent = '⏱ 시간당 30회 초과';
    } else if(recordErrKind === 'invalid'){
        $('ovRankNum').textContent = '⚠️ 점수 검증 실패';
    } else if(recordErrKind === 'no_auth'){
        $('ovRankNum').textContent = '🔐 로그인이 필요해요';
    } else if(recordErrKind === 'unknown'){
        $('ovRankNum').textContent = '⚠️ 기록 저장 실패';
    } else if(!me){
        $('ovRankNum').textContent = '🔒 로그인하면 기록 저장!';
    } else {
        $('ovRankNum').textContent = '';
    }

    /* Refresh leaderboard */
    if(matchMedia('(min-width:1024px)').matches) loadLeaderboard(currentScope);
}

/* ---- Input ---- */
function onKey(e){
    const k = e.key;
    if(!running && !gameOverFlag){
        if(k === 'Enter') startGame();
        return;
    }
    if(gameOverFlag){
        if(k === 'Enter') startGame();
        return;
    }
    if(paused){
        if(k === ' '){ paused = false; syncPauseUI(); e.preventDefault(); }
        return;
    }
    if(k === 'ArrowLeft' || k === 'a' || k === 'A'){ moveX(-1); e.preventDefault(); }
    else if(k === 'ArrowRight' || k === 'd' || k === 'D'){ moveX(1); e.preventDefault(); }
    else if(k === 'ArrowUp' || k === 'x' || k === 'X'){ rotate(1); e.preventDefault(); }
    else if(k === 'z' || k === 'Z'){ rotate(-1); e.preventDefault(); }
    else if(k === 'ArrowDown' || k === 's' || k === 'S'){ softDropping = true; e.preventDefault(); }
    else if(k === ' '){ hardDrop(); e.preventDefault(); }
    else if(k === 'p' || k === 'P'){ paused = !paused; syncPauseUI(); }
}
function onKeyUp(e){
    if(e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') softDropping = false;
}
document.addEventListener('keydown', onKey);
document.addEventListener('keyup', onKeyUp);

/* Touch buttons. Soft drop has special hold-to-repeat behavior — most
   other actions are single-shot per tap. */
const HOLD_REPEAT_MS = 110;
let _holdTimers = {};
function onCtrlPress(act){
    switch(act){
        case 'left':  moveX(-1); break;
        case 'right': moveX(1); break;
        case 'ccw':   rotate(-1); break;
        case 'cw':    rotate(1); break;
        case 'soft':  softDropping = true; softDrop(); break;
        case 'hard':  hardDrop(); break;
    }
}
function onCtrlRelease(act){
    if(act === 'soft') softDropping = false;
}
document.querySelectorAll('.cbtn').forEach(b => {
    const act = b.dataset.act;
    /* press = touchstart or mousedown; we wire both for desktop testing.
       Using {passive:false} on touchstart so preventDefault() can stop
       the page scroll the finger would otherwise trigger. */
    const press = (e) => {
        e.preventDefault();
        if(!running) return;
        if(paused){ paused = false; syncPauseUI(); }
        onCtrlPress(act);
        /* Hold-to-repeat for left/right/soft */
        if(act === 'left' || act === 'right'){
            clearInterval(_holdTimers[act]);
            _holdTimers[act] = setInterval(() => onCtrlPress(act), HOLD_REPEAT_MS);
        }
    };
    const release = (e) => {
        if(_holdTimers[act]){ clearInterval(_holdTimers[act]); _holdTimers[act] = null; }
        onCtrlRelease(act);
    };
    b.addEventListener('touchstart', press, {passive: false});
    b.addEventListener('touchend', release);
    b.addEventListener('touchcancel', release);
    b.addEventListener('mousedown', press);
    b.addEventListener('mouseup', release);
    b.addEventListener('mouseleave', release);
});

/* Pause button */
$('pauseBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    if(!running || gameOverFlag) return;
    paused = !paused;
    syncPauseUI();
});

/* Start button */
$('ovBtn').addEventListener('click', startGame);

/* ---- Leaderboard sheet ---- */
const sheet=$('sheet'), sheetBack=$('sheetBack');
function openSheet(){ sheet.classList.add('on'); sheetBack.classList.add('on'); loadLeaderboard(currentScope); }
function closeSheet(){ sheet.classList.remove('on'); sheetBack.classList.remove('on'); }
$('openLb').addEventListener('click', openSheet);
sheetBack.addEventListener('click', closeSheet);

let sheetDragY = null;
sheet.querySelector('.handle').addEventListener('touchstart',(e)=>{sheetDragY=e.touches[0].clientY},{passive:true});
sheet.querySelector('.handle').addEventListener('touchmove',(e)=>{
    if(sheetDragY==null)return;
    const dy=e.touches[0].clientY-sheetDragY;
    if(dy>50){ closeSheet(); sheetDragY=null; }
},{passive:true});
sheet.querySelector('.handle').addEventListener('touchend',()=>{sheetDragY=null},{passive:true});

let currentScope='world';
document.querySelectorAll('.lb-tab').forEach(b=>{
    b.addEventListener('click', ()=>{
        document.querySelectorAll('.lb-tab').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        currentScope=b.dataset.scope;
        loadLeaderboard(currentScope);
    });
});
async function loadLeaderboard(scope){
    $('lbList').innerHTML='<div class="lb-empty">불러오는 중…</div>';
    try{
        const {data,error}=await getSupabase().rpc('tetris_leaderboard',{p_scope:scope,p_limit:50});
        try{ console.log('[tetris.leaderboard]', scope, error?'error':(data?data.length+' rows':'null'), error?error.message:''); }catch(_){}
        if(error||!data){ $('lbList').innerHTML='<div class="lb-empty">기록 없음</div>'; return; }
        if(!data.length){
            const emptyMsg = scope==='today'
                ? '🌅 오늘 (한국 시간 기준) 기록이 아직 없어요.<br>첫 기록의 주인공이 되세요!'
                : scope==='friends'
                ? '친구가 아직 플레이하지 않았어요.<br>친구 추가는 /messages/ 에서!'
                : '첫 기록의 주인공이 되세요!';
            $('lbList').innerHTML='<div class="lb-empty">'+emptyMsg+'</div>';
            return;
        }
        $('lbList').innerHTML=data.map(row=>{
            const isSelf=me && row.user_id===me.id;
            const rnkCls=row.rnk===1?' gold':row.rnk===2?' silver':row.rnk===3?' bronze':'';
            const av=row.avatar_url
                ? '<div class="lb-av"><img src="'+esc(row.avatar_url)+'" referrerpolicy="no-referrer" alt=""></div>'
                : '<div class="lb-av">'+esc(initials(row.nickname))+'</div>';
            return '<div class="lb-row'+(isSelf?' self':'')+'">'
                 +'<div class="lb-rnk'+rnkCls+'">'+(row.rnk<=3?(['🥇','🥈','🥉'][row.rnk-1]):('#'+row.rnk))+'</div>'
                 +'<div class="lb-who">'+av+'<div class="lb-nick">'+esc(row.nickname||'?')+'</div></div>'
                 +'<div class="lb-score">'+row.best_score.toLocaleString()+'</div>'
                 +'</div>';
        }).join('');
    }catch(_){$('lbList').innerHTML='<div class="lb-empty">불러오기 실패</div>';}
}

/* ---- Boot ---- */
(async()=>{
    await initAuth();
    fitCanvas();
    /* Initial render shows empty board behind the START overlay. */
    board = Array.from({length: ROWS}, () => Array(COLS).fill(null));
    render();
    if(matchMedia('(min-width:1024px)').matches) loadLeaderboard('world');
})();

if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(r=>r.forEach(s=>s.unregister())).catch(()=>{})}
if('caches' in window){caches.keys().then(k=>k.forEach(n=>caches.delete(n))).catch(()=>{})}
