/* ================================================================
   AUDIO ENGINE — chip-style SFX. Renamed `Sfx` (not `Audio`) to avoid
   shadowing the global Audio constructor that lpBgm.js relies on
   (see ladder bug 2026-04-30).
   ================================================================ */
const Sfx=(()=>{
    let actx;
    function getCtx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}
    function play(freq,dur,type='square',vol=0.06){
        try{const c=getCtx(),o=c.createOscillator(),g=c.createGain();
            o.type=type;o.frequency.value=freq;
            g.gain.setValueAtTime(vol,c.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
            o.connect(g);g.connect(c.destination);
            o.start();o.stop(c.currentTime+dur)}catch(_){}}
    /* High → low frequency sweep — 라인 클리어 직전 "휘이잉" 효과 */
    function sweep(fStart,fEnd,dur,vol,type){
        try{const c=getCtx(),o=c.createOscillator(),g=c.createGain();
            o.type=type||'sawtooth';
            o.frequency.setValueAtTime(fStart,c.currentTime);
            o.frequency.exponentialRampToValueAtTime(Math.max(20,fEnd),c.currentTime+dur);
            g.gain.setValueAtTime(vol,c.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
            o.connect(g);g.connect(c.destination);
            o.start();o.stop(c.currentTime+dur)}catch(_){}}
    /* 저주파 쿵 (테트리스 4줄 클리어 시 임팩트) */
    function boom(){
        try{const c=getCtx(),o=c.createOscillator(),g=c.createGain();
            o.type='sine';
            o.frequency.setValueAtTime(160,c.currentTime);
            o.frequency.exponentialRampToValueAtTime(40,c.currentTime+0.32);
            g.gain.setValueAtTime(0.14,c.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.32);
            o.connect(g);g.connect(c.destination);
            o.start();o.stop(c.currentTime+0.32)}catch(_){}}
    /* 박살 효과음 (간단 버전) — 모바일 부담 최소화 위해 2 oscillator 만.
       이전 7개는 createOscillator/createGain 호출이 너무 많아 모바일
       audio thread 블로킹 의심. 대신 frequency sweep 으로 brittle 느낌. */
    function shatter(){
        try{
            const c=getCtx();
            const now=c.currentTime;
            /* 메인 sweep — 3kHz → 800Hz exponential drop, 유리 박살 톤 */
            const o1=c.createOscillator(),g1=c.createGain();
            o1.type='triangle';
            o1.frequency.setValueAtTime(3200,now);
            o1.frequency.exponentialRampToValueAtTime(800,now+0.20);
            g1.gain.setValueAtTime(0.07,now);
            g1.gain.exponentialRampToValueAtTime(0.001,now+0.20);
            o1.connect(g1);g1.connect(c.destination);
            o1.start(now);o1.stop(now+0.20);
            /* 보조 sparkle — 6kHz sine → 3kHz */
            const o2=c.createOscillator(),g2=c.createGain();
            o2.type='sine';
            o2.frequency.setValueAtTime(6500,now);
            o2.frequency.exponentialRampToValueAtTime(3000,now+0.15);
            g2.gain.setValueAtTime(0.03,now);
            g2.gain.exponentialRampToValueAtTime(0.001,now+0.15);
            o2.connect(g2);g2.connect(c.destination);
            o2.start(now);o2.stop(now+0.15);
        }catch(_){}
    }
    return{
        move(){play(440,0.04,'square',0.04)},
        rotate(){play(660,0.05,'triangle',0.05)},
        soft(){play(330,0.03,'square',0.03)},
        hard(){play(220,0.08,'sawtooth',0.07);setTimeout(()=>play(165,0.05,'square',0.05),40)},
        lock(){play(180,0.06,'square',0.05)},
        /* 보석이 박살나는 brittle shatter SFX 가 immediate, 그 후 melody
           로 보상감 마무리. sweep (whoosh) 보다 crystalline 한 톤으로
           "보석 깨지는" 시각효과와 일관. */
        clear1(){
            shatter();
            setTimeout(()=>{play(523,0.1,'square',0.06);setTimeout(()=>play(784,0.12,'square',0.07),90)},80);
        },
        clear2(){
            shatter();
            setTimeout(()=>{play(523,0.1,'square',0.07);setTimeout(()=>play(659,0.1,'square',0.07),80);setTimeout(()=>play(880,0.14,'square',0.08),160)},80);
        },
        clear3(){
            shatter();
            setTimeout(()=>{[523,659,784,1047].forEach((n,i)=>setTimeout(()=>play(n,0.1,'square',0.07),i*65))},80);
        },
        tetris(){
            /* TETRIS! 4-line bonus — boom + shatter + 6단 fanfare 합주.
               저주파 boom (묵직한 충격) + shatter (유리 박살) + melody
               (환희). 다층 합성으로 보상감 최대. */
            boom();
            shatter();
            setTimeout(()=>{[523,659,784,1047,1319,1568].forEach((n,i)=>setTimeout(()=>play(n,0.12,'square',0.09),i*55))},120);
        },
        levelUp(){[440,554,659,880].forEach((n,i)=>setTimeout(()=>play(n,0.08,'triangle',0.07),i*60))},
        gameOver(){[330,294,247,196,165].forEach((n,i)=>setTimeout(()=>play(n,0.16,'sawtooth',0.07),i*120))},
        getCtx
    };
})();

/* ================================================================
   TETRIS BGM — 3-tier dynamic music tied to stack height.
   ================================================================
   topRow >= 11   → track1 (차분, 스택 ≤ 9 행, ≤ 45%)
   topRow 6..10   → track2 (긴장, 스택 10-14 행, 50-70%)
   topRow ≤ 5     → track3 (위급, 스택 ≥ 15 행, 75%+)

   topRow = 가장 위에 채워진 행의 인덱스 (0=맨 위, 빈 보드 = ROWS).

   히스테리시스 (음악 깜빡임 방지):
     상위 tier 진입 임계 = 위 표 그대로
     하위 tier 복귀 임계 = +2 행 갭 (track2→track1: top>=12, track3→
       track2: top>=7). 라인 클리어로 한 행만 빠진 경계선에서 음악이
       즉시 안 바뀌게 함.

   크로스페이드 800ms — 자연스러운 음악 전환. 모든 트랙 같은 max
   volume (0.35) 으로 레벨 매칭.

   트랙 누락 시 (mp3 404) 해당 tier 비활성, 다른 tier 는 정상.
   이 게임은 lpBgm.js 안 씀 — SKIP_GAMES 에 등록됨. */
const TetrisBGM = (function(){
    const TRACK_COUNT = 3;
    const audios = [];
    /* console 진단용 — 음악 안 들릴 때 어디서 막히는지 추적 */
    function log(msg){ try { console.log('[TetrisBGM]', msg); } catch(_){} }
    function warn(msg){ try { console.warn('[TetrisBGM]', msg); } catch(_){} }

    /* Cache-bust query on mp3 URLs.
       원인: 첫 배포 전 Cloudflare 가 mp3 URL 의 404 응답 (HTML 404
       페이지) 을 7일 max-age 로 캐시함. 이후 파일이 배포돼도 stale
       cache 가 HTML 을 계속 서빙 → 브라우저가 Content-Type:text/html
       보고 NotSupportedError (audio.error code=4) 발생.

       매 페이지 로드마다 unique timestamp 사용 — 어떤 캐시 레이어
       (Cloudflare / 브라우저 / 모바일 WebView) 도 stale 로 hit 안
       함. 비용: 매 방문마다 mp3 다운로드 (~3 MB 합계). 음악 안
       들리는 것보단 낫고, 안정화 후 stable hash 로 전환 가능. */
    const CACHE_BUST = '?v=' + Date.now();

    for(let i = 1; i <= TRACK_COUNT; i++){
        const a = new Audio('/assets/bgm/tetris/track' + i + '.mp3' + CACHE_BUST);
        a.loop = true;
        a.volume = 0;
        a.preload = 'auto';
        const trackNum = i;   /* closure 변수 */
        a.addEventListener('error', function(){
            a.dataset.failed = '1';
            const code = a.error ? a.error.code : '?';
            warn('track' + trackNum + '.mp3 load failed (code=' + code + '). 서버에 파일 있는지 / 캐시 / CORS 확인.');
        });
        a.addEventListener('canplaythrough', function(){
            log('track' + trackNum + '.mp3 buffered OK (' + Math.round(a.duration) + 's)');
        });
        audios.push(a);
    }
    log('initialized with ' + TRACK_COUNT + ' tracks');

    const MAX_VOL = 0.35;
    const FADE_MS = 800;
    let currentTier = 0;
    let started = false;
    let enabled = true;
    const fadeTimers = [null, null, null];

    /* ---- WARMUP (autoplay 정책 우회) ----
       Chrome / Safari / iOS 모두 audio.play() 는 사용자 gesture 가
       있어야 허용. 게임 페이지 진입 직후엔 어떤 gesture 도 없어서
       audio element 가 "잠긴" 상태. startGame() 안에서 play() 호출
       해도 첫 시도가 무음 실패할 수 있음.

       해결: 페이지의 첫 user interaction (어느 클릭/탭이든) 발생 시
       audio.play() 를 살짝 건드려서 unlock. 그 후 게임 시작 시점의
       play() 는 정상 동작. car-racing / dodge 가 같은 패턴 사용.
       once:true 로 한 번만 실행. */
    let warmed = false;
    function warmup(){
        if(warmed) return;
        warmed = true;
        log('warmup triggered (first user interaction)');
        audios.forEach(function(a, i){
            try {
                a.volume = 0;
                const p = a.play();
                if(p && p.then){
                    p.then(function(){
                        /* CRITICAL race-condition 가드:
                           사용자가 빠르게 클릭하면 warmup play() Promise 가
                           start() 호출 후에 resolve 됨. 그때 pause() 호출하면
                           방금 시작된 BGM 이 끊김 (이전 사용자 보고 케이스).
                           started === true 면 pause 스킵 → BGM 계속 재생. */
                        if(!started){
                            a.pause();
                            a.currentTime = 0;
                            log('track' + (i+1) + ' warmup ✓');
                        } else {
                            log('track' + (i+1) + ' warmup ✓ (kept playing — game in progress)');
                        }
                    }).catch(function(err){
                        warn('track' + (i+1) + ' warmup rejected: ' + err.name + ' — ' + err.message);
                    });
                }
            } catch(e) {
                warn('track' + (i+1) + ' warmup threw: ' + e.message);
            }
        });
    }
    ['click','touchstart','keydown'].forEach(function(ev){
        document.addEventListener(ev, warmup, {once:true, capture:true, passive:true});
    });

    function computeTopRow(board){
        for(let y = 0; y < board.length; y++){
            for(let x = 0; x < board[y].length; x++){
                if(board[y][x] != null) return y;
            }
        }
        return board.length;   /* 빈 보드 */
    }

    function tierFor(top, cur){
        const ESC_TENSE = 10, ESC_CRIT = 5;
        const DEESC_TENSE = 12, DEESC_CRIT = 7;
        if(cur === 2){
            if(top >= DEESC_CRIT) return tierFor(top, 1);
            return 2;
        }
        if(cur === 1){
            if(top <= ESC_CRIT) return 2;
            if(top >= DEESC_TENSE) return 0;
            return 1;
        }
        /* cur === 0 */
        if(top <= ESC_CRIT) return 2;
        if(top <= ESC_TENSE) return 1;
        return 0;
    }

    function fadeAudio(audio, targetVol, durMs, onDone){
        const idx = audios.indexOf(audio);
        if(idx < 0) return;
        if(fadeTimers[idx]){ clearInterval(fadeTimers[idx]); fadeTimers[idx] = null; }
        const startVol = audio.volume;
        const diff = targetVol - startVol;
        if(Math.abs(diff) < 0.01){ audio.volume = targetVol; if(onDone) onDone(); return; }
        const steps = Math.max(1, Math.round(durMs / 16));
        const stepVal = diff / steps;
        let cur = 0;
        fadeTimers[idx] = setInterval(() => {
            cur++;
            audio.volume = Math.min(1, Math.max(0, startVol + stepVal * cur));
            if(cur >= steps){
                clearInterval(fadeTimers[idx]);
                fadeTimers[idx] = null;
                audio.volume = Math.min(1, Math.max(0, targetVol));
                if(onDone) onDone();
            }
        }, durMs / steps);
    }

    function playTier(tier){
        log('playTier(' + tier + ') currentTier=' + currentTier + ' started=' + started);
        if(!enabled){ log('  → enabled=false, skip'); return; }
        if(audios[tier].dataset.failed){
            warn('  → track' + (tier+1) + '.mp3 marked as failed (load 실패), skip');
            return;
        }
        if(tier === currentTier && started){ log('  → already on this tier, skip'); return; }
        /* 다른 트랙 페이드 아웃 + 새 트랙 페이드 인 (크로스페이드) */
        audios.forEach((a, i) => {
            if(i !== tier && !a.paused){
                fadeAudio(a, 0, FADE_MS, function(){ try{ a.pause(); }catch(_){} });
            }
        });
        const newAudio = audios[tier];
        try {
            /* warmup 이 이미 audio 켜놓은 상태일 수 있음. paused 면
               currentTime 리셋 + play, 아니면 그냥 volume 만 0 으로
               (fadeAudio 가 MAX_VOL 로 올림). play() 는 멱등 — 이미
               재생 중이면 no-op + resolved Promise. */
            newAudio.volume = 0;
            if(newAudio.paused){
                newAudio.currentTime = 0;
                log('  → track' + (tier+1) + ' was paused, calling play()');
            } else {
                log('  → track' + (tier+1) + ' already playing (likely warmup), keeping');
            }
            const p = newAudio.play();
            if(p && p.then){
                p.then(function(){
                    log('  → play() resolved on track' + (tier+1));
                }).catch(function(err){
                    warn('  → play() REJECTED on track' + (tier+1) + ': ' + err.name + ' — ' + err.message
                        + '. Autoplay policy 위반? user gesture 안에서 호출됐는지 확인.');
                });
            }
        } catch(e) {
            warn('  → play() threw: ' + e.message);
        }
        /* 중요: started=true 를 fadeAudio 시작 전에 set.
           warmup 이 microtask 큐에 떠있던 .then() 콜백 fire 시
           started 가 true 임을 보고 pause 안 함. */
        currentTier = tier;
        started = true;
        fadeAudio(newAudio, MAX_VOL, FADE_MS);
    }

    function start(){
        log('start() called');
        if(!enabled){ log('  → enabled=false, skip'); return; }
        /* 자동 진단 — start() 시점의 audio element 들 상태 dump.
           각 트랙의 src/readyState/networkState/error 한 번에 보임.
           BGM 안 들릴 때 이 출력만 봐도 어디서 막히는지 즉시 식별. */
        try {
            audios.forEach(function(a, i){
                log('  [pre-start] track' + (i+1) +
                    ' src=' + a.src.split('/').slice(-1)[0] +
                    ' readyState=' + a.readyState +
                    ' networkState=' + a.networkState +
                    ' error=' + (a.error ? a.error.code : 'null') +
                    ' failed=' + (a.dataset.failed || 'no'));
            });
        } catch(_){}
        currentTier = 0; started = false;
        playTier(0);
    }
    function update(board){
        if(!started || !enabled) return;
        const top = computeTopRow(board);
        const target = tierFor(top, currentTier);
        if(target !== currentTier) playTier(target);
    }
    function stop(){
        audios.forEach((a, i) => {
            if(fadeTimers[i]){ clearInterval(fadeTimers[i]); fadeTimers[i] = null; }
            try { a.pause(); a.currentTime = 0; a.volume = 0; } catch(_){}
        });
        started = false; currentTier = 0;
    }
    function pauseBgm(){
        audios.forEach((a, i) => {
            if(fadeTimers[i]){ clearInterval(fadeTimers[i]); fadeTimers[i] = null; }
            try { a.pause(); } catch(_){}
        });
    }
    function resumeBgm(){
        if(!enabled || !started) return;
        const a = audios[currentTier];
        if(a && !a.dataset.failed){
            try { const p = a.play(); if(p && p.catch) p.catch(function(){}); } catch(_){}
        }
    }
    function setEnabled(e){ enabled = !!e; if(!enabled) stop(); }

    return { start, stop, update, pause: pauseBgm, resume: resumeBgm, setEnabled,
             /* 디버깅용 — 콘솔에서 TetrisBGM._state() 로 호출. mp3 로드
                상태 / 재생 상태 / 모든 audio element 현재 값 보여줌. */
             _state: function(){
                 return {
                     currentTier: currentTier,
                     started: started,
                     enabled: enabled,
                     warmed: warmed,
                     audios: audios.map(function(a, i){
                         return {
                             track: i + 1,
                             src: a.src,
                             paused: a.paused,
                             volume: Math.round(a.volume * 100) / 100,
                             currentTime: Math.round(a.currentTime * 10) / 10,
                             duration: Math.round(a.duration * 10) / 10 || 'NaN',
                             readyState: a.readyState,   /* 0~4: HAVE_NOTHING~HAVE_ENOUGH_DATA */
                             networkState: a.networkState, /* 0~3: EMPTY/IDLE/LOADING/NO_SOURCE */
                             error: a.error ? {code: a.error.code, message: a.error.message} : null,
                             failed: a.dataset.failed === '1'
                         };
                     })
                 };
             } };
})();


/* ================================================================
   TETRIS PIECES & SRS ROTATION
   ================================================================
   Each piece has 4 rotation states (O has 1 but stored as 4 for
   uniform indexing). Coordinates are (col, row) offsets from the
   piece's pivot. Standard SRS layout used by modern Tetris.

   I-piece uses a 4x4 bounding box; others use 3x3. Encoded directly
   here rather than computed from base shape because the kick-test
   tables are tightly tied to these specific orientations.
   ================================================================ */
const PIECES = {
    /* I — cyan */
    I: {
        color: '#00D9FF',
        shapes: [
            [[0,1],[1,1],[2,1],[3,1]],  /* horizontal */
            [[2,0],[2,1],[2,2],[2,3]],  /* vertical right */
            [[0,2],[1,2],[2,2],[3,2]],  /* horizontal lower */
            [[1,0],[1,1],[1,2],[1,3]]   /* vertical left */
        ]
    },
    /* O — yellow (no rotation effect, but 4 entries for index parity) */
    O: {
        color: '#FFE66D',
        shapes: [
            [[1,0],[2,0],[1,1],[2,1]],
            [[1,0],[2,0],[1,1],[2,1]],
            [[1,0],[2,0],[1,1],[2,1]],
            [[1,0],[2,0],[1,1],[2,1]]
        ]
    },
    /* T — purple */
    T: {
        color: '#A855F7',
        shapes: [
            [[1,0],[0,1],[1,1],[2,1]],
            [[1,0],[1,1],[2,1],[1,2]],
            [[0,1],[1,1],[2,1],[1,2]],
            [[1,0],[0,1],[1,1],[1,2]]
        ]
    },
    /* S — green */
    S: {
        color: '#00E676',
        shapes: [
            [[1,0],[2,0],[0,1],[1,1]],
            [[1,0],[1,1],[2,1],[2,2]],
            [[1,1],[2,1],[0,2],[1,2]],
            [[0,0],[0,1],[1,1],[1,2]]
        ]
    },
    /* Z — red */
    Z: {
        color: '#FF3366',
        shapes: [
            [[0,0],[1,0],[1,1],[2,1]],
            [[2,0],[1,1],[2,1],[1,2]],
            [[0,1],[1,1],[1,2],[2,2]],
            [[1,0],[0,1],[1,1],[0,2]]
        ]
    },
    /* J — blue */
    J: {
        color: '#3B82F6',
        shapes: [
            [[0,0],[0,1],[1,1],[2,1]],
            [[1,0],[2,0],[1,1],[1,2]],
            [[0,1],[1,1],[2,1],[2,2]],
            [[1,0],[1,1],[0,2],[1,2]]
        ]
    },
    /* L — orange */
    L: {
        color: '#FF9A3C',
        shapes: [
            [[2,0],[0,1],[1,1],[2,1]],
            [[1,0],[1,1],[1,2],[2,2]],
            [[0,1],[1,1],[2,1],[0,2]],
            [[0,0],[1,0],[1,1],[1,2]]
        ]
    }
};
const PIECE_TYPES = ['I','O','T','S','Z','J','L'];

/* SRS wall-kick offsets (JLSTZ table). Tested in order; first one that
   fits wins. I-piece has its own table (slightly wider). O doesn't kick
   (rotation is no-op). Index: from-rotation → to-rotation. */
const KICKS_JLSTZ = {
    '0->1': [[0,0],[-1,0],[-1,-1],[0,2],[-1,2]],
    '1->0': [[0,0],[ 1,0],[ 1, 1],[0,-2],[ 1,-2]],
    '1->2': [[0,0],[ 1,0],[ 1, 1],[0,-2],[ 1,-2]],
    '2->1': [[0,0],[-1,0],[-1,-1],[0, 2],[-1, 2]],
    '2->3': [[0,0],[ 1,0],[ 1,-1],[0, 2],[ 1, 2]],
    '3->2': [[0,0],[-1,0],[-1, 1],[0,-2],[-1,-2]],
    '3->0': [[0,0],[-1,0],[-1, 1],[0,-2],[-1,-2]],
    '0->3': [[0,0],[ 1,0],[ 1,-1],[0, 2],[ 1, 2]]
};
const KICKS_I = {
    '0->1': [[0,0],[-2,0],[ 1,0],[-2, 1],[ 1,-2]],
    '1->0': [[0,0],[ 2,0],[-1,0],[ 2,-1],[-1, 2]],
    '1->2': [[0,0],[-1,0],[ 2,0],[-1,-2],[ 2, 1]],
    '2->1': [[0,0],[ 1,0],[-2,0],[ 1, 2],[-2,-1]],
    '2->3': [[0,0],[ 2,0],[-1,0],[ 2,-1],[-1, 2]],
    '3->2': [[0,0],[-2,0],[ 1,0],[-2, 1],[ 1,-2]],
    '3->0': [[0,0],[ 1,0],[-2,0],[ 1, 2],[-2,-1]],
    '0->3': [[0,0],[-1,0],[ 2,0],[-1,-2],[ 2, 1]]
};

/* ================================================================
   BOARD + STATE
   ================================================================ */
const COLS = 10, ROWS = 20;
const canvas = $('tetris-canvas');
const ctx = canvas.getContext('2d');
/* NEXT queue — 5개 vertical preview canvases (.nq-canvas[data-idx="0..4"]) */
const nqCanvases = Array.from(document.querySelectorAll('.nq-canvas'));

let board = null;     /* 20x10 array of color strings or null */
let bag = [];         /* 7-bag random generator */
let current = null;   /* {type, rot, x, y} */
/* NEXT queue — 항상 길이 ≥ 5 유지. queue[0] 가 다음에 spawn 될
   piece, queue[4] 가 5번째 후 piece. spawnPiece() 가 shift() 로
   front 꺼내고 ensureNextQueue() 가 bag 에서 다시 채움. */
let nextQueue = [];
/* HOLD slot — 표준 modern Tetris 메커니즘:
     · holdPiece = null | piece type — slot 에 보관 중인 piece
     · canHold = 매 spawn 마다 true 로 reset → 한 piece 당 1회만 hold
       가능 (hold-spam 방지)
     · 처음 hold: current 를 slot 에 넣고 새 piece spawn
     · 이후 hold: current 와 holdPiece 교체 spawn */
let holdPiece = null;
let canHold = true;
let level = 1, lines = 0, score = 0;

/* ---- 레벨/속도 시스템 (Hangame 패턴 aggressive ramp) ----
   1차: Guideline 표준 (10줄/레벨 + 표준 곡선) → 너무 느슨해서 캐주얼
   유저도 지루함. 솔로 랭킹 경쟁이 메인이라 빠른 도파민 루프 + 명확한
   난이도 ceiling 필요.

   2차 (현재): 한게임 테트리스 패턴 (HardDrop wiki: "much shorter
   required points to increase a level"):
     ▸ 레벨업 5줄당 1레벨 (Guideline 의 절반)
     ▸ Gravity 곡선 offset +1 → L1 부터 이미 Guideline 의 L2 속도
     ▸ Lock delay 감소 시점 L13+ (기존 L16 → 8개 레벨 차별화 확장)
     ▸ 캡 20, 점수 multiplier 그대로 ([0,40,100,300,1200] × level)

   결과:
     L1=793ms (NES 800ms 거의 동일) · L5=262 · L10=43 · L13=11
     L13~20 은 lock delay 만 차별화: 470 → 260ms
     L20 도달 = 100줄 (기존 200줄의 절반, 도파민 2배)
*/
function gravityMsForLevel(L){
    /* Tetris Guideline 공식 + offset +1:
         time = (0.8 - L × 0.007)^L sec      (원본은 (L-1) 였음)
       L1=793ms · L5=262 · L10=43 · L13=11 · L15+=5(floor).
       L13 부터 1프레임 미만 → multi-drop 처리, 이후 lock delay 가
       난이도 axis. floor=5ms (3 rows/frame). */
    if(L >= 16) return 5;
    return Math.max(5, Math.pow(0.8 - L * 0.007, L) * 1000);
}
function lockDelayForLevel(L){
    /* L1~12: 500ms (피스 바닥 닿은 후 회전·이동 가능 시간).
       L13+ 부터 gravity 가 이미 1G 영역이라 lock delay 단축이 새 압박:
         L13:470 · L14:440 · L15:410 · L16:380 · L17:350
         L18:320 · L19:290 · L20:260
       260ms 가 lower bound — 그 이하는 인간 반응속도 부족. */
    if(L <= 12) return 500;
    return Math.max(260, 500 - (L - 12) * 30);
}
const MAX_LEVEL = 20;
const LINES_PER_LEVEL = 5;     /* 한게임 패턴 — Guideline 의 절반 */

let dropMs = gravityMsForLevel(1);      /* gravity per step */
let lastDrop = 0;
let lockTimer = 0, lockDelay = lockDelayForLevel(1);
let landed = false;
let running = false, paused = false, gameOverFlag = false;
let startedAt = 0;
let softDropping = false;
/* T-spin / all-spin 인식용 — 마지막 성공 동작이 rotate 였는지 추적.
   rotate() 성공 시 true, moveX/dropOne/hardDrop/spawn 시 false.
   lock() 시 true 면 spin 후보 (T-spin 3-corner 또는 immobile 검증). */
let lastMoveRotated = false;

/* B2B (Back-to-Back) chain — modern Tetris guideline 표준.
   연속 "difficult clear" (TETRIS 또는 T-spin with lines) 시 1.5x 보너스.
   -1: chain 없음 (다음 difficult 클리어가 첫 번째)
    0: 첫 difficult clear 직후 (다음부터 B2B)
    N: N+1 회 연속 difficult clear (N>0 일 때 보너스 적용) */
let b2bChain = -1;

/* 콤보 카운트 — 연속 라인 클리어 시 누적.
   -1: 콤보 없음
    0: 첫 클리어
    N: N+1 회 연속 클리어 (N>0 일 때 보너스 50 × combo × level) */
let comboCount = -1;

/* Lock delay reset 제한 — 무한 stall 방지 (Tetris guideline 표준 15회).
   moveX/rotate 성공 시 reset 카운트 +1. 15 도달 후엔 reset 무시 → 즉시 lock.
   spawnPiece 시 0 으로 reset. */
let lockResetCount = 0;
const MAX_LOCK_RESETS = 15;

/* ---- Game mode ----
   marathon: 끝없는 도전. 레벨업, gravity 가속. 점수+라인+레벨 기록.
   sprint:   40줄 클리어 시간 도전. 레벨 고정 (sprint level), gravity 일정.
             40 라인 도달 시 즉시 종료. 시간 (낮을수록 좋음) 이 score.
   localStorage 에 personal best 저장. 온라인 ranking 은 marathon 만. */
let gameMode = 'marathon';
const SPRINT_TARGET = 40;
const SPRINT_LEVEL = 1;   /* sprint 는 레벨 고정 — 누구나 같은 gravity 로 비교 */

/* IRS/IHS 입력 상태 — 회전/홀드 키가 spawn 시점에 눌려 있는지 추적.
   - cw/ccw/hold: 현재 키 down 상태
   - cwConsumed/ccwConsumed/holdConsumed: 이번 press 가 IRS/IHS 발동
     했는지. 한 keypress 당 1회만 (keyup 시 reset). 키를 계속 누르고
     있어도 매 spawn 마다 자동 회전 안 됨 (의도 명확). */
const inputState = {
    cw: false, ccw: false, hold: false,
    cwConsumed: false, ccwConsumed: false, holdConsumed: false
};

/* ---- Pause UI sync ---- */
function syncPauseUI(){
    const gc=$('gameCtrl'), btn=$('pauseBtn');
    if(!gc||!btn) return;
    if(running && !gameOverFlag){
        gc.classList.add('on');
        /* 캔버스 우상단 코너 칩이라 라벨 없이 아이콘만. */
        btn.textContent = paused ? '▶' : '⏸';
        btn.setAttribute('aria-label', paused ? '재개' : '일시정지');
    } else {
        gc.classList.remove('on');
    }
}

/* ---- Canvas DPI fit ----
   메인 캔버스 + 미리보기 캔버스 모두 부모 박스 의 실제 표시 크기에
   맞춰 픽셀 버퍼 크기를 잡고 transform 으로 logical 좌표계로 변환.
   logical units:
     - 메인: 1셀 = 20×20 (10×20 board → 200×400 logical)
     - 미리보기: 80×80 logical (CSS 표시 크기와 무관)
   resize, fullscreen, orientation 변화 모두 호출됨. */
function fitCanvas(){
    const dpr=Math.min(2, window.devicePixelRatio||1);
    const rect=canvas.getBoundingClientRect();
    if(rect.width === 0 || rect.height === 0) return;   /* 아직 mount 전 */
    canvas.width=Math.round(rect.width*dpr);
    canvas.height=Math.round(rect.height*dpr);
    ctx.setTransform(dpr*rect.width/(COLS*20), 0, 0, dpr*rect.height/(ROWS*20), 0, 0);
    /* NEXT queue 의 5개 mini-canvas 도 DPR 맞춤. logical 좌표는 attribute
       width/height (96 또는 80) 그대로 유지. */
    const sideCanvases = nqCanvases.concat([$('holdCanvas')].filter(Boolean));
    sideCanvases.forEach(c => {
        const r = c.getBoundingClientRect();
        if(r.width === 0 || r.height === 0) return;
        const logical = (c.getAttribute('width') | 0) || 80;   /* 96 or 80 */
        c.width = Math.round(r.width * dpr);
        c.height = Math.round(r.height * dpr);
        const cctx = c.getContext('2d');
        cctx.setTransform(dpr * r.width / logical, 0, 0, dpr * r.height / logical, 0, 0);
    });
    /* DPR 맞춘 후 다시 그려야 깨끗한 미리보기 */
    drawNextQueuePreview();
    drawHoldPreview();
}
window.addEventListener('resize', fitCanvas);
window.addEventListener('orientationchange', () => setTimeout(fitCanvas, 100));
/* fullscreen 진입/탈출 시 viewport 가 바뀌므로 재계산 */
document.addEventListener('fullscreenchange', () => setTimeout(fitCanvas, 50));
/* ResizeObserver: canvas-wrap 의 size 가 flex 레이아웃에 의해 변할
   때마다 자동 재 fit. 초기 mount 직후 layout 이 settle 되면 첫 호출
   발생 → 0×0 fallback 안 하고 정확한 픽셀 버퍼 잡음. 모든 모던
   브라우저 (Chrome 64+, Safari 13.1+, Firefox 69+) 지원. */
if (typeof ResizeObserver !== 'undefined') {
    const ro = new ResizeObserver(() => fitCanvas());
    ro.observe(canvas);
}

/* ---- 7-bag random ----
   Standard modern Tetris piece distribution. Each "bag" contains all
   7 piece types in random order; we draw from it until empty, then
   reshuffle. Guarantees no piece appears 4+ times in a row, no piece
   misses for >12 spawns. */
function refillBag(){
    bag = PIECE_TYPES.slice();
    for(let i=bag.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [bag[i],bag[j]]=[bag[j],bag[i]];
    }
}
function drawFromBag(){
    if(bag.length===0) refillBag();
    return bag.pop();
}
/* Queue 가 5개 미만이면 bag 에서 채워줌. spawnPiece 직전·후 모두 호출. */
function ensureNextQueue(){
    while(nextQueue.length < 5){
        nextQueue.push(drawFromBag());
    }
}
/* 다음 piece 꺼냄 (queue front shift). queue 길이 빠진 만큼 bag 으로 보충. */
function drawNextType(){
    ensureNextQueue();
    const t = nextQueue.shift();
    ensureNextQueue();
    return t;
}

/* ---- Collision check ----
   `tryPos` returns true if `type` at rotation `rot` placed at (x,y)
   doesn't overlap the board or go out of bounds. Used for movement,
   rotation kicks, and lock detection. */
function tryPos(type, rot, x, y){
    const shape = PIECES[type].shapes[rot];
    for(const [dx, dy] of shape){
        const cx = x + dx, cy = y + dy;
        if(cx < 0 || cx >= COLS) return false;
        if(cy >= ROWS) return false;
        if(cy >= 0 && board[cy][cx] != null) return false;
    }
    return true;
}

/* spawnFromType — 명시적으로 type 받아서 spawn (hold swap 시 사용).
   nextQueue 에 손대지 않음. 충돌 시 game over 체크. */
function spawnFromType(type){
    current = { type, rot: 0, x: 3, y: type==='I' ? -1 : -1 };
    landed = false;
    lockTimer = 0;
    if(!tryPos(current.type, current.rot, current.x, current.y)){
        gameOver();
        return false;
    }
    return true;
}

function spawnPiece(){
    /* Queue 의 front 에서 다음 piece 꺼내기. drawNextType 가 자동으로
       bag 보충해서 항상 5개 lookahead 유지. */
    const type = drawNextType();
    if(!spawnFromType(type)) return false;
    /* 매 spawn 마다 hold 가능 상태 reset — piece 당 1회만 hold */
    canHold = true;
    lastMoveRotated = false;   /* 새 piece — spin 후보 reset */
    lockResetCount = 0;        /* 새 piece — lock reset 카운트 reset */

    /* ---- IHS (Initial Hold System) ----
       Hold 키가 직전 piece lock 시점에도 눌려 있었으면, 새 piece spawn
       즉시 hold swap. 한 keypress 당 1회만 (consumed flag 로 중복 방지).
       IHS 가 IRS 보다 먼저 — 새 piece (hold 에서 나온) 가 이후 IRS 적용. */
    if(inputState.hold && !inputState.holdConsumed){
        inputState.holdConsumed = true;
        holdCurrentPiece();
        /* holdCurrentPiece 가 spawnFromType 호출 → current 가 새 piece 로
           바뀜. 아래 IRS 는 새 piece 에 적용. */
    }

    /* ---- IRS (Initial Rotation System) ----
       회전 키 (CW 또는 CCW) 가 spawn 시점에 눌려 있으면 즉시 rotate.
       두 키 동시에 눌려 있으면 CW 우선 (modern Tetris 관례).
       IRS 도 한 keypress 당 1회 — consumed flag. */
    if(inputState.cw && !inputState.cwConsumed){
        inputState.cwConsumed = true;
        rotate(1);
    } else if(inputState.ccw && !inputState.ccwConsumed){
        inputState.ccwConsumed = true;
        rotate(-1);
    }

    syncHoldUI();
    drawNextQueuePreview();
    return true;
}

/* ---- HOLD 메커니즘 ----
   Piece 를 slot 에 보관 후 다른 piece (또는 새 piece) 와 교체.
   canHold 가 false 면 (이번 piece 이미 hold 사용했으면) 무시. */
function holdCurrentPiece(){
    if(!current || !canHold || paused || gameOverFlag || !running) return;
    Sfx.rotate();   /* hold = 회전과 비슷한 trigger SFX */
    const incoming = current.type;
    if(holdPiece === null){
        /* 처음 hold — 현재 piece 를 slot 에 넣고 NEXT 에서 새 piece spawn */
        holdPiece = incoming;
        const t = drawNextType();
        if(!spawnFromType(t)) return;
        drawNextQueuePreview();
    } else {
        /* 교체 — 현재 piece 를 slot 에 넣고 slot 의 기존 piece 를 spawn */
        const swap = holdPiece;
        holdPiece = incoming;
        if(!spawnFromType(swap)) return;
    }
    canHold = false;   /* 이번 piece 락 — 다음 spawn 까지 hold 불가 */
    syncHoldUI();
    drawHoldPreview();
}

/* HOLD slot UI 상태 동기화 — empty/locked 클래스 토글 + HOLD 버튼
   회색 처리. canHold=false (이번 piece 이미 swap 사용) 면 .locked. */
function syncHoldUI(){
    const slot = $('holdSlot');
    if(slot){
        slot.classList.toggle('empty', holdPiece === null);
        slot.classList.toggle('locked', holdPiece !== null && !canHold);
    }
    const lockedClass = !canHold;
    document.querySelectorAll('.cbtn.hold').forEach(b => {
        b.classList.toggle('locked', lockedClass);
    });
}
function drawHoldPreview(){
    const c = $('holdCanvas');
    if(!c) return;
    const cctx = c.getContext('2d');
    const L = (c.getAttribute('width') | 0) || 96;
    cctx.fillStyle = '#020516';
    cctx.fillRect(0, 0, L, L);
    if(!holdPiece) return;
    const shape = PIECES[holdPiece].shapes[0];
    const color = PIECES[holdPiece].color;
    let minX=99, maxX=-99, minY=99, maxY=-99;
    for(const [dx, dy] of shape){
        if(dx < minX) minX = dx; if(dx > maxX) maxX = dx;
        if(dy < minY) minY = dy; if(dy > maxY) maxY = dy;
    }
    const w = maxX - minX + 1, h = maxY - minY + 1;
    const cellSize = Math.min(L / Math.max(w, 4), L / Math.max(h, 4)) * 0.85;
    const offsetX = (L - w * cellSize) / 2 - minX * cellSize;
    const offsetY = (L - h * cellSize) / 2 - minY * cellSize;
    /* canHold=false 면 회색 톤 — hold 사용 후 회수 못함 */
    const useGray = !canHold;
    for(const [dx, dy] of shape){
        const px = offsetX + dx * cellSize;
        const py = offsetY + dy * cellSize;
        cctx.fillStyle = useGray ? '#6b6b88' : color;
        cctx.fillRect(px + 1, py + 1, cellSize - 2, cellSize - 2);
        cctx.fillStyle = 'rgba(255,255,255,0.18)';
        cctx.fillRect(px + 2, py + 2, cellSize - 4, 2);
        cctx.fillRect(px + 2, py + 2, 2, cellSize - 4);
    }
}

/* ---- Movement ---- */
/* 공중 lock 버그 방지 helper.
   현재 피스가 한 칸 아래로 갈 수 있는지 = 아직 공중에 떠있는지.
   moveX / rotate 후 이 함수로 재검증해서 절벽 끝으로 옮겨진 피스가
   공중에 lock 되는 일 없도록 함. */
function canMoveDown(){
    return current && tryPos(current.type, current.rot, current.x, current.y + 1);
}
function moveX(dx){
    if(!current || paused || gameOverFlag) return false;
    if(tryPos(current.type, current.rot, current.x + dx, current.y)){
        current.x += dx;
        Sfx.move();
        lastMoveRotated = false;   /* 이동 → spin 후보 X */
        if(landed){
            if(canMoveDown()){
                landed = false;
                lockTimer = 0;
            } else if(lockResetCount < MAX_LOCK_RESETS){
                /* lock delay reset — 단, 15회 한도 (무한 stall 방지) */
                lockTimer = 0;
                lockResetCount++;
            }
            /* 15회 도달 후엔 reset 무시 → lockTimer 그대로, 곧 lock. */
        }
        return true;
    }
    return false;
}
function rotate(dir){  /* dir = +1 (CW) or -1 (CCW) */
    if(!current || paused || gameOverFlag) return false;
    if(current.type === 'O'){ Sfx.rotate(); return true; }
    const fromRot = current.rot;
    const toRot = (fromRot + dir + 4) % 4;
    const kickKey = fromRot + '->' + toRot;
    const kickTable = current.type === 'I' ? KICKS_I : KICKS_JLSTZ;
    const kicks = kickTable[kickKey] || [[0,0]];
    for(const [kx, ky] of kicks){
        if(tryPos(current.type, toRot, current.x + kx, current.y - ky)){
            current.rot = toRot;
            current.x += kx;
            current.y -= ky;
            Sfx.rotate();
            lastMoveRotated = true;   /* spin 후보 — lock 시 검증 */
            if(landed){
                if(canMoveDown()){
                    landed = false;
                    lockTimer = 0;
                } else if(lockResetCount < MAX_LOCK_RESETS){
                    lockTimer = 0;
                    lockResetCount++;
                }
            }
            return true;
        }
    }
    return false;
}

/* Drop one cell. Returns true if moved, false if landed on stack. */
function dropOne(){
    if(!current || paused || gameOverFlag) return false;
    if(tryPos(current.type, current.rot, current.x, current.y + 1)){
        current.y += 1;
        lastMoveRotated = false;   /* gravity 떨어짐 → spin 후보 X */
        return true;
    }
    if(!landed){
        landed = true;
        lockTimer = 0;
    }
    return false;
}
function softDrop(){
    if(dropOne()){
        score += 1;   /* +1 per cell soft-dropped */
        Sfx.soft();
        /* Sprint 모드: scoreNow 는 시간 표시이므로 갱신 안 함 */
        if(gameMode !== 'sprint'){
            $('scoreNow').textContent = score.toLocaleString();
        }
    }
}
function hardDrop(){
    if(!current || paused || gameOverFlag) return;
    /* Trail snapshot — drop 시작 위치/타입 저장. lock() 후에는 current
       이 새 piece 로 바뀌므로 미리 캡처. */
    const startY = current.y;
    const trailType = current.type;
    const trailRot = current.rot;
    const trailX = current.x;
    let cells = 0;
    while(tryPos(current.type, current.rot, current.x, current.y + 1)){
        current.y += 1;
        cells++;
    }
    if(cells > 0) lastMoveRotated = false;   /* drop 했으면 spin 후보 X */
    if(cells > 0){
        /* 잔상 streak — startY 부터 endY 까지 piece 가 통과한 자리에
           반투명 복제본 그림. 가까이 (head) = 진하고, 멀리 (tail) = 흐림.
           220ms 동안 점점 페이드 → "쌩 하고 떨어진" 잔상 효과. */
        dropTrail = {
            type: trailType,
            rot: trailRot,
            x: trailX,
            startY: startY,
            endY: current.y,
            color: PIECES[trailType].color,
            start: performance.now(),
            duration: 220
        };
        requestAnimationFrame(animateDropTrailTick);
        /* 임팩트 shake — 수직 bounce 로 "쾅" 박힌 느낌 */
        const wrap = $('canvasWrap');
        if(wrap){
            wrap.classList.remove('shaking-1','shaking-tetris','tetris-glow','shaking-impact');
            void wrap.offsetWidth;
            wrap.classList.add('shaking-impact');
            setTimeout(() => wrap.classList.remove('shaking-impact'), 240);
        }
    }
    score += cells * 2;   /* +2 per cell hard-dropped */
    if(gameMode !== 'sprint'){
        $('scoreNow').textContent = score.toLocaleString();
    }
    Sfx.hard();
    lock();
}

/* ---- Spin detection (Tetris Guideline + all-spin) ----
   참고: hse30.tistory.com 글의 S/Z spin 활용 패턴 + modern Tetris
   guideline 의 T-spin scoring.

   T-spin (3-corner rule):
     1. piece.type === 'T'
     2. lastMoveRotated === true (직전 동작이 회전)
     3. T 의 center cell 주변 4 corner 중 3개 이상 막힘 (벽/board cell)
     4. front-corner 2개 모두 막혔으면 "Full T-spin", 아니면 "Mini"

   All-spin (S/Z/L/J/I — 비-T pieces):
     · lastMoveRotated && immobile (4방향 모두 이동 불가)
     · S-spin, Z-spin 등 명칭. 점수 보너스 50%.
*/
function detectSpin(){
    if(!current || !lastMoveRotated) return null;
    const type = current.type;

    if(type === 'T'){
        /* T 의 center cell — 모든 rot 에서 (current.x+1, current.y+1) */
        const cx = current.x + 1, cy = current.y + 1;
        const corners = [
            [cx-1, cy-1], [cx+1, cy-1],   /* 0: top-left, 1: top-right */
            [cx-1, cy+1], [cx+1, cy+1]    /* 2: bot-left, 3: bot-right */
        ];
        function isFilled([x, y]){
            if(x < 0 || x >= COLS || y >= ROWS) return true;   /* 벽 = filled */
            if(y < 0) return false;                            /* 위쪽은 비었음 */
            return board[y][x] != null;
        }
        const filledCount = corners.filter(isFilled).length;
        if(filledCount < 3) return null;

        /* Front corners — rot 따라 다름 */
        let frontPair;
        switch(current.rot){
            case 0: frontPair = [corners[0], corners[1]]; break;  /* UP */
            case 1: frontPair = [corners[1], corners[3]]; break;  /* RIGHT */
            case 2: frontPair = [corners[2], corners[3]]; break;  /* DOWN */
            case 3: frontPair = [corners[0], corners[2]]; break;  /* LEFT */
        }
        const frontFilled = frontPair.filter(isFilled).length;
        return { type: 'T', isMini: frontFilled < 2 };
    }

    if(type === 'O') return null;   /* O piece 회전 없음 */

    /* All-spin: 4방향 모두 이동 불가 (immobile) */
    const cx0 = current.x, cy0 = current.y, rot0 = current.rot;
    if(!tryPos(type, rot0, cx0 - 1, cy0) &&
       !tryPos(type, rot0, cx0 + 1, cy0) &&
       !tryPos(type, rot0, cx0, cy0 + 1) &&
       !tryPos(type, rot0, cx0, cy0 - 1)){
        return { type: type, isMini: false };
    }
    return null;
}

/* Spin announcement (floating text 위에 떠오르는 효과) */
let spinAnnouncement = null;

/* Score popups — line clear / spin / B2B / combo / perfect 시 floating 텍스트.
   각 popup: {text, color, y_offset, start, duration}. 1.1초 동안 위로 floats + fade.
   여러 개 동시에 가능 (라인 클리어 + B2B + COMBO 등 stack). */
const scorePopups = [];
function addScorePopup(text, color){
    /* y offset 으로 popup 들 stack — 최근 popup 일수록 높은 위치 (하단부터 쌓임) */
    const offsetIdx = scorePopups.length;
    scorePopups.push({
        text: text,
        color: color || '#FFE66D',
        offsetIdx: offsetIdx,
        start: performance.now(),
        duration: 1100
    });
    /* 너무 많으면 oldest 제거 (max 8) */
    if(scorePopups.length > 8) scorePopups.shift();
}

/* ---- Lock + clear lines + spawn next ---- */
function lock(){
    if(!current) return;
    /* Spin 검증 — board 수정 전에 (current piece 위치 그대로 평가) */
    const spinResult = detectSpin();
    const shape = PIECES[current.type].shapes[current.rot];
    const color = PIECES[current.type].color;
    let topRow = ROWS;
    for(const [dx, dy] of shape){
        const cy = current.y + dy, cx = current.x + dx;
        if(cy < 0){
            /* Piece locked above visible board → game over */
            gameOver();
            return;
        }
        board[cy][cx] = color;
        if(cy < topRow) topRow = cy;
    }
    invalidateBoardLayer();   /* board 변경 → layer rebuild 필요 */
    Sfx.lock();
    /* Detect & clear completed lines */
    const cleared = [];
    for(let y = 0; y < ROWS; y++){
        if(board[y].every(c => c != null)) cleared.push(y);
    }
    if(cleared.length > 0){
        /* 라인 클리어 시퀀스:
             1. 즉시 사운드 발사 (sweep + 멜로디 / TETRIS 면 boom + sweep)
             2. 캔버스 wrap 흔들기 (shake CSS 클래스)
             3. cleared 줄을 흰색으로 채워두고 render() 가 그 위에
                burst overlay (sparkle 파티클 + 가로 글로우) 그림
             4. duration 끝나면 collapse + 점수/레벨/스폰
           Tetris (4줄) 는 더 길게 (440ms) + 더 강한 효과.
        */
        const isTetris = cleared.length === 4;
        const dur = isTetris ? 320 : 240;   /* 살짝 짧게 — 클래식 NES Tetris 스타일 */
        /* fill('#fff') 제거 — 색깔 그대로 두고 위에 흰 overlay 만 깜빡.
           board 변경 안 하므로 layer rebuild 도 burst 동안 X. */

        /* SFX: 즉시 발사 — 시각 효과와 동기화 */
        if(isTetris) Sfx.tetris();
        else if(cleared.length === 3) Sfx.clear3();
        else if(cleared.length === 2) Sfx.clear2();
        else Sfx.clear1();

        /* 캔버스 흔들기 — 한게임/Tetris Effect 패턴, CSS 만으로 GPU 처리 */
        const wrap = $('canvasWrap');
        if(wrap){
            const shakeCls = isTetris ? 'shaking-tetris' : 'shaking-1';
            wrap.classList.remove('shaking-1','shaking-tetris','tetris-glow');
            void wrap.offsetWidth;
            wrap.classList.add(shakeCls);
            if(isTetris) wrap.classList.add('tetris-glow');
            setTimeout(()=>wrap.classList.remove(shakeCls,'tetris-glow'), dur + 80);
        }

        /* 클래식 line clear — 단순 white flash overlay 만. NES Tetris,
           Tetris Effect 등 mainstream 모두 같은 패턴. 부담 0. */
        clearAnim = {
            cleared: cleared.slice(),
            start: performance.now(),
            duration: dur,
            isTetris: isTetris
        };
        requestAnimationFrame(animateClearTick);

        setTimeout(() => {
            for(const y of cleared) board.splice(y, 1);
            for(let i = 0; i < cleared.length; i++) board.unshift(Array(COLS).fill(null));
            invalidateBoardLayer();   /* collapse → layer rebuild */
            /* T-spin / all-spin 보너스 점수 (Tetris Guideline 표준):
                 · T-spin Mini:        100 (no line) / 200 (1) / 400 (2)
                 · T-spin Full:        400 (no) / 800 (1) / 1200 (2) / 1600 (3)
                 · All-spin (S/Z/L/J/I): 일반 점수 × 1.5
                 · 일반 line clear:     [0, 40, 100, 300, 1200][lines]
                 · B2B (Back-to-Back): difficult clear 연속 시 추가 × 1.5
                 · Combo:              연속 클리어 시 +50 × combo × level
            */
            let lineScore;
            if(spinResult && spinResult.type === 'T'){
                if(spinResult.isMini){
                    lineScore = [100, 200, 400, 0, 0][cleared.length] || 0;
                } else {
                    lineScore = [400, 800, 1200, 1600, 0][cleared.length] || 0;
                }
            } else if(spinResult && cleared.length > 0){
                lineScore = Math.floor(([0, 40, 100, 300, 1200][cleared.length] || 0) * 1.5);
            } else {
                lineScore = [0, 40, 100, 300, 1200][cleared.length] || 0;
            }

            /* B2B: difficult clear 연속 시 1.5x. difficult = TETRIS 또는 T-spin (with lines) */
            const isDifficult = cleared.length === 4 ||
                                (spinResult && spinResult.type === 'T' && cleared.length > 0);
            let b2bBonus = 0;
            if(isDifficult){
                b2bChain++;
                if(b2bChain > 0){
                    /* 연속 difficult — 50% 추가 보너스 */
                    b2bBonus = Math.floor(lineScore * 0.5);
                }
            } else {
                /* non-difficult line clear → B2B chain 끊김 */
                b2bChain = -1;
            }

            /* Combo: 연속 라인 클리어. 첫 클리어는 보너스 없음 (combo=0). */
            comboCount++;
            const comboBonus = comboCount > 0 ? 50 * comboCount : 0;

            /* Perfect Clear (All Clear) — 보드 전체가 비었으면 PC bonus.
               Tetris Guideline 표준 보너스:
                 · PC Single: 800   · PC Double: 1200
                 · PC Triple: 1800  · PC Tetris: 2000
               B2B PC Tetris (back-to-back PC tetris) 시 +1200 추가. */
            let isPerfectClear = true;
            for(let y = 0; y < ROWS && isPerfectClear; y++){
                for(let x = 0; x < COLS; x++){
                    if(board[y][x] !== null){ isPerfectClear = false; break; }
                }
            }
            let pcBonus = 0;
            if(isPerfectClear){
                pcBonus = [0, 800, 1200, 1800, 2000][cleared.length] || 0;
                /* B2B PC Tetris — TETRIS PC 가 연속이면 추가 +1200.
                   여기서 b2bChain 은 위에서 이미 ++ 됐으므로 >0 이면 연속. */
                if(cleared.length === 4 && b2bChain > 0) pcBonus += 1200;
            }

            const totalScore = (lineScore + b2bBonus) * level
                             + comboBonus * level
                             + pcBonus * level;
            score += totalScore;
            lines += cleared.length;

            /* Score popups — line score + bonuses 시각화. base score 먼저,
               B2B 가 있으면 그 다음, combo, PC 도 있으면 stack. */
            addScorePopup('+' + (lineScore * level).toLocaleString(), '#FFE66D');
            if(b2bBonus > 0){
                addScorePopup('B2B  +' + (b2bBonus * level).toLocaleString(), '#FF9A3C');
            }
            if(comboBonus > 0){
                addScorePopup('COMBO ' + comboCount + '  +' + (comboBonus * level).toLocaleString(),
                              '#00D9FF');
            }
            if(isPerfectClear){
                /* Perfect Clear announcement — spinAnnouncement 처럼 큰 floating
                   text 보드 가운데. 1.6초 동안 강렬한 골드 + 플래시. */
                addScorePopup('PERFECT CLEAR  +' + (pcBonus * level).toLocaleString(),
                              '#FF66E6');
                spinAnnouncement = {
                    text: 'PERFECT CLEAR!',
                    start: performance.now(),
                    duration: 1600,
                    color: '#FF66E6'
                };
                Sfx.tetris();   /* 화려한 효과음 재사용 */
            }
            /* Sprint: scoreNow 는 loop 가 시간으로 갱신 → 여기서 안 건드림.
               Marathon: 점수 표시. linesNow 는 모드별 다름. */
            if(gameMode !== 'sprint'){
                $('scoreNow').textContent = score.toLocaleString();
            }
            $('linesNow').textContent = (gameMode === 'sprint')
                ? Math.min(lines, SPRINT_TARGET) + '/' + SPRINT_TARGET
                : lines;
            /* Marathon 만 level-up. Sprint 는 SPRINT_LEVEL 고정. */
            if(gameMode !== 'sprint'){
                /* Level-up every LINES_PER_LEVEL (5) — 한게임 패턴.
                   캡 = MAX_LEVEL (20). gravity + lock delay 둘 다 갱신 —
                   L1~12 는 gravity 가, L13~20 은 lock delay 가 차별화. */
                const newLevel = 1 + Math.floor(lines / LINES_PER_LEVEL);
                if(newLevel > level){
                    level = Math.min(newLevel, MAX_LEVEL);
                    $('levelNow').textContent = level;
                    dropMs = gravityMsForLevel(level);
                    lockDelay = lockDelayForLevel(level);
                    Sfx.levelUp();
                }
            }
            /* Sprint 완료 — 40 라인 도달 시 즉시 종료 (성공). */
            if(gameMode === 'sprint' && lines >= SPRINT_TARGET){
                /* spawnPiece 전에 sprint complete — 게임 끝. */
                sprintComplete();
                return;
            }
            /* 라인 클리어 후 보드 settle 됨 → BGM tier 재평가
               (라인 빠진 만큼 topRow 아래로 내려가서 음악이 차분해질
               수 있음). */
            try { TetrisBGM.update(board); } catch(_){}
            spawnPiece();
            render();
        }, dur);
    } else {
        /* 라인 안 빠진 일반 lock — 콤보 끊김 (라인 클리어 없음).
           T-spin (no lines) 은 점수만 award, B2B chain 은 유지 (Guideline). */
        comboCount = -1;
        if(spinResult && spinResult.type === 'T'){
            const noLineScore = (spinResult.isMini ? 100 : 400) * level;
            score += noLineScore;
            if(gameMode !== 'sprint'){
                $('scoreNow').textContent = score.toLocaleString();
            }
        }
        try { TetrisBGM.update(board); } catch(_){}
        spawnPiece();
    }

    /* Spin announcement floating text (line clear 여부 무관) */
    if(spinResult){
        let text;
        const linesSuffix = ['', ' SINGLE', ' DOUBLE', ' TRIPLE'][cleared.length] || '';
        if(spinResult.type === 'T'){
            text = (spinResult.isMini ? 'T-SPIN MINI' : 'T-SPIN') + linesSuffix + '!';
        } else {
            text = spinResult.type + '-SPIN' + linesSuffix + '!';
        }
        spinAnnouncement = {
            text: text,
            start: performance.now(),
            duration: 1400,
            color: spinResult.type === 'T' ? '#FFD700' : '#7DF9FF'
        };
    }

    landed = false;
    lockTimer = 0;
}

/* ---- Render ---- */
const CELL = 20;   /* logical cell size; canvas transform handles scaling */

/* hex (#rrggbb) 색을 amt 만큼 밝게(amt>0) 또는 어둡게(amt<0) 변환.
   amt=0.5 → 50% 흰색 쪽으로 / amt=-0.5 → 50% 검은색 쪽으로. */
function tintColor(hex, amt){
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    let nr, ng, nb;
    if(amt > 0){
        nr = Math.round(r + (255 - r) * amt);
        ng = Math.round(g + (255 - g) * amt);
        nb = Math.round(b + (255 - b) * amt);
    } else {
        const k = 1 + amt;
        nr = Math.round(r * k);
        ng = Math.round(g * k);
        nb = Math.round(b * k);
    }
    return 'rgb(' + nr + ',' + ng + ',' + nb + ')';
}

/* Rounded rect path helper — manual path 으로 모든 브라우저 호환 */
function roundRectPath(cctx, x, y, w, h, r){
    if(r > w/2) r = w/2;
    if(r > h/2) r = h/2;
    cctx.beginPath();
    cctx.moveTo(x + r, y);
    cctx.lineTo(x + w - r, y);
    cctx.quadraticCurveTo(x + w, y, x + w, y + r);
    cctx.lineTo(x + w, y + h - r);
    cctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    cctx.lineTo(x + r, y + h);
    cctx.quadraticCurveTo(x, y + h, x, y + h - r);
    cctx.lineTo(x, y + r);
    cctx.quadraticCurveTo(x, y, x + r, y);
    cctx.closePath();
}

/* drawCell v6 — sprite cache + glass shatter ready architecture.

   v5 디자인 (concave bowl + lens highlight) 그대로 유지하되 성능
   대폭 개선: 매 프레임 200 셀에 4 paths + clip + ellipse + 2
   gradients = 무거움 → 셀 art 를 색깔별로 한 번만 렌더 후 cache,
   이후 매 프레임 drawImage 만 사용 (~10x 빨라짐).

   다른 게임사이트 표준 기법:
     · Tetris.com / Tetris Effect: sprite atlas + drawImage
     · Match-3 (Candy Crush): pre-rendered tiles + object pool
     · WebGL 엔진: deterministic logic + droppable visual layer

   Multi-player ready 설계:
     · 게임 로직 (lock, line clear) 은 effect 와 완전 독립
     · Effects = 순수 visual, 느린 frame 에선 drop 가능
     · 무거운 작업은 첫 호출시 한 번만 (lazy init)
     · GC 압박 최소화 (object pool 적용)

   sprite 해상도: SPRITE_SCALE 배율로 렌더 → DPR 3 까지 sharp. */
const SPRITE_SCALE = 3;
const cellSpriteCache = {};

/* drawCellArt — 실제 셀 디자인을 그림. drawCell 이 cache 채울 때
   한 번만 호출. v5 의 4-layer (dark frame + light ring + concave bowl
   + lens highlight) 를 (x, y) offset 위치에 그림. */
function drawCellArt(cctx, x, y, color){
    const outerR = 3, middleR = 2.5, innerR = 2;
    const innerSz = CELL - 4;

    /* (1) Outer dark frame */
    cctx.fillStyle = tintColor(color, -0.6);
    roundRectPath(cctx, x, y, CELL, CELL, outerR);
    cctx.fill();

    /* (2) Light inner ring */
    cctx.fillStyle = tintColor(color, 0.3);
    roundRectPath(cctx, x + 1, y + 1, CELL - 2, CELL - 2, middleR);
    cctx.fill();

    /* (3) Concave bowl inner */
    const innerCx = x + CELL/2;
    const innerCy = y + CELL * 0.55;
    const innerGrad = cctx.createRadialGradient(
        innerCx, innerCy, 0,
        innerCx, innerCy, innerSz * 0.7
    );
    innerGrad.addColorStop(0,   tintColor(color, 0.1));
    innerGrad.addColorStop(0.7, color);
    innerGrad.addColorStop(1,   tintColor(color, -0.35));
    cctx.fillStyle = innerGrad;
    roundRectPath(cctx, x + 2, y + 2, innerSz, innerSz, innerR);
    cctx.fill();

    /* (4) Lens highlight (clipped ellipse) */
    cctx.save();
    roundRectPath(cctx, x + 2, y + 2, innerSz, innerSz, innerR);
    cctx.clip();
    const hlCx = x + CELL/2;
    const hlCy = y + CELL * 0.32;
    const hlW = innerSz * 0.78;
    const hlH = innerSz * 0.32;
    cctx.beginPath();
    cctx.ellipse(hlCx, hlCy, hlW/2, hlH/2, 0, 0, Math.PI * 2);
    const hlGrad = cctx.createLinearGradient(
        hlCx, hlCy - hlH/2,
        hlCx, hlCy + hlH/2
    );
    hlGrad.addColorStop(0,   'rgba(255,255,255,0.65)');
    hlGrad.addColorStop(0.6, 'rgba(255,255,255,0.42)');
    hlGrad.addColorStop(1,   'rgba(255,255,255,0.08)');
    cctx.fillStyle = hlGrad;
    cctx.fill();
    cctx.restore();
}

/* Sprite 만들고 cache. 색깔별 한 번만. */
function makeCellSprite(color){
    const c = document.createElement('canvas');
    c.width = CELL * SPRITE_SCALE;
    c.height = CELL * SPRITE_SCALE;
    const cc = c.getContext('2d');
    cc.scale(SPRITE_SCALE, SPRITE_SCALE);
    drawCellArt(cc, 0, 0, color);
    return c;
}
function getCellSprite(color){
    let s = cellSpriteCache[color];
    if(!s){
        s = makeCellSprite(color);
        cellSpriteCache[color] = s;
    }
    return s;
}

/* drawCell — 빠른 drawImage 만 사용. 매 프레임 호출되는 hot path. */
function drawCell(cctx, cx, cy, color, alpha){
    cctx.globalAlpha = alpha != null ? alpha : 1;
    cctx.drawImage(getCellSprite(color), cx * CELL, cy * CELL, CELL, CELL);
    cctx.globalAlpha = 1;
}
/* 클래식 line clear flash 만 사용 — sprite/particle 다 제거됨.
   NES Tetris, Tetris Effect 등 mainstream Tetris 모두 동일 패턴. */

/* ---- Hard drop 잔상 (motion blur trail) ----
   {type, rot, x, startY, endY, color, start, duration} 형태.
   설정되면 render() 가 piece 가 통과한 자리에 반투명 복제본 그림 →
   "쌩 하고 떨어진" 잔상 효과. duration 끝나면 null 리셋. */
let dropTrail = null;

function animateDropTrailTick(){
    if(!dropTrail) return;
    const elapsed = performance.now() - dropTrail.start;
    if(elapsed >= dropTrail.duration){
        dropTrail = null;
        render();
        return;
    }
    render();
    requestAnimationFrame(animateDropTrailTick);
}

function drawDropTrail(){
    if(!dropTrail) return;
    const elapsed = performance.now() - dropTrail.start;
    const t = Math.min(1, elapsed / dropTrail.duration);
    const fade = 1 - t;   /* 1 → 0 over duration */
    const shape = PIECES[dropTrail.type].shapes[dropTrail.rot];
    const distance = dropTrail.endY - dropTrail.startY;

    ctx.save();
    /* additive blend 로 piece 가 통과한 영역이 빛처럼 합성됨 */
    ctx.globalCompositeOperation = 'lighter';

    /* startY ~ endY-1 까지 각 행에 trail 복제본 (endY 는 lock 된 piece 자리) */
    const falloffLen = Math.min(distance, 6);
    for(let dy = 0; dy < distance; dy++){
        const trailY = dropTrail.startY + dy;
        const distFromHead = distance - dy;     /* 1 = 가장 가까움(밝음), 멀수록 흐림 */
        const trailFalloff = Math.max(0, 1 - distFromHead / falloffLen);
        const alpha = fade * trailFalloff * 0.55;
        if(alpha < 0.04) continue;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = dropTrail.color;
        for(const [sx, sy] of shape){
            const cx = dropTrail.x + sx;
            const cy = trailY + sy;
            if(cy < 0 || cy >= ROWS) continue;
            ctx.fillRect(cx * CELL + 2, cy * CELL + 2, CELL - 4, CELL - 4);
        }
    }
    ctx.globalAlpha = 1;
    ctx.restore();
}

/* ---- Ghost piece (낙하 예측 위치) ----
   디자인 v3 (사용자 요청 반영):
     · 색깔 무관 흰색 outline only
     · 각 셀별로 stroke (perimeter 합치지 않음) — 실제 블럭이
       cell 마다 fill 그리는 방식과 동일 ((px+1, py+1, CELL-2, CELL-2))
     · stroke 가 cell 바운더리 밖으로 절대 안 나감 (inscribed):
         strokeRect 좌표를 (px+0.5, py+0.5, CELL-1, CELL-1) 로 잡으면
         lineWidth 1 의 stroke 가 cell 의 첫 1px 안에 정확히 들어감
         (outer edge 가 cell 바운더리에 정확히 접함, 안쪽으로만 그려짐) */
function getGhostY(){
    if(!current) return -1;
    let gy = current.y;
    while(tryPos(current.type, current.rot, current.x, gy + 1)){
        gy++;
    }
    return gy;
}
function drawGhostOutline(){
    if(!current) return;
    const gy = getGhostY();
    /* current 자리와 ghost 자리가 같으면 (이미 바닥) 안 그림 — current
       piece 와 겹쳐서 시각 노이즈만 됨. */
    if(gy <= current.y) return;
    const shape = PIECES[current.type].shapes[current.rot];

    ctx.save();
    /* 흰색 outline — 0.78 alpha. lineWidth 1 로 셀 안에 정확히 inscribed.
       stroke center (px+0.5, py+0.5) → outer edge at (px, py) = cell 경계
       에 정확히 접함, inner edge at (px+1, py+1) = cell 안쪽 1px 진입. */
    ctx.strokeStyle = 'rgba(255,255,255,0.78)';
    ctx.lineWidth = 1;
    for(const [dx, dy] of shape){
        const cx = current.x + dx, cy = gy + dy;
        if(cy < 0) continue;
        const px = cx * CELL, py = cy * CELL;
        /* 셀별 독립 outline — 실제 blocks 와 동일하게 같은 piece 인접
           셀들 사이에도 작은 gap 보임 (real Tetris block visual). */
        ctx.strokeRect(px + 0.5, py + 0.5, CELL - 1, CELL - 1);
    }
    ctx.restore();
}

/* ---- 라인 클리어 burst overlay ----
   {rows:[y,...], start:ms, duration:ms, isTetris:bool} 형태 객체.
   설정되면 render() 가 cleared 줄 위에 sparkle + 가로 빛줄기를 그림.
   lock() 의 setTimeout 이 끝나면 null 로 리셋. */
let clearAnim = null;

/* clearAnim 진행 중 매 프레임 render. duration 만큼 진행되면 종료.
   클래식 line clear — 단순 white flash 만, particle 없음, sprite 없음. */
function animateClearTick(){
    if(!clearAnim) return;
    const elapsed = performance.now() - clearAnim.start;
    if(elapsed >= clearAnim.duration){
        clearAnim = null;
        render();
        return;
    }
    render();
    requestAnimationFrame(animateClearTick);
}

/* Flashy line clear effect — multi-layer overlay 만으로 화려함 + 부담 0.
   각 layer 가 cleared.length 만큼 fillRect. TETRIS 도 max ~16 ops/frame.

   Layer 구성 (4단계):
     1. Bright pulse flash (sin 펄스) — cleared 줄 전체 흰 깜빡임
     2. Horizontal sweep bar (좌→우) — 밝은 띠가 가로지름 ★ 핵심
     3. Top + bottom bright edges — 줄 위아래 강한 빛 가장자리
     4. TETRIS bonus — 금색 tint flickering + 두꺼운 edge */
function drawClearBurst(){
    if(!clearAnim) return;
    const elapsed = performance.now() - clearAnim.start;
    const t = Math.min(1, elapsed / clearAnim.duration);
    const isTetris = clearAnim.cleared.length === 4;
    const totalW = COLS * CELL;

    /* (1) Bright pulse flash — sin 펄스로 강한 깜빡임 */
    const pulse = Math.abs(Math.sin(t * Math.PI * 1.2));
    const flashAlpha = pulse * 0.78 * (1 - t * 0.3);
    if(flashAlpha > 0.02){
        ctx.fillStyle = 'rgba(255,255,255,' + flashAlpha + ')';
        for(const y of clearAnim.cleared){
            ctx.fillRect(0, y * CELL, totalW, CELL);
        }
    }

    /* (2) Horizontal sweep bar — 좌→우 가로지르는 밝은 띠 (★) */
    if(t < 0.7){
        const sweepT = t / 0.7;
        const sweepX = sweepT * totalW * 1.3 - totalW * 0.15;   /* 약간 overshoot */
        const sweepW = totalW * 0.3;
        /* sweepT 0.5 에서 가장 밝, 양 끝에서 fade */
        const sweepAlpha = Math.max(0, 1 - Math.abs(0.5 - sweepT) * 2.5) * 0.92;
        if(sweepAlpha > 0.05){
            ctx.fillStyle = 'rgba(255,255,255,' + sweepAlpha + ')';
            for(const y of clearAnim.cleared){
                ctx.fillRect(sweepX - sweepW/2, y * CELL, sweepW, CELL);
            }
        }
    }

    /* (3) Top + bottom bright edges — 줄 위아래 강한 빛 line */
    const edgeAlpha = (1 - t * 0.5) * 0.9;
    if(edgeAlpha > 0.05){
        ctx.fillStyle = 'rgba(255,255,255,' + edgeAlpha + ')';
        for(const y of clearAnim.cleared){
            const py = y * CELL;
            ctx.fillRect(0, py, totalW, 2);
            ctx.fillRect(0, py + CELL - 2, totalW, 2);
        }
    }

    /* (4) TETRIS bonus — 금색 tint flickering + 두꺼운 edge */
    if(isTetris){
        const goldFlick = Math.abs(Math.sin(t * Math.PI * 3));
        const goldAlpha = (1 - t * 0.7) * 0.5 * goldFlick;
        if(goldAlpha > 0.02){
            ctx.fillStyle = 'rgba(255,200,50,' + goldAlpha + ')';
            for(const y of clearAnim.cleared){
                ctx.fillRect(0, y * CELL, totalW, CELL);
            }
        }
    }
}

/* T-spin / all-spin floating announcement — board 가운데 위쪽에 떠올라
   1.4초 fade out. 부담: ctx.fillText 1회 + 약간의 state 변경. */
function drawSpinAnnouncement(){
    if(!spinAnnouncement) return;
    const elapsed = performance.now() - spinAnnouncement.start;
    if(elapsed >= spinAnnouncement.duration){
        spinAnnouncement = null;
        return;
    }
    const t = elapsed / spinAnnouncement.duration;
    /* float up 40px, 70% 시점부터 fade */
    const yOffset = -t * 40;
    const fade = t < 0.7 ? 1 : Math.max(0, (1 - t) / 0.3);
    /* 시작 시 살짝 scale-up bounce (0~0.15s) */
    const scale = t < 0.15 ? 1 + (0.15 - t) * 1.5 : 1;
    ctx.save();
    ctx.font = 'bold ' + (16 * scale) + 'px Orbitron, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.globalAlpha = fade;
    /* drop shadow 로 가독성 — 어두운 배경 위에서도 잘 보이게 */
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillText(spinAnnouncement.text,
        COLS * CELL / 2 + 1, ROWS * CELL * 0.4 + yOffset + 1);
    ctx.fillStyle = spinAnnouncement.color;
    ctx.fillText(spinAnnouncement.text,
        COLS * CELL / 2, ROWS * CELL * 0.4 + yOffset);
    ctx.restore();
}

/* Score popups — line clear/B2B/combo/perfect 시 floating "+점수" 텍스트.
   여러 개 stack 가능 (offsetIdx 로 세로 배치). 1.1초 fade + float up. */
function drawScorePopups(){
    if(!scorePopups.length) return;
    const now = performance.now();
    ctx.save();
    ctx.font = 'bold 11px Orbitron, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    /* 뒤에서부터 순회하며 expired 제거 (splice 안전) */
    for(let i = scorePopups.length - 1; i >= 0; i--){
        const p = scorePopups[i];
        const elapsed = now - p.start;
        if(elapsed >= p.duration){
            scorePopups.splice(i, 1);
            continue;
        }
        const t = elapsed / p.duration;
        const fade = t < 0.7 ? 1 : Math.max(0, (1 - t) / 0.3);
        /* base Y = 보드 가운데 약간 아래. offsetIdx 로 위쪽으로 stack. */
        const baseY = ROWS * CELL * 0.55 - p.offsetIdx * 16;
        const yOffset = -t * 25;
        ctx.globalAlpha = fade;
        /* drop shadow */
        ctx.fillStyle = 'rgba(0,0,0,0.85)';
        ctx.fillText(p.text, COLS * CELL / 2 + 1, baseY + yOffset + 1);
        ctx.fillStyle = p.color;
        ctx.fillText(p.text, COLS * CELL / 2, baseY + yOffset);
    }
    ctx.restore();
}

/* ---- Board layer (캐시 offscreen canvas) — Candy Crush / 모바일
   match-3 표준 기법. 정적 컨텐츠 (배경 + 그리드 + locked cells) 를
   별도 canvas 에 캐시해서 매 프레임 1 drawImage 로 표시.

   웹 검색 결과 (MDN, web.dev): "If you draw too many pixels to the
   same canvas at the same time, frame rate will suffer. Use multiple
   canvases layered on top of one another. Limiting pixels cleared/
   painted each frame is one of the best optimization techniques."

   board 변경 시 (lock, line collapse, white-fill) 만 rebuild. 매
   프레임 200 drawImage → 1 drawImage = 모바일 성능 핵심 개선. */
let boardLayer = null;
let boardLayerStale = true;
let boardLayerBgGrad = null;
const BOARD_LAYER_SCALE = 2;

function invalidateBoardLayer(){ boardLayerStale = true; }

function ensureBoardLayer(){
    if(!boardLayer){
        boardLayer = document.createElement('canvas');
        boardLayer.width  = COLS * CELL * BOARD_LAYER_SCALE;
        boardLayer.height = ROWS * CELL * BOARD_LAYER_SCALE;
    }
    if(boardLayerStale){
        const bc = boardLayer.getContext('2d');
        bc.setTransform(BOARD_LAYER_SCALE, 0, 0, BOARD_LAYER_SCALE, 0, 0);
        bc.clearRect(0, 0, COLS * CELL, ROWS * CELL);
        if(!boardLayerBgGrad){
            boardLayerBgGrad = bc.createLinearGradient(0, 0, 0, ROWS * CELL);
            boardLayerBgGrad.addColorStop(0,   '#0A0820');
            boardLayerBgGrad.addColorStop(0.5, '#040818');
            boardLayerBgGrad.addColorStop(1,   '#040A1E');
        }
        bc.fillStyle = boardLayerBgGrad;
        bc.fillRect(0, 0, COLS * CELL, ROWS * CELL);
        bc.strokeStyle = 'rgba(255,255,255,0.07)';
        bc.lineWidth = 1;
        for(let i = 1; i < COLS; i++){
            bc.beginPath(); bc.moveTo(i * CELL, 0); bc.lineTo(i * CELL, ROWS * CELL); bc.stroke();
        }
        for(let i = 1; i < ROWS; i++){
            bc.beginPath(); bc.moveTo(0, i * CELL); bc.lineTo(COLS * CELL, i * CELL); bc.stroke();
        }
        for(let y = 0; y < ROWS; y++){
            for(let x = 0; x < COLS; x++){
                if(board[y][x]) drawCell(bc, x, y, board[y][x]);
            }
        }
        boardLayerStale = false;
    }
    return boardLayer;
}

function render(){
    /* 1 drawImage 로 static board content 전체 표시 (매 프레임 200
       cells 안 그림). board 변경 시만 layer rebuild. */
    ctx.drawImage(ensureBoardLayer(), 0, 0, COLS * CELL, ROWS * CELL);
    /* Hard drop 잔상 — locked cells 위에 그려서 piece 가 지나간 자리
       빛처럼 합성. ghost outline 보다 먼저 (잔상이 ghost 보다 우선). */
    if(dropTrail) drawDropTrail();
    /* Ghost piece outline — current piece 그리기 전에 배경으로 깔아둠.
       clearAnim 진행 중이거나 paused 상태일 땐 시각 노이즈 방지로 skip. */
    if(current && !clearAnim && !paused) drawGhostOutline();
    /* Current piece */
    if(current){
        const shape = PIECES[current.type].shapes[current.rot];
        const color = PIECES[current.type].color;
        for(const [dx, dy] of shape){
            const cx = current.x + dx, cy = current.y + dy;
            if(cy >= 0) drawCell(ctx, cx, cy, color);
        }
    }
    /* 라인 클리어 burst overlay — locked cells + current piece 다 그린
       다음 그 위에 sparkle/빛줄기 합성 */
    if(clearAnim) drawClearBurst();
    /* T-spin / all-spin floating text (board 가운데 위) */
    if(spinAnnouncement) drawSpinAnnouncement();
    /* Score popups (B2B / combo / line score) — center 약간 아래에 stack */
    if(scorePopups.length) drawScorePopups();
    /* Pause overlay */
    if(paused && running){
        ctx.fillStyle = 'rgba(5,5,15,.72)';
        ctx.fillRect(0, 0, COLS * CELL, ROWS * CELL);
        ctx.font = 'bold 16px Orbitron, sans-serif';
        ctx.fillStyle = '#00D9FF';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('PAUSED', COLS * CELL / 2, ROWS * CELL / 2);
        ctx.textAlign = 'left';
        ctx.textBaseline = 'alphabetic';
    }
}
/* NEXT queue 5개 mini-canvas 렌더링.
   queue[0..4] 의 piece 를 각자 80~96 logical 좌표계 캔버스에 중앙 배치.
   첫 piece (idx=0) 는 96 logical (살짝 강조), 나머지는 80 logical. */
function drawNextQueuePreview(){
    nqCanvases.forEach((c, i) => {
        const cctx = c.getContext('2d');
        const L = (c.getAttribute('width') | 0) || 80;   /* logical box size */
        cctx.fillStyle = '#020516';
        cctx.fillRect(0, 0, L, L);
        const type = nextQueue[i];
        if(!type) return;
        const shape = PIECES[type].shapes[0];
        const color = PIECES[type].color;
        let minX=99, maxX=-99, minY=99, maxY=-99;
        for(const [dx, dy] of shape){
            if(dx < minX) minX = dx; if(dx > maxX) maxX = dx;
            if(dy < minY) minY = dy; if(dy > maxY) maxY = dy;
        }
        const w = maxX - minX + 1, h = maxY - minY + 1;
        const cellSize = Math.min(L / Math.max(w, 4), L / Math.max(h, 4)) * 0.85;
        const offsetX = (L - w * cellSize) / 2 - minX * cellSize;
        const offsetY = (L - h * cellSize) / 2 - minY * cellSize;
        for(const [dx, dy] of shape){
            const px = offsetX + dx * cellSize;
            const py = offsetY + dy * cellSize;
            cctx.fillStyle = color;
            cctx.fillRect(px + 1, py + 1, cellSize - 2, cellSize - 2);
            cctx.fillStyle = 'rgba(255,255,255,0.18)';
            cctx.fillRect(px + 2, py + 2, cellSize - 4, 2);
            cctx.fillRect(px + 2, py + 2, 2, cellSize - 4);
        }
    });
}

/* ---- Game loop ---- */
/* SOFT DROP 간격 — 사용자 피드백 따라 단계별 조정:
     50ms (초기) → 너무 빨라 hard drop 과 구분 안 됨
     100ms → 너무 느림 (불편)
     70ms (현재) → 100ms 보다 30% 빨라 반응 좋되 hard 와 명확히
       구분됨. 1초당 약 14칸 떨어져서 빠른 stack 정리 가능.
     Guideline gravity 곡선 적용 후 dropMs(L10) ≈ 64ms 라
     L10+ 에선 gravity 가 이미 더 빠름 → Math.min 으로 gravity 우선. */
const SOFT_DROP_INTERVAL = 70;
/* Sprint 시간 포맷 — m:ss.cs (centisecond). Marathon score 와 같은 폭 유지. */
function formatSprintTime(ms){
    const cs = Math.max(0, Math.floor(ms / 10));
    const totalSec = Math.floor(cs / 100);
    const m = Math.floor(totalSec / 60);
    const s = totalSec % 60;
    const c = cs % 100;
    return m + ':' + (s < 10 ? '0' : '') + s + '.' + (c < 10 ? '0' : '') + c;
}
function loop(now){
    if(!running) return;
    /* Sprint 모드 — SCORE 칸에 라이브 elapsed 시간 표시 (매 프레임 갱신). */
    if(gameMode === 'sprint' && !paused){
        $('scoreNow').textContent = formatSprintTime(now - startedAt);
    }
    if(!paused){
        const interval = softDropping ? Math.min(SOFT_DROP_INTERVAL, dropMs) : dropMs;
        while(now - lastDrop >= interval){
            lastDrop += interval;
            const moved = dropOne();
            if(moved){
                if(softDropping){ score += 1; $('scoreNow').textContent = score.toLocaleString(); }
            }
            if(landed){
                lockTimer += interval;
                if(lockTimer >= lockDelay){
                    /* 방어적 재검증 — 어떤 코드 경로 누락으로 landed=true
                       인데 실제론 떨어질 수 있는 상태면 lock 안 하고
                       landed 만 해제. moveX/rotate 의 재검증이 1차 방어,
                       이게 2차 방어. 공중 lock 절대 발생 안 하도록 보장. */
                    if(canMoveDown()){
                        landed = false;
                        lockTimer = 0;
                    } else {
                        lock();
                        if(!running) return;
                        lockTimer = 0;
                    }
                }
            }
            if(!running) return;
        }
    } else {
        lastDrop = now;
    }
    /* 핵심 버그 수정: animation tick (clearAnim, dropTrail) 이 자체 rAF
       chain 으로 render 를 호출 중이면 main loop 에선 skip → render
       2x/frame 중복 방지. 이전엔 burst 동안 매 프레임 render 가 두 번
       실행되어 모바일에서 멈춤 발생. */
    if(!clearAnim && !dropTrail) render();
    requestAnimationFrame(loop);
}

/* ---- Game lifecycle ---- */
function startGame(){
    /* Init state */
    board = Array.from({length: ROWS}, () => Array(COLS).fill(null));
    invalidateBoardLayer();   /* 새 board → layer rebuild */
    bag = [];
    refillBag();
    nextQueue = [];           /* reset NEXT queue */
    ensureNextQueue();        /* prefill 5 pieces */
    holdPiece = null; canHold = true;   /* HOLD slot reset */
    syncHoldUI();
    drawHoldPreview();
    /* Reset transient effects + spin/B2B/combo state */
    clearAnim = null;
    dropTrail = null;
    spinAnnouncement = null;
    lastMoveRotated = false;
    b2bChain = -1;
    comboCount = -1;
    lockResetCount = 0;
    scorePopups.length = 0;
    /* Pre-warm sprite cache — 모든 piece 색의 sprite 를 첫 게임 시작
       시점에 미리 렌더해서 첫 piece 등장할 때 stutter 방지. */
    for(const t of PIECE_TYPES){
        getCellSprite(PIECES[t].color);
    }
    /* 클래식 line clear flash 사용 — sprite 생성 안 함 (성능 안전) */
    score = 0; lines = 0;
    /* Sprint 모드: 레벨 고정 (1) — 누구나 같은 gravity 로 시간 비교.
       Marathon: 레벨 1 시작, 5라인 마다 +1 (MAX_LEVEL = 20). */
    level = (gameMode === 'sprint') ? SPRINT_LEVEL : 1;
    dropMs = gravityMsForLevel(level);
    lockDelay = lockDelayForLevel(level);
    softDropping = false;
    paused = false; gameOverFlag = false; running = true;
    landed = false; lockTimer = 0;
    startedAt = performance.now();
    $('linesNow').textContent = (gameMode === 'sprint') ? '0/' + SPRINT_TARGET : '0';
    $('levelNow').textContent = level;
    /* HUD SCORE/TIME 라벨 — 모드 따라 자동 갱신. selectMode 가 보통
       먼저 처리하지만 startGame 에서도 belt-and-suspenders. */
    const sLabel = $('scoreLabel');
    if(sLabel) sLabel.textContent = (gameMode === 'sprint') ? 'TIME' : 'SCORE';
    /* Sprint 모드: SCORE 칸을 TIME 으로 표시 — 라이브 elapsed 갱신은 loop().
       Marathon: 0 점수로 시작. */
    $('scoreNow').textContent = (gameMode === 'sprint') ? '0:00.00' : '0';
    $('overlay').classList.add('hidden');
    syncPauseUI();
    spawnPiece();
    Sfx.getCtx();   /* unlock AudioContext on the click that started us */
    /* BGM 시작 — track1 (차분) 부터. lock 시 마다 update(board) 호출
       해서 stack height 따라 자동 전환. AudioContext 가 같은 user
       gesture (클릭) 안에서 풀려있어 autoplay block 안 걸림. */
    try { TetrisBGM.start(); } catch(_){}
    lastDrop = performance.now();
    requestAnimationFrame(loop);
    fitCanvas();
}

function gameOver(){
    if(gameOverFlag) return;
    gameOverFlag = true;
    running = false;
    Sfx.gameOver();
    /* BGM 정지 — 모든 트랙 페이드 아웃 후 멈춤. Game over SFX 가
       방해받지 않게 즉시 처리. */
    try { TetrisBGM.stop(); } catch(_){}
    syncPauseUI();
    render();
    showGameOverOverlay();
}

/* Sprint 완료 — 40 라인 도달 시 호출. 성공 종료 (game over 와 다름).
   localStorage 에 personal best 비교 저장. 화려한 효과음 + 완료 화면. */
function sprintComplete(){
    if(gameOverFlag) return;
    gameOverFlag = true;
    running = false;
    Sfx.tetris();
    try { TetrisBGM.stop(); } catch(_){}
    syncPauseUI();
    render();
    showSprintCompleteOverlay();
}

async function showGameOverOverlay(){

    /* Sprint 모드: top-out 으로 game over 됐을 때 — 미완료 sprint 표시.
       Submit 안 함 (sprint 는 별도 ranking, 미구현). */
    const isSprintFail = (gameMode === 'sprint');
    ov.innerHTML = ''
        + '<h2 class="over">' + (isSprintFail ? esc(tT('sprintFail')) : esc(tT('gameOver'))) + '</h2>'
        + '<div class="over-stats">'
        + (isSprintFail
            ? '<div class="row"><span>'+esc(tT('lines'))+'</span><b>' + lines + '/' + SPRINT_TARGET + '</b></div>'

        + '</div>'
        + (isSprintFail ? '' : '<div class="over-rank" id="ovRankNum">'+esc(tT('recording'))+'</div>')
        + (isSprintFail ? '' : '<div class="over-pb" id="ovRankPb"></div>')
        + buildModeTabsHTML()
        + '<div class="ov-actions">'
        +   '<button class="btn" id="ovBtnRetry">'+esc(tT('retry'))+'</button>'
        +   '<button class="btn btn-rank" id="ovBtnRank" type="button">'+esc(tT('rankBtn'))+'</button>'
        + '</div>'
        + '<div class="kbd-hint" style="margin-top:6px"><kbd>Enter</kbd> '+esc(tT('enterRestart'))+'</div>';
    ov.classList.remove('hidden');
    $('ovBtnRetry').addEventListener('click', startGame);
    wireModeTabs();
    /* "랭크" 버튼 — 즉시 wire (async RPC 전에). 그렇지 않으면 사용자가
       RPC 끝나기 전에 누르면 핸들러 없어 무반응. Sprint top-out 도
       early return 전에 wire 돼야 함. */
    {
        const rankBtnE = $('ovBtnRank');
        if(rankBtnE){
            rankBtnE.addEventListener('click', () =>
                openTetrisRankSheet(isSprintFail ? 'sprint' : 'marathon'));
        }
    }

    /* Sprint top-out — ranking 제출 안 함, early return. */
    if(isSprintFail) return;

    /* Submit the score (anon: skip) */
    let recordOk = false, recordErrKind = null;
    if(me){
        try{
            const {data, error} = await getSupabase().rpc('record_tetris_attempt', {
                p_score: score, p_lines: lines, p_level: level, p_duration_ms: duration
            });
            if(error){
                console.warn('[tetris.record]', error.message);
                if(/not_authenticated/.test(error.message)) recordErrKind = 'no_auth';
                else if(/impossible_pace|score_lines_mismatch|bad_/.test(error.message)) recordErrKind = 'invalid';
                else if(/rate_limited/.test(error.message)) recordErrKind = 'rate_limited';
                else recordErrKind = 'unknown';
            } else if(data?.ok){
                recordOk = true;
                if(data.is_personal_best){
                    $('ovRankPb').textContent = tT('myBest');
                } else if(data.prior_best){
                    $('ovRankPb').textContent = tT('priorBest') + ': ' + data.prior_best.toLocaleString();
                }
            }
        } catch(e){
            console.warn('[tetris.record] threw', e);
            recordErrKind = 'unknown';
        }
    } else {
        recordErrKind = 'no_login';
    }

    /* Show world rank */
    if(recordOk && me){
        try{
            const {data: stats} = await getSupabase().rpc('tetris_my_stats');
            if(stats?.has_record){
                $('ovRankNum').textContent = tT('worldRank') + (stats.world_rank||'?').toLocaleString();
            } else {
                $('ovRankNum').textContent = tT('firstRecord');
            }
        } catch(_){
            $('ovRankNum').textContent = tT('rankFailed');
        }
    } else if(recordErrKind === 'no_login'){
        $('ovRankNum').textContent = tT('loginNeeded');
    } else if(recordErrKind === 'rate_limited'){
        $('ovRankNum').textContent = tT('rateLimited');
    } else if(recordErrKind === 'invalid'){
        $('ovRankNum').textContent = tT('invalidScore');
    } else if(recordErrKind === 'no_auth'){
        $('ovRankNum').textContent = tT('authNeeded');
    } else if(recordErrKind === 'unknown'){
        $('ovRankNum').textContent = tT('recordFailed');
    } else if(!me){
        $('ovRankNum').textContent = tT('loginNeeded');
    } else {
        $('ovRankNum').textContent = '';
    }

    /* Refresh leaderboard */
    if(matchMedia('(min-width:1024px)').matches) loadLeaderboard(currentScope);
    /* 랭크 버튼은 위쪽에서 이미 wire 됨 (RPC 전). */
}
