/* ================================================================
   Mobile portrait — PRIMARY design target.
   Tablet landscape + desktop are progressive enhancements via
   min-width media queries at the bottom. DO NOT reverse the order.
   ================================================================ */
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --dark:#0A0A1A;--accent:#FFE66D;--danger:#FF3366;
    --success:#00E676;--cyan:#00D9FF;
    --piece-i:#00D9FF;--piece-o:#FFE66D;--piece-t:#A855F7;
    --piece-s:#00E676;--piece-z:#FF3366;
    --piece-j:#3B82F6;--piece-l:#FF9A3C;
    --muted:rgba(255,255,255,.55);--muted-2:rgba(255,255,255,.35);
    --panel-br:rgba(255,255,255,.07);
    --sb-bottom: env(safe-area-inset-bottom, 0px);
}
html,body{height:100%;overscroll-behavior:none}
/* Body 자체를 flex column 으로 잡고 height:100dvh 로 viewport 잠금.
   wrap (메인) 이 flex:1 로 남은 영역 다 차지 → 그 안에서 canvas 가
   다시 flex:1 로 가용 공간 흡수 → 폰에서 한 화면에 게임+컨트롤 모두
   들어옴 (스크롤 없음). overflow:hidden 으로 여백 누수도 차단. */
body{
    font-family:'Noto Sans KR',sans-serif;background:var(--dark);color:#fff;
    height:100dvh;max-height:100dvh;overflow:hidden;letter-spacing:.01em;
    display:flex;flex-direction:column;
    background-image:radial-gradient(ellipse at 50% 20%,rgba(0,217,255,.04) 0%,transparent 55%),linear-gradient(180deg,#0A0A1A 0%,#10101F 50%,#0A0A1A 100%);
    -webkit-tap-highlight-color:transparent;
    user-select:none;-webkit-user-select:none
}

/* ---- Topbar ----
   sticky 제거 — body 가 flex 라 자동으로 위에 고정. 패딩 줄여 높이
   최소화. 한 화면에 게임 다 넣어야 하니 픽셀 한 톨 아낌. */
.topbar{
    flex-shrink:0;
    display:flex;align-items:center;gap:8px;
    padding:7px 12px;z-index:10;
    background:rgba(10,10,26,.88);backdrop-filter:blur(14px);
    border-bottom:1px solid var(--panel-br);
    /* 미세한 시안 글로우로 헤더 영역 분리 — 너무 강하면 안 됨 */
    box-shadow:0 1px 16px rgba(0,217,255,0.07)
}
.topbar .home{text-decoration:none;color:rgba(255,255,255,.8);padding:7px 11px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);font-size:.78em;font-weight:700}
.topbar h1{font-family:'Orbitron','Noto Sans KR',sans-serif;font-size:1em;font-weight:900;margin:0;flex:1;text-align:center;background:linear-gradient(135deg,#00D9FF,#A855F7,#FF3366);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar .slot{min-width:64px;text-align:right}
.topbar .auth-chip{padding:5px 10px;border-radius:999px;background:rgba(255,230,109,.1);border:1px solid rgba(255,230,109,.25);color:#FFE66D;font-size:.72em;font-weight:700;text-decoration:none;white-space:nowrap}
.topbar .lb-btn{padding:6px 10px;border-radius:10px;background:rgba(0,217,255,.08);border:1px solid rgba(0,217,255,.3);color:#00D9FF;font-size:.78em;font-weight:800;cursor:pointer;font-family:inherit}
.topbar .lb-btn:active{background:rgba(0,217,255,.16)}

/* ---- Main column ----
   flex:1 + min-height:0 으로 topbar 아래 모든 공간 차지. 그 안에서
   canvas 가 다시 flex:1 로 남는 공간 다 먹음. */
.wrap{
    flex:1 1 0;min-height:0;
    /* 하단 padding 을 5vh 로 키워 컨트롤(특히 HARD DROP)이 화면 맨
       끝에서 떨어지도록. canvas 는 flex:1 이라 자동으로 5vh 만큼
       줄어들어 셀 크기 약 5% 축소 (한 폰 기준 800dvh × 5% = 40px,
       canvas 600px → 560px, 셀 30 → 28px 수준). 효과:
         · HARD 버튼이 손가락 그립 아치 안쪽으로 들어와 누르기 편함
         · 폰 무게중심 아래쪽이 비어 들고 있을 때 안정감
         · 안전영역(safe-area-inset-bottom) 위에 추가 여백이라
           기종 무관하게 일관된 시각적 마진. */
    display:flex;flex-direction:column;align-items:center;gap:6px;
    padding:6px 10px calc(var(--sb-bottom) + 5vh);
    max-width:460px;margin:0 auto;width:100%
}
.left-col{
    flex:1 1 0;min-height:0;
    display:flex;flex-direction:column;align-items:center;gap:6px;width:100%
}

/* ---- HUD: SCORE · LINES · LEVEL — 한 줄 컴팩트 (~38px) ----
   NEXT 는 캔버스 옆 .next-queue panel 로 분리됨 (5개 vertical). HUD
   는 3 cells 로 단순해져서 각 셀이 더 넓어 가독성 ↑. */
.hud{
    flex-shrink:0;
    display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;width:100%
}
.ss{
    background:linear-gradient(165deg,rgba(28,28,52,.70),rgba(10,10,24,.92));
    border:1px solid var(--panel-br);border-radius:10px;
    padding:6px 6px;text-align:center;
    display:flex;align-items:center;justify-content:center;gap:5px;
    min-height:38px;line-height:1;
    /* 미세 inset top highlight + 시안 outer glow → 셀에 깊이감 부여 */
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.06),
        0 0 12px -3px rgba(0,217,255,0.18);
}
.ss .l{font-size:.55em;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);font-weight:800;flex-shrink:0}
/* HUD 숫자 — JetBrains Mono (진짜 monospace). Orbitron 은 tabular-nums
   설정해도 글리프 폭이 미세하게 달라 시간/점수 카운트 시 좌우로 진동
   현상 발생. 진짜 monospace 폰트로 강제 → 자릿수 변해도 폭 일정.
   text-shadow 가 currentColor 따라가서 .acc 클래스로 시안 표시될 때
   시안 글로우 자동 적용. font-feature-settings 도 belt-and-suspenders
   로 tabular figures 활성. */
.ss .v{
    font-family:'JetBrains Mono','Roboto Mono','Consolas','Courier New',monospace;
    font-size:1.05em;font-weight:800;color:#fff;
    font-variant-numeric:tabular-nums;
    font-feature-settings:'tnum' 1, 'lnum' 1;
    text-shadow:0 0 8px currentColor, 0 0 2px currentColor;
    letter-spacing:.02em;
    /* 추가 안전장치: 하나의 단어 내에서 줄바꿈 없게 + display 안정 */
    white-space:nowrap;
}
.ss .v.acc{color:var(--cyan)}
/* NEXT 셀: 라벨 + 미니 프리뷰 가로 배치 */
.next-tile{
    background:linear-gradient(165deg,rgba(22,22,42,.55),rgba(12,12,28,.8));
    border:1px solid var(--panel-br);border-radius:10px;
    padding:3px 6px;display:flex;align-items:center;justify-content:center;gap:5px;
    min-height:38px
}
.next-tile .l{font-size:.58em;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-2);font-weight:800;flex-shrink:0}
.next-tile canvas{width:32px;height:32px;display:block;flex-shrink:0}

/* ---- Game control bar (pause button, visible during play) ----
   Topbar 안 .lb-btn 옆 슬롯에 끼워 둘 수도 있지만, 일시정지는 자주
   누르는 핵심 액션이라 별도 행보다 작은 absolutely-positioned 칩으로
   처리: 캔버스 우상단 코너에 떠 있게 (canvas-wrap 의 position:relative
   에 anchor). 차지 공간 = 0 (캔버스 위 떠있음). */
.game-ctrl{
    display:none;
    position:absolute;top:6px;right:6px;z-index:6
}
.game-ctrl.on{display:block}
.ctrl-btn{
    padding:5px 9px;border-radius:8px;
    background:rgba(0,217,255,.18);border:1px solid rgba(0,217,255,.4);
    color:#00D9FF;font-family:inherit;font-size:.7em;font-weight:800;cursor:pointer;
    letter-spacing:.04em;backdrop-filter:blur(6px)
}
.ctrl-btn:active{background:rgba(0,217,255,.32)}

/* ---- Canvas wrap (the 10x20 playfield) ----
   .game-row 안 가운데 위치. 양쪽 HOLD/NEXT panel (각 60px = 54+6)
   = 총 120px 확보 후 남는 공간 차지. max-width 로 panel 영역 침범
   안 하게 cap. flex justify-content:center 가 정중앙 정렬 처리. */
.canvas-wrap{
    flex:0 1 auto;min-height:0;
    position:relative;
    aspect-ratio:1/2;height:100%;width:auto;
    max-width:calc(100% - 120px);
    border-radius:0;overflow:hidden;
    background:linear-gradient(165deg,rgba(0,217,255,.04),rgba(168,85,247,.04));
    border:1px solid rgba(0,217,255,.18);
    box-shadow:0 0 20px rgba(0,217,255,.08)
}
.canvas-wrap canvas{display:block;width:100%;height:100%;background:#020516}

/* ---- Line clear screen-shake ----
   라인 클리어 시 캔버스를 살짝 흔들어 "쾅 터졌다" 느낌. 1~3 줄은
   가벼운 shake-1, 4 줄(테트리스) 은 강한 shake-tetris 로 차별화.
   transform: translate3d 로 GPU 가속, will-change:transform 으로 강제
   레이어 분리해서 비디오 카드 쪽으로 합성 — JS 캔버스 그리기와
   분리되어 충돌 없음. */
@keyframes shake-1{
    0%,100%{transform:translate3d(0,0,0)}
    25%{transform:translate3d(-2px,1px,0)}
    50%{transform:translate3d(2px,-1px,0)}
    75%{transform:translate3d(-1px,1px,0)}
}
@keyframes shake-tetris{
    0%,100%{transform:translate3d(0,0,0)}
    10%{transform:translate3d(-5px,2px,0) rotate(-.4deg)}
    25%{transform:translate3d(4px,-2px,0) rotate(.3deg)}
    40%{transform:translate3d(-3px,-2px,0) rotate(-.2deg)}
    55%{transform:translate3d(3px,2px,0) rotate(.2deg)}
    70%{transform:translate3d(-2px,1px,0) rotate(-.1deg)}
    85%{transform:translate3d(2px,-1px,0) rotate(.1deg)}
}
.canvas-wrap.shaking-1{animation:shake-1 220ms ease-in-out;will-change:transform}
.canvas-wrap.shaking-tetris{animation:shake-tetris 460ms ease-in-out;will-change:transform}
/* Hard drop 임팩트 — 수직 방향 짧은 bounce. 무거운 게 떨어진 느낌. */
@keyframes shake-impact{
    0%  {transform:translate3d(0,0,0)}
    25% {transform:translate3d(0,4px,0)}
    50% {transform:translate3d(0,-1px,0)}
    75% {transform:translate3d(0,2px,0)}
    100%{transform:translate3d(0,0,0)}
}
.canvas-wrap.shaking-impact{animation:shake-impact 220ms cubic-bezier(0.2,0,0.4,1);will-change:transform}
/* TETRIS 4-line 시 캔버스 테두리 자체가 주황 네온으로 펄스 */
@keyframes tetris-border{
    0%{box-shadow:0 0 20px rgba(0,217,255,.08);border-color:rgba(0,217,255,.18)}
    20%{
        box-shadow:0 0 36px 4px rgba(255,154,60,.7),inset 0 0 18px rgba(255,154,60,.35);
        border-color:rgba(255,154,60,.85)
    }
    100%{box-shadow:0 0 20px rgba(0,217,255,.08);border-color:rgba(0,217,255,.18)}
}
.canvas-wrap.tetris-glow{animation:tetris-border 520ms ease-out}

/* ---- Overlay (start / game over) ---- */
.overlay{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:18px;text-align:center;gap:10px;
    background:rgba(5,5,15,.82);backdrop-filter:blur(8px);
    z-index:5
}
.overlay.hidden{display:none}
.overlay h2{font-family:'Orbitron',sans-serif;font-size:1.4em;font-weight:900;letter-spacing:.06em;
    background:linear-gradient(135deg,#00D9FF,#A855F7,#FF3366);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.overlay h2.over{background:linear-gradient(135deg,#FF3366,#FF9A3C,#FFE66D);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.overlay p{font-size:.84em;color:var(--muted);line-height:1.55}
.overlay .btn{
    padding:12px 26px;border-radius:14px;border:0;cursor:pointer;
    background:linear-gradient(135deg,#00D9FF,#A855F7);color:#fff;
    font-family:'Orbitron','Noto Sans KR',sans-serif;font-weight:900;
    font-size:.92em;letter-spacing:.08em;text-transform:uppercase;
    box-shadow:0 8px 24px -6px rgba(168,85,247,.5),inset 0 1px 0 rgba(255,255,255,.22)
}
.overlay .btn:active{transform:translateY(1px)}
/* Mode tabs (Marathon vs Sprint) — start overlay 안 작은 토글. */
.mode-tabs{
    display:flex;gap:6px;justify-content:center;
    margin:6px 0 4px;
}
.mode-tab{
    padding:8px 14px;border-radius:10px;cursor:pointer;
    background:rgba(255,255,255,.04);
    border:1px solid var(--panel-br);
    color:var(--muted);
    font-family:'Orbitron',sans-serif;font-weight:700;
    font-size:.7em;letter-spacing:.06em;text-transform:uppercase;
    transition:all .15s ease;
}
.mode-tab.active{
    background:linear-gradient(135deg,rgba(0,217,255,.22),rgba(168,85,247,.22));
    border-color:rgba(168,85,247,.6);
    color:#fff;
    box-shadow:0 0 12px -2px rgba(168,85,247,.4),inset 0 1px 0 rgba(255,255,255,.18);
}
.mode-desc{
    font-size:.72em;color:var(--muted-2);margin:2px 0 6px;min-height:1em
}
.kbd-hint{font-size:.72em;color:var(--muted-2);margin-top:4px}
.kbd-hint kbd{
    display:inline-block;padding:2px 7px;margin:0 2px;
    background:rgba(255,255,255,.06);border:1px solid var(--panel-br);
    border-radius:5px;font-family:'JetBrains Mono','Courier New',monospace;font-size:.95em
}
/* Game over result block */
.over-stats{
    margin-top:6px;padding:10px 14px;border-radius:12px;
    background:rgba(255,255,255,.03);border:1px solid var(--panel-br);
    width:100%;max-width:280px
}
.over-stats .row{display:flex;justify-content:space-between;font-size:.78em;line-height:1.7;color:var(--muted)}
.over-stats .row b{color:#fff;font-weight:700;font-variant-numeric:tabular-nums}
.over-rank{margin-top:8px;font-size:.86em;color:var(--cyan);font-weight:700}
.over-pb{margin-top:4px;font-size:.78em;color:var(--success);font-weight:700}
/* Game-over 화면 액션 버튼 행 — "다시 도전" + "🏆 랭크". */
.ov-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.overlay .btn-rank{
    background:linear-gradient(135deg,#FFE66D,#FF9A3C);color:#1a0f00;
    box-shadow:0 8px 24px -6px rgba(255,154,60,.45),inset 0 1px 0 rgba(255,255,255,.32)
}

/* ---- Controls (mobile-first 양손 대칭 레이아웃) ----
   flex-shrink:0 — canvas 줄어드는 게 우선, 컨트롤은 항상 동일 높이.
   Row 1: ◀ ↺ ↻ ▶ — 4개 버튼 양쪽 대칭. 회전 양쪽 (CCW/CW) 가
          정중앙에 모이고, 좌우 이동이 양 끝 (양 엄지 도달 영역 자연).
   Row 2:    [ ▼ DROP ]   — CCW/CW 정중앙 아래, 더블탭=하드/홀드=소프트
*/
.controls{
    flex-shrink:0;
    width:100%;display:flex;flex-direction:column;gap:6px;
    padding:0
}
/* 4 버튼 모두 64×64 정사각형 (CCW/CW 원의 bounding box 와 동일 사이즈).
   row 마다 flex 로 가운데 정렬. row-drop 은 LEFT 와 같이 1개만. */
.ctrl-row{display:flex;gap:8px;align-items:center;justify-content:center}
/* 회전 동그라미 — 보라 네온, 64×64 원형. 시각은 원이지만 실제
   터치 hit area 는 원 안에 inscribed 된 정사각형 (JS isInsideInscribedSquare).
   corner-bulge 부분 dead — LEFT/RIGHT 옆 버튼 오인식 방지. */
.cbtn.rot-circle{
    width:64px;height:64px;min-height:0;
    border-radius:50%;padding:0;flex-shrink:0;
    background:radial-gradient(circle at 35% 25%,
        rgba(180,110,255,0.45) 0%,
        rgba(120,55,190,0.30) 40%,
        rgba(60,20,110,0.40) 100%);
    border-color:rgba(168,85,247,0.55);
    --btn-glow: rgba(168,85,247,0.8);
    display:flex;align-items:center;justify-content:center
}
/* 동그라미 위 글로시 하이라이트 — radial 로 빛 받는 느낌 */
.cbtn.rot-circle::before{
    border-radius:50%;
    height:50%;
    background:radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.18), transparent 70%);
}
.cbtn.rot-circle .lab{display:none}
/* SVG 회전 화살표 — viewBox 정중앙(16,16) 기준 270° 호 + 화살촉.
   45% 사이즈 = 이전 90% 대비 절반 (사용자 요청 "직경 절반").
   SVG 비례 축소이므로 stroke 굵기도 자동 절반 됨. 작아진 만큼
   "원의 정확한 중심에서 회전한다" 시각 인상 강화. */
.cbtn.rot-circle .rot-svg{
    width:45%;height:45%;
    color:#D5B0FF;
    filter:drop-shadow(0 0 6px rgba(168,85,247,0.5));
    pointer-events:none
}
/* ---- 3D dimensional buttons with neon press effect ----
   Multi-layer shadows + glossy highlight + per-type neon glow on
   active. CSS variable --btn-glow used per type so the press effect
   color matches each button's identity. */
.cbtn{
    position:relative;
    /* L/R/DROP 도 64×64 정사각형 (CCW/CW 원 bounding 과 동일).
       모든 4 버튼이 row 1 에 같은 사이즈로 정렬, DROP 은 row 2 정중앙. */
    width:64px;height:64px;min-height:0;flex-shrink:0;
    background:linear-gradient(180deg,
        rgba(40,40,62,0.92) 0%,
        rgba(22,22,42,0.88) 45%,
        rgba(10,10,24,0.95) 100%);
    border:1px solid rgba(255,255,255,0.10);border-radius:12px;
    color:#fff;font-family:inherit;font-weight:800;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;padding:0;
    /* Multi-layer shadows for raised 3D feel */
    box-shadow:
        0 6px 14px -3px rgba(0,0,0,0.55),         /* drop shadow far */
        0 2px 4px -1px rgba(0,0,0,0.45),          /* drop shadow close */
        inset 0 1px 0 rgba(255,255,255,0.18),     /* top highlight (lit from above) */
        inset 0 -2px 4px rgba(0,0,0,0.35);        /* bottom inner shadow (recessed bottom) */
    transition:transform .1s ease, box-shadow .15s ease, background .15s ease;
    -webkit-tap-highlight-color:transparent;
    overflow:hidden;
    /* Per-button glow color, defaults to neutral; overridden per type */
    --btn-glow: rgba(255,255,255,0.4);
}
/* Glossy highlight strip on top half — adds shine/3D depth */
.cbtn::before{
    content:'';position:absolute;top:1px;left:1px;right:1px;height:42%;
    background:linear-gradient(180deg, rgba(255,255,255,0.08), transparent);
    border-radius:11px 11px 0 0;pointer-events:none;
}
/* Pressed state — neon glow + button "sinks" into surface */
.cbtn:active{
    transform:translateY(2px) scale(.97);
    box-shadow:
        0 1px 2px -1px rgba(0,0,0,0.5),                  /* reduced drop */
        inset 0 2px 6px rgba(0,0,0,0.5),                 /* deeper inner shadow */
        0 0 0 2px var(--btn-glow),                       /* solid neon ring */
        0 0 18px 2px var(--btn-glow),                    /* outer neon glow */
        inset 0 0 12px var(--btn-glow);                  /* inner neon halo */
}
/* Press flash — 버튼 누른 순간 전체가 테마 색깔로 한번 "번쩍".
   :active 는 누른 동안만 유지되는 정적 효과인 반면, 이 .flash 는
   매 press 마다 짧게(280ms) 켜졌다 페이드 아웃되는 애니메이션이라
   탭의 즉각적인 응답감을 강조. inset box-shadow 로 버튼 전체 내부
   를 테마 색으로 가득 채우면서, brightness/saturate 살짝만 올림.
   AMOLED pixel burn 우려해서 풀백색 · 풀화이트 절대 안 쓰고 테마
   색의 alpha 만 키우는 방식. 280ms 동안 빠르게 가라앉아 시각 잔상
   안 남음. */
@keyframes cbtn-flash{
    0%{filter:brightness(1) saturate(1)}
    18%{
        box-shadow:
            0 0 0 2px var(--btn-glow),
            0 0 28px 6px var(--btn-glow),
            inset 0 0 30px 4px var(--btn-glow),
            0 4px 10px -2px rgba(0,0,0,0.4);
        filter:brightness(1.22) saturate(1.18)
    }
    100%{filter:brightness(1) saturate(1)}
}
.cbtn.flash{animation:cbtn-flash 280ms ease-out}
/* rot-circle 동그라미는 inset box-shadow 가 원형 컷 아웃이라
   잘 안 보임 → background 톤도 같이 살짝 키움 */
@keyframes cbtn-flash-circle{
    0%,100%{filter:brightness(1) saturate(1)}
    18%{
        box-shadow:
            0 0 0 2px var(--btn-glow),
            0 0 32px 8px var(--btn-glow),
            inset 0 0 22px 6px var(--btn-glow);
        filter:brightness(1.35) saturate(1.25)
    }
}
.cbtn.rot-circle.flash{animation:cbtn-flash-circle 280ms ease-out}
/* L/R/DROP/HOLD 의 .ico 는 버튼 정중앙에 absolute 위치 →
   삼각형이 정확히 한가운데. .lab 는 absolute bottom 으로 살짝
   아래쪽에 작은 텍스트로 위치. flex 가 아닌 absolute 라 .ico 가
   .lab 의 영향 없이 (50%, 50%) 에 정렬됨. */
.cbtn .ico{
    position:absolute;top:50%;left:50%;
    transform:translate(-50%, -50%);
    font-size:1.7em;line-height:1;font-family:'Orbitron',sans-serif;font-weight:900;
    text-shadow: 0 0 8px currentColor;
    pointer-events:none
}
.cbtn .lab{
    position:absolute;left:0;right:0;bottom:5px;
    font-size:.5em;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-2);
    text-align:center;line-height:1;pointer-events:none
}

/* Per-type colored backgrounds + glow colors */
.cbtn.move{
    background:linear-gradient(180deg,
        rgba(60,180,220,0.18) 0%,
        rgba(0,140,180,0.14) 55%,
        rgba(0,80,120,0.22) 100%);
    border-color:rgba(0,217,255,0.35);
    --btn-glow: rgba(0,217,255,0.7);
}
.cbtn.move .ico{color:#00D9FF}
.cbtn.rot .ico{color:#C893F9}
/* DROP 통합 버튼 — 좌우 이동 (move) 과 동일한 시안 톤.
   더블탭 → hard drop, 홀드 → soft drop. soft 활성 시 .soft-active
   로 주황 빛 살짝 띠도록. */
.cbtn.drop{
    background:linear-gradient(180deg,
        rgba(60,180,220,0.18) 0%,
        rgba(0,140,180,0.14) 55%,
        rgba(0,80,120,0.22) 100%);
    border-color:rgba(0,217,255,0.35);
    --btn-glow: rgba(0,217,255,0.7);
}
.cbtn.drop .ico{color:#00D9FF;font-size:1.7em;line-height:.9}
.cbtn.drop.soft-active{
    border-color:rgba(255,154,60,0.55);
    --btn-glow: rgba(255,154,60,0.75);
    box-shadow:
        0 4px 10px -2px rgba(0,0,0,0.45),
        inset 0 1px 0 rgba(255,255,255,0.18),
        0 0 14px -2px rgba(255,154,60,0.5),
        inset 0 0 10px rgba(255,154,60,0.2);
}
.cbtn.drop.soft-active .ico{color:#FFB050}
/* HOLD — 보라 톤 (HOLD slot 색깔 매칭). 단일 버튼 swap 동작 (modern
   Tetris 표준). 이전 HOLD/RELEASE 2개 분리 형태에서 통합됨. */
.cbtn.hold{
    background:linear-gradient(180deg,
        rgba(180,110,255,0.22) 0%,
        rgba(120,55,190,0.16) 55%,
        rgba(60,20,110,0.26) 100%);
    border-color:rgba(168,85,247,0.45);
    --btn-glow: rgba(168,85,247,0.75);
}
.cbtn.hold .ico{color:#D5B0FF}
/* canHold=false (이번 piece 이미 hold 사용) 일 때 회색 톤. JS 가
   .locked 클래스 토글해서 시각적 피드백 제공. */
.cbtn.hold.locked{opacity:.45}

/* ---- NEXT queue panel (5 pieces vertical, right of canvas) ----
   playfield 옆 슬림 panel 에 다음 5개 piece 미리보기. 위에서 아래로
   순서: queue[0] = 다음 piece, queue[4] = 5번째 후. 캐주얼 모바일
   유저 도전적 플레이감 위해 깊은 lookahead 제공. */
/* .game-side — HOLD slot 을 감싸는 column 컨테이너.
   모바일: HOLD slot 만 (kbd-ref display:none) → HOLD slot 본인처럼 동작.
   PC: HOLD 위 + kbd-ref 아래 (margin-top:auto), playfield 왼쪽 column. */
.game-side{
    flex-shrink:0;
    align-self:flex-start;
    display:flex;flex-direction:column;
    align-items:center;gap:6px;
}

/* HOLD (좌) + NEXT (우) 두 panel 동일 디자인. .side-panel 공통 클래스 +
   각자 .hold-slot / .next-queue 차이는 색깔/내용. 양쪽 동일 폭이라
   canvas 가 화면 정중앙 정렬됨 (justify-content:center 자동 작동). */
.next-queue, .hold-slot{
    flex-shrink:0;
    align-self:flex-start;
    width:54px;
    display:flex;flex-direction:column;align-items:center;gap:4px;
    padding:5px 4px 6px;
    background:linear-gradient(165deg,rgba(26,26,48,.82),rgba(10,10,24,.95));
    border:1px solid var(--panel-br);
    border-radius:10px;
    /* 미세한 outer glow + 더 깊은 inset 으로 panel 입체감 강화 */
    box-shadow:
        0 6px 16px -4px rgba(0,0,0,.45),
        inset 0 1px 0 rgba(255,255,255,.07),
        0 0 14px -3px rgba(168,85,247,.18);
}
/* 라벨 — 시안→보라 그라디언트 텍스트, Orbitron 900 으로 격상 */
.nq-label{
    font-family:'Orbitron',sans-serif;
    font-size:.55em;letter-spacing:.12em;font-weight:900;
    background:linear-gradient(135deg,#00D9FF 0%,#A855F7 100%);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;color:transparent;
    text-align:center;line-height:1.1;padding-bottom:2px;
    border-bottom:1px solid var(--panel-br);width:100%
}
.nq-canvas, .hold-canvas{
    width:100%;aspect-ratio:1/1;display:block;
}
/* 첫 NEXT piece — cyan 글로우 강조 */
.nq-canvas[data-idx="0"]{
    width:108%;
    box-shadow:0 0 8px -1px rgba(0,217,255,0.35);
    border-radius:6px;
}
/* HOLD slot 탭 가능 (mobile) — 보라 글로우 (rotation 색깔과 매칭).
   비어있으면 dashed border, hold 사용 후 lock 되면 회색 처리. */
.hold-slot{cursor:pointer;-webkit-tap-highlight-color:transparent}
.hold-canvas{
    width:108%;
    box-shadow:0 0 8px -1px rgba(168,85,247,0.35);
    border-radius:6px;
}
.hold-slot.empty .hold-canvas{
    border:1px dashed rgba(168,85,247,0.4);
    box-shadow:none;
}
.hold-slot.locked{opacity:.45;cursor:not-allowed}
.hold-slot.locked .hold-canvas{box-shadow:none}

/* ---- Game row (HOLD | canvas | NEXT 가로 배치) ----
   양쪽 동일 폭 (54+6=60px) 두 panel → canvas 가 진짜 정중앙 정렬.
   playfield 비율 1:2 유지. */
.game-row{
    flex:1 1 0;min-height:0;
    width:100%;
    display:flex;flex-direction:row;
    align-items:stretch;
    gap:6px;
    justify-content:center
}

/* Hint 텍스트는 모바일에선 공간 우선 으로 숨기고, PC (≥1024px) 에서만
   바닥에 살려둠. 모바일은 한 화면에 게임+컨트롤이 다 들어와야 해서
   설명 텍스트가 들어갈 자리 없음. */
.hint{
    display:none;
    font-size:.72em;color:var(--muted-2);text-align:center;line-height:1.55;
    padding:0 16px;margin-top:4px;flex-shrink:0
}
.hint b{color:rgba(255,255,255,.65)}

/* ---- 키보드 가이드 (PC 전용) — playfield 왼쪽 아래에 표시 ----
   모바일 display:none. PC 에서 game-side 안 HOLD slot 아래에 위치.
   width 180px 에 맞게 compact 스타일. */
.kbd-ref{display:none;width:100%}
.kbd-ref-card{
    background:linear-gradient(165deg,rgba(26,26,48,.82),rgba(10,10,24,.95));
    border:1px solid var(--panel-br);
    border-radius:10px;
    padding:8px 10px;
    box-shadow:0 4px 14px -4px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.05);
}
.kbd-ref-title{
    font-family:'Orbitron',sans-serif;font-size:.62em;font-weight:900;
    background:linear-gradient(135deg,#00D9FF 0%,#A855F7 100%);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;color:transparent;
    letter-spacing:.12em;margin-bottom:6px;padding-bottom:4px;
    border-bottom:1px solid var(--panel-br);
}
.kbd-ref table{width:100%;border-collapse:collapse;font-size:.6em}
.kbd-ref td{padding:2px 0;color:var(--muted);line-height:1.55}
.kbd-ref td:first-child{white-space:nowrap;padding-right:6px}
.kbd-ref kbd{
    display:inline-block;
    padding:0px 4px;min-width:14px;text-align:center;
    background:rgba(255,255,255,.06);border:1px solid var(--panel-br);
    border-radius:3px;
    font-family:'JetBrains Mono','Courier New',monospace;font-size:.95em;
    color:rgba(255,255,255,.9);font-weight:700;
    margin:0 1px;
    box-shadow:inset 0 -1px 0 rgba(0,0,0,.25);
}

/* ---- Bottom-sheet leaderboard (mobile) ---- */
.sheet-backdrop{
    display:none;position:fixed;inset:0;background:rgba(5,5,15,.6);backdrop-filter:blur(4px);z-index:50
}
.sheet-backdrop.on{display:block}
.sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:60;
    background:linear-gradient(180deg,rgba(20,20,38,.97),rgba(10,10,26,.97));
    border-top:1px solid var(--panel-br);
    border-radius:18px 18px 0 0;
    transform:translateY(100%);transition:transform .25s ease-out;
    max-height:80vh;display:flex;flex-direction:column;
    padding-bottom:calc(var(--sb-bottom) + 8px)
}
.sheet.on{transform:translateY(0)}
.sheet .handle{width:48px;height:4px;background:rgba(255,255,255,.2);border-radius:99px;margin:8px auto}
.sheet h3{font-family:'Orbitron',sans-serif;font-size:.95em;font-weight:900;margin:0 14px 10px;letter-spacing:.06em}
.sheet .lb-tabs{display:flex;gap:6px;padding:0 14px 8px}
.sheet .lb-tab{flex:1;padding:8px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid var(--panel-br);color:var(--muted);font-size:.78em;font-weight:700;cursor:pointer;font-family:inherit}
.sheet .lb-tab.active{background:rgba(0,217,255,.12);border-color:rgba(0,217,255,.4);color:#00D9FF}
/* Mode 토글 (마라톤 vs 스프린트) — scope 토글 위에 별도 행. 보라 톤. */
.sheet .lb-mode-tabs .lb-tab.active{background:rgba(168,85,247,.14);border-color:rgba(168,85,247,.45);color:#D5B0FF}
.sheet .sheet-body{overflow-y:auto;padding:0 14px 14px;-webkit-overflow-scrolling:touch}
.lb-list{display:flex;flex-direction:column;gap:5px}
.lb-empty{padding:24px;text-align:center;color:var(--muted-2);font-size:.85em;line-height:1.6}
.lb-row{display:grid;grid-template-columns:42px 1fr 70px;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;background:rgba(255,255,255,.025);border:1px solid var(--panel-br);font-size:.84em}
.lb-row.self{background:rgba(255,230,109,.06);border-color:rgba(255,230,109,.25)}
.lb-rnk{font-family:'Orbitron',sans-serif;font-weight:900;text-align:center;font-size:.95em;color:var(--muted)}
.lb-rnk.gold{color:#FFE66D}
.lb-rnk.silver{color:#cbd5e1}
.lb-rnk.bronze{color:#f59e0b}
.lb-who{display:flex;align-items:center;gap:8px;min-width:0}
.lb-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#00D9FF,#A855F7);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.78em;color:#fff;overflow:hidden;flex-shrink:0}
.lb-av img{width:100%;height:100%;object-fit:cover}
.lb-nick{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-score{font-family:'Orbitron',sans-serif;font-weight:900;font-variant-numeric:tabular-nums;text-align:right;color:#fff}

#adSlot.ad-col{display:none}
.right-col{display:none}

/* ================================================================
   Tablet portrait / large phone landscape (768–1023px):
   같은 flex column 구조 유지, max-width 만 키워서 여유. canvas 가
   여전히 flex:1 로 남는 공간 차지하므로 layout 한 화면에 들어옴.
   ================================================================ */
@media(min-width:768px) and (max-width:1023px){
    .wrap{max-width:560px}
    .cbtn{padding:14px 8px;min-height:64px}
    .cbtn .ico{font-size:1.7em}
    .cbtn .lab{font-size:.65em}
    /* 회전 동그라미 태블릿 사이즈도 같이 키움 */
    .cbtn.rot-circle{width:64px;height:64px;min-height:64px;padding:0}
    .cbtn.rot-circle .ico{font-size:2em}
    /* 큰 화면에선 hint 다시 보이게 — 공간 여유 있음 */
    .hint{display:block}
}
/* ================================================================
   Tablet landscape / desktop (>= 1024px):
   고정 폭 3 컬럼: [광고 280] [게임 가변] [랭킹 360] — Roulette 패턴.
   1fr 1fr 1fr (균등 분배) 은 모니터 따라 여백 비율이 크게 변해 X.
   고정 폭 + max-width:1400 + margin:auto 로 어떤 모니터에서도
   playfield 는 항상 같은 비주얼, 양쪽 패널 폭 일정.
   ================================================================ */
@media(min-width:1024px){
    body{height:auto;max-height:none;overflow:auto;display:block}
    .topbar{position:sticky;top:0}
    .wrap{
        max-width:1400px;margin:0 auto;display:grid;
        grid-template-columns:280px minmax(420px,1fr) 360px;
        gap:24px;align-items:start;
        padding:22px 24px;min-height:calc(100dvh - 60px);
        flex:none
    }
    .left-col{
        grid-column:2;grid-row:1;flex:none;
        display:flex;flex-direction:column;gap:12px;align-items:center;
        width:100%;max-width:560px;justify-self:center;min-height:0
    }
    /* game-row: canvas-wrap 높이 (70vh) 따름. align-items:stretch 로
       game-side 가 canvas 높이까지 확장 → kbd-ref 가 bottom 에 위치. */
    .game-row{flex:none;width:100%;align-items:stretch;justify-content:center}
    /* game-side: HOLD slot 위 + kbd-ref 아래 column.
       align-items:flex-end → 둘 다 오른쪽 정렬 (canvas 에 붙음, gap 없음).
       width 160 — kbd-ref 가 column 폭 다 채우고, HOLD slot 은 우측 정렬. */
    .game-side{
        align-self:stretch;
        width:160px;
        flex-shrink:0;
        gap:14px;
        align-items:flex-end;
    }
    .canvas-wrap{
        flex:none;
        width:auto;max-width:330px;
        height:min(70vh, 660px);max-height:70vh;
        aspect-ratio:1/2
    }
    .hud{width:100%}
    /* PC 에선 모바일 컨트롤 버튼 안 씀 — 키보드 입력만. */
    .controls{display:none}
    /* 키보드 가이드 — game-side 안에서 bottom 으로 push. */
    .kbd-ref{
        display:block;
        width:100%;
        margin-top:auto;
    }
    /* Ads + leaderboard side panels — 고정 폭. */
    #adSlot.ad-col{
        grid-column:1;grid-row:1;display:block;width:100%;
        min-height:600px;margin:0;align-self:start;
        background:rgba(255,255,255,.02);
        border:1px dashed rgba(255,255,255,.06);border-radius:14px
    }
    .right-col{
        grid-column:3;grid-row:1;display:block;width:100%;
        align-self:start;position:relative
    }
    /* Mobile bottom-sheet → static side panel 으로 변환.
       !important 로 .sheet 의 fixed/transform 강제 override. */
    .right-col .sheet{
        position:static !important;
        transform:none !important;
        max-height:none;border-radius:18px;
        border:1px solid var(--panel-br);background:rgba(14,14,28,.55);
        padding-bottom:14px;width:100%;
        display:flex !important;
        left:auto;right:auto;bottom:auto;top:auto;
        z-index:auto;
        pointer-events:auto !important
    }
    .right-col .sheet .handle{display:none}
    .right-col .sheet-backdrop, .topbar .lb-btn{display:none}
    .right-col .sheet-body{max-height:calc(70vh - 120px)}
}
/* 좁은 PC (1024–1279) — 광고 컬럼 숨겨서 playfield 가 더 넓게. */
@media(min-width:1024px) and (max-width:1279px){
    .wrap{
        grid-template-columns:minmax(420px,1fr) 360px;
        max-width:1100px;
    }
    .left-col{grid-column:1}
    #adSlot.ad-col{display:none}

<main class="wrap">

        <!-- HOLD | canvas | NEXT 가로 배치 (.game-row).

        <div class="game-row">
            <div class="game-side">

                <aside class="hold-slot empty" id="holdSlot" role="button" tabindex="0" aria-label="홀드 (탭 또는 C 키)">

                </aside>

                            <tr><td><kbd>Z</kbd></td><td>CCW</td></tr>

                            <tr><td><kbd>↓</kbd><kbd>↓</kbd></td><td>Hard</td></tr>

                            <tr><td><kbd>Shift</kbd></td><td>Hold</td></tr>

            </div>

                        <polygon points="9,4 18,1 18,7" fill="currentColor"/>
                    </svg>
                </button>
                <button class="cbtn rot rot-circle" data-act="cw" type="button" aria-label="회전 (시계)">
                    <!-- CW: mirror image of CCW. 270° arc 3시→6시→9시→12시 + 화살촉 right. -->
                    <svg class="rot-svg" viewBox="0 0 32 32" aria-hidden="true">
                        <path d="M 28 16 A 12 12 0 1 1 16 4" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round"/>
                        <polygon points="23,4 14,1 14,7" fill="currentColor"/>
                    </svg>
                </button>
                <button class="cbtn move" data-act="right" type="button" aria-label="오른쪽">
                    <span class="ico">▶</span><span class="lab">RIGHT</span>

                     2개 였으나 둘 다 동일 동작이라 통합. -->
                <button class="cbtn hold" data-act="hold" type="button" aria-label="홀드 (swap)">
                    <span class="ico">⇄</span><span class="lab">HOLD</span>
                </button>
                <button class="cbtn drop" data-act="drop" type="button" aria-label="드롭 (더블탭=하드, 홀드=소프트)">

/* applyLanguage — DOM 의 정적 텍스트 갱신. lang 변경 시 호출. */

    /* topbar */

    /* H1 텍스트 (게임 타이틀) — SVG 뒤에 텍스트만 갱신 */
    const h1 = document.querySelector('.topbar h1');
    if(h1){

        h1.innerHTML = (svg ? svg.outerHTML : '') + tT('gameTitle');
    }
    /* Auth chip — 로그인 상태에 따라 nickname 또는 'Login' */
    const authSlot = $('authSlot');
    if(authSlot){
        if(me){
            const nick = (window._lpMyNickname) || tT('you');
            authSlot.innerHTML = '<a class="auth-chip" href="/me/">'+esc(nick)+'</a>';
        } else {
            authSlot.innerHTML = '<a class="auth-chip" href="/auth/?next='+encodeURIComponent(location.pathname)+'">'+esc(tT('login'))+'</a>';
        }
    }
    /* Start overlay */
    const ovTitle = $('ovTitle'); if(ovTitle) ovTitle.textContent = tT('subtitle');
    const ovDesc = $('ovDesc'); if(ovDesc) ovDesc.innerHTML = tT('desc');
    const ovBtn = $('ovBtn'); if(ovBtn) ovBtn.textContent = tT('start');
    const modeDesc = $('modeDesc');
    if(modeDesc && typeof gameMode === 'string'){
        modeDesc.textContent = (gameMode === 'sprint') ? tT('sprintDesc') : tT('marathonDesc');
    }
    /* Mode tabs (start overlay 에 있는 .mode-tab) */
    document.querySelectorAll('.mode-tab[data-mode="marathon"]').forEach(b => b.textContent = tT('marathon'));
    document.querySelectorAll('.mode-tab[data-mode="sprint"]').forEach(b => b.textContent = tT('sprint'));
    /* Leaderboard sheet 모드 토글 */
    document.querySelectorAll('.lb-tab[data-lbmode="marathon"]').forEach(b => b.textContent = tT('marathonScore'));
    document.querySelectorAll('.lb-tab[data-lbmode="sprint"]').forEach(b => b.textContent = tT('sprintTime'));
    /* Leaderboard sheet 스코프 토글 */
    document.querySelectorAll('.lb-tab[data-scope="world"]').forEach(b => b.textContent = tT('world'));
    document.querySelectorAll('.lb-tab[data-scope="today"]').forEach(b => b.textContent = tT('today'));
    document.querySelectorAll('.lb-tab[data-scope="friends"]').forEach(b => b.textContent = tT('friends'));
    /* Sheet h3 + lbList 초기 텍스트 */
    const sh3 = document.querySelector('.sheet h3'); if(sh3) sh3.textContent = '🏆 ' + tT('ranking');
    const lbList = $('lbList'); if(lbList && lbList.innerHTML.includes('lb-empty')){
        lbList.innerHTML = '<div class="lb-empty">'+tT('loading')+'</div>';
    }
    /* HUD 라벨 (.ss .l) — SCORE / TIME 동적, LINES / LEVEL 정적 */
    const sLabel = $('scoreLabel');
    if(sLabel){
        sLabel.textContent = (typeof gameMode === 'string' && gameMode === 'sprint') ? tT('time') : tT('score');
    }
    const linesLabels = document.querySelectorAll('#linesNow + .l, .ss .l');
    /* HUD 라벨 — innerHTML 매번 다 바꾸기엔 fragile, 직접 selector 로 대상화. */
