/* ---- Input ---- */
/* 화살표 ↓ 더블탭 / 홀드 분기 — mobile DROP 버튼과 동일 패턴.
   짧게 두 번 누르면 hard drop, 누르고 있으면 soft drop. */
const KEY_DROP_DOUBLE_TAP_WINDOW = 280;
const KEY_DROP_HOLD_THRESHOLD = 130;
let keyDropPressedAt = 0;
let keyDropLastTapAt = 0;
let keyDropPressActive = false;
let keyDropSoftHoldTimer = null;

function onArrowDownPress(){
    /* keydown 자동 반복 (browser autorepeat) 무시 — initial press 만 처리 */
    if(keyDropPressActive) return;
    const now = performance.now();
    /* 직전 탭 후 280ms 이내 재 press → hard drop */
    if(now - keyDropLastTapAt < KEY_DROP_DOUBLE_TAP_WINDOW){
        hardDrop();
        keyDropLastTapAt = 0;
        keyDropPressActive = false;
        return;
    }
    keyDropPressActive = true;
    keyDropPressedAt = now;
    if(keyDropSoftHoldTimer) clearTimeout(keyDropSoftHoldTimer);
    keyDropSoftHoldTimer = setTimeout(function(){
        if(keyDropPressActive){
            softDropping = true;
            softDrop();
        }
        keyDropSoftHoldTimer = null;
    }, KEY_DROP_HOLD_THRESHOLD);
}
function onArrowDownRelease(){
    const now = performance.now();
    const heldFor = now - keyDropPressedAt;
    if(keyDropSoftHoldTimer){
        clearTimeout(keyDropSoftHoldTimer);
        keyDropSoftHoldTimer = null;
    }
    if(softDropping) softDropping = false;
    /* hold threshold 미만에 release = single tap → 다음 탭 위해 시간 기록 */
    if(keyDropPressActive && heldFor < KEY_DROP_HOLD_THRESHOLD){
        keyDropLastTapAt = now;
    }
    keyDropPressActive = false;
}

function onKey(e){
    const k = e.key;
    if(!running && !gameOverFlag){
        if(k === 'Enter') startGame();
        return;
    }
    if(gameOverFlag){
        if(k === 'Enter') startGame();
        return;
    }
    if(paused){
        if(k === ' '){
            paused = false; syncPauseUI();
            try { TetrisBGM.resume(); } catch(_){}
            e.preventDefault();
        }
        return;
    }
    /* 좌우 키 — DAS/ARR. e.repeat 는 OS typematic auto-repeat → 무시.
       처음 누름에만 첫 이동 + DAS/ARR 시작. keyup 까지 우리 timer 가
       처리. 키 osmolality 환경 (Mac vs Win) 차이 없이 일관된 속도. */
    if(k === 'ArrowLeft' || k === 'a' || k === 'A'){
        if(!e.repeat){ moveX(-1); startAutoShift(-1); }
        e.preventDefault();
    }
    else if(k === 'ArrowRight' || k === 'd' || k === 'D'){
        if(!e.repeat){ moveX(1); startAutoShift(1); }
        e.preventDefault();
    }
    /* Modern Tetris 표준 키매핑:
         ↑ / X = CW (시계방향)
         Z     = CCW (반시계방향)
       e.repeat 무시 — OS auto-repeat 로 인한 회전 폭주 방지. inputState
       업데이트는 첫 press 에서만, IRS/IHS 가 이를 기반으로 spawn 처리. */
    else if(k === 'ArrowUp' || k === 'x' || k === 'X'){
        if(!e.repeat){
            rotate(1);
            inputState.cw = true; inputState.cwConsumed = false;
        }
        e.preventDefault();
    }
    else if(k === 'z' || k === 'Z'){
        if(!e.repeat){
            rotate(-1);
            inputState.ccw = true; inputState.ccwConsumed = false;
        }
        e.preventDefault();
    }
    /* C / V / Shift 키 = HOLD (modern Tetris 표준 매핑 — 통합 swap 동작).
       V 와 Shift 는 손 위치 다양성 위해 alias. */
    else if(k === 'c' || k === 'C' || k === 'v' || k === 'V' ||
            k === 'Shift'){
        if(!e.repeat){
            holdCurrentPiece();
            inputState.hold = true; inputState.holdConsumed = false;
        }
        e.preventDefault();
    }
    /* 화살표 ↓ — 더블탭 = hard, 홀드 = soft. S 키는 단순 soft (legacy). */
    else if(k === 'ArrowDown'){ onArrowDownPress(); e.preventDefault(); }
    else if(k === 's' || k === 'S'){ softDropping = true; e.preventDefault(); }
    else if(k === ' '){ hardDrop(); e.preventDefault(); }
    else if(k === 'p' || k === 'P'){
        paused = !paused; syncPauseUI();
        try { if(paused) TetrisBGM.pause(); else TetrisBGM.resume(); } catch(_){}
    }
}
function onKeyUp(e){
    const k = e.key;
    if(k === 'ArrowDown'){ onArrowDownRelease(); }
    else if(k === 's' || k === 'S'){ softDropping = false; }
    /* 좌우 키 release → DAS/ARR timer 정리 */
    else if(k === 'ArrowLeft' || k === 'a' || k === 'A'){ stopAutoShift(-1); }
    else if(k === 'ArrowRight' || k === 'd' || k === 'D'){ stopAutoShift(1); }
    /* 회전/홀드 키 release → IRS/IHS state 해제 (다음 press 가 다시 arm). */
    else if(k === 'ArrowUp' || k === 'x' || k === 'X'){
        inputState.cw = false; inputState.cwConsumed = false;
    }
    else if(k === 'z' || k === 'Z'){
        inputState.ccw = false; inputState.ccwConsumed = false;
    }
    else if(k === 'c' || k === 'C' || k === 'v' || k === 'V' || k === 'Shift'){
        inputState.hold = false; inputState.holdConsumed = false;
    }
}
document.addEventListener('keydown', onKey);
document.addEventListener('keyup', onKeyUp);
/* 창 blur/visibilitychange 시 stuck-key 방지 — 키 누른 채 alt-tab 하면
   keyup 안 와서 timer 가 계속 firing. 안전 cleanup. */
window.addEventListener('blur', () => {
    stopAutoShift(-1); stopAutoShift(1);
    softDropping = false;
    /* IRS/IHS state 도 reset (stuck input 방지) */
    inputState.cw = inputState.ccw = inputState.hold = false;
    inputState.cwConsumed = inputState.ccwConsumed = inputState.holdConsumed = false;
});

/* Touch buttons.
   - left/right: DAS (Delayed Auto Shift) + ARR (Auto Repeat Rate) — modern
     Tetris guideline 표준. 첫 탭 즉시 1칸 이동, DAS_MS 동안 hold 유지 시
     ARR_MS 간격으로 자동 반복. 사용자 의도 (single move) 와 long-press
     (slide) 깔끔히 분리.
       · DAS_MS = 150 — 짧을수록 민감, 너무 짧으면 single tap 이 의도
         치 않게 slide 로 이어짐. 주류 모바일 Tetris 평균.
       · ARR_MS = 40 — 작을수록 빠른 slide. 0 에 가까우면 instant
         slide (TETR.IO style), 50 이상은 답답.
   - ccw/cw: single-shot per tap, inscribed-square 만 인식 (corner dead zone).
   - drop: 더블탭 = hard, 홀드 = soft (자세히는 onDropPress/onDropRelease). */
const DAS_MS = 150;
const ARR_MS = 40;
/* 좌우 별도 timer — 동시에 양쪽 누르는 경우 (드물지만) 각자 독립. */
let _autoShiftTimers = { left: null, right: null };
/* 시작 — 첫 이동은 caller 가 이미 했음. 이 함수는 DAS 후 ARR 반복 셋업.
   stopAutoShift 가 호출되기 전엔 계속 반복. */
function startAutoShift(dir){
    const key = dir < 0 ? 'left' : 'right';
    stopAutoShift(dir);   /* 이전 timer 있으면 정리 (안전장치) */
    /* DAS: 150ms 후 첫 자동 반복 시작, 그 후 ARR 간격으로 계속. */
    _autoShiftTimers[key] = setTimeout(function arr(){
        moveX(dir);
        _autoShiftTimers[key] = setInterval(() => moveX(dir), ARR_MS);
    }, DAS_MS);
}
function stopAutoShift(dir){
    const key = dir < 0 ? 'left' : 'right';
    if(_autoShiftTimers[key]){
        clearTimeout(_autoShiftTimers[key]);
        clearInterval(_autoShiftTimers[key]);
        _autoShiftTimers[key] = null;
    }
}
/* 호환용 — 이전 _holdTimers 참조 잔재 보존 (현재는 미사용). */
let _holdTimers = {};
function onCtrlPress(act){
    switch(act){
        case 'left':  moveX(-1); break;
        case 'right': moveX(1); break;
        case 'ccw':   rotate(-1); break;
        case 'cw':    rotate(1); break;
        /* HOLD swap — canHold 가 false 면 holdCurrentPiece 내부에서
           자동 무시되므로 추가 체크 불필요. */
        case 'hold':
            holdCurrentPiece();
            break;
        /* drop 은 별도 핸들러에서 처리 (더블탭/홀드 분기) */
    }
}
function onCtrlRelease(_act){ /* nothing — DROP 은 별도 처리 */ }

/* ---- DROP 버튼 더블탭/홀드 분기 ----
   사람 반응속도 + 누르는 속도 고려한 임계값:
     · DROP_HOLD_THRESHOLD = 130ms — 이 이상 눌러야 soft drop 시작
       (일반 탭 60~110ms 보다 길어서 의도치 않은 soft 방지)
     · DROP_DOUBLE_TAP_WINDOW = 280ms — 직전 탭 시간차가 이 이내면
       더블탭으로 인식 (실측 사용자 더블탭 평균 200~280ms)
   동작 흐름:
     [press]
       1. 직전 탭 시간차 체크 → 280ms 이내면 hard drop 즉시 발사 후 종료
       2. 그렇지 않으면 130ms hold timer arm
     [hold]
       3. 130ms 경과 시 softDropping = true, softDrop() 호출 시작
     [release]
       4. timer 정리, softDropping = false
       5. hold 130ms 미만에 release 됐으면 → "탭 1회" 로 기록
          (다음 press 가 280ms 이내면 hard) */
const DROP_HOLD_THRESHOLD = 130;
const DROP_DOUBLE_TAP_WINDOW = 280;
let dropPressedAt = 0;
let dropLastTapAt = 0;
let dropPressActive = false;
let dropSoftHoldTimer = null;
const dropBtnRef = function(){return document.querySelector('.cbtn.drop')};

function onDropPress(){
    const now = performance.now();
    /* [1] 더블탭 감지 — 직전 single tap 후 이 window 안에 다시 누름 */
    if(now - dropLastTapAt < DROP_DOUBLE_TAP_WINDOW){
        hardDrop();
        dropLastTapAt = 0;        /* 연속 더블탭 방지 reset */
        dropPressActive = false;  /* 이번 press 는 hard 로 소진 */
        return;
    }
    /* [2] 홀드 감지 timer arm */
    dropPressActive = true;
    dropPressedAt = now;
    if(dropSoftHoldTimer) clearTimeout(dropSoftHoldTimer);
    dropSoftHoldTimer = setTimeout(function(){
        if(dropPressActive){
            softDropping = true;
            softDrop();
            const b = dropBtnRef();
            if(b) b.classList.add('soft-active');   /* 주황 글로우 표시 */
        }
        dropSoftHoldTimer = null;
    }, DROP_HOLD_THRESHOLD);
}

function onDropRelease(){
    const now = performance.now();
    const heldFor = now - dropPressedAt;

    if(dropSoftHoldTimer){
        clearTimeout(dropSoftHoldTimer);
        dropSoftHoldTimer = null;
    }
    if(softDropping){
        softDropping = false;
        const b = dropBtnRef();
        if(b) b.classList.remove('soft-active');
    }
    /* hold threshold 미만이면 single tap 으로 기록 → 다음 press 가
       window 안에 들어오면 hard drop. soft drop 까지 갔으면 단독 동작
       으로 이미 끝, lastTapAt 기록 안 함 (의도치 않은 hard drop 방지). */
    if(dropPressActive && heldFor < DROP_HOLD_THRESHOLD){
        dropLastTapAt = now;
    }
    dropPressActive = false;
}

/* 동그라미 회전 버튼의 inscribed 정사각형 hit-test.
   원 안에 내접한 정사각형 반쪽 변 길이 = D / (2√2) ≈ 0.354D.
   터치 좌표가 버튼 중심에서 (halfSide, halfSide) 박스 안이면 valid.
   원의 corner-bulge (대각선 모서리) 부분은 dead zone — 옆 LEFT/RIGHT
   tap 이 회전으로 잘못 인식되는 일 방지. */
function isInsideInscribedSquare(btn, clientX, clientY){
    const rect = btn.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const halfSide = Math.min(rect.width, rect.height) / (2 * Math.sqrt(2));
    return Math.abs(clientX - cx) <= halfSide && Math.abs(clientY - cy) <= halfSide;
}
/* Trigger neon flash animation on a button. Removes any in-flight
   .flash class first so the keyframe restarts even on rapid double-
   tap (browsers don't restart animations on same-frame class re-add
   without a reflow read). */
function flashBtn(b){
    b.classList.remove('flash');
    /* Force layout recalc so removing+adding within the same frame
       still triggers a fresh animation cycle. */
    void b.offsetWidth;
    b.classList.add('flash');
}
/* Cleanup on animation end so the class doesn't accumulate. */
document.addEventListener('animationend', (e) => {
    if(e.target.classList && e.target.classList.contains('cbtn')
       && (e.animationName === 'cbtn-flash' || e.animationName === 'cbtn-flash-circle')){
        e.target.classList.remove('flash');
    }
}, true);

document.querySelectorAll('.cbtn').forEach(b => {
    const act = b.dataset.act;
    const isCircle = b.classList.contains('rot-circle');
    const isDrop = act === 'drop';
    /* press = touchstart or mousedown; we wire both for desktop testing.
       {passive:false} on touchstart so preventDefault() blocks page scroll. */
    const press = (e) => {
        e.preventDefault();
        if(!running) return;
        /* 회전 동그라미 — 내접 정사각형 안에 들어온 터치만 인식.
           corner 영역은 dead zone (옆 버튼 오인식 방지). */
        if(isCircle){
            const t = e.touches ? e.touches[0] : e;
            if(t && !isInsideInscribedSquare(b, t.clientX, t.clientY)){
                return;
            }
        }
        if(paused){
            paused = false; syncPauseUI();
            try { TetrisBGM.resume(); } catch(_){}
        }
        flashBtn(b);   /* 매 press 마다 네온 flash */
        if(isDrop){
            onDropPress();
            return;
        }
        onCtrlPress(act);
        /* DAS/ARR — 좌우 long-press 시 자동 반복. 첫 이동은 위 onCtrlPress
           가 처리, 여기선 DAS 후 ARR setup 만. */
        if(act === 'left'){ startAutoShift(-1); }
        else if(act === 'right'){ startAutoShift(1); }
        /* IRS/IHS state — 회전/홀드 버튼 누르고 있는 동안 spawn 시 적용. */
        else if(act === 'cw'){ inputState.cw = true; inputState.cwConsumed = false; }
        else if(act === 'ccw'){ inputState.ccw = true; inputState.ccwConsumed = false; }
        else if(act === 'hold'){ inputState.hold = true; inputState.holdConsumed = false; }
    };
    const release = (e) => {
        if(act === 'left'){ stopAutoShift(-1); }
        else if(act === 'right'){ stopAutoShift(1); }
        else if(act === 'cw'){ inputState.cw = false; inputState.cwConsumed = false; }
        else if(act === 'ccw'){ inputState.ccw = false; inputState.ccwConsumed = false; }
        else if(act === 'hold'){ inputState.hold = false; inputState.holdConsumed = false; }
        if(isDrop){
            onDropRelease();
        } else {
            onCtrlRelease(act);
        }
    };
    b.addEventListener('touchstart', press, {passive: false});
    b.addEventListener('touchend', release);
    b.addEventListener('touchcancel', release);
    b.addEventListener('mousedown', press);
    b.addEventListener('mouseup', release);
    b.addEventListener('mouseleave', release);
});

/* Pause button */
$('pauseBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    if(!running || gameOverFlag) return;
    paused = !paused;
    syncPauseUI();
    try { if(paused) TetrisBGM.pause(); else TetrisBGM.resume(); } catch(_){}
});

/* HOLD slot 탭 — mobile 에서 C 키 대신. canHold=false 면 무시.
   tap 직후 paused 면 resume (다른 컨트롤 버튼과 동일 동작). */
const holdSlotEl = $('holdSlot');
if(holdSlotEl){
    const holdHandler = (e) => {

        if(!running || gameOverFlag) return;
        if(paused){

        }
        holdCurrentPiece();
    };

    holdSlotEl.addEventListener('click', holdHandler);
}

/* ---- Canvas swipe gestures (mobile) — TETR.IO mobile / Tetris N3TWORK 패턴.
   기본 버튼은 그대로 유지 (alternative input). 캔버스 위 제스처:
     · Tap (12px 이내, 200ms 이내):           rotate CW
     · 가로 드래그 (cell 폭 cross 시):        moveX (1:1 finger-tracking)
     · 빠른 아래 swipe (80px+, <300ms):       hard drop
     · 느린 아래 드래그 (40px+ 누적):         soft drop (떼면 멈춤)
     · 위 swipe (60px+, <300ms):              hard drop (대안)
   터치만 처리 (mouse 는 데스크탑 키보드 사용 가정).
   touchstart 가 canvas 에서 시작한 경우만 인식 — 버튼 영역 침범 X. */
(function setupCanvasGestures(){
    let startX = 0, startY = 0, startT = 0;
    let lastX = 0, lastY = 0;
    let cellPx = 0;            /* DPR-적응형 cell 픽셀 폭 (ResizeObserver 가 갱신) */
    let dragMoveAccum = 0;     /* 가로 드래그 누적 → cell 단위 변환 */
    let totalDownDelta = 0;    /* 누적 아래 이동 (soft drop 트리거용) */
    let softDropActive = false;
    let active = false;

    function recalcCellPx(){
        const r = canvas.getBoundingClientRect();
        cellPx = r.width / COLS;
    }
    recalcCellPx();
    window.addEventListener('resize', recalcCellPx);

    canvas.addEventListener('touchstart', (e) => {
        if(!running || gameOverFlag || paused) return;
        if(e.touches.length !== 1) return;
        const t = e.touches[0];
        startX = lastX = t.clientX;
        startY = lastY = t.clientY;
        startT = performance.now();
        dragMoveAccum = 0;
        totalDownDelta = 0;
        softDropActive = false;
        active = true;
        recalcCellPx();
        e.preventDefault();
    }, {passive: false});

    canvas.addEventListener('touchmove', (e) => {
        if(!active || e.touches.length !== 1) return;
        const t = e.touches[0];
        const dx = t.clientX - lastX;
        const dy = t.clientY - lastY;
        lastX = t.clientX;
        lastY = t.clientY;

        /* 가로 드래그 — cell 폭 cross 시마다 1칸 이동.
           누적 dragMoveAccum 으로 손가락 따라가는 자연스러운 1:1 매핑. */
        if(cellPx > 0){
            dragMoveAccum += dx;
            while(dragMoveAccum >= cellPx){ moveX(1); dragMoveAccum -= cellPx; }
            while(dragMoveAccum <= -cellPx){ moveX(-1); dragMoveAccum += cellPx; }
        }

        /* 세로 — 아래로 누적 이동 시 soft drop 활성. 위로 swipe 는 release
           시점에 분류 (hard drop 후보). */
        if(dy > 0) totalDownDelta += dy;
        if(!softDropActive && totalDownDelta > 40){
            softDropActive = true;
            softDropping = true;
        }
        e.preventDefault();
    }, {passive: false});

    function endTouch(e){
        if(!active) return;
        active = false;
        const endT = performance.now();
        const elapsed = endT - startT;
        const totalDX = lastX - startX;
        const totalDY = lastY - startY;
        const absDX = Math.abs(totalDX);
        const absDY = Math.abs(totalDY);
        /* soft drop 활성화 됐었으면 release 시 해제 */
        if(softDropActive){ softDropping = false; softDropActive = false; }

        /* Tap — 거의 안 움직이고 짧은 시간 → rotate CW */
        if(absDX < 12 && absDY < 12 && elapsed < 200){
            rotate(1);
            return;
        }
        /* 빠른 아래 swipe — 80px+ 아래 + 300ms 이내 → hard drop */
        if(totalDY > 80 && elapsed < 300 && absDY > absDX){
            hardDrop();
            return;
        }
        /* 빠른 위 swipe — 60px+ 위 + 300ms 이내 → hard drop (대안) */
        if(totalDY < -60 && elapsed < 300 && absDY > absDX){
            hardDrop();
            return;
        }
        /* 그 외 — 가로 드래그 결과 이미 적용됐으므로 추가 동작 없음 */
    }
    canvas.addEventListener('touchend', endTouch);
    canvas.addEventListener('touchcancel', endTouch);
})();

/* ---- Mode tabs (Marathon vs Sprint) ----
   start overlay 에 항상 보이는 토글. localStorage 에 직전 선택 기억. */
const MODE_DESCS = {
    marathon: '레벨업 + 무한 도전. 점수 + 라인 + 레벨 기록.',
    sprint:   '40줄 클리어 시간 도전. 빠를수록 좋아요!'
};
function selectMode(mode){
    if(mode !== 'marathon' && mode !== 'sprint') mode = 'marathon';
    gameMode = mode;
    document.querySelectorAll('.mode-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.mode === mode);
    });
    const desc = $('modeDesc');
    if(desc) desc.textContent = MODE_DESCS[mode];
    /* HUD 의 SCORE 라벨도 모드 따라 갱신 — Sprint 모드에선 점수 칸이
       elapsed 시간을 표시하므로 라벨이 "TIME" 이어야 의미 일치. */
    const sl = $('scoreLabel');
    if(sl) sl.textContent = (mode === 'sprint') ? 'TIME' : 'SCORE';
    try { localStorage.setItem('tetris-mode', mode); } catch(_){}
}
/* 초기 모드 — 저장된 값 또는 marathon */
try {
    const saved = localStorage.getItem('tetris-mode');
    if(saved === 'sprint' || saved === 'marathon') selectMode(saved);
} catch(_){}
document.querySelectorAll('.mode-tab').forEach(t => {

let currentScope='world';
/* lbMode = ranking 모드. 'marathon' (점수) vs 'sprint' (시간). 모드별
   별도 RPC + 다른 컬럼 표시. 시작 모드는 직전 게임 모드 따라감. */
let lbMode = (typeof gameMode === 'string' ? gameMode : 'marathon');
/* scope 토글 (월드/오늘/친구) — 기존 동작. */
document.querySelectorAll('.lb-tab[data-scope]').forEach(b=>{
    b.addEventListener('click', ()=>{
        document.querySelectorAll('.lb-tab[data-scope]').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        currentScope=b.dataset.scope;
        loadLeaderboard(currentScope);
    });
});
/* 모드 토글 (마라톤 vs 스프린트) — RPC 자체가 다름. */
document.querySelectorAll('.lb-tab[data-lbmode]').forEach(b=>{
    b.addEventListener('click', ()=>{
        document.querySelectorAll('.lb-tab[data-lbmode]').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        lbMode=b.dataset.lbmode;
        loadLeaderboard(currentScope);
    });
});
function syncLbModeUI(){
    document.querySelectorAll('.lb-tab[data-lbmode]').forEach(x => {
        x.classList.toggle('active', x.dataset.lbmode === lbMode);
    });
}
/* Sprint duration_ms → m:ss.cs 표시. */
function fmtMs(ms){
    if(typeof formatSprintTime === 'function') return formatSprintTime(ms);
    const cs = Math.max(0, Math.floor(ms / 10));
    const totalSec = Math.floor(cs / 100);
    const m = Math.floor(totalSec / 60);
    const s = totalSec % 60;
    const c = cs % 100;
    return m + ':' + (s<10?'0':'') + s + '.' + (c<10?'0':'') + c;
}
async function loadLeaderboard(scope){
    syncLbModeUI();
    $('lbList').innerHTML='<div class="lb-empty">불러오는 중…</div>';
    try{
        const rpcName = lbMode === 'sprint' ? 'tetris_sprint_leaderboard' : 'tetris_leaderboard';
        const {data,error}=await getSupabase().rpc(rpcName,{p_scope:scope,p_limit:50});
        try{ console.log('[tetris.leaderboard]', lbMode, scope, error?'error':(data?data.length+' rows':'null'), error?error.message:''); }catch(_){}
        if(error||!data){ $('lbList').innerHTML='<div class="lb-empty">기록 없음</div>'; return; }
        if(!data.length){
            const emptyMsg = scope==='today'
                ? '🌅 오늘 (한국 시간 기준) 기록이 아직 없어요.<br>첫 기록의 주인공이 되세요!'
                : scope==='friends'
                ? '친구가 아직 플레이하지 않았어요.<br>친구 추가는 /messages/ 에서!'
                : '첫 기록의 주인공이 되세요!';
            $('lbList').innerHTML='<div class="lb-empty">'+emptyMsg+'</div>';
            return;
        }
        $('lbList').innerHTML=data.map(row=>{
            const isSelf=me && row.user_id===me.id;
            const rnkCls=row.rnk===1?' gold':row.rnk===2?' silver':row.rnk===3?' bronze':'';
            const av=row.avatar_url
                ? '<div class="lb-av"><img src="'+esc(row.avatar_url)+'" referrerpolicy="no-referrer" alt=""></div>'
                : '<div class="lb-av">'+esc(initials(row.nickname))+'</div>';
            /* Marathon: best_score 점수.  Sprint: best_duration_ms 시간 (낮을수록 좋음). */
            const scoreCell = (lbMode === 'sprint')
                ? fmtMs(row.best_duration_ms)
                : row.best_score.toLocaleString();
            return '<div class="lb-row'+(isSelf?' self':'')+'">'
                 +'<div class="lb-rnk'+rnkCls+'">'+(row.rnk<=3?(['🥇','🥈','🥉'][row.rnk-1]):('#'+row.rnk))+'</div>'
                 +'<div class="lb-who">'+av+'<div class="lb-nick">'+esc(row.nickname||'?')+'</div></div>'
                 +'<div class="lb-score">'+scoreCell+'</div>'
                 +'</div>';
        }).join('');
    }catch(_){$('lbList').innerHTML='<div class="lb-empty">불러오기 실패</div>';}
}

/* ---- Boot ---- */
(async()=>{
    await initAuth();
    fitCanvas();
    /* Initial render shows empty board behind the START overlay. */
    board = Array.from({length: ROWS}, () => Array(COLS).fill(null));
    invalidateBoardLayer();
    render();
    if(matchMedia('(min-width:1024px)').matches) loadLeaderboard('world');
})();

if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(r=>r.forEach(s=>s.unregister())).catch(()=>{})}
if('caches' in window){caches.keys().then(k=>k.forEach(n=>caches.delete(n))).catch(()=>{})}
