    <style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --dark:#0A0A1A;--primary:#FF6B35;--accent:#FFE66D;--accent-warm:#FF9A3C;
    --danger:#FF3366;--success:#00E676;--cyan:#00D9FF;
    --muted:rgba(255,255,255,.55);--muted-2:rgba(255,255,255,.35);
    --panel-br:rgba(255,255,255,.07);
    --wait:#FF3C3C; --go:#00E676;
}
html,body{height:100%}
body{
    font-family:'Noto Sans KR',sans-serif;background:var(--dark);color:#fff;
    min-height:100dvh;overflow-x:hidden;letter-spacing:.01em;
    background-image:radial-gradient(ellipse at 50% 20%,rgba(255,230,109,.04) 0%,transparent 55%),linear-gradient(180deg,#0A0A1A 0%,#10101F 50%,#0A0A1A 100%)
}

/* Top bar */
.topbar{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--panel-br);position:sticky;top:0;z-index:10;background:rgba(10,10,26,.8);backdrop-filter:blur(14px)}
.topbar .home{text-decoration:none;color:rgba(255,255,255,.8);padding:8px 14px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);font-size:.82em;font-weight:700;transition:all .18s}
.topbar .home:hover{background:rgba(255,230,109,.08);border-color:rgba(255,230,109,.35);color:#FFE66D}
.topbar h1{font-family:'Orbitron','Noto Sans KR',sans-serif;font-size:1.1em;font-weight:900;letter-spacing:.02em;margin:0;flex:1;background:linear-gradient(135deg,#FFE66D,#FF9A3C,#FF6B8B);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar .auth-chip{padding:6px 12px;border-radius:999px;background:rgba(255,230,109,.1);border:1px solid rgba(255,230,109,.25);color:#FFE66D;font-size:.78em;font-weight:700;text-decoration:none;transition:all .18s;cursor:pointer}
.topbar .auth-chip:hover{background:rgba(255,230,109,.18)}

/* App grid: desktop = play | leaderboard; mobile = stacked */
.app{max-width:1100px;margin:0 auto;padding:20px;display:grid;grid-template-columns:1fr 360px;gap:20px}
@media(max-width:900px){ .app{grid-template-columns:1fr;padding:14px} }

/* Play pane */
.play-pane{display:flex;flex-direction:column;gap:14px}
.instr{font-size:.9em;color:var(--muted);line-height:1.55;padding:10px 14px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid rgba(255,255,255,.05)}
.instr b{color:#fff}

.stage{
    width:100%;min-height:360px;
    border-radius:22px;
    border:2px solid transparent;
    background:#1a1a2e;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    cursor:pointer;user-select:none;-webkit-user-select:none;
    padding:30px;text-align:center;transition:background .15s,border-color .15s;
    position:relative;overflow:hidden;
}
@media(max-width:900px){ .stage{min-height:300px} }
.stage.idle{background:linear-gradient(135deg,#1e1e33,#16162a)}
.stage.wait{background:var(--wait);border-color:#ff6b6b}
.stage.go{background:var(--go);border-color:#00ff88;animation:goFlash .2s ease}
@keyframes goFlash{from{transform:scale(.98)}to{transform:scale(1)}}
.stage.too-early{background:#6a1a1a;border-color:#ff3366}
.stage.result{background:linear-gradient(135deg,#1a2a1a,#0f1a1f)}
.stage-icon{font-size:3em;margin-bottom:12px}

.stage-sub{font-size:.95em;color:rgba(255,255,255,.82);max-width:380px;line-height:1.5}

.stage-hint{margin-top:14px;font-size:.82em;color:rgba(255,255,255,.55)}

/* My stats strip */
.my-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

.stat .v{font-family:'Orbitron',sans-serif;font-size:1.2em;font-weight:900;color:#fff}
.stat .v.dim{color:rgba(255,255,255,.35)}
.stat .l{font-size:.65em;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);margin-top:3px;font-weight:700}
@media(max-width:560px){ .my-stats{grid-template-columns:repeat(2,1fr)} }

/* Recent */
.recent{background:rgba(255,255,255,.02);border:1px solid var(--panel-br);border-radius:14px;padding:12px 14px}
.recent h3{font-size:.7em;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2);font-weight:800;margin-bottom:10px}

.chip{padding:5px 10px;border-radius:999px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);font-family:'Orbitron',sans-serif;font-size:.78em;font-weight:700;color:rgba(255,255,255,.85);font-variant-numeric:tabular-nums}

.lb-tab{flex:1;padding:8px 12px;border:0;background:transparent;color:rgba(255,255,255,.55);cursor:pointer;font-family:inherit;font-size:.78em;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border-radius:8px;transition:all .18s}
.lb-tab.active{background:rgba(255,230,109,.12);color:#FFE66D}
.lb-list{background:rgba(255,255,255,.02);border:1px solid var(--panel-br);border-radius:14px;overflow:hidden}
.lb-row{display:grid;grid-template-columns:36px 1fr 80px;gap:10px;align-items:center;padding:9px 12px;border-bottom:1px solid var(--panel-br);transition:background .15s}
.lb-row:last-child{border-bottom:0}
.lb-row:hover{background:rgba(255,255,255,.02)}
.lb-row.self{background:rgba(255,230,109,.06);border-left:3px solid #FFE66D;padding-left:9px}
.lb-rnk{font-family:'Orbitron',sans-serif;font-weight:900;font-size:.9em;color:var(--muted-2);text-align:center}
.lb-rnk.gold{color:#FFE66D}.lb-rnk.silver{color:#C0C0C0}.lb-rnk.bronze{color:#CD7F32}
.lb-who{display:flex;align-items:center;gap:8px;min-width:0}
.lb-av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#FF6B35,#FF6B8B);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-weight:900;font-size:.72em;color:#fff;flex-shrink:0;overflow:hidden}
.lb-av img{width:100%;height:100%;object-fit:cover}
.lb-nick{font-weight:600;font-size:.88em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-ms{font-family:'Orbitron',sans-serif;font-weight:800;font-size:.9em;color:#00E676;text-align:right;font-variant-numeric:tabular-nums}
.lb-empty{padding:28px 14px;text-align:center;color:var(--muted-2);font-size:.86em}
.lb-empty a{color:#FFE66D;text-decoration:none}

/* Login banner */
.login-banner{margin:14px 0 0;padding:12px 16px;border-radius:12px;background:linear-gradient(135deg,rgba(255,230,109,.08),rgba(255,107,53,.08));border:1px solid rgba(255,230,109,.25);display:flex;align-items:center;gap:12px;font-size:.86em}
.login-banner .lb-ico{font-size:1.2em}
.login-banner .lb-text{flex:1;color:rgba(255,255,255,.85)}
.login-banner a{color:#FFE66D;font-weight:800;text-decoration:none;padding:6px 12px;border-radius:8px;background:rgba(255,230,109,.12);border:1px solid rgba(255,230,109,.35);font-size:.9em;white-space:nowrap}
.login-banner a:hover{background:rgba(255,230,109,.24)}

/* Responsive stack */
@media(max-width:900px){
    .app{grid-template-columns:1fr}
    .stage-title{font-size:1.5em}
    .stage-result-num{font-size:2.8em}
}

<body>

<header class="topbar">
    <a href="/" class="home">← 홈</a>
    <h1>⚡ 반응속도 테스트</h1>
    <span id="authSlot"></span>
</header>

<main class="app">

    <section class="play-pane">
        <div class="instr">
            <b>빨간 화면</b>이 초록으로 바뀌는 순간 클릭·탭하세요. 초록으로 바뀌기 전에 클릭하면 실패. ms 단위로 기록돼요.
        </div>

        <div class="stage idle" id="stage" role="button" tabindex="0" aria-label="반응속도 게임 시작">
            <div id="stageContent">
                <div class="stage-icon">🎯</div>
                <div class="stage-title">START</div>
                <div class="stage-sub">여기를 클릭·탭해서 시작하세요. 빨간 화면이 초록으로 바뀌는 순간 즉시 클릭!</div>
            </div>
        </div>

        <div class="my-stats" id="myStats">
            <div class="stat"><div class="v dim" id="msBest">—</div><div class="l">Best ms</div></div>
            <div class="stat"><div class="v dim" id="msAvg">—</div><div class="l">Average</div></div>
            <div class="stat"><div class="v dim" id="totalAttempts">—</div><div class="l">Attempts</div></div>
            <div class="stat"><div class="v dim" id="worldRank">—</div><div class="l">World Rank</div></div>
        </div>

        <div class="recent" id="recentWrap" style="display:none">
            <h3>최근 20개 시도</h3>
            <div class="recent-list" id="recentList"></div>
        </div>

        <div class="login-banner" id="loginBanner" style="display:none">
            <span class="lb-ico">🔒</span>
            <span class="lb-text">로그인하면 기록이 저장되고 세계·친구 랭킹에 오를 수 있어요.</span>
            <a href="/auth/?next=%2Fgames%2Freaction%2F">로그인</a>
        </div>

        <!-- Ad slot (only shown post-attempt) -->
        <div id="adSlot" style="margin-top:14px;min-height:90px;display:none"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-5370817769801923" data-ad-slot="3456789012" data-ad-format="auto" data-full-width-responsive="true"></ins></div>
    </section>

    <aside class="lb">
        <div class="lb-tabs">
            <button class="lb-tab active" data-scope="world">월드</button>
            <button class="lb-tab" data-scope="today">오늘</button>
            <button class="lb-tab" data-scope="friends">친구</button>
        </div>
        <div class="lb-list" id="lbList">
            <div class="lb-empty">불러오는 중…</div>
        </div>
    </aside>

</main>

<script src="/js/supabase-config.js?v=1776820813"></script>
<script>
const $=(id)=>document.getElementById(id);
const esc=(s)=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const initials=(n)=>(n||'?').trim()[0]?.toUpperCase()||'?';

let me = null;             /* auth user or null */
let stageEl = $('stage');
let state = 'idle';        /* idle | waiting | ready | result | too-early */
let pendingTimeout = null;
let greenShownAt = 0;
let delayMs = 0;

/* ---- Auth gate ---- */
/* This game (and all future record-keeping skill games) is gated
   behind login. An anonymous visitor who lands here — typed the URL,
   clicked a shared link, came from search — is redirected to /auth/
   with ?next= so the round-trip is seamless. No "play as guest" path
   because leaderboards are the whole point. */
async function initAuth(){
    try {
        const u = await getUser();
        if (!u) {
            location.replace('/auth/?next=' + encodeURIComponent(location.pathname));
            return;
        }
        me = u;
        const prof = await getSupabase().from('profiles').select('nickname').eq('id',u.id).maybeSingle();
        const nick = prof.data?.nickname || '나';
        $('authSlot').innerHTML = '<a class="auth-chip" href="/me/">'+esc(nick)+'</a>';
        loadMyStats();
    } catch(e){ console.warn('auth init', e); }
}

/* ---- My stats load ---- */
async function loadMyStats(){
    if (!me) return;
    try {
        const { data, error } = await getSupabase().rpc('reaction_my_stats');
        if (error) return;
        if (!data || !data.has_record) return;
        $('msBest').textContent = data.best_ms;
        $('msBest').classList.remove('dim');
        $('msAvg').textContent = data.avg_ms;
        $('msAvg').classList.remove('dim');
        $('totalAttempts').textContent = data.total_attempts;
        $('totalAttempts').classList.remove('dim');
        $('worldRank').textContent = '#'+data.world_rank;
        $('worldRank').classList.remove('dim');
        /* Recent chips */
        const recents = data.recent_attempts || [];
        if (recents.length) {
            const best = data.best_ms;
            $('recentWrap').style.display='block';
            $('recentList').innerHTML = recents.map(r =>
                '<span class="chip'+(r.reaction_ms===best?' best':'')+'">'+r.reaction_ms+' ms</span>'
            ).join('');
        }
    } catch(e){ console.warn('stats load', e); }
}

/* ---- Game state machine ---- */
stageEl.addEventListener('click', advance);
stageEl.addEventListener('keydown', (e)=>{ if(e.key===' '||e.key==='Enter'){e.preventDefault(); advance();} });

function setStage(newState, html) {
    state = newState;
    stageEl.classList.remove('idle','wait','go','result','too-early');
    stageEl.classList.add(newState);
    $('stageContent').innerHTML = html;
}

function advance(){
    if (state === 'idle' || state === 'result' || state === 'too-early') {
        startWait();
    } else if (state === 'waiting') {
        /* Clicked too early during red phase */
        tooEarly();
    } else if (state === 'ready') {
        /* Correct — measure reaction */
        const now = performance.now();
        const rxMs = Math.max(100, Math.round(now - greenShownAt));
        clickedReady(rxMs);
    }
}

function startWait(){
    delayMs = 1500 + Math.floor(Math.random() * 3000);  /* 1500 - 4500 ms */
    setStage('waiting',
        '<div class="stage-icon">⏳</div>'
        +'<div class="stage-title">WAIT…</div>'
        +'<div class="stage-sub">초록으로 바뀌면 즉시 클릭!</div>');
    if (pendingTimeout) clearTimeout(pendingTimeout);
    pendingTimeout = setTimeout(()=>{
        greenShownAt = performance.now();
        setStage('ready',
            '<div class="stage-icon">🟢</div>'
            +'<div class="stage-title">CLICK!</div>'
            +'<div class="stage-sub">지금 클릭!</div>');
    }, delayMs);
}

function tooEarly(){
    if (pendingTimeout) clearTimeout(pendingTimeout);
    setStage('too-early',
        '<div class="stage-icon">⚠️</div>'
        +'<div class="stage-title">너무 빨랐어요</div>'
        +'<div class="stage-sub">초록으로 바뀔 때까지 기다린 다음 클릭하세요. 다시 시도하려면 여기를 클릭.</div>');
}

async function clickedReady(rxMs){
    if (pendingTimeout) clearTimeout(pendingTimeout);
    let badgeHtml = '';
    if (rxMs < 180) badgeHtml = '<div class="stage-result-badge">🔥 번개</div>';
    else if (rxMs < 220) badgeHtml = '<div class="stage-result-badge">⚡ 빠름</div>';
    else if (rxMs < 280) badgeHtml = '<div class="stage-result-badge">👍 평균</div>';
    else if (rxMs < 350) badgeHtml = '<div class="stage-result-badge">🐢 차분</div>';
    else badgeHtml = '<div class="stage-result-badge">🐌 느긋</div>';

    let extraMsg = '';
    if (me) {
        try {
            const { data, error } = await getSupabase().rpc('record_reaction_attempt', {
                p_ms: rxMs, p_delay_ms: delayMs
            });
            if (!error && data?.is_personal_best) {
                extraMsg = '<div class="stage-hint">🎉 개인 신기록!</div>';
            } else if (error) {
                if (String(error.message||'').includes('rate_limited'))
                    extraMsg = '<div class="stage-hint">⏸ 1분에 10번까지 — 잠시 쉬세요</div>';
            }
        } catch(e){ console.warn('save attempt', e); }
        /* Refresh stats + leaderboard */
        loadMyStats();
        loadLeaderboard(currentScope);
    } else {
        extraMsg = '<div class="stage-hint">🔒 로그인하면 기록이 저장돼요</div>';
    }

    setStage('result',
        '<div class="stage-result-num">'+rxMs+'<small>ms</small></div>'
        + badgeHtml
        + extraMsg
        + '<div class="stage-hint">여기를 클릭해서 다시 도전!</div>');

    /* Show ad slot after first completed attempt */
    try { $('adSlot').style.display='block'; (adsbygoogle=window.adsbygoogle||[]).push({}); } catch(_){}
}

/* ---- Leaderboards ---- */
let currentScope = 'world';
document.querySelectorAll('.lb-tab').forEach(b=>{
    b.addEventListener('click', ()=>{
        document.querySelectorAll('.lb-tab').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        currentScope = b.dataset.scope;
        loadLeaderboard(currentScope);
    });
});

async function loadLeaderboard(scope){
    $('lbList').innerHTML = '<div class="lb-empty">불러오는 중…</div>';
    if (scope==='friends' && !me) {
        $('lbList').innerHTML = '<div class="lb-empty">친구 랭킹은 <a href="/auth/?next=%2Fgames%2Freaction%2F">로그인</a> 후 확인할 수 있어요</div>';
        return;
    }
    try {
        const { data, error } = await getSupabase().rpc('reaction_leaderboard', { p_scope: scope, p_limit: 50 });
        if (error || !data) {
            $('lbList').innerHTML = '<div class="lb-empty">아직 기록이 없어요. 첫 기록의 주인공이 되세요!</div>';
            return;
        }
        if (!data.length) {
            $('lbList').innerHTML = scope==='friends'
                ? '<div class="lb-empty">친구와 함께 도전해보세요.<br><a href="/messages/">/messages/</a> 에서 친구 추가</div>'
                : '<div class="lb-empty">아직 기록이 없어요. 첫 기록의 주인공이 되세요!</div>';
            return;
        }
        $('lbList').innerHTML = data.map(row => {
            const isSelf = me && row.user_id === me.id;
            const rnkCls = row.rnk===1?' gold':row.rnk===2?' silver':row.rnk===3?' bronze':'';
            const av = row.avatar_url
                ? '<div class="lb-av"><img src="'+esc(row.avatar_url)+'" referrerpolicy="no-referrer" alt=""></div>'
                : '<div class="lb-av">'+esc(initials(row.nickname))+'</div>';
            return '<div class="lb-row'+(isSelf?' self':'')+'">'
                +'<div class="lb-rnk'+rnkCls+'">'+(row.rnk<=3?(['🥇','🥈','🥉'][row.rnk-1]):('#'+row.rnk))+'</div>'
                +'<div class="lb-who">'+av+'<div class="lb-nick">'+esc(row.nickname||'?')+'</div></div>'
                +'<div class="lb-ms">'+row.best_ms+' ms</div>'
                +'</div>';
        }).join('');
    } catch(e){
        $('lbList').innerHTML = '<div class="lb-empty">불러오기 실패. 잠시 후 다시 시도.</div>';
    }
}

/* ---- Boot ---- */
/* Boot sequence: auth gate first. Only if authenticated do we
   bother loading the leaderboard — unauth'd visitors get redirected
   before the RPC fires, saving a round-trip. */
(async () => {
    await initAuth();
    if (me) loadLeaderboard('world');
})();

/* Cleanup service workers (project-wide policy) */
if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(r=>r.forEach(s=>s.unregister())).catch(()=>{})}
if('caches' in window){caches.keys().then(k=>k.forEach(n=>caches.delete(n))).catch(()=>{})}
</script>
